body:
  text: 勉齋集巻八宋黄榦撰書與胡伯量書榦彔彔賤職無足道身老累重書㑹所入之薄不足以自活躬耕非所素習捨是無非有害於義惟有禄仕猶法令所許君臣不可廢之義竭力盡職食焉無愧故冒昧為之幸亦職事粗辦上下不相咈可以苟嵗月耳但場務事多無暇讀書浙右之俗專務豪奢初不知讀書為何事過従絶少講習遂廢是則可恨也契兄與黄寺丞丈處彼此當相安胡不且少留耶膚仲去嵗留此甚乆亦具言相處之適其長子子華今遂登科矣恐欲知之李余二兄力學如此可喜近有自彼來者乃云敬子捨禄仕而放債以為活豈亦惡之者之言耶不知其生事何如如他無以為活卻不若丐祠之為愈也榦衰晩之蹤奪於兒女之累不得一意卒所業朝夕憂歎虚度此生若不為擺脱之計日度一日溘然而逝與枯枿朽株何異兒女十人一兒一女已婚嫁次女亦已許人今秋可了更四男子次子輔年已二十三矣懵然無所知然亦幸其靜重知讀書但頑鈍之甚留之膝下無朋友過従嘗欲遣之逺遊以交於四方之賢者而廣其聞見深以未得師為念今乃聞契兄寓筠陽去此十舍而近敬遣之趨函丈望借一寺舍僧房近郡治者與之處誨之以所當讀之書每四五日一呼而教之為之檢㸃課程不惟使之識義理不為小人之歸亦望之使之多聞博識進可以應舉退可以為書㑹以不失其衣食之計榦家世窮空兄弟子姪輩皆須自撑拄以為活非有父兄之業可席以為安也若其可教望收置席下雖三五年無害也此亦月遣人送資糧以與之榦老矣一二年間亦有卜處康廬之意得此子先交於彼中相識異日亦得以老此身也萬望垂念李憲相約為章貢之行已治裝戒行邑人苛留不忍相捨此亦為之痛徹心肺以此憂慮熏心幾成大病只得力辭之未知其肯相従否衰晚絶念世故但得一日之閒且為卒業之計豈敢更當此重委若以此得罪而去亦所甘心也昨承示借先師遺訓已囑小兒輩謹䕶不敢損失承許以夏初見訪俟有的信當遣舟奉迎輹孫偶以去私留此只得且以付之䝉示及楊敬仲語此自是二陸門戸其學者之説大抵如此專欲上門把人長短又須勒令其人従其説誠足以聳動人聽然乆而思之意味殊短契兄欲以某坐某行言之則又恐非其指意亦恐未盡其某坐某行之意也國秀兄之説似為得之恨以事冗不得深思再以求教也榦一身百慮至上饒又且不免還家看孥累米價大貴四壁蕭然求欲退安丘壑而不可得旦夕又當一出抑何時而已耶囘首諸公徒切健羡大學首章無他疑但向者以為明德之發於外者昭著而不可掩也今之解注乃存於中者洞徹而無所蔽也故鄙意以為莫若合内外而言之虚靈指存於中者而言昭著指發於外者而言如輝光之類皆指外者而言之今既未能不疑且守師言就本領上看尤為有味也義理無窮安得朝夕相依以扣請所未聞耶明德只得如章句所説然其間亦難看更以格字致字誠字正字修字與明字相叅見得分曉方理㑹得先生指意不然只是侏儒觀優也榦年益老目益昏每念先生諸書向來極欲説得平易使人易曉然今所曉者又只是見得皮殻殊可歎也悉俟面言之近因與蔡兄元思論西銘頗痛快敬子當能言之餘俟騎氣之來耳榦本是村秀才卻被捉従此來又不免别換頭面為之説法日尋羣豪為騎射雄飲之習老矣不足追逐然舊病卻自來此為之頓减亦是頑骨合有許多辛苦分也諸事已見敬子兄書中向使真得一方之地使自展布亦當有可觀局促隨人後亦頗覺費力耳亦只得尋不侵官不犯分事為之使吾之志得行而彼不覺耳然孰若安坐讀書之為樂也兩子來此卻得課之讀書其他無可交游者葢此間所習者騎射耳不知有詩書也承教持守之方别恐亦無他説前輩及先師言之詳矣亦只是不為與為之不力耳然亦有一説致知持敬兩事相發人心如火遇木即焚遇事即應惟於世間利害得喪及一切好樂見得分明則此心亦自然不為之動而所謂持守者始易為力若利欲為此心之主則雖是强加控制此心隨所動而發恐亦不易遏也便使强制得下病根不除如以石壓草石去而草復生矣此不可不察也不知髙明以為如何榦老矣未能忘禄非禄之不可忘也不仰禄則又須别求所以餬其口而勞心害義反甚於仰禄以是東西南北惟命是從何去就出處之敢言何功名事業之敢望特汨没世俗學問盡廢大為師門之罪人不敢自文也敬子果如何來書所謂甚費造化斷不可辭此語卻與向來議論不同今之出仕只是仰禄不得已若謂合義則非所敢聞只管如此立説卻似浙間議論也又不知髙明以為如何敬子既是應舉得官又家貧未能不仕従之亦無害也前日之事乃知諸公醖釀甚乆惟恐其來故競起而攻之要之不能阿世徇俗尚復俛首從官此當自責也苐因此遂得裹足山樊杜門絶交一意安靜以終餘年又莫大之幸也南康已成聚落臨川氣象方張此間亦有朋友自為保社講習益明不至於㣲言絶而大義乖亦先師所望於吾輩也尊意只得屈意徃白鹿且以吾道為念收拾得十數人使此道不至湮晦最急務也陳守胸懐坦然無一毫私欲之累於學問雖未甚加功然其資其志不可及也此而不可相處則亦難乎望於今之世矣日來講學想日有新功朱先生集前修之大成設教垂世其大綱無以復加矣顧學者之為學則亦須隨其氣質察其所偏與其所未至擇其最切者而用吾力焉譬如用藥古人方書亦言其大法耳而病證多端則亦須對證而謹擇之也榦衰老多病於諸書亦不能泛讀矣心身閨庭之間是則學問之大端朝夕孜孜惟此而已朋友講習則絶難其人也復胡伯量書承誨以朋友講問之詳甚幸甚喜榦之愚陋何足以折衷之所説大抵皆善人心道心之説恐如契兄所云者為是李所謂人心氣也余所謂性之正者皆未精確也道體之説此更宜講究謂但指隠而言者豈所以為道體之全耶體字不可以體用言如今所謂國體治體文體字體亦曷嘗對用而言耶所謂道體者無物不在無時不然流行發用無少間斷如曾晳者真是見得此理然後従容自得有以自樂今之局促迫狹尋行數墨輒拘礙者豈亦於此有未灑然者耶主敬致知兩事相為經緯但言敬而不能有所見者恐亦於此有所未思耳此有非紙筆所能盡者試以扣余李二兄共商確之安得一見相與劇言耶恐有未安者卻望垂教為幸榦偶當一職自不敢苟以是亦粗辦不然亦豈不能虚竊廩粟以活孥累耶承見教講學大畧足見勤篤師友所望道體之説前已具所聞求教矣未審是否持守之方無出主敬前輩所謂常惺惺法已是將持敬人心胸内事摹寫出了更要去上面生支節只恐支離無縁脱灑所謂座右銘四句者不知先師文集有耶抑故友程君之語也是必非夫子之言若程君思索所到則恐畫蛇尋足愈支離而愈鶻突矣安得起之九原之下一扣所疑耶易本義不暇細觀但先天六十四卦圓圖已大錯繆所謂有小圏者特其小失耳今以印䇿論之則印䇿中縫之左即乾卦其右即姤卦乾姤二卦夾在䇿縫左右乃今所印本恒㢲之位即先天乾姤之位也乾姤居正南坤復居正北故曰冬至子之半是也若今所印則冬至在亥子之間矣知乾姤在䇿縫之中則伏羲八卦圖以乾為南以坤為北可以類推矣此乃易之宗祖宜亟正之又圓圖後語有圓布者有方布者則六十四卦圓圖之中當有方圖豈可有其語而無其圖耶榦以貧故無筆力且在考亭借書以讀以故無本然此大節目則可以黙識不可便流轉以誤後學也聞果州兄之病令人終日憂惱又是幾百十年復生得一人如此况當人物衰㣲㣲言將絶之際豈宜如此不知此數日又如何朝夕引領以望音信及得音信則又驚悸不敢開緘為之奈何諸兄更宜朝夕視之且以寛釋其意也西沂之計且宜遲之榦在此陳師復又來皆可差人去使喚及其他委使亦可効力若解舟之後朋友皆不在側萬里修途不得不為之慮也與胡伯履西園書榦賤跡如舊去冬復為此來更兩三日即理歸裝頑鈍無寸進特此志未衰爾義理精㣲玩索之乆漸覺前日用工之疎然又安知異日之視今不猶今之視昔耶亦有刻意竭力以不負此心而已道難明而易晦彼馳心俗學畧無見觧者是誠無望焉爾有志於道者又率多自執已見安於速成然於聖賢之學不可以毫釐差者其為亡羊一也以是益覺師友講貫虚心求益不可須臾忘也此間朋友徃來甚多但悠悠不能自奮者亦不少每念契兄剛毅果敢未嘗不敬慕恨朝夕不得承誨論君舉陳丈於大經大本固難責以盡合然聞於其制度考證亦頗有過人處善取人者亦資其長以益已而已復胡叔器書榦兩嵗奔走相望益逺無從晉記人來兩辱書誨不勝感慰吾輩年益老百事皆不足關心惟力進此道以無負師門為幸進道之要固多端且刋落世間許多利欲外慕見得榮辱是非得失利害皆不足道只有直截此心無愧無懼方且見之動靜語黙皆是道理不然則浮湛出入渾殽膠擾無益於已見窺於人甚可畏也榦衰老冒昩此來只是為貧别無他事日來覺得氣血大不如前已上丐祠之請不䝉報可欲歸未能意思昏悶此間本事簡偶值大旱頗覺勞心若得早歸靜坐讀書莫大之幸也復葉味道書榦彔彔如昨衰晩冒昩初以事簡為幸忽值大早不遑寧處所幸方旱之初便積得米以為後日之地以是其憂稍寛但事變之來不可預料亦不容安枕也老來但覺來日無多亟上丐祠之請不䝉聽従然亦可以為嵗終再請之地也語録事承見諭然亦有一説且如語録中所載與四書不同者便徑削去則朱先生所集程先生語録胡為兩説不同而亦皆采取耶天下義理正未可如此看也雖朱先生不敢以自安而學者乃欲率然如此何耶朱先生一部論語直解到死自今觀之亦覺有未安處且如不亦君子乎一句乃是第一叚幾畨改過今觀程子云不見是而無悶乃所謂君子是不愠然後君子也朱先生云故惟成德者能之則是君子然後不愠以悦樂兩句例之則須是如程子之説方為稳當敏於事而慎於言朱先生云敏於事者勉其所不足慎於言者不敢盡其所有餘此用中庸有餘不敢盡之語然所謂慎者非以其有餘而慎之也慎字本無不敢盡之意事難行故當勉言易肆故當慎耳人而無信一章其何以行之哉何以之以便當用其何以觀例志道據德依仁不當作次第説若作次第説則游藝有所不通且有志道者未能據德據德者未能依仁之病道者貫古今塞天地人所共由志者存之而不忘德則行道而有得於身隨其所得守之而不失仁者心之全體德由此立道由此行故當依之而不違三者皆人所不可須臾離若藝則游之而已此一段乃近見一朋友語録中所載又豈可以其與四書不合而削之乎義理無窮正可憂正可懼不可執一説而遂以為安也似此數處皆是近日見諸君子讀論語而得之今既刋削如此亦無可奈何但乞存留底本見示併求新改本更一觀耳序文讀之全不成言語留此人十餘日欲修改去竟以事奪又以暑熱不可言旦夕專人送去諸事已見李丈書中問小德川流大德敦化與萬物統體一太極一物各具一太極是同是别或云大德敦化是天命之謂性小德川流是率性之謂道或云大德是語大莫能載小德是語小莫能破此兩意是同是别天生烝民有物有則民之秉彞好是懿德四句如何既説物則又説秉彞又説好德則也彞也德也是一是二語脈如何相貫榦昨以鄙見所疑奉質今觀所荅頗似未安孟子曰博學而詳説之將以反説約也聖賢千言萬語雖似不同而其至約處未嘗或異今只隨句解析而不見其統㑹之一則恐於吾日用之間參前倚衡未必有所見此不但文義之不通而已也道之在天下一體一用而已體則一本用則萬殊一本者天命之性萬殊者率性之道天命之性即大德之敦化率性之道即小德之川流惟其大德之敦化所以語大莫能載惟其小德之川流所以語小莫能破語大莫能載是萬物統體一太極也語小莫能破是一物各具一太極也萬物統體一太極此天下無性外之物也一物各具一太極此性無不在也尊德性所以存心而極乎道體之大道問學所以致知而盡乎道體之細自性觀之萬物只是一様自道觀之一物各是一様惟其只是一様故但存此心而萬事萬物之理無不完具惟其各是一様故須窮理致知而萬事萬物之理方始貫通以此推之聖賢言語更相發明只是一義豈不自博而反約哉天生烝民有物有則於民之下又言有物者何也有物者就人身上有耳有目有手有足有君臣有父子之類而言也有此等物便有此當然之則如耳聰目明手恭足重君仁臣忠父慈子孝之類是也然此當然之則固無物不體而此理之妙實根於人性之本然惟人之生各禀此有常之性所以應事接物皆好此美德而不容已也所謂美德即所謂物之則也其曰好是懿德是云者即指上文有則而言也孔子又加一必字於有則之上加一故字於好是之上其㫖愈明矣劉子曰民受天地之中以生是以有動作禮義威儀之則亦此意也若不如此看得文理明順則謂之同者鶻突而無别謂之異者支離而不通矣榦嘗謂此四句便該括了中庸大學論語孟子許多説話非大聖人不能言也自有天地以來如人心道心四句及此四句皆是天心正法傳授世人不可輕將尋常詩句讀過也且如大德小德亦只是此意秉彞便是大德好德便是小德世間只是一個道理也朋友難得相近故痛言之未知是否榦前日附去諸兄徃復之語今承見教大抵榦之説失之合一而無别諸兄之説失之離析而無統更取朱先生太極圖解以統體太極為天下無性外之物以各具太極為性無不在之語并中庸尊德性道問學注觀之不知如何如前日鄙見亦覺未安統體太極各具太極則兼體用畢竟統體底又是體各具底又是用有統體底太極則做出各具底太極語大語小則全指用而言畢竟語大底是全體語小底是用天命謂性是未發畢竟是體率性謂道是人所常行畢竟是用大德而能敦化畢竟是體小德而川流畢竟是用若淺看則一段是一段更深入思量則又覺相似都凑不知如何中夜思之更無著落諸兄精力過人更為思之以見教幸甚復李公晦書來教謂喜怒哀樂屬於人心為未當必欲以由聲色臭味而喜怒哀樂者為人心由仁義禮智而喜怒哀樂者為道心以經文義理考之竊恐不然朱先生中庸序云人心發於形氣之私道心原於性命之正形氣在我如耳目鼻口是也聲色臭味在物豈得以發於聲色臭味者為人心乎朱先生云雖上智不能無人心今以由聲色臭味而喜怒哀樂則是聖人未免於逐物也而可乎謂由仁義禮智而喜怒哀樂者為道心則鄉黨一篇委蛇曲折煥乎其文章莫匪由仁義禮智而發也曷為而以道心為惟㣲乎人指此身而言道指此理而言發於此身者則如喜怒哀樂是也發於此理者則仁義禮智是也若必謂兼喜怒哀樂而為道心則理與氣混然而無别矣故以喜怒哀樂為人心者以其發於形氣之私也以仁義禮智為道心者以其原於性命之正也人心道心相對而言猶易之言噐與道孟子之言氣與義也人心既危而易陷道心復㣲而難明故當精以察之則喜怒哀樂之間皆見其有當然之則又當一以守之使之無一念而不合乎當然之則然後信能守其中而不失也似此可謂大段明白未審髙明以為如何更幸詳以見教真丈所刋近思小學皆已得之後語亦得拜讀先近思而後四子卻不見朱先生有此語陳安卿所謂近思四子之階梯亦不知何所據而云朱先生以大學為先者特以為學之法其條目綱領莫如此書耳若近思則無所不載不應在大學之先至於首巻則嘗見先生説其初本不欲立此一巻後來覺得無頭只得存之今近思反成逺思也以故二先生之序皆寓此意亦可見矣今觀學者若不識本領亦是無下手處如安卿之論亦善但非先師之意若善學者亦無所不可也孔門教人只説博文約禮至子思首言天命之謂性孟子首言性善是或一意也所擬近思數條言仁一也或在首巻矣而仁之道只消道一公字乃在第二巻者首巻狀仁之德公字乃為仁之法所以屬次巻義利之辨不在第二巻而在第七巻者第三巻只論為學之法若是利則不可以為學矣如孟子言舜跖之分則跖豈可以學論哉四子之序以大學語孟中庸為次近思乃雜詩書於語孟之後專言四子則不及詩書泛言讀書則雜以詩書亦各是一意於學者用功初不相悖也義理有疑一段而重出此卻可疑但濯去舊見以來新意此句於學者讀書之法頗精宻故先言之最後劄記之語稍淺近故列之於後然不重出前數語則又不成文理此不妨重出也致知在主敬前亦當如此若大學或問先以持敬補小學而後及大學則與此不同然若不致知則又不知持敬為何事耶先生嘗云居敬以立其本窮理以致其知本立而知益明知精而本益固則亦不妨其互相為先後也凡此皆非大義所係但覺近思舊本二先生所共編次之日未嘗立為門目其初固有此意而未嘗立此字後來見金華朋友方撰出此門目想是聞二先生之説或是料想而為之今乃著為門目若二先生之所自立者則氣象不佳亦非舊書所有不若削去而别為數語載此門目使讀書者知其如此而不失此書之舊為佳試與真丈言之如何通鑑綱目昨見舊本只是周威烈前數段有諸國征伐至殺戮十數萬人者皆不載嘗以禀先生荅云此豈可不載遂添得數段後欲重修而未暇也如此大部帙其間豈無疎漏處然其大經大法則正大的確非前輩諸儒所能及也僭易及之更幸賜教與失名三才之植立萬化之流行自一息至於不可終窮自一毫至於不可限量所以綱維主宰者道而已道非他行天理之當然不雜於人欲之私而已自古帝王參天地賛化育更堯舜禹湯六七君上下數百千年致治之盛常如一日豈有出於此道之外哉詩書載籍之傳其詳可暏也春秋戰國以來異論滋熾其術愈工其説愈巧其效愈邈彼豈不知聖帝明王豐功偉績之可慕哉陷人欲之私而昩天理之正帝王體統卒以冺没而民生不見隆古之盛千有餘年於此矣可勝嘆哉循乎道者如此戾乎道者如彼然則有志於世者其轍迹可考也然道之在天下與三才並立萬化並行雖顯晦不同未嘗亡也神而明之其惟人乎人以一身任斯道之責其要有三吾心之靈萬善畢備察識存養以立其本詩書載籍嘉言具列玩索涵泳以博其知賢人君子懐才抱德量其小大皆有可取搜羅振拔以廣其輔循是三者而固守之道之不明非所患也然處世有窮通致力有難易巖穴幽隠之士刻意勵行以有志斯道亦足以獨善其身惟夫君相之尊公侯之貴天下之所觀曕人心之所趨向誠能篤意於斯道則措天下於泰山之安壯國勢於九鼎之重直反掌耳是則榦之所以有望於閣下也勉齋集巻八
