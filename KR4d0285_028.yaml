body:
  text: 勉齋集巻二十八宋黄榦撰公劄漢陽申朝省築城事榦一介庸愚無足比數過䝉㧞擢躐畀郡符朝夕思念無以報塞漢陽為郡民淳事簡一意撫摩或可逃責然既叨專城之任則當思固圉之謀訪之故老察之形勢則最闗利害而不可不預圖者無城壁之可恃也考之圖志漢陽舊有偃月城今其蹤跡皆無存者則昔固嘗有城矣國家講好息民敵運日衰邊陲寧靜固無他虞然州郡之有城猶人家之有墻壁家無墻壁雖無盗賊何以為家况設險守國思患預防當無事之日不可不為有事之備本軍地雖近江旁亦多水然齊安江陵皆近江皆有城武昌池陽皆在江南亦有城何獨漢陽而無城其旁故多水澤然冬月淺涸亦不足恃况其為地雖非極邊而實則武昌唇齒吳蜀咽喉南人得之則恃為捍蔽孫氏都武昌使魯肅守漢陽是也北人得之則武昌不能自立漢陽守臣李恕屢以舟師敗鄂人是也盖大江東下雖若可恃然東有陽羅洑西有劉翁洲最為淺狹頃刻可渡乃敵人必窺之地古之為國守在四鄰賊入吾腹則無及矣故築漢陽之城不惟可以守漢陽而亦所以蔽武昌也開禧丙寅北騎圍安陸破竟陵漢陽之民逃奔江南者大半武昌之人日夜望漢陽之烽火以為安否向非漢川之民結集義士固守南河與敵血戰則事未可知使漢陽有城虎視江濆孰敢越吾境而為㓂耶京口之有𤓰洲所以通淮浙往來之道武昌之視漢陽猶京口之視𤓰洲也𤓰洲有城則師之出入皆有所恃武昌之師自漢陽而濟者絶江之後便無駐足之地比其反也前有長江之阻後有敵人之慮武昌之師不敢乆駐江北者無城故也使漢陽有城卒有緩急移武昌之屯數千人以守之或出或入從容整暇察敵伺便乘機應變壯荆襄之聲勢為諸郡之應援計未有急於此者矣𤓰洲非郡尚不可無城而况漢陽古之沔州衝要之地乎此則城壁之不可以不築也觀其地勢他郡城壁有難修築者雖有修築而不足為險者惟漢陽地勢其北依山其南瞰江東西有湖皆自然之天塹無湖無江之處十之二三耳向使經理有方雖郢之石城亦無以加郡城之南皆㳂江堤岸每嵗修築率費二三千緡而城居之民常凜然有為魚之患築城之後則每年可免修堤之費而向憂墊溺者可以安枕而無虞矣是又一舉而兩利也又嘗令壕寨官計其丈尺工料則為城不過六七里為費亦數十萬緡諸郡築城例役大軍大軍一出跋渉稍乆不無勞費漢陽武昌兩郡相望以武昌所屯之兵築漢陽之城士卒無乆出之勞州郡减増劵之費與築他郡之城其難易大不侔矣朝廷近年以來留意守禦所在州郡修築城壁無非為堅固不可㧞之謀今築漢陽之城其闗于利害甚切其為勢甚固其為費甚省亦何憚而乆不為此榦庸繆書生不足以知當世之務然叅之衆論不敢自黙欲乞行下制司總所運轉司公共相度庶㡬究見事實以為永乆之計然榦生平艱苦為貧而仕齒髮衰頽禍害銷沮量才揣分自合投閒置散非敢生事喜功有所倖覬特以郡之長官謂之守土城壁不築則非所以守土而曠其職矣故敢冐昧控陳以俟採擇謹以本郡地勢繪成圖本併以繳納小貼子榦照得今所築城并包砌據壕寨官計料為費九十萬貫湖廣㑹子准行在㑹子五十餘萬貫本軍樁積交割錢約有四萬餘貫向來朝廷許本軍每嵗就錢監附鑄二萬貫其後減為一萬貫今欲許以元額附鑄十年之數可得二十餘萬貫此亦是本軍合得應用之錢便可一面收買磚石擇𦂳要處修築更乞鈞慈詳酌施行申兩司言築城事榦一介庸愚不通世務昨者妄以本軍築城事申稟重䝉台慈特賜矜念差壕寨官前來相度乃與本軍所欲修築規模不同本軍但欲依郡治小山周圍築城保衞市井壕寨官又嘗相度郤欲只築西北一面及大别山一帶二說不同本軍遂具利害辨析亦欲往復詰難以求至當今䝉使所發下榦條具及都統司壕寨官條畫事宜以為築周圍之城不如築一面之城以為本軍所立規模有未便者其一曰大别山俯瞰城中以高臨下遍受矢石大别山去城中甚逺本軍城之北又自有小山足為捍蔽城中人家盡在小山之下大别之山豈能俯瞰城中登大别之山望漢陽之城相去數百歩豈有矢石可以相及試以强弩登山而射果能射及城中則其說為騐不然則恐是思之不審其二曰本軍倉厫皆在城外設遇緩急反資敵㓂本軍倉庫皆在軍衙之側自去年來前任王知軍方起一小倉在大别寺之側舉而移之一反手耳豈得便以為本軍倉厫皆在城外此亦恐是思之未審其三曰形勢褊隘薪汲不便軍城中有南湖有道觀湖南有韓家湖蓄水甚多可以供汲至於取薪則例是燒荻不過多積可以足用若築大别亦是童山何薪之可採此恐是思之未審其四曰姚家湖永濟港皆是泥泛不可築城沿堤江水衝激不可築城湖港只是淺小藕池四五十歩之闊耳目今乾旱土堅如石何泥泛之可慮沿江堤岸因堤為城去江尚一二丈何衝激之足憂蘇秀之城皆在水中不憂泥泛錢塘之堤可捍海濤不慮衝激此亦恐是思之未審又以為本軍築城比之築大别之城又省所費三分之二今以所開具細筭又只減得一半即不曽省得三分之二本軍周圍築城較之築一面之城自是多費一倍但築周圍之城費雖倍而郤為有用築一面之城費雖省而不足為固况又于鑰匙頭旋置鹿角又于沿江旋栽榆栁旋防姦細北而依山既汗漫而難守南而臨江復曠蕩而可憂猥曰費省不恤害深此亦恐是思之未審至于都統大尉台判以為新城規模乃受敵于堂隍之間大别山所築實拒盗于門墻之外似此數句語意峻潔而精到有非常人所能及竊以為堂隍周宻則敵不可窺門墻罅隙則盗不可拒此又不可不深思者也以榦愚見漢陽之城不可不築政不須彼此迭為異論先築城内以固根本次包外險以為捍衛如此則善之善者也不築大别而專築内城者次之若不築内城而徒欲以大别山為固則緩急不足守適以誤國誤民而巳事闗利害非敢好辯伏兾台慈更賜詳察與京湖制使請興築漢陽城壁榦領郡之初嘗具疵賤姓名通記府正懼僣率以速譴訶乃䝉謙尊寵賜台翰至于别紙真染慰藉隆渥自顧疎微何以辱此再圖布下悃致謝誠以斗大之郡仰藉威重適未有一事可假而陳者徒有銘鏤珍襲無日忘之仰惟制使以剛明之資充之以正大之學物欲不足以累其中是非不足以易其守故其施設措畫雷動風行盖夷夏之所倚頼乃復䕶惜善類不間微賤海内之士孰不欣欣然願執鞭以備使令人心既歸大功可就矣榦閩嶠書生自少迂僻量巳甚明世念甚薄中年孥累猥衆授徒為活偶得一官既無場屋之能又非閥閱之舊遂甘心塵埃中計傭以受直耳豈敢與英俊量長較短以爭聲名而取富貴哉州縣之間稍不敢曠廢職業諸賢過聽誤相推拔脫選之後甫及四年遂剖郡符自顧么麽何以得此誓當捐糜以報殊遇而又適以一麾仰𨽻按臨之下遂得朝夕奉教條竊窺大賢設施之萬一其何幸如之惟是性資疎拙于世俗應酬漫不通曉行年六十有四意緒衰懶深懼不足以當千里之寄尚冀台慈有以庇䕶警誨之不勝至望榦自到郡以來深念本軍全無城壁亦欲建白而自顧人微不敢有請近漕使吳寺丞乆留郡中乃以其說為然力賛其决謹具公劄圖本申呈伏祈采矚事役重大列郡所不敢專欲乞下之幕府詳議可否千萬幸甚復湖廣總領請創築漢陽城壁榦伏準使帖備示本軍創築城壁事不惟愚陋之見過䝉採擇而又為推說其不能自述之請不惟貰其疎愚而又過䝉褒奬助其工役之費此非精忠體國至公無我孰肯若此感激之私盖與兩郡士民同此心也衰晚不才誤䝉朝廷躐分郡寄到任以來惟思勉竭庸愚以圖稱塞倍増諸卒之廩新創諸卒之營廣積粮儲精加教閱無所不用其力然為州郡而無城壁則所謂練兵儲粮皆無用之具盖既有城壁則凡事可以次第而舉蓄兵以守城蓄粮以贍兵凡所施為皆有足恃况漢陽之城又為要害之地蔽遮長淮為武昌之藩屛乎但事貴乘機謀貴及時目今日晷正長可以興役若至天寒則無所措手本軍所申朝省巳及月餘未䝉行下更乞備申早賜施行不勝幸甚復湖北運使請興築漢陽城壁榦伏準使帖備所申請本軍築城事榦衰晚庸愚不足以深知當世之務雖嘗採之輿論亦以人微言輕不敢有所建明至于築城一事盖自少而知學則巳知設險所以守國長而從仕則又見有城之可以乆存然藏之于心不敢有請比因都運判府寺丞駐節江干不以登陟為勞覽觀形勢首言本軍之城不可不築遂妄意條具申之朝省聞之諸司兹者乃䝉開陳古今之跡詳酌東西緩急之勢移武昌之材料助漢陽之工役奉使總領郎中亦捐金十萬以相之列郡建議而監司賛其謀西州築城而東州助其役盖精忠體國至公無我古人之所難能而後世之所創見也使邊郡之臣皆存此心則亦何患國家之不固而外侮之足患哉顧區區之愚亦有不敢不申稟者本軍昨申朝廷至今兩月矣尚未䝉行下目今日晷正長可以興工若至冬深則難為力今兩司既巳具申朝廷當無不從欲乞兩司商議先于官屬中各差一人同壕寨官俯臨敝郡前期計度丈尺及合用工料計度既定則合用磚石竹木之屬先行收買及至命下則移武昌所屯之兵便可下工興築庶幾事役早辦不勝兩郡百姓之望與漕使趙監丞論錢監利害榦忽奉使帖令條具錢監買鐵利害榦至愚無知不足以知當世之務然既䝉某官謙抑下問榦亦豈敢自黙榦到郡巳三閱月于監中利害亦粗聞其一二徒有私切驚愕而巳如所謂減買鐵之額増買鐵之價此僅足以救其弊之末流也其弊之源不在此也官府賦財之出入闗節甚多防閑甚宻貪官猾吏尚盗用而不顧今聽之自鑄自支而自用之安能責其無弊乎榦于監中官吏無所統屬無以究其曲折之詳然嘗問及朝廷每嵗所得之錢則曰四年之内所積九萬緡耳則是一年之内朝廷所得者不及三萬緡問其每嵗所鑄之多少則曰非二三十萬緡不足以了監中之支遣如此則朝廷所得僅十分之一所謂九分者置之何地耶則曰買鐵買炭例是兌支朝廷初破本錢四分其後増為六分今監中又欲破七分之本以買炭支給工匠亦不過嵗鑄十萬緡則朝廷可得三萬緡之息而監中亦有七萬緡之本矣今得鑄二三十萬緡則十萬之外置之何地耶又扣其所謂七分之本者其他固難盡知若曰炭每斤二十文漢陽炭價冬月二十文夏月減其半又豈可專以價貴之月而為例乎又曰官吏請給每鑄一千緡支錢百緡若鑄二三十萬緡則為官吏者能幾人而可以費二三萬緡之請給耶所謂工匠之費則又不在此數也以此二者觀之則榦所謂受弊之源者可得而知也惟其自鑄自支而自用之也故不復問朝廷之所得多寡惟恐所鑄之不多所得之不廣惟欲所鑄之多則惟恐買鐵之不及額惟欲所得之廣則豈復顧鐵價之低此使司所以有减額増價之議盖處利害之外斯能知民情之休戚監中之官吏溺于利害之中雖使盡追鐵山之爐户大者討而小者戮亦未足以厭其欲也今乃欲使之減額而増價是窒其侵蠧之穴彼又豈肯俯首而聽命哉為今之計莫若先計朝廷所得之數立為每嵗本息合鑄之額如但得三萬緡之息則只可鑄十萬緡而本息皆在其中所謂本錢之内除支工匠官吏之費所謂買鐵買炭者又可積樁以為嗣嵗之用又不必鑄一十萬緡而可得三萬緡之息矣向也費本四分今増為七分則自可以償鐵炭之直此法既立則額不期減而自減價不期増而自増矣立額之外不得輒有増鑄動爐之日委官監視而稽其出入則弊可革矣今乃漫無統紀聽其自鑄自支而自用之上以洩天地山川之藏次以竊人主富貴之柄下以重爐户追擾之困是豈可不早正而力救之乎然猶有一說兩淮荆襄人煙蕭索而鐵錢太多故其用也輕數年之前鐵錢二當銅錢一今則以三當一矣如爐户得鐵錢五十向也可易銅錢二十五今止可易十七則巳折三分之一矣此鐵價之所以愈貴若監中所鑄無度則銅錢愈重鐵錢愈輕今若立為限制而朝廷又能出數十萬官劵易鐵錢而藏之則鐵錢稍重矣此非某官莫能開陳而力行之也榦衰老亡庸獨其憂國之念隨寓而發勃勃而不自覺惟恕其狂直而察其情則千萬幸甚與漕司論放魚利事榦伏準使司行下欲以湖北路諸州所管魚湖所收課利盡行蠲免應湖北所産魚蚌之屬聽貧民從便採取主家不得執占仍許諸州以交割錢理折每嵗所收漁利既不失諸州支遣財賦又使貧民得採魚為食以度飢荒似為良便然其間乃有大不便者恐亦思慮有所未至耳湖北諸州湖地有係民户祖業者有係官地民户請佃多年者有産業之家或自為主或立年限租穙與人而租穙之人為主者每嵗冬月採魚湖主不得自採皆是荆襄淮西江東湖南諸處客人駕船載網前來湖主家結立文約採取魚利而與湖主均分之採魚之人多是亡命不逞之徒每遇採魚或其徒中自相攘奪或主客之間互相爭競大則賊殺小則鬭傷今乃欲聽從民户採取則諸州取魚客人皆不肯復與湖主均分湖旁强横之民又羣起而爭之湖主亦不得而問也湖主嵗收湖魚之利多或數千緡少亦數百緡又豈肯坐視而不問乎其勢必至于爭鬭諸州之客並湖旁之民既與湖主為鬭客之與民徒黨之中又自相為鬭則賊殺鬭傷紛然而起矣設或結為徒黨便相抗拒意外之變豈能無之今以十金投之地而聽人之爭取猶有不平而爭鬭者况湖魚之利動數千緡又豈可不辨主客而聽人之攘奪乎且湖北一路有田租有荻地有魚湖皆隨其所産官司所收十不及一其餘皆地主之物也湖魚可聽人户之自採則荻柴田禾亦可聽人之自取乎州縣百姓有耕田者有種地者或為工或為商或為士今嵗大旱無民不飢若是者皆非能取魚者也通州縣而計之旁湖而能取魚者十之一二耳雖捐魚利而聽其自取士農工賈豈能率被其實惠乎至于富厚有力之家有强梁地客百十為羣亦並縁官司指揮網取他人之魚利則又將何以禁之乎貧民不得受實惠豪强得以恣其惡州縣之間詞訴紛起况于意外之可慮尤可寒心以愚之計莫若且令仍舊行下州縣總計每嵗所收魚利先收交割錢總計人户多少真貧乏者散錢以與之彼既得錢可以糴米又以買魚爭鬭之患不作而民受實惠矣計無便于此者更乞將榦所陳送僉㕔詳議施行伏乞台察申制置司乞援鄂州給米榦竊聞之當天下之大任與立天下之大業者要當有公平廣大之心今天下之人物所謂當大任立大業以公平廣大為心未有如制置大卿也榦也庸繆衰晚之一夫朝廷過聽畀以專城之寄嵗適大旱種不入土野無青草湖北一路未有漢陽之甚者也復州德安皆産米之地鄂州諸邑皆有山源之田間得半熟漢陽為郡皆平原曠野民無盖藏一經旱暵四野如焚老稚纍纍去死如髮稍渉冬寒枕藉溝壑誠可傷也本軍交割鐵錢七八萬貫收糴米榖僅可及城之内外千餘家耳四郊之外實無力以及之徒有憂嘆而巳近聞江東一路請于朝廷得米三十萬石又有常平米三十萬石又和糴到十萬石朝廷又以三監司各分州俾任賑濟之責獨湖北一路荒旱如此未有監司過而問之者亦未有捐一粒以救州郡之匱乏者豈湖北百姓非朝廷之赤子乎方切驚愕以為本路無賢監司則若是也固宜今皆朝廷遴選以為大賢也則奚為若是數日以來忽有相傳以制使司捐米四萬石以濟鄂州總所之乏市井鄉村飢羸小民莫不扶杖而起以為吾亦將有更生之賜也或者乃曰總領運使皆大官故制置使司特以濟之汝蕞爾小郡誰復汝憐哉是不然制置大使之發粟為百姓也豈為總領運使哉東西兩州相望使東人飽西人瘠東人喜西人怒豈制置大使之心哉或者又曰鄂州地大人夥故捐粟以救之非漢陽比也鄂州人固衆矣漢陽亦當十分之一鄂州可給二萬則漢陽亦當給以二千石制置大使不當賑其大而遺其細也今一路監司既皆不問而制置大使亦不問則此郡之生靈枕藉而死亦命也哉百姓既不當言而郡守又不為之言則是坐視其死也夫子嘗以周而不比為君子在易之比亦以顯比為吉同人于野為亨同人于宗則吝制置大使以公平廣大為心何愛米二千石而不以慰漢陽百姓之心哉故敢冐昧控陳尚兾台慈少垂憐念不勝一郡百姓之幸安慶與宰相乞築城及邊防利便榦一介寒微無足比數過䝉鈞慈曲賜收錄起從香火畀以潜藩拔之于世所共棄之中置之于望所不及之地固知筋力既衰邊陲多事難以稱塞然以恩德隆厚不敢固辭扶曳就道勉竭駑疲以圖報效榦伏自開禧丙寅往來兵間親見北兵入冦棗陽無城最先破隨州無城則又破復州無城則又破信陽荆門無城則又皆破郢州號為石城敵人圍之三日而去襄陽德安城最堅攻累月而不破以是知古人築城鑿池以為捍禦此不可易之長策也自更化以來力排羣議一意築修邊城兩淮江南可以安枕而臥此不世之大功也榦昨守漢陽嘗以城壁為請朝廷以為内郡遂寢其議今到安慶亦覺此役不可不興謀之郡人謀之同官皆以為然遂敢條具申聞欲望鈞慈㫁在必行則龍舒之民感戴恩德當與潛皖相為無窮也至望至望榦近亦有書稟李制帥以為保伍不可不結屯田不可不講此二事者兵可强國可富若其說可行則守禦無遺策矣榦視事之五日即聞浮光有警又五日聞安豐被擾敵氣甚驕此天速其亡也十數日來天雨不止頓兵堅城之下以此之逸待彼之勞亦何足慮但彼亦獸窮則摶自此亦恐未有安靜之日更望鈞慈超然逺覽毋為宴安之謀勿聽苟且之論使在我有金湯之固彼自望風不敢正視則永永無虞矣與淮西喬運判辨起夫運粮事榦天予之幸兩獲預屬吏趨走之末熟聞某官體國愛民之意至深至厚凡在列郡敢不奉承榦衰晚多病分甘投棄誤䝉朝廷復畀郡符冒昧此來意亦以淮郡乆被賢使者存撫之恩可以藏拙今乃大有不然者今日為守令者最當固結民心而淮民之困苦憔悴最可憐憫旱蝗疾疫天既困之于上敷抑驅擾人又困之于下又何以使之效死而勿去耶巢縣之寨木合肥之馬草一則曰起夫二則曰起夫小民既以饑餓流離不能自存矣稍謂之稅户者亦皆破蕩産業無復生意每念及兹不覺涕泣之横流也近承使帖起懐寧桐城兩縣人夫運廬州一萬石米巳具迫切之情冒凟台嚴矣想軫念淮民必䝉開允今又承使帖再差宿松望江太湖三縣人夫運廬州米盖前所申者尚未呈徼耳欲乞台慈照前所申併與蠲免不勝千里生靈之幸榦到郡之初竊以為此郡古稱名郡而蕩無城壁之可恃急欲創築城壁今也邊事方殷難以乞差大軍只得募五縣百姓相與助役則其間豈無勞擾輒具公状申聞欲乞台慈以本郡見役大衆一切差夫特與免放則千里幸甚安慶為郡别無財賦所入甚微前兩政輒以羡餘為獻其間極有難言者雖得善為郡之名而壊此郡者斯人為之以孱弱衰病之軀當此繁難困弊之地若非賢明使者力賜扶持則獲罪必矣今之為政者不務恤民但求利巳視其外則若汲汲于事功而誕謾欺罔使百姓怨入骨髓誠不忍為也後唐以茶鹽敷百姓俾助米麥謂之博征周師入境皆簞食壺漿以迎之彼猶以一物博一物今之郡縣皆扼民之吭而奪之食者也可勝嘆哉仰恃賢明知眷之深吐露情素冒凟威嚴罪當萬死又榦昨者妄以乞免起夫事凟台聽意謂必䝉開允今準使帖從僉㕔所擬再行下照差環顧百姓不勝驚擾榦往年倅安豐每見鄉民困于官司之擾巳為之驚懼及今此來尤覺百姓窮悴被擾百端殆若非人世者城市之中民之窮困或自經自刎以為不如無生此何等景象哉起夫一事官司敷之稅户稅户抑勒佃户稅户每三四十千起一夫未免有鬻産之患佃户以為投之死地父子夫妻相顧號泣而後行此誠為政者所不忍聞也目今春農方興麥未刈秧未挿蠶未繅豈忍使之失一嵗之計耶况復道里迂囘官司皆有重費傷財害民莫甚于此擔米火頭之屬五縣共管四萬夫以敵人一小隊犯浮光而為擾如此萬一又有甚于此者則百姓何以自存正恐兩淮之禍不在外敵而在蕭牆之内也本府素無城郭居民日夜皇皇前數政畧不留意榦到任之初自度無以為守禦之計銳意興築幸而同官協謀邦人翕然從之見鑿石燒磚五月初即興工欲以數月辦集邊事不寧不敢乞差大軍其勢只得起夫興築日役萬人亦皆今所欲起夫之百姓也欲乞台慈以本府興此大役特與差免不勝官吏士民之幸雖無為未免起夫然愚意亦以為無為亦是不應差但無為又無本府築城之役自非某官軫念淮民不忍使一夫不得其所則寒賤小吏亦何敢冒犯如此若必欲起夫則民不得安城不得築一郡狼狽何以支吾此榦所以死請也百拜頓首敢為邦民乞此餘生惟某官埀憐焉榦衰晚素無宦情特以朝廷不棄之恩難報意謂邊庭無事州郡富實措置一二年使此郡可為一保障不意公私困乏邊警日至亦甚悔此來倘䝉某官曲賜保全幸甚榦又有一説運廬州之米止得安豐合肥兩處各出二千人馬䭾之屬循環迭運不過一兩月亦可運其為費甚省而自辦若不計民間之利害與事體之逆順但欲一切起夫非愛民利物之至情也聞敵之入冦大抵以嵗幣為主三兩年間所謂書生者皆以免嵗幣為請也榦雖至愚亦竊笑之惟某官毅然力排衆論至于今日而其騐巳如此則通儒有用之學非若世之不達時宜者今某官持節于此殘冦豈不知感又安敢深入耶運粮一事亦正可徐徐而圖之也百拜頓首哀鳴以請惟台慈其憐之申安撫司論買馬利害榦昨準使司行下收買戰馬雖自顧駑下不足備使令亦粗知邊防事急使司買馬豈敢苟簡日夜督迫諸縣人品雖不同亦以本府催督之故應有馬之家盡行搜尋解到本府本府喚上牙人又專委一二親信曽諳曉馬之老少羸壯者相視其量度高下又親至堦前一一比度率十餘疋中方得一疋可以申解又其價例皆是十償一二鄉村人家畏懼上司只得退聽及兩次申解使司其初十疋則揀退兩疋續解八疋則揀退四疋皆減落價錢問之解馬之人則云使司選馬合干人皆云無錢使用又云不解馬牙及賣馬人来以故多方邀阻今官司一舉動則承行之人不務徇公但知謀利此不足怪減落價錢退還馬疋本府只得承受但恐自此馬愈難得徒使本府虚受不任責之罪若使本府捐一二百劵作縻費使用以駑馬申解固亦不難又恐本府有欺罔上司之責此在小郡利害尤輕苐恐其他州郡奉承此意反使使司買馬尤難不惟不得良馬而反得駑馬此于邉防事體關繫尤大榦仰荷使令不敢自隱謹具劄稟欲乞台慈專委親信清强文官一員監視以防欺弊不勝千萬之幸與安慶屬邑詰問起夫事竊見守令之職愛民為先諸君到任許乆豈不見淮民遭開禧兵戈之擾又遭天時旱蝗之灾前嵗一旱亦諸君所親見漕司行下敷巢縣屋料及廬州馬草若州縣有措置差人至地頭買納何至科配百姓既勒令出料出草又勒令出夫搬運甚至不和雇舟船乃欲起夫運草一擔之草未直百鏹一夫之運何止數千但知花押行下不知人間辛苦况又不能禁戢吏卒縱之下鄉搔擾斯民何辜受此荼毒每念及此不覺涕下近日漕臺行下起夫運廬州米二萬五千鄉村聞之如赴湯火富室有破家之患細民有喪生之憂諸君亦有室家亦有父子誰不愛惜正當視人如巳視民如傷今諸縣間有偏聽吏言公然搔擾上司之命固當聽從天子之民亦當愛惜况老身不敢自愛兩申漕臺願以此身為百姓代受此苦諸君不過申漕司以為本府給牓告示諸縣縣下人户聞之皆不伏差使乞下本府速賜施行則縣道有所慿藉以役百姓如此則漕臺不過按罷一太守耳于諸君初無利害何苦遽然如此以致百姓皇皇不安目今秧未挿麥未穫絲未繅遂使鄉民失一嵗之計則為守令者衣食租稅亦何面目以見百姓若本府三四往返便使推辭不得亦且拖延旬月庶得農桑之功巳畢亦得少寛更望諸君常存愛民利物之心毋為徇私自營之計則千萬幸甚辭依舊知安慶且丐祠榦一介庸賤無足比數蒙公相之顧遇㧞擢超躐家故窮空孥累猥衆筮仕十有五年皆得食租衣稅不至流離餓殍毫髮皆公相之恩也雖身膏草野亦不足以言報今至于復其舊職乃牢辭而不就者畏清議避機穽也畀以列郡而不受予之藩府而受之此豈能免當世之譏議况其所至動與物忤非公相雲天之庇巳不復有今日矣况敢自蹈于不知廉恥之地哉築城所以保民也自初建議巳譁然而見攻矣及其速成則曰是必勞民也及其費省則曰是必擾民也元僚之辟制府之請也五關之守禦浮光之督戰制府之命也未及行而嫉之者紛然矣𦕈然庸儒何足知天下大計乃創為之說曰是道學之徒喜言大義談恢復也守土之臣去制府五六百里邊陲之事未嘗與聞一有失宜則曰是嘗與謀也軍旅之際征役繁興民不堪命少陳利病則曰是素喜事也東羅西網一舉足且蹈其中憂畏憤懣殆無容身之所縱使無歴陽之除亦當哀鳴造化以求避况今嫌隙既開豈敢冒犯清議試身于不測之禍哉倅安豐則得罪于太守守漢陽則得罪于監司今怨咎滋起復有其兆矣是皆稟資狷狹賦分竒窮有以取之也榦開禧年間從事荆南幕府往來五關備歴險阻因得痼疾目今復發加以啖喘不可支吾倘䝉鈞慈特賜憐憫投畀山林自同蚩氓使之悠然涵泳聖化于寂寞之濱生死肉骨之恩没齒不敢忘也不然政恐他日異論横生雖公相愛念之深亦恐不能以庇之也俯伏俟命下情不勝戰懼之至與制帥辭依舊知安慶府朝廷于榦真有造化卵翼之恩榦以樸􅈪凡材加以剛狠若繩以當世之論自不應齒士大夫之列入仕且十五年無非動與物忤怒目疾視擠而䧟之者衆矣朝廷優容有陟無黜家本窮空孥累猥衆二百餘指不至餓死婚嫁粗畢無累後人此恩此德寧不可知所自來制叅之辟朝廷令以包砌城壁畢日供職則亦知一郡之命實繫于此舒和兩易則一二友實誤制帥非朝廷之本意今此朝廷又令還安慶之任且徇舉留者之請則朝廷之恩厚不惟及榦而舒民感朝廷之賜又當何如也如榦小官自當竭蹷趨赴舊任以報朝廷恩遇之厚以成安慶城壁之功夫復何言然其所以遲囘道途决為歸山之計者盖亦有說古之人直道而行初無嫌疑亦無顧忌可仕則仕可止則止雖舉世非之不恤也今則不然利禄之習勝恬退之風衰榦之素行又本不孚于人今乃捨和而就舒殆若與人爭較州郡之大小比量俸入之厚薄物論紛紛安能家置一喙以自解哉生平顧惜名義甘處窮約今年幾七十乃使人得以貪榮慕禄而議之是誠可畏也昔有以財賦羡餘而申聞朝廷以秤提官㑹而奉行條約其忠誠體國之念不足以暴白而後生小子至今猶得以議之然則清議所在亦豈得直道而不顧耶世之苟賤無恥行若狗彘者人皆置而不論至若名在偽學之籍則一舉足必議其短此古之道學者所以戰戰兢兢如臨深履薄至死而後知免也榦之負朝廷之恩有莫大之罪負安慶之民亦誠所不忍然使榦得以退歸田里保全晚節是乃所以欽承朝廷崇尚廉恥涵養風俗之意安慶大郡不過擇一公廉慈惠之人以為之守則必能為朝廷牧養百姓城壁一役土功巳畢包砌之磚亦巳燒造四百餘萬同官既皆協力又有寄居士友十二人人分百二十丈自行管幹朝至夕歸如已私事不過今冬自可了畢方今英俊如林如榦等輩車載斗量何可勝數亦何足以勞朝廷之區處賦以祠禄放歸山林物論定矣榦自丙寅丁卯為湖北帥屬往來兵間遂得嘔血之疾後宰臨川詞訟繁冗日夜勤勞加以痰喘至老愈甚多見朋友楊子直楊通老廖子晦皆以既老且病仕不知止至其身後無不狼狽今又豈宜復蹈其覆轍哉此榦所以决于退閒非敢為是矯飾之言也以君命之嚴不敢即安私室孑然一身宿留逆旅尚望早為白之廟堂毋使一介小吏有再三之凟以重取罪則為幸大矣與西外知宗訴同慶墳地并事目榦至愚無知然于鄉黨親族未嘗有毫髮爭競之心顧以墳墓祖宗藏骨之所不幸為豪强侵犯子孫之義自不容巳雖其事巳白然猶懇禱勸化冀其自還如是者二十餘年既不退聽而狠戾玩侮益甚自知宗秘書下車以來私竊自喜以為巳白之訟而求决于至明至㫁之前可以頃刻而定然竊伏下風觀道德聽教誨起敬起慕何敢以紛爭猥事仰紊清聽盖隱忍而不發者又一年于兹矣桑榆之景侵迫遲莫深恐一旦溘然遂填溝壑則祖宗抱無窮之羞子孫銜無窮之恨故輒具公牘私自慚赧亦不敢躬造庭下伏兾台慈特賜矜察事目榦世居福州東門外所居之旁百餘歩有同慶僧寺寺之屋宇多先世捨造其題梁猶可騐也由是三世祖墳皆塟同慶寺僧堂之側春秋合族饗祀不絶以世數考之今三百年矣先君察院嘗即寺之廊屋為書院察院之親從妹有婿曰趙帳管名公珩者無屋可居先姑為之請遂輟書院借之其後乆假不歸生息日蕃有子十二人一寺皆為所占然猶僧堂乃家間往來饗祀之所淳熈間趙帳管諸子不顧甥舅之誼輒令僮僕于墓下牧馬作踐先兄經閩縣陳詞織塞小門以絶牧馬之路復開僧堂後門往來祭祀閩縣給牓約束猶可覆也至慶元間先妣宜人棄諸孤兄弟相與廬于墓去城數十里帳管之第八子彦翿者遽占僧堂以居塞本家往來祭祀之路復開小門以通往來又于僧堂之後築為高牆以為花臺之觀與夫泡湢之類跨越溝界侵人祖墳禁地七八尺舉族痛苦摧割然猶未敢告之有司徧託鄉里長上卑辭厚意致其懇禱諸趙漠然不顧不得巳遂經宗司投牒諸趙譁然而起或以多貲請求或以威力恐脅不顧義理强辭枝蔓宗司遂委官地頭打量騐定見得侵占丈尺分明告示日下除拆牆圍給還禁地趙縣尉又妄以其妻生産為詞乞展日月故為遷延榦以禍患貧困之餘急欲到部遂于宗司給出斷由以為圖記而先兄即世榦又以貧故奔走急禄十有八年雖足跡不得一至松楸之下然痛心疾首一寢一食未嘗不在邱壑之間也諸趙之官途相逢者則竭誠以懇之其在鄉曲者則貽書以禱之或頑然而不顧或面許而背違至其兄弟急難之際不顧利害極力以救之者不一而足以始則深以為感終則反以見侮及榦奉祠来歸不惟前日所占之禁地未還而後來之侵侮益甚合族相告以為自榦一出之後帳管第七子彦備者又復于墓前掘去石條斫伐大木從弟因禮問之彦備竟敢奮擊族弟有救勸者遂為所毆以至傷重從弟經宗司論訴案牘具在今嵗之春族人相率葺理墳牆増培墳土初與諸趙不相干渉畢工之次日又有抛積不潔于墳上及鋤削所増之墳土者巳而墳右數尺之内巨竹成叢悉為砍伐審問其人則趙帳管之孫實為之以親戚為之勸解遂不欲竟其事彼之横强有素則陵犯鄉曲乃其常態苟可容忍亦姑置不問至于禁地一事則孝子順孫之所必爭而不容以自巳也伏念國家深仁厚澤雖馬毉夏畦之鬼亦得十八歩之墳禁以庇其枯骨法令明備犯者有刑趙帳管之子孫乃獨敢不有國家之法令况宗司巳斷之訟亦復玩視而不顧則縱横四出亦誰得而制之福州宗子大率謹守禮法而城東一族乃獨重為平民之害趙帳管之子黄氏之所自出則今之墳墓亦其母之先祖也縱以舅為不足道獨不念其母乎不念其母亦何所不至哉不遵朝廷之法令不聽宗司之約束不顧其母之親屬猶為有人道乎榦也三世祖墳巳經三百年及榦之身衰弱不振乃不能保其墳墓之禁地官府既為之辨明亦復因循以至今日春秋拜掃墓下布席之外殆無容身之地俛仰悲歎心焉如割尚何面目復見祖先于地下乎今齒髮衰頺行就溝壑若不鋪陳事因告之仁人君子則將抱終天無窮之恨伏惟仁慈少加憐焉新淦申轉運司乞賑䘏縣道伏準使帖委請運榦李司直契勘本縣少欠綱運及見起解上供及本縣苗數等事巳開具公狀乞備申訖大抵本縣財賦所入供其所出每嵗嘗欠二萬緡積之一政尚拖欠六萬緡若遇嵗有凶歉催科不辦及如向来軍興及兩年峒㓂之擾科需劵食費用百出則愈見不可支吾以綱運常是拖欠縣官常是放罷縣吏常是决配縣道無以為筞只有哀鳴富室預借緡錢形勢之户恃縣道為債家控持驅役惟命是聽貧弱之民恃勢家如官府寃抑愁歎無時獲伸則不惟縣道狼狽而為新淦之細民亦無復生全之樂數十年來人皆知新淦之難治而不知所以難者盖在于財賦之入少而出多亦有知其如此而漠然如秦人視越人之肥瘠今運使國博乃能軫念下邑特屈上幕俯加察訪此非惟官吏之幸實一邑細民更生之幸非惟一時之幸實一邑官吏無窮之幸也竊見朝廷以天下為一體監司以一路為一體痒痾疾痛見于肢節之間而此心未有不為之動者既動其心則將必有以處之矣此么麽小吏與夫一邑吏民所以聞命踴躍日夜矯首庶幾尫羸垂絶之邑一遇良醫而元氣為之頓囘也更望台慈曲賜垂念送下僉幕條陳所以賑䘏縣道之筞而施行之不勝千萬之幸再辭知潮州丐祠榦不避斧鉞之誅輒具稟劄仰干鈞聽榦昨嘗控陳哀悃祈免潮陽之命不謂措辭未白誠意未孚以致有㫖趣行未賜俞允榦不勝戰懼囘皇之至伏念榦庸陋凡才摧頽暮景投老山谷誰復顧憐獨䝉朝廷軫念若此畀之便地寵以見次種種優異雖以老病投辭尚䝉寛貰令其一行感戴恩德何有窮巳愚夫小人受一金之賜尚知感激以圖報塞榦雖無知其于君父大誼朝廷特恩豈敢寧居尚煩督促實以疾病加劇見之申牘無一飾詞若不哀鳴反成欺罔况顧妻孥憂貧賤苟具此身誰無此志乃欲甘心屏伏自取飢寒亦豈人情所恨賦命奇蹇老而益困朽株枯枿不足以仰承雨露生成之恩中夜以思但知感泣恭惟某官蓍龜之識江海之量俯垂鑒照特賜矜憫曲為敷奏追還成命使得偃仰一室安養賤軀繼今一日之生全莫匪二天之庇覆鏤膺刻骨頂踵知歸若䝉憫其貧病再與陶鑄宫廟差遣一次使得仰竊升㪷以活餘齡實戴隆天厚地之施榦勉扶病軀申布忱悃且痛且忍言不成文雖欲吐露有失倫次方命之譴復此驚憂尚兾鈞慈俯賜矜察榦下情無任戰懼之至勉齋集巻二十八
