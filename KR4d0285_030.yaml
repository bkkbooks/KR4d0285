body:
  text: 勉齋集卷三十宋黃幹撰公狀漢陽申朝省為旱荒乞更詳審築城事照對本軍昨來申請創築城壁事實以身為守臣地居江北環顧鄰郡皆有城壁獨漢陽頗為衝要乃蕩無藩籬之限是以輒敢陳述利害冒昧上聞繼而諸司皆贊其決總領綦郎中復捐十萬緡以助其費遂蒙朝廷行下令先以上項錢取買物料别議興築幹竊見向來陳乞係壕寨計料用錢九十餘萬貫今所得總領所錢近九分之一除巳一面燒造城磚外但竹木等物未敢收買蓋區區愚見以為朝廷若有意興築即乞明降指揮接續給降元計料錢物行下鄂州都統司趂此秋冬差撥大軍目下興築庶幾所管物料不至徒為虛費竊恐朝廷方經理極邊未暇及此內地加以亢旱調度百出未有錢物可以應付則所買竹木堆積日久必至腐爛徒壞錢物無補事功亦乞明降指揮庶幾官吏得以遵守更合申取指揮申帥漕兩司為旱荒乞别相度築城事本軍昨以興築城壁事申朝省又蒙總領使所備申朝廷撥官會十萬貫助本軍興築遂蒙省劄行下支撥上件官會并本軍見管交割錢四萬貫一面收買物料竊見向來本軍係借到鄂州都統司壕寨駱炳相度計料以為可以興築本軍方敢具申今蒙總領使所差到壕寨官陳師賢前來計料郤以為不可興築本軍不敢自專兼向後興役必資大軍而寨官異同如此異日興工亦有妨礙本軍自春間計料陳請之後忽值大旱種不入土野無青草米價踴貴細民嗷嗷目今如此向後事體尤有可慮蓋本軍人户不事耕農專恃魚利今湖地亦巳乾涸則魚利亦無可望人户既無蓋藏而客旅興販不敢越界數月之後必有流離轉死之患一郡官吏朝夕奔走且以救荒為急所有築城之役既是議論不同而興役之後便用米糧今尚無米可救飢民安得有餘以興大役欲乞備申朝廷且候秋成日别行相度庶得一意講求荒政以無負朝廷愛恤百姓之意申轉運司乞候嵗豐别議築城事照對本軍凖使司帖備凖樞密院劄子行下本軍興築城壁事本軍向來建此議正當粒米狼戾人物熙熙因念此郡全無藩籬之限可以乘此樂嵗創築城壁以衛居民巳而不雨種不入土細民嗷嗷復念朝廷當此數千里之旱何暇慮此偏郡興此大役若有錢有米尚可自勉既無錢米何以使人遂以錢物申審今來省劄行下只言差撥大軍興築亦不明言於何處支撥錢米目今百姓日食草根州郡尚無米可以賑之安得有米可以築城若旋行收糴向來米價每碩二千目今巳是七八千方糴一碩且以五萬碩米言之則倍費二三十萬緡况又一兩月來並無粒米可以收糴本軍廂禁軍額不及五百人總領使所轉運使衙占破一半只有二百三四十人分散諸廳若是築城此輩只得差使幹事民兵百姓亦須是有錢有米方可雇募以本軍慮謂今日事勢環視四境無非飢莩如人大病氣息奄奄只宜安靜撫養度此災厄若復率意搖撼人情不安使之重困恐非父母斯民之意兼湖外早寒日晷向短若以役人力倍功半米價既增事功復減皆為未便更乞台慈詳酌備申朝廷如必欲興役合乞朝廷撥到錢米如以救荒為急即乞且俟嵗豐别議興築未敢專擅申朝省乞候救荒結局别行措置築城事照對本軍昨以創築城壁事申朝廷特以身為守臣地居江北環顧諸郡皆有城壁漢陽衝要自合創築遂據壕寨計料合費九十餘萬貫湖北會子申取指揮未蒙朝廷施行尋凖省劄以總領所申捐十萬貫會子助役令本軍先計料收買磚石竹木本軍照得十萬貫會子只辦竹木尚且不給其他支費尚有數倍若辦竹木之後其勢又須别行控陳向來申請之時粒米狼戾細民樂業可以興事三月以後亢陽為虐種不入土漢陽為郡民無蓋藏全藉德安復州米榖供贍今制司以極邊為念不令出界近者尚恐有巳泄在本軍界內者至遣邏卒數十人前來搜捕客旅驚駭人心皇皇豈復更有粒米前來本軍訪聞鄉民有掘鳬茨采菱芡以充飢者夏秋之交事勢如此霜露既降細民寒凍無所求趂官司又無力可以接濟則枕藉而死理所必至職在牧養能無寒心官吏日夜聚首談論奔走無非為民無非為米幹職在守土亦只得衝冒酷暑往來鄉落若於此時傲然不顧且以措置城壁為事則救荒之政必至鹵莽若一面救荒城築之役委之司存則支費不實工役不堅亦徒文具加以方數千里之旱朝廷支遣計亦調度百出安得餘力應付築城異日有請不下則所買竹木悉為無用風日蒸薄必至朽腐夫為臣子者上則為國下則為民若知其可為而不言與知其未可為而不止不務誠實徒避嫌疑則負國負民罪當萬死所有築城工料欲乞候救荒結局日别行申請措置所有幹自請自罷之罪乞朝廷重賜貶黜施行申轉運司乞止約客莊搬載租課米事照對漢陽軍每嵗苗米不過二千石若以什一之法論之所産米止有二萬石兩縣百姓若有二萬家每家五口共有十萬口以所産之米贍所居之民每口一嵗只得二斗米食用本軍全藉德安府復州米通融接濟今上流米既不通則全藉田土所産耳若富家大室在此居者則當以所餘之米贍此邦之民若在外界居輒纍數百斛搬出外界則是坐視百姓之餓死也朝廷通融之意蓋以為有餘州郡而補不足非謂括不足州郡而使之赤立也昨據趙知監家載到米本欲勒令盡數糶與鄉民尋據其幹人哀鳴遂免其稅錢量糴一半巳與之載過一半尚深慮後來者之援例也今更輒敢經使司陳詞顯是無厭謹具因依申轉運使司欲乞台判今後遇有陳詞欲取租課榖者乞勒令移徙就田産居止庶幾細民感戴更生之賜申轉運司為追逮漢川縣吏及市民事準使帖委本軍追漢川縣吏杜誠及市民馮作舟本軍固當奉行然竊詳田瑞應狀詞並不載月日既是巳經兩月何故全無詞訴方六月間兩司互爭未決官吏莫知適從固難以責其不稟命旱既太甚細民乏食亦難以責其不糴米數十里之間物價高低巳自不同漢川取産米郡縣最近亦難以責其不減價健訟之人凡欲興訴多是裝飾虛詞亦難以便行盡信漢川一縣久闕正官敗壞特甚一縣之大止有知縣一人更無同官可以相助王知縣到任未及半考百廢具舉究心荒政日夜焦勞且理斷公事並無一字翻訴到軍後生從官能如此盡心辦事本軍只得一意扶持蓋不特為王知縣計乃為一縣百姓計也某官既知其賢而薦之矣一妄庸人陳一紙無根之詞便欲追其人吏追其市民使之意氣消沮安能展布漢陽漢川縣百姓亦某官之百姓當此飢饉莫先安靜若行追擾必至狼狽本軍既承上司指揮亦只得行下追逮但有此曲折不敢自默申轉運司為客船匿稅及米價不同事照對本軍客旅舟船自漢江來者必經由郭師口關發赴軍投稅郭師口去軍城二十里例是一日或兩日即到務如四五日不到即係沿路搬寄私下交易隱瞞稅錢例是照瞞稅例斷治抽分監賞每月務官將關發厯根刷六月內務官根刷有唐太羅太船經隔二十餘日不曽到務遂遣人根追乃變易姓名藏伏港汊將河巡等人斷治方始捉到遂將兩名送獄屬以旱乾始從釋放仍監兩名所載糯米出糶照本軍酌中價例還錢可謂寬恕之甚今乃輒經使臺陳詞顯是頑猾湖北糯米與飯米同價去年糶兩貫一石今春糶兩貫二百文一石巳而大旱遂增三百又增二百遂增至三貫一石客旅以一貫四百文搬販糯米經涉二三百里而獲倍稱之息亦何所不可若必悉厭其欲則雖百千未止也本軍酒務舊是務官自糴米自造酒去冬以來本軍為之收糴糯米務中納錢出米造酒本軍以三貫文糴米只糶與務中兩貫七百文並有文厯可照蓋寧少取息錢不使酒味淡薄此豈龍斷者之所為今羅太又以兩臺米價比較高下物之不齊或相什伯豈能比而同之兩臺米價所以貴者其説有三交量則有斛面或三升或五升一也交米給錢則稽留日久二也倉中交米庫中支錢則有乞覔除尅三也客人得價雖多而費用頗廣亦無怪其價之貴也本軍只似小小人家交米則客人自量既無斛面之費左手交米右手交錢又無稽留之患支給錢物並是客人當廳請領又無除尅之擾此米價所以頗減於兩臺也豈是有龍斷之心哉且以客具三色米價言之以總所漕臺棟宇相接而米色巳自不同總所價錢巳減使司一貫豈是有龍斷之意况又一江之隔則事體自應不同况本軍收糴糯米客人一樣價例何獨於羅太而有不平蓋緣羅太既不平本軍嘗將羅太收禁而又適遇羅太糶米之時總所忽遣人吏前來本軍置局收糴糯米增多價錢客人遂欲援是以為比有一郡則有一郡之體例亦豈得而同之如黃州飯米糶二十貫官會鄂州只糶五貫五百文物之不齊乃如此以此見得本軍不是龍斷亦與知録全無干涉竊恐使司不知上項因依須至申聞申京湖制置司辨漢陽軍糴米事照會今月初七日準使司劄子據潘制屬申續抄劄到客船米麥榖豆等共三千四百五十七石並巳具申本軍差人坐押前去軍城岸下梢泊內又糴過修城米一千三百九十二石實有現在二千六十五石申乞照會奉某官台判質諸事理糶濟為先三千四百五十七石並令鄂州差人取押糶賣如漢陽於數內巳有收糴之數亦仰發與鄂州收糴濟糶不必吝占劄付本軍遵從施行并於當日又準使司劄子訪聞漢陽巳糴米四萬石如有到漢口客船米即盡數發過鄂州收糴濟糶仍嚴戒所差官吏不許受情脫放先具遵稟狀申須至申聞右照對制置使司備潘制屬申本軍糴到修城米兩項三千九十餘石令本軍於後項所糴一千三百九十二石并客米二千六十五石發過鄂州又以本軍巳糴米四萬石今後盡將客船米發過鄂州中糶者照得本軍元申乞修城米不蒙朝廷施行巳嘗申乞住罷即不曽收糴修城糧米不知潘制屬所申憑何文書有何倉厫專一收貯修城使用本軍城內外户口不下三千家又有船居四百隻每日盡是糴食之人豈有客船到岸本軍收糴樁備修城百姓於何處收糴食用兩項客船本軍只是逐旋收糴賑糶人户即不曽有樁積修城之米其餘並是船户人户逐日收糴食用目今何緣更有存在所準發米過鄂州指揮委是無米可發又照得本軍於二三月間欲旱之際嘗出郡帑糴到六千石巳而不雨種不入土細民嗷嗷本軍又逐急節次收糴得米一萬四千石然所糴之米盡是長江上流諸處客米其糴於漢口者無幾也以六千石準備十箇月軍糧以一萬四千石準備賑糶人户本軍城下并漢口共三千家除能自食者約千家尚有二千家皆是貧乏糴食之人米鋪户乘此貴糶日增米價以困貧民本軍遂將前項收糴之米給厯與貧乏之家使就設廳收糴食用今且以每家五口約之家食五升是二千家每日合食一百碩本軍只得量行賑糶約度此米只可糶至來年二月巳無以繼其後本軍兩縣鄉村共二萬户且以一家五口計之共十萬口目今並無一粒之米可以準備糶濟數日以來巳聞有掘草根而食挈妻子以博米麥者矣每一念之但有對僚屬涕泣而巳朝廷如天監司如神列郡小吏哀鳴無地尚有前政兩知軍申朝廷樁積米二萬石非本軍所敢專輒正欲申朝廷乞發此米以給鄉下之細民便使真得此米二縣二萬家亦不過家得一石其能使之不餓死乎今欲本軍自此不糴客米則是坐視百姓之餓死也本軍官吏軍民日夜仰望諸司哀憐小郡痛賜賑恤今乃反欲移本軍之粟而禁本軍之糴不知置一郡軍民於何地耶制置大卿威如雷霆明如蓍龜不知何人乃敢欺誑如此加以本軍斗大之郡交割到公使庫軍資庫錢物共有十萬貫鐵鏹準湖會六萬貫目今米價四貫以上官會可糴一石則四萬石之米何處得錢可以收糴此理甚明而可以肆欺於制置大卿之前耶今鄂州人口繁夥為漢陽三十餘倍便使盡竭漢陽之米盡餓死漢陽之民以資鄂州亦不過得鄂州十日之食漢陽百姓固餓死而鄂州之民亦不免於餓死矣幹愚不肖奉朝廷之命專守此土當此飢旱亦只得竭力日夜救此垂死之百姓今以鄂州無米而必欲困漢陽則是左臂既病而又欲移之右臂今有米無米皆不敢辨雖家置一喙亦無以自解欲乞使司就委潘承信并帖鄂州差官一員前來本軍盤量除六千石支軍糧一萬四千石賑糶在城百姓及朝廷樁積前政所糴二萬石欲給兩縣外有一斗一升以上并請鄂州徑自差人搬去支用本軍不惟不敢占吝亦且不敢請領價錢又欲後來米船到岸本軍不得收糴不知兩縣百姓便得肯發樁積之米家得一石果能救其餓死乎自今以後流離飢􅥌非郡守之責而何幹一介孤寒違上司之命固當罷坐視百姓之餓死亦當罷等罷耳寧為百姓而罷也幹自知衰老無用未嘗有仕進之念朝廷拔擢畀以郡符於六月間巳嘗遣人哀懇朝廷乞歸田里不蒙俞允近以興國趙知軍除本路提舉幹與之為妻黨至親亦巳陳乞回避所有劄本軍以所糴之米發過鄂州及不許收糴乞候幹罷命之至然後施行庶幾使幹不見百姓之餓死不負朝廷差委牧養小民之責則幹亦得以老死山林而無憾矣更兾台慈痛賜矜察施行申制司再乞給米照對本軍昨以旱歉就使司乞米二千石伏準劄下羣言交至皆以為漢陽糴米最多本司從而又稽考之皆是真實其間又有説不欲施行恐成紛紛多事能使斯民被其澤足矣本軍照得今嵗旱歉異於常年本軍被旱甚於他郡小官既不敢申聞朝廷日望本路諸司行下賑恤忽覩使司撥米四萬石應付鄂州并總領所遂敢援例陳乞今乃蒙行下以本軍糴米最多又云其間有説不欲施行本軍只糴得米二萬石今賑糶巳支過七千石只是及得在城人户其他鄉村並未有以及之本軍在庫錢共不過十萬貫鐵錢準六萬貫湖北會子盡竭以糴米只糴得上項之數一郡之大有米二萬石豈為最多至於其間又有説者則非小郡之所能曉是非曲直亦欲分明今以為不欲施行則小郡不敢受此曖昧之謗百姓飢餓亟發米以賑之既有以見大使之仁小官有過聲其罪而逐之又有以見大使之義既發二千石之粟以賑飢民又劾去庸繆之吏不使害民不勝千里百姓之幸申制置司為賑米價太高事本軍準使司劄子分撥諸州賑糶米係撥江陵府樁管朝廷米斛合拘收價錢將來糴米補還今請契勘本軍在市米價限五日具狀指定保明供申須至申聞右昨準使劄令差人搬米五千石賑糶二千石賑濟本軍巳差人前去仍具申乞只撥糶米一千石濟米一千石并乞定下糶米價錢仍就和雇船隻因依今準使劄行稱朝廷指揮應糶官米每升只可減五七文至十文止本軍照得朝廷指揮蓋為市價不甚貴官價郤太賤故本此體例今本軍每嵗米價每升只是十七八文湖會今客人高擡米價增至四五倍若只減五七文則百姓無錢可糴必至餓死本軍自去嵗六月糴客米只是四十文一升只作四十文湖會出糶有孫知軍樁積米經隔三年巳是陳腐故又減作三十五文湖會然比之市價雖減一半比之每年價例巳增一倍如此尚有飢窮無錢可糴之人今若又欲於此價之上再行增錢則百姓無錢可糴餓死無疑小民之窮至此極豐年樂嵗尚有飢餓無告之民父子竭作然後可以易一飽凶荒之年雖有伎藝亦無所售今若使之貴價糴米則其錢何所從出只有餓死而巳百姓既無錢可糴所載到使司之米無處出糶州郡安得有錢可以賠還今差人搬米雇船雇腳巳是州郡賠錢况又積下米斛無處出糶州郡常賦有限飢荒之年酒稅虧折若州郡又添此一項督迫必至狼狽本軍去嵗糴到米并樁積米亦可賑糶至今年四五月接得二麥成熟若使司米價錢減則亦可寬糶百姓若又價高則不惟無益而反有害所有賑糶米五千石本軍不敢承受如使司以仁恤為念乞發米下濟賙給百姓庶幾感戴生成之賜漢陽丐祠申省幹資稟凡庸學術迂僻分甘農圃望絶縉紳中年偶叨一命家貧纍重仰祿苟全其於居官本無可紀誤蒙朝廷拔擢改秩甫期寵以朝迹俾二邊郡為任匪輕方思勉竭恥事誕謾忌嫉既深機穽隨至曲勞造化易佐太藩甫及半年忽膺郡紱試邑一年而得倅為倅一年而試郡破去舊例洊被隆恩粉骨碎肌未知稱塞竊緣幹筮仕以來不避艱險用心過勞遂得痼疾兩叨劇邑黽勉四期舊疾增加形神癯瘁年事浸晚齒髮衰頽加以禍患侵凌去嵗冬夏連嬰兒女之戚衰年傷感幾不聊生兩目昏花不能久眠是皆用過其分難以支持倘不及今投誠君父必致顛擠自惟官卑人微不當冒有陳情實緣到任巳踰半年絶無毫絲補報苟玩愒嵗月為罪愈深欲乞鈞慈特賜敷奏陶鑄祠祿差遣庶得養疾歸山以終餘年實戴大造生成之賜候指揮六月十七日三省同奉聖旨不允申朝省為巳乞祠祿申審築城事伏準省劄備湖廣總領所申興築漢陽軍城壁事本軍以總領所貼助錢十萬貫及本軍交割錢四萬貫先次計辦合用物料照得本軍昨來參酌衆論以為要害之地不可無城亦嘗申聞朝廷續聞朝廷方興築沿邊城壁費用浩瀚漢陽係是近裏州郡未暇及此亦理勢當然巳不復作此念尋以幹行年六十有四素有竒疾往來不常齒髮巳衰加以氣喘去年以來自夏涉冬連嬰兒女之戚感傷憂悴殊不聊生入夏以來病疾增加難以支持兼到任巳及半年殊無分毫補報遂以數日前專人具公劄控告朝廷乞賜敷奏陶鑄宫觀差遣庶得歸老故山以終餘年諒惟鈞慈必賜矜允今來所準係是朝廷指揮及漢陽軍合行事件在幹未被命去官之前一日必葺之義自不容有所推辭除巳遵稟外尚有合行陳乞事件小郡不敢專擅當節次申總領所及轉運司乞行備申但幹之私懇見於專人所賫公劄布露迫切尚兾鈞慈曲賜憐念早差忠實不欺精敏曉事之人前來抵替庶幾不致誤事申總領所為巳乞祠祿申審築城事準使帖備準省劄行下撥支官會付本軍計辦物料措置築城事本軍昨參酌衆議以為要害州郡不可無城遂具利害申朝廷及諸司自半月前所遣人回蒙參政樞密賜翰以為朝廷方興築沿邊城壁漢陽係近裏州郡未暇及此幹以行年六十有四素有奇疾往來不常齒髮巳衰加以氣喘去年以來疾病增加自度難以支持兼到任已及半年殊無分毫報補遂專人控告朝廷乞歸田里庶得養疾故山以終餘年竊計朝廷必蒙矜允今來所準係是朝廷指揮及漢陽軍合行事件在幹未被命去官之前一日必葺之義自不容有所推辭除巳委官前來請領外但幹竊見築城大役必須計料合用錢糧大數申乞朝廷給降俟有定論則一面收買物料一面用工興築庶幾有如古人所謂三旬而成不愆于素者若但苟簡務求省節才經雨水即見摧壞何以禦敵若先應命旋行陳乞數目不足異日無以支遣必致狼狽欲乞使司及轉運司委請官屬前來再行計料合用錢物申明朝廷及早賜施行以憑遵守兼幹巳係陳乞祠祿之人併乞備申朝廷選差精強有心力人前來抵替庶幾不致誤事丐祠第二狀幹一介凡庸無足比數誤蒙拔擢畀以郡符深願勉竭駑鈍以圖報塞實緣齒髮衰暮禍患侵凌疾病增加精力凋耗近嘗控瀝卑懇以祈間退誠意未孚未蒙俞允聞命以來懼深感極不敢遽有塵瀆本欲少遲書考再行陳乞近讀邸報興國趙知軍改除湖北提舉竊緣幹係娶朱侍講之女趙提舉娶朱侍講之孫女幹之長子又娶趙提舉之妻妹於趙提舉為僚壻其姻黨可謂最親早同師門情誼尤厚監司所以按察州郡職事之際委有妨嫌在幹若不申明切恐有犯物議兼幹到任巳歷三年仰藉恩庇幸無敗闕目今雖巳旱歉幹於方旱之初亟出郡帑收糴到米二萬石以備賑糶前兩政亦有樁積米二萬石漢陽户口不多後任郡守但出此米賑糶稍加之意亦不至有飢餓流離之患幹委非别有規避欲乞特賜敷奏陶鑄祠祿差遣庶幾少安愚分以終餘年實荷大造生成之賜候指揮九月二十一日三省同奉聖旨不允申請司乞備申病篤解罷照對忽於十月初三日感冒風寒不省人事兩臂不舉難以復行在任管幹職事除巳將職事交割與以次官僉判劉宣教欲乞備申朝省特賜解罷十一月十四日奉聖旨黃幹依所乞與宫觀乞離任申省照對幹昨因感冒病勢危篤竊念一郡民社之寄事體非輕加以旱歉舉行荒政尤非衰病之人所能任責遂亟申諸司乞備申朝廷改畀祠祿亦巳將職事牒以次官暫時權攝緣本軍僉判不肯交割職事只得扶病勉強供職近於前月二十八日伏覩邸報乃知朝廷矜念特從所乞幹即便將救荒等事分委同官及救荒錢米悉巳區處可至來嵗五月不敢有誤百姓亦不敢侵用交割錢米倉庫見管比原交割數目有增無欠緣守土之臣不敢徑自拋離經今二十餘日尚未被受省劄久廢郡事實不遑安欲乞鈞慈檢照巳降指揮劄下以次官交割容幹一面起離歸鄉尋訪醫藥實感大造生成之賜乞起離第二狀照對幹昨因感冒病勢危篤深恐有妨郡事遂申制司乞備申朝省於某月二十一日準省劄奉聖旨依所乞與宫觀即於當日將軍事牌印交割與以次官僉判劉宣教尋據劉宣教回報稱本職即不曽被受交割郡事指揮又幹所受省劄亦無交割與以次官明文再三不肯接受欲乞鈞慈檢照巳降指揮速賜劄下以次官僉判劉宣教交割本軍郡事施行申朝省罷築城事近準省劄差撥大軍創築城壁巳具遵票但所役軍民必須支給錢米本軍小壘並無儲蓄向來只交割到鐵錢數萬貫雖有總領所築城錢十萬貫此役一動只得支撥收買物料本軍每嵗苗米但有二千石餘官兵請給郤管七八千碩盡是逐旋收糴目今米價比之春間巳增至五六倍亦無告糴之處一年之中得雨不過十數日種不入土野無青草今又蝗蟲滿野黑蟲復生田野秋種為之一空鄉村小民皆掘草根而食嗣嵗之計誠未可保目今飢民嗷嗷悉發郡廩不足賑貸所有興築城壁須藉朝廷支撥錢米方敢興役昨來申乞給降緡錢九十萬貫乃是春間粒米狼戾之時可以收糴目今若欲興役非朝廷支撥米四五萬碩并接續支給錢物則委是難以措手欲望鈞慈特賜詳酌施行勉齋集卷三十
