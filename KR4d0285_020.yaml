body:
  text: 勉齋集巻二十宋黄榦撰記二漢陽軍學五先生祠堂記嘉定八年冬十有一月漢陽軍學五先生祠堂成郡假守長樂黄榦帥其屬與在學之士諏日而舍奠焉郡文學金華潘衍與其諸生合詞而請記竊惟成均之法合國子弟擇有道徳者使教焉殁則祭於瞽宗謂之先聖先師國無人則取諸其鄰與其鄉鄰而嘗遊宦於其國有善可紀者亦祀之若孔子孟子及其門人則又不必其鄉鄰遊宦而祀典所秩通於天下此學校之所同未有能易焉者也漢陽為郡訪之於學常祀之外乃咸無焉其江山之勝習俗之媺禹功文化載於詩書士生其間卓然自立者固不乏人豈懷道抱徳深藏不市尸而祝之不可得耶二程子以道學繼孔孟不傳之緒生於黄陂為漢陽鄰壌其門人游氏嘗守是邦程子稱其徳器睟然學問日進則取諸其鄰與嘗所遊宦者不可以莫之舉也即師生以原學之所自傳則濓溪周先生實倡其始又即周程之學以究其所以光明盛大則新安朱先生實成其終此五先生之祠所以立而學之文物始備矣夫道統之傳自堯舜禹湯文武周公躬是道以化天下周之衰斯道不行孔子孟子及其門人相與推明之秦漢以來且千有餘嵗洙泗之遺緒已墜而復振非五先生之力歟則五先生者自當與孔孟之徒通祀於學校况又其遺跡之可考則合而祀之使此邦之士知道統之有傳聖賢之可慕顧不偉歟當斯文晦蝕遺編殘脱之餘天運有開名儒繼出以髙明之資强毅之志剖析毫釐張皇幽𦕈著之圖書炳如日月後學者葢不待窮探力索可以目撃而道存焉然士風之壞久矣遊於學校者非科目不習也此豈士之罪哉漢陽之士入其門升其堂孔孟之徒森乎其前五先生之祠列乎其後尊其人讀其書明其道心之所存身之所履必有以超然自得者則夫有道有德下以教國之子弟上以紹諸儒正統之傳豈其無人歟豈其無人歟遂為之記以授其學者俾勒石於度以俟明年正月元日謹記鄂州州學四賢堂記隂陽分而五行具人物生而萬事出太極之妙為之根柢而周流其間充塞宇宙貫徹古今不可須臾離也形交氣感而禀受不齊欲動情勝而好惡無節心以形役志以氣移理以慾昏性以情鑿鄉之不可離者梏亡茅塞莫之存矣圖書出而天文始兆聖賢生而人物始開二儀肇分仁義著矣五氣順布五事備矣禮以天秩典以天叙而教行焉因至顯之象驗至微之理即人事之當然察天命之本然加之以操存持養則動容周旋無適而不由於斯道之中矣聖賢之功與天無間凡有血氣莫不尊親心之秉彛不容己也周德旣衰邪説並作言道者祖虛無論治者尚功利談經者溺訓詰工文者騁詞華千有餘年天理湮晦雖閎博俊偉之才未有能窮其指歸者也聖宋龍興德配天地尊道以儒出治以仁經術文章一根於理鴻儒碩士彬彬輩出上儗三代下軼漢唐何其盛哉漸摩積累斯道之久蝕者復明焉濓溪周先生不由師傳洞見道體推無極太極以明隂陽五行之本人物化生萬事紛擾則定之以中正仁義而人極立焉葢與河圖洛書相為表裏周子以授伊洛二程子程子所言道德性命皆自此出而微詞奥義學者未之達也新安朱先生禀資髙明厲志剛毅深潜黙識篤信力行體用一源顯微無間之㫖超然獨悟而又條畫演譯以示後學周程之道至是而始著矣窮理盡性以至命存心養性以事天非四先生孰發之道之不明以學者無所見而異端禍之也四先生之道本諸人心之所固有天理之不可易則邪説不得肆而皆趨於至正之途止於至善之地矣天下學者尊信崇尚以為孔孟之徒復生斯世祠之學宫以起學者敬慕之心是則師儒之職會稽石君繼喻之意也石君為鄂州教授而榦適分符於沔石君之先太常寺簿師朱先生為門人高弟以榦為同門後進也嘉定八年春二月四先生祠堂成遣其學正張頤孫來請記四先生之書家傳而人誦之矣述其闗於道體之大要以見四先生之道光明盛大其本原固有自也夫以天命之在人甚明前賢之教人甚至聖朝之重道甚隆師儒之衞道甚切則遊於學校而拜於祠下者亦思所以自勉哉後學黄榦謹記南康軍新修白鹿書院記廬山之陽傑然而以峯名者五老五老之麓窈然而以洞名者白鹿唐太子賔客李公渤之所隠居而南唐廣之以為養士之地聖宋肇興文教敷暢開寳中有以高第知廬山學士而洞學始盛太平興國有賜書之寵大中祥符有加繕之命慶歴詔郡縣皆立學而舊有學者率仍其舊聖祖神宗所以崇儒風惠士子者至矣蕩為丘墟莾為荆榛者豈立學之後士趨簡便不復為林泉之適耶淳熈八年詔以文公朱先生起家為郡始得遺址規復之嵗適大祲役從其簡已而請額與書以重其事則其簡也固有待也繼為郡侯為博士者累累増治然量力之宜踵堂之舊未有能侈而大之者也嘉定十年先生之子在以大理正來踐世職思所以揚休命成先志鳩工度材缺者增之為前賢之祠寓賔之館閣東之齋趨洞之路狹者廣之為禮殿為直舍為門為墉已具而弊者新之雖庖湢之屬不苟也又以先生嘗著跪坐之制聞於朝請釐正之其規模閎壯皆它郡學所不及於康廬絶特之觀甚稱於諸生講肄之所甚宜宣聖朝崇尚之風成前人教育之美皆可無憾矣周衰道晦且千餘載周程夫子始得孔孟不傳之緒未及百年大義乖矣先生洞究其道而推其所未發其為郡也固嘗與諸生熟講之規誨之語約而盡矣今侯亦招致嘗從學先生而通其説者使長其事講授焉所望於諸生豈淺哉苟徒資口腹媒利禄而治心修身漫不加意則旣失崇尚教育之㫖覽觀山川之勝周旋堂宇之盛於心安乎侯之為政得於過庭詩禮之餘戢姦扶弱革弊興壞而尤以字民為先務南康地瘠民貧先生累乞蠲减租稅與凡無藝之征侯亦抳滲漏節浮冗代民之輸而蠲其負者至緡錢六萬餘尚能以其餘力屬意於儒官者如此是固不可不書榦頃從先生游及觀書院之始後三十有八年復觀書院之成旣悲往哲之不復見又喜賢侯之善繼其志命之記不得辭也是為記嘉定十年三月也李德進毋自欺齋記李君徳進自太學歸蜀祭酒袁公喜其篤實而嗜學也為書毋自欺以勉之李君將歸以名其齋踰江過灊山屬予為之記予聞學問之道知與行而已自昔聖人繼天立極不曰知而曰精不曰行而曰一知不精行不一猶不知不行也聖賢相傳啟悟後學言知必曰知至言意必曰意誠至則事物之理無不通誠則念慮之發無不實曰至與誠其精一之謂歟知與行者學之塗轍至與誠者學之歸宿有志於道者可不孳孳求止於是歟江出岷山東望滄海不知其幾千里也滔滔不息卒亦至焉誠故也觀於此則毋自欺之意可見矣予方懷信道不篤之懼而德進之請適有感於予遂不辭而述其所聞以諗之且以自警云德進名輶之隆山人嘉定丁丑五月丁酉長樂黄榦記陳師復仰止堂記仰止堂者丞相正獻陳公舊第之東偏晦菴文公朱先生嘗館焉文公樂其道而忘人之勢不遠千里而勤館人正獻公樂道而忘勢折節行館而與之友二公之在此堂道相與也堂之面其山曰壺公峻㧞端重若正人端士翔拱而進也文公之館于此正獻公之子皆摳衣焉太府寺丞宓長而益嗜學思文公而不得見登其堂望其山如見其人焉取高山仰止之義以名之旣與朋友講習於其中而屬榦為之記聖賢之生斯世盛德至善血氣之屬莫不尊親者豈自外至哉秉彛好徳良心之不自已也學者之於聖賢思其居處而起敬焉豈特聞風而悦之哉尊德樂道志於學者之不能已也寺丞之名此堂可謂良心之發而能志於學者矣抑因是而有感焉道原於天聖賢體天立道而示諸人若喬嶽焉可望而登也人皆仰之然無目者不見資禀累之也遂獸者不見物欲昏之也指一草木而謂之山見之偏且小者也有見矣趨而下焉捨喬而入幽也旣趨矣峻則止焉半塗而遂廢也此豈無人心而不知學哉心不充學不力也今之學者有不蹈此者乎吾懼斯道之日晦也誠能居敬以立其本窮理以致其知力行以踐其實體高山景行一仰一行相為先後之意循序而漸進自強而不息始見其彌高終見其卓爾羮墻輿立無非道也則於斯堂之義庶乎無愧矣豈有他哉充其好德之心厲其好學之志也寺丞立朝臨政能任道者也故推其所感者以勉之且示同志使有警也長樂黄榦記家本仲無欲齋記家本仲訪予於干山之下相與讀周子程子以及先師朱子之書探其端緒以求其本原至於周子無欲則靜之㫖本仲喟然嘆曰入德之要其在兹乎是可以名吾齋矣盍為我言其義予嘉本仲擇之精信之篤幸吾黨之有人斯文之未墜也為之言曰寂然不動心之體也事物未接思慮未萌湛然純一如水之止如衡之平則其本靜矣蔽交於前其中則遷而欲生焉欲熾而益蕩感物而動者旣失其節寂然不動者亦且紛紜膠擾而不能以頃刻寧動靜相因展轉迷亂天理日微人欲日肆矣故主靜者所以制乎動無欲者所以全乎靜此周子之意而亦有所自來也艮其背不獲其身行其庭不見其人主乎靜也旦晝之梏亡則夜氣不足以存無欲則靜也豈惟聖賢之教為然哉春夏陽之動也秋冬隂之靜也方其靜也一物不生萬籟不鳴木反於根氷凝於淵不若是無以噓衆陽而生萬物及其動也物各付物天何心哉天且無心欲何有焉不若是無以肅群隂而成嵗功矣天且不違而况於人乎夫健順五常性也精氣百骸形也君臣父子夫婦兄弟朋友之交道也徇耳目口腹之欲以厭足其蕞爾之形靜以賊本然之心動以害當然之道上以逆天地之化下以違聖賢之教於禽獸奚擇焉誠能反而思之天之所以予我者如是其尊且貴也先立乎其大者則小者莫能奪焉視世之功名富貴人之所大欲𦕈然若浮埃之在太空而况車馬衾裘飽食之間乎葢將與造物者相從於冲漠之境而非人世之所能覊縶也所謂襟懷灑落如光風霽月者其所存可知矣周子推明無極動靜之義以繼孔孟不傳之緒而斷之以無欲則靜之一言至其論聖學則曰無欲則靜虛動直論養心則曰無欲則誠立明通然則聖傳之樞要學者之塗轍果不出於斯言也哉本仲名演眉山人嘉定己卯正旦長樂黄榦記李兵部祠堂記兵部郎中知果州李君道傳字貫之旣殁之二年有祠之於南康軍廬山棲賢寺者貫之自蜀來仕東南以不及執經晦菴朱先生之門為恨凡從先生游者皆詘首願與之交凡先生之遺書與其師生問答皆手抄成誦晝夜不倦其天資敏悟固已黙而識之矣其有疑未釋者必反復問辨以求其正由是通達該貫而篤信力行見之行事者又皆卓然可敬東南之士歛衽推服使貫之及登先生之門當不在諸子之下先生殁而私淑諸人以有得者當以貫之為首與之處者久而益親及其殁也思之而不能忘貫之去國而􅋈舟於山之北日與朋友往來於巖壑泉石之間而於玉淵三峽之勝尤惓惓不忍去與之游者亦不忍貫之之遂至此也至今思貫之者猶是貫之之徜徉乎其間嗚呼此祠之所為立也道之不明自古病之貫之未得為晦菴先生徒也而其所自得孚於人者如是貫之未嘗有德於人而人親慕之以道故也則道豈難知而人亦豈可不志於道哉祠之立旣足以見尊賢樂善之誠而過其下者亦豈無聞風而興起者哉予懼其所以立祠者無以自白於世故為之言而非立祠之本意者皆不著嘉定己卯人日友人黄榦記袁州重建韓文公廟記自堯舜至於孟子二千年間聖賢迭興以道相授其章章較著者前後相望也臯陶伊尹萊朱太公望散宜生之倫亦皆得以與知道者之列顔曾子思則不待言而源流可考也自孟子葢千年而後有韓公獨以斯道之傳為己任以古凖今抑何盛衰顯晦之殊耶古者道德一風俗同歴世雖久所守者一説其見素明也周衰異端之禍起學者各以所見為守而道始晦故古之為道也易後之為道也難若韓公者尋墜緒於支離踳駁之餘而卓然有見焉則自比於聖賢以冀斯道之傳宜矣公固以道自任後之稱公者亦以道歸之約六經之㫖以起八代之衰排二氏之非以濟天下之溺諫宫市貶諫佛骨又貶流離困躓瀕死而不悔公如鎮州迓公者皆甲人為公危之公以理開諭皆俛首聽命非有道能若是乎然先儒頌公之言獨曰軻之死不得其傳非公有所見則所傳者何事且公之所見者何也天之所命之謂性公則曰所以為性者五曰仁義禮智信率性而行之之謂道公則曰由仁義而之焉之謂道修道以導民之謂教公則曰其法禮樂刑政其位君臣父子由是而充之則日用常行莫非天理而私意人欲邪説詭論無所容乎其間矣其詞確其㫖明此豈臆度料想所能及哉體於身驗於心㫁㫁乎不可易也以公之所見觀之則聖賢所傳其不以是歟荀楊氏去孟氏未遠也醇疵之不同其見者異也公稱孟子醇而斥荀楊之疵則公之見葢有得於孟氏而又以自况也公之書一則仁義二則仁義見之明也如此居仁由義聖賢事業不難進也而况言論氣節之一二乎故論公之迹不足以知公之深觀公之所見則公之以道自任者可知矣公嘗為袁守袁故有公廟後遷焉尋復其舊嵗久頺圮太守著作郎中鄭侯自誠始新之宗正少卿滕侯强恕續成之而屬榦記其事世之稱公者旣不足以知公之深甚者則指公為文人而又以文為道使聖賢之道不明而公之旁搜遠紹辛苦而僅有之者生不得究其施殁無以白於後非先儒發其藴公之志何自而伸耶推先儒之言以明公之藴其敢以陋為辭榦不敢以文尊公則公亦必不鄙其文之陋也廟之役始於嘉定戊寅十月其成以己卯三月董其役者司户高炎後三月望日長樂黄榦記曽氏樂斯菴記建陽縣之東北有山曰竹原草堂劉先生之隱居晦菴朱先生執經問道之所也章貢曽君堅伯愛其溪山之勝慨慕先賢之陳迹築菴於其旁曰樂哉斯丘也生以佚吾老殁以藏吾骨也予嘗與堅伯遊而深知其為人倜儻負竒氣不為齷齪軟美計顧毫末以自同於流俗其居官以才亷稱其於勢利泊如也考其源流則又文清公之從孫習聞其家法而恪守之故其敬賢樂善雖老不忘而於死生之變浩乎不以動其中也死生旦晝之常也古之人殀夀不貳而修身以俟之耳曷嘗置喜戚於其間哉鄙夫庸人生旣無益於世而徘徊顧戀猶冀其久存於世葢其識見旣陋而貪鄙之習沈痼而不能以自脱也觀於此則堅伯之名其菴而自以為樂是不謂之賢乎堅伯名松氣貌甚偉精力倍人猶可仕也自以朝請郎江西安撫司參議官請於朝致其事云嘉定辛巳二月朔長樂黄榦記台州州學四先生祠堂記代劉晦伯作嘉定五年春正月天台郡學始建四先生祠堂郡侯豫章黄㽦以其事來言曰故侍講文公朱先生聞道里閭為世師表台之士受業於其門者衆淳熈間浙東大飢詔起先生為常平使者部内頼以生活台之民䝉其德尤厚先生之學實得濓溪周先生伊洛二程先生之正傳故併祠之庶幾邦人有所嚮慕興起而斯道之不亡四先生力也願有記某竊惟黄侯因邦人感先生之賜而推原其學之所自出以風厲之其於化民成俗之意篤矣然四先生之學則某雖不敏嘗竊聞之惟皇上帝降衷於民本然之性純粹至善窮理以致其知反躬以踐其實則齊家治國平天下亦舉而措之耳三代而上立學教人孔孟迭興立言垂世非有他道也四先生之學亦起於千載之後繼孔孟不傳之統而已顧其去古旣遠淺陋之習䧟溺乎人心一聞正大之論則羣起而非之下之旣自賊其本然之善為政者又舉其善俗之道而棄之儒風治效浸不如古非此之故歟今黄侯之建是祠也旣有以尊顯其人又刋其所著之書日與學者講習之推明其道台之人將日捨其淺陋之習而趨於正大之見矣使凡為政者皆如黄侯之化其民而其民亦皆如台之人從黄侯之化則真儒輩出善治日興黄侯之惠豈特一郡而已哉某也官長成均適當聖化更新崇儒重道之日方將叙正祀典剡聞天朝以表示當世嘉黄侯之能開其端也遂為之記俾勒石於庭以俟勉齋集巻二十
