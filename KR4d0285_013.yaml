body:
  text: 勉齊集卷十三宋黃幹撰書復楊志仁書幹官守如昨春苦蝗夏苦旱奔走阡陌無寧日近方得雨稿苗復蘇人心亦與之俱蘇矣但旱處頗廣恐自此不得復寧也一考零八月矣亦本無他撓中間州家以財賦見怪亦頗不能平渠亦無他但不曉耳既憤然取上又忽然發下特為吏輩所玩弄耳倉臺昨亦見疑但此不與之辨近亦無他直道而行雖蠻貊可也何足道哉去嵗新淦常辱誨字之賜并見示仁說考索極精傳示朋友無不歎服但恨不得相與欵語各究所藴耳幹本但為貧循常調竊升斗耳豈敢為寸進計諸公推挽朝廷誤以為可用擢二淮州又不得展布而受命於庸人其勢必不合不合則當去朝廷遂易以他郡只得聽命然未能决去者試邑之後作倅亦非分外事耳但老矣故山之夢甚切來春當力懇廟堂求為歸計也先師云亡朋友寥落此道無與共講者不知契兄能一出否若能挑包行腳相與講明此道所不敢望之他人也通老兄竟為古人天資甚髙學識未甚通於朋友甚惓惓殊可念也都下作此託鄭夢錫附便亦未知何日可逹幹比嘗拜書託鄭夢錫轉逹便中承書貺感感彔彔如常無足道者本無仕宦之念直以為貧勢不容已改秩作令之後須欲求一便家去處為歸老計偶朝廷過聽以為可用一嵗間自淮西移金陵復自金陵移漢陽臣子之義亦豈不願趨事赴功但事有本末未易悉言世之妄以功名自許者皆欺君者也加以年事至此素志失酬勢須夏秋間即為丐休之計儻得投老山樊以卒所業莫大之幸也自先師在日朋友間已覺無可人意者今又朋友寂寥未有一人真能窺見涯涘如志仁天資徑特識見通敏竊有望焉乃不得相與講貫徒深怏怏幹去冬已拜豫祠之命以省劄不明言交與何人遂再申審三月初命下即行四月七日抵家自去嵗兩上丐祠之請不遂適以計臺撓政不欲與之競亦不欲為之屈遂引疾丐祠其事亦甚微然較之束帶見督郵則大矣但今之士大夫見得未分明故亦不能無疑耳爭米事勢不容已受人牛羊為之求牧與芻豈可為人掣肘而坐視百姓之餓死耶歸來意謂便得安坐讀書偶以故居太窄不足容孥纍遂再創數椽於其後便覺擾擾無異居官但終是自在不與世俗俯仰也昨承見教先天圖以字多未暇悉考今所示諭數條别紙請教幹以孥纍猥衆未能忘祿十餘年間奔走宦塗勞神苦形無頃刻暇然亦不過役心於簿書期㑹人生幾何自苦如是所謂講習之功一切束之髙閣矣諸賢以其不肯避事故凡事之至難人所望風畏憚必以見役食人之祿不容推辭以是愈覺疲憊今皤然一翁矣不能善刀而藏誰之咎歟義理無窮嵗月有限良可歎也承示仁說討論極精通天地亘古今只是一箇生意此心流行未嘗間斷於當官處見得尤分明自朝至暮無一息不是此心發見處也今之士大夫徇私忘公怠惰苟且皆不能擴而充之者也師亡友散講誦寂寥鄉間故人惟楊志仁潘謙之孜孜不怠更冀努力以昌吾道自來江西亦有三五朋友可與共學今嵗科舉又且各用工舉業矣齊卿亦相聚否亦曾講論否更有以切磨之為佳屬有帥檄攝倅南安乃濓溪舊治力不獲辭後月初即行到彼一兩月即告歸人行急布禀草草年事遲暮常懼即填溝壑不得合并相與講習以遂今生之願近引疾丐祠三上方得請自此相去不逺可以遂所志矣亡似之跡豈不願隨緣利物每念講學大事荒廢纍年區區薄宦真成為利令人悚懼然事之難言者十常八九又未易形之紙筆也且得退閒庶幾不負師門出處之大誼耳書中所言日光月魄見得極親切但别紙心性之論則似未通透昨少年日常將四箇字形容此身只是形氣神理理精於神神精於氣氣精於形形則一定氣能呼吸能冷暖神則有知覺能運用理則知覺運用上許多道理然有形則斯有氣有氣斯有神有神斯有理只是一物分出許多名字知此則心性情之類皆可見矣示及四條所論思索極苦近年朋友肯如此用心者絶不曾見敬服幹但亦各有可疑幸相與商確程謝尹所論敬處固兼動靜無淺深亦各就持敬處見得一箇意思各立為一說以形容之今謂謝尹之說只是發明主一之意恐未必有此意耳就三先生說處各自體認凑合將來見得敬字愈覺親切今只欲就主一兩字上欲該括謝尹之說卻恐看得謝尹之說未免疏略耳不知然否明德不言性而言心楊德淵惠書亦録云所答之語此但當答以心之明便是性之明初非有二物則直截簡徑使之自此思索卻見得分曉今觀所答是未免以心性為兩物也如回也其心三月不違仁則心自是心仁自是仁如孟子言仁人心也則仁又便是心大學所解明德則心便是性性便是心也所答之病既誤以心性為兩物而又欲安排併合故其說頗覺費力心之能為性情之主宰者以其虛靈知覺也此心之理炯然不昧亦以其虛靈知覺也自當隨其所指各自體認其淺深各自不同心能主宰則如謝氏常惺惺之謂此只是能持敬則便能如此若此心之理炯然不昧如大學所謂明德須是物格知至方能如此正不須安排併合也不知然否洪範五行五事之說近亦嘗思之前輩所說决然不是以庶徴觀之自可見但貌言視聽思之所以配水火木金土則恐來說未免穿鑿耳幹亦嘗反覆思之只以造化及人生之初驗之便自然合天一生水水便有形人生精血凑成合體亦若造化之有水也地二生火火便有氣人有此體便能為聲聲者氣之所為亦若造化之有火也水隂而火陽貌亦屬隂而言亦屬陽也水火雖有形質然乃造化之初故水但能潤火但能炎其形質終是輕清至若天三生木地四生金則形質已全具矣亦如人身耳目既具則人之形成矣木陽而金隂亦猶視陽而聽隂也只以此配之則人身便是一箇造化理自分明似此等處恐只得如此寬看不知然否耳目口鼻之配五行四象亦自分明來諭亦似支離耳屬腎腎即水水即太隂目屬肝肝即木木即少陽口屬脾脾屬土土王於夏秋之間即太隂少陽之合鼻屬肺肺屬金金即少隂亦是自然之理如此初無可疑也不知然否所論大槩得之但所引志動氣氣動志合而言之道也等語皆不可曉此猶文義少疵爾至於道生一一生二二生三三生萬物則老氏之所謂道而非吾儒之所謂道也明道云天下之物無獨必有對若只生一則是獨也一隂一陽之謂道道何嘗在一之先而又何嘗有一而後有道哉易有太極易即隂陽也太極何嘗在隂陽之先是生兩儀何嘗生一而後生二嘗竊謂太極不可名狀因隂陽而後見一動一靜一晝一夜以至於一生一死一呼一吸無往而非二也因隂陽之二而反以求之太極所以為隂陽者亦不出於二也如是則二者道之體也非其本體之二何以使末流無往不二哉然二也各有本末各有終始故二分為四而五行立矣蓋一陽分而為木火一隂分而為金水木者火之始火者木之終金者水之始水者金之終物各有終始未有有始而無終有終而無始二各有終始則二分為四矣知二之無不四則知其所以為是四者亦道之本體非其四何以使物之無不四哉故二與四天下之物無不然則亦足以見道體之本然也太極不可名狀至此亦可以見其端倪矣體用一源顯微無間要當以是觀之塞天地貫古今無往不然仁義禮智特就人心而立名耳天以是心而成萬物人以是心而成萬事故曰天體物而不遺猶仁體事而無不在也人之生也五臟百骸各有自然之則天之為也君仁臣忠父慈子孝以至手容之恭足容之重又人所以全天之所賦者也自天之所為者而觀之則不待人為而此理已完具矣故曰鳶飛戾天魚躍于淵言其上下察也明道所謂活潑潑地者真見其如此亦真箇使人不知手舞足蹈也顔子之不改其樂又安得而不樂哉世間所謂功名富貴者真太虛浮雲一㸃也故曰朝聞道夕死可矣死生亦大矣苟見此理便死亦是閒事也數年讀先生之書適自見得如此以先生之書合之亦無不然不但世之學者尋行數墨而無見於此竊意周程邵子朱先生見得分明其他皆未知其果如何也為學而不見其本源是入門而不至其室雖然前輩教人且只道敬此又學者不可不思幹平生未嘗敢以此與朋友言之言之亦未必曉志仁力學苦思故詳布之知此則來教得失大略可知矣思之幹歸老山樊此心甚安甚愜而家事亦有費區處者福州先人敝廬以諸姪人多無可住處此間向來破屋三間亦苦人多難住欲盡挈歸福州則不忍忘數十年師生之情欲止留此則墳墓親舊亦不忍輕舍老妻長婦皆此間人只得留之在此以長子主之稍為葺治屋舍使可居止以三子皆娶福州人只得挈之歸福州幹自四月歸扺此所以遲遲未歸福州者以此間事緒未定矣十月初決歸福州自撫三子教而養之自此晚年得奉墳墓以終老矣幹以向者見理之不明固窮之不力冒昧出仕而無上下之交竭忠盡力橫議四起二月敵攻浮光令往黃州守禦已而敵勢頗熾又令往光州督戰既而厯陽徐守求去遂令兩易厯陽諸公之意實相忌而欲擠之既辭厯陽併辭安慶又辭奏事以此忤當路之意諸公不相樂遂交攻之亦知其勢必至此徑作歸計至臨川而罷命始下諸公以為得計而此實甘心不然則此身何日而可脫耶年事至此實不敢誤國誤百姓也還家二十餘日杜門謝客一意安靜喪祭一禮非契兄未易言此日夜念念千萬早來舊本併攜來為佳當得與二三同志共成此書也南康亦欲屈尊兄為白鹿堂長嵗晚了此二書來春可赴其招且得此理稍明則老死無憾也春間及今兩拜誨字感感但無便今乃獲治謝為愧耳教官無所鑒别去而不來極善此間朋友留戀碗飯有乞人所不屑者甚可鄙也幹上嗽下痞兩疾如故頗為所苦且是疲倦飲食不進終日倦睡氣象又不及去年矣論語讀得一過益見聖人之道髙明廣大老矣既不可追悔朋友間不能刻意求進執一得之智一偏之見便志滿意足大可歎也有司如主人服則非今僕𨽻輩明矣豈有僕𨽻而可服主人之服乎執冠者注家以為有司為期於廟門擯者請期亦謂之有司佐禮者蒞於廟門宗人告事畢亦謂之有司主禮者如此則宗人擯者皆可以用僕𨽻乎但恐古之府史亦是士流為之如漢卒史尚皆補官入仕則非若後世盡用下流也故注家以有司為府史之屬耳今用吾輩之後生者為之庶可服主人之服而無歉也不知如何自此理而出一句不可曉理在何處置局許多物事皆自也局中出耶有理便有氣理氣未嘗相離若是元亨利貞天之四德亦是有箇天便有箇德其為萬物也亦是理與氣一併分付何處專有箇理管幹出許多物耶似此沈痼見識若要自立議論不妨不敢奉和也性無內外一句不可曉實體之於身如何是無內外橫渠定性書言性乃是言心何不反身以思遂為是語也道者中庸之道一句亦無害終身說得似太急耳其他認得皆親切復甘吉甫葉味道來此已留月餘矣卻得相與讀先生書乃知吾輩於緊要處工夫絶少求放心三字動靜之間更宜百倍加之功方有倚靠因此亦粗有省如象山所謂倍者恨不得一見相與劇談也幹老矣諸兄正好著力庶師道之有傳也幹山居幸無他以兩房子舍在此舊居窄隘不足以容遂以屋後架堂三間方不過二三丈為送老之計以百物皆旋措置遂遲緩至今更旬日亦當告成也坐是頗妨讀書承欲下訪果爾何幸如之此間絶無朋友講習况得契兄辱臨之耶諭及朋友只解讀書不能明理此切當之論不長進正在此若不見道理正如去行在便到候潮門外回來亦未是端的也近日因思五行生之序則曰水火木金土行之序則曰木火土金水何故造物卻有此兩樣看來只是一理生之序便是行之序元初只是一箇水木暖便是火此兩箇是母木者水之子金者火之子冬是太隂春是少陽夏是太陽秋是少隂從冬起來故水木火金自成次序以水生木以火生金故生之序便是行之序也孔子言精氣為物精便是水氣便是火子産言物生始化曰魄既生魄陽曰魂魄便是精之靈魂便是氣之靈水便生木火便生金在人一身初只是生腎水次生心火腎水上生肝木心火上生肺金造化只是如此何常有兩樣來天一生水地二生火天三生木地四生金此便是造化本原其後流行亦只如此四時之序不過二天二地而巳所以洪範五行亦只說水火木金土謂之五行則行之序亦是如此也以此可見造化之端倪物生之本始洪範又推之以配五事曰貌言視聽思前輩之說往往以木配貌其次序殊不可曉且與庶徴肅乂哲謀不同不知洛書安排得自分明何必如此牽强以水配貌水屬隂隂有質也以火配言火屬陽陽有氣也水滋潤柔軟而生木木屬肝而主視火焦燥堅剛而生金金屬肺而主聽如此分配則生與行只是一理也人之一身以貌為主貌者一身之容貌也整齊嚴肅則心便一故貌恭則作肅人身發用處莫如言心正則言辭端確故儼若思而後能安定辭也造化以水為主學道以敬為主此洪範之要㫖前賢教人入道門戶不是杜撰直是與造化同體也以此觀之至精至妙竊意前賢亦須見得如此而不肯輕發也尊兄以為如何試思之以見教併舉似李司直黃去私恐可商確也又思太極只是極至之理不可形容聖賢只說到一隂一陽處住只是箇一隂一陽底道理所以天地寒暑晝夜生死千變萬化都只一樣分而言之則一物各具一隂陽合而言之則萬物總是一隂陽然學者於此亦只見得皮華其精微處未必有所見非尊兄莫與言此也若不看到源頭仍舊是候潮門外也况又未必到此乎安得尊兄一來相聚旬月耶近日朋友卻是鄉間有一楊志仁最能思索儘可講學亦相許以冬閒下訪也門居無事只是讀書教子耳他皆不必言也吾人年事至此百事只得放下且以檢㸃身心為急也方兄之來又得講習之益年來朋友卻頗有卓然向學者吾道之幸也來諭别紙所論周子之語言闔胡為不自萬而一言開胡為不自一而萬竊謂周子之言造化至五行處是一關隔自五行而上屬乎造化自五行而下屬乎人物所以太極圖說到四時行焉卻說轉從五行說說太極又從五行之生說各一其性說出至變化無窮蓋天地造化分隂陽至五行而止五行既具則由是而生人物也有太極便有隂陽有隂陽便有五行三者初無斷際至此若不說合卻恐人將作三件物事認了所以合而謂之妙合合者非昔開而今合莫之合而合也至於五行既凝而後有男女男女既交而後生萬物此卻是有次第故自五行而下節節開說然其理其氣未嘗有異則恐未嘗不合也楊至之之疑卻恐未曉此意先生初然其言後不復改者此也賤職甚簡靜可以終日讀書同官亦多賢但郡侯庸俗初到便相疑至以書見詆於廟堂可笑之甚此亦未免相玩恐亦難久相處也敵有必亡之勢而守邊者乃此等庸物亦無分毫備禦之䇿只是一味脫空逢迎萬一有警則牽連就死耳果何罪耶五行有生數有行數幹嘗疑之不知何故初生是一樣其為物不二則其生物不測易簡之理恐不如此故嘗疑其只是一樣及以造化本原參之人物之生育初無兩樣只是水木火金土便是次序在人欲分别隂陽造化之殊故以水火木金土為言耳自一至十之數特言竒耦多寡爾非謂次第如此也蓋積實之數非次第之數也天得竒而為水故曰一生水一之極而為三故曰三生木一極為三以一運之圓而成三故一而三也地得耦而為火故曰二生火二之極而為四故曰四生金二極為四以二周之方而為四故二而四也一能為三二不為六而為四者地屬於天隂屬於陽故其方也止於四不為六水者初生之陽木者極盛之陽火者初生之隂金者極盛之隂陽極而生隂隂極而生陽故但當以水木火金土為次序也自初生至流行皆是如此若要看隂陽竒耦一初一盛則當曰水火木金土非謂次序如此也今以為第一生水第二生火第三生木第四生金以為次序則誤矣水木火金土五行之序也水火木金土分其竒耦初盛而言也以此觀之只是一樣初無兩樣也所謂一二三四但言一多一少多之極少之極也初非以次序而言猶人言一文兩文非謂第一名第二名也果以次序而言則一生水而未成水必至五行俱足猶待第六而後成水二生火而未成火必待五行俱足然後第七而成火耶如此則全不成造化亦不成義理矣六之成水也猶坎之為卦也一陽居中天一生水也地六包於外陽少隂多而水始盛成七之成火也猶離之為卦也一隂居中地二生火也天七包於外隂少陽多而火始盛成坎屬陽而離屬隂以其內者為主而在外者成之也頃見方士言人之生男女也夫氣先至而婦氣應之則生男婦氣先至而夫氣應之則生女此坎離之義一六二七相成之理也若以次序則全不成義理矣雖然此特粗淺之論也此特文義之不可不辨也夫水木火金土足以見其次序矣吕不韋尚知之而况於古人乎六府之序九疇之次必曰水火木金土何哉六府與九疇不同然必以水火為先濓溪先生所序亦如此蓋不若是無以知造化生成之妙無以知太極本原之所以然也天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是是必有為之本者矣此事更宜深思若只隨人腳跟轉竊恐虛過一生不曾識本生父母面目也有可見教更幸往復生之序行之序以質言以氣言皆朱先生通書解中語學者守其說可也然義理須是自見得分明若有所疑正須講貫若但如侏儒之觀優則亦何益哉中間所述鄙說得諸兄詰難甚幸幹終不能釋然且如生既有質豈容無氣行既有氣豈容無質木生火火生土曷嘗無質哉此其所未明也元德兄疑於天一地二天三地四之說與春夏秋冬不同則前已辨之矣去私兄以為火能尅金不應生金何故夏之後便為秋耶借曰中央有戊已土不知何月何日屬戊已耶土旺四季則何物非土所生豈特金耶金本土也以秋燥熱而生金謂之火生金何不可也火能尅金惟其能生所以能尅又何疑焉以耳屬金是誠可疑醫家以耳屬腎以肺屬金誠不應如此分配吉父兄亦有此疑然配與屬不同屬者管屬之謂配者比並之謂論其管屬則耳屬於腎取其比並則聽比於金且何為其聽比於金也洪範五行五事皆以造化之初及人物始生而言也造化之初天一生水而三生木地二生火而四生金蓋隂陽之氣一濕一燥而為水火濕極燥極而為木與金也人物始生精與氣耳大傳曰精氣為物子産曰物生始化曰魄既生魄陽曰魂此皆精妙之語人物之生如此而已精濕而氣燥精實而氣虛精沈而氣浮故精為貌而氣為言精之盛者濕之極故為木為肝為視氣之盛者燥之極故為金為肺為聽大抵貌與視屬精故精衰而目暗言與聽屬氣故氣塞而耳聾此曉然易見者也然精衰則氣衰精盛則氣盛又初無間隔也若以醫書所屬而疑之則不知變之論也至如去私兄言地非土則不可曉矣吉父兄論隂陽太極以為或以太極言或以隂陽言者非太極無以生隂陽非隂陽無以見太極此體用所以一原顯微所以無間也易曰一隂一陽之謂道其示人切矣五行之序幹欲作三句以斷之曰論得數竒耦多寡則曰水火木金土論始生之序則曰水木火金土論相生之序則曰木火土金水如此其庶幾乎五行次序幹只見造化所以然者只是一動一靜又細分之則有動之初有動之終靜亦然其理如此其氣亦如此理如此者仁了便是禮禮了便是義義了便是智氣如此者春而夏夏而秋秋而冬故五行之序只是水而木木而火火而金金而土其生如此其行亦如此若謂先有水火後有木金則不成道理亦不成造化矣今不將道理去推尋只得隨人背後盤旋也以此故頗疑生之序便是行之序其詳已見别紙更幸與朋友講之有便見教也幹生平學問自謂有得力處今此之歸方知向前只是抱不哭底孩兒學問須是就險難窮困處試一過真能不動方是學者人生最難克是利欲利欲之大是富貴貧賤吾夫子只許顔淵子路兩箇若是行處打不過便教說得天花亂墜盡是閒話也吾輩勉之幹衰病如常無足言者老來深欲求閒亦覺世道可厭然終以家事相絆未能脫去為撓也方明父來此相聚纍月其於義理大端講之甚明而志氣髙尚尤切於義利取舍之辨殊不易得勉為不已向來朋友恐未易出其右也欲留臨川旬月講論當有可觀者甚恨不得從之以聽緒餘也勉齊集卷十三
