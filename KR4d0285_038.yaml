body:
  text: 勉齋集卷三十八宋黃幹撰志銘鄭處士墓志鄭君諱倫字次山福州閩縣象山人象山憑海民貧依大姓以活其貧乏轉徙而失其所依者蓋多矣鄭氏居是土二百餘年為著姓曾祖銘祖欣父雋世以輕財急義名其家賑恤飢乏不計有無里閭德之紹興間海盜焚剽民居且及其里里之父老謀曰今遇盜必死無鄭亦死祈盜以全鄭可乎相率冒死以請于盜盜服其義秋毫無犯航海之官遇盜攻劫不能歸者聞其風往依焉為治廬室給衣廪久之如始至卒全其家里人至今往往樂道其事君少聞祖父之志即慨然能容一家然後可以治一家能容一鄉然後可以居一鄉故于親族鄉閭之義尤篤友愛諸弟無間言撫教諸子無異已出創閣家孰之上使其子與羣從子肄業焉取夫子答子路問士之義名之曰怡蓋勉之也嘗為詩以示之其意以為唐人書忍字善矣未若初無瑕隙可忍之為愈識者以為知言官以繇役令民兄弟析産君太息諭諸子曰是為政者教人以薄其親也汝聞祖父之訓乎産業財賄兄弟同之吾奉先志罔敢失墜公家之事非汝所敢知謹勿敗吾家法耳春秋燕享吉凶慶弔雖族屬疏逺未嘗或遺恩意浹洽晚歲彌篤族黨乖異者必委曲曉譬以平其憾里閭假貸有所逋負輒焚券已責以財委人有所侵盜或請治之曰勿任足矣彼既盜用尚安所責償邪有侵其田廬疆埸者亦不復校曰所爭幾何而失吾鄉鄰之意耶鄉人無賢愚皆以長者目君好事者亦為歌詩以美之嗚呼真可謂長者之風而善守家法矣君天資頴悟志向髙潔好讀書不喜營利壯歲即棄場屋放懷山水間為詩目娛其言多出于修身俟命之意不事華采而皆有補于風教名其讀書之室曰正已端莊以居雖大暑未嘗見膚體造次夜起必冠曰豈以晦冥故不加整飭耶與人書簡未嘗草書律身甚嚴而居家接物寬和樂易事親孝養篤志居喪哀毁過人教子勤懇為擇師友訓以理義至或有過未嘗厲聲責之閨門之內雍雍如也病且革戒其婦曰汝為冢婦異日介婦歸其相率輯睦毋以小利傷大恩家人復請所欲言則曰從孤女未行吾憾也語已命之退恬然而逝蓋其篤于親族之意出于天性故雖老且死而不忘也卒之日實慶元元年八月戊辰享年六十有一先娶吳氏早世再娶林氏生男四人遹適邁適孫男一人元孫幹嘗與遹遊因得聞君之賢為最久後謁君于象山之中觀其氣象聆其言語凝重溫粹誠實懇惻然後信所聞之不妄也遹將以三年九月甲寅葬君于龍角山之原以王明府之狀來曰願請銘余悼夫古風之日逺而流俗之益薄人欲之日熾而天理之寖微粹然生物之心與天地為一體者斫喪淪泯臨小利害未毫髮比則父子兄弟反面若不相識如鄭君者豈不足以激頽俗而厚人心哉遂不辭而為之銘曰人物並生氣同體均孰合而離孰疏而親先民有言仁與不仁鄭君之先逮于厥身稟此春和裕彼鄉鄰孝友任恤曰睦曰姻君實備之有志未伸獨濬其源以溢于後人方夫人墓志銘慶元五年春三月辛酉象山鄭遹成叔以其外祖母方氏之喪來訃且問服之制度與其日月之數及凡居喪之品節以授方氏之孫俾行之如禮某年某月某日將葬于某縣某鄉某山之原成叔復以方氏之狀來曰願請銘豫嘉成叔之能篤于親而志于古方氏之孫能不徇于俗而惟成叔之言是聽既受其狀讀之因仰而吁曰嗚呼福禍倚伏之期豈不甚可歎哉守道者不以所遇易其志雖無意于福而未必不得福分之不安而戚然以避禍為心者禍亦豈可終避哉豫于夫人方氏之狀有感焉成叔之狀曰方氏于莆為著姓五代末有占名數于福州閩縣之象山者其先皆隱德不仕至諱某者年踰九十始用髙宗皇帝慶夀恩補迪功郎夫人其長女也生有令姿溫淑而髙潔年十三喪其母吳氏佐迪功君治家事勤以篤友兄弟敬以和年既笄適同里進士林君松未六年年二十有六而林君卒事其姑如事父友其夫之女弟如在室之兄弟而守節毅然又有人所不能及者焉子二人曰偉才良才女一人適處士鄭君遹之先君子也有賢行鄉人稱為長者鄭君偉才既有室而卒良才亦蚤世孫二人友孫恭孫皆幼夫人惸然當一家之寄不惟保其田廬以無失墜而其溫惠正信又足以孚于鄉人不惟撫其二孫以無廢林氏之祀而又教之義方以得為良子弟二孫既長有立而夫人卒享年八十有三夫人始終之所遇如此古者婦人有三從之義夫人所從何其坎壈而多故耶少哭其母長哭其夫又哭其子古之所謂窮而無告者夫人居其三焉其亦可悲也已夫人守志彌堅厲行彌篤卒享髙夀二孫知讀書好學而又有成叔為之外孫以禮相其終而述其行以詔于後夫人于此又何其幸耶使夫人于禍變摧折之餘而不能保其身以全其夀其生也不為鄉閭之所稱其歿也亦將泯泯而無聞矣此余于夫人方氏之事為之三歎者蓋不但為夫人歎也銘曰太虛冥運兮尸之者誰禍福倚伏兮我罔敢知彼日而食兮彼月而虧此心凛凛兮百挫不移有後而賢兮有夀而耆沒而以禮兮憾寧有遺我作此詩兮以警世人嗟爾子孫兮勿替引之吳氏夫人墓志銘代仲兄撰夫人吳氏福州懷安縣達溪人父諱貴有隱德夫人以姿性柔淑聞于里里之大族爭遣媒約婚不聽曰是女必以歸詩禮家石栗林公諱茂倜儻重信義有賢子諱齡少穎悟喜讀書善屬文將聘婦則曰非吳氏女不可吳公聞其言一日適相值語道意乃酌酒定婚夫人歸逮事祖姑曾氏曾氏晚多病舅及姑髙氏奉事起居蚤夜不少懈夫人承其意輒先之舅姑曰此吾事也爾毋預夫人曰有婦以代勞也曾氏曰吾病且愈爾曹其休矣其上下雍睦如此舅喜客客至必盡歡不計家之有無家素厚坐是日益窘有譏者則輒笑曰儋石為黍當飯幾客薄酒伏雌為費幾何夫人聽從婉娩曲順其意几榻膳羞整潔豐備常若客至未嘗敢以貧為解舅姑沒夫人治家益勤禮賓客不廢其舊故其夫與其子憲卿守卿益得以讀書肄業從賢士君子遊家事瑣碎一不以屬心夫既歿而夫人年已七十矣二子不忍朝夕離侍側夫人輒戒之曰汝讀書當如乃父敬禮賢士當如大父毋以我老故有怠心以是二子交道日廣聞鄉之名勝不以道之逺近齒之長少皆願裹糧詘首而與之交夫人極力資欵無惰容每曰汝能從賢者遊雖不在吾側吾樂也憲卿遂受業于晦菴先生之門而與東及東之季弟幹交最厚後皆能自檢飭為名士里之人相與語曰二子之賢嗟乃母之教也夫人以慶元已未十一月三十日戊午卒享年八十有五子二人女一人適進士吳溥先夫人卒孫一人蕃孫女一人夫人亡恙時憲卿嘗從容曰浮屠氏之教行而先王之禮遂廢天堂地獄寧有是事耶夫人曰汝能守禮吾死無憾矣故夫人之歿也二子治喪盡斥去浮屠氏法一以禮致其哀里人族黨謗言日至晦菴先生貽書以勉之而謗者始息自佛老之説行于中國且數千年五代王氏崇奉塔廟而其説始熾于吾閩深山長谷之民信奉尤篤至于死生大故之際忘其焦腎乾肝之苦而篤于梵唄膜拜之習甚至舉其親之遺體古人所以重衾復斂必誠必信者而投之烈熖之中曰佛教然也是豈不大可哀者耶夫人生山谷間乃能以禮誨其子而不溺于異教如此是豈不謂之賢者耶將以慶元六年二月十四日庚午合祔于髙嶺之原其姪吳宗萬與其夫之族子士蒙狀夫人之行來請銘豫既從夫人之二子遊且嘉夫人之行遂不辭而為之銘曰未笄而見愛于父母已嫁而能順于舅姑厲其夫若子以學而交天下之善士全其終以禮而不溺于昏妄之浮屠夫人之德始終全備如此是豈可不銘也夫林端仲墓志銘有隱君子曰林公某字端仲福州懷安縣栗山人州之山自北而來者曰雪峰曰居儒曰芙蓉夀山九峰皆巖谷嵌谺巔崖崒嵂可喜可愕栗山當其中蜿蜒扶輿回復磅礴有清淑之氣居其間者多秀民傑士孝友雍睦發于天性豈非風氣使然耶公俶儻有偉志未冠遊四方與方外之士交有異人焉與之處愛其才授之書一編曰讀是可以活萬人公退而閲之乃黃帝岐伯相與問答之書其品裁劑量則國工名方未嘗不載也公歸築精舍于其居之前病者造焉公則齋戒涓潔如已隱憂館而食之日往視焉曰安則喜有不安節則為之惻然終夕不寐其以息數疏數決人死生于數年之後如燭照龜卜方匕之劑以起人死而肉白骨者如取諸其懷而與之也諸公貴人聞公名者爭欲致之公入有左右圖史之娛出有山林池亭之樂率十餘年未嘗至城郭深山長谷窮悴無聊之小民昏暮叩門以疾告者公遺之藥且賙之未嘗責報焉輕財重誼視人之急極力振之惟恐或後里閈之間有利于人者公常慨然為之倡嗚呼若公者豈可以醫名者耶豈亦如古之憤世絶俗寄于醫卜以自晦者耶公之卒以某年某月某日以某年某月某日葬于其居之二十里翠微寺之北其子子牧與其子子揚之為兄後者嘗以公之志氣從學于豫豫又嘗假館于其里樂其山川之勝而知公之行為最詳故其葬也子牧來請銘豫嘗歎夫天地萬物本吾同體癢痾疾痛皆切吾身痿痺不仁者不惟莫之恤而反禍之豪傑之士不為天子宰相操殺生之權以除民之蠧而全其夀則亦為大醫士左提針砭右秉藥餌以去隂陽寒暑之為民害者今幹老矣無能為也惜公之死而考公之行豈不有所感也夫銘曰負隂抱陽同一域胡為不仁相禍賊赤子入井皆怵惕知公此心可醫國黃仲修墓志銘余為令臨川愛其山川風俗之媺名儒巨公彬彬輩出故家遺俗皆知尚氣節畏清議信厚而質直其天性然也黃君思永字仲修其先金華人徙豐城後遷是邑余嘗過之入其門庭宇閴寂登其堂主人肅然問起居外不輕發一語氣貌凝重進止有常見其二子延客坐服飾朴素器用純質坐客常滿然無雜賓焉自是纍纍過之終三年猶一日也豫與仲修交最久仲修足迹未嘗造公庭間嘗走鄉疃視時榖價之貴賤仲修獨下其價以售賙恤閭里役于仲修之家者歲凶無流徙焉篤于教子不為剽竊以徼利達擇師取友不逺數百里必求有學行者致之為子擇婦不以財必以世之巨儒與鄉之名勝嗚呼何其賢且厚耶訪其家世則左朝散大夫吏部郎中提點荆湖南路刑獄公事贈通奉大夫次山碩人章氏之曾孫通直郎知靜江府義寧縣事愷之孺人徐氏之孫貢士逢吉夫人管氏之嗣叔祖瓊管公擇仲修于群從之子最賢者以為貢士後蓋邑人之右族其生産之厚裕如也士大夫席父兄之業擁髙資鮮有不習尚浮靡貪榮嗜利恃氣凌物以纍其身辱其先者今仲修家世如此乃能自處泊然無一毫驕吝之意豈其天資之厚有以守其故家遺俗之舊耶仲修年四十卒于嘉定元年十月朔日娶饒氏子二人慶臣清臣女二人長適進士饒洽次以疾廢慶臣娶晦菴朱文公之孫監酒朱君野之女清臣娶寺簿王君克勤之女兩君家甚貧後仲修數月亦皆卒王君且死其家遣姆來曰妾不幸有夫之喪女長無以嫁夫人其改擇焉饒夫人曰吾言已決矣擇婦擇其身非財也且寄語于朱氏謹無以貧為嫌二子無異意焉嗚呼非獨仲修然也如其妻子亦賢且厚也道行于家人固若是耶仲修將以嘉定三年十二月十八日壬申葬于縣之明賢鄉唐門之原二子以其師盱江傅沂之狀來請銘余既獲交于仲修又于其長子有妻黨之親知仲修之行事為最實故不辭而為之銘曰植根厚者其華必豐浮埃為基胡墉之崇猗歟仲修古人之風器大聲宏不于其躬銘以俟之列于幽宫篤孝傅公墓志銘公諱修字子期豫章進賢人也曾祖俊祖安民建炎中以收逆賊補官進義校尉父時中從政郎為宣撫嶽公賓客母胡氏生于紹興已未以開禧丁卯六月丙午卒于正寢將以嘉定元年十有二月癸酉葬于所居之南荷田源是歲十月公季子瑭走臨川謁公之友長樂黃幹泣而言曰瑭嘗侍先人師晦菴先生而友吾子今不幸棄諸孤葬有日生平之梗槩託以不朽者先生歿矣子何説之辭幹謝不敏又泣曰德與位世所有也先人之友莫子若也子何説之辭發其書讀之公剛方質直孝友信義行于家庭著于閭里天資頴悟不樂時學少習輒棄去端坐一室左右圖史持身斬斬無違行接親族有恩賙人之急常恐不及凡公之性行皆可述如此而于事親尤篤飲食起居未嘗頃刻忘嘗遊蕪湖一夕有感而歎曰吾親其有疾乎旦即馳歸千里不數日而至從政公既葬去家一舍每一念至即馳往裴回信宿而後反庚申之春幹嘗侍坐于晦菴先生之側有麻絰菅屨扶服而前者貌不勝衣言不能出諸其口問其姓名則公也先生方與諸生習禮于武夷之下愛其賢書其所擕從政公之事狀曰豫觀其冠履應禮而戚容與之稱言詞懇慤情旨酸辛為惻然動心焉坐者無不加敬未幾先生沒明年且葬柩行公悵悵而來且號且拜俯伏于道若將隕焉送葬者重為之垂涕方是時偽學之禁嚴縉紳恥言學學者更名他師至有弔賻不及門者公獨毅然不逺千里哀號痛慕若此公誠孝人也以其愛親者施之師由是充之則凡子瑭之所述皆可信不疑也嗚呼道之不明久矣諸老先生迭起力扶之習俗日薄學者不能盡通其師之意小廉曲謹不足以救大本之差博聞多見適足以為實行之纍顧使阿世之徒得以藉口濟其為姦之術而斯文日以堙晦今諸老先生既歿如公之篤實躬行者亦復相繼而逝是豈不重哀也夫公娶張氏子三人夢得夢與瑭業進士瑭嘗與鄉貢皆篤信好學有父之遺風焉女四人長適修職郎前筠州主簿趙汝偩次適待補太學生王大年次適進士周士珍孫男女十四人男謙巽觀咸益渙女長適漕貢進士趙師櫓次未行幹既謝不獲遂次公之行而為之銘銘曰學之大先人倫行有實豈其文參也魯以孝聞一唯間䇿奇勳嗟後世胡紛紜毋他求視兹墳董縣尉墓志銘番陽董君叔重之子浚以書走漢陽敘次叔重之言行以求銘于其父之友黃幹曰君父治命也奉其書而泣進使者而問故嗚呼幹嘗從遊于晦菴先生今四十年矣相與始終周旋最久且厚者惟叔重為然宜其疾且革而不豫忘也其何辭叔重諱銖世為德興望族唐保大間始有以仕顯名者本朝慶厯以來六世從祖諱淵為太常博士髙祖諱介卿為刪定自是業儒益衆登進士第者相踵曾祖材處州縉雲令祖陵隱居不仕考琦迪功郎致仕有賢德晦菴先生嘗志其墓叔重天資警敏勵志于學自其少年已為鄉閭所稱道叔重亦自負以功名可唾手致也既冠從鄉之儒先程公洵遊公語以晦菴先生所以教人者叔重盡棄所學取大學中庸語孟諸書日夜玩習裹糧入閩摳趨函丈不憚勞苦先生亦愛其勤且敏不倦以教之嘗語之曰更宜深察聖賢義利之訓反求諸身推類窮根漸次銷伏使日用之間全在義理上立腳方是講學之地又曰日用功夫更于收拾持守中就思慮萌處察其孰是天理孰是人欲取此舍彼以致敬義夾持之功讀書須是就自己分上體認出來庶幾得力又曰此心操則自存動靜始終不越敬之一字伊洛拈出此字乃是聖學真的要妙功夫學者于此著實用功不患不至聖賢之域又曰更宜加意涵養于日用動靜之間不然徒為空言無益而有害也先生嚴重剛毅雖樂于教人然非其資稟志尚可與適道未嘗凌節施也觀其告叔重之語精切懇到如此非愛之深望之至耶則叔重為人亦可知矣叔重學益勤志益苦往來師門率不一二歲輒一至至必越纍月而後歸故于先生之書無不通而操存持守不負其所教慶元初先生歸自講筵日與諸生論學于林竹精舍命叔重長其事諸生日所講習叔重先與之反復辨難然後即而折衷焉偽學之禁方嚴有平日從學而不通書問者有諱言其學而更名他師者有變節改行狂歌痛飲挑達市肆以自汙者有昔嘗親厚恨不薦已而反擠之者至其深相愛者亦勉以散遣生徒為逺害計諸生雖從學亦有為之搖動欲托辭以告歸者叔重正色責之喻以理義然後諸生翕然以定非其見之明守之剛能若是乎叔重敏志工於文詞藻麗而醇正嘗貢于鄉矣逮其晚年始中進士第授迪功郎婺州金華尉轉從事郎以殁人皆以叔重不得究其用為恨然使叔重以少年即擢髙科為世所用必不能用力于學雖學亦不能專心致志而有得也得此失彼亦何憾哉叔重事親孝于朋友義以誠家素厚喜施豫親舊貧不能自振者竭力扶持之有利于鄉閭者爭先為之歲或大祲必發粟以賑貧者故其歿也鄉人皆為之垂涕焉叔重之施于家施于鄉如此則推之于世猶是也士奚以窮達論哉娶祝氏生子二人浚之弟曰淪孫二人曰矩曰栗叔重以嘉定甲戌卒享年六十有三葬于其鄉銀城九峯之原卒之明年八月也先師沒十有六年交遊凋落後生無所師承而微言將絶幹與叔重生同年學同師叔重歿而豫亦老矣故重為之悲感次其事而為之銘銘曰師之誨兮諄諄君之惠兮恂恂交朋友兮以義處閭里兮以仁世方艱兮心逾壯身雖屈兮志則伸正以斃兮奚所憾尚其似之兮後之人周舜弼墓志銘君諱謨字舜弼姓周氏其先會稽人八世祖勍仕南唐李氏有軍功官至御史中丞徙居江州瑞昌縣今為南康軍建昌縣人君資強毅果于為善有不善立改其接物溫然少警敏嗜學兩預鄉薦文公晦菴先生守南康君摳衣登門盡棄其學而學焉晝抄夜誦精思篤行南康抵武夷且千里有重岡復嶺之阻君嘗往就學先生守臨漳去武夷又千餘里其地為閩廣之交瘴癘之鄉君又往求卒業既歸溫繹所聞以書請益先生答曰講學益勤持守不懈深慰所望當此歲寒不易其操尤不易得也居家孝友母喪疏食三年治喪悉用古禮斥去浮屠老子法鄉人多效之先生又以書勞之曰居喪盡誠不徇流俗此人所難其見稱重如此先生歿偽禁方嚴君冒隆寒戴星徒走偕鄉人受業者往會葬年逾六十矣家故貧事孀嫂撫兄之子極其敬愛交朋友處鄉閭無間言君生于紹興辛酉其卒以嘉泰壬戌葬于甘泉鄉箬坑之原祖妣彭氏墓左嘉定戊辰七月也娶李氏有淑德盡婦道後君三年卒其葬以君之祔穴子三人曄昞昭皆業進士昞亦預鄉薦女適進士蔡樞崔若訥黃萬英先生以孔孟周程之學誨後進海內之士從之者郡有人焉先生歿學徒解散靳靳守舊聞漫無講習微言不絶如線獨康廬間有李敬子燔余國秀宋傑蔡元思念成胡伯量泳兄弟帥其徒數十人惟先生書是讀季一集迭主之至期集主者之家往復問難相告以善有過規正之歲月浸久不少怠幹始仕江湖間因得交于其徒心欣然慕之願卜居五老三峽間從諸君後未能也嘉定丙子自漢陽道過其里集中來會者十七人皆佳士也何其盛哉于是君之子曄述其父之行拜且泣曰吾父入閩與子交最厚墓木拱矣銘未立將有待也子辱與吾黨之士遊又辱過其里敢請又泣曰自先生守南康吾鄉之士始知學自吾父入閩士始不逺千里從學吾鄉之為季集亦吾父發之今歿而無傳焉敢固以請嗚呼舜弼之學行修諸身行于家又取信于鄉人使吾師之道講習不輟今吾病且老不能遂卜居之志將季集之約歸語其鄉人使行之斯文之不至湮晦非舜弼之力歟遂不辭而為之銘曰廬阜兮蒼蒼彭蠡兮湯湯地靈兮鍾秀物産兮多良諸儒兮勵志吾道兮有光夫君兮始倡沒世兮不忘吳節推墓志銘君諱居仁字溫父姓吳氏建陽縣考亭人考亭溪山之勝甲建陽文公晦菴先生卜居之君其西鄰也先生以道學訓後進四方之士日造焉暨君至則竦然起敬延之上座語移晷乃退幹嘗私請焉曰此真廉吏也嗟異者久之又數年先生為幹買地結廬徙其家以居則又為君之西鄰焉于是始識君君亦折輩行為道義交故知君之履行為尤詳君歿之十年仲子從周以其壻葉士龍之狀為書走漢陽曰吾父以廉介自守既殁而無傳焉諸孤責也又曰吾父受知于文公又獲與子交文公歿矣述吾父之行傳諸後非子其誰幹既與君為鄰有雅故其奚辭君之曾祖睿仕至承議郎知福州侯官縣有廉聲妣安仁縣君黃氏祖天覺妣陳氏父懋功妣江氏君自少以學行為鄉閭所敬長貢于其州晚以特恩補官為福州古田縣尉再轉為潭州攸縣丞秩滿為融州節度推官君仕所至勤于職業以儒飾吏聽訟必以人倫大誼斷曲直部使者下其所斷為州縣式居官常俸不足自給君洗手奉法一毫不妄取古田之人稱其清廉世所絶無以俗語目之為生羅漢邑人思之至今丞滿不能歸邑長以富民之訟産者囑君且曰行計可辦矣君笑曰此言何為至我哉遂徒步以歸廣西部使者知君貧不可以不義屈也委君行視十邑倉粟一切餽遺悉卻之大為當路所知共薦之而君歿矣同寮交致賻始能以喪歸君生以建炎丙午其歿以開禧丙寅葬于其鄉均亭里石溪之原娶翁氏先君二十年卒子三人有洽從周子容今其存者從周也女一人適進士黃拱孫男四人椿田杞郴孫女二人長適進士葉士龍讀其狀皆生平閭里所聞見可考不誣也嗚呼貧固人所難處君老得官且家貧又多纍獨能以廉自將是則真可敬也其為大賢之所推許也宜矣吾聞君之八世祖殿中丞文靖與其弟比部員外郎文秀自國初擢第歷仕三朝祥符三年同日告老辭位而天子以三朝元老加賜章服以華其行時人榮之以比漢二疏侍郎李虛已以詩餞之有棠棣隂中齊拜表脊令原上對懸車之句然則君之清風髙節其源流固有自也吳氏之先自太伯避位逃奔于吳孔子稱其至德其後季札有賢德孔子題其墓今君亦以廉見稱于文公豈其苗裔耶何其多賢也抑豫有感焉始豫為兒童從先生長者遊相告語必以氣節鄉人有貪者皆鄙賤而不與之齒士大夫官至監司郡守子孫至無以為食人猶敬之曰此賢者後也今老矣視俗之所尚大與曩者異一簿若尉而求田問舍之計畢矣人爭慕之若不可及不若是則子孫惸然折而為厮役者有之榮辱之殊如是孰肯以此而易彼哉然嘗思之廉而貧賢也貪而富盜也貧而子孫能自立則又賢也富而子孫驕且騃習見其父祖之所為而效之其為盜可勝既耶孰貴孰賤必有能辨之者豫因吳君之事併書之以為世戒且以勉其子孫銘之曰謂貧為可樂兮跖名以盜謂廉為可貴兮夷死于餓歷前聖以折中兮跖之鄙而夷是慕嗚呼賢哉是謂有宋廉吏吳君之墓知果州李兵部墓志銘嘉定十年冬十月壬子尚書兵部員外郎知果州李君諱道傳字貫之以疾終于江州之寓舍聞之者識與不識莫不咨嗟涕洟相與語曰是刻意勵行求聖賢之道而能踐其實者是立天子殿上危言正色為宗社無窮之計是懇惻愛民救災捍患江東父老子弟數十萬皆得全其生者是利祿不能動其心者是危險不能易其守者斯人也止于斯可哀也夫明年冬太常寺丞知南康軍陳宓以書告于長樂黃幹曰李君有惠政于江東樂與此邦之士遊今亡矣從之遊者祠之廬山棲賢寺子與李君交最厚願有記幹悲君之不可復見遂為之記以見君之誠于身信于友也又明年君之兄弟若子以君門人牟桂之狀來請銘又得以考君事業氣節而備書之尚何辭君隆州井研縣人曾祖公錫祖發宣義郎父舜臣承議郎行宗正寺主簿贈朝請大夫宗正公官中都君年始十一試胄監中貴人主邏者異之曲加問遺君端坐不顧識者卜其異日之所守矣少長讀程子書知講學涵養之要玩索理義至忘寢食雖處暗室整襟危坐肅如也未冠博通經史百家為舉子業不逐時考較于有司名常出衆上賜慶元二年進士第調利州司户參軍秩滿移蓬州州學教授開禧用兵盜窺散關急君以諸司檄計事道聞吳曦反君痛憤見于詞色即遣其客間道持書遺制置使楊輔論曦必敗曰彼素非雄材犯順首亂人心離怨因人心而用之可坐而縛也誠決此舉不惟內變可定亦使盜知中國有人稍息窺覬即使不捷亦無愧千古矣逆儔趙亮以曦意脅君君以誼折之遂棄官歸逆曦平有奏君抗節不撓潔身自全者詔進官二等由是中外交薦嘉定二年召除太學博士宰屬有子以誦書應試風同列囑君君卻之兩學之士多君有守遷太常博士兼沂王府小學教授沂邸有母之喪官吏例進秩君曰有執事之勞者推恩可也吾輩何與焉辭不受遷祕書郎閲月又遷著作佐郎見上首言人才盛衰係學術之明晦願下明詔尚正學取故侍講朱熹論語孟子集注中庸大學章句或問四書頒之大學仍請以周敦頤邵雍程皓程頤張載五人從祀孔子廟時執政有不樂道學者以語侵君君不為動兼權考功郎官令史有以某御史意求更定欲筆者君曰欲筆不可改也自是六部郎官缺君遞攝之幾二年無敢干以私時新進用事贓賄成風會再對首言今名優儒臣實取才吏刻剝殘忍誕謾傾危之人紛然進矣君求補郡執政使諭曰進書近可待也請愈力六年差知真州君至按圖牒覽形勝歎曰要地也可無備乎城圯弗治前守請于朝得緡錢斛米以數萬計甓護之所費僅四之一君益以郡計盡甓之並江居民視城中幾十倍請築翼城不報乃請築兩石壩益浚二壕緩急有警復決州之東西陳公塘以水為阻而人心始固矣創築倉廪請廣儲蓄上出內府錢命增糴四萬斛以實之忠勇軍舊千人亡者半君既募足乃為置統率嚴教閲譏出入禁役使軍政肅然復條弩手民兵按閲之法上之及請六合戍兵聽守臣節制皆報可君以禮下士數詣學校誨以聖賢經訓瓜步故有魏太武祠牲幣湊集君曰此地昔拓跋燾所踐蹂豈宜獲祀悉取土木偶投江中以除民害七年秋除提舉江南東路常平茶鹽公事將行别儲郡計錢四萬緡為樓櫓費弛負輸亦萬緡去之日帑庾視始至皆倍焉君之為部使者按行屬郡劾吏之貪縱者十餘人胥吏為民害者大黥小逐百餘人狴獄不當繫者二百餘人盡釋之弛負錢一十餘萬緡決訟牒二萬餘紙所過村落細民訴事者日夜坐而聽焉無不得其情而去池陽戍將以責賄不滿意杖其統制官幾死其弟訴于君不受訴愈切君逮繫之密以告江淮制使移他屯得不死後制使奏言軍帥以求貨杖殺將士歲至六七百人自今將佐有罪並送所在州論鞫如律奏可蓋自君啓之夏大旱君應詔言楮幣之換官民如讐鈔法之行商賈疑怨賦斂增加軍將刻剝皆切中時病遂條上荒政多從之時三部使者分賑九州君得池宣徽三州十八縣獨居一路之半得濟糶米三十萬斛錢一十萬緡通商勸分足以均給君既分委寮屬又躬行省視窮冬風雪中竹輿上下山坂深村窮谷靡所不到起十有一月盡明年四月無一人捐瘠流徙者鄰郡九江來告急亦輟糴舟濟之賴以全活者甚衆新宣城守素無廉稱君奏罷之主之者大怒郡號凋弊乃命君攝事以困之君撙節關防府計充裕郡為大斛以受民租悉剖而更制之是歲減民輸七萬斛既又捐夏稅緡錢亦五萬去郡之日帑庾視始至亦數倍君視民疾苦如已隱憂為之興利除害如已嗜欲推行晦菴先生社倉之法上饒新安南康諸郡翕然應命社倉之法獨盛江東人蒙其利江東豪民詭籍寄産以避差役某王府物力四千緡莫非詭寄君請勒王家吏齎契券質驗仍申嚴限田之法自是豪猾不得肆貧弱少紓矣浮梁德興民訴役錢增重為考其實歲用之外盡蠲之君于寮屬待之有禮至于舉刺斷之以巳不為貴要所移初除真州遍白輔臣臺諫以薦舉請託之弊願公舉以勵職業比終更莫敢以書至者及使江東兼攝臬事所舉多不識面受舉者亦莫知其故也新南康守貴勢子也庸下躁妄君劾之久乃豫祠廣德守臣觀望劾郡博士且詆轉運使真德秀乞避之君請覆實守坐免徽守丐倚閣月椿錢為總餉者所劾都省亦言本州玩視朝廷君為力辨且言所行荒政實出已畫守竟奉祠去君既孤立多忤已浩然有歸志會吏部侍郎胡矩舉君自代遂引疾丐祠不許令君入奏事再辭又不許遂入對首疏二千言上自宫掖次及朝廷以至侍從臺諫闕失無不歷歷為上言之皆天下國家所以安危治亂者聞者為之悚然上寬容不以為忤也言者論君務為已勝昧于體國除兵部郎官力辭差知果州薦君者方為君恨而不知君之簡奄宦折逆黨其平昔植立巳如此安有去就出處不能擇其所主而顧為不義屈哉君聞臺劾下即解舟過京口與其友劉宰登茅山次九江入康山山南北之士皆來會幅巾藜杖窮極勝槩飲酒賦詩不知為逐客也君既得疾即請奉祠乞致仕皆未報疾革屬其友南康李燔以後事一本朱先生之禮釋老之説皆不用手為書别兄弟召大兒達可坐床下記遺言尤以謹藏伊洛之書讀之為囑九江蔡念成舉易簀語以告則對曰不敢忘已而命左右出下帷少頃視之已長往矣年四十有八特轉一官朝請郎致仕命松江轉運司致其柩還蜀君氣稟清明容貌端直望之若不能勝衣而其中屹然不可犯羣居終日寡言笑而溫潤之色即之睟然孝友出于天性內外屬之貧者死喪嫁娶悉為經紀輒分俸贍之立朝介然無阿附然沉靜安詳人亦莫能窺其際也儀真俸素厚捐其不當得者宣城之祿厚于庾使取其薄者四方聘幣皆不講與僚吏寓公過客為禮酒不過五行非公會不作樂其恬淡寡欲無所係纍則學問之本已先立矣自宗正公始以文學行誼為學者師誨諸子必以聖賢為法兄心傳不樂仕進窮經博古為西州之望其所著述多行于世其季性傳亦力學自好其進未可量也君與兄弟相視如師友故其一家之學言論操履一歸于正君既擢第慨然有從學武夷之志屬以家難不果行及為中都官訪求所嘗從學者相與講習盡得遺書讀之謙虛下問晝夜紬繹宏綱大義微言奧旨靡不研究又得門人所録問答反復參考鋟版以惠學者然其為學篤于實踐不為空言于經史皆未有所論著曰學未至不敢于詩文平淡條達亦未嘗苟作曰學未至不暇其沒也其家裒其遺藳定為五十卷君之所得不盡見于此也君篤于為學蓋有摳衣升堂涉歷歲月莫能及者故其事業氣節卓然可敬而窮達死生不能纍其胸中也士大夫不恱學久矣投之事物膠轕之中依阿顧望無益于成敗之數窮通得喪之來利害未毫髮比顛冥昏瞀棄其所守者皆是也聞李君之風得無少愧乎若李君者可謂有道之士否乎是可以付之萬世之公議矣君娶眉山史氏封安人三子達可國學進士當可少穎悟莊重如成人後君八閲月而夭獻可尚幼以君命為伯父後三女長適迪功郎新資州盤石縣主簿杜曄次尚幼其季後君九月而夭君以嘉定十五年八月甲辰葬于眉州青神縣盤龍山之原詎宗正公大墓十里銘曰大學之道曰知與行博文約禮玉振金聲知而不至如眇斯視行而不力如跛斯履允穆李侯稟資清明志篤行堅心通義精曰豈徒言靜存動省暗室屋漏必戒必謹中外踐更遑恤我身上則有君下則有民民方阻飢慈母來哺衮職有闕肝膽披露窮達死生浮雲太空以身任道萬折必東有言有行為訓為式勒此銘詩以詔罔極林存齋墓志銘存齋先生林君公度諱憲卿福州懷安縣栗山人天資莊重篤實淵粹自少已為佳子弟處學校輩行推其賢喜從當世知名之士遊聞濂洛治心修身之學欣然慕之受業朱文公與所嘗從學者友日以孔孟六籍周程之書磨礱浸灌充養其德性色溫氣仁言必擇而後發舉動造次不失繩墨與人交先自下聞人善若出諸已表裏洞徹人無間言少孤事兄如父撫兄子如已子飲食起居不忍一日離事瑣細以身任之相戒飭必曰勤儉家人有所為小大必咨而後行視親族鄉黨如其家有無患難相賙恤惟恐後誨鄉之子弟必以理義從容談論終日人交感其誠樂其和相勉以善故雖山谷窮處儒風之盛不減都邑循循雅飭不問可知其為存齋徒也生平交遊皆已致身貴顯君獨翛然大山長谷中坐幽亭俯清池吟風弄月不知窮通榮辱之變也文公晚得君稱其忠信勉以學及屬纊猶惓惓與君決文公沒君痛甚耆學益苦其徒吳宗萬林士蒙皆志篤行堅可與進道二子相繼歿君益悲望後輩日益切而君亦老矣年七十嘉定丁丑六月壬戌以疾終于家君之曾祖菁祖茂父齡皆世積賢厚逮君學行始著君不娶兄守卿之子蕃主君喪哭之也猶父子鄉人哀之也皆曰吾師逝矣吾誰與歸相與即存齋祠而祀之所謂鄉先生歿則祭于社者君雖不娶不為無後也越三年已卯九月辛酉葬君南山之麓蕃以君之治命來請銘豫與君交最久不敢辭嗚呼若君者古之所謂躬行君子也夫銘曰學有本修諸身行于家及鄉人施不遐道則伸琢斯珉示無垠郭夫人墓志銘夫人龍舒郭日休先生名作德之女臨川晏元獻公曾孫名巽之配既歿而狀其行者河東薛慈儉既葬而為之請銘者新城黃義勇敘其事而銘之者長樂黃幹豫嘗從宦濳皖愛其土俗之美聞兩家世德為尤詳與薛黃二君交相好也日休博學有行義為淮人所宗師晏氏望族世守禮法薛君耆儒黃君名士皆謹然諾不輕許可則夫人性行稟賦薰習始為女中為婦終為母各盡其道可書如狀不誣也夫人端靜敏慧聞講誦輒通大旨嫻于女功極其精巧既嫁閨閫如賓能勉以正夫黨繁衍遇以恩禮咸得其情執夫之喪哀痛摧毁既免喪不御綺縠宴遊之會不赴創書室蓄經籍擇端士為子師禮以齊家儉以足用逮其晚歲資生之具倍致昌阜親屬貧者月給之里巷死喪不能舉女不能嫁力賙之歲或艱食輒發廪平其價夫人之德見于狀者此其大略也豫嘗嗟夫世之稱婦德者必曰柔靜然非剛嚴方正以濟之則昏愚庸弱之敗人家者多矣夫人年方三十夫死子幼獨能以禮節防其身以義方訓其子以勤儉富其家又能斥其有餘以及族屬鄉黨無秋毫顧惜意介然烈丈夫之所為非所謂至柔而動剛至靜而德方者耶夫不能鞠躬盡瘁以直道事其君務為脂韋軟美以偷合苟容者士大夫猶為之况敢責之婦人女子乎豫以是益歎夫人之為賢也夫人孀居四十有八年享年七十有九以夀終子男三人紹祖茂祖榮祖女一人適鄉貢進士吳綰孫男十一人煥耀炳奕煜煒熾炘燧熺磷女八人振振之盛又如此天之報施善人何如哉夫人歿嘉定癸酉九月葬于長樂鄉大園窠乙亥九月銘曰婦人之德柔淑靜專濟以剛方其德乃全豈惟婦道臣道亦然靖共正直曷其有偏承顔順旨為世所賢亡國敗家伊誰之愆孰若夫人行通于天子孫振振眉夀永年于昭厥聲勒銘幽阡楊料院墓志銘文公朱先生守臨漳興學校明禮義以教其郡之士擇士之志于學者置賓賢館以處之楊君士訓字尹叔實與焉豫以諸生從始識君君年尚少已為儕輩所推重户部郎中王君遇剛介少許可獨器君以子妻之豫與王君交最厚知君志行為尤詳已而聞君擢進士第初試吏為福州古田尉再轉為潮州海陽丞福州永福令古田永福又豫鄉之鄰邑也君之政譽益有聞于人會湖廣總領請于朝願得廉靖吏以董軍餉君亦以邑最為諸臺交薦遂以選差監鄂州糧料院未幾聞君歿纍官至宣教郎年五十有八嘉定已卯三月二十有六也將以明年正月壬子葬于漳浦縣永清里官陂之原其孤以豫與君有雅故來請銘所以敘述君之本末者皆豫所親見聞也君之曾祖絳祖宗孟世積厚德至父成大始貢名禮部君醇靜警敏少刻厲自奮處鄉校入太學杜門劬書不為獵涉綴緝務求聖賢遺意而躬行之文公嘗稱其學已知方則其望之亦至矣持身謹恪一語笑不妄發處家內外肅然少孤事祖母孝遇所願欲雖行數十里不憚艱險以求順適其意所不樂一毫不敢有所拂有疾訪醫行禱循陔百匝鄉空悲泣疾瘳乃已既歿執喪盡禮及葬廬于墓左朝夕哀號至毁瘠骨立終喪鬢髮盡白仕于其邑者相與為詩歌以詠其事厚于親族急難困乏竭力賙救之雖功緦之戚必為之制服蔬食朋友貧願稱貸者倒篋豫之無吝色故君之內弟有同居終其身者及君之歿水漿不入口者纍日寫其悲痛之情見之篇什有人所不忍聞者其居官一以寬和為主不為震厲立威名善者扶之豪者柔之人亦感其誠不肅而自化民有爭訟先以禮義曉譬有遂釋所爭而去者至決事姦無所容而曲直咸得其情其治永福留意學校更定祭器修立社稷風雨師壇有以民俗險健為言者君不敢鄙夷其民推誠以待之邑之人士誦君之德不容口有曰公之德量汪乎如不撓之波公之接人溫乎如可愛之日潛心可質之上帝操行不欺乎暗室諸臺亦以愷悌慈祥聽訟平允薦之皆實録也自北鄙兵連民疲轉餉而士不宿飽至舉荆襄兩路軍儲以屬君君亦以忠誠懇篤慨然任其責上下相慶以為得人未踰月君歿行道之人皆為之咨嗟涕下君素廉介至無以為斂總餉者義之帥其僚屬為之具棺櫬備舟車護其喪以歸觀君所以感于人者如此則其歿也不獨為君惜也蓋君資稟既厚而又切于為已之學故其立行無瑕玷而孝道之篤尤人所難及措之事業雖未能大見于世即其已試者充之顧亦何施而不可哉嗚呼習俗之薄久矣不學者無以議為也學焉者工言語事容飾植聲名殆類知道者胸中所存矛戟森列雖父子骨肉間不能盡其道多矣况他人乎况以臨其民乎若君者非古之所謂篤行君子乎君之子七人景亮鄉貢進士次廑為族人後次某餘夭君之教子以孝悌忠信為先其餘利祿未嘗一語及之故其諸子皆篤學謹行克世其家豫既深識君而又參之以師友公論之所推許是宜銘銘曰厚其根其實不蕃流之長不如其源天命靡常定理則存濬其源毋伐其根不在其身在其子孫李知縣墓志銘幹少居里中聞祕閣李公之賢每朔旦必齋宿往造焉公不鄙延之坐語移日凡治身處家事物之應酬古今治亂得失之故隨所扣無倦色其好善如不及其於窮通榮辱之變泊如也公于是老矣後十餘年友人余元一為邑同安稱其主簿之賢不容口問其出則祕閣公之季子也于是始識君又十餘年君以南安丞轉為廬陵丞秩滿調安逺令又以部使者交辟改為龍泉令幹適從宦江西去君治所率不過數舍聞君治行為尤詳又數年君以薦者改秩為令惠之歸善未幾聞君以疾終官舍嘉定已卯七月十九日也君以父任纍官宣教郎享年五十有四祕閣之賢宜有子矣君又真能世其家者幹遊君父子間幾四十年老而歸日求里之賢者與之處如君者不數人而君歿矣明年四月二十有二日葬于侯官縣保安山之原其孤僴述君行實來請銘遂敘其事而銘之君諱大訓字君序其先金陵人國初徙合肥靖康間始入閩今為福州閩縣人五世祖諱先以儒起家擢天聖五年進士第歷官中外所至有聲孫公覺稱其有古循吏風以大中大夫致仕贈光祿大夫先生朝請郎贈朝議大夫諱庭玉庭玉生朝奉郎贈金紫光祿大夫諱彥倫是為君之曾祖與豫章黃太史為文字友彥倫生奉直大夫贈紫金光祿大夫諱雍雍生奉直大夫直祕閣諱士龍君端重警敏弱不好弄居家孝友祕閣公深器之少長篤意學問聞伊洛之學欣然好之得朱文公大學中庸朝夕諦玩非其類不交鄉鄰罕識其面沖淡寡欲若無意于世者至居官則恪意盡瘁勇于敢為薄職卑而冷例求奉檄入幕府簿書斷絶吏緣為姦君洗手據案會計纎悉終日不倦民産登降官賦贏乏無逃者兩丞劇邑南安踵積弊姦豪受民賦與吏相表裏不以入賦日虧民苦追逮君課吏籍其姓名與所受之數按籍以索不擾而辦廬陵歲委官受租前期請囑相攘奪既得與吏為市民苦重征官受惡粟選可委者以屬君君洗手奉職盡革前弊公私便之歲適大旱獄囚淹滯檄君慮之有以洞冦繫者七十餘人君得其正犯十餘人皆伏辜其二十人則為所驅迫餘皆平民官軍掠之以示多獲獄具白之主將捕盜者力爭庭下君與之辨明日復以告爭愈力君正色曰將官殺人軍前則獄官不得與今既付獄是非曲直當聽有司君安得輒爭乎所活五十餘人有尹四者或謂賊將不當釋君辨其非後數日果有執尹四將以至者人方大服洞冦猖熾焚燒兩邑洞連湖廣三路騷然官吏縮手畏遁君往來兵間無虛日萬安通冦境君攝其事烽火屢警君不為動密調義丁戍兵以備之賊不得逞而去郡委官湖南議夾攻之䇿難其人咸謂無以易君者潭帥曹彥約得君大喜偕行討賊迄事始歸洞冦新平龍泉遭焚蕩人心憂疑負固喜亂者尚跳踉山谷間君既去官以辟就職招集流亡一意撫摩蹂踐之地朝廷蠲兩稅君復請寬年限又請于州給錢積榖以備凶荒大軍撤戍君謂不可無備請置隴頭寨以捍外冦留戍兵五百以護縣郭新作縣門示以間暇人情始安青草明坑二洞素桀驁或請𠞰之以息後患君曰獨不可理諭乎招其酋長十餘人或戒以勿往皆曰李知縣非欺人者既至為具勞之諭以禍福皆泣謝誓不敢他志于是籍鄉丁明保伍使聽命隅官又擇其有信義能帥衆者為都隅官以統之有警則互相防守不率則更相糾察衆皆歡呼而去相與勒石于石筍峯頌君德以明不敢有負自是鄰邑連歲竊發以此曹不從亂皆莫敢入縣境君于理煩剸劇如此至于歸善事簡俗醇治以安靜以民未知禮鬭狠告訐形于親族衣冠喪葬無復品節為文戒之民俗自化君既簡追呼罷科抑民亦田里相安訟獄衰息可以卧治而君歿矣簿書財榖獄訟甲兵俗吏誇之以為能而儒生所不道禮樂教化儒生喜談以為名髙而俗吏見為迂濶事不根理理不該事而數千年間天下無善治若君者倥偬則力事功間暇則修禮教儒而不腐吏而不俗此豈常情所能及哉君所至以廉勤整辦稱其在江西臺府交薦君自處恬然未嘗曲意阿世故功多而報嗇其于財利未嘗秋毫經意故其歿也以田易地而後能葬嗚呼是可謂賢者也君娶陳氏子三人僴價侹皆業進士女三人長適浙漕進士林夢庚次適迪功郎汀州寧化縣尉林光謙次在室銘曰業紹于家學修于身行孚于友利加于民何辜于天有志莫伸聚散倐忽如空中塵顔夭跖夀孰暴孰仁不亡者存視此堅珉族叔處士墓志銘黃氏居福州城東三百年釐而為三𣲖而為六後有他徙者自同慶而下子孫存者無慮四十人挾策為儒者纍纍不絶紹興間察院公始以篤行直道清名髙節著聞當世子宣教君杲通直君東亦皆孝友廉潔挺挺有父風又六七十年後路之黃諱叔毖者生先覺先覺生俊卿俊卿生公諱凱字舜舉獨能以勤儉大其家苦學守禮法教其子南金宗尹宗傳皆雅飭為良子弟南金以弱冠預鄉貢宗尹亦繼入太學一門之盛庶幾哉察院公之遺事矣嘉定庚辰十月丁丑公微疾終于正寢初娶何氏後娶陳氏子三人女一人婚嫁皆未畢而公之年僅五十有二乃不及享其盛大之福識與不識無不為公流涕也命之修短懸于天矣勤儉苦學守禮法者人也一族之間三百年之久其盛不過再世皆以勤儉苦學守禮法得之則公之行信可書公之子弟與凡吾之族人皆知以公為法則吾宗之大未有艾也其年十二月壬午葬公於桑溪艮山之原其族幹為之志其墓而系之以銘家之興替不于其家于其身天之報施不于其天于其人謂豫不信視此堅珉林處士墓志銘龍門三灘之勝清邃雄特著于永福有隱君子諱仁澤字德俊居之篤行逺識信于鄉之人大理卿黃公景説國子博士杜公申皆鄉鄰之望嚴介少許可道君之賢亹亹不絶口幹嘗欲禮于其廬未能也間與其弟若子遊則如見君焉投老來歸卧病田里不復有志于當世之賢豪而君亦已為古人矣其子宋偉踵門泣且拜曰葬有日願請銘考其弟羽所述之狀則君奉親以孝聞事寡嫂如母撫子孫極其慈視兄之子若已子樂賓客喜施豫處鄉閭以和遇童稚如成人田夫野叟如敵已樂君之德斂袵而稱道之者內外無間言家故多資中更變故簞瓢屢空人不能堪君處之裕如也及其子入太學升舍選疲精竭力營菽水以進其親有餘矣君不為喜厲其子以學尤嚴以切自號龍門牧翁放懷山水之間賓朋觴詠終日翛然有遺世獨立之意利害得喪與夫橫逆之來一以虛舟視之不為毫髮自纍忽一日晨起命家人具酒肴集羣從語以死生旦晝之常若相訣别焉者于是治楄柎相丘隧舉酒屬客笑傲其旁觀其神彩無異平日後數月以疾終于正寢蓋君之兄仁實嘗受業于晦菴朱文公退而講習如師友厭棄科舉刻意聖賢之學嘉言善行沉潛玩繹終其身不少懈則君之自得周旋乎日用之間傲睨乎塵俗之表其以是歟豫嘗疾夫世之學者事口耳飾容貌若可觀矣而實行不若市人其謹畏自將者僅足寡過而貧富窮通榮辱死生之變鮮不悖繆喪其守者則區區細行亦何足道哉况于不學者哉若君者可謂篤行逺識之君子矣君之曾祖校祖覺民父必先世積厚德母黃氏外祖純夫以文章行誼著于州里娶黃氏先君卒三十年子男女各一人男宋偉女適進士黃淵孫男女二人君之生以紹興壬申其歿以嘉定已卯十月明年十月壬戌葬于東山之麓銘之曰龍門之彎昔所遊兮東山之麓今所休兮生死旦晝等一漚兮與化俱逝將安求兮俯視斯世捃若囚兮何千萬年樂斯丘兮朱夫人墓表賜冠帔夫人朱氏紹興丞相魏國公之季女常德臨汀郡侯之女弟是為某官陳公之婦都昌令元平之妻子七人女三人享年若干以慶元五年某月歿于福州所居之小寢元平方調官上京聞其喪哭之甚哀將以是年某月葬于某鄉某山之原元平三過豫而言曰此吾賢配也丞相魏國公酷愛之吾從宦遊四方坐曹不少暇凡于裘葛瑣碎歲時薦享賓客問遺得以無闕漏者惟夫人是賴吾之子非夫人所生者凡三人夫人撫之無毫髮異意飲食衣服必先其夫若子不足則啜空器衣敝襦泊如也夫少為人子長為人妻又為人母能若是亦可以為賢矣乎今臨汀公既為之志其壙矣吾與子交最久且厚吾猶不忍吾妻之泯泯無聞也子盍有以表其墓乎余惟婦人之行不聞于外知夫人之賢者莫若夫與兄臨汀公既為之志元平復與豫言如是豫尚何言哉豫與元平交且二十年元平慷慨奇男子也生平視世事不如意輒上書闕下論得失斥公卿賢不肖立部使者郡太守庭下辨事可否刺口斥言不少忌以是官不遂家故豐厚坐是反困約豫觀元平之所為與其所遇如此意其妻孥當甚苦之然賓客過元平之家輒笑語移日其杯勺殽核皆若素備以待元平不時之需其飲饌陳設必精以潔其庭宇灑掃必肅以嚴其奴𨽻趨走執事惟謹大不類元平之為人朋友患難雖甚乏輒罄囊以賙之升堂琴瑟和鳴之聲聞于外豫於此有以見元平夫人之賢矣婦人之行莫大于順其夫由貴盛而處窮約雖男子有不能堪者今夫人乃能與元平相安如是是可不謂賢乎元平所與朋友見元平之豪俊不可羈束鮮不病之視元平之官不遂且貧鮮不姍且笑則元平之友反不如元平之妻者多矣禍福窮通之來要有定理若其冒歿勢利使其妻妾相訕于中庭孰若姑守所志而能使其室家相安如元平之家乎故豫于夫人不惟有以見其行而又有以厲當世不惟有以見夫人之賢而又有以見元平之能型其家也是為表仲兄知縣墓表慶元六年五月十有一日通直郎知撫州樂安縣事黃君東字仁卿至撫州之一日以疾卒于郡學之官舍教授劉君瑱發其篋視之金無餘藏問之左右則君未至州而糧已終矣劉君亟取其家器皿質金買棺製衣以襲以斂遍走部使者臺郡寮屬以告而賙之丞相廬陵周公以幣來賻旁縣他郡聞君名者雖非雅故亦交致禮然後君之喪與其孤幼始歸達于福州嘉泰二年秋九月葬于懷安縣桃枝山保福僧寺之東北隅君之家世族系見于晦菴朱先生所志御史公之墓君公之次子也遺澤補將仕郎歷任迪功郎監吉州酒務全州法曹關升從政郎南劎州沙縣丞轉文林郎監衢州稅務轉承直郎改秩通直郎知吉州萬安縣丁內艱服闋受今任君天資警敏而簡默遲重呐然如不能言者少遊鄉校多為先輩所稱道屬文賦詩思致清古遇事無巨細咸研精極思其所規畫人莫測其意及臻厥成往往歎其不能易也故其居鄉親故事有難理者必即君謀之及當官雖管庫之微而部使者郡太守民訟難剖者悉以委君同寮聨事者文書非君莫敢決間遇詰責率賴君以免故君之所涖輒有聲稱而既去無不思之者廉介之行人所難及常俸之外凡以利得者皆卻不受官之雜金苦敷諸吏以給公用者一切屏之每之官警盜之卒非法所應役者遣之雇夫之金非法所應用者歸之既終任供帳之屬一毫不以私其家故相番陽趙公知君之貧其帥閩也屬君校書而月饋之謝不可則受什之一二請君攝事鄉邑辭曰有先人之訓不敢違居官辦職不為表襮以求人知所至未嘗以姓名通諸司剛介自持雖州縣長吏不敢溷以私事所當爭則脅以斥逐不顧也以是官既不達而家益貧然君處之如未嘗仕衣食疏糲妻孥以下有不能堪者築室先壠之側仕巳則居焉日與田夫野老出入桑麻之間頗有終焉之志以家事為纍未能也御史公既歿家無餘財田畝之入不足支數月君奉太夫人撫弟妹三十餘年之中米鹽瑣細靡不躬歷黽勉有無未嘗告憊以故太夫人之意甚適而弟妹亦皆賴以有立俸入之餘銖寸積纍嫁女弟從女弟及弟之女凡三人至遣弟之女則囊篋絲縷無餘矣嗚呼以君之才識豈不足以致富貴至于貧困者取于人者廉也以君之簡儉縱不至富貴亦豈不足自給至于死無以為斂且無以為歸者施于弟妹者厚也無所利而為善古人猶難之若夫顛連困躓以身徇義沒齒而無悔視古有道之士見善明而用心剛者何如也君娶延平張氏有賢德事姑孝處內外以和寧能承君之意君初無子得張氏女撫養之復以叔弟之子為後君歿前三歲有子安孫既歿有遺腹子曰寧孫惟吾家自御史公潔廉慈愛惠利著明當世號稱名卿伯兄杲亦以才氣超逸克世其家今君所自植立又如此三子皆幼而二弟亦巳老矣大懼君之行泯泯無傳將無以著吾家世澤之美而昭先訓之無窮也遂志其梗槩如此以表諸墓而示後人使有考也季弟迪功郎監嘉興府崇德縣尸部石門犒賞酒庫幹述勉齋集卷三十八
