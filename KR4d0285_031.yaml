body:
  text: 勉齋集巻三十一宋黄榦撰公狀漢陽軍管下賑荒條件一所委官分官鄉村下項西倪鳳棲請知縣長樂北豐樂鋸壠三村請司理漢陽玉山西張平麥山請司法沌口山陽委沌口李監鎮南豐樂沙港上沙港下委通濟李監鎮崇仁陳符山口上下梅城相隂委請縣尉一請所委官先遍行所管鄉分相度合行事宜見得人家户口曲折一帖縣告示所管鄉分保正副聽從所委官差使一請逐鄉畵出地圖山川道路各注人户於路之傍人能自食者用紅圈不能自食合糶官米者用黒圏又於能自食之中有粟可糴以備賑糶者用黄圈又於不能自食之中亦無錢糴米者用白圈各開其數目一逐鄉之中各以比近置之保伍五家爲一小甲置小甲首一名五小甲爲一大甲置大甲首一名四大甲爲一都置一都正合一鄉都分共幾都通置一鄉官總一鄉賑糶之紀綱都正掌百家糶米之事一逐鄉細算合糴官米者幾家每家日三升且以八箇月爲準每月合費若干米本鄉之内積蓄之家可以收糴出糶者若干碩其餘欠米若干碩合作如何措置收糴一遇糴到米即寄藏于都正之家自九月初一日爲始給厯付人户每旬糴米三㪷一合賑濟者具數申本軍自行措置又賑濟條目一漢陽縣二十村分爲四隅五村爲一隅每隅請見任官一人主之使各徧走村落幹管救荒之事見任官不足委請寄居一每村各畫一圖要見山水道路人戸居止各置一籍抄劄人戸姓名及其家藝業一每村選稅戸一人爲鄉官鄉官所掌一鄉之事五家爲一小甲五小甲爲一大甲四大甲爲一都選一人爲都正掌百家之事鄉官都正皆擇稅戸有物力者爲之一以各村人戸分爲四等以能自食而又有餘粟可備勸糶爲甲戸以無可勸糶而能自食者為乙戸以不能自食而籍官中賑糶者爲丙戸以官中雖有粟出糴而其人無錢可糴者爲丁戸一諸鄉勸到米榖具到數目官司先約度鄉里價例支價錢還之而以米榖寄于其家責其罪狀不得移動然後紐算勸到米榖及本鄉合糴人戸多寡有餘則移之他鄉不足則官移粟補之一勸糶之米官司先以錢償之即寄于糶米之家使本村人就糶如地理濶逺官司雇人搬擔散寄鄉官或都正之家使人户得以就糶一甲乙等人户官司可以不問丙户給厯自十一月初一日爲始至明年三月終每户合糶三碩每月糶六㪷其糶以每旬二㪷爲率或一次或三五次就糶合從其便一丁户乃是鰥寡疾病不能自濟之家即自九月初一日爲始官司先支常平米寄之都正之家量其户之多寡每月給米三㪷給厯就請每旬以一㪷爲率一分布既定所差之官每月廵視而糶官米之家有不用官司升㪷或雜以糠碎及糶不如數者許人户陳訴當酌量懲治其能用心助官司賑糶者當薄賞之一所糶之米毎月㸔拘收錢逐旋拘收皆官司遣人搬運不以勞寄糶之家申省糴樁積米照對本軍前任知軍孫承議王朝奉兩任之内各糴下樁積米一萬碩已備申朝省訖榦自去年十一月交割以後竊見粒米狼戻頗亦傷農而備邊急務以食爲重古人三年必有一年之蓄九年必有三年之蓄則守土之官任任相承皆當以儲蓄爲念榦遂逐急支撥錢二萬五千貫㑹子委本軍知錄鄭從政司法梅從政漢陽知縣陳儒林多方收糶務要合前收糴數目照得上項糴米初非自爲經畫乃是循襲前兩政已成規模其錢亦非别有措置乃是冬月郡計捐辦今來所糴通前政共計三萬碩本是州郡合行之事但恐歲月浸久貪官汚吏妄有移用欲乞鈞慈照孫承議王朝奉例劄下本軍遵守施行申省樁米八千碩照對本軍管内多是湖地即非産米之地每遇水旱公私窘匱甚于他郡前政孫知軍初始創小坻倉積米一萬石其次王知軍從右創廣僃倉積米一萬碩榦到任之初見得兩政措置委是長䇿亦竊欲倣效糴米樁積遂就廣僃倉接連起葢兩厫方欲收糴間適値大旱米價踊貴僅樁積到米八千碩並係本軍司法李昕交量收管今來欲將上項米凑前兩政共計二萬八千碩充樁積之數如是本軍欲將上項米支撥賑糶亦合將賑糶到錢令項椿管凖僃向後豐熟日糴米補足不得妄有移用以爲永久之利今來榦巳被奉祠之命只俟申審交割指揮下日即便離任所有倉庫原交割錢物有増無欠今所糴八千碩乃是䟎積出剰之數即非有礙郡計欲乞劄下本軍照應施行小貼子榦照得本軍去歲大旱賑糶百姓每米一㪷糶湖北㑹子四百文昨來申乞將前兩政米二萬碩出糶巳䝉朝廷劄下從所申榦見得孫知軍所糴米已經三年恐日久腐壊遂先將孫知軍所糴米出糶其米委是陳腐遂减作三百五十文湖㑹以便百姓然比之初糴之價每斗亦已増及八十文若向後官吏出糶見管之米或未甚陳腐又須更增四五十文出糶庶幾公私兩便欲乞詳榦所申併賜劄下施行榦照得本軍去歲旱歉自六月内即出糶官米並是本軍自行收糴在城内外并諸鄉共計四萬餘碩已有指準所糶孫知軍米至截日終只糶得六千碩約度向後更將樁積米一萬碩出糶便可接至早禾成熟于二萬八千碩椿積米之内以一萬六千碩出糶價錢亦尚有一萬二千碩米本色見存以此知積貯之䇿誠爲利便併乞鈞照申省豁常平米照對本軍去歲旱歉委是顆粒不收尋常豐熟年分亦是全仰安復州米緣制置司禁米不得出界轉運司復遣人就本軍界内搜捉米船過鄂州本軍愈見狼狽急發郡帑及借過總領所㑹子日夜收糴到米約四萬石漢川縣亦糴萬石自六月以後使行出糶再將孫知軍任内米湊合出糶在城人戸可糶至五月諸鄉人戸可糶至四月所糶之錢復歸之官其間大叚貧乏及他處流移之人並用公庫䟎積到錢救濟約支及二萬貫文又賴同官相與協力一郡之民幸不至流離饑莩亦不敢虧折本軍交割錢物但有常平米約管四千七百五十八碩五斗三升八合九抄一撮本以僃荒凶賑濟之用本軍亦屢承上司文移令發常平米賑濟今開具前後用過常米數目因依下項一本軍年例自十月起支給乞丐米至今年正月終支過一百四十五碩七斗五合乃是每年奉行朝廷仁恤之政即非創例支破一本軍自去年六月措置賑糶分人戸爲甲乙丙丁四等甲戸有稅産乙戸有營運皆不仰賴官司丙戸則給厯與糴官米官米之價減今市價一半丁戸則皆是鰥寡殘疾不能自食之人則支常平米以濟之每家日一升諸鄉及在城自九月爲始至三月終共支過米一千一百五十六碩九斗五升一本軍管内多湖澤荻林湖澤有魚蝦荻林有藤根皆可充饑尋常旱歉之歲安復光黄之民皆輻湊于此旋結茅庵採取以食動數千人然尋常旱歲多是九十月間方來故可以採取至春草既生春農既興而復歸去歲乃是二月以後種不入土四州之人自六月以後便來採取至九十月間魚蝦藤根亦巳竭矣既無以爲食初則鬻子次則賣妻又次則餓死延喘者則㩦持以來坐於譙門之外日不下百餘人皆人形鬼狀去死無幾見之使人蹙額酸鼻不覺涕淚之横流也只得擇其尤甚者逐旋收養給以錢米自去冬至今所收養共二千七百餘人至正月以俊乃爲之區處願歸者給以褁費使之復業其不願者爲之結廬使之營生于是去者半畱者半自此以往更不支給錢米然細計亦共費米一千一十四碩九斗六升五合以上三項通費常平米二千三百一十七碩六斗二升皆是當㕔相貌委是饑餓不能自存者即無虚僞冒請之人今榦巳被奉祠之命旦夕離任所有正月以前支過常平米數須至申聞者申省賑糶日月及米價照得牧守之任撫字爲先饑荒之歲賑糶爲急若坐視不恤則生民必至流離饑死欲給米以濟之則官司亦無緣可辦惟預有儲蓄或逐急收糴然後低價出糶比原價則稍損使境内之民悠然不知旱荒之苦方爲得䇿本軍去歲旱歉全賴前政孫知軍王知軍各有米一萬石榦復于方旱之初就客船糴到米約二萬五千石漢陽縣諸村糴到米一萬五千碩漢川知縣亦糴米一萬餘碩自六月以後即行出糶米目今市價每米一斗糶湖北㑹八百文本軍官米只糶四百文其樁積久者又減其五十由是城之内外及兩縣諸村百姓幸皆安業在城内外米合糶至五月終諸村人戸米各已樁積在鄉下巳約糶至三月終尚恐鄉下二麥未熟人戸艱食再展一月至四月終本軍所椿積米除已發在諸鄉外自正月終尚有二萬二千碩見在城之内外每月合糶米一千四百碩自二月至五月終合管米五千六百碩除漢川縣係知縣自行措置外漢陽縣諸村巳有米椿在鄉下可糶至三月終再展一月合管米四千碩于二萬二千碩之中撥兩項米約一萬碩則鄉下之民可接至二麥成熟城内外之民可接至早禾成熟不至有流離餓死之患矣今榦自知不才多病丐祠得請旦夕離任後政知軍必能加意存恤今合行開具僃申申省築安慶城安慶不可無城則安慶之城誠不可不築除已一面將官錢收買木石興工外欲望鈞慈特賜敷奏朝廷據榦所陳行下本州照應施行不勝千里生靈之幸小貼子榦竊聞金人被逼妄開邊釁目今雨水固未可慮秋冬之間未保寧静欲望鈞慈早賜垂念容榦與此邦之人協力創築以期鞏固數月之間或可辦集併乞鈞照榦又有過慮不敢不申禀者嘗聞安豐武定軍官言開禧丙寅淮人避寇千百為羣沿途刼掠直至桐城縣意欲自舒城渡江幸而制司招人充忠義軍此曹方退而就招不然則事之可慮豈特一安慶哉安慶五縣多有港汊可通大江桐城宿松太湖三縣皆是邊山山多巨木人多積粟使人據舒城食所積之粟以為糧伐所産之木以為筏出所適之港以渡江其為利害豈細故哉使其有城則不敢頓兵堅城之下矣此項事干利害欲乞宻之申朝省以安慶築城乞減曹司行下和糶數照㑹本府昨準朝省指揮許令創築城壁自今年五月以來日役六七千人皆是權兌借别色樁管米支遣目今見措置收糴米二萬石餘補還又準江淮制置使司行下糴米一萬五千石又本府年例糴一萬石賑糶在市百姓今來又準轉運司僃奉聖㫖行下本府糴七萬石實緣本府今載管屬多有缺雨不曾布挿去處田多旱損委實百姓無所從出本府除已抱認本路轉運司和糴米五萬石措置收糴外欲望朝廷以本府創築城壁興此大役特加矜恤行下本路轉運司免糴其餘二萬石不勝一郡官吏生靈之幸申轉運司乞減和糴數今月十二日準轉運使衙減免本府和糴米一萬石只糴六萬石仰仞使臺存恤小郡之意千里士民皆知感戴本府昨認五萬石皆是分下諸縣勸諭人戸分糶闕申轉運司乞免起夫運糧闕本府亦不敢辭今詳安豐軍申制司制司又行下使司使司又行下本府則安豐軍所申乃是初六七間文字今已十有餘日安豐軍宴然無他此是但聞光州警急爲此張皇欲乞使司軫念本府民户困于差役且行下廬州徑自差夫逐旋搬運不勝一郡生靈之幸榦伏䝉使帖行下催夫運糧已嘗具申屬以乍到事冗未及親布禀劄乃䝉批示不勝恐悚兼前所申亦有未盡利害今起一夫例科稅户不能自行例雇鄉民鄉民乗稅户之急需數十千巳重爲人户之苦官司又每夫日給米二升半官㑹百文若起合肥安豐之人則往返只四百里若起安慶之人則往返一千二百里此其勞逸巳爭兩倍官司差人一往一返計十五日爲米三斗七升五合又一貫五百官㑹可糴米六斗四升共該米一石一升五合官司費一石一升五合僅可運七斗之米則公私俱受其害更望台慈照榦所申今安豐既帖然則起六安一縣之夫亦以無害倘䝉矜念不勝一郡百姓之幸昨準使帖起懐寧桐城兩縣夫搬運廬州米一萬石至安豐軍巳具兩利害因依申使臺訖今又準使帖再起太湖宿松望江三縣人夫運廬州米一萬五千石至安豐軍委是重擾人戸事屬利害欲乞照前所申差廬州安豐人夫自行逐旋搬運數里不多則民力不至重困比之差本府人夫相去三倍事體不同兼本府素無城壁見今燒磚鑿石收買竹木未免騷動百姓邊事不寧不敢乞差大軍興築其勢又只得勸諭百姓雇募執役巳具築城因依申使司外併乞照所申以本府興大役動衆一切差科特與蠲免不勝一郡生靈之幸昨準使帖差本府五縣人夫運廬州米二萬五千石至安豐軍本府實以民戸貧困道路遥逺申乞免差䝉使司特與減免一萬石只運一萬五千石闔郡百姓流涕感激自當即便敷差起發實緣本府素無城壁目即興築計料除燒甎鑿石外尚役三百萬工目今邊事不寧不敢申朝廷乞差大軍只得勸諭百姓雇募差使今若又使之運外州之粮則人不得寧城不得築矣闕申制司行以安慶府催包砌城壁事宜一包砌城壁全藉甎灰安慶府寺觀最多地田山林大半皆屬寺觀僧道常住優厚亦皆肯出力爲官司辦事遂委僧道分頭燒辦青甎支給柴科工食錢米並與私家價數一同但僧道别無用心措置皆有方法巳約定甎三百餘萬片竊慮其間有鼓倡不肯用心并苟簡蔑裂合從本府勒罷住持其用心最勤者合從本府陞差上刹庶幾各知勸戒早得辦集一向来商議包砌自上至下各用甎厚二寸除女牆外城高二丈自下而上甎約百片每片殺入八分自下而上共殺八尺四重之甎又皆横直相交謂之丁撘言其一横一直如丁字然多用石灰澆灌既乾之後合爲一片牢不可破今恐倡爲苟簡之說減省甎數并石灰稀少利于速成不計久逺合請同官士友並照原包砌法以爲無窮之利一興築包砌城壁全得池州壕寨官尹椿并李都統申之薦到壕寨官王先二人之力而尹椿尤爲精巧爲諸軍壕寨之所推服經涉寒暑勞苦之甚本府雖增犒設終未足以酧其勞令候包砌城壁了日欲從本府申乞劄下本軍與陞擢差遣本府亦合數支犒賞酒食俾之激勸一本府昨委外四縣燒甎約給百餘萬只緣水路遙逺無力撑載尋常諸州築城例差軍船載甎至有往復千餘里者今四縣水路逺者不過二三百里昨申使司乞差池江兩軍船各二隻分載四縣之甎其江州既以無船爲詞池州雖差到船僅能載及一次郤乃遷延日月又復百般需索載甎之費與燒甎等又且有桀驁之狀難以使令今來欲乞劄下池州專差兩員軍官部轄搬運四縣城甎除本軍月有請受外本府照例量行支犒不許過有需索仍不許遷延歲月如更似前乞從本府申舉懲治施行右件申述如前欲乞制置使司劄下本府並從所述施行毋致違慢伏乞照㑹申省再丐祠照對榦昨任安慶府準省劄差充江淮制置司叅議官兼管安慶府辭免不允除巳被受訖續準省劄依舊江淮制置司叅議官兼知和州榦以年老多病使之更易一郡倍費區處心力凋瘁難以支吾巳嘗具狀控免尋準省劄未䝉俞允所有省劄未敢祗受除寄留制置司庫訖屬以制司廵歴淮壖令隨至維揚邊事方殷未敢控請今來敵騎已退在榦即非辭難實以行年六十有七生平艱苦既老尤衰不惟郡寄難以復行管幹所有叅議職事委亦無所禆益緣榦小官不敢屢干朝省欲乞察其衰莫備申朝廷特與敷奏改畀禄祠歸安田里以畢餘生不至有誤使令須至申聞者辭依舊知安慶府申省照對榦今月十九日準江淮制置使司牒準備尚書省劄于四月十三日三省同奉聖㫖黄榦依舊知安慶府昨于二月内準省劄已將安慶府職事交與通判董朝奉訖所有和州職事實以年老多病若又更易一郡事緒更端倍費區處兩上丐祠之請意謂必䝉俞允今準上項指揮仰見朝廷恩遇之意一介么麽尚復何言竊念辭受進退立身大節苟或失宜不惟于心不安亦且必招謗議古之仕者辭尊居卑辭富居貧進必以禮退必以義榦昨䝉改知和州已嘗辭免今復再知安慶乃是辭卑居尊辭貧居富自離安慶巳踰兩月迎新送故事體已定官吏百姓各已解體今乃驅去復還進退之間全無禮義懐利以事上枉巳而直人大節既虧清議可畏此榦雖感朝廷恩遇至于銘鏤肌骨然亦不忍以垂絶之年自壊名節將無以見師友于地下欲望朝廷檢㑹榦兩次丐祠狀特賜敷奏改畀祠祿庶幾保全晚節以畢餘生實被大造生成之賜榦既被朝命不敢自安兼痼疾發動不可支吾除已一面起發前往江池間就醫聽候指揮五月六日三省同奉聖㫖不允再辭依舊兼知安慶府申省照對榦昨準省劄改知和州令將安慶府職事交與以次官赴制司禀議至金陵巳經兩月制叅已非其所長且原是外郡遙領不敢輙行供職和州又以老病若復易一郡事緒更端倍費區處不敢祗赴安慶府則已係解罷之人既辭和州若再適安慶則是辭卑居尊辭貧居富尤不可復往三者皆非置身之地只得控吿朝廷力上奉祠之請謂必䝉俞允今準省劄令依舊知安慶府竊念榦稟資介僻處分孤危平居無事易遭謗議若非朝廷曲加保全何以自免今既辭和州復適安慶人言必曰安慶藩府故不肯舍又曰包砌城壁可希功賞成命未頒人巳籍籍生平自守亷隅不敢望圖榮貴今年幾七十乃自䧟于寡亷鮮恥之地朝廷愛䕶人物當亦不忍使之至此竊意朝論必以包砌城壁爲念榦自未離安慶之前已爲區處造甎四百餘萬城門已砌城壕巳開防城器具巳一面置造同官既各分頭管幹又選請寄居士人忠實可託者十有二人每人分百二十丈監視朝至暮歸如已私事不過今秋須可畢工朝廷所給錢米足可支遣不須别作經營若再付之權官亦可不勞而辦况潛皖之勝兩淮甲郡又皆逰官名流之所欲得政不必衰病無能之人巳嘗去官又復再往蠅營狗苟驅去復還無補事功徒取譏訕兼榦一生艱苦既老尤衰開禧丙寅往來兵間因得奇疾今若思慮稍過痼疾又復發動形體支離不堪從官故敢不避斧銊之誅投誠造化欲乞特爲敷奏改畀祠祿俾得歸老山林實荷生成之賜三辭依舊知安慶府申省照對榦昨準省劄再知安慶府榦不避誅譴乞改畀祠祿仍以君命之嚴未敢退安田里屬以痼疾發動前至江州就醫今月十八日據安慶府差人賫到省劄一道乃知螻蟻小臣言詞拙訥尚未足以感動天聽竊惟朝廷之意葢以安慶乃是舊治可以無嫌又城壁之役包砌未畢故欲令其復舊任仰見朝廷恩御之隆憫念元元之意然安慶藩府歴陽列郡人所共知榦以老且病既不能仕歴陽重難之寄今再除安慶乃從而受之是辭小而受大豈復有亷恥之風哉生平狷介與世寡合動遭忌嫉今乃自䧟于無亷恥之地豈能免當世之清議砌城一事見計置燒甎約可得四百萬片安慶之人懲往年張㓂之變喜于得城以自固寓公士友之忠實可託如太學生陳榕者十有餘人各願自分料數提督監視朝至暮歸如治私事權郡通判董永之公亷畏謹少見其比懐寧知縣趙善部亦能勤敏專任其責自教授以下無不竭力以董其事胥吏無所容其姦工役無所逃其役不過今冬可見次第政不必勤朝廷顧慮上設禮義亷恥以御其臣則下亦以禮義亷恥而事其上賈誼以爲聖人有金城者此也今乃使榦有辭小受大寡亷鮮恥之過則城非不高池非不㴱又豈能責人死守如金城之固哉不惟自欺其立身之節又避再三之瀆也兼榦開禧兵興往來五關僃嘗險阻因得痼疾目今發動醫治未愈加以痰喘不可支吾欲望鈞慈特與敷奏畀以祠廩放歸田里實荷隆天厚地之賜所有省劄見寄留江州軍資庫辭免奏事指揮申省照對六月十六日江州發到省劄一道六月八日三省同奉聖㫖黄榦令赴行在奏事者榦螻蟻小臣比䝉聖恩改差和州固嘗以衰病辭矣繼準指揮再知安慶府又復引嫌控免揆其方命合即嚴誅天地優容不加之罪更叨收召俾造闕庭自顧何人乃䝉朝廷委曲注意如此恭聞恩命感極流涕榦素無朝蹟遽對清光平生之榮莫大于此所當恪思不俟駕之誼疾趨前進豈宜尚有陳請然人臣之誼敢懐隱情葢有不容不屢瀆者榦疎庸拙直實無能可取公朝過聽引而進之豈非以其涉歴州縣粗知世務或能罄瀝愚管有補聖化萬分之一耶榦爲貧所驅出從吏役不過律巳奉法恪守常程初無奇䇿何足上禆日月之明而性資狷介與世多忤每懐憂畏但思退藏今復景廹頽齡身抱痼疾形神衰憊智慮荒落倘又不自量度冒昧而前非特術業空疎無以稱塞明照當退而進有乖名教徒招物論恐孤朝廷平日保全之意欲望鈞慈特賜敷奏收還成命改畀祠祿使得退安愚分實荷造化始終生成之賜須至申聞者伏候指揮七月十二日三省同奉聖㫖不允辭知潮州申省照對榦九月十一日準省劄二道三省同奉聖㫖林士衡除廣東提刑吳季員除廣東提舉趙汝倣除提舉廣南市舶黄榦差知潮州並塡見闕候任滿前來奏事令所在州軍差撥兵級三十人速疾起發至任兵級逐州更替遇接人到日止具已起發及到任月日申尚書省榦官卑人微不應辭免緣有悃愊須合控聞伏念榦碌碌常才無以逾人公朝過聽㧞擢超躐皆出望外奉祠來歸養疴待盡潮爲佳郡且復便家仰戴簡記使令之意榦頃以奔走州縣不避勞苦遂得喘𠻳之疾歲久日深春夏以來腰腹之間忽加痞結坐臥常多於行立飲食毎減於藥餌扶曳上道必至顚踣兼聞潮陽闕守巳久濡滯日月深恐廢事欲望朝廷察其誠實特賜敷奏亟差賢守以惠一方使榦補滿祠祿優游餘年實出君父生成之賜所有省劄未敢祗受除已寄留福州軍資庫外伏候指揮十月七日三省同奉聖㫖不允仍依已降指揮疾速起發至任再辭知潮州申省照㑹榦九月十一日準省劄差知潮州榦嘗以老病申乞敷奏寢免恩命十月二十一日復準省劄奉聖㫖不允仍依已降指揮疾速起發至任者榦螻蟻小臣不當再三申瀆上恩隆重便合承命疾趨實緣疾病沉痼難以支吾向者聞命之初驚恐昏憒拙于敷陳以致誠意未孚復降促行之㫖乞念榦喘𠻳宿疾已八九年氣息日衰病勢加甚今夏復于腰腹之間結爲瘕塊上下攻擊痛楚難堪行動寢處常須擁䕶呻吟困瘁食少肌羸自恐大期將至豈堪復走道途若更郡務縈心立見顚仆上負聖恩下速官謗欲望朝廷察此曲衷之請貰其方命之誅特與敷奏追寢成命若䝉矜憐貧病更與陶鑄宫廟差遣一次以活餘生實荷生成之施所有省劄見寄留福州軍資庫伏候指揮十二月十七日三省同奉聖㫖依所乞差主管亳州明道宫任便居住新除知安慶府申省辭免照對榦準省劄十二月十六日三省同奉聖㫖黄榦差知安慶府塡見闕令所差州軍差撥兵級三十人津發限五日前去至任候任滿前來奏事兵級逐州更替遇接人到日止仍具已離起及到任月日申尚書省劄付榦照㑹者伏念榦螻蟻小臣便合聞命疾趨仰酧眷遇不應敢違近制尚有控辭實以榦極陋至愚無足比數遭逢聖世誤被使令作縣一年而除倅爲倅一年而予郡越去故常極爲起躐而榦稟資狷狹賦分奇窮拙于奉承動多齟齬但知悔艾甘就沉淪苟罪戾之或逃已爲大幸而恩寵之㳫至委實難勝衆交非妄孤蹤難免若不控投君父必至自速譴訶况安慶爲郡實今重地付之庸繆衰瘁之人責以保障蕃宣之效恐辜委寄倍費生成欲望朝廷特賜敷奏追寢成命容榦仍舊祠祿庶安愚分所有省劄未敢祗受除已寄留福州軍資庫外謹具申尚書省伏候指揮正月二十二日三省同奉聖㫖不允勉齋集巻三十一
