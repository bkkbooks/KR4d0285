body:
  text: 勉齋集巻二十六宋黄榦撰策問時務策問問天道運於上人事修於下假天道以紀人事者莫大於建元所以備三才大一統繫萬事而詔來世也然考之往古按之當今其為說不一而其為道不同也元之為義古未有也三傳興而索春秋於一字之間亦曰國君之始年耳漢儒宗之乃曰辭之所謂大又曰法五始之要其意則曰示大始而欲正本也是果夫子之意耶古之所謂年者以嵗之登而為言夫子作春秋而嵗之登者曰有年左氏述當時之言不可以五稔盖此意也然唐虞夏皆曰載商獨曰祀至周而後曰年亦豈無義耶三王之道何其異指哉秦漢以前有初即位之元而未有所謂改元也文景之世有所謂後元中元而元之為號猶未至於紛紛而不一也自時厥後或以事名或以功名或以瑞名名之不同其孰可取乎或頻年而輒改或累年而一改或數十年而不改改之不同其孰可法乎王事之大體當世之急務果何取於此二帝三王之意其亦有所合乎今聖天子嗣登寳位六年於兹乃􅍦有取於漢之武帝與夫章聖皇帝之故事嘉泰之名以幸天下德至渥也亨嘉通泰之義諸君講之熟矣其鋪張揚厲以侈當世之盛典與夫古今不一之說不同之道其悉言之毋畧問董子曰今之天下亦古之天下以今觀古何其不然耶直道而行者此民也今也德色而誶語反唇而相稽成人有德者此士也今也隨俗以敗業竊竄以規利退食自公者此吏也今也舞文以繩下狥私而背公豈向也善而今也惡向易治而今難化耶何其俗之戾也謂化有未至耶聖天子恭儉元黙無愧於古矣謂法有未宻耶國家法令明具無隙可乘矣謂令有未明耶詔㫖之下諄復詳悉如見肺肝矣而其治效茫如捕風甚至建一議造一物事往往倡之而不應為之而無成理財之法至析秋毫而財終不可豐養兵之費如奉驕子而兵終不可强邊陲之備禦未固祖宗之境土未復雷霆之異地震之變與夫淮甸饑旱之灾所以上勤聖主之宵旰下貽廷臣之隱思欲起而更新之乃以是嵗之春特命改元以庶幾亨嘉通泰之治猗與休哉士生斯時何其幸耶風俗之未美教令之未孚事功之未舉灾變之未銷當必有說以處此以日進於亨嘉通泰之實其悉陳之有司將以復於上問任司牧之寄者曰君任輔弼之責者曰相君相同心一體以階天下之治者也輔相之責豈不甚重哉姚崇以十事說天子論者非之嗟夫崇之慮亦深矣宰相無所不統古所謂百揆云者豈得不歴數而預防之耶傅說旦胥靡而暮輔相干戈甲胄刑賞祭祀未嘗不歴歴為其君言之也或者乃曰宰相不親細務此又何說耶是故旁求俊彦宰相責也而後世乃有除吏盡未之嫌九職九賦冢宰責也而後世乃有問之廷尉之語獄者生民之命天子所與三公九卿坐於槐棘之間而聽焉者也而閱訟牒或者以為失體然則又將孰從耶恭惟聖天子嗣登大寳七年於兹擢用二三大臣委之以政兹者親灑宸翰賜之書之說命詩之天保易之泰卦其相與之意可謂至矣然求之今日則國是之未定也風俗之未醇也文武之臣尚未能副朝廷之用也下至於獄訟之未清簿書期㑹未能不稽違則廟堂之上亦豈得不深思熟慮以副吾君眷倚之意乎黷於祭祀一語而無豐於昵尚不能不頼於祖巳之訓則君臣之際豈不甚難哉夫以前數者之弊當聖賢相逢之日更革而作新之又豈無其道耶酌古人大臣之體明今日大臣之任其悉言之以禆廟堂之末議擬難策問問易大傳曰河出圖洛出書聖人則之畫八卦者則河圖叙九疇者則洛書非人之所能為也蓋有自然之象數存焉以今考之河圖自一至十以備五行生成之數入卦以竒偶錯綜而成天地山澤雷風水火之象二者乃不相類何耶至周重之而六十四卦三百八十四爻之義始備其亦有本於河圖之數否耶或曰自庖犧神農黄帝堯舜制器尚象而重卦之名巳著則又安知非伏羲授圖而遂重耶其曰文者又果何說也洛書自一至九縱横十五亦不過備五行生成之數而巳􅍦不可為卦而乃為疇何耶九疇之叙自五行以至六極亦自一至九以次列之耳亦何以知其九數之内遂具九疇之義耶或曰赤文綠字巳見於神龜之所負箕子從而演之耳其信然耶然則所謂則之者終亦未有見其必然也易本河圖範本洛書猶有可疑者則太元以擬易潜虚以擬元學者尤不可以不考也方州郡家表賛以三三相生而成太元氣體性名行命以五行相錯而成潜虚固不可謂非自然之象數也以兩賛準曰不滿則加踦贏二賛以足之以一變準一日有餘則元餘齊不變以合之天地之間惟土取數為最多而在物為最均也九賛之位土於五行特居其半名圖之布土居四維多寡不齊其義安在易之六爻即卦之六畫也四重而為九賛二體而為七變其亦有說乎易卦之名因畫起義也八十一家五十五行亦皆然乎太元之書法天運以起厯自甲子歴二十七而得甲辰又歴二十七而得甲申又歴二十七而復得甲子其合於章蔀統元之數亦巧矣謂日起於牽牛者其天度為何如潜虚之書於人事尤惓惓焉祖於虚生於氣以成體體以受性性以辨名名以立行行以俟命此其著書之序也自詘一以至於詘四得無牽合之病耶至其揲蓍之策或分或掛以决吉凶休咎之變者在易為大衍在範為稽疑在太元潜虚亦皆有法焉其孰得孰失耶四書之作本於天地而備於聖賢是必有奥義焉幸詳言之毋畧問仰以觀於天文俯以察於地理易之為書何預於天文地理之事耶上律天時下襲水土夫子所以律而襲之者又果何事也古之聖人其於幽明之故必有深察黙悟而非他人之所及知者矣冠員冠屨方屨俯仰之間亦豈可懵然而不知者耶昔之言天體多矣有曰天包地外地居其中者有曰天地皆中高四頽者有曰天地四遊升降於三萬里中者其說固不同而亦皆有理自渾天之說興而談天者皆宗之天之高也星辰之逺也又何以知渾天之為得而諸說之為失耶天道左旋日月五星右轉言天之義者皆祖是說也然日月五星皆東生而西没曷為反天而逆行耶日陽而月隂曷為月反疾日行反遲耶或者天道左旋處其中者皆順之以天行之疾而視日月之遲則日月之行反若右轉焉五星亦然亦豈得為無理且日月皆隂陽之精也而月之有盈有闕何也或曰月無光受日之光何以驗其必然耶五星行度土何為而最遲金水二星又何為常附日而行耶二十八宿四時迭運不可以方所言蓋一晝夜之頃固巳迭周乎天矣何以辨其為東西南北之宿而各司一方耶地之體則人跡之所歴非若天之難見也人之言曰地形西北高而東南下故水雖萬折無不趨於東者然弱水則既西矣黒水西矣曰四海云者安知四表之外不皆有海耶又有以天地之中如國中者九而水環之故曰九州中國特其一耳人之所見雖中國且不能徧又安知中國之外不復有如或者之云乎古今同一河也决於堯而息於禹决於商而息於周决於漢而息於唐其或决或否亦皆有說也禹釃二渠以循西山之麓故無泛溢之患其蹟豈不可復考耶江自岷山東流數千里以入於海蓋為他水之所㑹不應復析而為他水也今乃有九江之名而禹貢復有東為中江東為北江之語何耶天下之水一也而海之水乃或進或退何也或曰視月之出沒以為進退其信然耶否也深於幽明之故者非孔子孟子歟孔子謂北辰居所衆星拱之說者乃以為北極一星近於不動而非不動者何也孟子謂禹决汝漢排淮泗而注之江今汝也淮也泗也皆徑入海而不入江又何也聖賢非講之不精者而與今之說者異其孰是孰非耶夫觀天地者亦觀其理耳苟徒襲古人之迹而曰某之論然又何以異於侏儒之觀優耶此問與答者之所當戒也問六經之道與天人並三綱五常之所自出而天道之所由以立也更秦迄漢書缺簡脫而禮樂之失為尤甚樂之為書無復存者小戴所存樂記一篇乃出於荀卿子司馬遷從而述之其果聖人之遺經耶然其所記者乃樂之大義而樂之節奏不與焉其亦有可考者耶周禮職官之書禮記漢儒所述乃與儀禮並列為三禮亦大不倫矣而儀禮在唐雖名儒巳苦其難讀今乃不得與二禮列於學官以設科取士何耶禮樂所以正人心厚風俗而殘缺若此是未暇悉辨也易始伏羲書始唐虞詩紀春秋以備列國其於古今之際悉矣其書尚存而家藏人誦之其不可考乎作易本於河圖夫子何以言其觀天察地以及鳥獸之文用易本以卜筮夫子何以言其開物成務而冒天下之道天地山澤雷風水火列卦之方位也震兊坎離以居四正乾坤艮巽以居四維所取何義耶九六為老七八為少揲卦之陰陽也陽爻用九而不用七隂爻用六而不用八其亦有說乎經卦皆八其别皆六十四卦自夏商之易巳然矣何以言文王重卦之數元體之長亨嘉之㑹自魯穆姜巳有是言矣何以言夫子賛易之辭夫子釋彖繫之卦辭之後夫子小象繫之爻辭之下何於乾卦為獨異陽用九隂用六别為二爻文言二篇總釋卦義何於乾坤二卦為獨詳繫辭果為夫子之言乎序卦豈非聖人之藴乎易之可疑者此也書之作也或以策命臣下微子蔡仲是也或以告諭百姓盤庚多方是也命臣下者反易曉而告百姓者反難通何耶或出於口授伏生所傳是也或得之屋壁孔氏所述是也口授者反聱牙壁藏者反明白何耶堯典一篇孔氏所述何不繫之唐而繫之虞臯陶益稷左氏所引何不繫之虞而繫之夏伏生二典合為一而孔氏析之然舜典篇首得之齊建武年間者安知非偽耶伏生益稷合於臯陶謨而孔氏正之然二篇文勢相䝉如蘇氏之傳者安知非是耶𦙍征之舉以時考之當在后羿之世六師之命豈仲康所得專康叔之封以時考之當在武王之世小子之稱豈成王所宜言吕刑雖曰祥刑而穆王耄荒之所作夫子曷為取之秦穆雖曰悔過而二國之爭未巳夫子曷為存之書之可疑者此也風雅頌以為經賦比興以為緯此詩之義也或曰詩之中皆有六義如豳風豳雅豳頌是也其亦有說乎有善則美有惡則刺此詩之體也然亦有男女詠歌各言其情者豈皆為美刺而作乎或以詩為國史吟詠情性而作閭巷小民之辭豈皆出於國史乎或以詩為孔子被之弦歌以合韶武之音怨忿淫佚之語豈皆合於韶武乎七月陳王業何以不列之大雅而列之變風棠棣閔管蔡何以不繫之成王而繫之文武弼鄘即衛也何以不繫之衛而繫之弼鄘詩之可疑者此也諸君其詳言四經之僅存以及於禮樂之巳廢庶以副朝廷尊經重道搜羅博洽之意公劄申兩浙運司催石門庫吏責辦年計劄子榦竊見張官置吏上下相承等級甚嚴至於輕侮黷慢無所畏懼不但慮其奉承唯諾之不前而於職事之際必至於稽違虧曠之為可慮也榦今來賤職石門老吏數十人往往宿姦巨蠧輕侮其長循習巳乆恬不為怪蓋緣酒吏卑官素無足畏而又貪利無恥之人與之為市往往坐受其侮以至於此榦比到庫中見交代指云某人某人最為可畏往往能持官吏長短納短巻於臺部又云某人某人前日行司經由往往獸奔鳥竄不可約束此豈復有上下之分哉且如榦以犒賞舊例急於趁辦嵗計前月此來旅寓郡城巳一月矣初遣人拜劄於交代借一二人使令幹當公參等事代者囘書云遣㕔子趙澤前去持書人巳囘而趙澤者乃逾旬而後至近復遣趙澤囘庫復拜劄交代以煮酒嵗晚合有預前料理事務欲於合干人内專差兩人及脚夫輩兩人前來支請酒本呼集柴米牙人商量價例及較議酒匠等事庶免後期今去數日矣亦莫有至者新官之初巳怠慢如此異日到庫何以令之此職業之所以不舉而官課之所以日虧也然此曹姦弊巳深未易卒治接物之道亦宜平心不可忿嫉今謹具公狀上呈欲乞台判嚴限追赴使司責認措辦煮酒嵗計仍責領本錢然其姦弊之状不可不預稟異日反覆申告復有不悛即當申稟望痛賜懲治庶幾庫務一新官吏促辦區區小吏得以逃責而上司亦免追需之撓不勝千萬之幸申提領所僉㕔解錢劄子榦猥賤小吏屬以烝燒多事復承庫務乆壊之後屋舎牆垣器用之屬無一全者循習百計侵欺以犬馬之力晝夜監督無頃刻休以是不及時貢起居間乃承台慈貶損威重特賜台翰捧讀不勝感激輒有卑悃十二月格目合係前官解發榦自十二月二十七日交割及今方十五日息錢併將借到私債本錢凑納交割後十五日本息巳空大叚費力竊恐使所人吏不復顧恤妄有追擾則榦視事之初無以存立闕申崇德縣乞追究錢福劄子榦昨所申解本庫合干人蔣潤及拍户錢九一錢福私役人錢七等冐占官拍户發賣私酒事榦屬以烝燒事冗未及躬詣台屏不審巳䝉嚴施行否竊念犒賞諸庫雖屬版曹而領在計臺雖屬計臺而𨽻在州縣如附疣懸贅雖有痒痾疾痛人莫有憐者所謂版曹計臺州郡尤漠然相遼絶獨有使縣相去宻邇幸遇賢百里榦厠之屬吏之末則卒有緩急猶可以呼號赴愬耳今兹之懇非可以常事比豈有拍户既不行打酒而反私立拍户豈有官酒既不發賣而反自賣私酒豈有官司地界而為巳私屬豈有官司之人而為巳私役區區小吏固不足道豈有百里之内乆沐德化乃有姦豪一至於此今納去地圖一紙凡墨書者屬本庫凡朱書者錢福所占賣私酒之地也欲望牒尉司追上錢九二及小拍户沈十八根究以施行榦一介小官不足比數然其所以趂辦係是户部犒賞錢物其所統屬係是本路使者提領雖於貴縣若無干預然敝庫辱在治封無異屬吏貴縣趂辦版帳何異敝庫事體既巳不殊利害所宜相䘏今有拍户錢福不赴庫打酒其罪一私下造酒其罪二多置拍户其罪三本庫使人告諭不從反裝論訴本庫其罪四情理明白不待智者知其不可今訴之巡尉貴縣人吏反移文巡尉不為施行訴之州郡貴縣人吏反蔑視州郡不為追逮卻稱本縣寄居為之芘䕶夫寄居賢者耶必不肯芘此無状之人不賢耶貴縣不當受不賢之囑今觀所稱寄居邑人皆稱其賢則是必無此事而貴縣人吏欲以勢相恐嚇而為錢福求免也今不得巳而訴之運使提領巳䝉行下貴縣追人根究切望勿為吏輩所欺則不待片言而獄可折矣榦衰晚小官為貧仰禄不過以勤易飽以亷易安此外無所顧望若貴縣肯為施行則尚可俛首趂辦國課若使如前付之吏輩漠然不顧則乞徑申使所將榦對移斥罷以快錢福之意不然榦亦當徑申使司乞囘避錢福不得復為貴縣屬吏矣豈有本庫自有界分乃出門東望環數十里為一拍户錢福所占貴縣不為追理而可以安坐受恥苟升斗之禄乎江陵歸乞嶽廟劄子榦一介寒賤賦分奇窮晚得一官甘心筦庫今京西湖北宣撫吳待制出師江陵辟居幙府未及兩月屬以朝㫖委本司措置信陽關隘遂䝉委同陳總領提㸃入關經歴光黄信陽德安四郡往反三四千里途中衝冒偶得惡疾幾至危殆吳待制改除宣撫榦巳隨司解罷至今病勢未能去體氣血衰頽心志凋耗難以服勞州縣家貧累重素無生業未免飢寒欲望鈞慈特賜憐念且與陶鑄嶽廟一次俾得稍沾寸禄少活殘軀不勝隆天厚地之施第二劄榦一介寒賤受㕓三山自先父察院起家單微素無産業兄弟相依以生不幸諸兄皆以薄宦蚤世榦賦分庸凡不敢有志仕進迨今中年偶得一官復以禍患十年不調心志摧頹乆絶榮望甘心筦庫以活餘生偶今宣撫吳待制出師江陵辟置幙府又䝉委出信陽諸處㸃檢關隘衝冒登頓遂得惡疾幾至危殆乃吳安撫改除京西湖北宣撫以榦係是辟差合隨司解罷至今痼疾未能去體難以從宦家貧累重未免饑寒欲望鈞慈俯賜憐念特與陶鑄嶽廟一次俾得稍沾寸禄少活殘軀不勝隆天厚地之施辭宇文宣撫再辟帥幕劄子榦一介晚生至愚極陋賦分竒窮素安守分不敢萌仕進之念迨及嵗晚偶得一官復以禍患十年不調家貧累重飢寒迫身勉竭疲駑竊食筦庫宣撫吳公憐其窮瘁辟置幕府繼䝉差出極邉累月衝冒得疾伏枕逾月吳公親見其危殆之狀念其以孑然之身抱病數千里之外遂許以隨司解罷還家就醫求一嶽祠差遣為杜門養疴之地忽聞明公復欲辟以舊職㧞之庸凡之中置之帷幄之末深切感激掛名仕版東西南北惟命之從豈敢有辭實以一病之後氣血衰頽心志凋耗若又驅而使就故地其勢必至狼狽且榦以二百餘指之累無一畝之田甘心為祠禄之請飢寒窮困皆不暇恤則情其可見此意此情巳在明公未欲辟置之前非是今日方為此以避事也目今邉事未寧幙府之士非精力過人難任此責四方英俊如林如榦等輩何足比數兼榦向在吳公幕府既以疾辭之而歸病未及瘳復以辟命扶曳而去吳公竊以大君子愛人以德必不使後輩去就違義故敢僣布申懇倘䝉台炤特賜改辟不勝萬幸乞嶽廟第三劄子榦近嘗僣具稟劄以榦盡瘁邉陲偶嬰惡疾乞賜陶鑄嶽廟差遣一次繼䝉新京西湖北宣撫使宇文閣學辟差榦監荆湖北路安撫司激賞酒庫兼准備差遣緣榦實是大病之餘氣血羸衰難以復備使令今來巳䝉宇文閣學改辟某員充替伏念榦家貧重累難需逺次欲望鈞慈俯賜陶鑄嶽廟差遣一次庶得少霑微祿以活殘軀第四劄榦昨自江陵罷官來歸自度衰賤無能僣以嶽祠為請繼承宇文宣撫再辟充江陵舊闕榦大病之餘不任奔走巳行改辟榦以留滯中都資用巳竭復聞閩中米價騰踊鄉落擾擾遂再上祠請退居田廬俯伏俟命及得邸報乃䝉朝廷復降與榦官差遣指揮仰見某官收拾人物不問疎賤螻蟻小官亦䝉記恤不欲終棄於無用之地私切感激何以稱塞伏念榦竒蹇之躬縱不自植先人為紹興御史家無置錐之地兩兄從宦相依以生僅改京秩相繼而殁榦託迹妻父偶得一官心志摧沮舉家數百指無以自活宣府吳公辟置幙府軍旅方殷不敢憚勞遂䝉委赴宣司商議信陽關隘地係極邉人憚其行薛公陳公移書江陵委提㸃光黄信陽八關自去嵗七月奔走窮山絶徼往反數百里孱弱之軀因此得疾以孑然之身抱病數千里之外當是時不以兵死亦以病死今幸以身歸老牖下豈敢復有進榮之望而某官乃念之如此所謂施恩於無用之地垂德於不報之所惟是累重家貧日圖升㪷庶足以自給蓋天下之窮民而無告者逺望闕廷如在數千萬里之外雖寸歩不能以自致儻䝉鈞慈特賜憐念仍舊陶鑄嶽廟差遣使榦即得就升斗之禄皆大造之賜也勉齋集巻二十六
