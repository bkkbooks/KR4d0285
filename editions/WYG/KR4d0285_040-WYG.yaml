body:
  text: 勉齋集巻四十宋黄榦撰詩答曾伯玉借長編二首白露下百草迅商薄脩林幽人起長懐感此節物深攬衣自徘徊撫劎還悲吟丈夫各有志莫作兒曹心涉逺當疾趨畏景須就隂願言理輕車去上南山岑其二祥麟踣魯郊孔袂何漣漣傷哉經濟心付與文字傳馬公述孔志托意為編年是非一以判纖悉不復捐聞君卧丘壑繭手磨丹鉛願言得其解努力希聖賢紹熙庚戌十月偕趙仲宗舜和潘謙之曾魯仲遊九峯芺蓉夀山紀行十首九日早登桃枝嶺登山豈不樂屬此風露清排簷夜雨滴詰旦天空明歡然金石交要我林泉盟支笻趂汗漫勇往不計程一水何縈紆千峯鬱崢嶸仰視流雲馳俯聽幽壑鳴班荆得所適斗酒聊共傾人生㑹有累聚散如浮萍今辰諧勝遊異日難忘情意愜各賦詩庶以紀此行道間觀瀑布行行益以逺愜此心期幽一徑險復夷千林密相樛回首天際山矗面懸飛流銀潢倚石壁玉龍下山湫光揺日璀璨勢激水颼飀可望不可親神往形獨留眷言桃枝山久矣卜築謀豈無一日閒努力窮冥搜夜宿九峯寺冥逐歸雲入逺山九峯環立似人閒摩娑石刻元和體矍鑠僧譚宣政間往古來今渾昨夢隻雞斗酒強開顔明朝酌取龍湫水直上層霄不復還十日值雨催粥華鯨徹翠微覺來屋瓦白差差初疑淡月霜天曉忽失前山雲幙垂田父腰鎌禾欲耳行人䇿杖足如錐老僧莫笑芒鞋苦破釡生塵儂更悲早觀龍湫夜宿羣峰裏朝遊大石湫寒潭飛薄霧疊障㵼洪流側徑蒼苔滑叢祠古木幽神龍好髙卧雲雨不勝愁宿芙蓉寺萬疊雲山踏雨來白雲依舊冒山隈尊罍罄盡客懐惡衣屨沾濡僧意猜黙坐香爐煙起伏喜聞靈洞石崔嵬五更清磬丁東響參斗横空天四開十一日早登靈洞巖寒巖突兀山之阿足履危磴攀藤蘿巖下清泉響環珮巖前古木交枝柯當中洞門忽開豁上有石屋髙嵯峨乾坤開闢已呈露鬼神守䕶頻揮呵重門黯淡不可入以火來照所見多出門小洞亦奇絶神龍奮怒吞蛟鼉勝景如此難重過手倚石壁頻摩娑安得雄思如懸河長吟大詠仍髙歌過翠微院古寺殘僧少孤村碧樹圍明朝山下路愁絶望烟歸十二日復歸桃枝嶺大溪章溪溪水清上寮下寮山路平三山屹立相犄角百里連亘如長城仰干雲霄不盈尺俯視天髙浮寸碧閑雲吞吐溢澗谷飛泉噴灑下石壁中有一山名芙蓉端冕正色羣山空望之可敬不可慢僧言直與衡嶽同坡陁突兀作雲洞虎豹蹲踞棲鸞鳳聞道前山開闢日曾住浮屠幾千衆我來已作五日行皇天一雨復一晴穹林杳靄非人世手接羣仙上玉京曉來更向山前去忽到山翁棲隠處却憶桃源洞裏人日出烟銷忘舊路夀山石為文多招斧鑿寺因野燒轉熒煌世間榮辱不足較日暮天寒山路長凡今之人莫如兄弟詩并序昔我伯氏披斬蓬藋以筮宅于箕山之隂有隠君子焉曾其姓者遇諸塗班荆而語相樂也謁其居有迎門而肅者客入長者坐而少者侍少者請而長者諾相敬如父子相歡如朋友問之曰吾兄弟也見其二子焉則在齠齓間而已能差肩握手如成人矣伯氏歸以語諸弟相率而往見之余家距箕山幾一舍歲月之往必館于曾舍如歸焉視其兄弟之愛猶一日也二十年伯氏蚤世而二公者亦相繼以歿獨其二子既冠且娶刻意問學而樂與吾兄弟者遊察其相愛之情猶二父也余甚愧其為人樂與朋友道之夫人倫之愛亦大矣固人心之所不能已者而余於曾氏父子獨有感焉今夫富室衣暖而食飽不私其有而與天屬均焉宜若無難者而世之爭錢財相鬭鬩者往往皆富室自余造曾氏之門而四壁蕭然有人所不能堪者而再世相處皆能樂其愛而忘其貧其亦可道也夫其得無所愧也夫紹熙庚戌之冬余與友人趙仲宗趙舜和潘謙之遊九峯芙蓉觀龍湫靈洞過夀山翠微以歸曾氏之季子魯仲偕行過其家飲酒樂甚相與賦棠棣之詩而掇其間凡今之人莫如兄弟為一詩以嘉其事魯仲復屬余序之因書本末如此以自警云物理須深玩人心定不凡棣華春競秀鴻影暮相銜天性人為貴同胞豈異心疾行迷後長思昔更傷今憶昔孩提日堂前聚戲嬉利心驅逸馬分背欲何之富貴真餘事兒孫亦後身四支先自賊駢拇若為人矢束折應難葉密根無托斯道固昭然歎息人何莫儒衣而儒冠滿口談詩書君看鬩墻心異類誠不如我行箕山顛上有賢弟兄髙節振頽俗餘芳丐後生二父及諸郎異世真一體賦詩豈遺君自以警不弟遊鼓山登大頂峯辛亥夏登山如學道可進不可已懸崖更千仞壯志須萬里平生石鼓懐獨酌靈源水峩峩大頂峯欲往輙中止今朝復何朝擊楫渡清泚好風從西來縹渺吹遊子褰裳涉危巔萬象得俯視東南際大海日月旋磨蟻烟雲隔洲渚歴歴猶可指城中十萬家囂雜不到耳郊原與㕓市瑣碎如聚米同來皆良儔得酒共歡喜深林更呌嘯磐石恣徙倚摩娑陳公碑歲月為我紀更持末後句歸以銘吾几陳烈先生登此山紀歲月于石上其畧云鼓屴崱鼎峯特歲辛亥帝司赤雙髻峯萬山環立兩山起伯仲壎箎風味多軒冕直能驚俗子采薇千古不消磨侍晦翁飲浮翠用劉叔通韻涼風振幽壑隂雲翳前山髙懐勵清秋適意林莽間烟横黄家井水淨䨥溪灣徙倚暮忘歸人境相與閒遊子獨何為千里方言還陪此杖履遊忘彼道路艱心期更他年依巖結柴關讀史記荆卿傳說與男兒莫愛身簞瓢陋巷不為貧古來豪士君知否拚得頭顱斫與人食竹䶉北山何嵯峨猛虎之所藏咆哮一震怒百獸不敢當有竹山之阿挺挺青琳琅威鳳鳴且棲衆鳥空回皇彼䶉獨何為莫夜爭跳踉鑽山窟穴深嚙竹根本傷鼠腹漲彭亨鴟怒獨奮張誰知樵蘇輩歎彼枝葉黄鋤耰擣其室束縛登我堂遂令婉孌者汚此牙頰剛才質既不同分守合有常曷不效爾曹竊食仍循墻直節永蕭森庇此千仞岡讒人監謗兆周蹙偶語擠秦亡古風下刺上國步安且強靖康發深痛熙豐啓餘殃惜哉天子明未免讒者傷讒者亦何為同子名愈彰生平生平因寡合歲晚交更少非干世俗薄自是志量小拜文公先生墓下暝投大林谷晨登崒如亭髙墳鬱嵯峨百拜雙淚零白楊自蕭蕭宿草何青青悲風振林薄猿鳥為悲鳴音容久寂寞欲語誰為聽空使千載後儒生抱遺經答劉正之見招四絶求田問舍兩參差木壊山頽萬古悲多謝劉郎能館我短檠疎雨聽清規昔年曾學屏山下炯炯胡劉風味長滿目青山非故國人生熟處尚難忘君因戅直招時論我以疎愚厭俗紛萬事不須開著眼蒼山白醑對西曛石馬臺邊森古木晝寒亭下鎖晴烟紫陽不作逺菴死一醉同君話昔年讀史戯呈劉正之君不見漢初曹相國日飲醇酒不事事相舍後園近吏舍黠吏醉呼不肯避相國取酒飲園後恨不呼吏與共醉又不見後來丙丞相馭吏不畏丞相嗔嗜酒酒翻車上茵醉飽去爾何容身兩公一心相有漢一夫見辱非吾患但得時平酒價賤從渠醉後來相慢李斯逐客徒自尊東門黄犬還悲辛西曹地近不足貴不過能汙車上茵人言兩公固寛平我謂兩吏非庸生庸生無益兩丞相故辱丞相成其名至今漢家四百載曹獨為冠丙有聲劉侯劉侯汝太癡世間曹丙能幾箇但知憤世快我意醉語誰知官小大却來東屯起田舍日與田翁相唱和人道劉侯只是一醉人誰知胸中自有渭與涇一雙怪眼如老鷹每於醉後白復青劉侯藏鋒斂鍔莫妄用君家自是提兵冠豸種和魏元明四月菊鵜鴂纔鳴歇衆芳忽看佳菊變秋光江頭雨漲梅同熟隴上風清麥正黄莫待重陽拚一醉不愁長夏自微涼籬根休遣兒曹見又說梨花捧夀觴和劉實之喜雨忽忽久不樂中膓若焦焚非無一樽酒髙堂細論文塵俗了不知學殖聊自耘念此農事畢膏雨猶未均東郊與西疇禱旱胡紛紛長年四月時蝸舍嗟梅蒸旱魃逞威虐暘鳥麗朱明風伯真可訟田祖非無神曷不駕飛龍一息萬里奔兀坐正長吁仰瞻白雲屯須㬰梧桐上䇿䇿琅玕聲清溪一綫流澒洞如盆傾只此一日澤便想百室盈呼童索濁醪為我驅愁襟珠玉忽滿前語句何清新此意久不傳舉坐為君興鷄蟲無了時江閣聊自憑竊恐讀君詩愁殺閉糴人再和實之喜雨呈正之苦海渺無涯火宅常自焚青衫不療饑白首非工文勉䇿疲駑姿舍己為人耘造物真小兒苦樂胡不均突如四月時梅雨成炎蒸安得玉燭調一晦復一明中夜忽自悟感慨若有神有名汝不趨有利汝不奔獨與迂濶友卜鄰向東屯燕坐想羲皇浩歌發商聲床頭有濁醪嘯詠聊自傾又如苦旱中一雨澗壑盈草木回春姿萬象皆更新君今東屯成拙寢復幾興我亦側西流草閣時共憑長想千載上依依耦耕人和劉實之寄生日朝來謾與兒曹語欲看羣峰挿天宇擕笻直上君子堂出門復向東屯去東屯田舍翁邂逅成賓主謂予始生朝盃盤各碁布須㬰剥啄者為誰珠玉懐中來舉似滿堂賓客且停盃看我蓮桃羅十數感君厚意興轉逸百斛瓊漿當鯨吸造物亦何意萬品齊結實休論脩與短大是空中色但願雙橋茅屋成欵段從君豈終極劉正之宜樓四章并序劉正之創新居以宜名其燕處之樓謂其春秋冬夏無不宜也同志之士既已共賦之矣予因採詩之四宜以廣其意焉一章言宜其室家也二章言宜爾兄弟也三章言宜爾子孫也四章言罄無不宜也讀之者亦足以見予與正之道義相與之意云其一春風滿庭除琴瑟亦靜好甕中有歡伯相祝以偕老其二屏山重回首日暮起長思鴻鴈來翩翩共賦棠棣詩其三君家兩寧馨翠竹棲鸞鳳莞簟燕新居孔釋復抱送其四山以靜故髙水以靜故深福禄豈外求萬感皆人心與胡西園伯履白露下百草𤣥雲翳崇岡遊子莫何之倐若孤鴈翔朝發長沙渚夕息湘山陽飛鳴念儔侣慷慨增悲傷故人懐我深逺寄金玉章開緘且疾讀慰此饑渇膓是時焞中火朔風掃枯黄歲月能幾何臯蘭結微霜靜觀天地間至理何昭彰乾行固不息坤應還無疆兩曜各循環皦皦臨四方人道政如斯願君勉其常脂車䇿良馬日暮道正長徒僕審驅馳前途畏榛荒劣質苦難任白雲懐故鄉南山一舍隔動若參與商大舶漾中流矯首空西望昆弟真可人行樂毋相忘嘉興道間二首平生事幽貞足跡不出門歲晚迫飢寒暫得媒妁言其二征途不寐輙終夕故里無書今幾時離别因知雙鬢改飢寒解使寸心悲謁陸宣公祠於嘉興府學門外二首年來風俗軟如綿再拜公祠氣凛然莫是平生太忠鯁只今猶斥學宫前徘徊無處謁精廬義膽忠肝一巻書昬主亂時公尚爾清朝平世合何如石門吳越天下富京畿遊俠鄉隴畝盡膏腴第宅皆侯王世言蘇湖熟霑丐及四方自我來石門觸目何淒涼清晨開務門有酒誰復嘗纍纍挈妻子汲汲求糟糠父老稱近年十載嘗九荒聚落成丘墟少壯爭逃亡闕訪髙僉判所居逺樹分髙下平洲半有無短亭低密竹小艇隠寒蘆轉浪魚深入斜陽鴉亂呼自慚貴公子未老賦歸歟甲子語溪閔雨四首檣頭五兩揺空飛船頭百丈牽何遲數篙塘水清可涉故鄉千里歸何時塘中龍骨髙數層龜坼田中縱復横青裙箬笠倚車卧但有空車無水聲生女盈盈河漢傍清風肅肅吹羅裳朱門達旦聽歌曲莫遣濃隂蔽夜涼老夫年來百不悲夜聽羣兒聲吾伊呼兒握手長太息不見儂家數口飢喜雨用前韻莫愁塵土厭天飛六月栽田未是遲待得麥麻收拾後通宵好雨定知時雲霓天外起層層畢月相隨徹夜横費得天公能幾力數州愁苦變歌聲睡覺歌聲古道傍有人中夜攬衣裳床頭斗酒聊自酌不為書牕一夜涼山中書生休浪悲爕調自有臯與伊清香一瓣來天竺更把民飢作已飢予前兩夜月次昴宿因與兒輩言更一兩日當離畢則雨後果然又用前韻謝華宰并序効官語溪與金華鄭君聨事相好也葉明府鄭出予未及識之適有以予閔雨四詩呈似者不鄙而和之輙以為謝且致予懐舊之意云誰推雙轂遶天飛短髪蕭疎蚤是遲膓斷金錢門外月曉天秋露稻花時余嘗侍東萊先生出金錢門觀稻花甚樂明招古木葉千層山自浮雲溪自横春樹鶯藏無覔處遺編燈火屢吞聲明招東萊先生所葬之地歲晚投身糟甕傍旋除野服著公裳折腰可愧更無米嬴得虚堂一味涼世事年來最可悲開口不得洛與伊兩君論交大左計芋栗不足充人飢噫嘻示兒噫嘻吾退不能為髙蹈之靖節吾進不能為玩世之東方腰折亦無米五斗餓死安得粟一囊徒令汝曹困韲鹽對我面目青且黄冬寒輕裘不得御朝飢軟飯不得嘗大兒知書故自忍小兒呌怒來牽裳老夫對此忽自悟呼兒并集來我傍人生窮通固有命丈夫志氣當自強送宋知府歸閬州丈夫不遇歸西州天遣旱魃為王留誰知冥鴻向蓬蓽一使深鷁膠淺流載書萬巻堪自樂端坐十日吾何憂使君髙懐不可挽飛廉驅雨扶君舟君今捩柂清江頭江漢滚滚來為浮張帆掛席日千里巨魚豈戀尋常溝浙江舟行遇風扁舟泝浙江日暖天氣清胥濤寂無聲篙工掛席帆涉險如履平不謂時適然自詫伎已精中流捨維楫醉卧日月横烟雲忽異色亭午風浪生兩涯忽黯淡一葉隨欹傾津人巧不施反念西佛名同舟已自訣立葬東海鯨雨聲忽自霽霧暗忽復明舉酒迭相賀驕氣又已盈同舟幸身安氣塞莫敢爭誰知翻覆手頃刻分隂晴既乏共濟力拂衣起徒行和江西王倉中秋賞月韻明晦從渠造物慳好天佳月靜時看一輪天外長明徹萬象胸中自屈盤星逐使來隨處見霜侵臺逈逼人寒休觀玉兔頻頻𢷬活國須公九轉丹勉都幹權君并序都幹權君明醫相之術相與浮江淮握手逾月言論豪放世罕識之者亦隠於技耳賦詩以勉之長安城中豪俊林錦韉玉勒馳駸駸入門朱粉誇妙麗出門青紫爭浮沈東家問醫西問相君獨燕坐鈎其深氷眸一睨窮達判刀劑不許寒暑侵長安城外天隂隂行人駐馬為悲吟髙墳崔嵬葬白骨安得不死腰黄金世間萬事何足恃禍福倚伏常相尋渠儂自愚君自強誰肯一笑忘華簪蜀人賣卜嚴君平垂簾閉肆窮古今逢人但說忠與孝自有達者能知音察形察色君所解直須洞燭賢愚心屈伸夀夭亦命爾公平正直神所欽送章元徳司理罷官歸永嘉送君北門阪遥望東甌路峩峩白鶴嶺渺渺飛鸞渡上有虎豹嘷下有蛟龍怒車馬堅且良維檝夙巳具褰裳涉其險萬怪不足懼世路劇羊腸皦皦誠易汙但能心無愧窮達安所遇毋為婉孌者暫蹶輙驚顧生平麋鹿姿處世每多忤胡為展良覿握手便如故髙懐發鍼石正論諧韶濩情親復告别欲語誰與晤乾坤一逆旅日月雙脫兔寒儒守蓬蓽白首困章句期君以逺大庶足慰遲暮謝潘謙之二首生平不作温飽計歲晚寧愁衣褐無一夜嬌兒啼徹曉始知寒色已侵膚綈袍戀戀故人情寒谷瀟瀟春意生寂寞窮儒應易足牀頭鼻息便雷鳴慶元己未冬至前二日訪林公度至栗山翌日同訪吳必大林季亨容之偕行愛其溪山池亭之勝為之賦詩篝火下脩嶺褰衣涉清川夜投故人廬洞壑藏真仙一水逺縈紆兩山對蜿蜒但見烟雲深不識車馬喧主人敬客至盃酒羅堂前諸孫競勸酬烹羊雜雞鮮同來二三人妙語爭春妍此㑹良獨難達旦不復眠雞鳴秉燭遊到君新池邊中有讀書堂藏書足精研把筆記姓名徘徊悵無縁天明驅車去去上層岡巔回首三歎息安得數畝田結茅與君鄰嘯傲終殘年㑹南禪遊鄒氏園和知丞韻并序長至後三日約同官㑹南禪登浮圖遊鄒氏園以歸知丞以佳篇見屬因和其韻併簡同遊諸友盃酒聨翩臭味同横枝疎影費天工千秋落木人烟絶獨倚斜陽對晚風寄鄭維忠葉雲叟諸友并序諸友九日逰上巖老病不能相陪小詩寄鄭維忠葉雲叟諸友村村簫鼓競龍舟萸菊巖前倚晚秋老懶焚香書一巻淡烟疎竹月侵樓宿廬阜題正覺禪師稽首歸宗正覺師長懐千里鬢如絲早知具眼畨成闇不作人間了事癡挽雲門鄭君結友雲門日曾聞谷口翁松肥三徑雨鱸熟一絲風行業鄉閭敬詩書子姓同論心獨餘恨秋草對碑豐挽潘孺人聞說初年失偶時回看囊篋鬢成絲誰知舊室如新室解撫前兒似後兒南澗蘋生方得助河陽花落不勝悲髙樓百尺今休上望著佳城空淚垂紅雲照水春將暮皓月盈盈院落深正是佳人行樂地翻令公子獨傷心床頭琴瑟空長在眼底音容無處尋寒食紙錢飛滿野一聲薤露涕沾襟挽新市張監酒三首曲江人已矣風采獨依然薄宦何曾顯英名到處傳諸公交薦士造物竟遺賢窮達君應悟怡神向九泉其二捧檄來新市逢人說舊官臘殘千醆熟春到萬家歡不見文移急惟聞酒禁寛摩挲石梁柱俛仰歎才難其三淡薄心無累行藏惠及人詩書長孫子雍睦化比鄰我亦塵中客來司甕底春從公得遺範惆悵重書紳代王維謹挽李察院二首關洛蕭條南渡日龜山往事屬龍津過庭詩禮傳宗㫖蓋世功名付後人風憲隻身中與外清忠壯節晚如新崇蘭香歇玉剛折定與天皇作侍臣牛角短歌頭半白龍門峻級眼常青一官多是春風力千里俄驚秋淚零坐想徳容今寂寞夢回耳語尚丁寧夜臺雖閉公長在有子能存舊典刑代曾魯仲挽蔣同叔母二首釜竈朝晡百儉艱巵匜滫瀡恱慈顔欲知婦順妻賢處盡在姑啼夫哭間庭下芝蘭方擢秀堂前松檜未應慳空餘馬鬛崔嵬在及見春風衣錦還不樂何蕃歲一歸歐陽越客飽京師註見韓文腰間未許印如斗堂上還驚鬢已絲男子但知三釜計人生合是百年期他時此恨憑誰說見著魚軒心轉悲代季亨二首枌榆接影一牛鳴淑徳相傳到後生三世隻身長婉娩兩兒雙淚遽縱横蘋蘩春澗情何切機杼秋堂眼倍明細讀古文賢婦傳誰家騃女亦書名慇懃慈母手中線縫作行人身上衣待換青衫朝日去誰知白帽帶星歸别時早覺終天訣底事能堪跬步違一路顯親須努力九原荒草恨依依代良夫人二首早歲為儒讀國風夫人髙節有誰同至今桑梓傳家法便說蘋蘩力婦功閨内衾裯長自苦堂前滫瀡得能豐欲知淑徳碑何在只聽鄉人嘆息中聞道夫人遣子時丁寧捧檄是歸期青衫到手非難事白髪驚心祇自悲長翣忍聽蒿里句短檠休唱蓼莪詩九原精爽應長在列㦸松楸莫恨遲挽李尚書母太淑人少壯聞忠孝生平閱險夷篆烟長寂寞騶從任驅馳塵俗渾無染湖山每自怡儒冠慚佛學列婦勝男兒其二紫槖光先烈青衫拾世科家聲今益振母訓昔應多方聽焚舟誓俄聞鼓缶歌定非孫與祖一戰一言和其三枌社傳家範堦庭著義方能令鏘劎履爭欲倚門墻么麽真無用提撕獨異常登堂今已矣收淚轉淋浪勉齋集巻四十
