body:
  text: 勉齋集巻二十九宋黄榦撰公狀石門申提領所請截留本錢榦么麽小官無足比數適承庫務積年乆壊之後雖未交錢事而曠敗之狀巳見然區區冐昧未敢辭難者亦以竭力盡瘁守法奉公庶幾仰藉使臺之威風稍能有濟耳近凖使帖以前官拖欠煮界格目錢遂截去來年歲計三百千以補煮界之欠榦聞命恐懼不能自寧巳具申懇未䝉允可故敢復布陳之竊見本庫每年歲計所給本錢二千七百貫趂辦息錢八千貫官吏之請給場務之支費又幾二千貫是以一錢而取三分之息也累政之所以敗壊者正以本少息多耳本少息多則造酒必薄私酒必多拍户必逃移官課必虧折此不待智者而後知也盡得二千七百貫本錢猶不能辦况又截去三百千耶截去三百千固知其不可况榦今之所處猶有可矜念者每伏月造麴以供煮界之用榦之到庫麴數殊少比之常年巳將本錢買麴計三百千矣清酒本錢例得一千二百貫為六月造賣清酒之用榦之到庫郤有兩月發賣清酒本巳不復有又將本錢四百千造兩月清酒矣以二者計之無故而坐費七百千則本錢所餘二千貫耳若使之截去三百千則所餘者一千七百貫耳以二千七百貫尚不能辦歲計况又削去其半又何以支吾耶竊念犒賞諸庫所以敗壊者皆生於上下之情不通監官不䘏酒之厚薄必欲拍户之納錢使所不䘏本錢之多寡必欲監官之趂辦上下煎熬但見追專知索印紙對移閣俸終歲紛紛而酒課卒不辦榦愚庸無似惟知闗防滲漏撙省餘費縮水加料使所造之酒於心無愧則拍户不患其拖欠然亦須使所多給本錢然後可辦方欲於清本之外再有陳請况又截去其九分之一耶故敢冒凟台嚴欲乞盡與支撥使榦得以悉力展布庶幾不悞使令石門為酒庫之首其敗壊不振積有年數使榦勉竭駑鈍是庫乆敗而復興則不惟小吏得以逃責而使所亦免追胥之勞以使臺輟三百千特一毫毛耳而庫中解發不虧欠則其為利豈但三百千而巳申提領所乞懲治錢福榦昨嘗以拍户錢福不赴庫打酒私下多置腳店自造私酒出賣鄉里占據本庫地界四分之一使所痛賜懲治於某月某日承凖使所公文巳牒嘉興府帖崇德縣追人根究限十日申經今巳半月本縣全不追人郤將本庫解去合干人蔣潤放令走閃錢福名下某人放令歸家盖縁錢福係是本縣某鄉充役人以本庫拍户為名復與本庫合干人通同公造私酒莫敢誰何多置腳店散在保下一遇鄉民有公事屬錢福保下者輒勒令就所置腳店買酒以此數年遂至富厚每以將仕郎某州司法自稱實一村頑猾小民暴致富厚以此欺嚇愚民而自利耳州縣胥吏多受請囑雖有使所公文亦莫之行管庫小官無所伸愬委實利害竊念犒賞諸庫趂辦使所格目如石門一庫最為費力雖有地界百里許而居民鮮少又多貧乏之家雖有拍户三十人而衰老貧困每恨賣酒極少獨有錢福所居地名錢林有僧寺頗大有居民頗衆其地濶狹幾及本庫地界四分之一其私置拍户幾及本庫三分之一乃為錢福所占遂使本庫之地界日蹙本庫之拍户日少而息錢不减於舊日此本庫所以敗壊官吏無所措手而動勤使所之督迫也夫造賣私酒鄉村豈能盡無至於廣包地界公立拍户挾庫吏之勢而監官莫能察恃保正之力而鄉民莫敢問又金錢買求州縣吏胥而州縣亦莫能較之其視造賣私酒之家潛伏隱奥以規求毫末之利者其罪為大若非使所嚴賜根治則纔出庫門東向南望周囘二三十里永為錢福所據是東西兩庫也錢福日厚則石門日貧石門日貧則使所格目日虧此本庫所以不容但巳而捨使所無所赴愬也大抵犒賞諸庫之在州縣一有不得其平仰首而愬之漠然未嘗加省故使所雖有行移欲為場務之地而不可得欲望台慈就使所差人就崇德縣巡尉司守待追人徑赴使所根治庶幾猾吏有所忌頑民有所憚而敝庫小官亦得以少行其志矣申提領所體究烏青庫監官及措置官互申事榦照得兩人爭競之端盖縁烏青庫敗壊之後息錢重大張監酒竭力趂辦雖於格目有虧然比之舊年巳是増羡因見王訓武前來措置内懐愧恨見之詞色王訓武既䝉使所知遇只得竭力向前意謂場務虧欠合干人必有情弊到庫之初便行根究奮怒之容凛不可犯以是不能互相容忍以了官事至於紊煩台聽今欲見其曲直則王訓武申張監酒不合以私身㕔子父薛大中充貼司干預庫事雖未有他罪然不避嫌疑豈得無過張監酒申王訓武不合親自毆打姚顯至於重傷目今醫治或可安痊然庫子過犯自有刑憲何必暮夜親行捶撻兩人之曲止於如此若其他所申謂清酒趂錢只解及三分之一其餘未知著落則一分之外皆是本錢每有循環非是情弊謂去年煮酒不應開煮之後旋行醖造則此乃諸庫通例盖煮酒息錢頗多旋以趂息錢復行醖造若非得辦庫分解不如此又謂太平樓賣酒人拖欠酒錢此亦諸庫之常盖賣酒之法非賖不行既曰賖賣則人户取錢多不及數若此之類皆求全之毁溢惡之辭不足根問盖兩人皆將家子孫其勃勃不平之氣乃其素習若使張監酒自知虧欠息錢既䝉使所委官措置則授之柄而處其下息錢既辦亦巳之福王訓武自知彼既不辦使巳代之羞愧之情亦人之常則從容和緩而與之處亦何不可今兩人皆以一時之私忿至於紛爭巳傷事體况坊場趂辦官錢目今年計未辦人吏恐懼不敢禀事行客疑惑不敢交闗此於庫門委有利害欲望使所更賜戒諭令其和協同辦國課臨川申提舉司住行賑糶昨凖使司行下本縣措置賑糶事件條畫詳明仰見使臺布宣上意寛仁厚下懇惻愛民官吏但當鞠躬奉行不敢稽慢然熟復所行事件有曰隨宜相度則是又欲諸縣各度事宜不拘文法榦生長閭閻熟知賑糶之利病詢訪故老具言風俗之便宜故條具申聞照得賑濟之法實行於大歉之年賑濟之惠必資於官司之米今本縣去年早禾大熟臨川境内早禾最多晚禾雖被蝗旱然所在有大歉之處亦有大熟之鄉長短相補亦得半收早晚禾通計巳是七八分成熟自非賑糶年分目今官司所在窘匱其勢不能斥其所有以及民但行文書徒為煩擾故行賑糶之法不若嚴閉糶出界之令一縣之大周圜數百里知縣不能親歴賑糶之法必須付之胥吏付之鄉官付之保正方其抄劄人丁之多少得賂者一户詭而為十户一丁詭而為十丁不得賂者反是其抄劄蓄積之有無則得賂者變殷實為貧乏不得賂者亦反是其置場出糶也富家積粟多者量其所認以出糶而其餘則閉户而藏之雖索價十倍官司無以罪之也然善良者循法而不敢違而頑猾者名曰出糶而又實未嘗糶也至中産之家與夫産出稅存之人官司例令出米彼既無米可出則其勢必就糴於富家而其費必至於十倍於是始有破家鬻産之患小民之係抄劄給厯頭者或賫厯就糴而富室不糶其不係抄劄無厯頭者則愈無所從糴矣此法一行富室因賑糶而獲利中産以下因賑糶以被害賄賂縱横於胥吏之門而小民未必均愛其惠如此則賑糶之法誠未可輕行也故莫若且嚴出界之禁申閉糶之令米不出界則富人藏粟者不容於不糶上户不閉糶則小民乏食者皆得以就糴也榦近日因行鄉落立定米價併捕到客人販米鄉落人户亦未至乏食所有使臺賑糶事欲乞住行申撫州辨危教授訴熊祥本縣照得危教授熊祥之爭起於危教授倚恃官勢白奪熊祥山地不從遂因其家偶被䑕竊乃欲誣以停藏之罪庶㡬熊祥怕懼自獻其地本縣見其用心不臧欺凌小民又將陳九鏁縛毆打以致病患饑餓遂將誣告人疎放其後陳九果因此致死其子不勝其憤遂陳詞乞檢騐獄司郤以為熊祥教唆陳九之子熊祥畏懼危教授之勢遂逃匿不出其教唆之實亦未可知然陳九雖非危教授之子所殺亦因危教授之子所毆而死情狀甚明熊祥固未必是教唆若果是教唆亦因危教授誣告停藏而起原情定法實有可憐今熊祥巡尉司巳得泄其所憾痛加搔擾吏輩又於台判之外别出引牒脱漏台判併差尉司人追擾如此則熊祥之家必至於破蕩靡有孑遺矣危教授身為士夫不顧公議殃害鄉民如此其極所仰望者但有州縣為之理直耳榦身為縣令目覩其寃不容坐視欲望使府台判將熊祥照赦原免追囘巡尉司承差人仍根究吏輩於台判之外又脫漏台判差尉司人下鄉搔擾情罪庶幾千里之内實感父母生成之賜申提舉司乞約束破壊義役竊見縣令之職莫切於愛民人户受害莫甚於户長都分有廣狹而差役無増减寛都可差役者或三四十家歇役或三四十年狹都可差役者或止四五家或頻年被差而不歇故寛都之民雖充役而不見其為害狹都之民每充一役必至於破家蕩産由是寛者愈寛狹者愈狹甚至於狹都全無可差而以催科付之鄉日家丁者役法之不均不惟人户被害而官物愈見失䧟榦自到任以來深憫斯弊偶因一都之内有上户七家相與陳詞乞免差户長七户自為甲首以都内合納官物分為七縣中但給人户自承解子付之甲首自行管催不為人户免差户長之害而官物所入反増於常年人户深以為便本縣遂出文牒行下狹都勸諭人户欣然從之者十有餘都可謂公私俱受其利者也然不以為便而欲破壊之者亦多矣鄉司以差役為利解子以追催為利案吏貼司以繳引為利杖直之徒以呈比為利今皆失之故朝夕窺伺惟恐義役之不壊也竊見某官視民如子而差役一事尤使臺之所留意欲乞台慈照榦所述備牓行下本縣有吏貼等人輒敢破壊義役以致人户論訴仰本縣申解使臺特與重行編配庶幾義役人户實受生成之賜新淦申臨江軍及諸司乞申朝廷給下賣過職田錢就人户取囬照得江西諸縣惟新淦最為難治二十年間為知縣者十政而九敗為人吏者朝補而夕配推原其端皆縁財賦窘乏入少出多通一年計之常欠二萬餘緡官吏無以為策只有懇求上户預借官物縣道之柄從此倒持豪强之家得以控扼請求闗節殘害細民苟有不從便生論訴若非朝廷上司痛加存恤則新淦一邑無由辦治榦疎繆不才冒當邑寄盖嘗推尋弊端不一而足以一事言之諸州諸縣例有職田而本縣職田為最多監司州郡以至縣官每嵗計米二千三百餘碩盖縁本縣原有職田每嵗收租二千三百餘碩以是為起解支給之數則所謂職田者乃官司之田每嵗資其所入以為出者也今所出之數不减昔時而所入之數僅有四百餘石則所支一千九百餘石者將何所取辦乎考之案牘乃因慶元年間嘗有朝㫖出賣官田所謂官田者乃籍没逃死無主之田而非職田之謂也一時官司鹵莽畧不契勘形勢之家買諉胥吏併以職田為官田請買遂使一千二百餘石之職田一旦盡變而為豪民之田則其請買巳非朝廷指揮之本意矣至其請買之時又與鄉司通同减落等色以肥為瘠以上為下量納價錢包占膏腴名曰起理二稅而所輸絶少則又失䧟縣道之財賦矣况賣田指揮必須投狀實封給與價高之人今乃徑行請買則與朝廷法令又相違戾矣一千二百餘碩之職田共賣過六千餘貫巳係本軍申解朝廷而本縣每年白賠三千緡支解此縣道所以日見窘匱而不可為也在法交易違法錢當没官業當還主今人户輒敢違法賣官司職田則合自徑行拘籍窺見朝廷至仁寛恤百姓本縣亦不敢徑行拘籍除巳一面告示人户將職田租額納官免納二稅其元納價錢不多者本縣那兌支還惟是昨來誤賣過職田錢六千貫申解朝廷者數目浩大欲望特與備申朝廷給下本縣支還人户庶幾本縣復得職田租米支解實一邑無窮之利申江西轉運司乞申朝省照賣過屯田租米數蠲减上供本縣近凖轉運使司委請運幹李司直契勘本縣財賦每嵗所入之數欲見得拖欠總領所綱運因依本縣巳畫一開具成年收支常欠一萬七八千緡及乞使司添給貼綱水脚錢并人户違法將本縣職田作官田請買以致財賦匱乏今據人户齎出慶元三年請買屯田公據内該載朝廷昨來指揮出賣没官田産併將屯田出賣本軍曽申審以屯田租米係滚同苗米起發上供綱運今來出賣改作民田起理二稅則苗米數少比之成年起發上供綱運多有减下米數向去淮東西總領使司及轉運司難以减額具申行在提領賣官田使所乞具申尚書省則是出賣屯田之時本軍固巳知綱運之數必至拖欠矣未准囘降間本軍監勒本縣徑將屯田出賣過二千八十八石起理二稅每年只收苗米四百四十七石致使本縣每年坐失租米一千六百四十一石照得本縣苗屯米係盡數起發每年起綱六萬二千餘石今屯田出賣二千八十八石每年亦起綱六萬二千石既是朝廷賣過屯田本縣既失屯田巳出賣一千六百四十一石則上供之額亦合蠲减今屯田巳出賣而上供之數如舊如本縣每年於所收苗外白撰一千六百餘石起解此亦本縣所以狼狽之一端也欲乞使司特與詳酌向來本軍申審因依及今來所收租米數少所起綱運數多之害特與備申朝省於六萬二千餘石上供綱運之中蠲减一千五百石庶幾易於支吾不至頻年拖欠綱運實一邑無窮之幸申臨江軍為鄒司户違法典買田産事本縣昨具公狀申述鄒濤違法典買田産事盖阿江有二子長曰陳安國次曰陳安節陳安國郤瞞昧其母阿江及弟安節將共衆産業出典鄒濤鄒濤又與之通情使陳安國假作阿江及陳安節著押交易此是違法分明在法自合凖分法追陳安節分受一半産業還陳安節管業郤監陳安國錢還鄒濤方為允當今鄒濤倚恃多貲妄興詞訴脫罔台判及至本縣申陳又買囑法司輒引尊長卑幼通同之條欲先監陳安國錢畢日方給還陳安節産業陳安國既與鄒濤違法交易又豈有將錢還鄒濤而後給還陳安節産業陳安國既不肯還錢則陳安節永無得産之理以江西違法風俗盗買卑幼田産之訟最多若皆可以引用此條則形勢之家可以恣行違法置産其卑幼共分之人其合得産業為人盗賣之後永無得伸之時國家設法本為人伸雪不平豈肯使卑幼反受屈抑今觀法司所具韓吏部韓侍郎申請明言卑幼尊長或承分人通同令卑幼輒賣其業既將價錢後於官司陳論者須管追理價錢足日方許管業盖謂共分人通同令卑幼違法交易者也今安國瞞昧其母與弟輒典賣共分人田産即非通合豈得引用此條欲先監錢而後還業耶顯是法司受鄒濤情囑輒敢欺罔嚴明欲乞台慈特賜詳酌照榦元申行下庶幾形勢之家不敢違法奪人産業姦猾之吏不得侮法欺罔嚴明貧窮小民得以保全所合承分之産庶得允當申臨江軍乞申朝省除豁綱欠照得本縣全年財賦每嵗苗米額催管六萬二千餘石每嵗起解淮東西總領所上供綱并湖廣總領所馬料亦管六萬二千餘石所入有失䧟有拖欠所謂六萬二千餘石者無由粒粒催足至於支遣則起綱之外又有本縣官吏寨兵舖兵與夫宗室月俸過往批支約一萬二三千石又起綱水腳縻費等錢每嵗六萬二千石米計錢三萬七百餘貫隨苗水腳錢只收到一萬二千餘貫其餘一萬八千餘貫又係别行措置凑足以其所入且不足以支所出而本縣自慶元三年何知縣任内至今十五年間前後拖欠總領所共計四萬八千餘石每嵗三總領所專人絡繹催促縣道决無可補填徒被追擾委實切害若非朝廷痛行優恤則一邑受害無有窮已竊見前件所欠米斛具有當年官吏姓名至後來逐年綱運不曽拖欠而總所乃以新綱補足舊綱至於行移反坐以拖欠新綱之罪前之官吏正行拖欠者既巳幸免後之官吏未嘗拖欠者反被追擾淮東之專人朝來而淮西之專人夕至湖廣之專人又巳踵門矣縣庭之下三總所之吏舎也斥辱微官甚於奴𨽻扯捽小吏甚於罪囚誅求金錢甚於攘刼呌號街巷歌舞市肆必厭其所欲而後反吏輩無所從出則受賕鬻獄苛征横歛拖欠版帳預借稅苗詞訟紛拏追逮旁午故為新淦之令者十政而五敗為新淦之吏者朝補而夕配縣道既不能立則豪户控持姦民欺侮善良失職鄉井蕭條雖有循良之吏亦無所施夫戕敗一邑而足以償總所之逋給軍餉之乏官吏百謫公私俱病亦不敢辭總所之逋給無以償而縣道之入乃益以耗縣道之耗日以甚而總所之欠日以增然則不但為州縣之害而亦所以為總所之害也榦疎繆不才冒當邑寄竊見本縣委有上件利害並與蠲閣前項舊欠使一縣官吏得以洗濯自新一縣士民得以安靜無擾實出隆天厚地之賜申帥司乞免權南安軍通判事伏凖使帖差權南安軍通判職事相度置寨差軍出戍榦一介書生庸愞不武再試劇邑僅能以勤掩拙粗不廢事初無績效可稱諸司過聽屢䝉甄㧞實出望外今乃䝉使司差委攝上件職事竊見峒寇擾攘近方粗定正須遴選有風采威望可以鎮壓慈愛惠利可以撫摩之人往貳郡事如榦衰拙委實無堪加以新淦為縣敗壊日乆羣豪恣横細民失業財賦失䧟總餉屢虧自榦到任甫及半年搜尋弊端一邑之事稍有條理若奪此粗立之規就彼難任之責兩非所宜伏乞台慈特賜蠲免别行委官前去權攝庶不悞事安豐申相視開浚河道凖本軍牒委前去安豐縣體訪開河利害事榦沿途訪問開河曲折備知詳細安豐縣在本軍之南六十里縣之東有芍陂芍陂之北舊有河道可决水北流至軍城之南堙塞不通鄉人以為今百年矣通之則可以灌注安豐軍城壕可以䕃溉沿路田園可以通放舟楫誠利之大者昔人所以創為河道誠為不苟州郡以此申請亦便利之一事然亦有一說榦因以案㳫叅考初因朝廷委安撫司措置脩築安豐軍城安撫司以軍城廣濶難以猝築不若修築安豐縣城朝廷劄下本軍本軍差夀春主簿王必達前去相度王主簿相度計料外郤於申狀上稱若欲屯駐則無水路可以通運粮草其意以為有城則有兵有兵則當如合肥有水路可通長江總所餉運可以徑達今安豐縣水皆北流無南流入江之河道耳今來所開河道乃是决芍陂之水北流至軍城即與王主簿所申不同朝廷初欲修安豐縣而尋訪河道乃與修安豐縣城事體相反若不修安豐縣城則開河尚為無害若開河之後又欲築安豐縣城則河道既通泄去安豐縣之水反為安豐縣城之害矣區區愚見以為朝廷若有意修築軍城則河道可通若欲修築縣城則河道不必通矣又芍陂灌溉安豐縣民田為一縣之險要經今三千年矣其後陂之四旁往往多被豪民填塞侵耕其水源來自六安又為六安縣民决為溝渠散漫四出水利之溥巳不若舊若又開河以泄其水春水泛漲則陂之與河瀰漫泛溢兩不相害若稍旱乾河水先竭救河則害陂救陂則害河如是則河道之通可以利軍而不利於縣也更乞使軍申朝廷以决其可否庶為利便申朝省相視開浚河道照㑹近凖樞宻院劄子施行相視河道事榦沿途訪問所開河道委是利害安豐縣去本軍六十里縣東有芍陂今欲决芍陂之水以達於軍城之南可以注本軍城壕可以灌沿路民田可以通放舟楫古跡見存湮塞日乆若用工疏通以復其舊不為無益本軍申請開掘朝廷又巳從申行下無可議者又以為恐泄芍陂之水有妨本縣灌溉民田此不過上疏水源下置堰閘使陂水盈溢然後泄其有餘以時啟閉而注之河决不至陂水乾涸但目今正值隆冬盛寒艱於用工開正春事將興又恐有妨農務兼照得此河連衡於軍城縣城之間若修築軍城則此河之開最為利害若修築縣城則此河亦未宜開盖安豐縣所恃芍陂之水水既可决則芍陂不足為險今李安撫所請則欲築縣城錢運使申乞則欲築軍城有此兩端未䝉朝廷予决榦區區管見更合申朝廷乞俟晴暖用工兼俟築城之議既定庶得穩當勉齋集巻二十九
