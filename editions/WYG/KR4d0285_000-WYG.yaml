body:
  text: 勉齋集别集類三宋提要臣等謹案勉齋集四十巻宋黄幹撰幹字直卿號勉齋閩縣人少受業於朱子朱子以女妻之寧宗朝補將仕郎厯知漢陽軍安慶府以主管亳州明道宫致仕卒諡文肅事蹟具宋史道學傳是集講義經説三巻雜文三十六巻詩一巻雜文凡守郡公移案牘之辭皆在焉据其巻目與宋史藝文志相合葢猶原本也昔朱子作竹林精舎成嘗遺幹書有他時便可請直卿代即講席之語幹亦能堅守師説始終不貳然林栗與朱子論易不合至搆釁攻擊朱門弟子有欲火栗之書者幹祭栗文獨能不沒其所長可謂絶無門戸之見又史稱幹在安慶府築城部署有方民不勞而事集及金兵大至淮東西震恐獨安慶按堵如故又在制置李珏幕中力以軍政不修邊備廢弛為言珏不能用厥後光黄繼失卒如其言尤非朱學末流空談心性者可比亦足見洛閩設教之初尚具有實際不徒以峩冠博帶刻畫聖賢矣其文章大致質直不事雕飾雖筆力未為挺拔而氣體醇實要不失為儒者之言焉乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:609a294fa3ad37fc93e34b68f0de71263c5e4e50a93743b6c1a6e034bb26383d
