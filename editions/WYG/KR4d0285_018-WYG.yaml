body:
  text: 勉齊集巻十八宋黄榦撰書十五銘復李汝明書鑑中間獲奉欵晤竊觀志尚大非世俗所敢望深用歎服顧相别怱怱為恨人來承誨字感慰承諭敬義之㫖葢人有此良心良心者虛靈不昧具萬善而應萬事者也天地之所以為天地聖賢之所以為聖賢亦只是靠著此理物之感人而人之好惡無節此心旣無主宰則逐物流轉所具之善旣不行而所應之事亦悖謬而無所不至矣此敬義之訓自成湯制事心與太公所陳之丹書以及大易文言之㫖上下千餘年間同出一意其埀教後世至精至切為學而不由乎此則支離渙㪚昏惑紛擾未有得其門而入者矣直内方外本是兩項工夫直内主心方外主事敬是收斂精神使存於心者無邪曲之擾義是裁度事宜使應於事無偏詖之病然敬該夫動則方外者乃敬之流行義主於心則直内者乃義之根本則二者未嘗不相為用也要之學者自當各用其力此心所存無一息而不敬至於應事接物則又當裁度而使之得宜也承嗜學之篤下問之勤故輒詳及之榦老病益侵辭免之章再上未報不能者止自當固辭也九經之㑹數十人而未止亦盛矣哉其規模如何後便望示及閒居玩理想不為無見顧衰晚益覺為學須是驗之於心體之於身見得天理漸復人欲漸消方是有得若只是將言語説過皆不濟事更宜勉之榦兩三月來𠻳疾不止腰腹之間結成痞塊意思極不佳足下果有意於學千萬一來與此間朋友相切磨方見底藴不然書問之來倦甚不能悉報無益也榦衰病如常無足道者理義無窮歲月有限祗益懼耳足下年少才俊於前修格言記誦如流揮灑盈幅葢有世俗老儒一生辛苦所莫能及者博文約禮古人為學不過如此然博文而不約之以禮或文雖博心淺近而漫無分毫知識者則去相遠矣秋水方至百川𣺌瀰霜降水涸涯涘自見更兾勉之問目兩巻已草草答去楊慈湖文亦巳一觀有德者之言也惜乎其不純乎聖賢之學也病倦不暇縷縷與曾文仲魯仲山居閒靜若不至大叚窘束且宜閉門讀書縱未能忘應舉亦宜以一經窮硏少讀精思博諸説以求其當其中自有㑹於吾心可以受用䖏不但徒鑚故紙渉獵浮泛卒無所有也賢者以為如何每與家兄語及昆仲病在志氣不立未免於隨俗浮沈此為大害更幸思之先墳望埀念遊子遠方不勝松楸之懷忽得建陽書疾驅以來至建寧聞先師已下世苦痛不可堪勝哲人其萎微言將絶不但為二十餘年恩愛之私也榦於諸生中私恩最厚當執心喪加緦服三年而後歸鄉間書㑹不可復集但石粟諸友相愛之至兩年相聚雖於其德性上亦粗覺有益而學業全未成倫緒是使人不能無愧也方欲今歲大與整頓不意至此奈何六三哥宜一來相慰老先師臨終之書尚拳拳及之也季亨武哥不知可以一出否最可惜是朋友皆謹愿有志一兩年不相見恐遂廢耳與葉雲叟書士龍暇日千萬莫廢讀書士人惟此可以立身不須管閒事議論人物徒生悔吝不若閉門自修之為妙也榦仰惟吾友以妙年能力學自守為異鄉之人所信向殊可歎服更幸勉之朱先生諸書宜勤讀而所謂求放心者尤宜篤於用功人生萬善具足只要在人持守若只講説得不濟事也吾友雖貧可以粗足不可太柔弱反為人所凌辱常使在我有毅然不可犯之色乃佳庚四哥更望勤教誨之四郎情性比舊差勝只是輕儇浮靡之習難除做工夫不勤苦好閒講度日亦望與之切磋也榦歲晚又丐祠若得歸便洒掃精舍不復與世交矣雲叟以隻身任仰事俯畜之責誠不為易依本分教人子弟以活其家此最為上䇿但亦須自治讀書為文令有教人之具又須專心致志以思所以教人之方則書㑹庶可以長乆也家間諸事粗遣諸子未免嚴治之如此一二年亦稍成人家新歲書舘有定所否士人只有此科可入外此皆是非義今人只見攜書走四方得錢差易故往往舍舘地而事干謁不知此與乞人何異豈有士人而甘為乞人之所為乎館地不須較所得之多寡但得安身且勤於教子亦不患無人見招暇日則且勤讀書以為根本其他皆非所當用心也忍貧讀書切已進學為祝老病日甚恐未必復相見若稍健則來秋當一至唐石也蔡一哥相見為致意又鄉曲書館可以接續子弟得所矜式事親治家往來良便如是足矣惟閒居更益厲所學為佳讀書向道乃終身事不可自廢也榦老益甚病益加奉祠得閒莫大之幸亦有朋友數人可以講習若得先師之道有傳則死且無憾矣橋記鋪叙已可讀更容潤色即以奉納也答或人人來承誨字陳義甚正三復敬歎安得此賢者之言哉豈亦周遊四方歴變履險加之師良友賢聞見浸廣陶冶詩什吟咏情性乃能進益至此耶頃亦嘗屢進説於尊丈之前矣或人有云榦與令叔為黨紿令尊丈莫遷以遂令叔先移之計假使令叔先移於尊丈亦何損哉吾為兄長而弟先移吾據中堂自為家主人誰有異議我亦未嘗有毫髮之損也榦與二賢父相處三十年未嘗有一語相失握手相追逐無嫌隙相猜疑年來卻覺文至而實不孚貌親而情不隨只縁兩房互相爭競故區處其間者易使人有黨比之疑也往年先令祖違世之後令叔數過家間商量事榦或過宅中則令叔不來商議或是答人書或是喪中禮數則或人便謂榦與令叔黨尊丈多過舊里榦亦數數襆被同寢情意頗宻夜半睡醒則談話達旦又安知令叔不以榦為黨尊丈耶榦無能之人縱有偏黨亦何足道但三十年親故而皆不得用其情終日相對如畏秦人偶語之禁亦使人怏怏不樂也今因來諭請痛言之且説移居之計是何義理古人兄弟同居以相親今乃移居以相避一不可兩房各異居不知置孤寡於何地二不可先令祖締創之難死肉未寒而棄之三不可家廟書籍使誰主之四不可尊丈移此來猶有可諉者曰田園僕役之便令叔移入城又何説耶城中士大夫日相嘲毁吾乃自揭其短使人得而議之自損多矣五不可先令祖家人以為禮法之窟今乃喧爭至是六不可前途仕宦各欲寸進今乃自暴其短七不可犯是七不可而此利彼害猶不可為况此之移不足以害彼彼之移亦無損於我又何必嘵嘵如此哉二賢父年各四五十矣孤寡之餘所最親者孰如兄弟今乃相視如路人因小忿而棄懿親有人心者能無惻然於中耶先令祖平日艱難為子孫計今雖已殁而英靈魂魄猶在也吾晨起焚香而拜之退而喧爭厥聲載路在廟之靈其能安乎吾親友近聞頗工於詩精細讀棠棣之篇而歌以諷之庻其有感乎此則二賢父之所未深思者也若二昆仲則亦當自省榦嘗為鄭成叔作怡閣記因辨叔姪二字叔伯云者猶今人謂三月為孟仲季也呼春者必須曰孟春仲春季春未有捨春字而但言孟言仲言季也古人以為父之兄弟皆吾父也而有少長之分故呼父之兄則曰伯父呼父之弟則曰叔父猶曰大父小父今人呼叔伯而去父字則全無義理矣儀禮子夏曰傳云謂吾姑者吾謂之姪則姪者姑呼其兄弟之子之名也古人視兄弟之子猶子也故亦以子呼之今乃謂之姪則失之矣自兄弟之子不呼叔伯為父則不知敬其叔伯矣自叔伯父不呼兄弟之子為子則不知愛兄弟之子矣今覺賢昆仲畧無親敬賢叔父之心而間有相悖相侮之意胡不反而思之彼乃吾父之同氣同出於吾祖者也今而悖之是悖吾祖吾父也今使一哥之子悖二哥之子復悖一哥二哥其能忍乎今請賢昆仲深思此言敬謝過於賢叔父朝夕起敬起愛則賢叔父亦須感動曰吾兄之子敬愛於我如此我又安敢復悖其兄耶名賢之家弟悖其兄兄之子又悖其叔父下至婢僕之屬亦得以嫚罵其主之兄弟所謂詩禮安在耶榦嘗謂世間惟有樹木可以觀人家天倫之屬木之根即吾之祖吾之父也析而為兩榦即兄弟也又抽而為小枝即子孫也為子孫而不敬其祖父是自伐其根也一榦獨盛而一榦枯是兄弟相摧殘也小枝之有盛衰是子孫有異心也今有木焉自本根至枝葉蓊然荗盛而無尺寸之枯人必皆以為木之美者也使一榦一枝獨枯則彼之獨盛者亦不得為全木矣人家何以異此而乃自相摧殘耶榦衰晚不才辱先令祖知愛為最厚中心誠不能忘二賢父及賢昆仲也苟有可以效忠者無不願盡其心焉故因來教之及不勝喜幸而發其狂言幸因此心而充廣之知我罪我惟執事者實圖之也答黄伯新榦諸况如常無足言者但旱勢已成無可救者所幸於將旱之際急糴得米二萬石前任充積亦有二萬石接續發糶亦不至大叚空乏也自覺衰老倦於應酬亟上丐祠之請不䝉俞允丐祠未允當此苦旱難於再請前面嵗月無幾學之不講為可慮也伯量諸人亦已歸矣此間亦難得朋友講習也來教數條推測皆當自頃在臨川每見賢者所剖析義理皆明白詳審苐恐於自己身上工夫有所疏畧此事須要直下承當勇猛精進若只説過不濟事也敬子李兄信道甚篤志學甚勇朱先生之門少見其比足下無衣食之累數往訪之為益多矣朋友難得更宜勉之囘考亭諸友劄子榦復辱劄翰以祀事畢令榦講明先師教人之意榦何足以當此重念衰晚為貧逐禄廢學日久惕然於懷引疾奉祠來歸寓里正有望於朋友切磋之益若又退遜則終無請教之日矣敢不僣述所聞以期鐫誨布謝崖畧併希情亮與楊德淵書溥國博令孫有嫁母之喪聞不為持服亦不往哭嗚呼天下固有無母之子哉賢者之後禮法之家一至此耶想其令孫年少未更事事必取决於族人之長者則德淵諸賢皆不得辭其責矣又聞亦嘗謀諸城中長上以為法不當為服此大非衰晚所能曉年來風俗大壞人紀不立雖賢士大夫亦未免有可議者流風滋熾遂有今夏之事令人有不忍聞者然推此不為服之一念亦何所不至耶在禮父卒為母則齊衰三年父在為母則杖朞而繼之以繼母如母慈母如母此不可易之大典也慈母父之妾也父命之使慈己者其服尚如親母今為人後而為所後視其母乃不得與父妾比何其無人道之甚耶出母嫁從為之服報禮也謂之出母則為父所棄逐者也其旣嫁也子尚為之服朞母有過父得棄之子豈得而絶之哉况其母又未嘗為父所逐者耶若曰母嘗不恤其子挈其家貲以歸不復有母子之恩矣是可無服也然則處頑嚚之際所以虐其子者亦無時不至矣負罪引慝則聞之未聞不為之服也父母天地也豈較曲直之地耶毁冠裂冕絶滅人道一至於此豈不大可傷大可痛耶想國博之賢亦將為之目不瞑於地下矣又聞其令孫來嵗便欲赴銓如此則行將仕矣君臣父子人之大倫也求忠臣必於孝子之門未有不孝其母而能忠其君者也其亟於赴銓豈非欲急為仕進計耶方入仕之始而先犯大不孝之罪公議凛然亦何所逃於天地之間哉求一二年之速仕而犯終身之大戮亦非計之得也榦辱國博之知甚至不忍其孫之無知至此不得不相為言之切冀德淵諸賢痛為解説早自悔艾亟為制服往奔其喪服以朞而心喪以三年哀痛擗踊但知有母之恩而不知有母之故庶幾無愧於為楊國博之孫矣苟能如此則尚可以世契之故以書間相往來不然則亦不容不自絶也豈有無母之人而尚可與之交耶言之至此令人哽塞切幸亮之荆南與吳宣撫乞罷置櫃事榦竊見宣撫待制德望足以高一世者以其寛大和易有以服人心耳除命之下兒童走卒無不鼓舞此正自古英雄所以建立事功之機也然位望旣尊則下情易隔侍御者不察吾平日待下之意而徒欲為尊嚴其上之儀使吾寛和之心一變而為森嚴之狀人心一失聲望將减甚非所以成宣撫待制之美意也置櫃一事葢恐不能盡接四方之士以廣其聽聞然或者以吾為不屑以接見而遂為是舉如此則非吾平日待士之意矣今莫若先出文牓卑詞下意以求禆益然後撤去元櫃委文官忠厚禮下者一人置司於轅門之外應有投獻者不拘早晚悉令接見受納文字問其居止然後委僉㕔官詮其言之有益者遣人請之相見而慰藉之其無可采者亦第其髙下饋以薄禮如此則四方之士莫不于于然而來矣至於四方書劄亦委所差官置簿收接於書院中委一士人可託者置簿交收逐日契勘發遣囘書庻免隠匿滯留之意與宇文宣撫言荆襄事體今日之患莫甚於諸將之為欺荆襄去朝廷遠故其欺特甚武昌十萬之兵付之庸將有虛籍有老弱其間可用僅及三分之二敗衂之餘盡聚之襄陽不過二三萬人鄂州荆南全無大軍頃見薛撫以戰艦無兵盡刷其癃老者千餘人皆皓首執幟立於舟上州人相視以為兒戲向者所創鄂州一軍豈專欲守襄陽哉大軍僅足守襄陽則卒有緩急數百里之地又何所倚賴軍籍旣少又皆貧困無聊至有妻女求食於人者至於主帥則其所服用皆精選其所愛幸皆姝麗又安責其善戰士大夫莫敢議其軍政者其事又難言也偏禆之中又甚可駭榦頃䝉宣總帥三司差往提㸃信陽三闗是時襄陽遣三將各將千人以守三闗癃老惷愚曽卒伍之不若榦深竊憂之亟以書白陳副宣副宣復書曰其軍中大抵皆此物此葢以庸繆之帥擇庸繆之將豈暇計勇力事藝亦不過以其善奉承而遷之耳是以臨敵之際不戰而潰襄陽之圍特因敵人之退而乗之使之正與為敵亦有棄甲而遁耳今若因仍舊貫使此人將此兵宣司日出數百萬緡復招數十萬兵以益之其相習成風未見其可用也為今之計者要須振起而更張之多遣官吏賷金帛招勇敢强有力之人擇良將以統之屯於巴陵公安之間不使之習見鄂州將帥之故態日夜教閲其不如令者繩以軍法使之感恩而畏威則庶幾緩急不至復蹈前日之轍鄂州見軍屯襄陽者且使舊帥統之以守襄陽吾之所自立一軍别擇主帥氣勢旣張則襄陽之帥亦不待易而惟吾之約束彼見吾所自立之軍紀律嚴整則亦將變其故態皆為精兵異日事定從而移易之亦不難矣自去夏唐州一敗之後不復敢言進取敵已知吾軍之弱矣去冬徳安襄陽之圍其初猶有救援之兵然而每戰輒敗自後數月絶無一騎敢向之者敵又有以知吾之弱矣然猶有魏友諒一軍萬伍千餘人退襄陽二百里以守荆門雖不能退襄陽之圍尚足以為荆門之蔽二月十有四日敵騎數千未至荆門數十里友諒䇿馬先遁諸軍從之敵遂悍然據荆門以瞰荆南此又豈待遣間諜而後知吾之弱哉使和可成城可保敵人厭兵不復言戰武昌十萬之師尚不可不為之修復其舊况敵人之情詭詐難測萬一秋高馬肥乘吾之虚以擣荆襄非兵力之盛其何以禦之使吾兵備旣整敵人見吾之强則亦將望風而莫敢來縱使之來吾有以待之亦不至於倉皇無策矣此一事者其利害最大可以振起數十年軍政之弊可以强國可以服人與夫蹈常襲故有敗無成者相去遠矣又畫一六事一江陵城壁較之襄陽其厚薄高下僅得三分之二所以今此人心極為皇皇向者築城之人務為欺誑於低城上高為女墻以惑外觀吳宣撫為設險之計無所不至獨於城壁尚未暇及今宜増之使高至於城薄亦須培之使厚攻城之法不過攻吾城腳今縱未能盡使之厚且培城腳高丈餘各厚五六尺稍有餘力又逐旋培之城壁旣堅則在我有可恃之勢矣鄂州軍餉所聚人物繁盛控扼險要乃全無城壁去嵗陳副宣欲以錢數萬緡助鄂州築城太守不從而止今移趙守守鄂聞其人頗喜事宜力賛之此急務也恐燒磚鳩工具器用非一日可辦宜先以書委官屬使一面措置一荆襄粮食空乏深可為慮葢彼中連年旱荒决無所從出今嵗江池人民流離旣不耕種亦决無租賦可輸若俟到彼而旋請之則無及矣莫若便請於朝乞撥何處米以實荆襄便就此委官前去催促庶幾易以辦集一諸軍器甲全少荆襄湖北事力已竭責之打造未必足用今亦宜請之於朝行下他路打造應付亦合便委官前去催督鐵甲用工最多未必便能辦集目今綿絹新熟宜早委官於湖南收買以備軟纒之用長鎗弓弩軍中固不可闕然則敵騎之衝突則長刀巨斧义䥥尤為要切此等器械新招之軍不教而能不可不多置也一義勇民兵只可用以守城不可恃以野戰葢其心終是自謂百姓未必有死敵之心也又統之者皆是總首不過鄉里有物力之家恃之野戰未必可用但擇其强者教之弓弩用之守城可也向聞義勇至府吏輩例有需索總首又有誅求故其間不無私下放免及代名抵替之弊此當申明約束敢有犯者以軍法治之可也一忠義軍之名甚佳其人亦可用但其實只是相聚為盗賊榦頃在信陽聞董達者其下有二千人日遣其徒劫掠平民至官司調發則逃匿山谷不肻為用前此聞其欲俟敵人之至便先焚燒應山其後亦聞果如其言此曹若不早為區處異日必聚為大盗須是得其願充正軍方入紀律㧞其首領命之以官方知自愛一㳂江南岸全無守備戰艦不可不早備水手不可不早招兵法先聲當使敵人望風而不敢犯乃為長䇿建寧社倉利病竊見閩中之俗建寧最為難治山川險峻故小民好鬭而輕生土壤狹隘故大家寡恩而嗇施米以五六升為斗每斗不過五六十錢其或旱及踰月增至百金大家必閉倉以俟高價小民亦群起殺人以取其禾閭里為之震駭官吏困於誅捕苟或負固難擒必且嘯聚為變往者里之寄居有憂其然者遂請於官得米五六十石賑貸於其里計其口數給以五月至冬而輸取息二分日增月益累數千石米日益多所及益廣謂之社倉其後他郡縣亦有倣而為之者鄉民五六月間坐得一月之粮一月之後早禾已登塲矣是以米價不至騰踊富家無所牟利故無閉糴之家小民不至乏食故無刧禾之患二十餘年里閭安帖無復他變葢所以隂消潜弭之者皆社倉之力也數年以來主其事者多非其人故有鄉里大家詭立名字貸而不輸有至數十百石者然細民之貸者則毫髪不敢有負去冬少歉使趙公行部豪猾詭名之徒所逋甚多恐無以償遂鼔率陳詞乞權免催趙公遂從其請而細民善良者亦觀望而不輸矣所在社倉索然一空今嵗五六月間鄉民遂失常年社倉所貸一月之食其勢不得不奔走告糴於大家大家利其告糴之急遂索價愈高至於百八九十金而無可糴之處較之常年則是三倍其直矣由是細民之艱食者百十為群聚於大家以借禾為名不可則徑發其廩又不可則殺其人而㪚其儲居民皇皇為之不安崇安一鄉大家相率逃避於州縣者不可勝數人情如此誠非小故雖國家法令嚴宻不敢有變而患生不測可為深慮若社倉之制自此而廢則嗣嵗之憂誠未艾也為今之計莫若行下本路監司委官早行措置去嵗之逋必有索之之道積年之弊必有革之之方使社倉之制旣復則建寧之民可安事雖若微所闗甚大不可不熟慮不可不早圖代胡總領論保伍某猥以庸虛誤䝉委寄總餉淮右責任非輕每念先世當紹興間力抗姦臣扶持大義某若不勉盡忠悃是無以報君恩而見先世於地下也竊見金人扼我雄據中原埀九十年矣天地之數窮則必復今自更化以來正人登庸庶政修舉和氣充塞年榖屢登彼中無道骨肉相殘外敵侵追旱蝗荐臻狼狽遷徙此天厭邊㓂而啟吾國中興之兆㫁可見矣聖君賢相經營圖國固非庸凡所能測識然愚竊料之今日之計莫急於經理兩淮長江者江南之藩蔽兩淮者又長江之藩蔽無兩淮是無長江也今日選守明日擇令今日浚壕明日修城是亦足恃以為經理乎今日之患莫大於兵力之不足㳂江數千里屯戍之兵不過二十萬分戍淮郡多者二三千人少者數百人雖有守令何所用力雖有城壁將誰與守豈不可㴱慮乎愚竊以為防江之兵力固不可不增戍兩淮然有䇿於此不張皇不勞擾坐得一二十萬之精卒以守長淮數千里之境土國家何憚而不為此葢為今之計莫若用兩淮之人食兩淮之粟守兩淮之地夫南北之人氣禀不同以淮人而較之江南之人則强弱勇怯大不侔矣生長淮壖與敵相諳騎射劒㦸其所素習山川險易其所熟知淮陰之韓英六之布皆淮人也曩者敵人衝突遇大軍則索戰遇淮人則退卻此其明騐也又紹興開禧間敵人犯淮俘擄殺戮切骨怨憤所欲甘心於敵人者其素志也籍而用之豈不賢於防戍之卒乎又其地廣漠所務農桑所蓄米麥因其農隙教以習戰無養兵之費而得養兵之用計無善於此者矣然而用淮人之䇿必先明保伍自五家為伍則伍有伍長五伍為隊則隊有隊長四隊百人則有百人之長五百人則為一將二千五百人則為一軍有統領四軍萬人則為統制以總之度其郡之大小廣狹而為統制多寡之數又立都統制以總之自都統以下各以物力高下人才服衆為差自軍將而上則朝廷給之官資以下則制司補以文帖其為保伍不過以防捍鄉井為名而已及至緩急人自為戰皆精卒也保伍旣明則為之置立堡寨葢淮民㪚居平土卒有緩急米麥無所藏妻孥無所託不為俘擄則為餓莩不甘於轉死則去為盗賊惟或依山或附水創置寨屋立囷倉使各隨其隊伍而居之閒居則預藏米麥有急則安存老弱旣有所居則莫不愛䕶鄉井與㓂為敵二者旣定則寛其力役以安之設馬監置軍器以資之兩淮之民不苦於税而苦於役州縣之吏知其税之輕也則重役以困之有保伍有總首一有行移總保俱受其害今旣籍為保伍凡有追胥行之保伍足矣而總保可廢也人免總保之苦則亦樂於保伍之法不待驅而自從也兩淮之地承平之際畜馬成群開禧之後靡有孑遺今馬之價數倍江南而人之畜馬者絶少淮人長於用騎而苦於無馬其所乗之馬亦不必産於西北凡江南常馬畜於其地風氣堅勁水草肥饒亦皆可用惟廣鬻江南之馬而畜之淮上隨其保伍因以給之又為之制軍器以資其用不過累月而軍政可成矣雖然天下未嘗無可用之法而常患無能用之人朝廷擇一制帥而付以閫外之任乃獨置之江南而於淮甸之事旣未嘗諳悉又僚屬不許辟置則朝夕所與圖事者又將何所恃乎愚以為莫若移制司於歴陽居兩淮之中而去江咫尺文移往來莫此為便又許之自辟其屬四五人往來兩淮措置保伍則庶幾所立之法不至徒為文具矣此法旣定忽有小警甲兵之問不至廟堂而彼自有以處之此與調江南之兵相去萬萬也且不惟足以禦敵而已兩江之民遭丙寅之危瘡痍未合今聞敵人遷居汴京莫不狼顧脅息皆有棄田廬挈妻子或渡江或入山之意其間素號勇悍者則將且伺變竊發向者湖海張軍三之變為兩淮之害甚於敵人今若不早為之所則兩淮日見荒墟卒有警急皆攘臂而去矣惟結為保伍而使物力最高者統之則為首者皆知自愛而其下亦各有服屬旣有險阻之可恃則不至輕去故鄉旣有上下之相維則不至輕為盗賊此非愚之䇿也管仲内政之策也朝廷所議邊事每以張皇為慮今以保伍為名以防託鄉井為説則不至張皇而屹然有不可拔之勢矣囘總郎言築城事榦復䝉台慈寵示劄翰遣至濠寨官陳校尉并所畫城圖令榦再行相度仰認某官體國憂邊思患預防之意榦與一郡吏民不勝感激榦一介書生於世事都不通曉向來所建築城之議亦是世俗常談其所畫城壁方向亦是臆度已見今䝉台念因得聞所未聞遂帥郡僚陟降觀覽形勢雄壯誠如台諭嘉定五年間郡守趙朝奉亦嘗借到壕寨李忠顯相視計料亦只欲築向西一面接連大别山為固東西兩面下瞰大江不築城壁其後制置司疏駁三事其一以為錢監之側有水坑難修築其二以為大别山濶遠空難用工其三以為南面鑰匙頭之外旣有空地恐不足禦敵趙知軍遂不敢復請今同壕寨官相視前一項錢監之側即無水坑但後面兩項亦有可疑今以鄙見與趙知軍所請規摹較之趙知軍所請即今使所請示之圖也乃是鄂州大軍中原立規模如此榦所請只欲依郡治後小山向西築至朝天門即自朝天門斜取壕東門過水軍寨至南紀門㳂堤包築後接郡治後山周囘不滿七里則四面皆有城壁一城之民知有城壁則人心可安城之四面皆可相望廂禁軍及市兵以至義武民兵亦可固守但以形勢論之則城不若併包大别山之為壯也然欲築四面一帶接連大别山為固則形勢雖是雄壯顧其間亦有可疑者面面向南鑰匙頭之外有地數十丈旣無城壁則敵人必窺恐難守禦合肥之城可謂雄壯只有水門可入賊人攻城徑趨水門合肥之人危如累卵其可疑者一也自錢監之側向南至江並是依山創築城壁誠為險要但去民居遙遠如大别山則相去又高且遠緩急之際欲帥市民以守城則其聲援委不相及其可疑者二也築城雖以禦敵然兩軍相向姦民四起東南兩面旣無城壁姦人窺伺官司難以稽考安知舟中不為敵國向日守城幾於不免者無城壁以稽察姦盗耳其可疑者三也四面皆有城壁人心皆有所恃則顧其室家不忍遷徙官司亦可與民守之效死勿去東南兩面旣無城壁人心不安皆相率而渡江矣雖有大别之山將誰與守其可疑者四也大别山一帶其上下濶其兩旁皆險峻誠為可恃但其下若不剗削其上若不築城則形勢凌遲亦可扳援而至若欲剗削則其山多石難以施工若欲築城則其山無土亦難用力費用浸廣功役難成其可疑者五也如榦之説方為城郭如趙知軍之説則特為一闗隘耳非城郭之謂也然大别天險委是雄壯若欲守禦亦不可廢為今之計莫若兩利而俱存之先如榦之説築為周圍可恃之城令其堅固而不可㧞然後於西北隅接連創築低城以至大别山之上大别之顚或累石或用木為欄障要使内城堅固而其外特以為之䕶衞耳如合肥之城亦然使外城可守則用以卻敵不可守則退守内城内城旣固孰敢頓兵其下久而不去哉大抵建功立事須是思其始而圖其終考其利而究其害務求其實而不求其名毎觀世道日降人心日薄士大夫之為國謀者必不如其家為民計者必不如其身但圖一時之名但思一己之利異日之可恃皆不論也區區之愚更望台慈將榦所陳聞之計臺聚三司屬官而通議之如榦妄論或有未當亦望疏駁行下往復詰難務求至當之䇿使早有定論日下計度便行燒磚買木成就嵗月之間不勝吏民之幸銘石門酒器五銘磨銘上動下靜象天地前推後盪象六子晝夜運行命不已精粗紛綸物資始君子省身盍顧諟無小無大亦一理醡床銘責酒清易責人清難智者於酒可以反觀陶器銘一綫之漏足以敗酒一念之差得無敗所守乎燒器銘厚其耳廣其腹厚故勝廣故蓄綿薄任重祗以覆其餗升銘凡物之理不平則鳴不足則歉太溢則傾誰謂剖㪷而民不爭其取也寧過於嗇其與也寧過於盈是又所以為不平之平乎勉齋集巻十八
