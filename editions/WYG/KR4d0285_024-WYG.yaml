body:
  text: 勉齋集巻二十四宋黄榦撰婚書代劉氏女嫁鄭氏望通德之門雖乆欽於俊譽持知足之戒敢自託於華姻忽辱魚緘巳諧鳳卜某人聲馳簮紱實鍾懐玉之地靈某人業務組紃粗識屏山之家範封聨畛接曽無數舎之遥帨結衿施永締百年之好大兒娶舅氏女師門教育之勤恩均父子甥舘追隨之樂情等弟兄感積年辱愛之懷起再世為婚之念垂䝉高誼不替遺言某人稟性醇和姑姪最親於平日某人賦才疎拙兒童素鞠於外家遂聨二姓之懽夫豈一朝之雅惟是姻㜕之攸好亦圖道德之是依自顧頹齡無侍燕申之誨庶幾晚輩尚獲聞禮之餘冐貢微誠敬納嘉禮仲子娶潘氏女言念父兄嘗偕侍拙齋之席豈期子弟復同升雲谷之堂載聨二姓之姻實篤三生之契某人天資溫淑習姆訓以素嫻某人性質庸凡讀翁書而未悟輒憑乆好敬附高門禮謹大婚願早遂室家之好職修半子庶與聞詩禮之餘季子娶趙氏里閈論文不但燈火十年之舊婚姻締好復聨室家二姓之歡得諸氣味之同非以勢利而論有請斯諾匪今所期某人稟姿温良飽習家庭之儀則某人受材疎拙方親師友之箴規觀平生磋切之情卜他日諧和之意老夫耄矣每思師訓之無傳小子聽之幸有婦翁之可學長女嫁高氏師門洒掃乆矣望囘宦路驅馳居然薦禰脱畧勢分講求婚姻兹今世之所難雖小官而敢避伏承令弟謹醇有守得自家傳而榦長女朴拙無他未嫻姆訓既以友朋之咸賛繼而幣帛之鼎來難弟難兄足見壎箎之樂有家有室永臻琴瑟之和叔女嫁陳氏交游滿目莫如兩家兄弟之親子姪通名復講二姓婚姻之好有高風誼來畀雲緘伏承某人質厚而文衣鉢親承於諸父榦第三女性愚而樸韲鹽備見於迺翁以配高閎庶無違教夢囘里社不勝鱸鱠之情喜溢門闌行覩鳳鳴之慶代朱氏娶李氏學禮學詩非一日友朋之契有家有室合百秊男女之歡適當時變之不同益感交情之獨厚伏承令女少嫻父訓功容言德之既全某男粗承祖風洒掃進退之未習實焜燿先公之望俾周旋賢者之門以其子妻之不但幸聨於姻事得為君御矣庶幾有頼於作成疏代劉樞府請開善長老疏瞻省松楸緬懐先烈䖍修香火乆創精廬為一方梵宇之雄乃四海衲僧之聚大揚祖意􅍦頼宗師某人具智慧根離意識想蚤歴五湖之外徧參萬法之源嫡嗣雲庵實繼雲門之衣鉢好辭建鄴來持建水之鈐槌冀飛錫之俯臨庶叢林之改色祝文安慶祈晴文滛雨過常失秋歛冬藏之節至仁育物播陽開隂闔之功載竭精忠願孚善應伏念臣誤叨郡寄深軫民憂竊希魯頌之務農尤監莒城之恃陋且耕且築百堵皆興曰雨曰暘三時不害適秋成之在候值隂沴之為災禾生耳而無收牆及肩而欲敗罪皆由巳痛則呼天伏願矜憫黎元斡囘造化清風四起盡掃重隂白日正中頓開霽景色動三農之喜聲騰萬杵之歡永荷洪庥敢㤀寸報栗山書社祭神文揚枹兮拊鼔燎薌兮奠糈羽駕集兮繽紛神翩翩兮來下拜舞兮鏘鏘劍舞兮滿堂陳齊謳兮趙瑟羅桂酒兮椒漿神熏熏兮既醉詔諸生兮上征操弧矢兮射魁斗跨龍首兮登天庭諸生兮蹈舞神之靈兮予祜鼔詞鋒兮一戰掃千軍兮莫予禦秋風高兮槐黄月魄兮桂子香旂紛紛兮耀神凱音奏兮琅琅諸生喜兮交賀宰肥牛兮烹羊走靈祠兮百拜報神休兮不忘閩縣學謁先聖文維季月日後學黄榦謹率同舎拜謁於先聖先師榦等適以今嵗聚學於先聖之宫惟先聖所以教人見於門人所記者曰博我以文約我以禮又曰子以四教文行忠信蓋博文所以致其知約禮所以見諸行加之以忠信誠慤之心則知無不精行無不篤也竊嘗聞於當世宗師者如此敢不痛自循省勉勵同志以無負先聖之教顧惟庸陋舎巳芸人日瞻聖容有靦面目恭惟先聖道通古今不倦之心千古如在憫兹後學尚克相之敢告荆南代吳安撫禱雨文往嵗之夏不雨而暘饉饑薦臻民卒流亡彼夏而旱巳乖其常此春而旱于何不臧干戈方起田疇多荒失時不耕後將安望刑政之愆某身是當毋虐我民亦孔之傷神之聰明實佐彼蒼嗚呼仁哉反妖為祥臨川謁廟文社稷往季大歉井邑蕭然一稔之餘民窮自若顧瞻四境愓然于中神之聰明尚克有相縣學聞古之從政勸學為先義理既明風俗自媺榦敢不敬從衿佩勉課誦弦城隍神司此民而吏治之惟敬於民乃敬於神吏治此民而神庇之惟福於民乃福於吏故吏之始至敬謁神祠非有所祈惟民是禱顔魯公祠惟公孤忠壯節萬世如生臣子大倫頼公以立吏司教化自拜公祠庶與邑人聞風而起晏元獻祠惟公受天間氣為世鉅公山川炳靈顧瞻如在吏司教化自謁祠宫庶公邑人聞風而起祭龍潭文諸侯祭名山大川之在境内者禮也令雖卑而地倍子男其職為近民民之不幸而有水旱之灾非名山大川其奚禱案圖考牒質諸父老云南濟之山嵌嵓嵂崒其上為潭泓渟黯黮神龍之所潜一邑之望今嵗之春雨暘時若禾黍芃芃民生有樂及兹大夏不雨逾月早禾之入巳乖所望晚稻方茂田又告拆天之於民勤矣胡為而至此極耶將吏職有不恭歟民情有不通歟是非有不明歟聽斷有不公歟賦役或太煩歟刑罰或失中歟此吏之愆匪民之罪也使者守令反躬自責靡神不舉卒不獲應豈天神人鬼之不歆非祀歟抑興雲雨潤萬物固有其職歟此榦所以犇走數舎而有禱于神也膚寸之雲足以澤百里之廣三日之霖足以慰終嵗之望神亦何憚而不惠我民耶新淦謁廟文縣學昔者夫子嘗曰達果藝於從政乎何有榦於三者未能有一焉若曰居之無倦行之以忠榦雖不敏請事斯語矣城隍新淦之為邑神實司其土江山之秀風俗之媺吏稱其職民安其業神亦與有榮焉以壯哉之邑而注闕天官者皆望洋而退吏不能自安民亦無所赴訴豈不重為神羞耶榦之疎繆冐昧此來廉勤自將固不敢有愧於巳庇䕶之福亦不能無望於神莅事之初敢敬以告建康謁廟文府學不學而仕無能而祿義不精不足以集事意不誠不能以動人自取悔尤分當誅斥上恩寛大易地名藩聖訓具存服膺敢怠反身自省以蓋前愆視事之初敢敬以告城隍榦丞郡無狀分合誅斥聖恩寛大姑令易地趨走大府朝夕凜然頼神之休庶無後悔視事之初敢敬以告漢陽軍祭五先生文濓溪周先生文維嘉定八年嵗次乙亥十有二月乙酉朔六日庚寅漢陽軍學五先生祠堂成宣教郎權發遣漢陽軍兼管内勸農營田事提舉義男民兵黄榦謹率郡僚及諸生釋奠于濓溪周先生惟先生資稟清明襟懐灑落光風霽月碧草紅蕖推太極二五以探造化之原定仁義中正以顯人極之立紹孔孟不傳之緒闡古今未發之機眷惟舂陵實𨽻荆楚湘波餘潤沾丐邦人假守于兹敢忘祠祀庶幾末學尚想高風敢告二程先生惟先生西洛儲精濓溪嗣𣲖春温秋肅玉潤金堅指持敬以明存養之端論致知以極貫通之妙聖道益闡後學有師眷惟鄰封實生賢哲釋奠有令著在禮經假守于兹敢忘祠祀師生並列萬古儀型敢告建安游先生先生德器晬然學問日進見稱於師清德重望皎如日星見稱於友流風餘韻足以師範斯世惠政在民至於乆而不忘先生之於此則遺澤固不淺矣百餘年間士風淳質可與適道非其效歟然訪之學宫祠貎猶缺遺前賢之軌躅泯後學之儀型師帥之職得無曠歟是用建祠以舉墜典敢告新安朱先生惟先生稟資高明厲志剛毅師延平以繼龜山之緒沂西洛以尋洙泗之原六經之指乆鬱而明周程之學將訛而正玩索窮乎杪忽操履極於高堅張皇大中啟迪後學人尊其道家誦其書榦也庸愚早䝉誨誘總角聞道皓首無成願與邦人起敬起慕敢告安慶府祭諸廟文灊皖之勝穹窿磅礴甲於兩淮山川之靈降而為神則聰明正直其必有以大庇兹土也榦衰晚庸陋假守于兹勉竭疲駑深懼弗稱禦菑捍患使五榖屢豐百姓安業者惟神其相之祗謁之初敢敬以禱奏狀漢陽條奏便民五事一結保伍臣竊見國家比年以來講求邊備最為詳宻然臣竊以為外侮固所當慮而内患尤所當憂今之内患莫甚於民心渙散而無統嘗觀成周比閭族黨州鄉之法上下相維脈絡相關隄防宻而姦宄不生法制嚴而馴服有素是以人心有所統攝而緩急不敢以自肆後世保伍之法猶有成周之遺意然州縣之間未嘗舉行不過保正掌追胥户長掌租稅而巳以一家而總數十里之地以一身而任數百户之責又每一二年而輒易此豈足以總攝人心使之乆安而無變哉臣嘗為臨川令當開禧用兵之後隅官之法未盡廢其法以五家為一小甲五小甲為一大甲四大甲為一團長一里之内總數團長為一里正一鄉之内總數鄉官為一隅官以察姦慝以䕶鄉井行之三年人以為便今者䝉恩假守漢陽適值天旱細民艱食修舉荒政遂推行保伍之法户籍多寡蓄積有無皆可得而周知然亦但為荒政設耳不敢大有所更張也向使熟議而力行之則維持人心防閑變故之道無以易此况湖右之地皆五方雜處之民土地廣袤姦盗伏藏往年冦未入境嘯呼成羣剽刼閭里者皆此曹也使保伍之法既明則人心素有統屬亦何至於肆行而莫之禁耶故知保伍之法乃所以總攝人心防閑變故而為緩急之慮也苟法制素守人心既孚因其農隙教以武事則伍兩卒旅軍師之制可以漸復而戰攻守禦之習亦無不精不惟不至於為冦而又足以禦冦亦何憚而不為乎臣所陳果有可採乞行下制置司詳議施行取進二廣儲蓄臣恭惟國家以深仁厚澤覆露宇内一民一物之㣲撫摩愛育不忍使之不得其所獨於水旱凶荒州縣無素備之策而民之死於餓莩者不知其幾甚可傷也今之守令為救荒之策者不過曰勸分曰通商而巳勸分通商不聽其自為低昂則客旅稅户不肯出粟若聽其自為低昻則人心無厭數倍其價閭閻小民當豐穰之嵗亦必父子竭作然後可以易一飽迨至凶荒雖有技藝巳無所售安得有數倍之錢可以糴米則亦有相與枕藉而死耳夫事固有若老生常談而確然不可易者廣儲蓄是也然人皆知其不可易而不可為者病在因循而巳本軍每嵗苗米不過二千餘石僅足以解總所給大軍而本軍官兵之請給皆旋行收糴萬石知軍王從繼之亦糴萬石今嵗大旱偶米價未大貴之日臣急發郡帑借貸緡錢糴客舟稅户米三萬餘石漢川縣亦糴萬石自六月以來米價頓貴藉此六萬餘石之米發以賑糶每户數石則亦可以及萬餘之衆日食賤米而無慮以是推之則積貯者信其為天下之大命也臣愚以為莫若及今行下兩浙江東西湖南北諸路擇沿江十數大郡起立倉厫使可積數十萬石纔遇豐熟即於諸郡和糴樁積則十郡可積數百萬石雖有水旱不能為吾憂矣况敵運日衰中原故壤指日可復師旅一動悉發此米萬舟而下何患糧食之不繼哉方旱而思造舟方暑而思造裘雖若近於迂濶然先事而慮可以無憂事至而憂則無及矣惟集議而决行之天下幸甚取進止三修軍政臣竊見州郡之間有廂軍有禁軍非􅍦以備使令蓋將使之執干戈以為攻守之用江北之兵視江南内地為尤重臣獨怪江北之兵反不若江南之有紀律朝而來暮而去甲之名乙承之丙又承之累數十人無非甲也累數十年無非甲也十人之中無妻孥者七八苟於趨利輕於犯法屢黥莫之悔也緩急之際求其不相挺而為盗巳為幸矣况敢望其備攻守之用乎臣守漢陽嘗觀諸軍之請給廂軍月糧五斗禁軍倍之夫五斗之米不足以供一卒一月之食薪蔬之費巳無所從出尚何暇為妻孥計哉春冬衣賜則以鐵錢折支視中州所得五分之一耳夫衣食足則知自愛所施者厚則其報之者亦然今待之如此其薄是驅之使為不肖也臣到任之初廂禁軍各添支月糧五斗復與之料錢數百嫁娶生育則助其費疾病則給以藥差出日乆則贍其家無屋可居則為營寨以處之向之單身無家者皆有願為之室者矣到任一年輕於犯法者絶少而逃竄者則絶無也以此思之則前日不為吾用者責有所歸矣臣愚以為有一郡必有一郡之財賦誠能樽節用度檢防滲漏以修舉軍政當務之急莫先於此臣前所言三事皆本軍所巳行者非敢自言其能也因其巳試然後見其可行不敢為誕謾嘗試之言也敢輒僣陳之以俟採擇取進止四領監卒臣竊見漢陽軍地居江北實巴蜀之咽喉武昌之藩蔽財賦窘乏兵籍單弱反不若江南之一小縣地逼諸臺費倍他郡廂禁軍通約五百人而總漕兩司占破其半其餘以備差使猶且不給尚何暇教習以為守禦之備乎若欲廣行招募則事力既乏無以給之今臣愚計可以不費錢糧而坐得數百人之精卒以為州郡之用竊見本軍有鐵錢監一所置監之初每嵗認額十萬貫臣到任之始覈實其數累數年間樁積極少問之監吏則曰所鑄之錢僅足以充監卒請給之費守臣雖任提督㸃檢之責而其權乃屬淮西坑冶司任其事者自有監官出入多寡守臣不得而問焉弊之有無臣不敢知也獨竊見鼔鑄之卒不下三百人類皆伉健可用月有廩給供贍頗厚非廂禁軍比也若以錢監之權屬之湖北漕司而使守臣掌其收支出入在監之卒悉聽守臣之節制不惟監中之弊可革而數百人之卒可以助州郡之軍額鼓鑄之暇教以武事而為緩急之備此所謂不費錢糧而坐得數百人之精卒計無便於此者如臣言可採乞行下湖北轉運司相度施行取進止五復馬監臣竊見馬政國之大事也騋牝三千衛國以興思馬斯徂魯人頌之則其關繫誠為不輕國家所用之馬西取於蜀南取於廣皆在數千里之外轉易之費道里之費一馬之入動數百千其所得甚艱所費甚巨一有緩急無馬可用開禧年間敵騎壓境旋行收買駑駘下乘亦以備數平居暇日可不思所以處之乎竊見漢陽管内有馬監一所馬之自蜀來者憩息於此五日而後行守臣亦預㸃檢之責臣嘗親至其地見馬監之前有所謂孳生監者乃鄂州大軍昔日所創方其盛時馬之蕃息可以足軍中之用今監皆頽敗不復有馬矣漢陽為郡土壤甚廣風氣甚勁水草甚饒若委之守臣使之興復舊監以為牧馬之地給降本錢收買江北所産之馬而蕃息之差撥兵卒使任牧養之責數年之間生息蕃盛猝有緩急即可為用與夫求之於至逺之地買之於倉卒之際其利害相去逺矣如臣之愚未必深曉世務更乞行下總領所同鄂州都統司相度施行取進止勉齋集巻二十四
