body:
  text: 勉齋集巻三十三宋黄榦撰判語陳如椿論房弟婦不應立異姓子爲嗣使府送下陳如椿論房弟婦劉氏不應立異姓子爲嗣委本縣照條看定申本縣叅攷案牘又有見任辰溪知縣陳敏學申州公狀亦與陳如椿之詞一同劉氏以為其夫寧鄉知縣陳邵於甲寅年在潭州抱養同官遺棄之子立名志學經今十六年即非今方立爲嗣辰溪知縣陳敏學及陳如椿却稱知縣不曾立外人爲嗣今考陳如椿之辭以爲知縣癸丑年離仕志學甲寅年始生則是在潭州時猶未生此收養之子據劉氏賫出印紙陳知縣乃是癸丑年冬十一月方滿亦安知非其尚留潭州兩月間收養志學以爲子乎又考陳如椿之辭以爲知縣但有庶生子六三哥即無收養之子據劉氏却稱六三哥亦是收養之子及再令陳如椿供對却是收養吳博士之子其言詞义自反覆則其所告志學非收養之子亦是虛妄可知又據劉氏賫到自童䝉以來讀書學字十數巻皆積年陳舊文字問其所從之師則在撫州者見有先生姓饒及請到饒先生供對則又稱去年陳知縣已送志學相從讀書豈得以爲身死之後旋立十五六歲異姓之子乎陳知縣年五十有七而亡其妻劉氏亦年五六十歲其相處不爲不久何其夫身死之後乃信幹僕之言立十五六歲素不相識之子以爲嗣乎則陳如椿之虚妄無可疑者陳如椿自稱挾術爲生則其爲人乃破落把持起倒劉氏錢物而不得遂扶陳敏學論訴意欲立敏學之子爲陳知縣之嗣異日併有劉氏物業此市井破落之常不足深責辰溪知縣陳敏學身爲士夫不顧義理不念劉氏乃其叔母亦敢移文本州與破落陳如椿挾同妄訢欲以呑併叔父之業亷耻道喪莫此爲甚今據劉氏所供辰溪知縣陳敏學之父一機亦是陳安撫收養遺棄之子今乃罪劉氏不合收養爲不當是責其祖辱其父也爲人子者責其祖辱其父誣其零丁孤寡之叔母罪莫大焉合將陳如椿重行勘斷念其於劉氏之子有族伯之親申解使府乞將陳如椿責戒釋放仍牒辰溪知縣知委庶其少知改悔以全士大夫之名節餘人放崇真觀女道士論掘墳儒者之道自君臣父子榖粟桑麻養生喪死之外無他說異端虚無之教古無所有不惟不知信义且斥而絶之張官置吏又不過行儒者之道使斯民相生相養和平輯睦則歛福鍚民莫過於此豈有崇信老佛賊害生民而可以求福田利益之理崇眞觀稱某夫人修煉之所今女道士居之虚無誕謾不足考信假令有之亦儒者之所當斥絶世有豪傑之士必廬其居火其書偶其徒使不得以亂吾教豈有拆人屋廬掘人墳墓使老㓜存沒咨嗟怨恨政足以上干天地之和乂豈能求福應哉自女道士王道存賫出本觀文書以與熊氏十數家爭訟地界以爲十數家所居之屋所葬之墓皆觀中之地是以十數家者亦賫出十數年文書各有經界打量葢莫辯其爲誰氏之産官司自不應受理本縣何主簿親至地頭看定得見合給還人户分明王道存復經轉運司論訴一時定奪官員不憑人户文書乃欲給還觀中運使趙龍圖雖從其說亦不過折一家之屋餘令認還賃錢即未常許其掘人墳墓也王道存乃一隂毒狠鷙之老婦人恃其瀾飜之口舌奔走於貴要之門必欲發掘余登譚太兩家數十年已葬之墳墓本職亦嘗親至其地見其觀中所謂三劍塜者巍然居中有江鄧兩家之墳饒聶兩家之山與塜爲鄰而余登譚太之墳乃在江鄧饒聶墳之外去塜最逺今乃捨其近而攻其逺此其出於王道存之私忿無可疑者遂備申轉運使司乞免掘兩家墳墓亦古人掩骼埋胔之意運使趙龍圖遂判居民元占本觀基地造屋居止只合量還本觀賃地錢如占葬日久並不得勒令舉掘上司所判如此則亦深悔前日折屋之非而猶以今來掘墓爲戒也況其地又未必真爲觀中之地本觀自合聽從上司所斷今乃輙敢走經省部埋頭陳詞更不言已經監司結絶顯是頑猾江西之俗固號健訟然亦未聞有老黠婦人如此之健訟者欲乞備申省部照轉運使司已判事理施行仍行下本州追出頑猾健訟王道存别擇有戒行道士掌管常住庶㡬閭里安靜所謂崇尚教道邀求福利亦莫過於此者申使州取指揮張運屬兄弟互訴基田新淦祖父置立基田子孫封植林木皆所以致奉先追逺之意今乃一變而爲興爭起訟之端不惟辱及祖父亦且累及子孫今張解元醜詆運幹而運幹痛訟解元曽不畧思吾二人者自祖而觀本是一氣今乃相詆毁如此是自毁其身何異祖父生育子孫一在仕塗一預鄉薦亦可以爲門戸之榮矣今乃相詆毁如此反爲門户之辱詳此事深爲運幹解元惜之世固有輕財急義捐千金以資故舊者不以爲吝今乃於骨肉之中爭此毫末爲鄉閭所􅅓笑物論所厭薄所爭者小所失者大可謂不思之甚當職身爲縣令於小民之愚頑者則當推究情實斷之以法於士大夫則當以義理勸勉不敢以愚民相待請運幹解元各歸深思飜然改悔凡舊所讐隙一切湔洗勿置胸中深思同氣之義與門户之重應憤悶事一切從公與族黨共之不必萌一毫私意人家雍睦天理昭著他日自應光大不必計此區區也兩狀之詞皆非縣令所願聞牒運幹并吿示解元取和對狀申窰戸楊三十四等論謝知府宅彊買甎瓦窰戸十七人經縣陳詞論謝知府宅非理弔縛抑勒白要甎瓦事本縣追到幹人鄒彦王明供對兩詞各不從實供招遂各散禁今以兩詞供答參詳據幹人賫到文約並稱所買甎瓦皆是大甎大瓦則所供價例乃窰户之說爲是幹人初供以爲小甎小瓦則與元立文約不同此乃是低價抑勒之驗窰户所以不得已而哀號於縣庭也小民以燒甎瓦爲業不過日求升合以活其妻孥惟恐人之不售也所售愈多則得利愈厚豈有甘心饑餓而不求售者哉寄居之家所還價直與民戸等彼亦何苦而不求售今至於合爲朋曹經官論訴必是有甚不能平而後至此也今觀其所議收買甎瓦窰户不肯賣便至於經官陳詞差弓手鄒全保正温彦追出寄居之與民戸初無統屬交關市易當取其情願豈有挾官司之號令逼勒而使之賤賣之理至於立約又不與之較物之厚薄小大與價之多寡則異日結算以何爲據是不復照平常人戸交易之例而自有一種門庭庶幾支還多寡惟吾之命是聽也义先支每人錢米共約八貫而欲使之入納甎瓦萬三千片所納未足更不支錢一萬三千甎瓦所直十七千今乃只得錢八貫而欲其納足窰户安得餘錢可以先爲燒造甎瓦納足而後請錢耶小民之貧朝不謀夕今其立約乃如此是但知吾之形勢可以抑勒而不知理有不可則必不能免人戸之論訴也今又以爲元約一萬三千今只入五六千便作了足即是現買現賣本宅何不前期將錢借與各人世間交易未有不前期借錢以爲定者況所燒甎瓦非一人之力所能辦非一日之期所能成必須作泥造坏必須候乾燥必須入窰燒變必經隔旬月而後成今六月半得錢七月半之後逐旋交納所入之價反多於所借之錢豈得尚歸罪於窰户耶幹人之詞尚欲懲治窰户之背約所謂文約豈窰户之所情願廹之以弓手保正抑勒而使之著押耳官司二稅朝廷立爲省限形勢之家尚有出違省限不肯輸納者況於私家非理之文約而可以責人之必不背約耶寄居百姓貴賤不同張官置吏難以偏徇鄒彦王明且免斷安廣監鄒彦出外備已入甎瓦未還價錢還窰户所有窰户三名已搬到甎瓦未曾交入亦仰監鄒彦照入具價錢呈王明一名且寄收候還錢足日呈放兩詞各給斷由謝知府宅幹人賫到文約四紙並稱大甎大瓦今狀中却稱是小様顯是誣賴六月十三日交去定錢七月半逐旋入去甎瓦今郤稱是經隔三月形勢之家欺凌鄉民率皆類此難以施行照已判再監文約四紙巳粘入案難以給還簿一扇元是幹人收掌不應又行取索甎人甎瓦欠人錢物豈得以爲無罪不應收禁私家却得將人打縛官司不得禁抑豪強之狀即此可見彭念七謝知府宅追擾普天之下莫非王民雖有貴賤貧富之不同其爲國家之赤子則一而已張官置吏務以安存百姓而形勢之家專欲搔擾細民所謂寄居者既叨冒朝廷官職寄寓州縣尤當仰體國家矜百姓之意今乃倚國家之官職害國家之百姓此豈士大夫所當爲哉近據彭念七狀稱有次弟彭念九充謝知府宅甲頭與彭彦彭念七及小弟彭三一各無干涉忽覩謝知府宅幹人郭勝同胡甲頭賫引前來稱是謝知府宅文字追喚彭念七彭三一赴本宅根究委實懼怕不敢前去尋追到胡甲頭取問追擾無干涉人因依却據胡甲頭名成供有彭彦者充謝宅甲頭彭念七彭念九彭三一皆彭彦之子緣彭念九走閃遂追上彭念七彭三一再索到知丞㕔權縣日有謝知府宅幹人睦晟狀論甲頭彭彦不肯前來支量米榖贍給佃戸心曲走閃遂喚得本人親弟彭三一前來未到本宅被本人至親曾少四奪去彭三一尋據丞㕔追到曾少四供即不曾有奪去彭三一因依再追上睦晟所供亦與胡成無異今以睦晟初狀觀之既稱彭三一爲彭彦親弟則彭彦乃是彭念九與彭念七彭三一爲兄弟也今却妄供彭彦爲念七念九三一之父葢亦自知彭念九之走閃與彭念七彭三一不相干涉而遂變其詞以爲父子也郤不思其初詞以爲兄弟而今豈得變以爲父子耶彭念九之走閃與其兄弟不相干涉乃輙追擾其兄弟彭念七之不伏勾追與其親戚曾少四尤不相干涉又輙論訴其親戚如此支蔓害及無辜使細民何自而得安其生業耶使謝知府存心平恕不務刻削爲甲頭何苦逃竄至於逃竄亦只得經官追其正身豈得私出文引追擾其兄弟妄興詞訴殘害其親戚則是但知官職形勢可以欺壓細民而畧不體朝廷張官置吏存恤百姓之意委實切害據胡成自稱巳七十有一且與免斷睦晟不合妄狀搔擾細民勘杖八十枷項下案監納未盡苗米日呈夜寄收候納足日放餘人放鄒宗逸訴謝八官人違法刑害昨窰戸并鄒宗逸陳詞並是弓手搔擾在法弓手官司尚不得差出下鄉私家輙行差使是以引惹人户詞訴況佐官不得受狀近降指揮甚嚴今遣人出屋輙以停藏爲名妄經尉司縣尉亦不契勘便行受理此皆受制大家深屬未便據詞人所論專指謝八官人乞行追究今以兩魁漕責見該奏薦不伏出官若事屬利害則雖命官亦合追逮但今所陳以爲幹人則難便令主僕供對且喚上詞人并最𦂳合干人鄒季文戴祥張仲三名對徐十論訴謝知府宅九官人及人力胡先強姦胡先供去年曾與阿張通姦又稱今年係是和姦據阿張供通去年不曾有通姦來歴今來係是強姦兩名所供異同權官即不曽勘對著實便欲將胡先阿張同斷若是强姦則阿張不應同斷胡先亦不應止從杖罪決遣又阿張所供曾被謝九官人強姦如此則是主僕通同強姦阿張情理難恕今亦不曾追問謝九官人此是案吏怕懼謝知府形勢使貧弱之家受此屈抑再引監阿張喚上胡先仍追謝九官人對限只今如追不到備申諸司仍先監詞人起離外處居止徐十元住謝家房屋爲人告罪縣道理斷公事自有條法若事屬小可尚可從恕至於身爲士人強姦人妻在法合該徒配豈容輕恕本縣每遇斷決公事乃有自稱進士招呼十餘人列狀告罪若是眞有見識士人豈肯排立公庭幹當閒事況又爲人告不可恕之罪則決非士類可知牓縣門今後有士人輙入縣庭爲人告罪者先勘斷門子及本案人吏宋有論謝知府宅侵占墳地宋有論謝知府宅強占園地已係慶元元年以後論訴屈抑不伸等事及追謝知府宅幹人索干照理斷幹人錄白到契字稱宋有巳曾作知見交錢著押又稱一項係與曾吏部宅交易據宋有稱宋朝英被謝知府宅關鎻抑逼一家恐畏只得著押又稱曾吏部宅即是謝知府宅假作曾吏部宅名字及索出宋有關書乃是宋有宋輔兩户均分産業内有衆户尅留産業甲龍甲師字兩號有祖父母墓四所兄弟商議不得典賣關約分明今謝知府宅乃於嘉定元年立契置買只作宋朝英立契豈有宋輔宋有兩名尅留物業内有墳墓四所乃徑與宋輔之孫宋朝英交易之理又豈有紹興年間兄弟立約不得典賣乃可以違約交易之理以宋有共分物業乃能使之作知見人著押則是以形勢抑逼可知交易之時宋朝英年未及丁則其畏懼聽從亦無可疑者宋有又曾經縣經軍經轉運司論訴竟不獲伸則倚恃形勢尤可見也人家墳墓乃子孫百年醮祭之地謝知府宅乃欲白奪以爲園囿飲宴之所謝知府獨無祖先父母乎其不仁不義倚恃豪強乃敢如此謝知府曾吏部違法典賣宋有共分物業又抑勒宋有作知見人顯是知情違法分明合追契書毁抹今謝知府宅倚恃形勢不令賫出契書且將園池給還宋有宋朝英徑自障截管業仍給斷由爲照仍申軍及諸司王顯論謝知府占廟地西嶽雲騰廟元是王顯家捨地造廟以爲邑民祈求之所已而家貧遂託神以自活神依顯之地以居顯依神之靈以食謝知府既架屋其側遂占廟之路以爲圃又種竹於廟之四圍以芘䕃其花圃宅場民畏謝知府形勢所謂邀福乞靈者皆不敢過其門而神之血食者遂失其所依矣王顯本依神以活其家謝知府又從而逐之使其族人專廟祝之利而王顯又失其所依矣謝知府但知形勢之可以肆其欲而不思神人共憤則謝知府亦不能自安也近據宋有者訟謝知府占其祖先墳墓以爲園囿本縣已斷還宋有管業士大夫欲創造屋廬以爲子孫無窮之計亦須顧理義畏條法然後心安而子孫可保也今至於夷丘隴毁祠廟以廣第宅侈燕逰㩦持孥累日居其中果能下莞上簟而安斯寢乎使官司不爲之理直而冥冥之間所謂福善禍淫者亦豈無可畏者乎所有廟地合給還王顯照祖管業引告示謝天祐日下起離併取謝知府宅幹人知委狀申張凱夫訴謝知府宅貪併田産張凱夫陳訴謝知府貪併田産再行詰問據母陳氏賣田係開禧三年五月母陳氏論歸宗係開禧元年其論配兩吏押係二年十二月如是則是先欲遣逐其子而後奪其産也夫所立之子妻不應遣逐夫所有之産寡婦不應出賣二者皆是違法絶人之嗣而奪其産挾其妻以害其姪婿此有人心者所不爲也引就追謝八官人索干照并申按撫使司乞就問謝知府取供責狀申押幹人下縣理對妻不當遣逐夫之子寡婦不當賣夫之産只此兩事並是違法謝知府雖已移徙其家尚留舊居今乃倚恃豪横不肯賫出干照使詞訴無由結絶案先給據將所管違法典賣田産監張凱夫具出號叚書塡給付張凱夫菅業收花利仍再申安撫司徐莘首賭及邑民列狀論徐莘稂莠不去則榖不能以自植敗羣者不斥則羊不能以自肥本縣實緣敗壊之久姦豪得志細民被害歴考其尤者則寄居中葢有其人而士人則徐莘是也徐莘僥倖一舉本不足道乃恃強狠大爲一縣之害兩經縣道牓示尚不悛改去年又與寄居扶同論訴縣道權縣已被行遣合干人亦被斷配自此愈見恣肆本縣雖訪聞本人頗爲民害然人戸不敢論訴亦且暫已今探聞當職時暫差出便復論訴人吏全無著實尋又據市民列狀賫出縣牓論訴顯見徐莘擾害鄉民照得朝廷日來深慮寄居等人擾害鄉曲故雖樂安鄒山曾復係是命官亦且押送他州居住葢投之四裔屛之逺方古人所以治頑民者不若是則終無以絶其本根今徐莘者若不屛逐無以遏絶姦惡今備詞并縣牓申解使軍欲乞將徐莘押送外州居住庶絶後患本縣除已將一行人疎放外其徐莘合行申解奉軍判徐莘押送吉州拘管申朝省及諸司照㑹陳㑹卿訴郭六朝㪚贖田陳㑹卿論郭六朝㪚幹人抑勒其子世隆輙將田租出賣更不取其父知委追到幹人索出干照却有父陳元亨著押幹人以爲其父親書陳㑹卿與男世隆皆以爲勒令陳世隆假作父親押兩家之詞未見虚實然以所交易契字觀之若是父元亨自行賣租又何必其子亦同書著押與其子同賣已自可疑又作其子世隆交領價錢豈有父賣産不自領錢乃使其子領錢之理此是勒其子假作其父著押以瞞昩其父而不自知其漏綻將以欺人而不知其不可欺也幹人無狀乃至於此且與免斷賣契毁抹附案知情違法合監陳世隆價錢入官再監幹人朱榮索典契還陳㑹卿取贖陳元亨先放徐鎧教唆徐莘哥妄論劉少六照得本縣詞訟最多及至根究大半虚妄使鄉村善良枉被追擾若官司不察曲直遂使無辜受害皆緣坊郭鄉村破落無頼粗曉文墨自稱士人輙行教唆意欲搔擾鄉民因而乞取錢物情理難恕近據徐莘哥論劉少六強占山地及將徐莘哥送獄却稱係叔徐凱教令陳詞追上徐鎧又供委是包占及追到出産并得産人供對即無包占因依徐鎧方始招伏其平日生事擾害鄉民此若不懲治無以示戒今徐鎧自稱士人且決竹篦二十枷項號令縣門三日仍牓市心曉示郝神保論曾運幹贖田黄逹係是總領所押下虧欠綱運人本縣典押反不契勘却令入役曾運幹宅與郝神保互爭田係是張顯承行黄逹却無故當㕔執覆意在刼持役使知縣且免斷仍舊錮身押下廵檢司拘管郝神保論曾運幹占據田産欲備錢取贖索出干照郝神保之父茂成因病風顚祖父忠義遂將田産撥與諸孫則是知其子不可託也今郝茂成乃以祖所分與孫之物業與曾運幹交易豈有風顚之人能與人爲交易者乎曾運幹典人田産亦須索出人家干照既知其關書所載係是祖父撥與諸孫又稱其子風顚豈得輙與風顚之人爲交易乎使出於茂成之意則爲子而背其父使出於曾運幹之意則是教其子以背其父也天下豈有無父之國哉況已交易之當月出業人郝茂成便經官陳詞以爲被曾運幹家幹人宋六一誘引抑勒不曾得錢其子神保亦經官陳論詞訴官司雖爲追人更不曾根究則知其非出於郝茂成之意乃曾運幹與其幹人誘引逼脅白奪田産也官司不敢追究者非畏曾運幹之形勢則受曾運幹之請囑也郝神保既無以自伸遂甘心納其租課至於備錢取贖則曾運幹又假爲進典五年契字以圖誣賴其著押义與前契不同矣形勢之家貪圖人家物産則有之矣未有若此無狀之甚者也兩契並毁抹給還郝神保管業仍各給斷由餘人放陳安節論陳安國盜賣田地事阿江有子長名安國第六十次名安節第六二阿江於五月經縣論長男安國盜將田業出賣續送主簿㕔阿江又自出供狀亦稱長男盜賣田業尋追上得業人曾金紫曾司法陳德逺三户契照而阿江已謂其子不肖又爲形勢之家拖延不肯出官憤悶得疾身死矣但存其弟陳安節與之證對據契書皆有阿江及弟安節着押而弟安節則不肯承認以爲其母及安節不曾著押皆陳安國假冩阿江已死無可驗證但以契上所書陳安節三字比之陳安國及陳安節兩人經官狀詞亦各有陳安節三字則知其爲陳安國假冩無可疑者契上節字皆從草頭其偏傍則皆從耳字陳安國狀上節字亦如此冩陳安節狀上則皆從竹頭其傍皆從附邑又喚上書鋪辨驗亦皆供契上陳安節三字皆陳安國冩則是瞞昩其母與弟盜賣田産無疑陳德逺曾金紫曾司法三契所得田業各合析爲二分以陳安國一分還得業之主以一分還陳安節契字批鑿還陳安節收執别給據付陳德逺曾金紫曾司法照管一分物業仍監陳安國備一分錢還陳曾三家陳安國勘杖六十引監錢陳安節放陳安國阿江之子陳安節之兄阿江與陳安節論陳安國盜將田業典賣初論曾金紫等三户本縣得見所書陳安節名姓皆是陳安國代書又是其母陳論此是曾金紫等三户典買違法分明已準分法給一半還得業人給據付得業人管業仍批鑿契字付陳安節執照所合受分之産續又據陳安節陳論鄒司戸雷少四兩户亦係違法交易瞞昩盜典賣陳安節合受分田産再追出兩干照鄒司户十契亦是陳安國代書陳安節名尤爲明白此是違法瞞昩分明但鄒司户宅之詞以爲其母所論三户之時即不曾論鄒司户則其說亦似有理及再照案牘本縣曾以上件事委送主簿看定阿江親到主簿㕔陳詞乃是陳論曾金紫等三户違法交易之後其狀詞中乞追陳安國供盜賣田地之多少著實不知有無見存則是阿江固已知本户田産多爲陳安國盜行典賣所及知者但曾金紫三户而巳其餘則不及知也惟其不及知所以不曾論鄒司户等户也及再於陳安節名下索出砧基参對則陳安國盜將田業典賣砧基簿之上但批鑿曾金紫三户而其餘不曾批鑿此阿江之所以不及知而未及陳論也阿江未及陳論而死則安節於阿江已死之後經官論訴鄒司户家豈得以阿江無詞而以陳安節爲妄訴乎要之十契之内所書陳安節字畫皆陳安國書冩則不可得而揜也若雷少四一契則又全無陳安節姓名此尤不待辨而知瞞昧違法也鄒司户十契雷少四一契所得産業並合準分法以陳安國一分給還鄒司户宅仍給據爲照陳安節一分批鑿契字執照管業仍備本縣所斷曾金紫三户判語及今所判給斷由付兩家收執引監陳安國錢還鄒司户宅然猶有一說形勢之家專以貪圗人户田業致富所以敢於違法者恃其富強可以欺凌小民敢經官論訴便使經官得理亦必健訟飾詞以其多貲買誘官吏曲行改斷小民貧困多被屈抑便使偶得理直而追逮費用已不勝其困矣此富家所以愈富而貧民所以愈貧也陳安節得産之後必不免鄒司户之論訴故再述貧富之情狀如此兩爭人並放本縣昨據陳安節論兄陳安國盜將卑㓜田産與鄒司户交易本縣見得陳安國假作母親及弟書名著押違法將兄弟分田産與鄒司户交易分明遂將陳安國一分還鄒司户管業將陳安節一分還陳安節却監陳安國備違法契面錢還鄒司户其後鄒司户倚恃富豪專務健訟不伏本縣所斷遂經使軍陳詞使軍將本縣所斷看詳準判今照斷由所斷已是允當合監陳安國一半契面錢還鄒司户候錢足之日方可給田管業本縣照得所爭之田析而爲二分一分屬陳安國一分屬陳安節陳安國一分之田已是自行出賣與鄒司户自不願取囘爲業陳安節一分之田乃是陳安國盜行出典若要監陳安國錢足日方給還陳安節爲業則陳安節永無得田之理在法若盜賣卑㓜田産則先合給還卑㓜後監盜賣人錢還錢主若尊長與卑㓜通同知情典賣則合先監錢還錢主足日方給還産業今陳安國係假作母親阿江及陳安節書名著押係母親及弟陳論即非通同知情恐難以候監錢足日方還陳安節管業竊詳使判必是令陳安國自還一分錢足日方給還陳安國一分之田今陳安國不願取囘上項田産更合取使軍指揮陳希㸃帥文先爭田陳希㸃自去年十月以來兩次陳詞論帥文先不肯行使官㑹朝廷新制秤提官㑹最爲嚴切自合出官與被論人供對却抗拒官司倚恃形勢不伏出官意欲使破落幹僕與人户扺拒及其出官狀詞中畧不及官㑹一節顯是誣訴分明陳希㸃枷收引喚上帥文先對朝廷措置秤提官㑹行下州縣最爲嚴切不容人户今陳希㸃爲狀首兩狀論帥文先不使官㑹及官司追對乃倚恃形勢經隔累月不伏出官及其到官所供又全不及不使官㑹一節乃欲推是頑賴人力劉顯陳詞顯是並緣朝廷法令之嚴以此把持鄉民且勾木陂一項交易乃帥文先不在家却與帥文先之子假作其父着押此豈交易條法所當然者非乘人之危急貪人田産者耶嚴江陂一項交易六月内交錢交業乃於十一月内半年以後方論多典過錢則其妄訴又可見矣又於兩詞之内皆夾帶不使官㑹爲詞其意以爲非此無以重帥文先之罪也身爲士人當如是耶妄訴不使官㑹之罪若從條定斷則希㸃合在反坐決配之條事在赦前且免根究嚴江陂田已是交易交業難以更行論理勾木陂田乃陳希㸃與帥文先之子帥文勝通同不取其父知委假作其父著押知情違法錢當没官業當還主契字追上毁抹仍舊還帥文先管業引監帥文勝備契面錢入官陳希㸃之父名子國人户詞訴頗多率是累月不肯出官且踈枷召保案刷具本户詞訴來日喚上供候理對畢日放聶士元論陳希㸃占學租聶士元於去年十一月論陳子國強占所買學粮租田輙於主簿㕔陳詞改正作陳文學户産業本縣追人索干照理對經今四五月陳子國之子因他事到官又行走竄不肯賫出公據干照前來理對遂將幹人聶大亨收禁監追亦復不肯出官若非理曲何苦如此今據聶大亨賫到積年收納學粮錢並作聶瑜户輸納官司當以契照爲據豈有陳子國所置之産而契照乃在聶士元之家陳子國以爲作佃戸聶瑜名字請佃豈有六七十年不曾歸户之理若作聶瑜名字請佃何爲契照乃在聶士元之家陳子國積代豪横聶瑜與之至親遂以産託其主掌陳子國遂起呑併之心乃於去年九月旋於主簿㕔陳詞改給公據管業主簿一時不曾契勘不索出陳子國上手有何干照便以硃鈔及官員公劄爲據遂與出給公憑管業顯是豪強脫罔官司侵奪人户田産分明今又堅執所冒請公據不肯賫出官毁抹欲以爲異日論訴張本然聶士元既有元祖上手干照則雖有冒請公據亦何所施再以林趙兩主簿劄子觀之其詞卑巽之甚豈有人户不肯輸納官租乃使縣官屈辱如此不惟強占鄉民田産又且脫免官司租賦官司不敢誰何至於具劄子懇禱卑官拜呈等語陳子國何人乃敢如此鈔書給還聶士元收掌并前已給公據管業劄子兩封附案再給斷由付聶士元收執見到人再監索所請僞據毁抹龔儀久追不出朝廷差守令以爲千里百里之長則凡在部封之内雖有貴賤貧富之不同皆部民也人户詞訴官司追逮雖曲直未可知自當應時出官供對今鄉村豪民遇有詞訴追逮率是累月以致年歲不肯出官保正虚受杖責使人戸詞訴無由結絶官吏文移日見壅滯本縣豪户大率皆然而其尤甚者則排風龔儀是也自去歲七月間有陳暘叔者訟其起屋侵占墳地追逮半年不伏出官及至差官親至地頭驗實龔儀亦端坐不出卒使詞人坐困甘心移改墳墓不與之爭何等頑民乃敢如此自是以後訟其奪牛訟其占山訟其占屋訟其不收稅凡七八件皆是累月不出本縣將其安下主人監繋追逮方肯出官使人人皆如龔儀則國家守令條法皆爲無用矣且龔儀自稱士人豈應不畏名義不畏條法以至於此合將龔儀重行勘斷念其自稱士人秋試在近且與免罪踈枷押下安下人葉萬卿保管伺候理對公事安邦只今取保狀申京宣義訴曽嵓叟取妻歸葬京宣義經使軍陳詞取妻周氏歸葬使軍行下本縣詳狀照條施行本縣遂追周氏之兄周司户及周氏前夫之子曾嵓叟供對今據兩家幹人賫出周司户之才及曾嵓叟狀詞前來出官今㸔詳周氏初嫁曾氏再嫁趙副將又再嫁京宣義則周氏於曾家之義絶矣既爲京宣義之妻則其死也當歸葬於京氏然考其歲月京宣義以開禧二年十一月娶周氏爲妻次年八月娶歸隆興府經及兩月周氏以京宣義溺於嬖妾遂逃歸曾家自後京宣義赴池陽丞周氏不復隨往至去年八月間周氏身死京宣義與周氏爲夫婦僅及一年而已反目不相顧矣既溺於嬖妾無復伉儷之情又㩦其妾之官而棄周氏於曾嵓叟之家者凡四年又豈復有夫婦之義乎周氏於曾家固爲義絶而京宣義之於周氏亦不復有夫婦之義矣使京宣義之於周氏果有夫婦之義則不應溺嬖妾而棄正室又不應棄周氏於曾嵓叟之家者數年而挈其妾以之官生而棄之而不顧死則欲奪以歸葬此豈出於死則同穴之至情乎特欲搔擾曾嵓叟之家以裝奩誣賴因以爲利耳此豈士大夫之所當爲哉其說以爲始乃娶趙副將之妻不應曾嵓叟占留以葬獨不思周氏之嫁京宣義乃自曾家出嫁其避京宣義之妾而歸也亦歸於曾家豈得以爲與曾家無干涉乎周氏於曾固爲義絶在法夫出外三年不歸者其妻聽改嫁今京宣義棄周氏而去亦絶矣以義斷之則兩家皆爲義絶以恩處之則京宣義於周氏絶無夫婦之恩而曾氏母子之恩則未嘗替也京宣義公相之子孫名在仕版不應爲此閭巷之態妄生詞訢周氏之喪乞行下聽從曾嵓叟安塟仍乞告示京宣義不得更有詞訴申使軍取指揮幹人留領斷由訖放徐家論陳家取去媳婦及田産女子生而願爲之有家是以夫之家爲其家也婦人謂嫁曰歸是以得嫁爲得所歸也莫重於夫莫尊於姑莫親於子一齊而不可變豈可以生死易其心哉陳氏之爲徐孟彜之妻則以徐孟彜之家爲其家而得所歸矣不幸而夫死必當體其夫之意事其姑終身焉假使無子猶不可歸況有女三人有男一人㩦之以歸其父之家不可況棄之而去既不以身奉其姑而反以子累其姑此豈復有人道乎父給田而予之家是爲徐氏之田矣夫置田而以裝奩爲名是亦徐氏之田也陳氏豈得而有之使徐氏無子則陳氏取其田以爲已有可也況有子四人則自當以田分其諸子豈得取其田而棄諸子乎使陳氏果有此志陳文明爲之父陳伯洪爲之兄尚當力戒之豈得容之使歸反助之爲不義乎察其事情未必出於陳氏之本意乃陳文明陳伯洪實爲此舉也陳文明獨無兒婦乎陳伯洪死其妻亦棄其子以累其父母取其田而自歸陳文明豈得無詞乎陳氏一婦人陳文明亦老矣其實則陳伯洪之罪也知軍吳寺簿不察此義反將徐孟彜之弟徐善英勘斷以爲不應教其母爭訟是縱陳氏爲不義也欲將陳伯洪從杖六十勘斷押陳氏歸徐家仍監將兩項田聽從徐氏收管花利教其子嫁其女庶得允當申提刑使衙取指揮一行人召保李良佐訴李師膺取唐氏歸李家在禮爲之子爲之母師膺既歸李氏則以世英爲父以孔氏爲母今復取唐氏歸李家則是二母也況李良佐所陳因唐氏之弟所訟而世英死此尤人子之至痛唐氏決不可往來李家李師膺決不可再收養唐氏李師膺爲李世英之子已經歴年深亦嘗爲世英持斬衰之服善事孔氏母子無間言友愛師勉兄弟無異意李良佐乃輙生異姓不可收養之論以離其心在法祖父所立之子苟無顯過雖其母亦不應遣逐今其母尚能容之良佐何人乃欲遣逐之乎李師膺斷然當爲李世英之子李良佐斷然不可妄興異議唐氏當去師膺當立李良佐又欲牓示徐羅二解元使不得往來李師膺之家此亦遣逐師膺之意葢欲使師膺失所依也良佐之處心不臧情態已見徐羅二解元則未見有侵欺之實豈可預行牓示況李師膺年已二十二亦非全然不辨菽麥而爲外人所侵者徐羅二解元果有侵欺李良佐旋行陳告亦未爲晚世間亦眞有可託孤之人亦安知徐羅二解元非念其孤㓜而爲之經紀其家難以預行給牓併行下保曉諭李師膺兄弟併徐羅二解元各照本縣所行取知委申謝文學訴嫂黎氏立繼謝文學名駿訟其嫂黎氏不立其子五六冬郎爲嗣而立堂兄謝鵬之子五八孜爲嗣自嘉泰三年論訴至今經隔五年寧都楊知縣柯知縣贑州僉㕔及本州趙司法皆以爲立嗣當從黎氏謝文學不應爭立援法據理極爲明白寧都縣曾追到黎氏出官供稱是其夫謝驂在日與弟謝駿時常爭閙有同寃家又稱其夫病重稱欲立謝鵬之子五八孜又追到族長數人並稱謝驂不願立謝駿之子而願立謝鵬之子在法夫亡妻在從其妻便使謝驂元無意立謝鵬之子尚聼黎氏所立況又出於謝驂之本意乎謝文學駿健訟不已復經轉運使䑓必欲爭立且法令以爲不當立兩知縣以爲不當立本州僉㕔以爲不當立提刑司委送趙司法亦以爲不當立其族長以爲不當立其嫂黎氏亦以爲不當立謝駿何人乃敢蔑視官府違慢條法欺凌孤㓜斥責族長顯是豪横難以輕恕照得提刑李吏部惡其健訟嘗將謝駿枷禁州院今來尚不悛改今據謝駿復遣幹人謝卓前來本縣投詞錮身解轉運使衙欲乞併追謝駿痛賜懲治以爲豪猾健訟者之戒郭氏劉拱禮訴劉仁謙等冒占田産劉拱禮并劉拱武妻郭氏訟劉拱辰之子仁謙仁愿不伏監司所斷不分合受分田産今拖照案牘劉下班有子三人長曰拱辰妻郭氏所生次曰拱禮拱武妾母所生劉下班有本户稅錢六貫文又有郭氏自隨田梲錢六貫文劉下班死郭氏亦死劉拱辰兄弟分産只將本户六貫文稅錢析爲三分以母郭自隨之田爲已所當得遂專而有之不以分其二弟二弟亦甘心不與之爭自淳熈十二年以至嘉泰无年凡六十年絶無詞訴葢畏兄不敢訴也嘉泰元年拱辰死拱武拱禮始訟之於縣又三訴之憲䑓又兩訴之帥司經本縣鄭知縣吉州董司法提刑司僉㕔本縣韓知縣吉州知録及趙安撫六處定斷鄭知縣及提刑司僉㕔則以爲拱禮拱武不當分郭氏自隨之産合全給與拱辰吉州司法及知錄則以爲拱辰不當獨占劉班所得郭氏隨嫁之産合均分與拱武拱禮韓知縣趙安撫則以爲合以郭氏六貫文稅錢析爲二分拱辰得其一拱武拱禮共得其一六處之說各不同然趙安撫之所定在後既已行下本縣而劉仁謙劉仁愿乃蔑視帥司所定不肯照所斷分析郭氏所以又復有詞也以法論之兄弟分産之條即未嘗言自隨之産合盡給與親生之子又自隨之産不得别立女户當隨其夫户頭是爲夫之産矣爲夫之産則凡爲夫之子者皆得均受豈親生之子所得獨占以理論之郭氏之嫁劉下班也雖有嫡庶之子自當視爲一體庶生之子既以郭氏爲母生則孝養死則哀送與母無異則郭氏庶生之子猶已子也豈有郭氏既死之後拱辰乃得自占其母隨嫁之田拱辰雖親生拱武拱禮雖庶出然其受氣於父則一也以母視之雖曰異胞以父視之則爲同氣拱辰豈得不體其父之意而獨占其母隨嫁之田乎以此觀之則六貫文之稅當分而爲三兄弟均受方爲允當今試以鄭知縣及提刑司僉㕔所斷而較之吉州司法知錄之所斷則鄭知縣僉㕔之所見甚狹而司法知錄所見甚廣鄭知縣僉㕔之用意甚私而司法知錄之用意甚公從司法知錄之所斷則在子爲孝於其父在兄爲友於其弟從鄭知縣及僉㕔之所斷則在子爲不孝於其父在兄爲不友於其弟一善一惡一是一非豈不大相遼絶哉官司理對公事所以美教化移風俗也豈有導人以不孝不友而自以爲是哉如韓知縣趙安撫所斷已是曲盡世俗之私情不盡合天下之公理劉仁愿劉仁謙尚且抗拒則是但知形勢之可以凌蔑孤寡而不復知有官司今且照韓知縣趙安撫所斷劉仁愿劉仁謙撥稅錢三貫文付拱禮郭氏候畢日放仍申諸司及使軍照㑹權太平州張日新訴莊武離間母子張敷文孫名日新經官論編管人莊武又名三聘離間其母使其母盡逐兩旁兒婦持到莊武親書與其母簡帖兩紙外作妻封内作自名當將莊武送獄根究兩紙委是親書據莊武供舊曾在張宅作舘客豈有舊舘客輙冩簡帖與舘主寡婦之理又供前後往來飲酒雜坐無間此何理耶且其簡帖之詞有曰自安人從家間歸去他們便大字冩在書院牕上呪人及要殺人又曰除是安人出外商議方可㸔了毁之其詞意䙝害情理乃如此是必欲逐其子而惟莊武之言是聽也亂男女之别離子母之情莊武之罪豈可貸乎若採之衆論則又不止於簡帖往來而巳一郡之人爲之不平夫能使母逐其子而不顧則是必有以蠱惑其心者矣顧人子不敢言官司亦不必推究庶幾子母可以復合也且莊武福州人自稱曾請鄉舉觀其詞氣字畫不類士人嘗以爲人指引代筆編管當塗自當少知歛戢姦險凶横累有過犯爲朱僉判舘客既導之爲非矣復挾人以訟之朱竟罷去爲張伸舘客則以尋捉學生爲名徑登其女之臥榻以致論訴至於撻使婢而使之縊死輕梲官而敢於無禮皆見之訟牒每追到官則先爲凶暴之狀以陵駕長官雖宇文侍郎以法從之貴亦不免於無禮官司亦每以士類而曲貸之凡此數事苟未至於甚爲人害者猶可貰也張敷文以宦族故家而莊武乃專其家政若不懲治則張氏家悉歸於莊氏兩子無所歸一家將自此破矣爲政者豈得不爲之動心乎竊謂當塗本非莊武之故鄉莊武見係編管之罪人以士類之故且免其斷治再將莊武栘徙鄰郡則寡婦之謗可以自明孤子之愛可以復合張氏之家不至大破莊武亦不至於棯其罪而猶可以自新但莊武元係得㫖編管人州郡不敢自專若欲申聞朝省則么麽小官暫攝郡事亦不敢以輕舉寶文大卿到日呈漢陽漕司行下放寄庄米漢陽田土所出只得養活漢陽軍百姓若盡數搬出外界漢陽之民必致餓死漢陽老知軍情願放罷不敢餓死百姓送務照已判沈總屬郡無大小俱爲守土關津有禁不但取征稅亦以防姦盜譏出入也舟楫至境不以見告徑斫纜索鼓噪而去此何理耶浮數巨􅀈所載何物若非有碍何故如此苟非横取多自爲興販則必夾帶商賈圖取財物申轉運司乞行下鄂州拘下船隻搜檢梲物以戒姦貪安慶太學生劉機罪犯行已有耻則謂之士鄉黨稱弟則謂之士劉機既爲士人又嘗逰太學自合動循禮法恪守士行今乃專騖豪縱陵蔑閭里人言籍籍姑置不問既入酒肆復毆妹弟行檢如此便使讀書破萬巻文章妙天下亦何足以齒於爲士之列淮人本醇質士子亦皆重厚劉機但以太學之故而所爲狂悖乃如此當官而行何強之有一太學生亦何足道哉劉機且與從恕放如敢再犯定當具奏屛之逺方以爲不守士行者之戒王珍減尅軍糧斷配王珍爲軍典尋常管兵士請給月糧衣錢輒每減尅已是無理本府興築城壁勞動軍士自非得已王珍更不思軍人辛苦亦敢減尅錢闕輙尅闕米二升半輙尅五合情理切害王珍決脊杖十五刺面配撫州牢城楊煥不㸃名支破勘杖一百吕青押楊煥就王珍家取未散錢米并盗尅下錢米支散宣永等因築城乞覓斷配安慶大府素無城壁無以爲守禦之備當職不自量度妄意興築支費浩大官司未易了辦不免資百姓之力以衞百姓甚非得已揆之於心每切自愧今既令人户出備慱子木搬擔至府尉司人吏乃輙敢邀阻乞覓人户獻木尚復要錢則公事追逮其擾可知此而不治是使本府重得罪於百姓也宣永張明李明龔顔各決脊杖十二刺面配一千里外州軍牢城案開具所實錢追納抄估到家業牓賣仍備牓府縣曉示如並緣築城輙敢擾民者許人陳首賞錢三百貫犯人重行斷治武楷認金掘土得金元是武安撫宅基武楷遂認以爲舊物訪之邦人乃以爲元是天井劉家宅基武安撫復於上居止以事理考之必是劉家之物葢藏金於地爲避賊而藏也安撫方提兵討賊又何爲而藏金於地耶但武安撫有功於此邦見之墓誌未及百年其子孫零替如此使人爲之悵然便無認金之訟官司亦當賙恤但聞武楷自少不學家産破蕩若得錢又復妄費公庫置厯每月批送錢五貫仍自七月爲頭薄贍其家以爲有功於此邦者之報刼盜祝興逃走處斬照得安豐軍遞押到配軍祝興徐青爲妄傳邉事各持軍器作威執火刼奪客人財物決脊杖二十刺配二千里本府差寨兵高成管押前去至路中其徐青祝興反將高成毆打逃走當捉獲到祝興一名據各人供責分明本府照得邉事方興小人喜於倡亂並緣刼掠自不應更分首從今安豐軍從輕決配已是失刑今又尚敢毆打防送人逃走祝興押赴市曹斬首府城號令三日傳下諸縣各號令三日未到人徐青賞錢五百貫文許諸色人捕捉申朝廷乞行下邉郡應有此等凶惡之人並不分首從處斬所有本府不合擅斬強賊乞賜竄謫施行仍申諸司勉齋集巻三十三
