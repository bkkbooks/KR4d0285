body:
  text: 勉齋集巻十一宋黄榦撰書與金陵制使李夢聞書榦比奉使帖且凖省劄具知制使學士尚書不棄帷葢之舊意欲羅而致之幕府嘗謂制府辟屬雖未必有畫諾之益而所辟得失實係一世之觀瞻人心服則凡所施為自無有不應之效况今邊陲多事全在措置兵弱而欲其强食少而欲其足人情之向背地形之險易敵勢之强弱非得有識慮之人旁搜博采驅馳計畫則環二千餘里之地豈能坐於堂上而洞見其曲折哉如張魏公之所辟客今已不敢多望近代如薛宣撫者尚能得林叔虎曹簡夫為之屬二公者亦皆今代之竒士所病者薛公知人而不善任使是以卒不免於狼狽今制使尚書乃欲以衰繆不才舉世所擯棄之人如榦者而充是選恐不足以厭伏人心而反為累也所幸朝廷且為遷延之計葢亦知其不足以當世選也然感激知已之恩則銘鏤肌骨不敢忘也此亦不敢抵受已抗章力辭亦㣲寓丐歸之意今土城已畢城之五門亦已包砌屹然為淮右之最一郡之人可以安枕而卧城磚已擇僧之善幹者二十人委之分頭燒辦仍許以寺有闕住持者必給補之亦無不樂従只俟春初凍解且燒且砌亦三五月可畢俟來春再上丐祠之請果従所乞當白衣従幕府賓客之後可效涓埃之報也邊事雖少息然得㳂邊報皆謂春夏之間䝉古既去則彼必專意於我彼既能抗强盛之䝉古豈不能奮其餘力以侵吾之疆埸耶是亦不容不早為之慮也榦迂疎狷狹生長桑梓於尚書未嘗有一日之雅従宦江西伏謁之初便䝉顧遇異於儔匹自是以來薦拔覆䕶葢生平知已未有若是之特逹深厚者也榦無所能似少従四方之師友游渉厯世故今年幾七十矣竊亦以為今代人物可以為國柱石扶持宗社非尚書其誰與歸今者當閫外之寄以法従之尊下與韋布之士相與為僚友如榦不肖亦預采取之列而真翰寵貽謙抑慰藉皆非敢望於今之世者天下之士孰不聞風慕義爭出死力以致驅馳於鞭䇿之下哉惟是榦之才識卑下齒髪復衰頹既不足以備使令而南北大勢又復有深可慮者言戰固未可輕言和尤為大謬紹興言和但不能取中原耳今日言和且併江南而棄之也戰既不可和又不可以彼之憤激當吾之偷惰是豈非深可慮乎此非上下一意警䇿奮厲皆以國事為念蒐兵聚糧使長淮屹然有可恃之勢未見其可也縦曰未能亦且以兩淮付之尚書使得伸縮自由而無所牽制事猶有可為者今又動掣其肘則雖使伊周管樂復生今之世亦無所用其力榦也素於廟堂未嘗曳其裾而諸公貴人又多有惡其不附已者頭方命薄動招讒謗以義處之理當不仕俛首州縣直為貧耳今使之居元僚之任以參閫外之謀是昭昭然為的於天下人莫不彎弓而思射之正恐不能為尚書之益而反以為累也更望尚書熟慮而改圖之不勝幸甚本府城壁既就五門亦已包砌上施敵樓下設重門屹然可觀兩淮之人過者驚嘆皆尚書之賜也但包砌城身其功倍於土城勢須來秋方得了畢葢冬寒春雨皆非造磚砌城之時也榦不自揆度妄談當世之務以瀆台聽者屢矣區區不能殫布之懷鬱結於中不容但已輒敢冒昩極言之今日之事其瑣細者不足言而人皆能言之其闗於大體者有四其一曰大本不可以不立其二曰大義不可以不明其三曰已私不可以不克其四曰人才不可以不收此四説者雖使伊周復生為今日計無以易此管樂以下亦未有不假此而能自立者然其不敢以望伊周者亦以於此有所未盡耳何謂大本不可以不立古之聖人垂拱於廟堂之上能使海外重九譯而來曰吾聞中國有至仁者大本立也諸葛孔明之出師也雖曰甲兵已足而必拳拳於進君子退小人宫中府中俱為一體黜陟臧否不宜異同之數語亦可謂知本者矣今使將相得人其於大本可謂無恨矣丞相誅韓之後所以必消禍變者其於大本不謂無助惟其懲意外之變遂專用左右親信之人徃徃得罪於天下之公議世之君子遂従而歸咎於丞相丞相不堪其咎遂㫁然屏逐而去之而左右親信者其用愈專矣平居無事紀綱紊亂亦不過州縣之間百姓受禍然至於軍政不修欺罔百出邊備廢弛皆此曹實為之若今大敵在境更不改圖則大事去矣丞相所以寵任此輩者特以為自固之計大事既去則雖欲自固可乎人之情言之於安平無事之日則輕於鴻毛諫之於禍變將至之日則重於千金今日之急莫大於此須得一二有識見有智謀能議論識深淺之人數數遣赴廟堂禀議使之委曲曉譬以開其惑此亦數以手書宻布忠悃苟一言悟意則大本立而天下定矣何謂大義不可以不明建炎紹興之間天下忠臣義士莫不慷慨憤激捐軀赴死而君臣之大義下至走卒亦能知之自秦氏倡為和議而此意日銷月亡以至於今皆不知有所謂君父之讐也不惟百姓忘之而士大夫亦忘之矣今觀詔㫖之下與諸處宣諭之文不過但言我不曾與汝為敵汝卻無故來侵我又不過言汝従我則安不従我則危皆不出於彼此利害之言亦何足以感天下豪傑忠義之心哉臣子之於君父當如手足之捍頭目子弟之衛父兄主憂則臣辱主辱則臣死此天之經地之義人之大倫不可易之理也祖宗德澤涵濡生養二三百年凡吾所以衣食生養於天地間者毫髪皆君父之賜也至於禍變外起俘我二帝殘我陵寢蕩搖我中原又使我竭江南之金幣以事之天地以來所謂君父之辱孰甚於此今既為外敵所逐乃欲窺伺我淮甸又欲驅擄我百姓以廣其人民侵攘我兩淮以廣其土地至於言辭指斥無所顧忌此豈臣子所忍聞哉誠能日夜以此宣於上告於下使此意洞逹則雖三尺童子亦莫不爭欲操戈以報不共戴天之讐矣大本不立則在内者無以服人之心大義不明則在我者亦無以感人之心幽隂迫窄雖吾國之人亦且不服又何以使外敵之我畏哉何謂已私之不可以不克天下之事非可以聲言笑貎為也惟其意之誠而後無感不通矣今尚書之身非尚書之身宗社之身天下生靈之身也夫既非吾之身則凡吾身内之事皆不可一毫芥蔕乎其心官則法従矣宫室則可居矣田園則可食矣子弟則皆仕矣吾復何憂哉所憂者宗社生靈耳榮辱得失皆不可以動吾之心苟有一毫涉乎已之私則必通克而去之至於寢食居處常有與士卒同甘苦之意進退黜陟必求合乎理而毋徇乎吾之私情誠能如此則吾之氣已伸於萬物之上至大至剛而不可屈撓其明白洞逹不惟吾之官屬服之而朝廷之上亦服之不惟江淮之軍民服之而敵國之人亦服之矣何謂人才之不可以不收古人所謂觀近臣以其所主韓公亦以為觀其賓客可以信其主人天下之人觀尚書亦欲於其賓客觀之今皆未見其卓然可稱於世者不過循循謹嘿而已至於一二經従於此亦自謂兩路而僅得一人自謂以下僚而亦與賓幙者又皆諂諛而無情實狡獪而用小數耳此何足以服人哉古之用人固非一端雞鳴狗盗莫不賓禮然則一二巨人致之左右則此輩亦皆足以備使令今大率不甚相逺則豈不見輕於世哉縦曰辟客皆出於朝廷則擇世之卓然為人之所推者卑辭厚禮招置東閣雖千百人皆不厭也人才多則議論多議論多則為益多矣諸葛孔明出師後表歴言其生平所得人物而今皆不在深嘆日月之逾邁而事功之不立可謂知所先務矣近日呉畏齋猶能以此得天下之譽孰謂尚書而不能哉天下之父歸之其子焉徃耶已私克於内人才收於外何事之不集何功之不立哉所謂兵不强國不富非所慮也苟為不然雖吾國亦不可保况敢望以取中原哉中原雖可取亦何以使外患之不作哉人之所望於尚書者其下者則求薦進其上者亦不過望尚書隨世以就功名皆不知本末源流不知義理古今者榦之所望於尚書則欲其為伊周與諸葛孔明欲復文武之境土使吾宋之國祚永永無極也望尚書無以為老生之迂論則幸甚此四言者藏之胸中已乆不敢輕發也榦一介妄庸世所擯棄獨荷尚書之知遇眷愛至深至厚故亦忘其愚不肖常欲納忠於左右庶幾尚書之德業光明碩大度越一世乃所以為知已之報也故自去嵗以來所以獻其區區之愚忠者屢矣今者維揚之行事無鉅細無不極言尚書亦聽納不疑顧其至大至切者則未有所施行焉此榦所以日夜惕然不能安也敵人侵邊亦既一年彼其君臣上下日夜相與經營必欲得吾兩淮而後已雖以嵗幣為名而實不在乎嵗幣也去嵗五月休兵之後使吾早夜經營以固吾圉亦何至今春三月之中三邊衝突連亘數百里自去自來如入無人之境俘掠生齒屠戮官軍焚燒室廬如此之酷哉事之已徃固不必追咎然亦豈可不深監耶今浮光兵退已兩月安豐兵退已一月旴眙兵退亦將兩旬矣不知吾所以措置者何事施行者何䇿但見邊備之弛又甚於前日日復一日恬不知懼但恐其禍又不止於今春矣向者輕信庸人之言為泗上之役喪師萬人良將勁卒精兵利刃不戰而淪於泗水黄團老幼俘擄殺戮五六萬人盱眙東西數百里莽為丘墟聞之者莫不惻然痛心比尚書巡厯見之最切者也安豐浮光之事大率類此尚書亦豈不聞之乎竊意千乗言旋必欲痛自咎責出宿於外大戒於國曰此吾之罪也有能箴吾之失者疾入諫日與僚屬與四方之賢士討論條畫審思而力行之必將卧不能安枕食不能下咽也今歸已五日矣但聞請總領運使至玉麟堂賞牡丹用妓樂又聞總領運使請賞牡丹用妓樂又聞用妓樂宴僚屬而已邦人聞之諸軍聞之豈不痛憤請之人與吾所請之人雖相對而飲退而未有不竊笑者也惻隠是非人誰無之顧患不能充此心耳苟充此心則視牡丹之紅艶豈不思邊廷之流血視絲管之咽啾豈不思老穉之哀號視棟宇之宏麗豈不思士卒之暴露視飲饌之豐美豈不思流民之調饑以尚書之聰明豈不念此亦如謝安之雅量鎮浮方秦人大舉入冦乃圍碁賭别墅即荷堅以八十萬之師入冦謝𤣥以數千禦之大敗其師如此則敵國雖强若無足慮者可以従容閒暇以應之矣然嘗觀苻堅至夀春登城以望晉師見其行陣整肅心為之驚愕晉師雖寡而𤣥能用之非僥倖而取勝者也今日果能使行陣整肅耶苟惟不能欲處以閒暇亦何異小兒輩排棗栗以為牲牢列瓦礫以為爼豆匍匐俯仰而曰周公之禮樂盡在是耶榦非以為不合行樂也但以為徒行樂而不思邊防耳苟思邊防亦何暇行樂耶祖宗二三百年之天下兩淮數百萬之生靈尚書以法従之尊當四路之寄敵國深侵内宇騷動主上食不甘味聽朝不怡大臣憂懼不知所出尚書豈得不朝夕憂懼耶而乃如是之迂緩暇樂耶今浮光之報已至矣北兵欲以十六縣之衆以四月攻浮光侵五闗且以一縣五千人為率則當有八萬人攻浮光以萬人刈吾麥以五萬人攻五闗吾之守闗不過五六百人豈能當萬人之衆哉則闗之不可守决矣五闗失守則蘄黄决不保蘄黄不保則江南甚危矣尚書聞此亦已數日乃不聞有所施行何耶火然矣猶謂之安此榦之所以深憂永嘆不得已而發於言也屬意浮光將以窺五闗也窺五闗所以瞰長江也今淮東委之應守以山東忠義守之矣濠與安豐未有警報設使有警濠去此為近亦可以調兵䇿應安豐亦有六安義甲足以擇之决不至使之深至江南惟浮光最急今且專意為浮光謀調武定五六千人分屯固始光山以捍其深入調蘄黄民兵以守五闗仍闗湖北借總効以同捍禦則庶乎可以無憂此則望尚書速圖之也或云朝廷靳惜財賦難以調兵殊不知苟失長江則雖有財賦將焉用之况蘄黄自有樁積米且得従權支借異日事定漸為之圖不可顧慮一失事機則悔無及矣或又云尚書决為還朝之計以故慮不及此尤非所以望尚書也平居暇日猶當一日必葺况事之危急如此豈得以吾將行而遽忘之乎朝廷若従尚書之請亦須擇人以為代此非兩三月不可又孰有出於尚書之右者乎况兩三月之内豈能無變乎此尤不可頃刻不闗念也榦衰老無用毫無功名富貴之念家故窮空隨例作郡耳聞尚書之使來感激思奮以圖報稱厯陽既以邊鄙不願就安慶又以有赴新任不可再徃制叅之命亦是遙領不敢供職塊處驛舍以俟予徃是知維揚之役本出尚書之意榦特㣲賛之而同事之人以為與已異譁然而排之初以為召禍者其言既無騐矣又變而為虚費不論事體惟斷以私見大官唱聲萬口和附榦之寒逺豈敢逢彼之怒耶自今以徃苟有小失莫不嫁其罪曰此黄制參之謀也噫可畏哉只得稱病杜門不敢造屏著然區區忠於尚書之意不能自遏故敢僭布之猶有望於尚書深亮之也仍勿以示人千萬幸甚榦衰病之迹已兩上祠請未報筋力支離不敢造屏著夜來方丕父下訪繼而幕府諸丈亦來皆云尚書不以其不肖欲委以西方之事此固願驅馳以報知已况在屬郡守土之官亦復何辭退而自顧識見淺短既非其才老病衰頽又無其力既不足以勝其任幕府英俊如林又皆乆於其職自足以笑談折衝乃使逺外衰病之人當此重寄徒取訕笑徒取忌嫉竟亦何益尚書委任下吏雖欲使之任責亦思所以保全其身此非所以保全之也自古謀臣䇿士各出所見以禆其上其言豈必皆當哉或是或非在上之人與所親信者决擇之耳則異日成敗皆决擇者之任今則不然泗上之役王穎叔嘗與謀矣王穎叔之意猶言燕可伐也所以伐之者尚書與幕府之責也今不幸而敗一則曰此王遂也二則曰此王遂也如此則誰復為我謀哉維揚之行出於朝廷之意尚書奉行之榦來自逺外特因訪問之間而㣲賛其决耳紛紛之命未行也則曰必召禍幸而無事且歸也則又曰徒虚費怫然不平以為異已較之穎叔差輕耳是尚可預幕府之末議而當一面之重寄哉今以西方之事責之一列郡之守尚書曰可幕府亦曰可幸而敵不深入則將曰敵自不來耳不幸而㣲有衝突則吹毛而索其疵則曰榦之罪也榦又何苦試身於不測之禍哉此榦之所以雖感尚書知已之厚願竭愚忠而有所不敢也今日之事可謂至危敵人能以弱而為强吾國反以强而為弱此士大夫之罪也敵兵既退竊意制府之下惕厲悔前之失思今之得若不可以一朝居者今則不然尚書則曰吾有二萬武定不足畏也幕府則曰比柴守所申敵騎將至皆虚申也古之用師至六十萬八十萬而不以為多今以二三萬人而足恃古之用師常懐勿恃其不來之戒今則曰敵决不來此何言耶古之所謂足以䘮邦者是也至於至小之事亦復如此且如武定人無器甲此特一事耳然行道之人皆言其然也尚書曰吾已與之矣幕府亦曰吾已與之矣又以為吾有八百人工匠日夜製造何以謂之無器甲哉吾所謂無非全無也制府之所謂與亦誠與之矣特恐與其一而遺其二耳不然何以行道之人皆曰無器甲耶以制府之森嚴言之得以自逹者百不一二也幸而有聞亦當考核其故曰武定之額若干人吾之所給器甲者若干副人人與之矣猶恐出戰之際箭鏃已發者不可復收器械已鈍弊者無力以修整也况又未必有耶古之用人皆當有以知其勞苦知其困乏使吾恩意浹洽乎其心然後有以得其死力今則不然吾但欲得汝以為吾用吾可以免其責汝之勞苦困乏吾不知也汝異日之受禍吾不恤也近有金陵士子以書見投有及丘宣撫之事者云丘一日欲招勇敢之士幕府請問事例丘判云錢一百貫銀六兩幕府以為太多丘判一死字其意以為欲其致死豈不直錢一百貫銀六兩耶只此一字誰不願為之死耶至今聞之亦使人感泣也今制府用人能若是耶使榦而任西方之寄則上下皆曰吾有人以任其責矣有請則不報有求則不獲亦何以異於言武定之無器甲者耶夫不能用人則欲得其力此乃今日之大病而又不能聽人之言而用其長嘗觀近日出而圖惟國事其能自有所為者莫若辛幼安不能自為而資人以有為者莫若呉德夫辛幼安之才世不常有如呉德夫者常人可學而能也呉之在荆南也外而幕府十餘人内則士友十餘人賓客之徃來者不絶於賓謁每旦出見客投獻利害者以大紫袋負之以歸吴公輒以夸於人曰今日復得一牛腿矣言所得之多也即送之書院書院之士友叅考之幕府之議論士友亦得與聞飯後凡遇晩士友及幕府各以所見來告上下其議論而求其當然後従而行之間舉酒一二觴夜坐漏下數刻而後退吴公又數以言語慰藉之察其有無而賙恤之以是事無不知知無不行今尚書接人則既疎矣聞人之言未嘗商確必行也幕府辰入酉出其與接尤少則亦何以周知天下之利害云今莫若先出文牓具言敵人侵擾甸淮引咎歸已卑辭下意以求禆益委文官忠厚禮下者一人置司於轅門之外應有投獻者不拘早晩悉令接見受納文字問其居止然後委幕府詮其言之有益者遣人請之相見而慰藉之反覆而究問之其無可采者亦第其髙下饋其薄禮則天下之利害莫不周知矣尚書亦以為然至今未有所聞想亦以為敵人已退不欲自暴其失不欲謂已不能而求於人也夫自謂已能而不資諸人雖堯舜孔孟不敢如此既不能自有所為又不資人以有為則終於無所為而已以無所為為心亦無怪其以武定二萬人為足恃以柴守所申為妄以武定無甲為非也縦使武定真可使敵人真不來兩淮真已寧靜亦且可以偷安於旦暮今棗陽被圍百日城之不陷者如髪棗陽陷則長驅而來破應山掃黄陂蘄黄兩城不攻而下則兩淮豈得為寧靜耶兩淮荆襄之勢如人一身闗節相通一處被害則百節皆痛非若六國之勢韓之禍不及乎魏趙之害不與乎燕也然六國尚且合従以禦秦况棗陽尚被兵而可謂兩淮已寧靜耶此榦之所以日夜憂慮如坐針氊之上而不敢寧也尚書曷亦思之乎人事乆乖天變屢見宗社之危甚於累卵又豈得上下安坐欲以一方之事付之老繆之人而遂以為無慮耶如前所陳言語雖繁其大要有三思慮淺則不能周知利害而動失事機接物簡則下情不通而聞見少與人寡合則人心睽而無以得其死力尚書誠以是三者反覆思之知宗社之為重而不知吾身之為貴知智謀之可取而不知一已之有所長則庶乎其得矣榦老矣不知外物之可慕兩作邑而為倅兩貳郡而為守又兩試郡矣狠愎自用僅足以充筦庫之任天下公議未嘗以為能也素行之不孚自應至是尚書辟以為元僚朝廷且使之任郡事則不可以復在左右矣今又言語狂悖不知深淺如此非尚書亮之而誰耶今欲使之任西方之事豈不為馮婦所笑耶别副竊謂兩淮之事亦不難處欲乞尚書急呼安豐軍路分韓全正陽水軍統制王文中武定將官徐抃李明及安豐寄居吴主簿名時升安豐直學張籌命州郡津遣速來與之商議榦與數人者皆有舊且相信必能得淮西所以守禦之實如六安洪縣尉者檄之以來亦可與商量山中義甲正不待榦之親行也陳桐城一出已半月想更四五日即囘縣併檄之使來禀議仍以淮西之事委之可也適有來相訪者因問以浮光之事其人云安豐至浮光各有人守把敵人若來亦可一戰以决勝負惟浮光之西如中渡最𦂳要皆棄之不顧王馬二將但閉城自守耳㳂淮守把固未必濟事然折栁樊圃亦足以使狂夫之驚顧今乃捐百里之地無一夫之守是開門而望其不來也此等事不因人之議論亦不及知乞以台意詰問光守使之措置為佳棗陽急危則黄州以西不係六闗亦合措置更合宻行下黄州令其條具乃佳然此非重兵截其衝突不可也勉齋集巻十一
