body:
  text: 勉齋集巻七宋黄榦撰書復輔漢卿主管書昨所論性無善惡心有善惡榦以為性亦可謂之有惡者葢因明道惡亦不可不謂之性而發葢天地之間只是箇隂陽五行其理則為健順五常貫徹古今充塞宇宙捨此之外别無一物亦無一物不是此理以人心言之未發則無不善巳發則善惡形焉然原其所以為惡者亦自此理而發非是别有箇惡與理不相干也若别有箇惡與理不相干又卻是有性外之物也易以隂陽分君子小人周子謂性者剛柔善惡君子小人不同而不出於隂陽善惡不同而不出於剛柔葢天下未有性外之物也人性本善氣質之禀一昏一明一偏一正故有善惡之不同其明而正者則發無不善昏而偏者則發有善惡然其所以為惡者亦自此理而發也故曰惡亦不可不謂之性也然人性本善若自一條直路而發則無不善故孟子不但言性善雖才與情亦皆只謂之善及其已發而有善有惡者氣禀不同耳然其所以為惡者亦自此理而發故惡亦不可不謂之性孟子所謂莫非命也程子所謂思慮動作皆天也張子所謂莫非天也陽明勝則德性用隂濁勝則物欲行亦是此意張子曰論氣不論性不明論性不論氣不備故知性之本善又知善惡皆性然後復明且備也更望垂教上江西運使書居於其職而不知事之曲直者不智也知其事之曲直而不為之處當者不仁也受人特逹之知而無以報之者不忠也報之不以其道而陷人於有過者不義也榦誠閩之鄙人也少不自勵老而無用不自量度乃以一命之㣲而膺百里之寄百里之内利害休戚皆不容於不闗其心也雖事之不至於其前猶當日夜求訪而思有以處之况明知其不可乃坐視而莫之救即舉天下之士孰無求進之望哉或以佞或以賄或以請託或以親故其求之者非一方也固有求而不得未有不求而自得也榦非不求也自知其衰老而不敢求也部使者之薦舉乃首及於不求之人此古人有言曰以國士遇我以國士報之言各求其稱也一則恩造二則恩造朝夕傴僂於其間伺人之顔色順人之風㫖惟恐有失焉者是妾婦之道將順其美若夫正救其失扶持植立不使人有纎毫之玷以成其光明盛大之德者此國士之報也王氏饒珉之訟榦之所不能曉者也婉婉之弱子哀號於其前求以奉其母而不得此仁人君子之所宜動心也然所謂天倫者謂其親疎髙下燦然有條而不可易也以弟而繼兄為子而追母則天倫亂矣非所以令衆庶見也非所以明道而立教也夫以一偏之詞執其數十家之族人而指以為教唆者其虚實未可知也以部使者之嚴追而送之他郡棄其家族奔走道途吏卒之誅求囹圄之禁繫十數家者必蕩然而失其常産矣是豈不深可憫耶夫仁人君子之遇事如權衡然葢亦平其心而非有所輕重於其間也然毫釐之際有所未察則亦容有不得其平者部使者之威令若雷霆然世有登乎千仞之山聞雷霆之發於太空也隠然如嬰兒之聲及其一震則裂大石折大木舉措之間不可不審也如此此榦之所以日夜思念而不容自黙也夫承使者之命而追十數家之人於縣令非有所擾也然為縣令則不容不為百姓慮受人之知則不容不為知已者慮也苟為不然則不仁不智不忠不義是小人也大君子之門豈容有此無狀之小人哉此榦之所以不避斧鉞之誅而敢有所言也伏惟台慈察其情而加貸宥焉復李仲詩淮西帥大東榦比以蹤跡不能自明遂具事之始末仰溷台聽方懼瀆尊以速罪戾乃䝉顓价寵賜反覆開曉聞所未聞而又謙抑慰藉如待敵已不勝悚懼不勝感激承諭彼書是猶欲以結集事嫁其罪於榦也比見有蘓知録者以憂歸過此相訪云郭一日呼兩獄推司而問之曰獄案中如何都不曉及通判獄吏荅云此事與通判不相干如何敢冩郭大怒令申報判云各勘杖一百知録徃見之遂相引入卧内於紙袋中出文書一巻内有一條云一體究得上件結集事係是黄通判使令知録云不知是何人體究憑何人言語既無此事如何敢胡冩通判便肯休郭遂教令知録供一狀來云徐師㸃係妄傳州郡台示李明之徒想亦是詐傳通判台㫖遂判一照字而今台諭云云則其説尤可信不知朝廷将信帥司之供責耶抑將信彼之偏辭耶可謂愚之甚也苐恐龍圖於廟堂私劄中未免委曲其詞以致疑惑而不判然别白言之所以中都相識交以書來相告也若是黄通判與謀州郡何不將一行人解帥司乃累日抗拒而不發耶只此一節便自可見其他不辨而自明也台諭每以為其人姦險可畏榦但見其庸陋愚俗而不見其可畏也榦愚不肖數受教於當世之君子矣禮義不愆何恤於人言直道而行成敗利鈍一切付之度外又何彼之足畏哉以堂堂大帥乃凜然畏一列郡之繆守此榦之所以不曉也觀前此賜教以為抑於形勢方今朝列皆賢者或遇為人所誤為之移書求薦則有之若其人不足薦不足用明白而告之彼豈不見聽且龍圖之薦人為朝廷耶為形勢耶髙郵應守其人自賢又石丈之懿親而丞相之所拔擢一語不合東帥劾而去之誰議其非者龍圖之威望豈减於東帥今乃如此隠忍囘互得無損威望耶果如此則繼今以徃髙見逺識之士皆不敢曵裾於龍圖之門而形勢之人日至矣今觀彼書有欲引嫌囘避之語大府遂有乞遷移通判之奏是為其脅嚇而不自覺也果欲囘避則自囘避何必見告耶且繼之曰已作劄子逹大坡矣是何言語乃敢陳於連帥之前彼其意葢欲以大坡相恐嚇耶便是同列亦不敢出此語而大帥之威風乃能受此脅嚇耶且彼何等物類大坡又何嘗眷眷於彼特以虚聲相恐便為之動又有大於此者則當何如也奏狀中有委有才學之語不知何者為才何者為學將委實見其有才學耶抑此二字為形勢而發耶甚非天下之士所望於大君子之門也經濟之才世不多見如龍圖之襟度忠壯固當以韓范自期而世之所謂屬望者亦不輕而受制於小人乃如此此有識所以為之不滿也富貴之來自有定分一門之中登法從者相踵世固不徒以貴顯望龍圖而以道德功業望之也大江之西賢士大夫如林持清議者口若劍㦸故區區之愚忠更望龍圖持心正大處已方嚴是非可否一切付之公論而禍福利害舉不能動吾之心則此等小人奉頭鼠竄之不暇又何敢肆無禮於其上而以形勢相脅持耶如此則道德日以益功業日以彰聲名洋溢西山東湖當為之改觀矣榦愚不肖辱龍圖之愛念者甚至區區之意亦但欲修身明道報知已者而不敢以功利為心今龍圖每得書必勉之曰旦夕必得郡或曰必分符榦不知郡為何物符為何物乃如此利害而屢勤龍圖之開曉耶顔子曾子不試郡不分符將不得為賢人乎天下之士皆必試郡分符而後為可貴耶如此則龍圖亦未為深相知者矣夫子曰不患無位患所以立士亦思所以自立耳而何無位之足患哉大韶大濩森羅乎胸中用之則陳之朝廷薦之郊廟不用則戛擊搏拊於大山長谷之中穹材茂木清韻遺響自以為樂囘視人世方且擊甕盎奏淫哇雜優溺何足聽哉何足戀哉榦所遣丐祠人尚未歸幸而得之更當買舟絶江長歌痛飲於吴山之上然後歸老武夷山中不復交於人世矣仰恃寛𢎞僭陳愊悃言詞激切尚幸矜照復交代王寺丞從榦比承台翰之賜又辱真染見之别幅詞意鄭重不勝感刻諛詞賤跡不復重禀惟是交承之契誠非偶然况又得踵賢者之遺規其為感幸非言所可既也漢陽小壘介於大國之間士大夫不自愛重徃徃過自畏怯又以一葦可航雖守土之官亦絶法出境奔走諸臺諂事上官不過求知巳事苞苴徒餔啜耳想其趨走臺府未免傴僂屈折於吏書之前以至自損威重以故臺前兵卒視漢陽如縣吏之視都保耳其肆為無禮計非一朝一夕之故奉天子命為守豈宜低首下氣奉承此輩耶自交代文赫然奮怒執而囚之公議翕然咸以為當大别秋興自此遂增九鼎之重矣榦也庸懦不武亦得襲此餘威稍可自振何幸如之何幸如之或者以為州郡不應収禁監司之兵卒天下之惡一也監司兵卒敢以擾州郡而州郡治之是為監司懲惡也何不可之有以太守而敢於治監司兵卒則太守之賢可知又足以明監司之賢然後州郡乃敢如此也此蔡丈一時施行之失當亦自悔之矣吾輩従宦誠非得已不過為貧為義合則留不合則去况事之直在我又何歉之有榦視事已數日茫然未知顛末特每事必照交代丈例施行所謂步亦步趨亦趨也有可見教者更望不外復李軍使書蜀人榦講聞髙誼之日乆矣參辰相望願見無由忽承惠書陳義慷慨詞氣奮厲如驚湍怒濤洶湧奔放不可涯涘不問可知其為蜀之名士也忠義之心人誰無之顧志昏於利氣怵於勢則畏懦蓄縮而不能以充此心耳觀執事之所以自叙豈流俗之所敢望哉顧是非毁譽屬乎人窮通得喪屬乎天吾惟盡吾此心而已其他皆不必論也閩蜀相望幾萬里安楊之事固不能盡知而亦嘗竊聞其略矣柴與之世之所謂善彚而顧若是焉何哉宜春善地士友亦多可與語惟執事安之而已榦少不自力老而無成資性狷狹與世多齟齬其窮悴特甚俾守偏壘年事至此豈能尚隨俗俯仰方上香火之請裹足窮山杜門掃軌以終餘年安得千尋之綆挈執事於深淵惟執事安之公道開明晉用有日矣與劉晦伯侍郎書榦拙謬無他長平生但知從師友讀書於世事全不通曉一行試吏亦但知守父兄亷勤之訓此侍郎所熟知又安知邊防為何事既為此來亦不敢不私自籌度以愛君憂國為此心之主而一身之利害不敢計至於存撫百姓相親相愛使如父兄子弟腹心手足入可使守出可使戰人心既歸則兵之弱者當思所以使之强財之乏者當思所以使之富城池雖難猝修而要害之地亦當思所以為老弱保聚之謀南北之限雖有淮河之阻吾既能探彼之事彼又豈不知吾之虚實哉吾之至忠至誠至仁至信又以服南北之心而又知吾之不可犯則雖羊陸之事恐不出此今北方擾擾内有骨肉之相殘外有强敵之相迫山東河北郡盗蠭起道路不通此豈非諸葛孔明所謂存亡危急之秋耶今托身於人而目之所見皆與心之所謀者不相類天下人物有才智自足以有為者有才智不足而資人以有為者自足有為者當依之資人以有為者當輔之既不足有為而又訑訑然拒人於千里之外此所以私竊憤懣而亦不敢見之詞色也目今相處亦無他事之小小者亦不敢數言其闗繫稍大者亦不容不言禮貎徃來亦與他郡守貳無異但勢分太尊而情好隔得失太重而猜防深望其松茂栢悦魚川泳而鳥雲飛則决無此也不獨於榦為然而僚屬莫不然也姑以貌相承而已初亦甚覺可駭今則乆而安之矣聞不和之説已闗廟堂之聽欲和甚不難但相與為欺君誤國持禄自謀之計則無徃而不和是非可否之相濟乃所以為和也初亦思為避之之計葢恐其隂相中傷今既頑然聽其自爾也辱侍郎愛念之深且有甚不可處之慮此亦無不可處者姑自盡而已餘則付之分也故敢詳及之榦冬至一疾幾殆稍安即過歴陽鞫獄徃反一月胡總卿以檄見招更兩三日後徧走㳂淮數百里巡視守把即過金陵亦得一見制帥入幕之請恐非寒賤所敢望也區區愚見竊意邊郵無寧靜之理儻得如侍郎之公忠無我以撫臨軍民廣謀博聽延攬英豪庶幾有屹然不可拔之勢但従容獻納折衝樽俎自有妙算又不在於東馳西騖也附此申禀與胡總卿書榦比因人行嘗草率具𨽻人之敬度必闗瀆台聽惟是請違倐忽十閲月拳拳尊慕實切此心自顧寒㣲朝廷過聽用逾其分氣血日衰去家十五年忽動丘壑之念遂上香火之請不䝉開允俛首於此事簡民醇可以養痾一旱可畏種不入土人無葢藏朝夕凜然無以為計計使以監司而守武昌必欲括諸郡之粟以歸一郡制使以防邉而實逺儲不肯泄逺郡之粟以歸内地漢陽介於安復武昌之間制使禁安復之米使不得至漢陽漕使又欲泄安復漢陽之米以濟武昌以故漢陽獨受其害所幸得旱之初盡捐帑中之積廣糴客米得萬石而舊積亦有三萬不斗大之郡而有四萬石之積遂可以安枕而無虞然兩司之交鬭猶未已也計使挾朝廷之命以持制閫又以閫外之權以令漕司至遣大軍數十人守漢陽之境計使又遷怒以治安復之官吏是何氣象乃若是耶監司之體當如是耶隂陽不和則為旱人事如此何以召天地之和朝廷擇人以安逺而一室之内自相攻擊何以安人心而固吾圉耶世之所謂人物乃如此其豈不大可寒心耶以是益令人動歸去來之興也要之制使之理為直葢實塞下之粟事體為重而救一郡之歉亦易為力也亦嘗以為解計臺之意遂亦併䝉見詆自是只得靜以聽之不敢被髪纓冠而徃救也榦止俟賑濟結局當再申前請得遂従欲則當買舟東下拱聽教誨也與綦總郎書奎榦復自向者某官出宰建陽得托受㕓之庇因獲晉拜去嵗金陵復得預屬吏之末兹承肅将正命榮總餉臺又獲宻邇臺治朝夕親承教條視他郡有榮耀焉顧以疎賤僅能具名姓通記府雖一水之阻又不敢越境親承約束拳拳此心如水東注然區區賤職有不敢不禀瀆者是以忘其犯分之誅輒自冒昩陳之榦衰晩庸謬無足比數誤䝉朝廷知遇之厚試邑一年而得倅為倅一年而得郡此近例所無有不肖何足以當之朅來此邦民淳事簡日領詞訟不過三五紙晨起治事一二刻即退終日可以髙卧財賦之入不過市井酒税亦不難辦真無毫髪可以圖報朝廷知遇之意身雖佚而心實不遑安也然有一國之地則當有一國之政毫髪有闕則無非太守之罪是豈得以為事簡而自佚哉漢陽雖小郡實與武昌為脣齒丙寅丁夘榦適在武昌武昌之人日夜望漢陽之烽火以為安否孫氏都武昌而使魯肅守漢陽則其為要害可知今乃蕩然無城池之可恃此豈郡守之所敢自安城南俯瞰大江堤岸低薄夏月水漲居民晝夜為之不寧一或潰決則一郡生靈皆為魚矣城池堤岸二事乃郡政之最大者日夜籌度計畫要非郡計所能獨辦俟有成説即具利害方略申朝廷諸司而目前有不容已之事惟使所可以主張者本軍軍籍多缺禁軍二百人僅存百二十人多遊手亡命之徒向來廩給不充聽其朝來暮去自榦到任為之增廩給然後粗有固志且招填已及百五十人見招是舊額但無營屋可居徃徃散處民間有營屋二三十間又在郡山之後荒蕪無人之地深為非便葢漢陽郡城自紹興之初殘破之後並無居民岳侯屯兵武昌遂佔郡城荒地為水軍寨所佔之地居郡城三分之一也水軍七八百人又皆髙燥之地郡中居民皆在卑濕又皆偪仄無所容居軍學乃在湖水之中同官廨舍徃徃不能備猶非利害而禁軍無營寨乃缺典之大者今水軍所居之地既為寨屋又為房廊既為廨舍又為花圃向屯七八百人則空地甚多同為屯軍水軍之地有餘而禁軍乃無營寨禁軍之兵無地可居而寄屯之軍其地反多空閒以彼有餘補此不足公此心而觀之亦無不可者欲乞某官曲加憐念呼權司而諭之此意或差一屬官過江相度如果從所請本軍每嵗甘出賃金償之亦惟命是聽么麼小郡非上司力賜主張則雖有趨事赴功之念亦無以展布復豐宅之淮西帥有俊榦備員假守才具淺拙誠無能為獨拳拳宗社之念日夜憂惻無所控訴昔藝祖數百年之基業江左數百萬之生靈二帝之游魂無歸八陵之餘憤未洗當彼中衰殘朝不謀食之際正中原遺黎奚為後我之時以如是之重任付之當世諸賢浮光之警今又兩月矣未知有一字施行起人意者想其聞殺却敵人幾名之報上下舉手相慶又為宴安江沱苟安嵗月之計其使人憤懣欲逃遁山林而不可得也忽聞先發制人之誨不覺喜欲起舞今日之事甚不易見釁端既開事不答已向者吾嘗屈已厚幣以事之彼又據有河南北之地志滿意足故可以和今吾既絶其幣又失河北幽燕之故壤其勢只得取償於我此豈可更萌屈已求和之謀今既如此則只有守有戰而已守非易事惟戰乃勝乎守然自諸賢偷安日乆軍政不修百事廢弛将何以戰顧今日事勢則誠有所謂事半而功倍要在處置得宜耳勉齋集巻七
