body:
  text: 勉齋集卷三十六宋黃幹撰行狀朝奉大夫文華閣侍制贈寶謨閣直學士通議大夫諡文朱先生行狀曾祖絢故不仕妣汪氏祖森故贈承事郎妣程氏贈孺人父松故前任承議郎守尚書吏部貟外郎兼史館校勘纍贈通議大夫妣孺人祝氏贈碩人本貫徽州婺源縣永平鄉松巖里先生姓朱氏諱熹字仲晦甫朱氏為婺源著姓以儒名家世有偉人吏部公甫冠擢進士第入館為尚書郎兼史事以不附和議去國文章行義為學者師號韋齋先生有文集行於世吏部公因仕入閩至先生始寓建之崇安五夫里今居建陽之考亭先生以建炎四年九月十五日午時生南劍尤溪之寓舍幼頴悟莊重能言韋齋指示曰此天也問曰天之上何物韋齋異之就傅授以孝經一閲封之題其上曰不若是非人也嘗從羣兒戲沙上獨端坐以指畫沙視之八卦也少長厲志聖賢之學於舉子業初不經意年十八貢於鄉登紹興十八年進士第以左迪功郎主泉州同安簿蒞職勤敏纎悉必親郡縣長吏事倚以決苟利於民雖勞無憚職兼學事選邑之秀民充弟子員訪求名士以為表率日與講説聖賢修巳治人之道年方踰冠聞其風者巳知學之有師而尊慕之厯四考罷歸以奉親講學為急二十八年請奉祠監潭州南嶽廟明年召赴行在言路有託抑奔競以沮之者遂以疾辭三十二年祠秩滿再請孝宗即位復因其任會有詔求直言因上封事其略言聖躬雖未有闕失而帝王之學不可以不熟講朝政雖未有闕遺而修攘之計不可以不早定利害休戚雖不可遍以疏舉然本原之地不可以不加意陛下育德之初親御簡策不過諷誦文辭吟咏情性比年以來欲求大道之要又頗留意於老子釋氏之書記誦詞藻非所以探淵源而出治道虛無寂滅非所以貫本末而立大中帝王之學必先格物致知以極夫事物之變使義理所存纎悉畢照則自然意誠心正而可以應天下之務次言今日之計不過修政事謹邊防然計不時定者講和之説疑之也金人於我有不共戴天之讐則不可和也義理明矣知義理之不可為而猶為之以有利而無害也以臣策之所謂和者有百害而無一利何苦而必為之願疇咨大臣總攬羣策鑒失之之由求應之之術斷以義理之公參以利害之實閉關絶約任賢使能立紀綱厲風俗使吾修政攘夷之外了然無一毫可恃為遷延中巳之資而不敢懷頃刻自安之意然後將相軍民無不曉然知陛下之志更相激厲以圖事功數年之外志定氣飽國富兵強視吾力之強弱觀彼釁之淺深徐起而圖之中原故地不為吾有而將焉往次言四海利病係斯民之休戚斯民休戚係守令之賢否監司者守令之綱朝廷者監司之本欲斯民之得其所本原之地亦在朝廷而巳今之監司姦贓狼藉肆虐以病民者莫非宰執臺諌之親舊賔客其巳失勢者既按見其交私之狀而斥去之尚在勢者豈無其人顧陛下無自而知之耳明年改元隆興復召辭不許即入對其一言大學之道在乎格物以致其知蓋有是物必有是理然理無形而難知物有迹而易觀故因是物以求之使其理瞭然於心目之間而無毫髮之差則應乎事者自無毫髮之繆陛下雖有生知之性髙世之行而未嘗隨事以觀理故天下之理多所未察未嘗即理以應事故天下之事多有未明是以舉措之間動涉疑二聼納之際未免蔽欺平治之效所以未著由不講乎大學之道而溺心於淺近虛無之過其二言君父之讐不與共戴天乃天之所覆地之所載凡有君臣父子之性者發於至痛不能自巳之同情而非專出於一巳之私然則今日所當為者非戰無以復讐非守無以制勝是皆天理之同然非人欲之私忿也末言古先聖王制御邊陲之道其本不在乎威強而在乎德業其任不在乎邊境而在乎朝廷其具不在乎兵食而在乎紀綱今日諌諍之塗尚壅佞幸之勢方張爵賞易致而威罰不行民力巳殫而國用未節則德業未可謂修朝廷未可謂正紀綱未可謂立凡古先聖王所以強本折衝威制邊陲之道皆未可謂備三劄所陳不出封事之意而加剴切焉先生以為制治之原莫急於講學經世之務莫大於復讐至於德業成敗則決於君子小人之用舍故於奏對復申言之蓋學有定見事有定理而措之於言者如此除武學博士待次乾道改元促就職既至以時相方主和議請監南嶽廟以歸三年差充樞密院編修官待次五年三促就職會魏掞之以布衣召為國子録因論曽覿而去遂力辭先生嘗兩進絶和議抑佞幸之戒言既不行雖擢用狎至不敢就出處之義凛然有不可易者尋丁內艱六年復召以未終喪辭七年既免喪復召以祿不及養辭四年之間辭者六九年有旨安貧守道亷退可嘉特改合入官主管台州崇道觀先生以改秩畀祠皆進賢賞功優老報勤之典今無故驟得之求退得進於義未安再辭淳熙元年又再辭上意愈堅始拜命改宣教郎奉祠二年除祕書郎先生以改官之命正以嘉其亷退今乃冒進擢之寵是左右望而罔市利力辭時上諭大臣欲奬用亷退執政以先生為言故有是命會有言虛名之士不可用者以故再辭即從其請主管武彛山沖佑觀五年差權發遣南康軍事辭者四始之任先生自同安歸奉祠家居幾二十年間關貧困不以屬心涵養充積理明義精見之行事者益霈然矣至郡懇惻愛民如巳隱憂興利除害惟恐不及屬邑星子土瘠稅重乞從蠲減章凡五六上嵗值不雨講求荒政凡請於朝言無不盡官物之檢放倚閣蠲減除豁帶納如秋苖夏稅木炭月樁經總制錢之屬各視其邑目為之條奏或至三四不得請不巳并奏請截留綱運乞轉運常平兩司發錢米充軍糧備賑濟申嚴鄰路斷港遏糴之禁選官吏授以方略俾視境內具知荒歉分數戶口多寡蓄積虛實通商勸分多所全活其設施次第人爭傳録以為法訖事奏乞依格推賞納粟人者凡數四郡濵大江舟艤岸者遇大風輒淪溺因募飢民築堤捍舟民脫於飢舟患亦息先生視民如傷至姦豪侵擾細民撓法害政者懲之不少貸由是豪強斂戢里閭安靖數詣郡學引進士子與之講論訪白鹿洞書院遺址奏復其舊又奏乞賜書院敇額及髙宗御書石經版本九經注疏等書者至再每休沐輒一至諸生質疑問難誨誘不倦退則相與徜徉泉石間竟日乃反又求栗里陶靖節之居西澗劉屯田之墓孝子熊仁贍之閭旌顯之猶以不得悉行其志為恨明年詔監司郡守條具民間利病遂上疏言天下之大務莫大於恤民恤民之本又在人君正心術以立紀綱今日民間特以稅重為苦正緣二嵗之入朝廷盡取以供軍而州縣無復贏餘則不免於二稅之外别作名色巧取於民今民貧賦重若不討軍實去浮冗則民力決不可寬惟有選將吏核兵籍可以節軍實開廣屯田可以益軍儲練習民兵可以益邊備今日將帥之選率皆膏粱子弟厮役凡流所得差遣為費巳是不資到軍之日惟望掊斂刻剝以償債負總餽餉之任者亦皆倚附幽隂交通貨賂其所驅催東南數十郡之脂膏骨髓名為供軍而輦載以輸權幸之門者不可以數計然則欲討軍實以紓民力必盡反前之所為然後乃可革也授將印委利權一出於朝廷之公議則可以絶苞苴請托之私而刻剝之風可革務求忠勇沉毅實經行陳之人則可以革輕授非才之弊而軍士畏愛搜閲以時竄名冗食者不得容其間又擇老成忠實通曉兵農之務者使領屯田之事付以重權責其久任則可以漸省列屯坐食之兵稍捐列郡供軍之數軍籍既核屯田既成兵民既練州縣事力既紓然後可以禁其苛斂責其寬恤庶幾窮困之民得保生業無復流移漂蕩之患所謂端其本在於正心術以立紀綱者蓋天下之紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後紀綱有所繫而立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後乃可得而正今宰相臺省師傅賔友諌諍之臣皆失其職而陛下所與親密謀議者不過一二近習之臣此一二小人者上則蠱惑陛下之心志使陛下不信先王之大道而説於功利之卑説不樂莊士之讜言而安於私􅉏之鄙態下則招集天下士大夫之嗜利無恥者文武彚分各入其門所喜則隂為引援擢置清顯所惡則密行訾毁公肆擠排交通貨賂則所盜者皆陛下之財命卿置將則所竊者皆陛下之柄陛下所謂宰相師傅賔友諌諍之臣或反出入其門墻承望其風旨其幸能自立者亦不過齪齪自守而未嘗敢一言以斥之其甚畏公論者乃略能驚逐其徒黨之一二既不能深有所傷而終亦不敢明言以搗其囊槖窟穴之所在勢成威立中外靡然向之使陛下之號令黜陟不復出於朝廷而出於此一二人之門名為陛下之􅍦斷而實此一二人者隂執其柄蓋其所壞非獨壞陛下之紀綱乃併與陛下所以立紀綱者而壞之則民又安可得而恤財又安可得而理軍政何自而修土宇何自而復宗廟之讐恥又何時而可雪耶先生在任嘗用劄子奏事後因諌臺言用劄子非舊制遂奏乞罷黜又以致人戶逃移自劾者再以疾請奉祠者五將滿除江西提舉常平茶鹽事待次初廟堂議遣先生使蜀上意不欲其逺去故有是命詔以修舉荒政民無流殍除直祕閣凡三辭皆以前所奏納粟人未推賞難以先被恩命會浙東大飢易提舉浙東常平茶鹽事時民已艱食即日單車就道復以南康納粟人未推賞辭職名且乞奏事之任納粟賞行遂受職名入對其一言陛下臨御二十年間水旱盜賊略無寧嵗意者德之崇未至於天與業之廣未及於地與政之大者有未舉而小者無所繫與刑之逺者或不當而近者或幸免與君子有未用而小人有未去與大臣失其職而賤者竊其柄與直諒之言罕聞而諂諛者衆與德義之風未著而汙賤者騁與貨賂或上流而恩澤不下究與責人或巳詳而反躬有未至與夫必有是數者然後足以召災而致異其二言陛下即政之初蓋嘗選建英豪任以政事不幸其間不能盡得其人是以不復廣求賢哲而姑取軟熟易制之人以充其位於是左右私褻使令之賤始得以奉燕間備驅使而宰相之權日輕又慮其勢有所偏而因重以壅巳也則時聼外廷之論將以隂察此輩之負犯而操切之陛下既未能循天理公聖心以正朝廷之大體則固巳失其本矣而又欲兼聼士大夫之公言以為駕馭之術則士大夫之進見有時而近習之從容無間士大夫之禮貌既莊而難親其議論又苦而難入近習便辟側媚之態既足以蠱心志其胥吏狡猾之術又足以眩聰明此其生熟甘苦既有所分恐陛下未及施其駕馭之術而先墮其數中矣是以雖欲微抑此輩而此輩之勢日重雖欲兼采公論而士夫之勢日輕重者既挾其重以竊陛下之權輕者又借力於所重以為竊位固寵之計中外相應更濟以私日往月來浸淫耗蝕使陛下之德業日隳綱紀日壞邪佞充塞貨賂公行兵愁民怨盜賊間作災異數見飢饉薦臻羣小相挻人人皆得滿其所欲惟有陛下了無所得而國家顧乃獨受其弊其三言救荒利害如州縣旱傷早行檢放從實蠲減勸諭人戶賑糶務得其平納粟之人早行推賞所納米數仍減其半乞撥豐儲倉米三十餘萬石以備濟糶州縣新舊官物並且住催紹興丁身等錢預行蠲放及免米商力勝稅錢量立賞格官吏違慢者奏劾昏病者别與差遣仍選差得替待闕宫廟持服官員時暫管幹其四言水旱三分以上第五等戶免檢並放五分以上第四等戶依此施行乞行著令及請頒行社倉條約於諸路其五言紹興和買乞議革其弊其六言南康嘗乞蠲減星子租稅有司拒以對補吝細鄙狹不達大體其七言白鹿書院請賜書額先生所對奏劄凡七其一二皆自書以防宣泄又以南康所上封事繕寫成册用袋重封於閣門投進後五劄亦有非一時救荒之急者當倥偬不暇給之際而憂深慮逺從容整暇蓋急於救民罄竭忠悃不敢有所隱也先生所居之鄉每嵗春夏之交豪戶閉糴牟利細民發廪強奪動相賊殺幾至挺變先生嘗率鄉人置社倉以賑貸之米價不登人得安業至是乞推行之白鹿書院事本不暇及前期執政使人諭以且宜勿言先生因念主上未必有鄙薄儒生之意而大臣先為此言不可及對卒言之上委曲訪問悉從其請先生初拜命即移書他郡募米商蠲其征及至客舟之米巳輻湊復以入奏荒政數事推廣條上情詞懇惻條目詳密日與僚屬寓公鈎訪民隱至廢寢食分畫既定按行所部窮山長谷靡所不到拊問存恤所活不可勝計每出皆乘單車展徒從所厯雖廣而人不知郡縣官吏憚其風采倉皇驚懼常若使者壓其境至有自引去者由是所部肅然而尤以戢盜捕蝗興水利為急大扺措畫悉如南康時而心用尤苦初奏紹興和買之弊至是乞先與痛減嵗額然後用貫頭科敷惟慮真下戶受其弊則請參用髙下等第均敷及減免下戶丁錢以優之又乞免台州丁錢至於差役利害亦嘗條具數千言申省義役之法則乞令均出義田罷去役首免排役此官差保正副長輪收義田仍令上戶兼充戶長又乞取會福建下四州見行産鹽法行於本路沿海四州又乞依處州見行之法改諸郡酒坊為萬戶於救荒之餘猶悉及他事以為經久之計先生猶以徒費大農數十萬緡無以全活一道飢民自劾又以前後奏請多見抑却幸而從者又率稽緩後時無益於事蝗旱相仍不勝憂憤復奏言為今之計獨有斷自聖心沛然發號責躬求言然後君臣相戒痛自省改其次惟有盡出內庫之錢以供大禮之費為收糴之本詔戶部無得催理舊欠詔諸路漕臣遵依條限檢放稅租詔宰臣沙汰被災路分州軍監司守臣之無狀者遴選賢能責以荒政庶幾猶足以下結人心消其乘時作亂之意不然臣恐所憂者不止於餓殍而在於盜賊蒙其害者不止於官吏而上及於國家也復上時宰書云朝廷愛民之心不如惜費之甚是以不肯為極力救民之事明公憂國之念不如愛身之切是以但務為阿諛順旨之計然民之與財孰輕孰重身之與國孰大孰小財散猶可復聚民心一失則不可復收身危猶可復安國勢一傾則不可復正至於民散國危而措身無所則其所聚有不為大盜積者耶九年以賑濟有勞進直徽猷閣辭台守唐仲友與時相王淮同里為姻家遷江西憲未行先生行部訟者紛然得其姦贓偽造楮弊等事劾之時久旱而雨奏上淮匿不以聞仲友亦自辨且言弟婦王氏驚悸病篤論愈力章至十上事下紹興府鞫之獄具情得乃奪其新命授先生先生以為是蹊田而奪之牛辭不拜遂歸尋令兩易江東辭及辭職名具言唐仲友雖寢新命巳具之獄竟釋不治則是所按不實難以復沾恩賞並不許受職名再辭新任且乞奉祠言所劾贓吏黨與衆多並當要路大者宰制斡旋於上小者馳騖經營於下若其加害於臣不遺餘力則逺至師友淵源之所自亦復無故橫肆觗排為臣之計惟有乞身就間或可少紓患害時從臣有奉時相意上疏毁程氏之學以隂詆先生者故有是言十年差主管台州崇道觀先生守南康使浙東始得行其所學巳試之效卓然而卒不果用退而奉崇道雲臺鴻慶之祠者五年自是海內學者尊信益衆十四年除提點江西刑獄公事待次以疾辭不許遂拜命十五年促奏事又以疾辭不許遂行又以疾請奉祠者再淮罷相遂力疾入奏首言近年以來刑獄不當輕重失宜甚至涉於人倫風化之重者有司議刑亦從流宥之法則天理民彛幾何不至於泯滅又言州郡獄官乞注有舉主關升及任滿銓試第二等以上人常調關升及省部胥吏並不得注擬若縣獄則專委之令或不得人則無所不至亦望令縣丞或主簿同行推訊又言提刑司管催經總制錢起於宣和末年倉卒用兵權宜措畫其始亦但計其出納之實數而隨以取之及紹興經界民間投印違限契約所入倍於常嵗自後遂以是年為額而立為比較之説甚至災傷檢放倚閣錢米巳無所入而經總制錢獨不豁除州縣之煎熬何日而少紓斯民之愁難何時而少息又言江西諸州科罰之弊至其末篇乃言陛下即位二十有七年而因循荏苒無尺寸之效可以仰酬聖志嘗反覆而思之無乃燕間起居之間虛明應物之地天理有未純人欲有未盡歟天理未純是以為善不能充其量人欲未盡是以除惡未能去其根一念之頃公私邪正是非得失之機明分角立交戰於其中故體貌大臣非不厚而便嬖側媚得以深被腹心之寄寤寐英豪非不切而柔邪庸繆得以久竊廊廟之權非不樂聞公議正論而有時不容非不堲讒説殄行而未免誤聼非不欲報復陵廟讐恥而不免畏怯苟安非不欲愛養生靈財力而未免歎息愁怨凡若此彚不一而足願陛下自今以往一念之頃則必謹而察之此為天理耶為人欲耶果天理也則敬以充之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將惟陛下之所欲為無不如志矣是行也有要之於路以正心誠意為上所厭聞戒以勿言者先生曰吾平生所學只有此四字豈可回互而欺吾君乎及奏上未嘗不稱善曰久不見卿浙東之事朕自知之今當處卿清要不復勞卿州縣除兵部郎以足疾丐祠未供職本部侍郎林栗前數日與先生論易西銘不合至是遣部吏抱印迫以供職先生以疾在告遂疏先生欺慢時上意方嚮先生欲易以他部郎時相竟請授以前江西之命仍舊職名又令吏部給還改官以後不曽陳乞磨勘蓋先生改秩既出特恩其後纍任祠官無績可考以故不曽陳乞磨勘者十有四年先生行且辭曰論者謂臣事君無禮為人臣子有此名罪當誅戮豈可復任外臺耳目之寄章再上除直寶文閣主管西京嵩山崇福宫栗亦罷辭磨勘及職名不許轉朝奉郎未踰月再召時廟堂知上眷厚憚先生復入故為兩罷之䇿上悟先生復召受職名辭召命以為遷官進職皆為許其間退方竊難進易退之褒復為彈冠結綬之計則其為世觀笑不但往來屑屑之譏又促召初先生入奏事迫於疾作嘗面奏以為口陳之説有所未盡乞具封事以聞至是再辭遂併具封事投匭以進其略曰今天下大勢如人有重病內自心腹外逹四支無一毫一髮不受病者臣不暇言且以天下之大本與今日之急務為陛下言之蓋大本者陛下之心急務則輔翼太子選任大臣振舉綱維變化風俗愛養民力修明軍政六者是也古先聖王兢兢業業持守此心雖在紛華波動之中幽獨得肆之地而所以精之一之克之復之如對神明如臨淵谷猶恐隱微之間或有差失而不自知是以建師保之官列諌諍之職凡飲食酒漿衣服次舍器用財賄與夫宦官宫妾之政無一不領於冡宰使其左右前後一動一靜無不制以有司之法而無纎芥之隙瞬息之頃得以隱其毫髮之私陛下之所以精一克復而持守其心果有如此之功乎所以修身齊家而正其左右果有如此之效乎宫省事禁臣固不得而知然爵賞之濫貨賂之流閭巷竊言蓋久巳不勝其籍籍則陛下所以修之家者恐其未有以及古之聖王也至於左右便嬖之私恩遇過當往者淵覿説抃之徒勢熖熏灼傾動一時今巳無可言矣獨有前日臣所面陳者雖蒙聖慈委曲開譬然臣之愚竊以為此輩但當使之守門傳命供掃除之役不當假借崇長使得逞邪媚作淫巧於內以蕩上心立門庭招權勢於外以纍聖政臣竊聞之道路自王抃既逐之後諸將差除多出此人之手陛下竭生靈膏血以奉軍旅而軍士顧乃未嘗得一溫飽是皆將帥巧為名色奪取其糧肆行於貨賂干近習以圖進用出入禁闥腹心之臣外交將帥共為欺蔽以至於此而陛下不悟反寵昵之以是為我之私人至使宰相不得議其制置之得失給諌不得論其除授之是非則陛下所以正其左右者未能及古之聖王又明矣至於輔翼太子則自王十朋陳良翰之後宫寮之選號為得人而能稱其職者蓋已鮮矣而又時使邪佞儇薄闒冗妄庸之輩或得參錯於其間所謂講讀亦姑以應文備數而未聞其有針規之效至於從容朝夕陪侍遊燕者又不過使臣宦者數輩而巳唐之六典東宫之官師傅賔客既職輔導而詹事府兩春坊實擬天子之三省故以詹事庶子領之今則師傅賔客既不復置而詹事庶子有名無實其左右春坊遂直以使臣掌之何其輕且褻之甚耶夫立太子而不置師傅賔客則無以發其隆師親友尊德樂義之心獨使春坊使臣得侍左右則無以防其戲慢媟狎竒邪雜進之害宜討論前典置師傅賔客之官罷去春坊使臣而使詹事庶子各復其職至於選任大臣則以陛下之聰明豈不知天下之事必得剛明公正之人而後可任哉其所以常不得如此之人而反容鄙夫之竊位者直以一念之間未能撤其私邪之蔽而燕私之好便嬖之流不能盡由於法度若用剛明公正之人以為輔相則恐其有以妨吾之事害吾之人而不得肆是以選掄之際常先排擯此等置之度外而後取凡疲懦軟熟平日不敢直言正色之人而揣摩之又於其中得其至庸極陋決可保其不至於有所妨者然後舉而加之於位是以除書未出而物色先定姓名未顯而中外已逆知其決非天下之第一流矣至於振肅紀綱變化風俗則今日宫省之間禁密之地而天下不公之道不正之人顧乃得以窟穴盤據於其間而陛下目見耳聞無非不公不正之事則其所以熏蒸銷鑠使陛下好善之心不著疾惡之意不深其害巳有不可勝言者矣及其作姦犯法則陛下又未能深割私愛而付諸外廷之議論以有司之法是以紀綱不能無所撓敗紀綱不正於上是以風俗頽弊於下蓋其為患之日久矣而浙中為尤甚大率習為軟美之態依阿之言以不分是非不辨曲直為得計下之事上固不敢少忤其意上之御下亦不敢稍怫其情惟其私意之所在則千塗萬轍經營計較必得而後巳甚者以金珠為脯醢以契劵為詩文宰相可啖則啖宰相近習可通則通近習惟得之求無復亷恥一有剛毅正直守道循理之士出乎其間則羣譏衆排指為道學而加以矯激之罪十數年來以此二字禁錮天下之賢人君子復如崇宣之間所謂元祐學術者排擯詆辱必使無所容其身而後巳嗚呼此豈治世之事而尚復忍言之哉至於愛養民力修明軍政則自虞允文之為相也盡取版曹嵗入窠名之必可指擬者號為嵗終羡餘之數而輸之內帑顧以其有名無實積纍挂欠空載簿籍不可催理者撥還版曹以為內帑之積將以備他日用兵進取不時之須然自是以來二十餘年內帑嵗入不知幾何而認為私貯典以私人宰相不得以式貢均節其出入版曹不得以簿書勾考其有亡其日銷月耗以奉燕私之費者蓋不知其幾何矣而曷嘗聞其能用此錢以為制敵之計為國家一雪其恥徒使版曹經費闕乏日甚督趣日峻以至廢去祖宗以來破分良法而必以十分登足為限以為未足則又造為比較監司郡守殿最之法以誘脅之於是中外承風競為苛急此民力之所以重困也諸將之求進也必先掊克士卒以殖私財然後以此自結於陛下之私人而祈以姓名達於陛下之貴將貴將得其姓名即以付之軍中使自什五以上節次保明稱其材武堪任將帥然後具奏為牘而言之陛下之前陛下但見等級推先案牘具若則誠以為公薦而可以得人矣而豈知其諧價輸錢巳備晚唐之債帥哉夫將者三軍之司命而其選置之方乖剌如此則其智勇材略之人孰肯抑心下首於宦官宫妾之門而陛下之所得以為將帥者皆庸夫走卒而猶望其修明軍政激勸士卒以強國勢豈不誤哉凡此六事皆不可緩而本在於陛下之一心一心正則六事無不正一有人心私欲以介乎其間則雖欲憊精勞力以求正夫六事者亦將徒為文具而天下之事愈至有不可為矣疏入夜漏下七刻上巳就寢急起秉燭讀之終篇明日除主管太乙宫兼崇政殿説書時上巳有倦勤之意蓋將以為燕翼之謀先生嘗草奏疏言講學以正心修身以齊家逺便嬖以近忠直抑私恩以抗公道明義理以絶神姦擇師傅以輔皇儲精選任以明體統振紀綱以厲風俗節財用以固邦本修政事以禦外侮凡十事欲以為新政之助會執政有指道學為邪氣者力辭新命除祕閣修撰仍奉外祠遂不果上先生當孝宗朝陛對者三上封事者三其初固以講學窮理為出治之大原其後則直指天理人欲之分精一克復之義其初固以當世急務一二為言其後封事之上則心術宫禁時政風俗披肝􅅹膽極其忠鯁蓋所望於君父愈深而其言愈切故於封事之末有曰日月逾邁如川之流一往而不復不惟臣之蒼顔白髮巳迫遲莫而竊仰天顔亦覺非昔時矣忠誠懇惻至今讀者猶為之涕下先生進疏雖切孝宗亦開懷容納武博編摩祕省郎曹之除蓋將引以自近守南康持浙東江西之節又知其不可強留而授之至是復有經帷之命先生之盡忠孝宗之受盡言亦未為不遇也然先生進言皆痛詆大臣近習孝宗之眷愈厚而嫉者愈深是以不能一日安其身於朝廷之上而孝宗內襌矣光宗即位再辭職名仍舊直寶文閣降詔奬諭除江東轉運副使以疾辭者再覃恩轉朝散郎賜緋衣銀魚改知漳州又再以疾辭不許時光宗初政再被除命遂以紹熙元年之任奏除屬縣無名之賦七百萬減經總制錢四百萬加意學校教誘諸生如南康時又以習俗未知禮採古喪葬嫁娶之儀揭以示之命父老解説以教子弟釋氏之教南方為盛男女聚僧廬為傳經會女不嫁者私為庵舍以居悉禁之俗大變郡有故迪功郎髙登忤秦檜貶死為奏請昭雪褒其直會朝論欲行泉漳汀三州經界先生初仕同安已知經界不行之害至是訪事宜擇人物以至方量之法洞見本末遂疏其事上之且言必可行之説三將必至於不能行之説一蓋謂經界法行息爭止訟大為民利而占田隱稅侵漁貧弱者所不便及具宣德意榜之通衢則邦民鼓舞而寓公豪右果為異議以沮之遂因地震及足疾不赴錫宴自劾其冬有旨先行漳州經界南方春早事巳無及明年屬有嗣子之喪再請奉祠除祕閣修撰主管南京鴻慶宫先生以當上初政嘗辭前件職名巳降褒詔從其請難以復受辭者再詔論撰之職以寵名儒乃拜命除荆湖南路轉運副使再辭漳州經界竟報罷遂以前言經界可行自劾三年再以疾辭乞補滿宫觀從之又數月差知靜江府廣南西路經界安撫辭四年又辭主管南京鴻慶宫未幾差知潭州荆湖南路安撫以辭逺就近不為無嫌力辭五年再辭有旨長沙巨屏得賢為重會洞獠擾屬郡遂拜命赴鎮至則遣人諭以禍福皆降之申教令嚴武備戢姦吏抑豪民先生所至必興學校明教化湖湘士子素知學日伺公退則請質所疑先生為之講説不倦四方之學者畢至又以南康漳州所申改正釋奠儀式為請録故死節五人為之立廟孝宗升遐先生哀慟不能自勝又聞上以疾不能執喪中外洶洶益憂懼遂申省乞歸田里言天下國家所以長久安寧惟賴朝廷三綱五常之教建立修明於上然後守藩述職之臣有以稟承宣布於下所以內外相維小大順序雖有強猾姦宄無所逞志不然以一介書生置諸數千里軍民之上亦何所憑恃而能服其衆哉又草封事極言父子天性不應以小嫌廢彛倫言頗切直會今上即位不果上上在濳邸聞先生名每恨不得先生為本宫講官至是首召奏事先生行且辭除煥章閣待制侍講辭不許又再辭且言陛下嗣位之初方將一新庶政所宜愛惜名器若使幸門一開其弊豈可復塞至於博延儒臣專意講學蓋將求所以深得親歡者為建極導民之本思所以大振朝綱者為防微慮逺之圖顧問之臣實資輔養用人或繆所繫非輕蓋先生在道聞南內朝禮尚闕近習巳有用事者故預有是言又不許遂奏乞且依元降指揮帶元官職奏事者再及入對首言乃者天運艱難國有大咎所謂天下之大變而不可以常理處者太皇太后躬定大䇿陛下寅紹丕圖可謂處之以權而庶幾不失其正矣然自頃至今亦既三月或反不能無疑於逆順名實之際禍亂之本又巳伏於冥冥之中竊為陛下憂之尚猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之懷此則道心微妙之全體天理發用之本然所以行權而不失其正之根本也誠即是心而充之所謂求仁得仁而無怨終身欣然樂而忘天下者臣有以知陛下之不難矣借曰天命神器不可無傳宗廟社稷不可無奉則轉禍為福易危為安亦豈可舍此而他求哉充吾未嘗求位之心則可以盡吾負罪引慝之誠充吾未嘗忘親之心則可以致吾溫凊定省之禮始終不越乎此而大倫正大本立矣次言為學莫先於窮理窮理必在於讀書讀書之法莫貴於循序而致精致精之本則又在於居敬而持志又三劄言湖南嵗計入少出多不可支吾乞裁減差到諸班換授歸正雜色補官貟數邵州邊防全無措畫以致淫人侵犯乞移置寨柵增撥戍兵潭州城壁乞行計度修築既對面辭待制侍講不許翌日又辭待制職名乞改作説書差遣以為未得進説而先受厚恩萬一異時未效涓埃而疾病不支遂竊侍從職名而去則臣死有餘罪上手札卿經術淵源正資勸講次對之職勿復牢辭以副朕崇儒重道之意遂拜命會趙彥逾按視孝宗山陵以為土肉淺薄掘深五尺下有水石旋改新穴比舊僅髙尺餘孫逢吉覆按亦乞少寬日月别求吉兆有旨集議臺史憚之議遂中寢先生竟上議狀言夀皇聖德神功宜得吉土以奉衣冠之藏當廣求術士博訪名山不宜偏信臺史罔上誤國之言固執紹興坐南向北之説委之水泉沙礫之中殘破浮淺之地不報覃恩轉朝請郎賜紫章服實録院同修撰再辭不許拜命受詔進講大學先生以平日論著數陳開析務積誠意以感上心遂奏乞除朔望旬休及過宫日分不以寒暑雙隻日月諸假故並令早晚進講又乞置局看詳四方封事瑞慶節免稱賀皆從之復因有旨修葺舊東宫為屋三數百間遂具四事奏言當上帝震怒災異數出畿甸百姓飢餓流離太上皇帝未獲進見夀皇山陵未卜太皇太后皇太后皆以尊老之年煢然憂苦不宜大興土木以就安便夀康定省之禮所宜下詔自責頻日繼往顧乃逶迤舒緩無異尋常太上皇帝必以為此特備禮而來其深閉固拒而不得見亦宜矣朝廷紀綱尤所當嚴上自人主下至百執事各職業不可相侵今進退宰執移易臺諌皆出陛下之獨斷大臣不與謀給舍不及議正使其事悉當於理亦非為治之體况中外傳聞皆謂左右或竊其柄而其所行又未能盡允於公議乎此弊不莗臣恐名為獨斷而主威不免於下移欲以求治而返不免於致亂末復申言菆宫之卜不宜偏聽臺史膠固繆妄之言墮其交結眩惑之計皆不報先生進講每及數次復以前所講者編次成帙以進上亦開懷容納且面諭以求放心之説甚善所進册子宫中嘗讀之今後更為點來先生知上有意於學遂以劄子勉上進德其略言願陛下日用之間語默動靜必求放心以為之本而于玩經觀史親近儒學已用力處益用力焉數召大臣切劘治道俾陳今日要務略如仁祖開天章閣故事至於羣臣進對亦賜溫顔反覆詢訪以求政事之得失民情之休戚而又因以察其人才之邪正短長庶於天下之事各得其理又奏禮經勑令子為父嫡孫承重為祖父皆斬衰三年嫡子當為父後不能襲位執喪則嫡孫繼統而代之執喪自漢文短喪厯代因之天子遂無三年之喪為父且然則嫡孫承重可知人紀廢壞三綱不明千有餘年莫能釐正夀皇聖帝至性自天孝誠內發易月之外猶執通喪朝衣朝冠皆以大布所宜著在方册為世法程間者遺誥初頒太上皇帝偶違康豫不能躬就喪次陛下以世嫡承大統則承重之服著在禮律所宜遵夀皇巳行之法一時倉卒不及詳議遂用漆沙淺黃之服不惟上違禮律且使夀皇巳行之禮舉而復墜臣竊痛之然既往之失不及追改惟有將來啓殯發引禮當復用初喪之服則其變除之節尚有可議欲望明詔禮官稽考禮律預行指定會孝宗祔廟議宗廟迭毁之次有併請祧僖宣二祖奉太祖居第一室祫祭則正東向之位者有旨集議僖順翼宣四祖祧主宜有所歸自太祖皇帝首尊四祖之廟以僖祖為四廟之首治平間議者以世數寖逺請遷僖祖於夾室未及數年王安石等奏僖祖有廟與稷契無異請復其舊詔從之時相雅不以熙寧復祀僖祖為是先生度難以口舌爭遂移疾上議狀條其不可者四以為藏之夾室則是以祖宗之主下藏於子孫之夾室至於祫祭設幄於夾室之前則亦不得謂之祫欲别立一廟則喪事即逺有毁無立欲藏之天興殿則宗廟原廟不可相雜議者皆知其不安特以其心急於尊奉太祖三年一祫時暫東向之故不知其實無益於太祖之尊而徒使僖祖太祖兩廟威靈相與爭較強弱於冥冥之中并使四祖之神疑於受擯倣徨躑躅不知所歸令人傷痛不能自巳今但以太祖當日追尊帝號之心而默推之則知太祖今日在天之靈於此必有所不忍又况僖祖祧主遷於治平不過數年神宗皇帝復奉以為始祖巳為得禮之正而合於人心所謂有其舉之而莫敢廢者乎又擬為廟制以辨議者一旦并遷僖宣二祖析太祖太宗為二之失復引元祐大儒程頥之説以為物豈有無本而生者今日天下基本蓋出僖祖安得為無功業議狀既上廟堂持之不以聞既毁撤僖宣廟室更創别廟以奉四祖宰相既有所偏主樓鑰陳傳良又復牽合裝綴以附其説先生所議頗達上聽忽有旨召赴內殿奏事因節略狀文及為劄子畫圖以進上然之且曰僖祖國家始祖髙宗孝宗太上皇帝不曽遷今日豈敢輕議欲令先生於榻前撰數語以御批直罷其事先生方懲內批之弊因言乞降出劄子再令臣寮集議既退復以上意諭廟堂而事竟不行經生學士知禮者皆是先生一時異議之徒忌其軋已權姦遂從而乘之上之立也丞相趙汝愚密與知閣門事韓托胄謀之托胄於太皇太后為親屬因得通中外之言托胄自謂有定策功居中用事先生自長沙辭免待制侍講已微寓其意及進對復嘗再三面言又約吏部侍郎彭龜年共攻之龜年出護使客托胄益得志先生又于所奏四事疏中斥言左右竊柄之失後因講筵留身復申言前疏乞賜施行既退即降御批云憫卿耆艾方此隆冬恐難立講巳除卿宫觀宰相執奏不行明日徑以御批付下臺諌給舍亦爭留不可除寶文閣待制與州郡差遣力辭尋除知江陵府又力辭仍乞追還新舊職名詔依舊煥章閣待制提舉南京鴻慶宫慶元元年又乞追還舊職不許趙丞相亦罷誣以不軌謫永州丞相既當大任收召四方知名之士中外引領以觀新政先生獨惕然以托胄用事為慮既屢為上言又數以手書遣生徒密白丞相當以厚賞酬其勞勿使得預朝政且有分界限立紀綱防微杜漸謹不可忽之意丞相方謂其易制所倚以為腹心謀事之人又皆持祿苟安無復逺慮丞相既逐而朝廷大權悉歸托胄先生自念身雖間退尚帶侍從職名不敢自默遂草書萬言極言姦邪蔽主之禍因以明其寃詞旨痛切諸生遂諌以筮決之遇遁之同人先生默然退取諌藁焚之自號遁翁以廟議不合乞收還職名又以疾乞休致不許先是吏部取會磨勘至是轉朝奉大夫又辭職名乞休致又以嘗妄議山陵自劾又言巳罷講官不敢復帶侍從職名詔依舊祕閣修撰二年又言昨來疏封錫服封贈廕補磨勘轉官皆為巳受從官恩數乞改正沈繼祖為監察御史上章誣詆落職罷祠四年十二月以來嵗年及七十申乞致仕五年依所請六年三月甲子終於正寢十一月壬申葬建陽縣唐石里之大林谷嘉泰二年除華文閣待制與致仕恩澤傅伯夀故家子嘗執弟子禮恨不薦巳先生辭次對除修撰也伯夀行詞有慢偽等語及先生沒伯夀守建寧又不以聞故復職之命猶生存也自先生去國托胄勢益張鄙夫憸人迎合其意以學為偽謂貪黷放肆乃人真情潔亷好禮者皆偽也科舉取士稍涉經訓者悉見排黜文章議論根於理義者並行除毁六經語孟悉為世之大禁猾胥賤𨽻頑鈍無耻之徒往往引用以至卿相繩趨尺步稍以儒名者無所容其身從逰之士特立不顧者屛伏丘壑依阿巽懦者更名他師過門不入甚至變易衣冠狎逰市肆以自别其非黨先生日與諸生講學竹林精舍有勸以謝遣生徒者笑而不答先生既殁善類悉巳排擯羣小之勢巳成托胄志氣驕溢遂至擅開邊釁幾危宗社而生靈塗炭矣開禧三年托胄伏誅凶徒憸黨根株斥戮嘉定元年詔賜諡與遺表恩澤明年賜諡曰文又明年贈中大夫特贈寶謨閣直學士後以明堂恩纍贈通議大夫先生平居惓惓無一念不在於國聞時政之闕失則戚然有不豫之色語及國勢之未振則感慨以至泣下然謹難進之禮則一官之拜必抗章而力辭厲易退之節則一語不合必奉身而亟去其事君也不貶道以求售其愛民也不徇俗以苟安故其與世動輒齟齬自筮仕以至屬纊五十年間厯事四朝仕於外者僅九考立於朝者四十日道之難行也如此然紹道統立人極為萬世宗師則不以用舍為加損也自韋齋先生得中原文獻之傳聞河洛之學推明聖賢遺意日誦大學中庸以用力於致知誠意之地先生蚤嵗巳知其説而心好之韋齋病且亟屬曰籍溪胡原仲白水劉致中屏山劉彥沖三人吾友也學有淵源吾所敬畏吾即死汝往事之而惟其言之聽則吾死不恨矣先生既孤則奉以告三君子而稟學焉時年十有四慨然有求道之志博求之經傳遍交當世有識之士雖釋老之學亦必究其歸趣訂其是非延平李先生學於豫章羅先生羅先生學於龜山楊先生延平於韋齋為同門友先生歸自同安不逺數百里徒步往從之延平稱之曰樂善好義鮮與倫比又曰頴悟絶人力行可畏其所論難體認切至自是從遊纍年精思實體而學之所造者益深矣其為學也窮理以致其知反躬以踐其實居敬者所以成始成終也謂致知不以敬則昏惑紛擾無以察義理之歸躬行不以敬則怠惰放肆無以致義理之實持敬之方莫先主一既為之針以自警又筆之書以為小學大學皆本於此終日儼然端坐一室討論典訓未嘗少輟自吾一心一身以至萬事萬物莫不存理存此心於齊莊靜一之中窮此理於學問思辨之際皆有以見其所當然而不容巳與其所以然而不可易然充其知而見於行者未嘗不反之於身也不睹不聞之前所以戒懼者愈嚴愈敬隱微幽獨之際所以省察者愈精愈密思慮未萌而知覺不昧事物相接而品節不差無所容乎人欲之私而有以全乎天理之正不安於偏見不急於小成而道之正統在是矣其為道也有太極而隂陽分有隂陽而五行具稟隂陽五行之氣以生則太極之理各具於其中天所賦為命人所受為性感於物為情統性情為心根於性則為仁義禮智之德發於情則為惻隱羞惡辭遜是非之端形於身則為手足耳目口鼻之用見於事則為君臣父子夫婦兄弟朋友之常求諸人則人之理不異於巳參諸物則物之理不異於人貫徹古今充塞宇宙無一息之間斷無一毫之空闕莫不析之極其精而不亂然後合之盡其大而無餘先生之於道可謂建諸天地而不悖質諸聖賢而無疑矣故其得於巳而為德也以一心而窮造化之原盡性情之妙達聖賢之藴以一身而體天地之運備事物之理任綱常之責明足以察其微剛足以任其重𢎞足以致其廣毅足以極其常其存之也虛而靜其發之也果而確其用之也應事接物而不窮其守之也厯變履險而不易本末精粗不見其或遺表裏初終不見其或異至其養深積厚矜持者純熟嚴厲者和平心不待操而存義不待索而精猶以為義理無窮嵗月有限常歉然有不足之意蓋有日新又新不能自巳者而非後學之所可擬議也其可見之行則修諸身者其色莊其言厲其行舒而恭其坐端而直其間居也未明而起深衣幅巾方履拜於家廟以及先聖退坐書室几案必正書籍器用必整其飲食也羮食行列有定位匕箸舉措有定所倦而休也暝目端坐休而起也整步徐行中夜而寢既寢而寤則擁衾而坐或至達旦威儀容止之則自少至老祁寒盛暑造次顛沛未嘗有須臾之離也行於家者奉親極其孝撫下極其慈閨庭之間內外斬斬恩義之篤怡怡如也其祭祀也事無纎巨必誠必敬小不如儀則終日不樂巳祭無違禮則油然而喜死喪之禮哀戚備至飲食衰絰各稱其情賔客往來無不延遇稱家有無常盡其歡於親故雖疏逺必致其愛於鄉閭雖微賤必致其恭吉凶慶弔禮無所遺賙恤問遺恩無所闕其自奉則衣取蔽體食取充腹居止取足以障風雨人不能堪而處之裕如也若其措諸事業則州縣之施設立朝之言論經綸規畫正大宏偉亦可概見雖達而行道不能施之一時然退而明道足以傳之萬代謂聖賢道統之傳散在方册聖經之旨不明則道統之傳始晦於是竭其精力以研窮聖賢之經訓於大學中庸則補其闕遺别其次第綱領條目粲然復明於論語孟子則深原當時答問之意使讀而味之者如親見聖賢而面命之於易與詩則求其本義攻其末失深得古人遺意於數千載之上凡數經者見之傳注其關於天命之微人心之奧入德之門造道之域者既巳極深研幾探賾索隱發其旨趣而無遺矣至於一字未安一詞未備亦必沉濳反覆或達旦不寐或纍日不倦必求至當而後巳故章旨字義至微至細莫不理明詞順易知易行於書則疑今文之艱澀反不若古文之平易於春秋則疑聖心之正大決不類傳注之穿鑿於禮則病王安石廢罷儀禮而傳記獨存於樂則憫後世律尺既亡而清濁無據是數經者亦嘗討論本末雖未能著為成書然其大旨固巳獨得之矣若歷代史記則又考論西周以來至於五代取司馬公編年之書繩以春秋紀事之法綱舉而不繁目張而不紊國家之理亂君臣之得失如指諸掌周程張邵之書所以繼孔孟道統之傳歷時未久微言大義鬱而不章為之裒集發明而後得以盛行於世太極先天二圖精微廣博不可涯涘為之解剝條畫而後天地本原聖賢藴奧不至於泯沒程張門人祖述其學所得有深淺所見有疏密先生既為之區别以悉取其所長至或識見小偏流於異端者亦必研窮剖析而不沒其所短南軒張公東萊吕公同出其時先生以其志同道合樂與之友至或識見少異亦必講磨辨難以一其歸至若求道而過者病傳注誦習之煩以為不立文字可以識心見性不假修為可以造道入德守虛靈之識而昧天理之真借儒者之言以文老佛之説學者利其簡便詆訾聖賢捐棄經典猖狂呌呶側僻固陋自以為悟立論愈下者則又崇奬漢唐比附三代以便其計功謀利之私二説並立髙者陷於空無下者溺於卑陋其害豈淺淺哉先生力排之俾不至亂吾道以惑天下於是學者靡然向之先生教人以大學語孟中庸為入道之序而後及諸經以為不先乎大學則無以提綱挈領而盡論孟之精微不參之以論孟則無以融會貫通而極中庸之旨趣然不會其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉其於讀書也又必使之辨其音釋正其章句玩其辭求其義研精覃思以究其所難知平心易氣以聽其所自得然為巳務實辨别義利毋自欺謹其獨之戒末嘗不三致意焉蓋亦欲學者窮理反身而持之以敬也從遊之士迭誦所習以質其疑意有未諭則委曲告之而未嘗倦問有未切則反覆戒之而未嘗隱務學篤則喜見於言進道難則憂形於色講論經典啇略古今率至夜半雖疾病支離至諸生問辨則脫然沉痾之去體一日不講學則惕然常以為憂摳衣而來逺自川蜀文詞之傳流及海外至於邊徼亦知慕其道竊問其起居窮鄉晚出家蓄其書私淑諸人者不可勝數先生既殁學者傳其書信其道者益衆亦足以見理義之感於人者深也繼往聖將微之緒啓前賢未發之機辨諸儒之得失闢異端之訛繆明天理正人心事業之大又孰有加於此者至若天文地志律厯兵機亦皆洞究淵微文詞字畫騷人才士疲精竭神常病其難至先生未嘗用意而亦皆動中規繩可為世法是非姿稟之異學行之篤安能事事物物各當其理各造其極哉學修而道立德成而行尊見之事業者又如此秦漢以來迂儒曲學既皆不足以望其藩墻而近代諸儒有志乎孔孟周程之學者亦豈能以造其閫域哉嗚呼是殆天所以相斯文篤生哲人以大斯道之傳也先生疾且革手為書囑其子在與門人范念德黃幹尤拳拳以勉學及修正遺書為言翌旦門人侍疾者請教先生曰堅苦問溫公喪禮曰疏略問儀禮頷之巳而正坐整冠衣就枕而逝門人治喪者既一以儀禮從事而訃告所至從逰之士與夫聞風慕義者莫不相與為位而聚哭焉禁錮雖嚴有所不避也嗚呼天又胡不憗遺以永斯道之傳而遽使後學失所依歸哉先生所著書有易本義啓蒙蓍卦考誤詩集傳大學中庸章句或問論語孟子集注太極圗通書西銘解楚詞集注辨證韓文考異所編次有語孟集義孟子指要中庸集略孝經刋誤小學書通鑑綱目本朝名臣言行録古今家祭禮近思録河南程氏遺書伊洛淵源録皆行於世先生著述雖多於語孟中庸大學尤所加意若大學論語則更定數四以至垂沒大學誠意一章乃其絶筆也其明道垂教拳拳深切如此楚詞集注亦晚年所作其愛君憂國雖老不忘通鑑綱目僅能成編每以未及修補為恨又嘗編次禮書用工尤苦竟亦未能脫藁所輯家禮世多用之然其後亦多損益未暇更定平生為文則季子在彚次之矣生徒問答則後學李道傳嘗裒輯鋟版未備也娶劉氏追封碩人白水草堂先生之女草堂即韋齋所屬以從學者也其卒也以淳熙丙申其葬以祔穴子三人長孰先十年卒次野迪功郎監湖州德清縣戶部新市犒賞酒庫後十年亦卒季在承議郎提舉兩浙西路常平茶鹽公事女五人婚儒林郎靜江府臨桂縣令劉學古奉議郎主管毫州明道宫黃幹進士范元裕仲季二人亦早卒孫男七人巨銓鑑鐸銍鉉鑄巨從政郎新差監行在雜買務雜賣場門銓從事郎融州司法參軍鑑迪功郎新辟差充廣西經略安撫司凖備差遣餘業進士女九人壻承議郎主管華州雲臺觀趙師夏進士葉韜甫周巽亨鄭宗亮黃輅從政郎紹興府會稽縣丞趙師若黃慶臣李公玉曽孫男六人淵洽潛濟濬澄女七人先生殁有年矣狀其行者未有所屬筆在以幹從學日久俾任其責先生既不假是而著幹之識見淺陋言語卑弱又不足模倣萬一追思平日步趨謦咳則悲愴哽咽不忍書亦不忍忘也竊聞道之正統待人而後傳自周以來任傳道之責得統之正者不過數人而能使斯道章章較著者一二人而止耳由孔子而後周程張子繼其絶至先生而始著蓋千有餘年之間孔孟之徒所以推明是道者既以煨燼殘闕離析穿鑿而微言幾絶矣周程張子崛起於斯文湮塞之餘人心蠧壞之後扶持植立厥功偉然未及百年蹐駁尤甚先生出而自周以來聖賢相傳之道一旦豁然如大明中天昭晰呈露則托其言行又可略與輒採同志之議敬述世系爵里出處言論與夫學問道德行業人之所共知者而又私竊以道統之著者終之以俟知德者考焉謹狀嘉定十四年正月日門人奉議郎主管毫州明道宫黃幹狀行狀之作非得巳也懼先生之道不明而後世傳之者訛也追思平日之聞見參以敘述奠誄之文定為草藁以諗同志反覆詰難一言之善不敢不從然亦有參之鄙意而不敢盡從者不可以無辨也有謂言貴含蓄不可太露文貴簡古不可太繁者夫工於為文者固能使之隱而顯簡而明是非愚陋所能及也顧恐名曰含蓄而未免於晦昧名曰簡古而未免於艱澀反不若詳書其事之為明白也又有謂年月不必盡記辭受不必盡書者先生之用舍去就實關世道之隆替後學之楷式年月必記所以著世變辭受必書所以明世教狀先生之行又豈可以常人比常體論哉又有謂告上之語失之太直記人之過失之太訐者責難陳善事君之大義人主能容於前而臣子反欲隱於後先生敢陳於當世而學者反欲諱於將來乎人之有過或具之獄案或見之章奏天下後世所共知而欲沒之可乎又有謂奏疏之文紀述太繁申請之事細微必録似非行狀之體者古人得君行道有事實可紀則奏疏可以不述先生進不得用於世其所可見者特其言論之間乃其規模之素則言與行豈有異耶事雖微細處得其道則人受其利一失其道則人受其害先生理明義精故雖細故區處條畫無不當於人心者則巨與細亦豈有異耶其可辨者如此則其尤淺陋者不必辨也至於流俗之論則又以為前輩不必深抑異學不必力排稱述之辭似失之過者孔門諸賢至謂孔子賢於堯舜豈以抑堯舜為嫌乎孟子闢楊墨而比之禽獸衛道豈可以不嚴乎夫子嘗曰莫我知也夫又曰知德者鮮矣甚矣聖賢之難知也知不知不足為先生損益然使聖賢之道不明異端之説滋熾是則愚之所懼而不容於不辨也故嘗太息而為之言曰是未易以口舌爭百年論定然後知愚言之為可信遂書其語以俟後之君子幹謹書勉齋集卷三十六
