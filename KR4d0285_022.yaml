body:
  text: 勉齋集卷二十二宋黃幹撰題跋書蔡西山家書幹始受學於晦菴先生首識西山蔡公先生之門從遊者多矣公之來先生必留數日往往通夕對牀不暇寢從先生遊者歸必過公之家聽其言論不忍去去皆充然有所得也蓋公負英邁之氣藴該洽之學智極乎道德性命之原行謹乎家庭唯諾之際於先生之門可謂傑然者矣幹之識公為最久而荷公之教為最深其卜居乎此也固惟先生是依亦庶幾資公之教以自老公既不容於世以死而先生亦相繼而殁幹又將疇依耶嗚呼吾先生者固纍千百年不可復見若公者亦豈世之所常有耶今年春先生以書一通授幹咨嗟太息者久之曰此季通與其子書也子為我掇其要語繕寫以來未及反命而先生殁因書其左方歸公之子使藏之以致其悲慕之意云代書晦菴先生四齋針晦菴先生以紹興癸酉主簿兹邑時年二十有二也其拳拳於學校之教悉矣而又為此銘而以誨學者欲其目之所睹耳之所聞無適而非義理之歸今師恕趙君鋟板縣庠且慮傳本之多無以取信後來因屬幹記之嗚呼先生不復見矣所恃以明善誠身者不過文字之間是豈可以不謹其所傳哉遂敬為之揮涕書此嘉定辛酉十有一日朔旦門人長樂黃幹敬書跋三衢毛氏增韻書六藝之一諧聲六書之一也字書音韻之學其來尚矣古者教人八嵗入小學教之以六藝十有五嵗而後大學之教行焉夫必先之以小學而習之以七年者蓋其切於日用之實不若是無以博其識養其心而為進德之基其騖髙者既忽之而不習徇卑者又與大學而併廢之不惟不習而反笑人之習則其不如古也宜哉覽毛公之所述為之三太息云開禧乙丑二月五日長樂黃幹書於石門酒庫跋方耕道書余嘗聞方耕道為南軒先生之客有遺憾焉及聞李君子謂之語具道一時相與之意然後知傳者之妄也子謂出示耕道手書敬服其論議攻非之益耕道以直道事南軒而南軒能容之子謂又以是友耕道而耕道敬之又如此賓主規諫之難久矣豈其遇合自有時耶余為之三復而三太息云開禧丁卯春社長樂黃幹書書晦菴先生所書損益大象損益之義大矣聖人獨有取於懲忿窒欲遷善改過何哉正心修身者學問之大端而齊家治國平天下之本也古之學者無一念不在身心之中後之學者無一念不在身心之外此賢愚所由分而聖人之所為深戒也晦菴先生二象以授學徒江君孚先所警於後學者至矣孚先以示其同學黃幹三復敬玩刻之臨川縣學以勉同志庶亦知所以自警哉嘉定己巳莫春望日敬書跋樂安曾一菴嵗月記觀一菴曾君自處於生死之際亦可謂達矣哉一菴家資纍千金子四人好學守家法無所纍於中而然也世之貴富安逸過一菴者何限至老愈叨死且不瞑者皆是一菴非達耶一菴能超然於生死至語諸子猶以不能光大門户為恨抑豈未能忘情於窮達耶其曰醇謹勤儉讀書則是求諸已而已曷嘗以搖尾乞憐如墦間之徒為能光且大哉一菴達者也余年六十有一一區之宅一囊之粟以自給尚趦趄俯首入銓曹讀曾君之記誠有愧矣因書其後以諗其子使毋忘乃翁之訓而亦以自厲云嘉定壬申二月既望勉齋黃幹書於武林旅舍跋西山徐介甫手澤此西山徐君子手澤也余不及識君而識君之壻胡伯量與其子烜觀君之擇壻與其教子則其人之賢猶可想而知也曾子所謂其言也善者其此之謂與嘉定壬申長至長樂黃幹書於新淦縣無訟堂書襲夢錫所編晦菴先生語録襲兄夢錫所編朱先生語録字字皆格言也學者所當留意焉雖然言之於口不若會之於心者其旨深玩之於書不若體之於身者其理實熟味衣錦尚絅之章與夫默而識之之語則於是書也庶乎其有得矣嘉定癸酉七月望日門人黃幹敬書於臨川寓舍跋南康胡氏鄉約南康胡伯量以鄉約示其友黃幹讀巳而嘆曰此鄉飲酒遺意也古之人於其鄉黨平居則相友相助有急則相救相賙其情誼之厚如此故其暇日相與為飲酒之禮以致其繾綣之情而因以寓其尊長卑幼之序如是風俗安得而不厚哉後世禮教不明人欲滋熾利害相攻情偽相勝一室之內父子兄弟乖爭陵犯者多矣而况於鄉鄰乎風俗之不如古亦宜矣哉伯量兄弟孝友同居爨人無間言又能推其施之家者而達之鄉其有補於風教大矣故書其後以諗其鄉人使知其合於古誼相與守之而勿替云嘉定乙亥四月晦日書於鳯山書院書晦菴先生語録晦菴朱先生所與門人問答門人退而私竊記之先生殁其書始出記録之語未必盡得其本旨而更相傳寫又多失其本真甚或輒自刪改雜亂訛舛幾不可讀李君道傳貫之自蜀來仕於朝博求先生之遺書與之遊者亦樂為之搜訪多得記録者之初本其後出守儀真持庾節於池陽又與葉賀孫潘時舉諸嘗從遊於先生之門者互相讐校重復者削之訛繆者正之有别録者有不必録者隨其所得為卷帙次第凡幾家繼此有得者又將以附於後特以備散失廣其傳耳先生之著書多矣教人求道入德之方備矣師生函丈間往復詰難其辨愈詳其義愈精讀之竦然如侍燕間承謦咳也後之學者誠能齋心而玩之歷千載而如會一堂合衆聞而悉歸一已是書之傳豈小補哉貫之既以鋟諸木以幹與聞次輯而俾述其意云嘉定乙亥十月朔旦門人黃幹謹書書東萊吕先生寄李文簡手帖侍郎李公以東萊先生手帖示幹既獲竊窺兩賢相與之意而所稱引莫非當世巨儒所講論莫非古先典訓何其盛哉今其人既不復見而其言亦不復聞豈亦氣數消長驟盛者固忽衰與吾輩盍思所以自勉哉為之三復太息云嘉定乙亥長至後一日後學黃幹敬書於鳯山書院書晦菴先生家禮昔者聞諸先師曰禮者天理之節文人事之儀則也蓋自天髙而地下萬物散殊禮之制已存乎其中矣於五行則為火於四序則為夏於四德則為亨莫非天理之自然而不可易人稟五常之性以生則禮之體始具於有生之初形而為恭敬辭遜著而為威儀度數則又皆人事之當然而不容巳也聖人因人情而制禮既本於天理之正隆古之世習俗醇厚亦安行於是理之中世降俗末人心邪僻天理堙晦於是始以禮為強世之具矣先儒取其施於家者著為一家之書為斯世慮至切也晦菴朱先生以其本末詳略猶有可疑斟酌損益更為家禮務從本實以惠後學蓋以天理不可一日而不存則是禮亦不可一日而或缺也先生教人自格物致知誠意正心以修其身皆所以正人心復天理也則禮其可緩與逮其晚年討論家鄉侯國王朝之禮以復三代之墜典未及脫藁而先生殁矣此百世之遺恨也則是書已就而切於人倫日用之常學者其可不盡心與趙君師恕之宰餘杭也乃取是書鋟諸木以廣傳蓋有意乎武城弦歌之遺事學者得是書而習之又於先生所以教人者深致意焉然後知是書之作無非天理之自然人事之當然而不可一日缺也見之明信之篤守之固禮教之行庶乎有望矣嘉定丙子夏至門人黃幹敬書跋陳履道先墳庵額大字幹嘗受學於晦菴先生其所教人以孝弟為人道之大端已而辱在子壻行家庭享祀丘墓展省皆得與執事之列齋戒陳設滌濯烹飪皆曲盡其誠敬奉觴薦爼追慕感慨泣涕如雨三十年間如一日焉凱風寒泉之思蓋天資之美學力之到有以充其良知良能以至此也孝於親而望於人陳公菴額之所為書也履道既能成其先大夫之志復以墨本為軸朝夕展玩如適丘壟而撫松楸悽愴之情自有不能已者故述余之所見以明先生之為此書履道之寶此書不但字畫之工而巳嘉定丙子六月既望長樂黃幹敬書於竹林精舍跋陳履道辨誣卷大書以揚其親之美力辨以不忍其親之見誣皆子孫愛親之美也然貴顯而賙其族亦人道之當然徽猷公既貴矣斥其母子宿昔無聊之狀亦非書法之所宜使其概嘗有聞焉書其事而諱其名斯可也然徽猷公之所成就自其器識之過人假使真如所言其志氣亦豈少衰哉賙不賙正不足為公之輕重則不必辨焉亦可也祖考之望其子孫子孫之孝其祖考固有在矣諸陳為建陽大族皆好學守家法則所以顯其親者豈在於大書而力辨耶辨謗之作所謂家事非外人所宜與然幹以寓居介於諸陳之間則亦里人也為里人而平其爭誼也故為之書嘉定丙子六月既望里人黃幹書於竹林精舍跋陳履道蒸嘗田約嘉定丙子六月既望陳履道訪余於竹林精舍出示其先墳庵額墓志辨誣蒸嘗田約三卷無非孝愛其親之意而田約深逺矣可謂篤於人道之大端者也獺祭魚豺祭獸豺獺之祭非有所戒約而預為之備也禽獸微物而知奉其先况於人乎為物之靈而忘其追逺之念曾禽獸之不若也况於為人戒備者如此而忍忘之乎風俗之薄甚矣不但誶語德色之可畏也視其親如仇讐如路人者有之孩提之童不學而能者安在哉顧我復我出入腹我而且若此况敢望其追念數十世之丘墓乎此履道之所為諄諄也讀其約為之三太息而書之以為世戒長樂黃幹書書龜山楊先生家書龜山先生晚年家書也其精明詳審如此非道學之力歟幹蚤從晦菴先生遊因得講聞先生之道中年遊宦學業遂廢嵗月蹉跎老及之矣引疾來歸願畢此志師亡友散獨抱遺編先生之孫浚攜書來訪三復起敬竊書其後以致慨慕之意云嘉定丙子九月五日後學黃幹敬書書新淦郭氏敘譜堂記人稟天地生物之心以為心凡在覆載之內者皆所當愛也况族系之所自出雖枝分派别推而上之皆吾祖宗之一氣耳可不知所愛乎不知所愛則上負於天地下愧於祖宗矣新淦郭氏之於族人也既買田以給之又為堂以聚之蓋知此義矣即此義而充之知此心之無不遍知此理之無不同則將合覆載而為一堂也豈不大哉豫嘗為邑於新淦而聖與嘗問學於豫聞其事而嘉其志為是説以廣之嘉定丁丑長至定菴黃幹書書陳密學守城録密學陳公之守城殆天下才非可學而能也然得其書熟玩焉觸類而通之亦豈不可學哉顧嘗以為守城者郡守僚屬之責也今之仕者二三年輒一易偶當暇間於是書固不屑讀倉卒擾攘則亦不暇讀矣若使邦人皆取是書而讀之父子兄弟庠序里閭平居暇日相與講説則凡在城之內者無非可與守城之人也况又切於其身之利害則考之必精思之必審其為郡守僚屬之助多矣豫既與同官寓公士友合謀併力以成安慶版築之役因以是書屬郡文學金淵刋之學官寓公士友凡邦人之欲得是書者悉以遺之合一郡之見守一郡之城當有得陳公之意於是書之外者矣凡為郡而欲得是書以遺其邦人者又將以廣其傳焉則凡有城者皆可守尚何外侮之足患哉嘉定戊寅二月既望長樂黃幹書書龜山楊先生帖此靖康元年書也公年七十有四矣敵退圍解痛哭流涕以防後患諫大夫責也言不見聽則浩然以歸亦足以明勢之誠可憂也上下偷安方以和為可恃獨何歟為之三復太息云嘉定已卯七月二十三日黃幹謹書書趙華文行狀幹少從晦菴先生遊竊聞篤行公之名攬其遺事俯仰敬嘆如對古人後十餘嵗遂獲與仲兄偕受知於丞相忠定公竊窺言論設施之大槩華文方以少年擢髙科館於劉忠肅公之家而受業於晦菴先生之門遂與為友焉其後從宦江西纍纍相遇則華文涉歷愈深年愈髙而德愈劭也投老來歸聞華文之子總幹君宰崇安有惠政人多稱之五十年間及見其一家四世之賢如此雖其事業所至有不同而其人之賢則皆處心以忠實持身以端謹居家以孝友施之政者真知體國愛民者也何其盛哉丙寅丁卯間幹方以事走京師及見權姦薰焰忠良被禍殆若天道冥漠不可曉者及今觀之鄙夫憸人根株鋤戮聞其名者不啻若犬彘而篤行公之後赫奕盛大至於如此所謂福善禍淫者豈不灼然可監也哉讀李君敬子所述華文之行實而敬題其後為善者當知所勸而不善者亦當知所戒矣嘉定庚辰十二月二十五日長樂黃幹書勉齋集卷二十二
