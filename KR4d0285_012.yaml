body:
  text: 勉齊集卷十二宋黃幹撰書復吳勝之湖北運判柔勝幹伏拜台翰之賜捧讀不勝感悚但因執事有間不敢數以吏牘干犯威嚴特於台候起處之詳及施行條教無非為國為民實政不勝敬嘆伏候台翰曹運幹所傳聞其事或亦誠有之但不専為使臺攔客舟而行是事椎魯無能之人自其少年已絶科舉矢志學道僻識寡諧賦性狷狹與物多忤每竊自念朴拙周旋斯世動輒齟齬孰若窮耕田野與世相隔絶為樂乎偶得一官浮湛寸祿聊以自活兼得養老回顧初心終日凜然如負芒刺直以君相之恩不敢不為此來但俟半考即上祠祿之請此語自都運寺丞􅋈舟敝郡亦嘗及之矣至五月半即半考數日來逐委一二同官先期相迓新所用之金令項樁管置辦從物庶幾解印而去見管之錢皆是實數耳此或者所以傳其有浩然之興也然幹也官先師之官學先師之學先師平日去就之義皎然今衰老如此而不知退是受其官而忘其教也於我安乎此浩然之意亦誠非妄傳亦非全為攔米而然也攔米一事使臺施行委缺商量特不欲有請耳米舟不之鄂渚而之漢陽漢陽小郡下情易通客旅之詞訴易逹官吏有所抑勒牙儈有所邀阻可以徑逹於太守之庭鄂州太府則反是治其源流斯知矣今散遣官吏勒客舟之米不得之漢陽而之鄂州如此則漢陽之百姓不𨽻於湖北而為化外之民矣在鄂州行之則可在使臺行之恐非公視一路之意在他人行之則可在都運寺丞行之則恐未免或者之議假令漢陽郡之官吏於金口攔鄂州米可乎况名為攔米而實為攔稅本為鄂州而託之使臺情狀曉然前所云翁大人不疑人欺我耳今台翰以為未必然天下事不知當論理耶當論例耶朝㫖嘗有中流為界不得視為具文捨朝㫖而用舊例非所以示訓也鄂州之與漢陽無嵗不爭似此施行鄂州為直乎漢陽即非直乎監司平兩郡之直者也而又啓之可乎中流為界久矣所不請者不必請也昔者夫子問禮老聃門下所向不合老聃氏退然與物無競夫子嘆云吾今日見老子其猶龍耶幹嘗請事斯語及與物接察言觀色苟有不合則望鞭影而急去不敢競也州郡財賦粗足可矣政不必多求積貯漢陽軍置錢監常嵗附鑄二萬緡以助軍用其先所謂一萬緡其後監官每以此邀州郡之舉若不如其請則多方沮抑自幹到此覺其如此惟緘口不言附鑄漢陽軍無萬緡錢將不為漢陽乎便通濟米舟悉為鄂州所據則漢陽軍亦不至於不為郡也况又既不為久留之計又不必爭可否實是衰瘁不惟無富貴之念實無功業之想無家可歸無田可耕判作餓死何向不可蓋此計已決不但為攔客舟而然也後月之望未免遍以公狀申諸臺乞為備申丐歸田里更望都運寺丞力賜扶持千萬幸甚曹簡夫得書旦夕即到此豪傑之士紛然而起國勢益强外患自弭衰病無能之人得以止足山樊歌詠大德以終餘年莫大之幸也築城一事戎司終不以為然幹之所以建此議者亦是戎司壕塞路炳者相與熟謀之初非出於已意今所差來人堅以為不可築則以今日之亢旱如此自非興工之日又米價頓長一倍則築城之人糧食之費皆倍於前日矣以此思之不若已之為愈曹幹亦深以為然翌日具狀申兩司也昨承不鄙訪以救荒之策幹於都運寺丞豈敢不用其情今早見制司行下一劄仍答使司所申者其說甚堅然在彼之責亦只得如此以幹觀之此事亦不甚難只覺幕府無人商議耳都運寺丞只得端居深念或更於一路之內檄一二有心力人相與商議事無不可為者不然則以彼淺近之智而經理天地之變未見其有濟也幹適與曹丈說制司便不放米出界吾豈得不差人密行收糴使司選委人物任以此事諸郡誰不聽命耶制司既所執如此之堅使司只得申朝廷乞於湖南江西豐熟州郡撥樁積米應副鄂州以時價給還之此無不可者以都運寺丞之事權而又為廟堂所倚重苟有所請當無不從也大抵此等事要處之有道有毫髮不到便能生弊官吏之不任責此大可慮者也曹運之所為本軍不當分彼此蓋鄂州米價原不同於漢陽商旅皆有捨西而東之意苟不通融和糴竊恐漢陽之商旅死於溝壑亦不少矣漢陽兩邑一郡共二十萬家凡大郡者不得不為之深思逺慮今差官而攔米是棄薄之也第恐米舟經稅之後則越踰他界如此只得多遣舟船於漢口以上守等可也此皆幹之區區拙謀未知於事體有當否也王介甫云善謀家者資於國善謀國者資之天下善謀天下者資之於百姓幹思之莫若急遣人於江西湖南收糴以待都運寺丞尚疑此郡有彼此之分則乞令張道過此熟與之議必有至當之論做官最是大官不可為既隔下情又不能不資於同官所謂同官者類皆不足與謀此事之所以難濟也台諭所謂米舟不至乃州縣迎合制司或因以為利此說恐未然幹每謂使都運寺丞守德安將禁米乎將不禁米乎禁米則違上司之命不禁米則害百姓二者孰緩孰急幹但聞德安復州亦已狼狽饑民嗷嗷矣今乃専欲咎之恐未安也古人言遏糴之禁謂此凶而彼豐今數州俱為旱歉而可咎之乎况通融雖是美事然處之有道可也古人告糴如晉告而秦輸乃官司散遣人糴可也官司自糴則所糴有限量又安所用而告焉今欲聽客旅之自販則所販有限量而又或適他郡或俟價髙不惟為彼方之害而亦為吾郡之害也如雲夢孝感自有水路徑趨淮西不經漢陽官司莫之覺也李貫之提舉書云江東一路自問朝廷乞得米三十萬石又有常平米三十萬石又自糴得十萬石以一路而有七十萬石之米何饑歉之足憂今不廣圖之而日夜歸咎於凶荒之數郡以吾為部使者而汲汲然為鄂州而治也郡米既不至而徒傷吾公平廣大之意豈亦未之思耶幹嘗謂為監司郡守與作縣不同作縣是親民最緊底處每事可以立見底藴郡守則已隔一重監司則又隔兩重監司郡守之於人戶詞訴但當只令索案或且令具因依申然後徐察其詞之是非而處之今若憑一紙狀詞便為施行鮮不十事而九失者不可不察也本軍糴米或加五六價錢低於市價亦誠有之而實有不說本軍市井有三樣斛有文思院斛此官省斛也有黃池斛客人所常用也有打買斛軍學所置客旅交易必請此斛官收斛錢以養士也打買斛者兩斛三斗為一石五斗文思院斛公私交易皆通用者故人以為甚便也價錢反低於市價今以諸斛通論之客人糴米五碩五斗為正價若以價錢論之已糶七百八十㑹子矣豈得以其反低於市價而病之乎且市價起於何人不出於民不出於官而出於牟利之商賈今日一貫明日二貫又明日三貫市之牙儈從而和之此細民所以受病也而可從之乎官司為之約度使商賈獲倍稱以上之息而不到於橫為無限之求官司依所糴之價而糴與百姓則商與民俱無害矣客人哽噎而不能言非畏官府也是亦自知其不可也若其冥頑嗜利幸災樂禍以負吾民者又何足多恤哉故曰小仁者大仁之賊也是豈不可察哉諸葛孔明之治國以大德不以小惠大丈夫行事磊磊落落正當如是也築城事只當如此知其事之可為而不以告不忠也知其時之未可為而不以告者亦不忠也所謂恐或者得以議論此一句最關利害吾人處事但當自信不必隨人恐其議論而曲意以從之可乎其亦不敢說不為但說須是有錢有米耳况幹之去意巳決不敢承當此事世事難言都運寺丞天下之所謂正人端士更幸日親天下之賢者以講明義理之正毋徒曰資質可恃事業可致以道理自居卒陷於功利而不自知也世間最緊要事甚不多為聖為賢為堯舜為湯武為伊為周皆從此出若捨卻這些子緊要處而論功業便教做出漢髙祖唐太宗蕭曹房杜亦何足道哉若於此曉解世間利祿真是糞壤世間事業真是太空一㸃浮翳也何足把玩哉幹之所以急欲歸山者老先生傳授一粒金丹亦欲歸去靜坐服食庶幾老死可以見先師於地下而無愧也若浮湛世間為庸人所軒輊以求區區之名利是猶持千金之璧以易一瓦缶非所願也承聞使節欲以㸃船絶江儻得伏謁以承誨論何幸如之以都運寺丞知遇之厚不自知其言之狂且僭也辭知潮州復鄭知院幹辱朝廷之知遇恩寵至深至厚拔擢超躐皆出望外自知衰老甘自退藏豈期軫念下逮枯朽便當疾趨豈宜遜避竊念幹處世多艱氣血衰瘁自臨川得痰喘之疾今已十年矣忽於今夏五月之間結為痞塊卧則沈伏行則膨腹一日之中半在牀褥起居百無聊亦自知此身旦暮不保已治丘壟誅茅其間方將移居以便藏骨豈敢復有意於仕宦哉若勉强就道不過中途立見踣斃此決不可以不辭者近者習俗偷薄逐利忘義祖先墳墓有纍年不拜掃者家君察院草葬於水泉沙礫之中家兄知縣之所藏亦為螻蟻所食諸孫中無一人自立者方日夜為之經營庶年嵗間畢此二事今若捨之而去則存之與歿抱恨無窮門戶單微始祖墳墓亦為强宗所侵銜寃抱痛無路自訴若不為之經理則數年之後不可復任矣此皆至痛至切而不容捨者家兄見存者年七十有五飢窮至骨向來從宦分俸以養今雖家居亦得察其有無共其乏困今挈之以行固不可舍之而别亦不安諸姪飢寒亦費區處此亦皆人道之所不容已者又有難以告人者幹年方及冠從遊於朱文公之間其所以撫存而卵翼之者不啻已子其所以然者非有他故也以幹從學之久庶幾粗得其立言垂世之大意可以與後進之有志者相與訂正以垂之將來庶不至微言之絶而大意之乖是則文公相與之大意如是耳幹又何足以辱其知遇之厚哉二十年來厯宦為貧舊學日廢每一念之如負芒刺奉祠以來方得與朋友數人日夜討論漸成保社方深恨向者告歸之不早若復既歸而又出則安得面目復見文公於地下耶此則人心之事所至痛者而不敢以告人也幹家世雖貧素守詩禮自幹一從祿仕困於朱墨子姪輩氣習漸異前人非彼之不可教此既不暇教之而游玩紛華之習反有以害之也兩年家居一守儒素方覺氣習漸變今豈宜啓之以故態耶人之仰祿為子孫耳今既壞其心志則雖多藏以遺之是適所以資其愚不肖也此又憂深思逺之不容不然者閣下試以是數者而思之則幹今日之或出或處斷可識矣仰恃閣下之眷憐故敢布露心腹無非由中之言實無片辭矯飾非若世俗之虛為禮辭者欲望鈞慈特賜寢免幹憔悴無聊疾病轉劇前幅所陳無非實狀仰䝉某官委曲誨諭進退出處之語無非至論可謂曲盡但幹今日之事非能仕不欲乃欲仕不能惟有哀鳴造化乞此一日之命正終丘園則千萬幸甚更望力賜重言於二府庶得微誠洞逹早遂卑請若再得祠祿一任則兩年之中一室孥纍俱獲溫飽他非所敢望也幹兩月無祠祿便覺丐貸費力望閣下早賜垂念給與祠請以救此涸轍之困幸甚別紙所示幹久留山間投閒養病遂用劄子實封遣人繳逹之亦未得回報幹極為其所知然自到任亦只得兩三次隨衆謁見以其情性有未易以常情測度者故亦不敢有言想閣下備知其詳若常常開諭以成其美亦鄉邦之幸也近䝉其以鄉中士友相問幹偶有一館客亦自知其賢遂枉騎訪之徑補以學職其人感之遂上諫書極言其失里人皆云自此漸覺和平彼自精明苟知其過亦不憚改也幹伏自昨者敬伸不得巳之禱朝夕凛凛以俟方命之誅公朝眷憐俯從卑欲既脫州麾之責以叨祠廩之優於老且貧莫便於此且䝉鈞翰曲賜撫存化工生物之仁委曲懇到乃如此舉室感激未易名言惟是奇蹇之迹入春以來無日不病日夜思治尺箋以致二府之謝自念不敢以吏書為禮而氣疾所梗莫難於據案以是至今未能畢緘府吏踵門忽復叨真翰之賜跪誦三復大非衰賤所宜䝉至於憂勤宗社之意出處去就之宜當功業之方興而動婆娑緑野之念屈公相之尊而下友於山林之棄人盛德謙光可為世法百拜十襲以為子孫無窮之榮幹莫年多病百念灰冷儻得未就溝壑則溫尋故書以祈寡過向非朝廷大恩畀以祠廩則今已不免為溝中瘠矣然亦有未能不過慮者祠祿正以補田租之闕則可以卒嵗而無飢入春已兩月種不入土並海之田鹹潮浸灌今雖得雨亦已無及近城之田皆不可耕山邑泉源霑足之田亦皆枯涸更旬月不雨則嵗事已矣豈敢復望田租之入哉但聞旱勢頗廣則一家一身之利害不敢計也以公相燮調之力而以感召和氣變災為祥者反覆手耳此特草野之過慮也或以一春無不雨之理然幹昨守漢陽郡自正月不雨以至九月飢民流離纍纍滿道傷弓之餘故誠不能不過慮耳幹老病日加終日塊坐舉動頗艱生平不避勞苦晚嵗自應如此重䝉閣下軫念帷蓋之舊特有珍劑之賜雄附五十隻鍾乳十貼其品格氣味皆非人間所常有者寶藏服食苟活一旦之命無非大造更生之賜也専使之回輒扶病敬布謝悃窮居不能端謹伏乞鈞亮辭再知安慶府在知潮州前幹一介庸賤無足比數䝉足下之顧遇拔擢超躐家故窮空孥纍猥衆筮仕十有五年皆得食租衣稅不至流離餓殍毫髮皆閣下之恩也雖身膏草野亦不足以言報今至於復其舊職乃有辭而不就者畏清議避機穽也畀以列郡而不受豫之藩府而受之此豈能免當世之譏議况其所至動與物忤非閣下之芘護已不復有今日矣况敢自蹈於不知亷恥之地哉築城所以保民也建議之初已譁然而見攻矣及其速成則曰是必勞民也及其費省則曰是必擾民也元僚之辟制府之請也五關之守禦浮光之督戰制府之命也未及行而嫉之者至矣眇然庸儒何足以知天下之大計乃創為之說曰是道學之徒喜言大義談恢復者也守土之臣去制府五六百里邊郵之事未嘗與聞一或失宜則曰是嘗與謀也軍旅之際征役繁興民不堪命少陳利害則曰是素喜爭也東羅西網一舉足且蹈其中憂畏憤悶殆無容身之所正使無厯陽之除亦當哀鳴造化以求避况今嫌隙已開豈敢冒犯清議試身於不測之禍哉倅安豐則得罪於太守守漢陽則得罪於監司今怨咎滋起復有其兆矣是皆禀資狷狹賦分奇窮有以取之也幹開禧年中從事荆南幕府往來入關備厯險阻因得嘔血之疾目今痼疾復發加以痰喘不可支吾儻䝉鈞慈特賜憐憫投畀山林自同麋鹿之逰以涵泳聖化於寂寞之濵生死肉骨之恩沒齒不敢忘也不然政恐異日議論橫生雖閣下愛念之深亦恐不能以芘之也復林正卿竊觀所論作易大㫖本於隂陽錯綜而成者大意甚善其所與本義之㫖不同而先生以為不信其大者亦不過兩端而已先生則以易之作本為卜筮而夫子釋之以垂教老兄則以易之作本為垂教而伏羲文王借之以卜筮此其㫖若非有大異者然如老兄之說則恐於作易本意及易書本文皆不能無失亦不得為小誤也竊嘗思老兄之意蓋以天地露許多機緘做出一箇圖書聖人用許多工夫看得一箇義理今郤别無用處只將來作卜筮用了故必欲將作垂教之書而卜筮特其一事卻不知聖人於圖書之妙義理之原心通默識則凡其見於日用之間施設之際固無適而非是理之歸亦曷嘗棄之以為他皆無用而専以卜筮耶至於一部易書則原其本意卻只為教卜筮而作耳蓋卜筮自非小事吉凶生大業者蓋出於此况上古之世民淳俗質誨以義理亦未必深曉使之一舉一動皆取決於卜筮則事弗非而民弗疑而教人之意又未嘗不行乎其中則卜筮亦豈小事也哉今必以為教人之書則非為卜筮也亦甚矣况易書之文所謂利所謂勿用所謂吉凶所謂悔吝者其文皆主於卜筮而發所謂畜牝牛田獲三品之類又於設教之意亦且迂逺而難明聖人著書垂教本以開示後世使人易曉又何苦為是艱深難測之辭以眩人觀聽哉今乃捨是不言而専指師比最分曉之卦以為設教之書則執一而不通矣若作卜筮看則所以如此則吉所以如此則凶者非義理之所寓而未嘗不可以為教必以為非為筮卜則於作易之㫖易書之文皆有所不通幹之所謂亦非小誤者此也大抵吾友天資清徑讀書不能平心以觀故其失至於如此試更思之為佳鬼神之說大槩得之而更有未盡者偶收在家中遇於公行不及取以奉答悉俟令姪歸報去也有可垂教毋惜往復今以文王周公之辭為卜筮分曉故又欲以伏羲之易不為卜筮及文王周公借是以為卜筮則亦自覺其說之不通矣自覺其不通而不肯捨遂欲將伏羲孔子作一樣說文王作一樣說孔子於文王周公卜筮之中闡而為垂教之義乃是有功於易文王周公乃於伏羲垂教之義抑而為卜筮之用則是得罪於伏羲大矣卜筮既為不切之具而文王周公乃用一生工夫壞卻伏羲一部義理是何不知不仁之甚耶如此則孔子便當削文王周公之書而專使伏羲之意又乃祖文王周公之後為人注解不切之書何耶此其說不通之甚者也與潘謙之幹此間糧食雖已竭而治生粗有倫理朋友相聚人之多寡不必論但得臭味相似庶幾交相切磋以張吾道耳今所賃屋不知何地人少則東山桑溪小寺中亦可以為終嵗之聚也若得蚤定庶歸來便得讀書為佳嵗月易度若非閏月則春已莫矣契兄昆仲及成叔兄弟能偕來否先生衰病氣滿筋攣然修書誨人之意未嘗頃刻忘也吾輩可謂懶惰之甚者當相與努力以副其所期也今嵗之集更須倍加功以補此空閒之月乃佳鄙意欲每日相聚共看經史文集不以長少各立程課庶一日有一日之益不至虛辱朋友之意尊兄更為熟思法度見教幹十二日登舟十七日早已抵家朋友相候之久重以為愧生平僻執誤事如此可以為戒也縣學極齊整又日瞻先聖以為依歸莫大之幸不知尊友能一來相聚旬月否兩月得侍先生誨論方悟向來學問差處尤欲與朋友共正之齊中規矩只得十分嚴整不然誤人子弟罪有所歸也草一日入學草二日便略與諸友擬試俟補試後諸友齊集鳩金買牲舍菜於先聖遂講光齊之禮初一日即立定規繩讀大略如此恐吾兄欲知之也尊兄久寓京城朋友相信向亦不妨講學又得賢主人亦無入而不自得也富貴說甚平正然卻不如書中所說之痛快也蓋說中大抵是歸之於命其意以為可曉愚人然人心蠧壞至此極矣如三十年痼疾非一二服平胃散所能療孟子作乞兒斥罵以樂正子之賢尚有餔啜之譏則其他可知義利上須是先見得分明方不至拖泥帶水也此中絶難得朋友講學巳約蔡伯靜數十朋友為季集一年亦得四次相見各述所見以相質正庶幾不至寂寥之甚但亦未有成說耳幹近在甘泉因與林正卿講及一貫忠恕一章見其所說毫釐之差而於古人之意全不相似乃知吾人講學不可不與朋友共之以此欲與兄款聚之意甚切計八月間彼中諸事已畢千萬撥置為我一來但至此不能走見反欲坐致從者為愧已甚計兄亦必不我怪也幹嘗謂天地之間無獨必有對以天言之則貧對富貴對賤窮對通泰對否以人言之則出對處進對退隱對見仕對止古之人惟義所在隨遇而安未嘗有所擇也比年以來士大夫風俗只揀一邊好底都不要一邊不好底於已則利矣其如義何此風一長望其舍生取義殺身成仁決無此理况出處去就雖是相對然去與處乃其常出與就又是偶然之變今乃以變為常以常為大不幸殊不可曉至於利害之際則留連眷戀而不肯舍至於可恥可賤發於羞惡之本心者一切不問此又豈易與俗人言哉安得一見相與劇論哉答潘謙之幹碌碌逺宦無足言者極邊重地守二之間意見不協朝廷寬恩姑令易地初亦欲乘此丐歸而臺論又為之辨白不欲激抗黽勉就職已於五月四日交賤事要之在已無以取信於世又不能阿邑求售賢者不度事勢力相推挽反以取當路者之賤薄朝夕念歸然一覺於義可以少留則又且浮湛為仰祿計耳行年六十有三矣每思師友之訓令人惕然以慙也尊兄今嵗安寓或云留興化果否陳安溪已除六院能與之偕來亦佳此間相去不逺又可以相見也鄭子立相見否鄉間朋友難得得其意向如此肯與吾人相親又才氣亦非常流吾人只得扶持之彼既多與世不合吾人又疏逺之恐非所宜也幹蹤跡想不知其詳此間初自不合來以朝廷拔擢不敢辭到此百怪皆有真不成世界以虎狼之暴盜賊之狡而當方面之寄視百姓如草菅視僚屬如奴𨽻此豈可入其境哉初亦自理郡事不復相關適以大旱渠自與吳漕為敵始則相抗而遣卒數十人入本軍之境攔截米船不得過武昌既而吳聞之朝廷又欲奪本軍之米以媚武昌其行遣之間可怪可笑初亦以吳為賢且得相依吳又不曉事使客氣漸以相及只得引疾丐祠以歸數郡大旱監司無一人問及餓死不可勝數更不堪者眼數百人為羣上人家丐米丐者奪之異名也又只得捕而戮之是何世界如此幹幸而力抗兩司糴得米四五萬石以賑糶所活者萬家他皆不暇恤也自此且得歸家讀書教子不能在世間與此等異彚為伍也有傳師復監簿論對之章見之者三復敬嘆使臣子之鯁切皆如此國其有不興乎煩為致意甚恨相見之晚也適方得孫行之書感感此間只俟省劄下或代者至皆可便行要不出此月也相識皆煩致意既為閒人亦不敢作朝士書也到家亦便欲歸福州省墳墓親戚家兄年老多病諸姪貧困流落皆急欲一相見也勉齊集卷十二
