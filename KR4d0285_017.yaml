body:
  text: 勉齋集卷十七宋黃幹撰書十四與陳子華書韡歸來數得欵語但亦彼此忙迫至今懷仰尊丈參議之任已滿未有差除費用既廣何以為策且得曲意奉承為佳幹到此五日即聞浮光之警此亦勢所必至但亦不知如是之速耳今已退矣但吾之所以處此誠未有可恃也安慶無城壁到此便措置邦人甚幸捐助竹木及米者紛然度費六七十萬緡此間所有僅十分之二至感至感幹聞執事之盛名非一日不自意乃得并合深慰生平傾仰之私世道益衰人物零落得一賢者欣然慕之真不啻景星鳯皇也舉世滔滔病在於以古人行事非今人所可為遂甘心沒溺但欲合今人而遂已至於苟賤無恥而得富貴則揚揚自得以為其説之勝百年之間醉生夢死計其所得亦復幾何回視古人行事非難為也因言以求其心即事以求其迹充積涵養斃而後已則亦何事之不可為哉窮通利達自非吾人所當計較况又實有命焉幹不死或歸鄉聽教誨也鄭成叔不及奉書煩致意或以此書呈似之與作書等也浮光一敗雖殺傷相當吾之所失者亦是三千人及一二頭首制帥所用多少俊喜功名豈細事耶復王幼學書伯大幹衰病之蹤不足齒恤去冬臘月祠秩當滿便當上謝事之請偶蒙朝廷記憶畀以州麾自知州郡非養疴之地力辭不獲命君恩深重難以孤其生成之意辭郡丐祠亦以為免死之計幸而得請實出望外原其所自無非遊談之助已三申朝廷無錢米邊事如此決未肯應付只得大膽便做無錢又旋撰應在郡錢米不問已申未申一切事使得罪而去無可奈何秋冬間可畢事邦人便有可恃老夫亦可丐歸矣安慶實無財賦全靠牙契通老丈當軍興之後交易頗多遂頗富實不應以二十萬獻之朝廷至今遂將安慶作富郡科敷抑配百姓受害皆通老為之也到此只得汲汲寬百姓喬漕欲起四萬夫運糧至安豐只得力拒之只免此一役吾地之民已歡舞矣幹自顧生平稟資甚庸涉道甚淺獨以早年侍晦翁杖履之日久聞其言論觀其舉措者差熟投間待盡亦不過以其所聞見者常常諷道之以庶幾不失其初心耳自先師夢奠以來舉世倀倀既莫知其所歸向來從遊之士識見之偏義利之交戰而又自以無聞為恥言論紛然誑惑斯世又有後生好怪之徒敢於立言無復忌憚蓋不待七十子盡殁而大義已乖矣由是私竊懼焉故願得強毅有立趨死不顧利害之人相與出力而維持之抵家兩年門無轍迹去秋乃得盛族一二人象祖與焉不避勞苦刻意講習他亦有一二後生皆可望者私竊自喜以為儻得十數人者講之精行之果皆如干將鏌鋣則立之而足以擁衛吾道使外邪不能犯用之而邪説詖行肝碎膽裂庶幾日月之明猶未至於浮雲之點翳也但身既衰病學又淺陋恐不足以召致而激發之耳尚幸有以教之也復鄒俊甫書幹壬申之夏偶獲邂逅甚慰夙昔鄉仰之懷第以行役匆匆不及欵語而别每思賢德再見亡從徒切悁仰忽辱台翰縷縷尤忍眷豫之意所謂截斷衆流一句乃是吾人立身第一義此處拖泥帶水則其他千言萬語皆是空談但世之不墮在此坑穽中者能幾人哉吾輩但有自勉而已幹老矣無以糊其口尚此竊祿荒陋之邦無可與語安得瞻望誨色慰此拳拳耶便中更幸數賜教藥世道益衰人物可歎區區鄙懷更望益勉所學益勵所守外此亦未有可言者復王主簿便中兩辱書誨感感知遂從提舉李兄遊深以為喜然不喜足下之得為屬乃深喜得親師友講道誼以廣見聞也人之道莫切於學學之道莫切於居敬而窮理舉世昏昏莫知學問之方而世所謂儒者又多虛言以欺人而實自欺仙鄉諸長上為尤甚然亦以此劫取髙官大職而後生為其所惑甚可憐也今乃得與李兄遊又味道亦是鄉人更宜朝夕相親有疑則扣不得不止異日見得端的方知鄙言之不妄也不可只以公事虛度嵗月誠可惜也一旱如此事甚可憂衰晚不才旦夕即上歸休之請若遂所欲或又可拜見也莊生行遣如此之嚴亦去一大姦當塗之幸也復黃會卿幹衰晚如常無足道者更數月則當挂冠矣近思此身不欲為後人之纍去城四十里入深山中得一埋骨之所方遣學生輩葺數椽架小樓樓成即移居其中以待盡耳去鄉井二十年歸來朋友凋零晚輩難與語獨二三朋友來自逺方者差能任道甚矣吾道之益孤一二年來於中庸之旨玩之殊有味此乃子思子於其家學中備見本末源流作為此書盡發聖賢底藴雖非初學所能盡曉而亦初學所不可不知始之以戒懼謹獨次之以智仁勇之三德終之以誠之一字戒懼謹獨不待勉強不假思索只是一念之間此意便在初學豈可不以孜孜奉持則天之所以豫我者便巳渾然在此矣然後加講學力行之功以盡其所謂智仁勇者則理之渾然者又燦然各有著落而無毫釐之差矣於是又進其所謂誠者亦不過講學力行而實用其力焉則天理流行無少間斷矣今但曰講學而不先之以戒謹不終之以力行而誠心不加焉則恐亦未免墮於口耳之習若但曰躬行而智識之不通則恐亦未為得也是則學者之所不可不加之意也試與朋友商確之復黃清卿幹衰病如常無足言者倦遊本圖間靜然亦未免塵俗之擾得觀書策之日亦少朋友往來亦不為無人而知學者亦難得近方謀為山居之計更兩三月當就緒來教深以學者或溺心淺近或馳志髙逺此正今日之通病然自隂陽雜揉氣質萬端自生民以來便巳如此今豈能使之一一皆就塗轍所貴於朋友者正所以針規切磋矯其偏而歸之正不可便生厭惡若以二者為非而别求方法則恐有矯枉過中之病書不可不讀義理不可不求身不可不修心不可不正明誠兩立敬義夾持俯焉孳孳學問之道如此而巳幹深思一出聽朋友之教而無繇且老來力乏亦非可以逺出徒有瞻企而巳復薛希賢書師邵撫州人人心蒙蔽理義難明足下超然獨得雖精微曲折未見所造之淺深而大意已非流輩所可及矣來教云云亦皆非蹈襲語皆自胸中流出良深歎服近嘗論曾氏父子晳也自上達而有所見參也自下學而有所得要之升髙自下陟遐自邇不可以無其序也聖賢門户廣大而精微髙明而中庸得其大旨而毫釐之不審是猶屋外觀屋固見其巍然大矣而門庭堂奧皆莫知其所向則恐未得其所居之安也自門而庭自庭而堂自堂而奧精辨而實履焉則亦不待觀於其外而所謂潭潭翼翼者皆在吾心目步趨之間矣惟足下少抑髙明之見循循學問之實以聖賢不明為已憂毋以吾心所見為已足則朋友之望也里中朋友極難得夢寐未嘗不在靈谷擬峴之間也答余瞻之幹奉親幸安不足勤齒恤杜門間居但定力不足巳不能不為今學所撓平日守定師友尚無向進若又分之以雜學况味可知獨有隨事檢點以庶幾寡過而未能耳西齋親友相聚之樂徒深健羡夏深倘能撥置以尋雪峯之約或可一觀盛集也但自家兄巳赴清湘復不無家幹之撓七家兄多住外家且多病以是出入更不能預料若家兄少愈一二日之勞所不憚也擇之五一哥聞五月亦嘗入城更不蒙見訪何也幹固不敢屈長者但城中廣濶復不能探伺以圖走見以是益怏怏吾人相聚動一二年或十數年僅得一二交臂而失令人恍然不曉所謂也有寺簿一書并幹亦作一書便中煩蚤達之幸甚比收先生四月十三日書為况甚適但云賑濟無效丐歸甚力不知果遂否恐欲知之浙間二麥亦不全好重以疾疫目下日色可畏一日之熱比尋常三五日近郊之田巳龜拆瀕海者巳絶望矣不知他處何如若大率皆然則甚可慮也幹迫親養未能絶意場屋但覺力綿途逺若不能擺脫終是悠悠日來稍親世務惡人意處頗多惟有退步一著自作本分事業意味頗長也因書有可警誨幸毋惜幹侍旁苟安不足勤齒恤去良友日久舊學益荒落矣來春擬過藍田尋舊約為屏山之行比收先生書又為會稽行道逺力綿行止殊未能決更俟後報如何得彥忠兄書云奏事之請不遂即不果去若先生歸屏山當遂前約否則又未知見時也杜門獨學近亦得數朋友但不得數數相聚如與兄在茅舍中耳擇之丈歸未有動靜否擴之兄為况如何偶寓先墳未及拜二兄書會次煩致鄉仰意廬陵書信遞去良久旦夕雖有回訊當得尋便納往景陽書向説比亦收書看周禮甚有味亦作書挽其歸恐遂為廬陵人未可知也或問草嘗收下十卷上數卷多脫誤後便附去書籍並在家中此價速行未及納去淵源録尚未及寫紙蒙惠甚感但本託致少許遂爾相溷為愧幹山居旬餘頗有清樂去兄亦不逺恨不能即欵聚也比收先生書云看書一過頗有省發因得讀書訣云斂身正坐緩視微吟虛心玩味切已省察敬録呈陳士直字彥忠閩清蓋平里人許子春字景陽泉同安人復饒伯輿魯饒州餘干人幹諸况如常杜門讀書所恨者朋友可與講習者難其人耳病軀支離度不可復求友於四方來諭為學之方語意極端正精實近亦頗覺古人為學大抵先於身心上用功如危微精一之旨制心制事之語敬勝怠義勝欲之戒無非欲人檢點身心存天理去人欲而巳然學問之方難以人人口授故必載之方策而義理精微亦難以意見揣度故必參之聖賢故初學之法且令格物窮理考古驗今者蓋欲知為學之方求義理之正使知所以居敬集義而無毫釐之差亦卒歸於檢點身心而巳年來學者但見古人有格物窮理之説但馳心於辨析講論之間而不務持養省察之實所以辨析講論者又不原切問近思之意天之所以與我與吾之所以全乎天者大本大原漫不知省而尋行數墨入耳出口以為即此便是學問退而察其胸中之所存與夫應事接物無一不相背馳聖人教人決不若是則雖曰學者之衆而適足以為吾道之纍也中庸之書首言戒懼謹獨次言知仁勇終之以誠此數字括盡千古聖賢所以教人之旨戒懼以致夫中者居敬之謂也謹獨以致乎和者集義之謂也致中和豈非檢點身心之謂乎智求知夫此者也仁行夫此者也勇勉夫此者也亦不過求所以致夫中和者也如此而加之以誠則真知實行而其勇不可及矣故學者立心便當以持養省察為主至於講學窮理而持養省察之意未嘗少懈乃所以使吾敬愈固而義愈精矣不以持養省察為主而曰吾惟講學窮理者皆務外者也來諭以義以方外為隨事省察即物推明似便以是為格物致知之事竊嘗謂古人敬義兩字且就念慮上用功敬是持養此心而欲其存於內者無不直義是省察此心而欲其應於外者無不方居敬集義乃是要檢點自家身心格物致知乃是要通曉事物道理其主意不同不可合而言之也又謂貞者萬殊之所以一本元者一本之所以萬殊如此則亨利兩字又當頓在一處一本萬殊四字朱先生於一貫處言之以其一故曰一本以其貫故曰萬殊一以貫之以此之一貫彼之萬故忠為一本恕為萬殊也今欲以四德言之則利當為一之始貞當為一之終元當為萬之始亨當為萬之終自亨而利則由萬而趨於一至於貞則成夫一也自貞而元則由一而趨夫萬至於亨則成夫萬也似此方始無病此又窮理之不可不察也大抵講學命詞易得有差治報草草未能無病恐有所疑往復為幸要之朋友篤實用功實難其人惟契兄勉之吾道之望也承聞教授里閭向道日篤不勝敬歎幹承晤之日淺每見明父極談操履純篤趨向堅正未嘗不矯首興懷恨不得朝夕奉從容也先師棄諸生微言不絶者如線向來從遊之士本無以身殉道之志一旦失所畏慕則汨沒於利欲海中鮮有能自拔者後來者習聞其説亦未有卓然興起者故所望於師魯明父者不啻飢渴也承諭以讀春秋大義頃見朱先生亦然以為全無意義只是直書則其間亦有曉然若出於聖人之微意者若如後世諸儒之説則又失之穿鑿太甚先生每戒諸生以未須留意蓋以為非理明義精不足以與此也西銘之説其大意固是如此但自民吾同胞顛連無告亦不可但以為見其為天之子自人及物各盡其愛自上及下各得其宜是仁之道而天理之當然也又豈特于時保之以後方為樂天畏天哉五行之説亦多未曉生之序行之序頃亦欲作一樣説後思之恐不然生則先水火而後木金行則先水木而後火金恐是不易之論所畫圖亦恐不然不若且祖前輩之説未安者且置之也此間絶難得朋友近亦有五七人肯向學未知久久如何也幹老且病亦謀山居庶得安靜不復有四方之志亦未有承教之日也幹諸况如常無足道者明父能具言之明父兄此來説足下之賢不容口明父志氣髙邁非妄許人者以是深恨相知之不深也朱先生一生辛苦盡取洙泗濂洛之學為之解剝而發明之如大明之中天也學者志氣卑狹守章句者不知存養之為切談存養者不知玩索之不可緩各守一偏於先王之道卒無得焉甚哉大義之將乖微言之將絶也足下與明父當任此責使先生之道將微而復振莫大之幸也幹老且病雖志學之心益苦而氣不足以配其志徒自嘆矣惟以勉旃為禱幹舊苦痰嗽今夏於小腹之右氣滯成癖遇嗽痛掣至今未愈終日塊坐雖讀書之志甚切而精力巳不逮矣潮陽之命亦以老病不容不辭再上之章適值都城失火至今未下然決不敢復出矣此間今嵗卻有朋友數人相講切其間亦有一二可望乃知向日朋友講習不甚切痛以至後來多不得力須是切巳用工若只是辨論辭章恐終不濟事也此事甚長恨不得一見相與極論也復趙立夫幹伏承别紙之諭以讀禮之暇不廢講學此正立身行道以顯揚其親之大務顧幹何足以知之然自老來間居益知學問至重至切苟生而為人不知義理則天之所以與我而謂之人者亦已昏塞廢放頑而不靈無以自别於物矣及其周旋斯世自少至老紛紛擾擾不過情欲利害之間而無復義理之凖及其甚也則三綱之淪九法之斁將亦何所不至哉若其所以為學則敬以直內義以方外博我以文約我以禮此四語者無復加矣其間曲折詳密則未能詳布亦與朋友熟講而力行之耳伏承下問之勤不敢不告僣率皇恐尚冀亮之復林自知承下問以心無據依頃于石門與賢者語經旬月每見記誦甚富輒以不是見答似未以鄙見為然今乃知其無所據依此足見髙明進德之驗吾道不明且數千年程張始開其端晦菴先生為之大振厥緒今此書此語滿天下然無所據依之病豈惟自知為然蓋有同堂合席終日問酬退而茫然者多矣僕固不肖竊誠痛之孔門之求仁孟氏之求放心所求何事顔子之不違曾子之忠恕所學何義及其參前倚衡左右逢源所見何物參諸天命之賦豫驗諸吾身之稟受察諸日月之流行蓋有操之甚約用之甚博而不可須臾離者人心據依試以是求之蓋有所謂躍如而不能自巳者矣自知資甚敏見甚髙然察末而不求其本見表而不由諸裏如無根之木無源之水乍生乍滅乍長乍歇較之世俗之流蕩汨沒則相去逺矣然師門寂寥微言將絶朋友之所望於自知者則不但若是而已幹嶽祠必可得自是歸老武夷以卒所學自知抱所有以遊於今之世未必能有所合若能卜鄰於武夷之下相與切磋以張斯道則僕死無憾矣漢卿丈歸試商確之卻以見教也與張敬父書元簡自契兄之行所與往來者趙司直一人耳契兄逐逐里巷間人固知其賢而未知其所以賢也善觀人者要當知其大者人豈易知哉以故僕之所望於執事誠不敢以流輩並也然鄉間風氣淺薄不賢者不足道賢者往往量狹而氣輕量狹則易足氣輕則不能任重人莫不知聖賢之可慕道德之可貴曷嘗有一人終日歉然常有不足之意慨然常有必至之念因循嵗月終其身為常人者狹故也小才小慧殊不足道稍足以異於流俗便沾沾自喜識者視之政可一笑只此意思隔了多少好事此無他輕故也區區之愚更望契兄於公事之暇掩關靜坐常以舜何人豫何人自省便如適逺鄉而思見父兄更以聖賢經訓深自玩繹不宜虛過嵗月今年只是這人明年亦只是這人也又看自古聖賢到處是如何今吾之所有處是如何相去幾千萬倍方知平生所有皆不足道以此自省深沈靜默異日結裹為世間第一流此區區之至望也無由面言未知是否亦足見拳拳愛望之切四郎來聞為况之詳武伯至又承惠書感感但四郎具言體候不安之狀殊令人慮幹生平所在守官不顧身命其所管幹之事全不是緊要只是見世人全不肯理會故心下不平須要理會今思之全不濟事然幹素貧賤耐辛苦故亦不覺其勞便遭大病如嘔血數升亦能保全至七十嵗也今左右本是膏梁只是天資髙脫去世俗之鄙習然肌體重大不耐勞亦復不顧辛苦大恐非所宜也但做得一尉十分稱職亦濟得甚事幹之所深慮者歸鄉兩年有餘遍閲朋友無一可人意者其可與語者李隨父陳儀父耳其他難言也然陳李亦天資醇耳恐未必堪跌撲故每與相識言且煩於鄉里尋箇張敬夫樣人則久而無對非敢為諂也實是無第二人然亦天資髙耳人之難得如此又豈可輕試於一尉耶更宜千萬謹重此皆非鬲上語也幹巳得豫祠之命父兄之為子弟謀不過如是自此可以無飢矣春夏間晴和或可約朋友相會於嵢峽之間若非官路只是隔溪有小寺相聚三五日亦佳郤旋謀之也宋某者人品之最賤者頃在臨川渠來相見不知其人姑收接之記得許多言語便每書來求薦於鄉之守令後聞其持此以遍謁諸路使者此人之最無恥者也若此等人又復收拾之則吾之符水亦不靈矣但當斥絶之庶使堅苦向學不求名利者氣亦有所伸也左右乃以為賢姊夫之薦為重必欲周旋之使賢姊夫薦一盜跖亦復周旋之耶人心不正大類如此可歎也此人視盜跖亦恐無異也公晦禮書已寫畢更俟月末楊志仁來即附去復李隨甫書晦伏承示及論語疑義觀左右之用心可謂甚苦學世方汨沒於課試之文乃能留意於聖賢之書而又思索精勤雖未能盡合聖賢之本意然亦豈鹵莽於學者所能及未及識面便承寵教不勝敬歎但學以為已聖賢所言無非教人自修之實事更須尋求聖賢本意玩味而自得之為佳也幹一去鄉井十有五年投老來歸百事非舊朋友凌凋每興索居之歎反覆來求真所謂空谷足音也偶以事冗輒先以十篇所疑者求教陳子昭亦云未及相識容訪髙隱即圖請見草率幸亮之答梁寧翁書祖康幹承惠書且言年少不謹頗以自悔今嵗華峯朋友中深愛賢者與曾成叔之沈靜縝密可與共學每於稠人中昌言之又問目中亦隨其是非為之去取亦衆所共見想其間不無相忌者而追咎其已往之愆也近復見賢者甘心於寂寞之源志愈厲而情愈親故其為説愈熾耶世俗之薄一至於此韓子所謂怠者不能修而忌者畏人修也頃亦見林某一再言之亦不過付之一笑便使賢者年少自陷於子弟之過一旦幡然改悔而欲為善顧亦何所不可而必欲嫉惡之耶又以為恐有志於學者因是而不來其説尤可笑果有志於學又豈以其徒之未善而遂不來幹亦何賴於學者之必來而多方遷就以召致之耶其褊心狹量切切然求人之隂私而誅責之自以為足以訐人之過而自陷於隂險禍賊之中而不自覺也孟子曰雖有惡人齋戒沐浴可以事上帝馬之踶嚙者或可以致千里低首帖耳安知非駑駘下乘耶善之與惡一反手之間耳天下亦安有不可為善之人哉惟賢者深自改悔克已自修繼今以往凡吾所以施於家庭施於宗族閭里者各盡其道博學篤志以靜觀天下之理亦豈不足以收之桑榆而徒聽夫紛紛之議哉兩日正以不相見為懷諸子以為閣政之病頗篤不知今又何如耶草草幸亮之勉齋集卷十七
