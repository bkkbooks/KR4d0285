body:
  text: 勉齋集巻十九宋黄榦撰記一楊恭老敬義堂記人禀陰陽五行之秀氣以生而太極之理已具其根於心也未發則為仁義禮智之性已發則為惻隠羞惡辭讓是非之情其施於身也則為貌之恭言之從視之明聽之聰思之睿其見於事也則為君臣之義父子之恩夫婦之别長幼之序朋友之信與凡百行之當然者是其禀賦之初内外之分固莫非天理之所具然少有不謹則人欲得以間之合乎天理則順直端方而無邪曲偏詖之累人欲間之則反是矣是故存養省察於幾微之間其惟敬義乎主一之謂敬合宜之謂義主於一則思慮不雜天理常存而内直矣合於義則品節不差天理常行而外方矣内直外方則所謂具衆理宰萬事有以全吾心本然之妙矣坤順也二中也以六居之正也順理而中正直方之義也聖人推原其所以然者而為之言曰君子敬以直内義以方外示人之意切矣學者其可不務乎長溪楊君通老致其兄恭老之意曰吾嘗以敬義名吾堂日與吾兄弟諸子講習乎其中子與吾弟交最厚其為我言其意榦謝不敏而通老之請益堅吾與通老從遊於夫子之門二十年矣通老長於吾十年而首與之交相好也通老温厚質實信道甚篤余未及識恭老而通老以為不可及其亦賢者歟以昆弟之賢而朋友之契以切磋之義責於予予亦安得無言耶予惟楊君亦旣深知古人為學之要矣兄弟諸子藏修遊息於斯堂之上端居靜慮歛襟肅容深惟其義而藏諸中察諸念慮之隠微騐諸事物之雜揉使此意常存無少間㫁則大易之㫖固已不占而有孚矣余老矣無所歸亦將裹粮而前歴堦而升以聽楊君兄弟之教也於是乎言長樂黄榦記鄭次山怡閣記怡閣者象山鄭君次山之家塾也以怡名取夫子答子路問士之意也紹熈二年冬閣成以書藏之帥其子若弟之子群居而肄業焉明年夏命其子遹成叔來告曰願有記榦於鄭君未嘗有一日之雅而已竊聞其有長者之風矣及觀成叔之為人襟度夷曠智識闓爽則又知君之施于家者信可書也遂不辭而言曰自竄竊摹擬之學可苟富貴而孔氏詩書遂為無用之具其間博聞强記者亦不過騁譚辯誇文章而於古人之學修身及家者漫不復講今君教其諸子而首欲其篤於兄弟之愛可謂審所輕重而不惑於流俗者矣葢五典者天叙之常理人道之大端也析而言之則君臣夫婦朋友者人之屬而天屬之親惟父母兄弟為然其四肢百體皆一氣之所生其入孝出悌為萬善之根本則兄弟之義可不為重乎古之稱其從父者曰世父叔父從父稱之則曰兄弟之子後之稱其從父曰伯叔而父之義始不明矣謂吾姑者吾謂之姪而世率以姪稱其兄弟之子則是不以子待之也父之兄弟與夫兄弟之子猶有父子之稱者以其同出於一氣也則從父兄弟豈不猶吾之兄弟乎所貴乎士者以能深明其同氣之義而不失其天性之至愛耳若夫利欲膠固橫目自營一室之内乖離鬭狠則雖通今博古高談天人而亦何足為士哉此亦君子所以為教而獨有味乎夫子之言也君之諸子居是閣也仰而觀焉俛而思焉知君之待兄弟之子如己子焉則吾之處乎兄弟者其則不逺矣利欲之私豈足易我天性之樂哉而又擴而充之至於天典民彛各盡其道則於君子所以為教者可無負也此邦之人聞君之教其諸子者若此則過君之居履君之閣孰不自歎夫流俗之薄而陰革其乖爭之習乎榦嘗東浮大江躡雲門跨石龍以望所謂象山者其巖谷崷崪風濤洶湧甚可愛也異日尚當從君怡閣之上觀君之施於其家以及鄉人者焉君亦坐予而熏沐之哉乃為之記不惟以見君之志亦以自警云五月壬辰朔北山黃榦記劉正之遂初堂記始予識劉君正之于屏山正之年方十六七予意其貴顯已三世綺襦之習聲色之樂軒冕之味必有以動其心成其質者己而觀其貌聽其言察其行則褒衣博帶墊巾芒履不見其瑤環瑜珥也左圖右史吟風詠月不見其粉白黛緑也高談抗論動與世忤不見其脂韋嫵媚與波上下也予退而歎曰富貴人所欲也彼豈異于人哉所謂居移氣養移體者果足信耶抑其年少氣鋭久而遂變也哉自是以來與之交日熟情日親即其新以考其舊葢有甚焉無不及也其後予以禍患摧折退歸故鄉而正之方馳騁東西為諸侯客葢不見者十有餘年旣而聞其以憤世嫉邪斥辱權要罷歸田里其先公之賓客有顓國秉者其先太夫人之親族有屬中宫者宦遊之交好有為天子之耳目者宜若可以自白且彈冠矣親故愛正之者亦率以是勉之而正之偃然而不應日與親朋彈碁賦詩蒔花植竹蕭然若將終身焉予又退而嘆曰是其天資之美不以外物累其中者也是眞能不負其初心者也此古之有道者之所難而風雨之詩所為作者也癸亥之秋予復訪正之于屏山正之與予言曰予少時嘗以遂初名其所居之堂晦菴朱先生嘗為予書之子能為我記之乎予曰若先生固望以遂其初予固有以知子之果能遂其初也富貴之毒人也甚於鴆惟其嗜之美也而其毒愈深蝍蛆甘帶鴟鴉嗜䑕彼豈知為臭腐哉蟠間之餘嗟來之食葢有妻妾之所泣乞人之所不屑者而士大夫不顧亷耻而冒求之今子生于公相之家狃于富貴之樂而能遺外聲利不改其度如此是豈不甚可敬哉雖然子之初亦旣遂矣吾請卒言其所謂初者子其為我聽之天地之初太極是也人物之初性善是也聖賢之初赤子之心是也人其能遂吾之所謂初者乎子能遂之則子之家之初忠烈如延康勲業如少傅道德如屏山備前人之美發揮而光大之如忠肅者子皆有以遂之矣正之曰某不敏敢不敬蚤夜以承子之教因書其本以為遂初堂記七月朔旦長樂黄榦記家恭伯重齋記眉山家恭伯名其讀書之齋曰重取夫子不重則學不固之義屬榦記榦竊聞大學之道以格物致知誠意正心修身為本而推之以齊家治國平天下格物致知又以居敬為本焉先儒論居敬之方則曰主一之謂敬又曰整齊嚴肅則心便一整齊嚴肅夫子所謂重而又居敬之本也容貌之莊言詞之謹非致飾於外制於外所以養其中也輕淺浮躁其中可知矣何以究此理之精微存此心之純一哉世之學者溺心於文詞功利之末固非大學之所當務志於學而不得其要則又捨近騖遠憚拘檢而樂放肆其於學亦豈能有得耶恭伯負竒才攄讜論擢高科守其家學之傳汲汲然以讀書講習為事而又必以重為先可謂得為學之要矣然則以𢎞毅而任斯道之重以斯道而任天下之重亦由是而益用力於大學之道而已恭伯勉之哉恭伯名抑今為嘉定府學教授嘉定辛未長至三山黄榦記郭聖予瑞蓮堂記有蓮偶而華邑人瑞之不以私獻於令令顧徳弗稱復歸之輦於通衢邑人縱觀焉桂湖主人郭君來請曰某之先嘗面池而堂將以瑞蓮名願有記蓮花之君子也蓮而瑞君子道長之祥也學而徳進仕而業廣皆道之長也天其啟之矣吾邑之士勉乎哉嘉定癸酉六月旣望長樂黄榦記林正卿龍門菴記度地居民為城邑為鄉井其居之安其生齒阜以蕃則其山川融結磅磚深厚宛委囘復必有可觀者若夫萃為中和㪚為英華涵濡孕育為哲人才士則其瓌偉絶特必有大可觀者焉葢人禀陰陽以生川流山峙陰陽之大者其剛柔厚薄盈虛聚㪚宜悉相似也吾友林正卿所居之鄉山曰鼎峯水曰梅溪鼎峯之山析為二支東西迭起仰而相向俯而相就卒而交互以相入梅溪之水㳂山而流若往而復若低而觸若停而蓄莫知其所自出如是者十餘里然後聳為雙崖瀉為三灘崖束灘駛嵂崒澎湃露怪呈竒不可名狀葢一鄉之屏蔽神龍之所潜也其鄉士友顧而樂之於崖之東結茅為菴名以龍門以為禱祈遊覽之地而屬其友黄榦記之榦未嘗至其鄉獨嘗與其士友遊大抵潔亷峭峻好義而喜文則山川之氣實使然也人固囿於氣當有以充其氣山之高水之深神龍之變化苟有以充之吾分内物耳不然樵漁耕販往來其間者相踵也於我何有焉今正卿能與其鄉人徜徉盤礴而講其所聞於師友者以充其所禀之氣庶乎博碩宏偉而無負於兹土之勝矣嘉定三年七月朔日長樂黄榦記安慶府新建廟學記聖人之道與天地並學校之設以明道也夫陰陽五行發生萬物而太極之妙周流不窮凡囿於造化之内者鈞禀是氣則鈞具是理人為萬物之靈則受中以生純粹至善而日用常行各有當然之則貫徹古今充塞宇宙無適而非此道之寓也聖人參天地以立極旣為之發明其藴而經理斯世者又設為學校以教之上自王國都而下至里術葢將與一世之人凡有血氣心知者莫不周旋涵泳於吾道之中顧安有遠近内外之間哉龍舒為郡自周之初以國著名其沐文武成康之遺澤舊矣其地城距天下之中王者故都千餘里風氣所鍾正朔所及古男服之國其山川之勝扶輿磅礴泓澄演迤為兩淮絶特之觀其習俗質樸而渾厚其竒才秀民挾䇿讀書者彬彬也而郡之學獨簡陋弗稱累數十百年莫有過而問者焉葢自衣冠文物萃於東南仕於淮者咸以為遠且外化民成俗所當急者反緩之吾道之大寕若是耶攷之圖志自唐有夫子廟學之始建獨闕弗載舊學在今學之北政和間改創今地紹興初旣廢復興其後或增或葺大抵因襲簡陋非有意於崇學校美教化也嘉定壬申右史舍人直龍圖閣張公來守是邦進謁先聖退而歎曰若是其隘也閲武之地廹於學宫非所以右文教也徙置他所而學之地始闢則又歎曰若是其陋也肄業之齋環於廟殿非所以尊先聖也更創諸齋於所闢之地而廟之制始嚴右廟左學位序旣定凡屬於廟者首建郡守齋廬以肅祀事旣又考諸鄒兖二公以及從祀坐向等級率謬不應古法以侍講朱文公先生所定新儀悉釐正之郡之先賢與周程三先生舊祠學門外至是遷之以亞從祀凡屬乎學者則北為傑閣以藏宸翰閣之下為師生燕見之堂堂之北為教官齋宿之舍列六齋以及學職之位於東西兩廡其南有軒軒南有池池上有亭為游息之地其外為射圃深廣崇嚴耽耽翼翼規模之壯東南諸郡莫能過也材取於在官之竹木工取于在學之佃夫邑之寓公間遣助焉興是大役民不知也旣以學前官池與官田若干畝廣贍學之廩又以白沙魚池嵗收累千緡以待士之貢禮部與喪塟之不能舉者贐而周之廟學之支傾補漏亦於是取辦焉嗟夫公之加恵於此邦之士厚矣此邦之士鼓篋而來攝衣而升入乎廟瞻聖賢之儀容以繹其典訓處乎學聆師友之講習以考其徳行道義之著見躍如也又能存養於齋莊靜一之中省察於念慮起居之際窮理以致其知力行以踐其實則道在我矣積習旣久風俗日變雖鄒魯可也孰謂衣冠文物獨東南之為盛哉公名嗣古直寧人蚤以實學登顯貴刻意於道以己所得欲人皆然其守舒尤以教化為先務未朞年政成令孚百廢具舉廟學之建視他郡為最鉅旣訖功以府學教授趙汝遂之請屬榦記之竊惟舒之先賢有文翁者興學於蜀人化之漢史旣傳其事千餘年間蜀之名公項背相望猶相與言曰此文之教也公能視舒如蜀舒之人豈不能以蜀自視視公如文哉豈可使之冺冺不少槩見而太史氏失其傳哉遂不敢辭而紀其本末侈公之恵以厲舒人使來者有考也學成於癸酉十月之庚子董其役者懷寧尉范楷兵馬都監鄭選云後十日具位黄榦記平江府和靖尹先生祠堂記和靖尹先生寓居平江府虎丘西菴牓曰三畏齋所題雜録論語解皆可考所寓即上方也去之七十有五年郡守直秘閣陳君芾通守太學博士丁君焴始度菴空地為屋繪先生象祠焉尊前賢厲後學也先生諱焞洛陽人年二十師伊川程子舉闈䇿士議誅元祐黨不答遂棄舉子業靖康初以布衣召不至詔褒為和靖處士洛陽䧟家殱焉先生死復甦竄長安山谷中逆豫以禮聘溺水逃去展轉蜀道累年紹興五年以崇政殿説書召凡二十辭八年冬始入見除秘書郎明年遷少監太常少卿權禮部侍郎毎遷輒力辭其冬除徽猷閣侍制提舉萬燾宫辭不已遂奉外祠即虎丘以居年已七十矣貧無以為歸也後二年竟殁於㑹稽之寓舍先生所遇於世如此葢嘗考先生之所學篤於踐行不為虛語未嘗求人之知人亦莫能窺其所藴也今其可見者經帷進講門人記録耳惟即其所遇於世者觀其所取舍然後知先生之於道卓乎不可及矣利害者人心之私理義者道心之公公私之間迭為勝負一取一舍而賢不肖可知也至於歴險難之極而不變處貴顯之驟而不動抱仁履義終其身而不悔非盛徳能若是乎理義充於中則禍福成敗榮辱得喪膠轕萬變日陳乎前而此心自若也程子之門從遊之士皆閎博俊偉極天下之選而於先生亟稱之其察之審矣顔淵退然如愚而夫子稱之亦曰簞瓢陋巷不改其樂又曰庶乎屢空然則先生者程門之顔氏歟里巷小人顛冥於利慾之塗不足道學士大夫則知禮義矣臨利害未毛髪許棄其所守者可歎也聞先生之風得無少愧歟有志於道者亦可自勉歟二君為是祠有補於名教大矣故述其躬行之大節以示學者庶㡬騐之於身而得於先生之道云嘉定七年六月旣望後學黄榦記袁州萍鄉縣西社倉絜矩堂記晦菴先生初創社倉以惠其鄉人欲以聞於朝頒之州縣江淛間好義者爭傚焉袁州萍鄉社倉九縣西其一也鍾君唐傑為之記有堂焉未名胡君叔器謀於榦以絜矩名之叔器歸以語唐傑唐傑曰可乎哉以書來曰子為我記之榦聞之師曰絜度也矩所以為方也處已接物度之而無有餘不足方之謂也富者連阡陌而餘梁肉貧者無置錐而厭糟糠非方也社倉之創輟此之有餘濟彼之不足絜矩之方也君子之道必度而使方者乾父坤母而人物處乎其中均禀天地之氣以為體均受天地之理以為生民特吾兄弟物特吾黨與則其林然而生者未嘗不方也惻隠之心人皆有之赤子入井一牛觳觫於己何與而悚惕生焉一原之所同出自不能已耳則方者又人心之同然也飢而食寒而衣仰事而俯育人之同情也是以古之帝王設為井田家受百畝上有補助之政下有賙救之義於吾心有病焉此方之政也己欲立而立人己欲達而達人老吾老以及人之老㓜吾㓜以及人之㓜因其分殊原其理一方之所以為教也夫稽之天理驗之人心參之帝王之制質之聖賢之訓君子之道孰有大於絜矩者乎若夫横目自營拔一毛不以利天下充其小己自私之心雖一家之内父子兄弟尚有彼此之分而况推之人物乎故不能以絜矩為心者拂天理逆人心帝王之所必誅聖賢之所必棄也然則知社倉之為義而置者絜矩者也不知社倉之為義而不置者不絜矩者也旣不知之又欲壊之是自不能絜矩而又惡人之絜矩賢不肖之分曉然矣又嘗即鍾君之記而考之萍鄉之為邑乆矣為令為尉於其邑者不知幾人而孫公潘公獨能留意為士而生且長於其邑者又不知其幾人也彭君雖不知其人而鍾君胡君則貧不能自立者也而亦拳拳於此是四五人者其賢於人可知矣因是推之則向之捐米以置倉如栁如宜者其人又可知矣又嘗考之鍾君嘗求記於先生而先生為之䟦考其嵗月葢屬纊之前二十日也其詞抑揚感慨有遺義焉其天地生物之心至於老且殁而不衰也某年某月某日具位黄榦記吉州永新縣學記永新於吉為壯邑山水明秀土地衍沃其俗富足而家業儒其學校之創舊矣嘉定元年盗發荆潭結黨與負險阻其抗逆王師環數州之地千餘里被其毒永新當往來之衝剽劫焚蕩官廬民舍寸椽尺瓦無在者越數年始克撫定縣尉范君某芟荆棘夷瓦礫約已嗇用首建縣學而一新之以其州事判官孫君德輿之書來請記榦謝不敏范君秩滿復過予請益堅方盗之始平也山谷之反側未盡安田野之流庸未盡復弭盗安民尉職也弦歌揖遜經生學士平居暇日以講以肄尉亦何急於此歟葢嘗原盗之所由興矣慶元開禧間抵排道學之説指士之潔亷好禮誦先王之言行其道者一切以偽目之貪得嗜利之流習為苟賤無耻以自别於道學阿權姦竊威福志氣盈溢遂啟兵端僨軍殺將兩淮荆襄為之騷然東南之民困於供億監司州縣方且括民財奉苞苴民不勝其困江西之俗豪家富室喜於兼并為之守令者不惟無以抑之而反縱之而細民又困矣夫民生不見禮義之及己而困於衣食之不足幸菑樂禍以圖逞其不平之憤則去為盗賊而焚燒縣邑賊害良民者勢使然也知盗之所由興起於不悦學則弭盗安民之術舍學何以哉此則范君之所為汲汲也夫子之言曰君子學道則愛人小人學道則易使也使夫子之教行則進賢退不肖者必不肻用民之賊為監司守令者必不肻為民之賊富民必不肻兼并細民亦不肻相率而為不義如是則不惟盗賊之可弭雖使人有士君子之行可也然則范君之所尚俗人以為迂而君子以為急不惟永新之為官民者所當知而天下之所當取法也故為之推廣其意而記其學成之嵗嘉定某年某月某日具位黄榦記徽州朱文公祠堂記道原於天具於人心著於事物載於方䇿明而行之存乎其人聖賢迭興體道經世三綱旣正九疇旣叙則安且治聖賢不作道術分裂邪説誣民充塞仁義則危且亂世之有聖賢其所闗繫者甚大生而榮死而哀秉彛好徳之良心所不能自巳也堯舜禹湯文武周公生而道始行孔子孟子生而道始明孔孟之道周程張子繼之周程張子之道文公朱先生又繼之此道統之傳歴萬世而可考也文公徽人也其殁也徽之士相與言曰公之系兹土吾郡之盛事也即郡之學繪而祠焉太守趙君師端至視其祠褊且狹不足以稱邦人思慕之意改創於講堂之北且屬榦記之竊惟自昔聖賢之生率五百餘年而一遇孟子旣殁千有五百餘年無聞焉考其世系則又皆中土之所生而南方則又無聞焉歴世之久輿地之廣其間豈無閎博俊偉之士而不足以與聞斯道之傳至我本朝周程張子旣相望於一時而文公復興於未及百年之後周子旣生於舂陵而文公復生於新安豈非治教休明文武周浹天運之所開地靈之所萃曠古之創見而一代之極盛者歟秦漢以來斯道晦蝕天理不明人心不正事物當然之則昧没而不彰方策不刋之訓殘闕而將墜周程張子旣推明其大端而傳訛襲舛浸失本真迨我文公禀高明之資厲強毅之志潜心宻察篤信力行精粗不遺毫釐必辨至其德盛仁熟理明義精歴代相傳之道粲然昭著故雖窮鄉晚出亦皆知有聖賢教人之㫖然則公之生於世有功於斯道大矣至公之殁海内之士莫不嗟咨涕洟失所依歸而况生長於公之故里者乎宜其思慕不能自已趙君大其祠宇以慰其心也亦宜矣哉雖然思其人不若尊其道慕其迹不若師其心今公之書旣家藏而人誦之矣惟不為習俗之所遷不為利害之所誘居敬以立其本窮理以致其知躬行以踐其實則雖越宇宙如親見之道之明且行世之安且治可冀也此當世之所宜共勉徽之士其可無以勉之哉師端與其兄弟皆從遊於文公先生之門故其為政知所先務如此堂成於嘉定七禩八月董其役者歙令孫某十月朔門人黄榦記勉齋集巻十九
