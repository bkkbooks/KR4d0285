body:
  text: 勉齊集卷三十九宋黃幹撰祭文祭臨江劉靜春先生文嗚呼去古愈邈道學不明末俗喧豗匪利則名豈無大賢挺生斯世彼昏不知孰發其蔽吁嗟先生天資絶人心平氣和志篤行醇博極羣書該貫一理尊敬師儒考訂非是閨門雍雍兄弟怡怡憂國以誠撫民以慈篤學力行後進是式推已愛人尤極懇惻人之有善稱道揄揚不責其備而取其長人之有過針規訓誨不顧其違而冀其悔先生此心可謂至仁芝菌鸞梟同然一春吁嗟先生今其亡矣昏迷恣肆誰逆其耳幹也顓愚少無師承年已踰冠始來廬陵摳衣趨隅歷問所學直指前修以警後覺乙未之冬歲暮天寒奉命造朝艤舟江干折簡來呼治子行李武夷金華惟子所止二三偉人為世宗師莫啓其行已背而馳廬山之陽杖履幾月别後貽書勉厲不絶尚期他年執經逺遊南北奔馳有志未酬千里訃音哀暮悲痛哲人云亡豈曰私慟天不佑善斯文已孤舉世滔滔斯人何辜武夷夫子先生所敬小子不敏幸獲將命敢不蚤夜益堅所行庶幾有聞如見先生收淚緘辭寄觴以醉惟神之靈鑒此微意祭丁復之文嗟嗟復之如君之賢而止此耶信耶非耶病革之書伯休文之之訊胡為而至于是耶勉我以學告我以死捧書長號濡淚滿紙嗚呼悲夫其何有于余逮死而不已耶以復之之惓惓于余則余之恨于復之者抑可知矣荒村之陬茅屋之底春雨對床秋風連騎挾冊承師質疑問義退歸切磨夜分乃寐往來七年終始一意至今潭溪之湄山翁野稚尚能言之善哉二人者之為友也孰謂復之而遽棄耶賢哉復之少有大志蟬蛻于名利之場鞭加于聖賢之地視其貌若不勝衣考其所操凛然有君子之器先民有言順事而存得正而斃達人大觀生死一致有如復之固亦可以無愧矣顧余未死則將奚恃余目孰視余足孰履扶持一傾顛沛頓委則余之所恨寧有止耶家空四壁目極千里聞喪不前朋友之恥緘辭寄哀幸勿豫鄙自冬徂春聚糧千里庶得以哭于殯弔其父而撫其子也嗚呼哀哉祭林丕顯文嗚呼人心厚薄之不同古今人物之所以異也古人不可復見則能如古人者誠足貴也如君之賢篤厚誠實之風求之古人亦可以無愧也慕親之孝顧瞻松楸常若承其志也愛子之慈從容訓誨常恐傷其意也束萊先生君之故友詘首受書凛乎有所畏也鄉曲後進纎芥之善踵門願交未嘗有所棄也急義之誠不必家之有無好學之篤不知老之將至也至于應酬交際懇惻繾綣貴賤長少同一致也雖兼善之至不能自達而婆娑閭里亦可以激薄俗之澆浮而振古風于既墜也曷為不永其年而遽嗇其志以歿于地也耶丙申金華師席連侍有過相針有善相示握手劇談達旦不寐分雖友朋恩若同氣十有八年之中離合不常而相豫之情不忍一日離也去歲之冬君嘗與余言曰吾老矣無所合于世殆將結廬于荒山之顛要子為旬之集則吾之願遂矣孰謂其反視君于殯而哭君于位也耶嗚呼已矣君不可復見矣亦將潔身厲行以慕君之義而已勉君之子以述君之事而已薄酒哀辭亦庶君之來暨也嗚呼哀哉祭晦菴朱先生文吁嗟斯文有廢有興其廢也三綱淪而九法斁其興也大經正而大誼明是其所關豈不甚重而夫子胡乃一疾而隕其生若昔孔孟迄于周程異世相望各以道鳴逮去古之益逺當異說之縱橫其精微之藴既不可得而見幸而托諸文字之間者亦且踵訛承舛而莫見其全經自夫子之繼作集纍聖之大成其知生知其行安行其襟懷灑然光風而霽月其言動肅然左矩而右繩望之者雖憚其貌莊而言厲即之者常樂其心和而氣平資本髙明而志道益逺性實通敏而索理益精主敬以立本而動靜無間格物以致知而毫釐畢呈大而察諸天地隂陽之變逺而驗諸古今事物之情仁義禮智不離五性之所賦灑掃應對洞見一理之所形其精義入神既有自然之權度則窮經考古莫不炳然如日星謂中庸為造道之閫奧謂大學為入道之門庭究本義以言易而深得卜筮之㫖黜小序以正詩而力辨雅鄭之聲探語孟之編而如對鄒魯之問答述周程之書而一新濂洛之典型至于星厯地志曲藝小數不可以悉究騷人墨客窮年卒歲僅見其可稱莫不折之以理而各造其極蓋亦得之于天命而非學可能信本深而形巨故末茂而聲宏其立朝也危言正色屢形于感慨其臨政也仁民利物一本于哀矜立綱陳紀而不為苟簡之計摧姦摘伏而不求姑息之名當就而就不事乎矯激可止而止力辭夫寵榮積者厚而施自遐身雖否而道則亨婆娑丘園湛若無營上以尋墜緒之茫茫下以警聵俗之冥冥諸老先生咸資于質正後學小子幸得于師承肆逃禪之論者莫能以惑世騁雜伯之說者不容於抗衡傳聖統以繼絶學正人心而息邪說夫子之功大矣則一存一亡豈不有係于斯世之重輕嗚呼蒼天曾是莫聽曷不百年大命以傾幹丙申之春師門始登誨語諄諄情猶父兄春山朝榮秋堂夜清或執經于坐隅或散策于林坰或談笑而舂容或切至而叮嚀始受室于潭溪復問舍于星亭庶依歸以終老指河山以為盟胡暌離之未幾忽夢奠乎兩楹奉疾革之貽書對使者而涕零亟奔走以來歸乃獨睹乎丹旌悵此生之疇依魂欲絶而復醒念屬託之至重豈綿力之能勝想音容而奉遺書敢不蚤夜以服膺惟力策乎駑鈍庶無愧于英靈奠卮酒以陳辭尚有鑒于微誠又祭晦菴朱先生文嗚呼先生百世之師天啓我人篤生于兹海內之士聞風以馳垂槖而來稇載而歸幹于朋儕質劣志卑憫其鈍頑誨誘孜孜既養其端復發其知既揉其偏復克其私燕申則侍步趨則隨適來則喜已去則悲别不踰年書不越時父生師教天覆地持二十五年恩絶等夷嗚呼曷辜而不憖遺日月推遷窀穸有期夜臺冥冥藏棺蔽帷海內之士齎咨涕洟使幹之愚倀倀何之孰䇿其慵孰指其迷孰顧孰瞻孰扣孰咨維今之春升堂摳衣笑語溫溫神完氣微鄉人見招意不忍違命曰汝行我志未衰閩山荔技其實離離我以扁舟訪汝以嬉自春徂冬如慕如疑誰知此言終天永辭前有書堂燕居怡怡後有精廬諸生焉依有園有池清溪之湄履迹雖存音容莫追獨有遺書千古具垂句索字尋口誦心維亦有良朋攝以威儀有善相聞有過相規毋誘于利毋蹈于非毋溺于安毋憚于危庶幾師門涓埃是裨靈輀啓行清酒一卮撫棺長號天乎痛哉辭晦菴朱先生几筵文惟先生之靈碩大宏博以成已為本以成物為用自其學之不厭而推之于誨人之不倦蓋與天地同量而聖賢同心也所以興起斯文惠顧後學之意切矣幹也不才去年之春里之父兄以其從遊于先生之門久而意其粗有所聞也帥其子弟而相與講學焉幹方固辭而先生督之愈力是以不獲隅坐執燭以聽垂歿之誨至今抱恨無有窮也今先生練祭近一二月而里之子弟復有所請幹竊惟先生之治命不敢違鄉人之善意不敢遂捨先生之几筵以行不能築室于場以終三年之禮俯仰太息絶愧古今卮酒告行痛徹心肺晦菴先生小祥祭文先生兮道德百世兮彌彰天地兮齊夀日月兮齊光自古兮有死先生兮不亡殘子兮何之菀結兮慘傷嬰兒兮失哺逆旅兮悲鄉德容兮在望佩服兮琅琅髣佛兮耳目顧瞻兮茫茫歲月兮不淹遽易兮星霜矯首兮武夷白雲兮髙翔褰衣兮無從寫哀兮此堂良友兮駢羅賢孫兮侍旁先生兮夙心英靈兮未忘瑶席兮玉斝桂酒兮椒觴靈來兮何許涕泗兮淋浪祭趙舜和文朋友之誼人之大倫豈曰燕遊以輔吾仁昔我兄弟退居鄉鄰交遊親厚非趙則陳責難規過握手諄諄自始至今餘二十春有不見者未嘗涉旬維君之年少我數人發軔仕途名滿縉紳胡為一疾遂隕厥身使我哀頽慟哭酸辛君所可憾有志未伸亦有可慰諸君詵詵人之賦命修短莫均君則往矣我老孰親千里修途東越南閩撫棺長號欲往曷因緘辭寫哀涕淚霑巾祭任舶并女兄文昔我先人峻節山峙始奇女兄不與凡子君來登門二姓咸喜義忘我貧德不以齒君資粹和兄輔以理克成厥家既多受祉振振兩甥復濟其美歲晚婆娑榮耀閭里相樂以生亦偕以死誰無室家鮮克有是君擢巍科名聨伯氏娶而卜居相望枌梓朝嘻夕怡苦樂相倚四十餘年親狎誰比自幹之遷武夷之趾效官荆吳一别半紀二老貽書蠅頭滿紙謂當期頤益介福履云胡相繼一疾不起病不及知斂不及視捧書長號欲往暫止終天之痛有淚如泚祭范伯崇文道之不明患無其徒或義之談而利是趨或始之鋭而卒乃渝人無常心吾道始孤在昔夫子發揮聖謨奮然而前摳衣坐隅豈無其人孰公之如公資簡嚴濟以怡愈早登師門詘首受書致知力行無替厥初幹也凡庸從師以居所敬惟公公尤眷豫尚期晚年依公里閭孰謂老成忽焉以徂師亡道微捨公孰扶孰剖我疑孰砭我愚孰知我哀嗚呼天乎祭陳寅伯文嗚呼寅伯而止于此耶福善禍淫孰主張是耶剛方正直胡橫以夭脂韋婉孌老不死耶所謂天者不可信而理者不可恃耶人生斯世切磋講貫不可無友相知以心相期以道孰有過吾二三子耶饑寒所驅奔走四出尚期他年合并卒業今存者尚不可見而九泉之下烏可復起耶自吾仲氏之亡已不勝索居之歎今又失吾寅伯使兩家二弟形影相弔銜哀抱痛何時而已耶今遣吾子哭君之喪于西山之側緘詞遣奠不自覺其淚之如泚也哭朱文公文在昔夫子性嚴氣剛規矩凖繩動止有常君承其顔惟恐或傷在昔夫子朝圖暮書遑恤其家孰有孰無君服其勞使若有餘內睦姻親外交朋友歲時享祀殽核清酒囊篋瑣碎俾無遺漏非君之賢孰左孰右幹之從遊餘三十年四海兄弟兩世姻㜕于君事親知君之賢人之百行非孝孰先劬勞造家黽勉旦夕顧我倉庾相我黍稷跋涉險阻忘寢與食庶無饑寒以安厥室室家諍諍男女詵詵且訓且誨為婚為姻有疑未祛有願未伸竟以勞悴而隕厥身為子而孝為父而慈君可無憾人誰不思千里相望銜哀致詞嗚呼傷哉孰知我悲祭徐子宜文定大䇿于甲寅之初公同其憂而不同其樂排大難于甲寅之後公與其危而不與其安此當世所以為公歎也利不私于身而忠存于國身不享于今而名顯于後則公亦何所憾耶和好方通流庸未復人情易變正論難伸公于此時奄然而逝公則無憾國其謂何幹一介書生無所肖似獨于蚤歲遍交諸賢我特于公未嘗識面公于我厚有以露章我知公賢不敢私謝是則相知以心相期以道亦未有如是之深也公以喪歸俯伏道左一觴以薦有淚盈襟祭髙應朝文惟公秉剛直不撓之德博碩有用之才而位不顯年不夀此幹之所以為公惜也當變異屢見之時人情危疑之際而賢者擯能者伏此幹之所以為世惜也幹也聞公之名于數十年之前為公之屬于三四月之頃公之行事表表著見者夫人而能知之干戈擾攘人方應酬之不給而公獨長慮卻顧築城鑿池為不可拔之計帑藏空竭人方支吾之不暇而公獨捐金結客振窮恤滯有不勝用之財此豈人之所能強為亦豈人之所可輕議哉此則幹之所目擊而心服者也數月之前公嘗以書屬幹曰晉有祖逖人莫有知之者今之世未嘗無祖逖也知之者其惟子乎幹何足以知公者世之知不知亦何足為公道哉公其死矣顧使齷齪庸凡之徒紛起而謀天下之事是則重可為斯世惜也千里緘詞一觴遣奠公其以為真知我者哉祭劉正之文嗚呼正之天資偉然不出戶庭而相得詩禮之深不越里閈而涵泳師友之淵故其學積于身行著于家事業施于官而賙恤遍于親故至其大節之不可及者則不為威惕而不為利遷富貴人所趨而義所不可則寧沈伏于州縣之吏權勢人所畏而意所不樂則或怒罵于公侯之前退休于家而以遂初自命是豈一時榮辱禍福之所能拘牽者哉幹之定交三十餘年歲晚論心金石其堅蓋將卜鄰於屏山之下而依我友以終老孰謂先師既歿季通伯休相繼以逝今又哭吾正之則自今以往善孰吾告而過孰吾鐫耶然則失我良友既足為斯世惜而尤幹之所以深自憐也嗚呼痛哉祭王子正文嗟夫士風之薄至此極也少而為學志趨卑鄙意思凡庸無可用之實也壯而從宦營私背公憚煩習惰謾不知其所職也至于決性命之情以叨富貴則左拏右攫東馳西騖無所不用其力也中州大邑滔滔皆是固無以責夫遐荒下國也嗟哉王君一代之英南方之特也䇿勳詞場奮發踔厲潛心道閫涵泳從容躬行實踐非外飾也蜚聲宦途焦勞國事致身朝列罄竭忠悃鞠躬盡瘁毋自逸也然其視名利之去來泊然若浮雲之在太空一毫非義則欲屈之以萬鍾之貴而不可得也士大夫而皆若是何患風俗之不振而民生之不厚也如君之賢固宜享期頤躋貴顯為世則也胡積之厚報者嗇也胡用之遲奪者速也幹亦同門多艱棘也殷勤顧念感君德也哭君之亡病弗克也奔君之葬阻行役也緘辭寫哀不知涕淚之橫臆也祭曾光祖文有倬斯道如日方中天生蒸民咸啓厥衷質弱氣浮利欲交攻乃背而馳乃瞽而聾孰厚而深孰毅而𢎞不事空言體道以躬我觀曾君禀資粹冲處心端夷古人之風志學雖切不為苟同乃得明師摳衣而從篤志力行百倍其功心無外思大學中庸壯始筮仕飭已奉公利澤小施扶衰振窮君曰巳哉我學未充篔簹之谷金精之峯結廬其間嘯詠從容前修是期後輩所宗胡不眉夀一疾而終同志寂寥孰磨孰礱晚進滔滔孰啓其蒙痛哉斯文涕淚填胸祭楊通老文嗚呼遊晦菴先生之門者多矣篤實無華強毅有守孰有出公之右者乎居家而兄弟化其和從師而朋友愛其誠立于朝而君相知其忠仕于外而吏民安其仁非天資之厚學問之篤孰能隨所寓內省而不疚者乎觀公之資與公之學所以保其身者至矣而不能享期頤之夀者何也人生一世如浮雲太空倐來忽去不足把玩如公之亡亦可以無憾矣惟其和而誠惟其忠而仁自有不能忘情于公者是則可哀也已幹也辱公之知最深荷公之愛最厚民社所拘不能奔走以哭公之柩緘詞寫哀遣子往弔公其尚能鑒幹之衷也夫祭安慶項教授母文幹之于僚屬義猶弟兄也愛猶弟之賢傷其母之歿人之至情也有子之賢有母之夀歿猶生也因夫人之喪奪賢屬之助淚如傾也祭李貫之文嗚呼貫之止于斯耶晦菴先生以孔孟周程之道誨後進見而知者固有之矣聞而知者非吾貫之耶貫之目不識先生之面耳不聞先生之言顧以為聞而知者亦何自而知耶貫之性資粹美襟懷坦夷凝靜有常堅剛自持則其質固已近于道矣而其志則勇于求道若決江河而東注若輕車駿馬就熟路而疾馳自蜀而來人謂貫之有志乎功名事業而貫之則曰吾將歷東南而求師縱往者之不作有遺風之可追聞晦菴之門人則虛心屈已而與之友得晦菴之遺書則手抄口誦而講其疑昔之門人雖同堂合席然往來不常或得其一而失其二貫之雖殊方異世旁搜博採乃反總其凡而㑹其歸而又篤信力行切問近思毫釐必辨精粗不遺故其動容周旋莫不有則出處進退莫得而疵立于朝廷則不知權利之可慕仕于州縣則亦捨民瘼其孰咨至其感慨發憤抗章極論則有犯無隱竭肝膽而歷披向非見道明用心剛而無一毫物欲之纍孰肯試身于不測之禍雖百謫而不辭使其在摳衣之列及門之士皆當斂衽而推服則聞其風而興起淑諸人而有得非貫之其誰耶貫之之行也以書來曰吾猶少駐康山湓浦之側以待水涸而泝峽子能一來庶以慰吾拳拳之念幹亦以書相挽曰子未可以亟行也朝廷清明行將起子以扶斯世東南之士亦皆望子以振斯道之微嗚呼貫之乃止于斯耶貫之之歿也有識之士莫不為之嗟惜視貫之之病者則以貫之病亟尚與朋友講柝理義而不少衰嗚呼此其所以為吾貫之也朝聞道夕死可矣有得于道則禍福榮辱死生之變若太空浮雲之過目此何足以為貫之之纍顧為斯世惜為斯文惜安得不情鬱結而涕漣洏祭林存齊文居大山長谷之中無耳濡目染之素獨能慨慕乎聖賢沈酣乎典訓追逐乎師友磨礲乎身心為弟而事兄如父也為季父而撫其從子猶子也族人觀之鄉人敬之栗山之陽無百室之聚家弦誦而人縫掖又皆知理義之訓君之教也吾鄉之士遊晦菴之門歲晚能自守者不過三數人如君之醇厚質直樂善不倦則又朋友之所敬愛者也君與豫交最善又嘗致豫于其里以教其族子弟故其情為尤親宦遊江湖不見君者十年矣奉祠來歸君年已七十視其貌猶矍鑠而嗜學之志不少衰豫復以王命守淮邦相期以一年之别尚可以白首相從而卒所志也孰謂相别未數月而哀訃遽至耶君既歿而豫亦老矣乞骸骨歸田里凡君之所見屬者不敢不勉行當拜君遺像于存齊而弔宿草于南山之原也嗚呼哀哉祭李守約文自先生講道武夷學者紛然逮今觀之非俊偉卓犖方嚴正直亦何足以費夫子之雕鐫彼頑鈍齷齪脂韋軟美雖曰聞善知慕未有不見害則避見利則遷者也求之師門如吾守約兄者是豈流輩之所可並肩也耶早以俊譽蜚聲場屋出其小技所向無前逮其聞道超然默㑹且鑽且仰孰髙孰堅而一第之微獨低回于壯歲簿領之卑又復馳逐于蠻烟鞠躬盡力輸忠納善臺府交薦斂衽稱賢至于十室之聚鳥言𠢐面尤不足以展布撫摩經理不遺餘力向之憂疑反側者安生樂業歡淫沸傳政聲賢譽亦既轉而上聞矣庶幾收功于桑榆之後不惟障斯世之橫流亦以煽斯道于復燃孰謂造物既嗇于其始而于其將振也而復奪之年嗚呼梁木之已壞者不可復作矣宿草之可弔者又不勝其悲矣當齒髮衰頽交遊凋落之際乃復失我良友則針規警誨將誰是望此所以既為吾兄慟而又以私自憐也祭陳監場文天道無親常與善人是耶否耶今則不然善人何夭不善何夀頃子來訪以書見扣讀之亹亹如獲瓊瑶徐而察之夙有良友尚期他年微言細剖一疾而終伊誰之咎謂天有常禍福紛糾謂天無常如在左右觀子南歸不前不後不歿于道路而歿于館人之家不斂于諸僕而斂于賢者之手則天于善人蓋亦未嘗不厚也諸郎詵詵先訓是守鄰有明師是誨是誘他日有成子則不朽莫寫我哀寓此杯酒祭潘立之文昔我兄弟與君父子俱以諸生摳趨林李偉哉大儒倡道武夷悉屏舊習幡然從之空谷春融虛堂夜靜有善相勉有過相警四十餘年豈無他人與君兄弟神交意親昔我宦遊君以病止今以倦歸君病不起追想音容如在目前志氣雄豪化為新阡道則常存因人顯晦師友寂寥興言永慨豈期晚年乃復哭君莫寫我哀酬以斯文祭趙壻文維兩橋之天𣲖昔固知其多賢逮結交于諸父偉聲望之卓然故一語之契合締二姓之姻㜕及吾子之受室儼諸老而齊肩幸季女之有託庶舊學之可傳覽别後之貽書覺向道之彌堅方得子之足喜胡一疾而沈綿執訃書而長號灑老淚而漣漣想庭闈之愛戀與孀幼之哀憐願一伸于弔唁病支離而拘牽遣長子以代行情哽噎而莫宣晦菴朱先生行狀成告家廟文幹竊惟先生之道髙明廣大非後學所可摹寫幹之鄙陋愚暗尤不足以仰窺萬一固不當冒昧執筆以為先生之玷伏念先生資禀學問道德行業學焉而知之者蓋少知而能盡其藴者又加少老成前輩凋零殆盡既無所考訂而歲月浸久傳訛襲舛則上無以明先生之道下反以啓後學之疑此其獲罪又豈但不揣分量而已哉于是追思平日聞見定為草藁以求正于四方之朋友如是者十有餘年一言之善則必從一字之非則必改遷就曲從者間或有之褊愎自任者則不敢也蓋合朋友之見止于如此則亦稍足以自信至其甚不可從者隱之于心而不安質之于理而或悖則尤足以見知德者鮮而行狀之作不容以自巳也行狀成于丁丑之夏然猶藏之篋笥以為未死之前或有可以更定者如是者又四年今氣血愈衰疾病愈甚度不能有所增損矣謹繕寫一通遣男輅白之家廟而併布其僭妄不得已之愚撫卷興悲涕淚如雨辭晦菴先生墓文幹至愚極陋之人先生不鄙而收教之涵淹卵育于困窮惸獨之餘父兄之于子弟不是過也先生不以是為有德于幹幹亦不敢以是而歸德焉理義之淵微問學之精密顔曾之于洙泗尹謝之于伊洛皆一世大賢也而後有聞焉幹獨何人而在摳趨之列耶公平正大者先生之心剛毅勇決者先生之氣嚴威儼恪者先生之容精深廣博者先生之學耳濡目染朝薰夕炙者三十年幹獨何人而獲親道德之粹耶既示之以精微復開之以博大既廣之以聞見復約之以踐行扶而掖之惟恐不進培而植之惟恐不立幹獨何人而受此生成之賜耶空谷春遊虛堂夜坐一行之孚一言之契未嘗不欣然以喜至于末年之付囑將殁之叮嚀則戚戚然大義之乖微言之絶也幹獨何人而當此期望之厚耶先生棄諸生二十有一年幹也不能安貧自守而仰祿於州縣黽勉王事固不敢違先生之訓然講習之功廢于朱墨持守之志奪於應酬歲月蹉跎而老及之矣朝廷憫其衰病畀之祠廪而豫之歸杜門省過翻閲舊學而神識昏眊疾病支離追念初心涕零如雨何先生愛遇之厚而幹之負先生乃至此耶師儒難于並世歲月不可再得惟有抱終身之恨而已矣自今未死之日尚當勉䇿疲駑不敢自怠居敬集義致知力行體之于身以勉同志庶幾收桑榆涓埃之益尚可見先生于九泉之下耳幹深願一拜先生之墓然後退而待盡數月以來痰作於上氣痞于下恐一旦遂溘先朝露謹遣男輅告于墓下惟先生其鑒之祭某人文難明者道難遇者師從師問道難得者資志堅行篤道奚逺而自我夫子講道武彞豈無他士踵門摳衣嗟君之來婦啼子悲交遊怪訝閭里笑譏君獨毅然如救渴饑問君之年二毛鬢垂何見何聞果毅不疑上堂請業切問謹思下堂取友片善不遺如幹之愚尤君所推君之為人實惟我知性資謙和襟懷坦夷持身若法觸事敢為義動鄉閭恩撫窮婺矛牙盜不過門人誰忍欺求之古人庶或似之胡不永年而止於斯師友相顧齎咨涕洟自君之亡弔不及帷葬不哭墓銜哀坐馳君嘗語豫吾力已衰惟我二子他日可期而與之遊切磨針規尚期他年無愧此詞代祭林黃中侍郎文嗟往哲之垂訓曰剛毅其近仁苟緝熙以學問庶德業其日新相彼頽俗與波俱淪不為丈夫偉特之節而脂韋軟媚以效兒女子之態不觀聖賢作經之意而剽竊摹擬徒欲以媒其身若夫剛正不懼仕優而學求之斯世如公幾人嗟哉我公受天徑氣為時直臣玩羲經之文象究筆削於獲麟忘齒尊而爵貴常矹矹以諄諄至其立朝正色苟咈吾意雖當世大儒或見排斥著書立言苟異吾趣雖前賢篤論亦不樂於因循觀公之過而公之近仁者抑可見矣論者固不可以一眚而掩其大醇也其試吏長沙低回下陳辱公見知相待如賔雖公事之屢忤然既久而益親何一老之不遺淚琅琅而沾巾承乏仁里有社有民小智大謀危辱旋臻所望以問政于公者今不可復得矣隂相而默護之者尚有賴於在天之神祭章翼之運使文幹也筮仕二十年所歷六七郡竊觀當世人物於百里而求一賢令於千里而求一賢守於一道而求一賢使者嗚呼何其難也其吾某官章公乎蓋天下之人物潔廉忠信者未必通于世務通于世務者未必潔廉而忠信者也徒潔廉忠信者而不通於世務謂之賢可也民有不被其害者乎通於世務而廉潔忠信之不足則所謂世務者豈能盡出於公且正乎若公者潔廉忠信而通世務者也勉齊集卷三十九
