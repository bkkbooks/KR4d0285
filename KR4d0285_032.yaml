body:
  text: 勉齊集卷三十二宋黃幹撰判語危教授論熊祥停盜危教授被盜論盜者數人續據尉司解到陳九自供為盜是實又供係是熊祥教令為盜饒細乙舒九兩名亦供熊祥尋常實是停盜纍嘗使人為盜當㕔審問與尉司所供無異又各人稱尉司都不曾拷打危教授亦不曾計囑及追到熊祥再喚人供對都與前所供全然相反並稱係是弓手黃友徐亮在龍舟院打縛又係危官人自行打勘本縣照得陳九為盜饒細乙舒九供熊祥停盜若非受打受賂豈肻到官自行通供及喚上醫人驗陳九被打㾗損果是曾經用椎打傷踝骨并夾損手指分明停人為盜與執人為盜利害非輕陳九傷損病患且押下本保著家知管饒細乙舒九本無罪犯特以所供前後不同三名併押下本保著家知管熊祥雖未知停藏著實然前後詞訴不一必是鄉里豪橫徐亮黃友輒將陳九等毆打併寄收對引追龍舟院僧行供對併牒催未獲人陳百乙放昨據危教授陳論被盜始末本縣不容坐視遂牒官根捉未獲間又偶出捕蝗親至危教授之家見其所說被盜踪跡因及鄉人有熊祥者平日豪橫又與之互爭山地意為盜之人乃熊祥教使本縣又嚴切行下尉司根捉續據危教授指名陳論之人三名陳九等自出官辨析本縣遂將三名押下尉司根捉正賊本縣所以厚於寄居嚴於馭盜可謂至矣尋據尉司解到所押下三名具申供通因依當㕔審問三名者歷歷通吐略無隱諱問之以尉司曾有箠楚則曰無問之危教授曾有計囑則又曰無陳九親為盜者也饒細乙舒九不曾為盜而言熊祥停盜者也既無箠楚又無計囑何苦歷歷通吐如此所以不能無疑也再押下尉司審實未幾而熊祥出官陳詞遂就尉司取上所押下三名供對尉司自合即時申解郤執留所押下人反申縣乞押下熊祥就尉司根究尉司捕盜官而承勘乃屬於縣道豈有反押詞人下尉司之理此又所以不能使人無疑也及本縣再傳人追尉司承行人監解所押下三名方始解到及三人到縣而所供盡與前日不同又見陳九者羸瘦將死令醫人看驗則十指皆被夾損腳踝亦被椎損問三人前日所以吐供之由則曰危四官人并弓手徐亮黃友綳縛箠打不勝其苦便自誣服非其本情也觀陳九之痕損則箠楚之下亦何求而不得耶此又所以使人不能無疑也又據熊祥供危教授因強奪其山地不得遂欲以停盜之罪加之此邦之人以産業與人正行交易及其起意誣賴則是持出抵當非正行交易也立契交關領錢管業經隔年歲豈得無故謂之抵當陳如圭先以山賣與熊祥今又將賣與危教授乃陳詞於縣以為抵當以此觀之則危教授委是與熊祥有爭山之隙也夫無所爭而論人以停盜猶可言也有所爭而以停盜之罪加人此又甚使人不能無疑也危教授之所恃以論熊祥者但有三人可以為證今三人皆已變其前說則官司何以見其果為停盜乎危教授必欲遍走諸司置熊祥囹圄以重困之張官置吏亦止得據情按法平理曲直又豈敢以罪狀未明之人置之囹圄以快寄居之意乎大抵此間之俗凡居鄉者必須雜用霸道以陵駕鄉閭然後有以自立雖士大夫未免為習俗所移但縣道固難助人為霸道者也熊祥停藏未明押下本保知管牒尉司追捉正賊其陳九及饒細乙兩名到日喚上黃友徐亮輒將陳九毆打各先勘杖六十放僃申提舉使司及使州已具申後因陳夀哩狀經縣陳論稱陳九因被危教授家打損身死乞檢驗造究及具公劄具申後熊謙熊漸共狀欣各居兄熊祥被危教授裝事加誣事奉判于後熊祥之事三尺童子皆知其寃便使真是教唆亦因危教授誣告停藏屈抑不平而發况又未必非獄吏煆錬之詞其奔走憲臺亦求脫免耳情亦可憐况二人乃其弟姪罪不相及恩赦之後使府豈不寬宥特以吏輩抑塞未必為檢舉今既有詞身為縣令不敢坐視備申使州乞照赦疏放又據艾勝狀欣田圭熊祥被危教授計囑尉司弓手圍屋勾追見今大禾成熟乞監割事奉判引差范慶王亨同本保監收割仍别備詞并公狀再申使州曾知府論黃國材停盜轉運司送下黃景信論曾知府誣執其父黃國材停盜事委本縣下州院監勘尋引追上黃國材囚繫而神形鬼狀去死無幾又有黃四李石五兩之贓在州院身死遂亟申州取下本縣醫治遂未見真並稱所供皆出吏手全無實情拖照案據又覆參考乃有大可疑者罪人入獄事雖至微必待推抵而後乃首服豈有數人入獄歷歷吐實如出一口略無異辭一可疑也數人為盜銀官告直數百千阿曾曾指蹤嚮道乃獨得一中衣二可疑也黃國材果停盜則必庇其所停之人今乃自停而自捕之三可疑也樂安縣獄既能使數人歷叙其為盜之跡而繫縲數月卒不得其的實銖兩之贓四可疑也阿曾自首者也郡追阿曾而與之對乃逃匿不肻自出者幾兩月敢於自首而不敢於供對五可疑也阿曾以九月初四日出官未嘗言黃國材停盜黃四之徒十七日至尉司始供留贓以供其主人曾知府幹人乃以十八日經州訴黃國材停盜度其離樂安之日乃十四五間也阿曾之所不言黃四之徒之所未言曾知府幹人何所見而執黃國材以為停盜六可疑也聽獄而有以盡其情雖置之死地而無憾今其可疑者如此又豈可堅執之為盜耶加之平人猶且不可况其繼母之女之夫耶以直為曲以無為有箠楚之下何求不得今觀黃景信初疑曾知府之以書請囑也與吕檜數人互爭以至縣庭事之至微者也吕檜之詞則曰黃四十男為見李元勵未敗乘勢統帶五十餘人直入縣郭各執器仗分屯駐劄作亂謀反公吏百姓不敢行往其敢於誣人乃至於此白晝市廛之中尚敢加人以不軌則昏夜無人之地欲誣執人以為盜尚何憚而不為耶如後之所告者為非則前之所告者可知矣以事迹考之黃國材之在鄉曲决非善良此數人者亦皆破落之徒曾知府之家亦委是被盜顧其所失者不多乃張大數目以眩惑觀聽又買求阿曾以證實其事然後堅執數人加之以為盜之罪卒之的實之贓既不可得阿曾逃匿不敢出官則適以自見其為虛妄也況此數人者使真知曾知府所訴亦不過竊盜耳其事亦巳該赦宥今黃四李石贓證未明死於囹圄黃國材龍二十之徒繫縲者半年幸而得脫死生未可知而生計已蕩然是亦足以快曾將仕誣告之志矣張官置吏亦豈敢曲狥寄居之意而卒置數人於死耶合將各人並押下樂安縣著家知管帖縣根索真贓方得著實六名並召保申轉運使司取指揮仍備申諸司及使州五月初一日準轉運司判下黃景信狀欣曾某誣告停盜事令本縣監勘本縣引上見禁人及拖照案牘見得顯是誣告分明黃國材與曾知府係是親戚平時往來不應一旦如此誣執此是曾知府在鄉平時倚恃豪橫多有不法事件每為黃國材所持以致積怨不知自反乃因小小被盜遂買誘婦人阿曾誣執黃國材地客數輩而因以併及其主人把持樂安縣獄必欲煆錬置之死地本縣既承上司指揮監勘見其委是無理然以其係是寄居之家不欲痛言其無狀且為無辜之人略行開拆已於五月初一日辰時具申轉運司及諸司訖今來曾知府父子慮本縣從公勘斷無以遂其誣告之志矣乃占先復經轉運司妄稱黃國材之男黃景信時復前來本縣謁見先以私意相干其敢於蔑視上司肆行誣罔如此以監司委送尚敢如此把持則其在鄉曲尚何忌憚今觀其前後狀詞一則曰近上寄居二則曰近上寄居此在他人言之則可豈有父母之邦輒自呼為上寄居以陵駕父兄族黨乎黃國材之妻曾知府繼母艾氏前夫之女也在禮繼母如母父母之所愛亦愛之艾氏雖再嫁曾知府之父豈不愛其前夫之女乎況黃國材與曾知府認為親戚情義不薄今乃一旦誣以停盜而欲置之死地則不復有念其繼母之心矣今觀其豚犬不肖之子畫為宗枝圖曾知府之父有九子乃别而言曰四位董夫人所生五位艾氏所生蓋知府欲别其非艾氏所生也如此則真有不母其繼母之心矣又曰繼母艾氏先嫁編氓胡家而生阿胡嫁黃國材為妻編氓云者以其不得齒於士大夫之族賤之之辭也娶所以配身也曾知府自以其父娶編氓之妻則亦自賤其父矣夫為人子而不母其母不父其父士大夫所為恐不如是使古之君子斷斯獄也將以停盜者為重乎抑以不孝於父母者為重乎況如本職前狀申述則數人者決非為盜而黃國材決非停盜者也雖曾知府狀詞皆稱幹人而其豚犬不肖之子亦嘗出官供對然嗾之者乃曾知府也令乃恐其踪跡敗露妄以為黃景信屢來本縣相見先以私意相干又足以見其專以誣告把持為事也今欲乞台判立嚴限下行本州追上自首人阿曾窮究其妄告者為盜之罪追上曾將仕窮究其妄稱黃景信曾來相見之跡如使兩人情願出官所告得實則黃國材自當斷配本職不合與外人交通關節亦甘伏按治如阿曾曾將仕懼罪不出所告非實亦欲乞將曾知府父子申奏朝廷重加懲戒以為士大夫敢於陵駕鄉里者之戒而黃四李五無辜致死之寃庶得少伸於地下矣申本府及諸司曾適張潛爭地使府送下曾安撫宅二承務名適幹人周成并金溪縣百姓張潛并干證人張四九等共六名委本縣勘究買地掘墳事內有陳四一饒大兩名監繫日久羸病欲死已差醫人李才鼎看驗監醫併求陳四三彭六三二名各召保周成張潛寄收尋拖照案牘參酌事情委是曾適妄狀誣賴意在擾害張潛等人今張潛被害己破蕩而干證之人之被監繫病患危篤深可憐念且曾適以掘墳論訴情若甚切然自開禧三年三月估賣園地張潛以錢就買若果有掘墳情節何為當時並無詞訴此其虛妄一也張潛買地之時曽經官陳詞曾適幹人陳先等并鄰甲數人供狀指證皆以為並無墳墓何為曾適略無一詞與之爭辨此其虛妄二也曾適嘗於開禧二年十二月論郭謙侵占屋地屋地之與墳墓孰緩孰急豈有先論屋地經隔兩年而論掘墳此其虛妄三也曽適執出關書登載受分園地有祖墳三所其後所供稱是二女一乳母之墳何其先後之相戾耶豈非自有祖墳恐為人所證故遂亟變其說此其虛妄四也開禧二年正月未抄估之前有曾宅幹人朱端陳詞稱産業係三位均分有硃契砧基簿表照即不言有關書今乃旋造關書以為表證此其虛妄五也關書之末具載曾適今幹人熊冨聽狀印關嘉泰三年曾儒林尚無恙何不為狀首而獨於曾適此其虛妄六也既曰穿關則兄弟三人各有三本今但以一本出官則是本無穿關此其虛妄七也園地得産於智大夫及陳成亦合有上手契字今以其自稱三墳係是淳熙年間恐與上手年月抵牾故遂不敢賫出此契此其虛妄八也買園之時乃是知府尚在之日日涉之名是乃知府宴遊之所既有力以辦宴遊之園獨不能求隙地以葬其殤女乳母而置之園中乃朝夕宴遊於墟墓之間乎此其虛妄九也日涉之園而乃在縣郭之內亦非埋葬之所此其虛妄十也有此十妄曉然易見反覆參考然後知曾適者真橫豪健訟之人也方曾儒林侵盜官綱之時朝㫖行下抄估家産急如星火為子弟者當知乃兄之罪不可逃朝廷之命不可忽傾其家資以輸之可也今乃以已賣發契欺罔縣道又以西升不可賣之産僞稱義遜使縣道官吏日受督責不得已而將别項産業根括估賣張潛之徒既得其産而曾適乃敢脫漏丞㕔僞印關書妄訴不巳今日之訟自始至終皆曾適為之也今省部下行給還産業使人户虛納價錢而曾適坐得舊業亦可巳矣又欲加之掘墳之罪不惟逞其私憾而又欲肆其邀求使張潛之家張六二嘗經安撫使司陳詞臺判以為據所陳請買曾家園節次勘驗則知曾家幹人妄訴不已送本縣照租究實如周成妄狀論擾重行斷治可謂明白簡切而得其情矣今曾適者騎從甚都言辭甚辨進退甚詳雅出入臺府揚揚自得動以權勢脅持上下官吏相顧莫敢豫决若不為之明辨數月之後被論之人不待刑憲而銜寃入地矣所有人案申解使州乞詳本縣所陳先將被論及干證人召保放歸著業仍備申朝省諸司今後曾適更敢妄狀嚴行追治庶幾無辜之民不至被害而健訟之人稍知畏戢曾濰趙師淵互論置曾挻田産使州送下曾濰趙師淵兩家互論置買曾挻田産事趙僉判巳行看定斷還趙師淵管業其曾濰幹人不伏所斷再行論訴使州遂委本縣審定緣本職與曾濰委是二十年故舊恐有妨嫌遂申乞回避再䝉使州發下不敢有違拖照案牘曾濰幹人所以不伏趙僉判所定者蓋亦未得其情趙僉判以為空頭契字乃是曾挻之契再立之契乃曾濰僞契既不曾追出曾挻供對如何見得便是僞契此間人交關亦多有不將正契投印者亦安知再立之契果為僞乎既以再立之契為僞遂併以門僧之書為通同旋寫既不曾追到門僧供對亦何緣見得是通同旋寫又稱曾挻若果得上期錢又不得與别人交關世間將田産重籠交易脫漏人錢物者甚多亦何以知曾挻之必不敢乎不得其情而欲決其曲直亦無怪曾濰幹人之不伏也大抵此訟只要見得曾挻曾與不曾交領得曽濰上期錢耳若交得曾濰錢則業當還曾濰若不曾交得曾濰錢則業當還趙師淵今曾濰之所恃以為已曾交錢者以有曾挻所與三制幹親書耳今以曾挻親書觀之若果曾交得曾濰錢必須言遞到若干錢已交領訖今皆無此語但云所諭旋交一百千省家兄書中且乞更支一半而更字乃經塗改尋繹字畫乃是將先字改作更字又覺更字筆畫係是塗改恐為人所疑遂又多改數字以亂之而不知便改一先字作更字亦不妨其為交錢也曾濰幹人之詞以為交去官㑹一百道而曾挻書中乃作一百千省豈有得人一百道㑹乃自認作一百千省之理曾濰在臨川若於狀詞作一百千省則見錢一百千省無緣擔得到建昌故於狀詞變作官㑹一百貫親書既與狀詞不相合則又豈可執親書以為據乎以此觀之則曾挻實不曾交得曾濰錢無可疑者矣又詳書中所言有田勞經畫之久契字已禀媽媽僉往尊叔可逗留至月初同在著押又言下期錢後月中旬為約曾濰幹人遂以媽媽僉往并下期錢後月中旬為約兩語遂以曾挻為已交上期錢若非巳交上期錢何緣有媽媽著押并何緣及下期錢然以文勢考之曾挻初立空頭契字將此産業託三制幹召人承買曾濰既欲就買遂别立契字遣人先取其母著押曾挻與曾濰為至親故先請其母著押發回而門僧亦有押一字之書然曽挻有月初同在著押之語則實不曾親著押則亦不曾交錢可知矣書之首先言上期錢之太少書之末又慮下期錢之太逺此豈足以為已領上期錢之證乎然則再立之契非僞契門僧之書非僞書但曾挻實不曾交得曾濰之錢無可疑也趙僉判以為僞契僞書故曾濰之幹人不伏然僉判之所定有曰曾挻窘乏急於求售則曾五官人不惟酬價不平又且支打上期錢數不多不肯指揮使用及有其他沮抑所以不願遂别與趙運幹宅交易曾五官人後來知得所以陳詞此數句者可謂盡得兩家心術之微矣曾濰名家之子其所交遊皆當世賢士亦欲改過遷善以克世其家然所以為此者豈亦念祖業之重不忍使他人得之乎或者幹人白起誣賴而非曾五官人之本意乎然不敢以朋友之私情而反以重曾五官人之過也備申使州白蓮寺僧如璉論陂田金溪縣白蓮寺僧如璉經轉運司論金溪縣尉看定薛家陂田不還本寺耕種仍將行者勘杖一百在縣身死所斷不當事送本縣看詳今將案牘參照係白蓮寺論佃客蔣某擅於本院未曾開墾田內彊栽禾稻續係蔣某稱是盧將領宅耕種金溪縣遂將蔣某勘斷又續係盧將領宅於貴溪縣論白蓮寺爭占自巳所栽木又續係盧嘉猷於本州府判㕔提舉使衙論强塞水圳有妨水利遂行下金溪縣丞㕔看定偶金溪縣尉權丞遂將白蓮寺所訟田不得耕種仍將行者某人從杖一百勘斷以本縣丞尉親至地頭必須究見事理合得允當而寺僧如璉不能無辭者則以其間不得其平者有二事其一謂田乃寺田不應不得為主其二謂行者從杖不當今照得上件爭訟本縣縣尉何不索出兩縣干照從實打量若盧家所置薛思惠産不曽推流則不應越港占白蓮之田僧寺之田若畝步見在則亦不應並緣沙漲輒行開墾阻遏水勢如此則不待辨而自明矣今不行打量而憑空便行理斷此不可曉一也盧嘉猷初得於貴溪縣爭白蓮寺之田次則經通判㕔又次則經提舉司爭水圳而帶及田事其前後詞反覆不同此不可曉二也盧嘉猷之田在港東白蓮寺之田在港西若盧嘉猷委是田被水衝沒於東而復生於西亦當經官標扞豈得徑自栽種而反行論訴此不可曉三也又田在港東而論港西水圳又别無干照見得有古水圳處來歷白蓮寺乃有薛家借圳干照若盧家得薛家産亦港西下流則借圳可也豈可訟乎此不可曉四也盧嘉猷所論者水圳縣尉乃不定奪水圳而反及水港此不可曉五也若謂不合將遺洲開田衝破港東之田則栽田者乃盧嘉猷初非白蓮寺之罪何故却將行者勘斷此不可曉六也兩家之訟初爭田次則捨田而爭水圳其終又捨水圳而爭水港及所㮔田以阻遏水勢乃盧嘉猷而非行者乃將行者勘斷一百既欲聽贖斯可巳矣何至必加之杖而使之抑鬱以死乎此不可曉七也觀其所看定如此則其所論田之形水之勢亦恐未能盡當事情提舉寺丞於所申之後判令兩家並不得耕㮔則亦已覺尉司所以右盧嘉猷者太過而未必盡得其實也今已斷者不可復贖已死者不可復生而吏輩受財曲斷其事已在赦前皆可勿問而所爭之田欲乞上司再委官前去地頭體究方見著實庶絶詞訟申都運提舉使衙取指揮勉齊集卷三十二
