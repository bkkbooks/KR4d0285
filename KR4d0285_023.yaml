body:
  text: 勉齋集卷二十三宋黃幹撰啓通兩浙趙漕啓財貨源流之寄孰踰畿甸之尊塵埃箠楚之間無若酒人之賤豈姓名之敢徹冀悃愊之少輸竊以在昔兆民以酒為禮五齊之掌周始列於天官大酋之監秦復著於月令凡祭禮之共賓客之奉皆秫稻必齊麴蘖必時苟為曠職以弗虔毋乃乾􅀈而失德至詩人而有酤我之詠及夫子而有沽酒之文則是懋遷有無奚間今古然皆旨且多旨且有孰不醉言舞醉言歸至於厭棄而不售於人則亦薄惡而不適於口自世已降奚弊不生漢人以米麴三斛成一釀而味不醇唐人以銅錢三百飲一斗而價苦貴遂使天下命士類多空簿之欺市上酒徒稀復醉眠之樂究弊原之自出皆吏道之不修背公徇私見利忘義夜入比舍不辭盜飲之名日醉後園自取廢事之責及課額之不辦則姦計之愈生求善價而沽諸皆市貨之滯者于于然來矣何異餔糟而啜醨望望然去之無復登臺而飲酎間有悉心營職洗手奉公求以自見其長庶幾獲免於戾然木以穴蠧穴深則木何由生水以源長源竭則水何由出有謂通變斡旋之䇿實資聰明仁惠之賢激濁揚清興壞補廢恤其有無而究其實憫其卑賤而通其情庶疵賤之微官得展布其四體求之於世今見其人恭惟某官實大聲宏行高能巨歆向之學博雅該通賀白之文溫醇典麗蚤攄素抱俯拾巍科揚厯滋多聲稱甚籍悉心州縣屢興襦袴之歌䇿足班聨自結冕旒之眷即正秉鈞之任尚淹挽粟之權有巴蜀之轉輸始見鄼侯之績非江淮之漕運孰明劉晏之功奏課朝聞璽書夕至幹迂踈無學局促不才瓠落半生偶叨一命蹉跎十載備涉百艱齒髮侵尋神識凋耗自合退歸於農圃豈宜復玷於縉紳家無數十畝之田身有二百指之纍既飢寒之未免於仕進以難忘智類挈瓶自知無用職當滌器猶恐弗堪得君子以為歸則官針之可免豈期幸會獲𨽻按亷雜居庸保之間惟有鞠躬而盡力仰賴帡幪之庇尚蘄藏垢以納汙通提領所董主管啓酒政軍須之是仰要須賓幕之得人名賢民望之所推遂使才能之贊畫豈期寒賤亦託帡幪未諧望舄之恭敢後修詞之敬恭惟某官器宏識遠學廣聞多人傑地靈盡挹湖山之清淑儒宗世業久識師友之淵源俯拾巍科浸登膴仕以經術飾吏治以豈弟得民情臥轍攀轅籍甚虎城之譽依渠泛水來為鳳闕之遊十五州財賦之浩穰百萬衆營屯之仰給為諸侯之客才立事智造謀近天子之光朝奏書暮召見幹稟資甚陋賦分多竒乃以甚貧之家而有至重之纍冒居極陋之職適當極弊之時雖勉竭於疲駑卒難逃於曠敗尚依仁庇俾逭官針何自而忘未快白日青天之覩自今以往庶無震風凌雨之虞通提領所豐提屬啓上幕得賢之重易地皆然卑官賴庇之榮自天而下趨承伊始喜幸何窮恭惟某官才識俱長人門並壯先朝忠槩追事業於簡編近世名卿熟見聞於耳目世濟其美人皆曰賢果發藻於儒林遂蜚聲於宦海青氊故物合陪紫禁之贊襄緑水清遊始佐皇華之畫諾不畏強禦有公是非與其枉尺而直尋孰若捨彼而從此聲稱籍甚眷注彌隆不容坐席之溫佇奉詔環之寵作諸侯之客自應事舉以言揚近天子之光是宜朝奏而暮召幹賦性蹇拙涉世迂踈落落五十年已甘間散嗷嗷二百指尚苦飢寒惟言簮紱之甚榮孰識塵埃之可畏儻非庥庇難免曠鰥自昔閩山幸託棠隂之蔽芾豈期秀水復叨厦屋之帡幪欣詠以還敷宣罔既通嘉興知府啓以酒為名昔獲天官之屬分肆而市今居邦域之中幸陪下吏之聨敢後柔緘之貢恭惟某官材高器遠學廣聞多氣鍾雲夢之英澤吞八九志逞南溟之運水擊三千蚤擢第於儒林遂蜚聲於寰海自結冕旒之眷晉升鵷鷺之班幹庸陋不才迂愚無識蹉跎半世偶叨一命之微荏苒此生備涉百罹之苦合投身於壟畝尚抗首於塵埃家無瓶石之儲身有妻孥之纍指四方而糊口寧敢安居為五斗而折腰誰知無米所冀曠鰥之免敢惟溫飽之圖幸甚依仁庶幾免戾無襦今袴人歌太守之恩飲酎登臺客嘆卑官之幸謝兩浙漕司送錢啓竊祿無功復拜金錢之賜感恩知幸如叨華袞之榮輒述寸誠敬陳尺牘竊以官分品級事無等差皆當竭力以盡心庶免素餐而尸位揆諸物類雖雞犬而有所司質之聖言則牛羊亦求其壯苟性靈於物而偷安適己才劣於聖而濶視高談以汨沒州縣為勞人以稽考簿書為俗吏則食焉而怠何其免圬者之譏任既不勝亦無怪梓人之怒故官針之是守皆吏職之當為豈曰難能足膺厚錫如幹者才非適用學不逮人落落五十年益嘆儒冠之多誤嗷嗷二百指庶幾廩粟之是縻與其因偷敗事因貪敗名孰若以亷求安以勤求飽乃至奔馳於兩庫固惟竭盡於一心自冬涉春深愧代庖而越爼以新易舊豈宜攘臂以下車方陳控免之情忽奉寵嘉之命出於非望得之若驚伏遇某官仁禮存心謙恭接物樂於下士有握髮吐哺之風惠以使人得解衣推食之意遂使庸愚之賤亦蒙錫豫之恩幹敢不勉竭駑疲力圖稱塞守清白傳家之節為辛勤報國之誠廣厦千萬間幸假歡顔之庇畏途九折坂甘為叱馭之驅謝兩浙陳運使許薦啓尸祝無功復忝代庖之責伶官至賤亦叨錫爵之榮往昔所無吏民共駭竊以位髙而易墜勢卑而難伸齊禮牛角之歌燕感駿骨之論埀之往牒是為美談要必真有用之才乃能當非常之遇如幹者識非涉世學不逮人抱關擊柝姑以為貧毁瓦畫墁難以求食惟究心於辦職庶竊廩以偷生豈期錫賞之至三又俾侵官而兼二知已難值捐軀不辭當光華臨按之時正官吏戰兢之際忽寵頒於台翰復拜賜於金錢憫其寒微許以甄拔趙文子舉管庫之士晉叔向聽堂下之言不謂古風乃見今日伏遇某官英猷經遠雅望鎮浮於大賢何不容占小善率以録竹頭木屑馬勃牛溲咸預兼收未嘗輕棄遂使廛埃之賤輒蒙禮貌之優幹敢不益厲素心勉殫駑力食祿者當任其事感恩者必竭其勞庶幾晚景之桑榆遽變春風之桃李豈惟攬轡冀不忘推轂之言行即秉鈞亦願作在鎔之器回崇德吳尉啓採鄉曲之譽不勝仰德之懷在邦域之中遂有依仁之幸忽魚書之寵賜知騎氣之鼎來感與愧并得諸望外恭惟某官材高識遠學廣聞多氣秀儒林擅斗南一人之望名高仕版策天山三箭之勳自應密勿於廟堂尚復徊翔於州縣惠必期於澤物官何嫌於近民佇聞課最之登即聽交章之薦幹稟資甚薄賦命多竒半世蹉跎已甘間散一官蹭蹬尚苦飢寒方興張頤待哺之思復起折腰無米之歎尚賴仁賢之誨頓寬寂寞之憂報匪瓊瑶姑謝撝謙之辱音毋金玉行修請益之恭通屬官啓紅蕖緑水久欽入幕之高風白首青衫來作當壚之賤吏仰託帡幪之庇敢稽簡牘之修恭惟某官學廣聞多行高識遠儒林奮迹豈惟數萬里之鵬程仕路剸繁不但十九年之牛創合厠論思之選尚淹畫諾之遊揚歷滋深聲稱甚籍錢流地上收飛芻挽粟之功身在日邉有朝奏夕召之寵晉登華貫俯穆師言幹局促不才迂愚無學蹉跎半世偶叨一命之微荏苒十年備歷百罹之厄合收身於農圃尚投迹於塵埃蓋將糊口於四方但有折腰於五斗雜居庸保惟知竭力以盡心尚賴仁賢曲賜匿瑕而藏垢通孟主管啓計臺重寄職分亷按之權委吏卑官身處塵埃之役趨承有日感幸自天恭惟某官雅量鎮浮英猷經遠文之以禮不徒公綽之成人養之以剛豈特施舍之守氣究其學問端有源流教傳三徙之餘道守七篇之舊晉楚之富不可及也豈若以吾義以吾仁管晏之功可復許乎非但其君顯其君霸踐揚滋久譽望寖隆宜自致於要津庶盡攄於素抱平分風月人皆屬意於竹符坐對湖山公獨甘心於蓮幕雖高懷之難企於輿論以未伸課最朝聞璽書夕至借方寸之地力輸削草之忠近咫尺之天行即持荷之選幹迂踈無學淺陋不才濩落半生偶叨一命蹉跎十載備涉百罹齒髮侵尋神識凋耗自合退還於農圃豈宜復玷於搢紳家無數十畝之田身有二百指之纍既飢寒之未免於仕進以難忘智類挈瓶自知無用分當滌器猶恐勿堪得君子以為歸則官針之可免豈期幸會獲與使令雜居庸保之間惟有鞠躬而盡力仰賴仁賢之庇庶幾藏垢以納汙通程主管啓計臺重寄獨顓幕府之權酒正卑官獲執𨽻人之役依承有日感幸自天苟稽尺牘之修曷展寸心之敬竊以庫名犒賞實助軍須身為監官當辦國課管𣙜之任無異於昔財貨之匱莫甚於今居是職者不得其人委其權而悉付之吏出入不謹貪冒是聞雖足苟朝夕之安何以免譴呵之辱間有悉心營職洗手奉公求以自見其長庶幾獲免於戾然上下不相應而情實不得通職雖領之使臺治實寓於他郡寧復相關之血脈殆猶無用之贅疣至使州縣之猾胥與夫鄉曲之豪縱皆得抑其志而使不得騁乘其隙而動欲見擠縱有薄能曷圖微效深察源流之故必資仁惠之賢憫其卑賤之易搖察其疏遠之難達有訴必省有謁必從則夫𣙜酤之至微雖或庸愚而可辦恭惟某官源深流遠實大聲宏挺挺人門蔚有乃祖之風烈洋洋器量卓為當世之表儀大受不可以小知長才猶難於近用踐揚寖久譽望益隆非朝陽無以來鳳凰之鳴非南溟無以適鵾鵬之運暫作諸侯之客式觀王國之光近咫尺之天名徹冕旒之聽借方寸之地力輸肝膽之忠豈惟賤吏實賴於帡幪抑使善類悉歸於陶鑄幹迂踈晚學么麼庸才半世蹉跎合退安於壟畝一官猥瑣祗自困於塵埃雜居庸保之間坐計錐刀之利以庸繆之資而當繁劇之任以敗壞之職而求尺寸之功儻所願之獲伸雖至勞而敢憚豈期幸會獲備使令斂板造庭愧未有摳趨之日鞠躬盡力庶勉圖報稱之忠謝兩浙詹漕薦啓東西十五郡屬當孟博之登車官吏千百人咸望鄭莊之推轂豈意剡章之辱乃先管庫之卑承命易驚撫心甚恧竊以薦士非難而難於下白屋之士求知非難而難於辱大賢之知故燕昭市駿骨而諸侯之客始歸顔淵附驥尾而萬里之名益顯如上以請託而舉而下以貴要而趨則得之若無榮反益愧然以卑官之冗賤乃獲公名之薦揚苟非學行之素充當亦才猷之可採如幹者才非適用學不逮人蚤嵗父兄誨以傳家之清白平生師友勉其刻意於丹鉛志不篤而業不精年益老而身益困自合甘心於農畝豈宜厠迹於搢紳屈指平居幾見韲鹽之不給庇身寸祿敢云麴蘖之為卑處之固已甚榮外此敢有他望夫何脫毛遂之頴又獲登李膺之門往昔所無里閭共駭兹蓋伏遇某官量涵淵海智燭蓍龜泰宇清明白日青天之在望德容溫粹春風和氣之襲人持心悉本於公平接物無分於貴賤以為不龜手之藥或濟於世須當知扣牛角而歌未忍以人廢棹自百僚之底賜以一字之褒幹敢不益勵初心堅持晚節陳篇誓報不敢為世俗之佞言律己居官惟無負聖賢之明訓通江陵府教授啓閭閻小子喜聞兵輩之言搢紳先生獨道詩書之事敢因宦學敬拜師儒恭惟某官德粹而醇業通以博談經馬帳諸老所未能言發䇿漢庭一第亦直溷子乃推所藴以淑諸人遂令蠢爾之蠻荆莫不翕然而鄒魯文章典雅追屈原宋玉之風問學淵源悅周公仲尼之道獲聆盛事實快夙心幹質本庸愚學尤迂拙兩年試吏甕盎投身千里修途塵埃滿面願極聞於謦咳以大振於昏𡨕倒廩傾囷儻與門人之列息黥補劓終從長者之遊回臨川陳主學啓塵埃箠楚日懷製錦之慙禮樂詩書天假摳衣之幸方首圖於問政愧先辱於貽緘恭惟某官行粹而醇業深以傳宏才偉量太丘遺風麗思雄文後山嫡嗣自蜚聲於璧水屢擢秀於儒林盍陪東觀之校讐乃屈南荒之征𣙜當公道開明之日正高賢登用之時鄉校主盟固足慰青襟之望朝家汲引行即看紫綍之頒幹學不知方仕尤拙滯蹉跎半世偶得一官禍患十年始霑寸祿未遂丘園之雅志忽蒙臺府之誤知乃以小才付之大邑未操刀而使割若涉水以無涯尚賴師儒言提其耳庶幾民社無愧厥心謝江西王提舉薦啓銅章受察乏撥繁剸劇之才玉節按臨抗激濁揚清之志夫何甄拔猥及庸愚流傳忽到於人間感激已踰於望外竊以風俗大弊孰甚義利之不明薦舉一途馴至上下之俱失富貴者人之欲亷耻者國之維自奔競之習既滋而羞惡之端寖泯脅肩諂笑搖尾乞憐有鄙夫之不為雖君子亦未免取之者隨時而馳騖與之者視勢而低昻專布私恩絶無公議至有不求而自得與夫既舉而不知此當望於古人之中要難施於庸流之表如幹者心期甚短學術無竒早嵗父兄誨以徐行而後長壯年師友厲其處分以甘貧既不能自奮於精力強盛之時又寧忍躁進於齒髮衰頽之日一行試吏三奉辟書愧無尺寸之長始為升斗之計朅來百里比及三年資淺而望輕訟繁而民雜恤貧安富詎敢有偏守法奉公但求其是奈勝心之滋熾肆讒口以居多市虎屢至未免或疑秋鶚一書胡為而上靜而有守拙性所便直而不阿戅懷難克旱魃警用刑之酷螟蝗戒為政之貪不辭奔走之勞難免譴呵之及豈意匿瑕而藏垢乃蒙棄短以録長兹蓋伏遇某官識量過人精忠體國冰壺清鏡是非悉付於至公砥柱中流靜定不搖於徑力坐令猥瑣亦預選掄在大賢無望報之私於小吏有難酬之德幹敢不激昻晚節刻厲初心躬駑馬十駕之勤詭鉛刀一割之效陳篇奏記耻為世俗之諛言律己愛人願守聖賢之明訓謝撫州陳守薦啓百里馳驅祗奉周家之條教一封奏徹亶為京秩之權輿褒拂之舉有加特達之知曷稱竊以富貴者人之欲羞惡者義之端古人行道未嘗求知後世盡職庶幾有遇逮俗之末惟利是趨乞其餘者無異墦間望而罔焉何殊龍斷欲求投足舉手之力必為脅肩諂笑之容若夫稟質之迂愚加以賦分之竒蹇既無以借王公之譽又不忍決性命之情乃思附翼以攀鱗何異挾山而超海如幹者受材甚拙涉世多艱一生燈火之勞闊踈無用兩鬢風霜之晚荏苒何為誓將求老農老圃之師誰敢望大邑大官之庇役役於塵埃箠楚汲汲乎期會簿書學已負於前修政有同於俗吏趨風率職海山何賴於涓埃渴雨經時田野未安於寢食儻自忘於罪戾敢有冀於薦揚殆速譴呵毋復亷耻豈意不龜手之藥與夫扣牛角之歌雖曰無心亦從知己兹蓋伏遇某官度包海嶽義薄雲天君子容衆而尊賢夙推德量宰相量長而較短克紹家聲不為權勢之所搖尤以奔競為可厭斷以獨見拔之庸流十六字袞黼之榮實為未副千萬里門庭之遠名乃上聞有是遭逢莫為稱塞幹敢不激昻晚節刻厲初心躬駑馬十駕之勤詭鉛刀一割之效陳篇奏記不敢為世俗之諛言律己奉公願恪守聖賢之明訓謝江西胡漕薦啓驛騎載馳俯頒雲翰鶚書剡奏仰扣天閽既不敢陳鬷蔑之言又未獲執李君之御胡然望外意者夢中竊以薦舉之道以公不以私仕進之方謀義不謀利凡古人之所守皆天理之當然上無徇勢以市恩下不貪榮而希寵彼此俱全於大節是非敻出於常流兹道寖微逮今尤甚禮辨於登門之疏數情分於通問之後先脅肩諂笑誇以為能搖尾乞憐忘其自賤操心若此報國謂何如幹之愚與世尤戾彈冠筮仕初乏寸長據案臨民難甘尺枉獨念閭閻之休戚有關宗社之安危此心不憫於人窮何面輒叨於君祿始循拙政見謂癡兒要無愧於俯仰之間亦奚恤於異同之論大賢所𨽻庶獲知音鄙性無庸豈宜自鬻敢期寒谷不礙陽和求匪待於童蒙遇乃叨於國士書藏十襲字抵千金潢潦無根顧謂源流之有自蚊山重任剛言劇易之兼長被溢美以若驚恍莫知其所本兹蓋伏遇某官清姿邁往逸度昻霄得淡庵衣鉢之傳開韓公晝錦之兆乘軺挽粟推轂薦賢遂使妄庸猥蒙褒借幹敢不激昻晚節刻厲初心躬駑馬十駕之勤詭鉛刀一割之效陳篇奏記耻為世俗之諛言學道愛人恪守聖賢之明訓謝江西章提舉薦啓課三載之績無善可稱辱一字之褒為榮已甚兩叨薦拔倍切凌兢竊以天生此民君為司牧張官置吏碁布星分登能選公寸量銖度惟進賢可以報國苟舉枉何以服人眷言耳目之官實握權度之柄持至狹之斤削馭至衆之英才不惟難以獲薦薦者亦難未有得者不求求乃可得故驅馳於宦路多湛伏於選場孰誤我公首及於幹自慚鄙拙見謂迂踈慨慕前修屠龍無用俯從流俗刻鵠不成雖屢困於窮途卒難忘於故步塵埃汨沒嵗月蹉跎知伯玉之非耄其及矣覺淵明之是去將安之迫於啼號始此奔走數瓜期之且至夢松徑以將歸七寶浮圖合尖誰望萬間廣厦大庇焉依反復揄揚終始成就學不窮於閫奧文未探於菁華以法為師視民如子皆願摳衣敬請先生之教庶幾磨礪不為小人之歸胡然品題逮此庸瑣壯也不如今老矣曷稱所蒙一謂之甚可再乎敢忘其自兹蓋伏遇某官文雄璧水道冠蓬山挹麾衡嶽之陽播甘棠勿剪之詠持節大江之右振皇華咨度之風掄才無間於菲葑獲善有如於璧玉遂令朽質亦預薦書近水樓臺最先得月窮冬草木頓覺回春幹敢不奮激懦衷摩挲老鬢觀大賢相豫之至此信平生所學之不差陋巷雖貧讀書補過清朝不棄徇國忘身賀福建張漕啓渙奉宸綸晉更使旨激西江以活涸轍之鮒所嘗及者十一州徙南溟而運埀天之鵬又不知其幾千里按棲鸞之舊治耀晝錦於故鄉公雖恬然不見其榮人爭覩之以先為快恭惟某官天生賢佐世濟精忠萬古家聲應不在巡遠之下一門秀氣豈復論荀陸之儔入相天子而管樞衡出將王命而馳原隰均之體國皆足庇民暫辭蓬萊方丈之遊歷覽衡嶽康廬之勝君遣之以禮樂遠有光華人自得於湖山令修庭户姦強斂戢窮弱歡呼然非歷試無以顯其器之全非治煩無以表其才之巨一星斜指祥移翼軫之躔六轡載馳風動甌閩之路部屬分於八郡産最薄於四州所謂利源全資鹽策惟亭户常貧黠吏常富故私販日熾官課日虧重以名次之太艱愈使綱運之不繼欲更宿弊實藉通儒至於獄訟之浩繁與夫郡縣之欺慢聆其已試孰不潛銷管晏斡山海之饒莫能過也吕范侈衣冠之盛行即見之幹自揣妄庸受知最厚剡鶚書而屢奏歎猿臂之數竒有宅一區未辦子雲之歸計去家千里復尋元亮之漫遊及瓜尚隔於再期種菊姑安於三徑忽聽易軺之命不勝折屐之情俗吏之期會簿書未諧稟令門人之灑掃應對敢不盡心通江西提刑啓鼎來丹詔晉陟皇華二千石以最聞佇公卿之漢選十一城之地大耀禮樂於周原號令素孚風彩丕振恭惟某官高明秀整謙厚粹和文章足以名家炳如日月節義見於傳世凛甚冰霜泛侯國之紅蓮挺王臣之喬木鵷序方期於大用虎符遽斂於偏方江淮之草木知名久安德化潢池之甲兵徹警已茂勳庸虎城安靜柝之秋燕寢樂凝香之晝九重注想四牡歌功維昔兩邦摩撫盡袴襦之詠厥今一道澄清張繡斧之威民喜得公刑以弼教圜扉鞠草旁推聖世好生之心禁殿持荷盡見儒者有用之學幹少知為士晚始得官齒豁頭童自甘間散足穿肘見未免啼號曩懷製錦之羞敢課鳴絃之最豈期脫選復此字民金水一來適當凋弊之後鉛刀再割不無缺折之虞眷言此邑之吏民尚守昔時之條教但知恪意或可庇身滿目江山猶覺棠隂之遺舊託身霄漢更欣樾蔭之方新頌詠之私敷宣罔既通江西提刑啓光奉宸綸榮遷使旨望隆二千石至今猶奉於教條刑按十一州豈謂盡歸於亷察雖再分於符竹復就攬於轡絲山嶽動搖吏民呼舞恭惟某官天生賢德世濟英才籍籍家聲應不在機雲之下巍巍望閥寧復論吕范之儔慶纍葉以承休趨七階而出仕管庫一聞於小試入幕屢顯以能聲贊寅清而列屬奉常任勿憸而庀司廷尉把麾淮甸再騰襦袴之歌易鎮江城兩播甘棠之詠禽鳥知太守之樂草木聞刺史之名非治煩無以表其才非歷試無以顯其器踐敡滋久簡注彌深因臥轍以請留俾乘軺而更治謂洞獠甫平而民生未復犴獄多滯而吏惡久盈尚煩霹靂之威更藉撫摩之手雖外憲非公而孰寄然大任舍我其誰歸會即拜於詔環恐未溫於坐席暫持繡斧頓令獄訟之平行復青氊益侈衣冠之盛幹學非適用才不逮人壯嵗蹉跎已灰百念半生坎壈偶得一官孰云製錦之無傷乃使操刀而再割固知不缺而則折但欲補拙而以勤得君子以為歸則官針之可免固嘗沿檄得遊賢父子之間孰謂效官尚託舊師帥之庇財賦殫匱困於追呼豪猾縱橫見之訟牒人皆畏之而不顧公幸知之為最詳獲預按亷實為幸會教誨飲食敢忘前日之話言期會簿書願緩今朝之轡䇿通江西王安撫啓計臺飛最制閫宣威玉節觀風但覺事權之寖重珠簾捲雨不妨景物之相安山川不移風采益著恭惟某官聲名足以肅姦暴學術足以經國家砥礪亷隅毅然秋霜烈日成就器質溫乎和氣春風能稱飛宦海之英大節見朝班之峻民無寃者得廷尉持天下之平尹兹敬哉信長安為教化之本卿月獨明於霄漢使星分照於江淮道上埋輪寒甚梟狐之膽闕牙大纛新榮北闕之恩緩帶輕裘重納西山之爽第方咨訪難鬱老成人方樂於湖山令自歸於禁闥幹迂踈太甚結約無竒齒豁頭童自甘間散足穿肘見未免啼號念財賦之寒酸與頑豪之獰惡不有雲天之庇難逃機穽之憂千里畏途敢憚駑駘之力萬間廣厦不勝燕雀之情謝史丞相啓六曹管鑰之司方拜誤恩之及千里籓籬之重遽叨二郡之除悉由大造之矜憐遂使孤蹤之振拔既難稱塞但切兢惶竊以壽春當戎馬之衝淮右號咽喉之地粵經蹂踐遂至凋零十室九空痛流離之未復四郊一望嗟田畝之多荒城池僅可以肩摩兵卒殆同於兒戲儻欲固封疆之守庶幾無枹鼓之驚非強明兼文武之才與少壯喜功名之士則何以籌思邉計關決郡條苟徒務於欺謾乃全無於事實力小任重意廣才踈但謀高爵以肥身不恤虛名之誤國有虧忠義難免譴呵如幹者眇眇腐儒空空小器少無立志長不逮人術業迂疏已乏科名之伎生涯牢落亦無農圃之能念百指之啼號藉一官而奔走間關州縣荏苒嵗時簿書期會以粗勤勇力權謀之未學加以多艱涉世竒疾纒身深思賦分之窮方起投間之念敢圖矜軫忽被使令兹蓋伏遇某官學貫天人器涵海嶽建久安之勢成長治之業功在立談開中正之路杜群枉之門道推先覺措四方於磐石轉萬類於洪鈞迄令遲暮之姿亦預甄鎔之數幹敢不力扶憊體勉竭愚衷恩重身輕固已甘心於溝壑神疲形瘵但知託庇於雲天傾頌徒深敷陳莫既通淮西李帥啓推禮樂詩書之習坐玉帳以宣威脫塵埃箠楚之勞伏星屏而聽命昔忝封章之薦今修屬部之恭行或使之望不及此恭惟某官氣涵剛正識達幾微勳業萃於一門實難兄而難弟才猷兼於衆智信允武以允文內外踐更聲稱益著合調元於百揆尚作屏於十連翼軫星分光射斗牛之上江淮壤接名聞草木之微當干戈甫定之餘正瘡痍未瘳之日散強梗貔貅之卒集流離鴻雁之民朝寬顧憂人忘敵至借留深切始少徇遠方赤子之心虛左以須當大慰斯世蒼生之願幹少無立志老不如人學術迂踈已乏科名之伎生涯牢落亦無農圃之能念百指之啼號藉一官而奔走但知律已豈敢言才誤名勝之推揚致廟堂之甄拔俾之朝迹二彼邉州雖力伸香火之祈其敢怠簡書之畏斥單車而遠邁望會府以前趨省已摧頽難任驅馳之責量能進退不逃亷按之明通淮西錢漕啓諸老凋零賴有中流之砥柱一生欽慕殆猶迷路之南車忽乘邉障以佐州乃𨽻使臺而聽命敢慿尺牘敬寫寸誠恭惟某官識造淵深氣涵剛大詞根於理不徒誇舉子一日之雄道探其宗直將紹往哲百年之緒推其餘以經世隨所寓而著聲世方學圓人皆嗜進慈祥所發寧甘心於州縣之間正直自將不肯安於朝廷之上年彌高而學甚苦任愈重而氣不衰議論之確既足以折羣邪著述之洪又足以扶皇極沿淮數千里方莽為盜賊之區弭節一二年皆晏若桑麻之壤信儒者之效無間於中外而君子之論當先乎本原公道益開正人迭進評推月旦自應不愧於梅溪詔下天庭行聽直躋於槐路幹少無立志老不逮人術業迂疏已乏科名之伎生涯寥落亦無農圃之能念百指之啼號藉一官而奔走但知律己何所取材六曹管鑰之司方拜隆恩之及千里藩籬之重忽叨二郡之除已力祈香火之緣又復念簡書之畏叱單車而于邁望列戟以為依省已衰頽不足任驅馳之責量能進退端不逃亷按之明通安豐郭守啓才猷間出久欽貫日之忠衰晚無庸行遂披雲之願敢云佐理庶獲依仁恭惟某官學廣聞多識高器遠文章議論得諸家世之傳事業功名卓爾天資之茂合與闕庭之論尚甘州縣之勞中外踐更聲稱藹著剖淮邦之竹要須譽望之久孚綰鄰邑之銅遂擢蕃宣之重寄眷知已篤委任尤専益攄韜略之竒庸壯金湯之固華夷安堵永無擊柝之虞廊廟疇庸即聽持荷之選幹少無立志老不如人學術迂疏已乏科名之伎生涯寥落亦無農圃之能念百指之啼號藉一官而奔走但知律己豈敢言才誤名勝之推揚致公朝之甄拔俾從縣紱來奉教條固知事大夫之賢或可竭愚者之慮奈沉痾之已久懼寸祿之難酬已伸香火之祈尚念簡書之畏叱單車而于邁望列戟以前趨儻遂歸休亦不失瞻承之幸如乖素願尚有資覆護之恩通江東紫漕啓理義不明人心為之陷溺英賢間出世道賴以扶持久勤欽慕之私今獲趨承之幸恭惟某官懷竒負氣篤志力行道本諸身不學腐儒之陋習德施於政豈徒俗吏之能為禁偽學以方嚴名他師者皆是確守羲文之象數自稱伊洛之源流進以立朝推忠誠而佐后出而乘障仗恩信以服人逮北敵之既衰倚西方而為重下繫羣心之屬望上寬當寧之憂思皆足庇民均之體國若幹者火坑幸脫縣譜重尋六十嵗衰瘁之餘宜聞招而裹足二百指啼號之纍姑為米以折腰况當纍政蠧壞之餘加以羣豪獰惡之素咸謂此行之必敗豈期當黜而反升司六部之門濫厠中朝之迹佐二州之政誤叨半刺之榮方脫諸危穽之間又寵以專城之寄荷隆恩之沓至揣微分以若驚蓋清時不次而用人乃更化以來之盛事然此非有科名之優則必有閥閲之舊非有功能之異則必有行義之高苟四者俱後於人亦萬無可得之理夫何遴選乃及庸虛兹蓋伏遇某官學紹帝師家傳相業不以夢不以卜勳緒著而譽望隆驗於天驗於民年榖豐而邉陲靜猶且取材於數路無非用意之至公凡拔諸州縣冗散之中悉出於造化生成之內故兹嵬瑣忽預使令幹敢不勉䇿愞庸強扶衰憊飲朝宗之水忠誠堅報主之心登大别之山飢溺體為民之意庶殫駑力少答鴻私賀劉尚書仲則啓光膺宸綍晉長冬官位升八座之尊職贊萬幾之密善類增氣薄海具瞻矧兹屬吏之微復忝世契之舊欣聞除命倍切歡愈恭惟某官德厚而量宏道高而識遠搢笏埀紳而朝綱自肅輕裘緩帶而制閫增隆自應即正於鈞衡庶以永綏於宗社制書沓至旦暮可期幹逖違台躔甫十閲月仰高深切晉謁實疏以衰老之軀當牧養之寄適時旱暵種不入土米價踴翔細民窘匱加以制漕之交鬬難乎州縣之奉承益思向日趨事之時真得大賢鎮撫之體未嘗變容而動色自然畏德以懷威投老無庸亟上香火之請卑誠未達孰伸井壑之情尚冀寬慈曲埀庇護俾全晚節以終餘年仰瀆威尊不勝皇懼更乞權衡六氣金玉五官佇膺麻綍之宣即拜金甌之命勉齋集卷二十三
