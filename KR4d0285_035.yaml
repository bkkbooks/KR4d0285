body:
  text: 勉齊集卷三十五宋黃幹撰雜著帖軍學請孟主簿充學正守令之職不惟治獄訟理財賦正欲崇學校養人才使教化行而風俗媺漢陽為郡湖山之勝竒秀清絶江北之俗質實渾厚當必有瓌偉傑異之才彬彬輩出厯考圖志未有聞焉則亦司宣化之任者曠其職耳漢陽知縣暫攝教官固知以教導為急然邑事叢委不得朝夕與士友講貫故士友之來學者聞鼓而集㑹食而散絃誦之聲終嵗寂寥如此而望人才之成就亦難矣竊見前漢陽孟主簿老成耆學直諒多聞帖請充軍學有官學正專一在學兼教導職事仍請條具學中合行事宜與教官商議自新年為始日請在學生員赴學習讀遇夜宿齊日書所習課程以俟稽考庶幾日益月進業廣德崇以成一郡風俗之美案帖請仍關軍學照㑹行下軍學為申請增俸錢帖學校養士本是美意為郡守教官者不知以道義訓誨諸生但欲增添俸錢增置學産以取士子之才譽所謂教養之義安在哉况此一項錢去嵗九月王知軍已被均州之命則漢陽軍錢物均州太守不應妄行支破陳知縣輒行陳乞王知軍亦復聽從官司錢物盡是百姓膏血豈是官吏得以妄行支破沽譽干名據學司齎到簿厯對算每月百五十貫㑹子支破尚有餘剩又何用再支五十貫㑹子職事貟數朝廷自有著令今增置至數倍亦有足跡不到學校而遙請月俸者官司又何忍以生民膏血充此無用之費哉天下事惟求其是若海事合理俯仰無愧人自心服若但欲以錢米買士人之唇舌可謂無識之甚者當職不敢曲狥此請帖教授照㑹仍請勘職事不在學虛請俸錢者並請削其籍具姓名申行下軍學罷職事二員帖學校則有禮義官府則有法守二者常相為用而不可廢農處於田工處於肆士處於學理也今職事之額甚衆而學校之絃誦寂然此於理巳有未安况又捨而他之但月費俸錢而巳於理安乎理所不安學校官府皆坐視而不問則非所以遵禮義而顧法守也假令為職事者皆援此例皆捨學校而虛請俸錢又豈設學養士本意哉劉王皆此邦士類之秀者教官尤宜護惜毋使之受此非理之俸是乃愛之以德也行下軍學申嚴釋奠事釋奠大祀禮當嚴整本軍循襲蕩無規矩行禮之際吏卒頻來笑語略無忌憚行禮方畢搶奪蘆席及祭餘果子之屬本軍失於禁戢學中亦不申舉今巳無及來春釋奠須備榜約束仍先關閉後門不得往來專帖都監門學守把吏卒不得無故入學帖軍學照應施行勸奬賑濟官李監務牒李監務雖是西班其敏於事如此行下未半月發去錢未十日戶口抄劄貧富巳曉然又巳糴麥分團賑濟其為慮又周密皆老僕所不能及若留心如此兩鄉之民必無流離饑莩之患矣敬服敬服公庫送錢三十貫酒四瓶各七升虞候齎呈諸㕔望各留意一郡百姓幸甚沌口監鎮講說此事巳兩月並不見抄劄戶口仍牒催再除知安慶府行下本府牒照得當職於今月二十日凖制司牒備凖尚書省劄子令仍舊知安慶府除巳一靣擇日起離前至池州所有逺接新官儀料等物如人從衣衫之類一物一儀並請寄收軍資庫不得妄有支動凖備後來接新官用免被虛費官錢當職目今起離係就建康府差借人從荷轎仰本府並不須差人前來迎接虛破請受但差承局兩名前來池州探候消息仍未須差雇渡船以致騷擾衙宇並是依舊不須糊飾亦不須置辦備宅等物當職只是單騎前來仍不許虛破一文官錢須至公文勉齊集卷三十五
