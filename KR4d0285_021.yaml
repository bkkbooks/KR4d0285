body:
  text: 勉齋集巻二十一宋黄榦撰序送陳元平宰邵武序陳君以英豪邁往之氣少以功名自許熟於民情軍政之利病與之語亹亹不倦老吏宿將歛衽畏服而獨喜與世之守章句語道理繩趨而尺步者遊苟誠其人不間爵齒必詘首下問此豈非其本心也哉世率以果敢㨗給病陳君而戒以靜重詳審予以為人患無志耳士固有志於聖賢之學而為氣所勝未能遽易其習尚之偏者然志氣之帥苟有其志氣亦安能卒勝之耶人之氣禀固有剛柔之異然剛者易折而柔者難扶安知前日為吾病者不反以賛吾今日自治之决耶陳君於吾道汲汲向慕而才豪氣剛尚有持尺箠取中原之意抑豈不能自治其氣禀之偏耶靜重詳審之言予將有考矣陳君今為邵武令一日過門而别曰我行矣子亦有以語我乎予於陳君為後輩且駑劣不足與語而猶若是則其志可知矣予嘗聞邵武有故尚書黄公終日正容危坐視其貌若無以異於常人聽其言呐然如不能出諸其口一旦立便殿上與天子相與可否凜凜然不可犯君今訪諸鄉人而式於其閭其亦有所感也夫春水𣺌瀰兩涘之間不辨牛馬而霜降水涸蛟龍諸藏者乃天地之全功也陳君其尚勉之哉紹熈辛亥暮春旣望北山黄榦序輔仁録序榦嘗誦谷風之詩而為之掩巻太息曰嗟乎人之大倫五朋友居一焉豈不重哉自天地隂陽升降上下而君臣之義父子之恩夫婦之别長幼之序著矣朋友者果何自而然耶方以類聚物以羣分天之道也人之與人類也朋友者人類之中志同而道合者也故曰天叙有典豈人力也哉君臣父子夫婦長㓜一失其序則天典不立而人道化為物類矣朋友道絶則此四者雖欲各居其分不可得也善而莫予告也過而莫予規也觀感廢而怠心生講習踈而實理晦則五常百行顛倒錯謬而不可勝捄矣然則朋友者列於人倫而又所以紀綱人倫者也所可重者若此而世莫之重焉可不為之屢嘆也耶世教不明人心益薄生而知愛長而知敬者往往奪於利慾而不能以相保况其倐然集忽然㪚如太虛浮雲之無所倚薄者乎宜其苟合輕棄而不以動其心也雖然抑有由矣相習也以利相許也以氣相附也以勢平居講切無補於人心天理之毫髪甚者又從而斲喪之有之旣不足以為益則棄之亦不足以為憾矣誠能思夫天典之所固有人倫之所賴以立雖欲勿重其可得哉吾友黄君公泰謁榦而言曰學者之所志人道之當然耳久要之不㤀獨非人道之當然乎朝於斯夕於斯一旦離索焉而姓名邑里之不紀其何以慰吾拳拳之念耶遂出録屬榦名之而俾序其意榦謂此道不明久矣公泰知其有所輔於已也願以輔仁名之可乎抑嘗聞之朋友所以輔吾仁而非志於仁則亦無以盡朋友之道人之生同禀此氣同具此理大吾心而達觀之不見其為異也朋友之交亦去其物我之私而已有善焉公為之有過焉公改之資人以成己推其所以望於己者而勉人也盡其心平其氣毋匿毋拒毋徇毋惡則故舊之情將銘諸心而不能忘也况是録之可攷乎不然則屢書之奚益同志其勉之榦方有頼焉爾紹熈辛亥六月九日北山黄榦謹序送徐居父歸永嘉序榦嘗讀詹事王公之文觀其序篇致意於君子小人之際而得公之用心明白若日月浩汗若河漢未嘗不廢巻而嘆也曰世豈復有斯人也耶高明廣大者天理之公也詰曲偏暗者人欲之私也天理不明人欲日肆世豈復有斯人也耶及考其世系則公永嘉人也嘗欲遊於其鄉以覽觀山川之勝訪於其鄉之士豈無聞公之風而興起者乎淳熈甲辰始識包君定於武夷之下越八年復識徐君居父於清潭之濱旣又因居父識其兄仁父其外弟葉君味道與凡遊且官於是邦者則疇昔之嚮慕固不待䟦履之艱訪問之勤得以與之周旋矣至於人聞其名家藏其書號為一世能言之士而射䇿决科者皆宗之則猶以未得竊伏下風為恨也嗚呼公不復作矣公之用心余殆將有所考焉而世之説者乃曰皓皓者易汚不若循循而俯者之可以集事也則公之用心是耶非歟居父之歸也弔望於王公之墓而過諸其友其為予問之紹熈辛亥九月六日北山黄榦序代仲兄會表兄弟序北山黄東招其内弟鄭肅子㳟而告之曰吾從母昆弟皆葉出也葉氏昆弟猶吾從母之昆弟也凡三姓四家雖所系不同自吾外祖父母以來一本而已先王制禮列之五服之次以為緦麻之戚焉古之緦麻非今之所謂緦麻者也其嵗月必相往來吉㓙必相慶弔出入必相餞勞禍患必相賙䘏亦其理宜也世降俗末利害交攻一室之内同姓之中尚有爭毫末相鬭䦧者况於異居别族之親乎吾故昆弟㪚而居於城之東西南者有累十數年而不相見者焉邂逅相遇問起居外僅能貌相勞若而已漠然無情矣至於諸姒諸子則有終其身而不識面者焉吉㓙禍患之來而能為之同其苦樂者亦罕矣嗚呼此豈人道之所可安也哉吾嘗記為童子日外祖父母皆亡恙嵗冬之朝兄弟畢集相與握手終日談諧笑語市棗栗相啖迨其去則留連不忍捨旦暮又思之而幸其復來也豈非秉彛良心有不能已者及其長也而後怵於習俗迫於利害而不能以相保與此有識者之所當慨念也今吾欲與兄弟約以嵗正月之十日六月之二十日會於天寧之浮屠天寧居城南十里於吾三姓兄弟之往來道理適均人具肴一柈酒一壺飯一器春蠔夏荔不拘其數合而飲食之古人騷賦詩詠與夫投壺弓矢之具有則攜之以供娛樂相告語以孝悌忠信相問勞以老少安否家計有無至於農圃桑麻之業皆可抵掌而劇談也世俗俚下之詞閨闥米鹽之賤則謹勿出諸其口晨而往戴星而歸於是重親族厚風教不其善歟子恭曰善哉盍為之期日而告之乎余曰吾二十年前表兄弟之存者二十有一人今其亡者六人矣亡者不可復作其僅存而長者不下四五人少者亦旣娶婦抱子矣使此十有五人者皆康寧皆壽考皆嵗無他適而能相樂其為斯㑹也亦不過七八十日而無此身矣人生百年之間兄弟十有五人而無七八十日之相樂其與路人奚擇焉則是㑹也誠有不可緩者吾欲始以壬子之春何如子恭曰善哉敬受教遂述其言如此遍以告諸兄弟俾書其姓名於左曰如約東長也謹書曰黄東如約林仲則二子名字序慶元戊午予屏居箕山林仲則之二子曰庚曰武者自栗山來從予遊明年予將為武夷之行而二子者亦且將冠仲則以書來曰吾將易其童穉所命之名而因以字之願以屬子可乎予與仲則兄弟交最久而二子者復從學於予其何説之辭予觀庚也慤而武也敏慤者恐其不志於學而敏者恐其不力於行故名庚以學之名武以行之學之則聞見博而雖愚必明矣行之則德日起而雖柔必强矣故字學之曰伯明父字行之曰仲强父二子其勉之栗山之俗率以長子主家於内次子讀書於外使主家者知學則公平友愛之義篤而家之道益和以昌讀書者能行則孝悌恭順之道隆而所以讀書者不但口耳之末而已不然吾恐内焉妻孥之慮重外焉子弟之軄廢乖爭陵犯之風將由是起矣故予之所以名而字之者不惟就二子之質而亦以因其俗不惟二子可勉而凡栗山之從吾遊者葢皆有以思吾言矣冬至後二日北山黄榦序久要録序非天屬之親非名位之臨倐然相聚於千百里之外一朝去之姓名爵里有不及記者此久要録之所不可無也然非天屬而愛生焉非名位而敬生焉姓名爵里不相與而不可不録焉者道義切磨之功人道之至重天理之不能忘也異日離群索居取是録而觀之某賢與某始善而中變與某日進而不已與皆可以致吾忻慕慨嘆之意而亦以為進德之助者是録之作豈小補哉書之編首以諗同志云長樂黄榦序送許太博入宇文宣撫幕府序天地之間一隂一陽兩儀立焉隂陽有老少四象生焉形而上謂之道形而下謂之器語大天下莫能載語小天下莫能破皆不出是四者而已人之一身仁禮為陽義智為隂兩儀也仁為木禮為火義為金智為水四象也形而上者也肝心為陽腎肺為隂兩儀也肝為木心為火肺為金腎為水四象也形而下者也耳目鼻口之分少長老死之變喜怒哀樂之感惻隠羞惡辭讓是非之情與夫五常百行未有出四者之外者也語大則天地日月鬼神四時不能違也語小則一草一木無不具也四者之妙其淵深廣大如此人之所以與天地並立而無間者於此器之中具此道也所以為聖為賢而超乎人物者於此器之中由此道也格物致知窮此道也存誠居敬守此道也無以窮之則罔然無所見無以守之則茫然無所得雖具人之形其與禽獸不遠矣世教不明學者知之而未必求求之而未必熟不至乎熟猶無見無得也至乎熟則動容周旋無適而非四者之用也古之君子所以自强不息者亦將有以熟之也開禧丁卯尚書宇文公出帥江陵宣威荆襄辟許君為屬而列予於下陳雖以病辭不果行而因以得交於許君一日相與語康節先生之學有感於數之起於四者予因極言之以諗許君且以自警云長樂黄榦序葉雲叟子名序葉雲叟以嘉定丙子後七月生男越三日來請名予與雲叟舊且好也不容辭諗之曰正得秋而萬物成天道也閏以積分而成月乃定時而成嵗雲叟奉母自括蒼來居於此種學甚力持身甚謹此鄉之人皆敬愛之今遂娶婦生子矣其亦至此而有成乎天啟之矣請以成子名之嵗適大比雲叟行將褎然為舉首此其成之兆乎若夫學者所以成德也知類通達强立而不反謂之大成予於雲叟父子有望焉冲佑逸吏黄榦序趙季仁二子字序吾友趙君季仁之二子長曰希次曰希譡將為之加冠而重成人也求字於其友黄榦按釋文謂告曉之熟也譡謂中也此因言而訓也即言以求其心則言之熟者致敬而不敢忽也言之中者度義而不敢苟也夫學豈徒言而已哉故字以伯敬甫字譡以仲義甫易曰君子敬以直内義以方外程子曰敬立而内直義形而外方直而方則大矣有志於學捨敬與義將安適乎季仁好學者也二子必能世其業故為之字而序其意以勉之嘉定丁丑長至冲佑散吏黄榦序黄西坡文集序善學者先立其本文詞之末達而已矣然本深者末必茂不務其本而末焉是先未見其能工也予始識西坡黄君見其神清氣勇襟懷卓犖而知其資禀之異見其從師問學而恐不及而知其趨向之正見其臨民多惠政立朝多壯節而知其事業之偉嵗適大祲人相食官吏畏首畏尾束手坐視君發廩蠲租不待報竟以得罪偽禁方嚴學者更名他師至有師殁不弔者君謫居不遠千里哭泣犇赴投閒十年人不能堪君泊如也有本者如是文詞特餘事耳慶元初天子方慨然建立治功收召四方知名之士君亦駸駸嚮用矣使得究其藴豈但文詞之足稱哉君為南昌郡博士予始識君於康廬今四十年矣哲人其萎而從遊諸老皆無在者過君家訪其子如見其人焉其子池州法曹杭出君文一編示予俾序之予懼讀君之文者愛其詞不求其本故為之言某年某月某日長樂黄榦序林子至子字序貢者下獻上之稱也球琳琅玕與夫橘柚之屬皆可以供朝廷宗廟賓客禮樂之用而後貢故夏書九州之貢以物名周禮邦國之貢以用名下之獻其上非有用不貢也朝廷資人才以共治諸侯擇其賢且能者以獻於上亦曰貢得其人則足以建功立業否則蠧國害民尤不可以無用者貢也二者皆以有用貢而人才之用為尤大然致其用者在人養其用者在已古者禮義之教素明士之所自養者莫非有用之實後世以文詞取士則皆空言而無實用矣是以君子少而小人多治日少而亂日多職此之由也然則為士而將貢於上其可不以有用者自養乎栗山林子至名其子以貢而問字於予為之字曰用之勉乎哉行將見子干霄凌雲而為棟梁之用椳闑􅀈楔非所望於吾子也嘉定己卯夏至冲佑散吏黄榦序送方明父歸岳陽序晦菴先生以道德為學者師榦少不自量得與弟子列竊窺其容貌端莊儼然終日未嘗懈玩索理義片詞隻字未嘗忽厲志聖賢以身任道未嘗忘誘掖後進寸長片善未嘗棄端居一室世之玩好無所嗜安貧自樂世之富貴無所慕篤信善道世之毁譽無所恤臨事度義世之利害無所擇其精微高遠者非末學所可知其可知者亦人之所共知也四方學者從遊者數百人今其存葢無幾先生之書則家藏而人誦之讀其言者未必通其義通其義者未必明諸心凛凛乎㣲言之絶大義之乖也先生殁十有餘年蜀有李君道傳貫之者乃獨求之文字朋友之間篤學力行卓乎有不可及顧其不幸不見先生而親炙之又不幸蚤世以殁不及究其學充其志也嘗深痛之以為今之世不復有斯人矣又五六年有家演本仲者其志學操行視貫之伯仲也豈蜀之人物獨盛於東南耶今又得吾明父焉於理義之大端講之熟矣尤深病夫世之學者言行之背馳義利之交戰也而深懲焉觀其志之所趨葢未可量也明父復為予言番陽饒曽師魯之為人自以為莫及也以是觀之天壤之間英靈之氣鍾為人物者何代無之洙泗濓洛之學深微隠奥者至先生而昭昭然若大明之中天也尚何微言絶大義乖之足憂乎此予之所以釋然以喜也抑嘗有聞焉夫子之道惟曽子孟子得其傳曽子曰士不可以不𢎞毅孟子曰其為氣也至大至剛子思之中庸受之曽子而傳之孟子一篇之中無非𢎞毅剛大之意惟明父勉之先生之學庶乎有望焉於其行也書以為贈嘉定庚辰正月二十有七日長樂黄榦序趙季仁習鄉飲酒儀序請賓介陳器饌獻賓介獻饌旅酬燕六者禮之大節也登降辭受禮之文也鼎爼籩豆禮之器也脯醢脊脅禮之用也此觀禮者所共知也其數易知其義難知也鄉教親睦也鄉閭親睦陵犯爭訟之風息矣夫禮主於敬敬勝則乖乖則離聖人制禮必濟之以和和勝則凟凟則慢聖人制禮必濟之以敬始之以禮教敬也終之以樂教和也拜至拜洗拜送拜旣敬之至也請安請坐爵樂如算和之至也敬而和禮之大義也此所以親睦鄉閭而息陵犯爭訟之風也降洗降盥潔也辭盥辭洗遜也父坐子立孝也老者坐於上少者立於下弟也飲食必祭不忘本也酬爵不舉不盡人之忠也序賓以賢貴德也序坐以齒貴長也序僎以爵貴貴也工歌必獻不忘功也燕及沃洗不忘賤也歌闗雎葛覃巻耳齊家之義著矣一飲一食一拜一坐一揖一降無非教也通於義者又非但可以親睦鄉閭而已也天理得人心正無所施而不可也聖人著為禮以教人凡為鄉人者皆知此義焉此成周之世所以人人皆有士君子之行也禮廢樂墜鄉人之羣飲者未嘗廢豐飲食侈供帳悦聲妓恣驩嗷教侈也誨滛也恣欲也無非所以敗人心者也此後世之士大夫曽古之服勤於畎畆者之不若也然則是禮也雖不行於今之世學士大夫之有志於古者其可不思所以講明而肄習之歟吾友趙君師恕宦不達而忘其貧今不合而志於古其為邑餘杭嘗行鄉飲酒之禮矣今復舉是禮與鄉之有志之士講肄焉禮成予猶恐觀禮者習其數而不明其義也故紀其大畧使刻之篇首嘉定庚辰六月朔旦長樂黄榦序林良夫三子字序傅佑仔皆所以佐助夫人者也吾友栗山林良夫以是名其三子而求字於予名以望之父之志也字以補其所不及朋友之教也良夫之名其子也葢望其出為世用以承弼厥辟左右有民也其志大矣榦之字之也先乎已而後能及乎人不先乎己為人之學也又安能及人也哉傅者所以輔夫人也必先自輔以成其德而後可以輔人故字之曰自輔佑者啓佑之以正也必先自正而後能正人故字之曰自正仔者任人之事者也必先能自任其事而後能任人之事故字之曰自任三子者之呼其名則當慨然曰此父之志也吾當志伊尹之所志人之呼三子以字也則當惕然曰此朋友之教也吾當學顔子之所學能若是其於名若字也庶無愧乎嘉定辛巳二月望日明道㪚吏黄榦序與郭德元序火陽剛故趨上然人憚而避之水隂柔故就下然人狎而玩之人性亦然將趨上乎抑就下乎將為人所憚乎抑為人所狎乎將趨上則不必求人之狎至於為人所狎則不可不思吾之所處也然則趨上者當自安就下者當自省也嘉定五年暮春旣望勉齋黄榦書寄郭兄德元李維志字序志者心之有所之也心者天地之藴化育之機人之所以得以生者人有是心極其所之則人道可立雖參天地賛化育亦豈有所假於外哉甚矣人之輕視其心也之於名之於利何其卑且陋耶之於道者善矣用之不專進之不力持之不堅猶無所之也如適千里之塗紛然而多岐忽焉如中止安能有志乎吾友李維石名士興病其字之不類也以維志易之其義以為學而有所興起非志不能也復求其説於余維志嘗聞武夷夫子之道而説之者其志已不為世俗之卑且陋矣故特以人心本然之大與夫志之所以為志者諗之詩云髙山仰止景行行止君子曰詩之好仁如此維志勉乎哉予於子有所警矣紹熈甲寅八月旣望北山黄榦謹序勉齋集巻二十一
