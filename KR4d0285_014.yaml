body:
  text: 勉齊集卷十四宋黃幹撰書與閩縣學諸友諸生不幸先師棄世痛慕摧割不可堪處教育之恩昊天罔極哲人云亡微言將絶又不但二十三四年依賴之私而已計彼中皆知之當同此痛苦也奉别之後日行百里今早方抵此而屬纊已十日矣罪惡貫盈醫藥殯殮皆不及侍側終身之痛何以自釋此中諸事已定但與之略定服制五服之親各用古衣冠諸生弔服加麻制如深衣用冠絰方相稱諸兄終有駭俗之慮或且用麻布頭巾耳大要且率聚持服行喪之人三年之內不可便散如孟子所謂三年之外門人治任將歸則喪未畢固不可歸也若省親幹家之類亦許暫告假師之喪若喪父而無服豈有一哭而散同常人之理此議稍定不惟足以盡平日師生之情亦得朝夕相與琢磨理義幹持舅甥之服行師生之義禮不可復歸朋友相聚方成倫理私竊自幸若得一二年謹守規約彼此皆不為無益而吾鄉之俗亦當知理義者漸多一旦至此皆幹罪惡所招何復云云先生臨終再三令幹不須歸其樂得吾人相聚其拳拳學者之心雖死不忘哀哉痛哉學中不知今復何以處之此在諸友自處幹思慮之所不能及也若須分散則家中床榻之屬欲煩齊卿季亨收拾送七家兄處輅孫亦令還家房中書册悉令收歸一兩日遣人往取之也六三哥立之謙之舜和齊卿恐皆當來奔喪不可復緩四方朋友日至擇之充之今日須到其他凡曾從學者早報之林正卿之弟安卿有書報正卿可便為附去必大相許一來相看能同六三哥一出否季亨仁父或能偕來相聚年嵗亦佳此間米平費用不多立身大事各宜努力為祝㑹之既有被食在學自可率茂諸人在學讀書定然亦可與應哥相聚莫令荒廢維忠千萬將息齊仲能與性之偕來㑹喪否諸兄不及一一多祝但切須立志讀書此身未死尚冀他日與切磋也六三哥潘謙之舜和不及一一附書但煩維允録此報令叔周叔録此報成叔季亨録此報六三哥也伏紙悽愴千萬自愛與林宗魯司業幹同碎纍離金陵宿半山次日碎纍東行幹以請祠未報不敢偕歸且復西邁過池陽留五七日俟報若未有指揮即過九江兩郡皆與舒相近以見臣子不敢自安之意然區區之情决不敢復往安慶以犯公議也若所請不獲又須力請以至再至三安慶已是一考既是解任豈宜再往幹年已六十七矣若是終兩考便是七十精力已衰不復成人矣家中萬千未了事及今亟歸亦可略與整頓每思楊子直楊通老廖子晦皆以老不知止三人後事無不狼狽此可為深戒也年來覺得世道愈迫切不可曉李文昌以元僚見辟乃是泗上既敗之後忽思蹇叔持重之言耳幹豈願為此哉浮光之兵未退既責以守關又責以督戰感文昌之知愛不敢辭難乃有以為逼已而惡之者制總兩司謗書盈篋胡卿面以見諭曰此不可留必有相陷者矣文昌亦曰其人每得書好論邊事自某相辟之後絶口不及邊事殊不可曉其意恐人之奪其位而又陽為舉以自代之言是不思之甚者也此豈可久與之處哉兩淮江南屏蔽又復與敵相鄰則淮民尤不可不恤今淮郡百姓被敵人之害小被官司之害大去嵗和糴不問有無必欲及數不問土俗必欲促辦以至敷馬草敷巢縣寒屋料敷廬州團樓木並是不支本錢郡抑之縣縣抑之總保與百姓等一切常行之事今皆急如星火去嵗和糴於本府見管錢內括去十五萬貫今又要糴二萬石料榖亦是不支本錢今本府交割錢亦且括去無一文矣今又添北來人請受四五萬貫不爭則害民爭則為犯上此亦豈可復為哉樂則行之憂則違之今既有憂矣豈可不違哉城壁一事見今包砌幹已措置下四百萬磚矣更諸縣約有百萬自可足用石灰亦各有指擬人工諸色皆有定論又分委寄居士友十二人分百二十丈皆忠實可託之人每日早到暮歸如治私事不過秋冬間便可畢此不足勤廟堂慮但得一賢太守以臨之則自可不勞而辦幹亦不願以此為功也但得歸老故山蔬食飲水亦足樂也更望親家力為一言耳然一身寄數千里之外望歸如望嵗也幹碌碌寓此已三季矣自度非仕進之具無頃刻非思歸之日也來書所諭以版築之役謗言四起尤使人慨然便欲謝冠冕而從農圃也顧生平本不作榮進之想直以為貧如為人傭雇姑就斗升之祿耳樂則行憂則違謗與不謗用與不用亦何足計顧彼謗者固非也汲汲解其謗者亦非也置此身於天地間以聽天之所命但得不得罪於當世之善人君子足矣他何足戀他何足畏哉制參之除李公可謂不知人矣如幹者又豈能有補於制司之毫髮哉今朝廷清明英俊布列自可折衝於萬里之逺逺人畏懾其效可見已而况參乎已具申丐免開春再上祠請得歸幸矣此則全望親家曲為之地也幹十七日抵九江復被不允之命安慶乃是舊物可以無嫌然已除歷陽徐守矣以幹之辭歷陽遂奪徐守之安慶幹又居而有之於誼安乎平居無事動遭口語况於有此嫌疑正好議論者所得以藉口幹又何以自明去年之方築城也則曰此書生怯懦耳及其速成也則曰此必勞民也及其費省也則又曰此必擾民也不思往者百年之間所至築城為人所欺而反歸咎於費用之太省工役之太速是必欲相率而為欺也如此尚可以起功名之念耶至其尤可怪者泗上之役輕脫之最可笑者也安慶深僻全不知所以敗衄所以調發之由及至金陵徐而扣之至今亦莫知其故也乃有倡為之說者自是好言恢復者也是嘗與泗水之謀也安慶去金陵六七百里制府欲為此祕密之舉豈肯泄其機而謀之於數百里之外耶使幹果有恢復之志又豈肯甘心築城以自固耶制帥以泗上既敗之後方思老成遲鈍者之可用然後辟以為元僚使幹果若後生輕鋭之為此謀以誤制帥又胡為於既敗之後方見辟耶又其辟之辭云曰幹之所言無非保民固圉之術又何嘗言其善談恢復耶夫言恢復者紹興初先儒之論也然亦未嘗不以量力伺便為先亦何嘗不察事機如是之輕舉哉况幹何人乃敢開此大口兵之勇怯將之能否器甲糧廩謾不知其虛實乃敢抵掌而談恢復耶制帥以元僚見辟朝廷令且包砌城壁則是未嘗供元僚之職又令其往黃州措置關隘又令其往光州督戰此皆迫於上命然亦未嘗啓行也而惡之疾之者紛然而起矣使幹不量事力冒昧居元僚之任則天下之惡將皆萃於其身矣軍旅一起征役繁興不量有無可否州迫之縣縣迫之總保總保迫之百姓兩淮之民不勝其苦外為敵人所侵內為州縣所迫是大可念也後唐以茶鹽給淮民而取其米麥謂之博征周師一至淮民簞食壺漿以迎之此大可監也如此尚可以為郡耶只此數事則安慶决不可以復往矣行年幾七十矣痰喘之疾大作不可支吾只得且借濓溪祠堂安歇以俟報可然一身資糧易竭恐將無以為歸萬望為遍告相識力禀之相君放歸山林不勝大幸若又不從又只得力辭卻恐上觸朝廷之怒甚非小官能當也與某某書聞敵人有必亡之勢如人將死但不知臨時作何症候而既死之後又作何等鬼祟而吾又何以禦之朝廷既不以為意而州郡又只是脫空逢迎殊可慮也聞來嵗且欲歸仙里幹近思之惟以求放心為本一動一靜一寢一食不可離此三字便有以為之根本然後可以讀書玩理也更與吉父去私共講之談仲南曉得此意但亦無著實工夫所謂其行不掩焉者也如吾人又說得工夫太散漫不濟事城中得此二三朋友亦可以數數相聚何必至來年八月方得一相聚耶幹特以老年不欲棄墳墓亦甚有卜居臨川之意也兩小兒甚荷教誨平生所見小子之師未有如此之勤且切者亦此子之幸也尹中父肯相從來望於暇日相見之次便以舊令尹之政力與之語為幸也幹還家杜門百念灰冷惟有舊學不敢忘也想且留城中與朋友講學知此身之至重義理之至貴知嵗月之不可復得早夜以思之不患其不進也與孫居敬提刑杓幹野拙無庸自山中來寄跡宦途於世事全不通曉又生平鄙懶不解作世俗語故於當世之名卿大夫未嘗敢以書問自見至於據案親書以見殷勤則尤自知語言之不文字畫之不工而不敢輒作也若某官名德之重世所共服是以不敢自外况自視事以來覽觀書判題詠經營締建皆偉丈夫所為非世俗所敢希望其萬一繼此者亦得以鼓庸懦之氣而追髙賢之躅此幹所以感幸而不能自已也由郎官歷赤壁揖李蘇二仙於蒼茫埃壒之外其胸中之浩然者又非可以前日論也持節湖湘收拾衡嶽洞庭於胸中然後還清班登法從危言正色建竑偉之議以挫憸庸之氣此善類之所共望非幹之私禱也幹老矣一官奔走大非得已自父兄以來無瓦石之儲迫於啼號之纍是以隱忍在此但知感君上之隆恩一日不敢自怠惟性資狷介與世寡合亦不敢為長久計某官軫念舊治苟有以教誨之使得以苟逃曠責千萬願望與江陵吳帥賓客張生簡幹少禀夜來見董撫幹說大帥剡意薦幕屬亦有相料理之意此必契兄所為於心甚不安諸丈在幕府日久委實宣勞幹到此甫五十日何勞之有焉賦分竒蹇窮悴之甚天實為之若又無功而辱薦是重其罪也招軍諸邑之力買馬獸醫之事幹何功之有不才無似從師友游三十年矣幸不得罪於朋友今顧以善招軍買馬見薦人其謂何帥府千里而辟一士幹亦以千里而從辟今乃以善招軍買馬得名豈不輕大府羞當世之士哉自古乘田委吏聖人亦甘心焉然欲以此為功則稍自好者不願也幹山林麋鹿之性自許已熟為二百指所纍不得不仰寸祿以自活耳絶無一毫榮進之念方欲懇大府丐一祠祿而去恐有避事之嫌來嵗亦欲伸請尊兄不能為我謀反欲以招軍買馬見治尊兄亦何用此招軍買馬之朋友哉反覆思之殆不知所以得罪之由也幹生平介然之性苟使之得行其志雖赴湯蹈火有所不憚辱大帥之招當此多事之際自當知無不為又豈待薦引而後用其力哉以薦舉而後用力則不薦舉而不用力矣豈良士也哉想文字未行尊兄宜乘此力為我辭使幹尚得託跡幕府幸甚答林公度承垂諭以令從子加冠冠禮之廢久矣欲舉而行之甚善甚善幹愚不敏何足以知此但頃從朱先生遊見其家所行冠禮全依司馬公所定而公之書即儀禮之節略也亦嘗獲預於賓贊之末矣初習其儀雖若繁縟然行之頃刻可畢且冠禮在六禮中最為易行蓋人家闔門父子所自行不與他人相干涉而質明行事不數刻而禮成亦初無艱難辛苦之事但得一莊重好禮者為賓則登降揖遜自然中節不可先憚其難樂為簡便也幹嘗謂古人處事全是煩碎中方有深意且如揲蓍分二掛一以四揲之四營成易十八變而成卦誠不若擲校杯者之一舉而知吉凶也然揲之愈煩而心愈專意愈誠蓋不專且誠則將誤數而錯置之矣此其所以問焉以言而應命如響也幹頃嘗為童子加冠至於禮儀繁縟之際儼然正色而臨之自覺此心惻然有感於父兄所以教愛子弟之意彼童子質朴畏謹見其父兄賓客待我者如此亦豈不惕然動其心乎正不可先求簡便以啓其驕慢但衣服之制自司馬公處之已不能盡如古則今人當用今人之所常服至於三加之禮乃古人丁寧懇到之意則不可略也妄意謂未冠兩紒著背子始加小冠今市中所賣黑漆或竹皮為之者道服再加道巾籠衫三加帽子衫帶若有力可製襴帽則始加頭巾籠衫再加帽子衫帶三加襴幞公裳亦可用堂室之制不能如古則但於一㕔事之上行之陳服與將冠者位只於㕔之東北隅用屏風或帷幕障截門外向或人家㕔偏間之後自有空房與㕔相連自可一依古制此則古今異冝不容不斟酌而行之者其他如筮日筮賓乃古人不敢自專之意若能行之固善今人父兄多拘忌吉凶例用嵗旦或春日而賓尤不擇苟有人焉亦不暇筮其可否則亦當前期一一告廟以孝子某某日為子某加冠敬以某人為賓敢告然後馳書戒賓或道逺不能親訪及有宿賓則書中便言某之子某將以某日加冠於其首願吾子之教也賓以期至庶省往復也執事者須是子弟中嚴重者為之恐亦難得如此三人執冠立於西階下者若可以備數尤善無則一人捧箱盛三冠亦可也觀此兩三節稍從簡易便覺失古人嚴肅詳密之意况於其他豈可略乎試斷然行之然後知其非難也但司馬公書儀難得善本而建本尤多錯誤更以儀禮參校而是正之為佳幹承下問之勤不敢不竭其愚政恐不能自免於僭易之罪尚幸亮之命名之意出於尊意所不當言謂土能生木則非五行相生之正蓋土之所生者金而金之所尅者木今以五行支干六位皆木而欲以土生木不知土者乃尅木之母也若正相生則當從水此固皆無義理然亦見隂陽家之不足信乃如此也承垂問併及之前承誨以諸疑久稽拜答此人去亟亦未暇詳細但區區之意欲長者且於虛靜處認得分曉又於閒靜時存得純固此乃萬里之宅萬事之原看到惺惺處則於一二疑義合商量處不過十日之功肯細心磨講則洞然無疑矣閒居計頗有靜養功夫且認得性情部分識得虛靈本體端居默養令根本完固則成性存存而理義自明矣此事不可更緩吾人前面無多日子所幸師儒並世而不聞道以死亦可哀衰病之餘益覺世味無足留戀百事紛來與化俱逝獨義理一途與天地通誠不可不力行也惺惺二字真學者入德之門比以扣禀老先生亦深䝉印可吾輩不可不留意也尊兄不以齒德之髙下與鄉閭晚輩為伍只此一念豈他人可及哉顧不肖重以自愧耳不能安貧强顔求祿敬讀誨語陳義甚髙歎服歎服况令所疑尤衆所指目其昭然立的以自取彈射無可疑者然顧瞻四方亦何所容其身哉入門而求已則餓死出門而求人則辱死古之人所以無可奈何而安之曰命則命雖窮未嘗屈也又何必過自疑畏也哉屬以外移合歸本貫銓量事𨽻州家須半月可畢事事畢去求山寺度量七月初便作歸計也斯文不幸先師即世痛慕摧苦不自堪處同門之舊諒均此情幹晨夜兼行衝冒風露痰喘氣促至今未復氣息奄奄亦非久於人世者重念半生函丈之側一旦失所依怙總角聞道不自刻厲識見未明今無復摳趨之地奈何奈何朋友解散講問寂寥又不勝微言將絶之慮鄉間年來朋友幸皆有向道之意若得相與勉力以共扶斯道庶幾先生死而不忘尚賴長者出為主盟毋使悠悠虛度嵗月五穀不熟不如荑稗可為深戒明年科舉又在目前諸友想未能忘應舉之念讀書作文亦本分事更幸痛勉之須是博採前賢議論熟讀古人文字令氣質徑健乃佳栗山諸兄須得六三哥為之領袖必大季亨相與維持之日作課程莫令廢惰區區至願承欲此來甚幸鄉者朋友來者已遍鄭成叔唐華卿皆以頃年嘗一參侍亦皆奔赴此亦足見人心同然不能已者不知何日得遂一見耶一動想亦費力須得轎馬乃佳吾人血氣向衰不宜勞頓恐易生疾遲速之期亦更審處之幹憂苦貧病不自聊生葬期在今冬只得留此候葬事畢或須一歸衣食所驅恐亦不容遂築室於場之計也與諸友建議欲於城中度一空地立書院三間內設先生祠嵗時一日畢集頗有樂施金者此議若成亦不免遣人持疏到栗山也禍患摧苦殆無生意先人生平以清苦自將兄弟相與恪守家法幸不得罪於朋友先兄平生一介之行亦間有過當處然今觀之豈惟吾家不復有若人哉痛苦痛苦未易具言也以是深憂家聲自此隤然不可復振愁憂無聊欲見尊兄面訴之無從也故因此詳布之䝉頒賜奠儀已薦陳矣先兄平生於朋友無足當其意者獨於長者深所敬愛計聞此惻然當甚他人也先生葬畢事朋友逺來失聲墓下傷哉痛哉念之淚下如雨未死之身將復誰依耶今日已袝廟音容益逺不及九泉無相見之日傷哉痛哉幹忽得季亨書承聞先太夫人奄棄色養不勝驚怛昆仲孝愛純篤何以堪處别來數日間事變不測如此幹辱在契好舊交便合趨慰適以迫行不克如願愧負多矣但得季亨報云治喪不用浮屠一以禮經從事掃去末俗之陋而先太夫人遂得以禮終是則孝之大者尚幸堅持雅志世俗啁啾之論不足恤也幹正月半間即歸歸日首圖參慰幹諸况如昨無足云者特一念長者未得即見為之慨然朋友講論不敢放過然亦未甚見有勇猛精進者近得先生書亦再三以此為問其拳拳後學之意至矣顧幹自治不至又何以起發朋友之善意哉幹以禮書未就緒劉用之相約過神光為卒嵗之計度亦不能久留只俟虞兄為先兄擇地了畢即為歸計今日暫走箕山相去三十里不得一見殊深悵然吾人相與之意分雖朋友情猶兄弟雖終身相依可也各以事牽其勢難以久合幹方奔走為衣食計兄亦老且倦遊異日思欲為今春草堂夜話舉觴相屬豈可復得哉臨書不勝愴恨幹猥賤苟活為朋友羞然他無以自治則不若食其力之為無愧耳久敗之場務幸亦漸成倫理酒酣氣振且笑且歎終不若歸故山之為樂也已一考有半矣但恐任滿無以為歸若可逹里中則又當尋尊兄為旬月之遊也髮已種種齒牙動搖目視茫茫非久於人世者門戶衰頽諸姪皆不能自立深有可慮但世事皆非人所能料只有聽之而已幹一墮宦途如入苦海終嵗汨沒人生幾許十四年不得休息真是可厭世間以仕為樂者以其富貴也然求富貴者非為盜則為佞僕誠不能其貧且賤如故進不得行其志退不能活其家以是思之不若放歸山林之為樂也三上香火之請方遂所圖以是月七日抵寓舍亦欲亟歸省墳墓訪親舊從人既遣不能徒行少俟秋凉即謀歸計一生鞠育於辛苦之中今三子已娶兒婦滿前亦人生幸事耳但自度不足以活之只得散居令其人自為計六郎歸鄉之計已决性資拙朴未能讀書然頗好書向所寄書册渠欲得之乞付之為佳恐有重本欲留宅上者可面諭之也幹為貧一出奔走十五年於公私之計普無所益性本介僻學又迂疏與世寡合與義不受辱引疾奉祠投閒故里百懷未易一二言也歸來怯寒無日不病閭里故舊朝夕來訪只辦應酬或至對客終日念欲一拜書亦不可得徒切悵望而已不謂反勤先辱尤深愧悚幹以先閭為姪輩占住無所安息偶帥參相念以南法雲僧堂見遺見障織居止其前有園可以開門從大路出入不與髠徒相干涉其側即萬嵗諸剎幽靜最擯棄者所宜處也勉齊集卷十四
