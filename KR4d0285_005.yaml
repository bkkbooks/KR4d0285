  - {type: page-break, offset: 0, content: '', id: KR4d0285_WYG_005-1a, image: WYG1168/WYG1168-0054a.png}
body:
  text: 勉齋集巻五宋黄榦撰書與李敬子司直書榦只得僕僕入京為調官計漕幕之請全無來歴大抵皆出於豐公之意臨别猶有不忍相捨之狀其拳拳於胡公之意厚矣非所以相為謀也承見教明徳章更平心将諸處説明徳叅考如克明峻徳以至於光被四表懋昭大徳自昭明徳輝光日新其徳予懷明徳之類看兩个明字作如何説與今大學是同是别又看格物致知誠意正心修身用功處如何能明其明徳或問所謂明之端明之實是如何讀書只據見成文義看過都無所疑恐亦不是小小病痛更望與諸兄審之今有疑義更無扣問處只得依見本看但恐終無味也此事未易言相聚時只說閒話過了都不曾得攻擊也西銘今看了三十年來血脈文理終不能得通貫近因道間與黄伯新商量方覺有歸著異日須作一段説破錄以請教也所疑虚靈洞徹非所以言理朱先生亦将虚靈不昧言徳徳即理也余胡諸兄皆有此疑更須見得不相悖處乃佳榦差遣定後更相度尋一相聚非紙筆所能盡述也榦自南昌行至上饒忽動家山之興慨然南轅意欲且㽞家間遣人求一差遣及抵家米價大貴家間典質巳竭只得且解囊中以濟其乏而急走中都求見次以濟之方思賢者山居之樂苦節而無求於人真長策也大學首章舊説以徳之發於外者昭著而不可掩為明徳今解以徳之存於中者昭徹而無所蔽為言故鄙意欲合内外而言之亦似有理今既無所考正姑守今説為得其本異日相見更商量也榦求静處而未可得秋凉或走見不知可遂此願否榦以是月三日交錢事縣道敗壞之甚其勞又倍於臨川獄訟更不堪開眼財賦赤立亦只得判身判命硬著脊梁擔負前去更兩三月後當亦少定所可喜者無臨川奔走臺府之勞可以終日坐曹耳得徐兄肻來甚濟事亦更少得一兩人同理㑹事不知東湖有可那得一人否要得仙鄉或九江或西湖人乃佳盖質實耐辛苦且是甘吉父職事要一人主之也此最急者望㽞意旬日内得之為佳茂欽運幹煩致意未及拜狀趙簿為此間謝公所持官㑹事計使似亦疑之更望同茂欽力為言其决無此事也新淦趙簿竟不免小小得喪亦何足道然世事可歎者未易言也榦交事巳半月矣又以其衰老之身日與頑民為鬬何益於事而徒費心力深可歎也黄兄且㽞在書院一兩月後試之以事自有以處之也胡伯量得近訊否余國秀得書未及報且為致意本縣縣丞王其姓者特一畏懦之人耳昨以憲使差慮囚遂以權縣為詞乃䝉憲使對移豐城簿欲煩一言得其復職幸甚丞乃鄉人亦無一日之雅特以同官之誼不忍其至此又不敢為白之憲使望為宛轉幸甚恐憲使未欲便改則姑遲旬日亦不妨也望為茂欽兄同為致力也榦視事巳月餘矣此邦較之臨川互有難易臨川困於臺府之應酬此邑卻無此撓然寓公士人頗難制又卻不如臨川也一切付之不恤寓公之家以勢擾民者只得按法治之向來朔望縣官皆先謁其門今亦不講士人之無頼者痛懲之想此兩邑人日夜蓄憾為乘隙見攻之計此亦毎事愈加縝宻使之無隙可攻更須月餘事緒巳定比之臨川卻有讀書工夫有疑當請教也吾輩既未能脱然一意講學出而應世又覺民窮巳極州縣問法度無一如人意何能有補於百姓真虛度嵗月也榦以一身當衆怒凡寓公之家無不見怨者盖平日豪横成風不容不痛治也然為新淦百姓吐得一口氣便罷黜亦無憾矣得計使書云國錄兄忽不相樂契兄亦且不直之何故至是自古諸賢共事亦未有不相攻排者亦足以見君子之不比不同也但與人交處亦且看是何等色目人若是吾輩則雖有小失亦只得将順正捄之不必至於巳甚每讀樂毅復燕王書有君子絶交不出惡聲忠臣去國不潔其名之語未嘗不三歎以為去古未逺有此君子長者之論也今幕中二賢一旦浩然有此去志不知置此老於何地邪吾道窮矣朋友大家扶持植立何者為人何者為我吾輩中得一人肻忠實為國不私於家則亦宜扶持之不須太相咈外間傳播又是道學中一段怪笑語也方以賓主俱賢一道仰賴為幸忽聞有此為之悵然想今亦巳無他矣更千萬釋然乃幸契兄游處先師之門有年矣一時從逰如此老者能幾人國錄兄平日尤寛博雍容豈不能調䕶此老而至於此邪徐兄相處半年天資粹美更須力學乃佳諸子賴其教誨多矣嵗晚告歸附此草草不及拜國錄兄書煩致意承許下訪甚幸盖此邑不振久矣得上幕臨之見其敗壞源流而白之上司以為百十年之計一邑之幸也榦自别後又得漕使書縷縷甚感賛助之意但凡所主意無非以寛恤為念此吾儒分内事但今州縣間有甚不得巳者又須是更以身體之也職田之狀想巳為言之此亦不得巳之一也榦妄意本縣同官委是俱賢凡不肖得稍安其職者皆同官之助也昨在臨川最苦同官不効力今得其如此甚以為幸輒有薦賢之狀兩緘望契兄為袖以達漕帥得與不得不敢必而同官之誼當如此也亦望游談為幸姚君用提幹亦望提起今世人物大率只得此様彼善於此則可矣况姚之㢘謹公勤又非時輩所可望邪顓人草草亦欲知職田作如何施行也榦受納装綱百役俱起夜以繼日無頃刻寜苦不敢辭白日真可惜又苦目昏如此役役良可笑也計使毎得書憂民之志甚切但精力不逮殊可念惟司直有以助之為幸榦聞斾從同計使巡歴想必經此又得承教為幸亦誠不可不一至章貢南安也他悉容面言少禀昨所招敢死軍十戰死八九所存者一二耳州郡所至不加存恤緩急何以使人有胡以迪者經由所欲赴漕臺陳詞得為行下照李帥元行下支給請受免使流離道路為幸國家財物其他妄用以充苞苴供飲宴都不計較至於執干戈衛社稷之人卻偏去減削殆不可曉又有臨川寨兵黄斌事體一同併望介念姚幹巳書滿考夾尖竟不可得亦可念也不知更可為一言否昨遣輔孫往候計使安否想巳至今日又得其逓中叔姪兩書力以姻事為言殊可念也不須如此過慮然荷其意厚且念其病中心事如此懸懸且畧許之亦無甚利害但不知其病勢果何如盖老者不知吾人閒居自有可樂而必欲見之行事是以若此焦勞今巳上休致之章若病勢向安不妨高卧丘園涵泳理義又何必須是及物然後有以自見邪榦裝綱受租更五日可畢事巳遣輔孫求檄禀議併求一檄差新喻林丞來權縣盖王丞與寓公太熟質弱多狥人情恐大家得肆憾於百姓耳三月上旬必可拜見也姚君用提幹必欲得一紙合尖不知更能為之一言否亦是善人殊可念也孫行之想可到鄉中後進如斯人者殊不易得方後生時但見其俊爽今乃能折節以問學為事深可愛重也更幸琢磨之榦昨拜書令小兒呈納今附胡叔器行甚欲一見漕使以林丞未來不敢輕以邑事付人王丞與豪家太熟小民被害不便也謝公為一邑之巨黨熟思之此一段事不可不力賛計使行之乃一邑生靈之福榦若動足此老必作怪是乃榦貽禍於此邑之人也平南安賊易去此老難豺狼當道豈可不掃除之邪樂山鄭安曾復其小小者耳本邑苖米額管六萬二千石除二千石不可催實管六萬石毎年起綱及馬穀共管六萬三千石軍用五千石縣用六千石此巳是七萬四千石米矣又要貼水脚錢二萬貫春衣一萬貫半年版帳二萬共五萬貫皆是将苖米折價須二萬五千苖方折得許多錢如此乃是十萬石苖矣故毎石加耗等共收一石七斗縣計方足江西一路皆然不但此邑為然也自此老倚恃豪強只欲見星交量則縣道何以取辦以是諸豪皆為援例而縣道之敗寔由於此今嵗諸豪聽命皆依縣例而此老毅然不納巳具公狀申諸司矣榦在此尚可脱則繼今以往愈恣横莫敢誰何矣榦若為南安之行則不可不速治之以寛一邑百姓之憂若不為南安之行則勢不容與之兩立也聞張元徳在彼亦熟知其曲折千萬㽞意乃一邑之望不但一邑之幸一路豪強聞之亦當震懾矣榦本縣綱運巳裝足甚欲一見計使只候林丞至便就道更煩急往促此來恐州郡未必肻令來則榦亦難動盖一邑頑民日夜磨牙只俟榦動脚便覆出為惡也前日偶賤體不安牒丞權縣謝知府便投詞論擾百姓及出假後追其榦人㫁治之此公終是不悛為一邑之害民畏之如虎同心拱手聽命是何世界如此不若趂計使在此了此一事一邑生氣不是細事也榦之所以不敢輕動誠不忍百姓失所恃也若去此害其他小小者亦自知戒然後得放心也楊漕此來未曾有所按治反覺風采不如楊子直不若以此為第一義今錄去大槩更以所聞叅訂助之為此一舉亦一快事也榦彔彔於此方喜安跡數日前忽聞有改差監六部門之命昨日部中人來乃拜省劄衰晩何以辱廟堂簡㧞之意只是合有窮分又復搬家寄寓臨川且單騎一往彼中俸薄何以支吾抱闗擊柝既無重責亦無多事卻可養疴矣然老矣何日而巳邪令人氣悶也更有少事得劉梅伯朱敬之諸公書皆令不須候代然輕棄民社而去又似不安山野之人不知典故輕去則為躁進遲去則為偃蹇二者皆不可今以公狀就漕臺申審欲煩契兄袖見漕使想亦有此様例當如何得漕司行下可不可皆可藉手也同官王丞以急班改乞免差考試前書巳及之今在守亦為致懇於漕使想亦必送僉㕔幕中之事契兄能為一言則事無不濟人非高舉逺引不屑世故則寸進之念人誰無之今必欲拂人之情使之無故拘牽而不得遂其所欲且人以親老為詞又何忍阻人顯親之至情耶恐見運管陳丈諸同幕力為言之幸甚聞袁吉皆盛傳富家藏楮之説人情為之騷動聞趙漕使亦主之或云朝廷行下皆未見的實果有是説則莫若且自十貫税錢以上人户使之收藏若一二貫税錢人家全無所有豈可困之邪相見在即他不暇及聞從人暫出章貢想今巳歸聞以官劵事行此事亦誠難措置彼中官㑹謂之鈔舊直八百足今只得百七十省其狼狽又甚於吾國也其所以出師連年屢敗者亦以錢幣不行軍士乏食之故則此一項事亦誠闗利害也北方弑逆之後盗賊四起淮北道梗不通非百十人不可行𣙜場北客絶少兩使不至其事可想也此間最可慮全無措置若萬一有警不惟不能戰亦不可守不惟不可守亦不可逃盖處地四平無名山大川之限一望二三百里方見山其習俗勇悍御得其道無非精兵御失其道無非劇賊向者憚於一行盖恐其全不可為及至此究其本末又困於不得有為束手坐視甚難言也到此巳兩月亦覺軍民豪傑翕然歸心卒有緩急只得旋收拾為用耳邦君有福人全不見有憂慮意亦可服也此間事大畧如此兩子來此卻得終日監守讀書老懶卻未得工夫讀書毎日與羣豪相追逐亦頗為酒所害但嗽疾卻有向安意也向來逺逰之興如何葉味道潘子善來相訪也安豐承聞巳解臺幕之印且得歸山中陶然自樂世間愚人方且自為議論自為軒輊亦可憐也但安豐之約既不諧金陵諸司所在想未必肻出若過儀真閒行一畨乃以微服見過為旬月之欵亦不惡也榦之蹤跡想不甚知其詳緣其人太庸凡太鄙賤不可相處此亦不欲露不和之跡只是彼此以貌相承而巳初亦不知彼乃日夜相譛訴於李仲詩之前至於相囘避以臺諌脅之仲詩甚憚之遂有乞移倅之請所以取悦於臺諌而又以慰彼之心也然其心又不能自安遂宻以其相傾陷之意白廟堂所以榦既改除而彼亦罷黜也仲詩為邉帥而憚一太守至於詰曲如此後乃屢遣人來相謝且自解榦亦未嘗有他以倅易倅何不可之有初未知曲折如此遂㽞儀真月餘以書懇相識乞奉祠未幾臺評既下亦只得且往金陵巳於五月四日交賤事然彼所以相傾陷之意亦有説有李明兄弟三四人皆豪勇之士榦甚愛之數與往來忽有告其兄欲結集人過淮取夀州者郭守以為奇貨謂榦實使之遣人相聞榦知其必無此事遂親出捕之得其兄弟兩人送獄乃是一士人徐師㸃者為首謀假太守之命以紿李氏之兄弟也徐師㸃卻是與太守最厚善嘗以夀州人欲獻城告太守太守答以待寫書與廟堂恐有可乘之機徐得此語遂以紿鄉人以為太守奉朝廷之意而為此事也李明之兄李顯以告李明李明卻之而其事始敗露既以一行人送獄乃日夜拷掠李氏兄弟使之誣毁以脱徐生之罪榦知其故遂移書仲詩取一行人赴帥司根勘郭公以此大恐遂有囘避之請尚力爭以為乃李明之罪而欲嫁禍於榦亦可見其愚也出來仕宦便有此等事既一家未有飯喫而於義亦有未决然不可仕者只得且隠忍於此為祿仕而巳若真要行志則無處可頓身也金陵伯量兄來具知為况之詳昨但疑未欲遽出以疾為辭今乃知果嘗愆和幸巳平復不勝慰喜新除去就想巳有定論昨嘗囑吳勝之乞賢者入幕庶得一水相望可以承教渠初甚以為然不知竟何如耳榦年事益莫未能引去良可愧怍郡事甚簡民訟絶少但性好興作自不能安静耳正以無朋友講習為苦忽桑胡譚三兄偕來黄伯新亦繼至朝夕得以講貫此天授非人力也巳相約編禮書王朝禮十篇仍日温論語集註以相磨切十年之間吏役紛紛不意今日忽復有此毎相對則深恨賢者之不來也春夏之交不雨靡神不舉畧無雨意勢大可憂大抵以江為界凡江北諸郡無不旱者㳂江亦然北方兵革不休妖厲之氣浸淫至此朝論但欲平静苐恐非我之所能必邉防未嘗不講而未有一之足恃從事於枝葉而體統之未究識者不能不寒心也此間亦議築城總漕兩司深以為然但主張小未合朝廷亦未報行守土之臣捨是未有先焉者也漢陽朋友得書或云赴新任或云不赴皆不得端的世事愈覺費力皆不可曉解榦巳兩上丐祠之請不遂今嵗大旱無以為百姓亟發郡帑收糶米麥出糶貧民目今境内幸不至貴糴但頗以此得罪於漕司目今施行之間相咈處多制司亦不相樂只得急遣碎累先歸置一身於此以與之為敵嵗終再力請祠當必可得若遂此志則當有承教之幸矣適方知已辦臨川之行亦勢不容巳吾人出處何常惟義之從耳同行甚佳候到縣卻相度也漢陽歸途王臨川冣勤而敏士友多稱道之千萬為之調䕶使得展布聞其欲丐祠而去亦可惜也臨川鄉民極頑非上司庇之不惟邑宰之不幸抑亦鄉民之不幸也至禱至禱榦歸三山巳月餘一去鄉井幾二十年訪舊半為鬼矣存者莫識其面也百事悉置之度外近得小寺屋在城中最幽静處眼界甚佳見葺治居之端坐六七年則無此身矣歸來亦苦人事之多不得一意觀書但於心事日求寡過矣李貫之素疑其弱忽奮然抗論而去東南之士愧死矣儒學之有益於人如此朝廷又能容之皆盛事也昨得其書云尚留九江半年果否欲一見之私居難動自此恐為永訣矣三山榦以被命日久又有促行之㫖既不能力辭只得早到官所宜措置以為固圉之計所欲請教者非一既不能久俟旦夕當以書求誨益也榦過豫章見陳巡檢名毅者亦西班之奇士陳凱趙八之徒莫能及也頗有相從之意不知尊兄以為其人何如能㢘乎不能欺乎能忠於所事乎其他本事隨其所長皆有用處且得根本正當則不誤人耳榦欲遣人招之决於尊兄之一言望見教就宰處借一人至南康相追為幸今日之事人才為急也偶又與陳子實同官甚幸其人苦硬可喜尊兄知之否其人之詳何如併幸示教勢不能伺候自此相望不逺常得拜狀安慶道中閒居想甚適知識時勢自應若是惟有仰羡而巳貫之既畱伯量復歸想追隨於南山北山其樂不可量也榦不能固窮又復一出業巳至此只得安之安慶雖淮郡民俗冣頑頗費料理又郡無城壁累政以土惡不可築不容但巳到此首興此役請於朝廷乞錢米不報止得自為之邦人以為是亦有捐金相助者度費百萬緡亦不暇計有無一面興築以是終日無少暇朋友亦有十數人在此亦不在講習真一俗吏也到此五日便聞浮光之警今兵退巳兩月矣朝廷亦屢有大舉之説然施行多有未可人意者豐宅之意尤鋭要之無本領無今古只是杜撰何以集事得其書云欲屈契兄入機幕不知肻和此險韻否若能得同貫之一來此遊山亦佳肻來當遣人奉迎也安慶為貧試郡落在塵埃箠楚中望諸兄如蓬萊中人不謂清流尚顧俗吏千里逺訪聞之洒然真如執熱之濯清水也兹承改秩佐郡之命在賢者不必多賀朝廷公論益明兹可慶也榦巳再上丐閒之請一以避辭小受大之嫌二以避峻急掊克之政年事浸晩筋力益衰亦欲求閒耳本留濂溪以熱甚蚊多遂遷太乙觀俟得請卻過山南也承教有期預以為喜榦以九月一日抵家因得杜門絶人事遂其堅僻以度餘生過臨川見朋友講學頗盛殊可喜此契兄往者善誘之力也國秀兄近况如何往者不能迂道見之此老久病恐終不復相見矣榦屏居粗遣惟是雖脱吏役而家事未免闗心亦不得以一意講習耳新年又六十有八矣毎念先師以一生辛苦著書以恵後學光明煒煥而諸生莫有能達其㫖趣者又復數年傳習益訛先師之目將不瞑於地下矣以是深以為懼鄉閭朋友絶少昨自臨川經從有李武伯者舊亦嘗得從遊見其志慮堅篤因與之歸此留三閲月嗜學不倦嵗晚言歸恐其荒怠因勉其往承教誨更望扶持之為佳老來但覺切巳務内之味最長甚恨不得欵語也三山長沙之行想巳有定論一出一處於義皆未有害世俗之論亦有不足恤者要以即於吾心之所安耳朋友相聚想如常此間㑹府卻逺不逮江之東西也亦以進取之途頗利故不忍捨之而從事於寂寞也榦還家巳踰一年只是杜門教子温習故書而巳𠻳疾復作亦不復問醫聽之而巳邦人得簡夫之來不勝其快盖前日樂土巳變為愁嘆之鄉矣亦豈否泰相乘故得賢侯辱臨之耶南康黄史君亦是吾鄉之善類必能繼陳寺丞之善政也聞趙倉相與之意甚厚想協賛之力居多也朝廷須檢舉嵗月恐亦不容閒退耳樂則行憂則違惟義是從耳初亦何心哉榦閒居無他以舊居迫窄不足以容孥累又念此身巳老亦欲為久居之計架小堂於屋之後不敢求華美但百物旋措之故久之不就更旬月可以告成矣閒居無朋友講習秋試後須有一二相識可以相聚諸子亦可督以讀外翁之書也伯量許下訪吉父得書亦云果爾何幸如之近於鄉間取得禮書來内有先師親題編禮人姓名晩年大段畱意於此不及見書之成無窮之恨也榦於喪祭二禮編得甚詳宻先生以為禮書所編皆不及古當更仔細看過若可繕寫即尋朋友在官者寄去抄錄可入禮書數中其他亦皆須研究但最苦是無朋友商確其次是無錢可催人抄寫及供朋友檢閲甚以為撓若伯量肻來又能為之多方抄化以粗足編書之費來此相聚數月以成先師之志何幸如之生平讀書多疑無人講問苦不可言尊兄恐越境亦難若伯量來訪俟其歸榦當送之往麻姑約從人一出亦可為旬日之集榦若措置得家事定叠此間難得朋友亦只得挾策求教朋友也便出外一兩年亦無害也因作伯量書煩致意促其來尤佳道體流行無物不有無時不然而春陽巳盛生意條達尤足以見道體發見之妙曾㸃言志乃欲從容游泳於其中其氣象詞㫖雍容自得各止其所足以見其天資髙明洞見道體渾然天理無一毫人欲之累以此而施諸天下則堯舜事業亦不過此此夫子所以與之也榦頃於曾㸃言志一章未嘗見得分明今無從質正輒述巳意望相與訂正之元思報果州兄之病令人驚惱為之奈何此數日亦有可生之意否天未昌斯文乃使吾輩困厄病患亦未終喪斯文則决亦未使之止此也得諸兄朝夕在其側莫大之幸榦拘縻於此不得一往但有終日憂嘆而巳西沂之行且宜遲之今且遣兵士六輩往僃使令更看其病勢如何也安慶榦抵臨川巳兩日省劄既到而臺評予祠之報亦下勢所必至遂得杜門送老矣向來及門之士惟尊兄端可承衣鉢之傳世事一切皆不足道惟有勉進所學以答先師屬望之意耳至望至望臨川諸人向學者有數人甘吉父終是得其大者今亦同胡伯量送至麻姑道間又得欵語也屏居如常無足道者少小見前人所以艱窘之狀今巳不啻足矣特孥累十六七年隨乃翁從宦煖衣飽食似不能堪而又往往不能謀生然此乃造化所以深愛之也閒居可以讀書特以喪祭二禮編次未畢不能不以此闗念玩索之功不得精專特反身一念不能不自勉耳李貫之一世奇士而止於此毎竊憐之前承陳寺丞巳為立祠遂為記其所以立祠之意亦使往來者知有吾貫之也更得司直同南康諸人與貫之厚者各為題數語以見其為人庶幾祠可以不廢亦足以見吾輩交遊之情也三山榦屛居如常人事絶不講毎月一出謁府主餘則並不出亦殊省事昨得李武伯在此講切武伯去蜀人家本仲來又得一月相聚多讀書尚氣節立志甚篤趙季仁以其為人異日所到當不在李貫之之下亦各有所長然亦真不凡也得真景元書嗜學之志甚至得陳師復書亦然此二公者異日所就又當卓然其䕶法大神也先師沒今賴有此耳可喜可嘉陳師復巳為貫之立祠此公真使人不能忘之師復刋其詩以為祠乃僧所立未免為著數語以見吾人愛貫之之意亦足以使學者有所興起也余國秀兄巳為古人今其家何如子弟何如甚可傷也簡夫不來甚壯但吾鄉失此賢帥不無嘆恨也方明父逺來相訪衰老廢學甚孤其逺來之意志氣甚篤殊可愛敬盖其源流固有自來也老來只覺存養玩索不可偏廢世之學者往往墮於一偏是以空虚而卒無得也得明甫輩十人布在四方吾道庶幾矣今欲再趨函丈使得與課社朋友往復商確當不為無益也昨迓曹帥人行嘗拜狀當無不達陳寺丞潘謙之歸具知近况之詳尤以為慰且承有訪戴之興一動亦非易事况筋力亦豈得與曩時並邪黄守鄉人自此可以書問往來也長沙之役今竟如何想巳有定論矣黄守不相識聞其人亦賢州縣事體大非昔日之比曹簡夫不來此間老稚如失怙恃也榦終日杜門毎月一謁府主耳來年正月便習學致仕併州郡亦不出謁後年正月真不出矣當初只帶得一團血氣并一㸃虚靈生在世間今亦他無所用心只得檢㸃身心令明淨純潔交還天地父母耳先師發明義理至精至僃後學難得擔負者向來只得一李貫之可望乃至於此去冬有蜀人家􅀈字本仲者來訪與之語涉月極不易得多讀書持身甚介玩理甚精務學甚實於貫之伯仲耳近來諸生伏闕之書雖是次名實則首謀故書中言蜀事最詳且切巳試中優等近聞其丁家難而歸與黎郎中名伯㢲者同舟而歸渠亦甚欲一見契兄可使人於九江探問若留之一相見亦佳此間得楊志仁相聚謙之又歸殊不落寞岳陽方兄又逺來殊不易得饒兄諱魯書意向甚正但得朋友多斯道有傳則先師為不亡矣近讀中庸因推考古先聖賢言學無非就身心上用工人心道心直内方外都未説近講學處夫子恐其識見易差於是以博文約禮對言博文先而約禮後博文易而約禮難後來學者專務其所易而常憚其所難此道之所以無傳須是如中庸之㫖戒懼謹獨為終身事業不可須㬰廢而講學窮理所以求其明且正耳若但務學而於身心不加意恐全不成學問也向來朋友在淛中者一切放倒其他所至寂寞獨南康得契兄與諸賢維持講學最盛先師有望毎恨不得生長周旋其問但不知於身心上㸃檢處如何耳人藏其心不可測度欲一以窮之捨禮何以哉詞氣容止之間應事接物之際察其中理不中理十得其七八矣惟契兄為彼中宗主更望以此律之則庶不至流而為口耳之學也嘗觀明道先生語謝上蔡云諸公來此只是學某説話上蔡請益明道云且静坐程門如上蔡可謂務實為巳者也明道尚以此箴之使視今之學者則豈不大為之太息乎老矣他無所望於世只是望得先師之學有傳故不自知其僣越以及於此也勉齋集巻五
