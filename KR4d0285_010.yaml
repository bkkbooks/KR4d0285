body:
  text: 勉齋集卷十宋黃幹撰書與李侍郎夢聞書幹服職淮壖幸未退斥仰藉台庇知感知遇自去秋之末視所職汨沒應酬冬間感冒幾與世隔又其間有小齟齬不敢拜興寢之問非敢怠也每得孫行之正字書具言侍郎所以顧念之意甚至尤切感激幹資稟頑鈍拙於處世致勤台念尤劇皇恐駑鈍之資於世事都不通曉一行試吏恪守父兄亷勤之訓諸賢過聽以為有才使佐邉州受命以來不勝悚懼冒昧此來目之所見與平昔之所聞於師友者大異白面書生固不曉邊事然載在方册其本末源流昭然可考聖賢事業固難悉言而上合天意下順人心盡體國之忠絶自私之念則大經大本未有舍此而能自立者諸葛孔明所謂宫中府中俱為一體黜陟臧否不宜異同只此數句便可得三軍之死命卻司馬仲逹而奪之氣也至於管仲之於齊范蠡之於越雖霸國之事而其規模經畫亦有次第皆守邊者之所當講明弱而能使之強貧而能使之富蕞爾之地而能使敵人恫疑而不敢窺伺雖使羊陸復生計無出於此者今所謂守邊者亦何必侍從臺諫之論薦宰執之所親擇哉雖州縣一吏亦可為也不過簿書期會之間而已彼知管范羊陸為何事哉幹之向者所以憚於一來亦自知其迂闊之見決不能與世合也初亦甚以為駭今則頑然聽其自爾也然今日之事侍郎亦嘗略思之乎敵運之衰人所共知盜賊四起人亦所共聞今每舉一細事必曰毋致張皇餘千里之長淮皆蕩然如無人之境而委寄於庸夫緩急安可恃耶紹興之初諸賢建復讐之議流離死徙有所不顧今守邊之事亦無有明白剴切而言之此天下有識之士皆不能無望於侍郎也安得一侍函丈開口一吐胸中之憤悶耶開禧丙寅之事兩淮荆襄之生靈肝腦塗地十室九空有人心者亦當為之動念也侍郎家世忠孝而江西平賊之功又已試之效此擔恐不容辭避而亦天下之所屬望故敢冒昧及之幹大病之餘氣血衰甚嵗前一至歷陽鞫獄旦夕遍淮垠巡視守把即至金陵總所稟議亦須參謁制帥入幕之事非所敢望也安豐幹自知疏拙不敢萌一毫寸進之念金陵贅員方挈賤纍為久安之計忽蒙除郡之命自念疏逺何以得此吹噓之賜端有自來感激亡已聖賢相逢公論昭著尺寸之長尚有可採輒破去前例不次而用之朝廷何負於士大夫敢不勉竭駑鈍以圖報塞漢陽為郡雖小國寡民然實吳蜀往來之衝武昌唇齒之國無漢陽則武昌亦不能以自立矣丙寅丁卯之事幹適在武昌親見其事武昌官民日夜望漢陽之烽火以為安否向使北兵數騎抵大别則武昌不攻而潰矣其不至漢陽者幸也然其為郡最小事權最輕郡無城郭郭內之民僅千家有兵二百人人月給米五斗多者一石朝來暮去若客旅之視傳舍郭外沿江之民幾二千家皆浮居草屋視水之進退以為去住夏則遷於城之南冬則移於城之北若鴻雁之去來每嵗二稅所入不及中州大邑之一都官吏請俸僅及中州三之一騶從不備往往徒行以是仕者憚來闕員殆半如此何以為國由是武昌視之若屬邑然而此邦官吏又不克自振其為衰陋未見其比也幹視賤事已兼旬首集郡兵而第其強弱倍支廩粟以活其家校其武藝之工拙數支賞給而士卒始有固志自是嘗有應募而來者矣同官亦量其所得之多寡而優恤之與同甘苦百姓不問其已經縣未經縣已結絶未結絶應有詞訴一聽其來而曲直始有所伸民心安官與兵各得其所方漸有州郡氣象但土地褊小雖滕文公之賢亦不能以為善國也妄意亦欲有一二興創勢須洞究本末然後敢請於朝亦惟藉侍郎𠂻言之重庶或不至於掣肘也但資質庸下精力衰憊恐不能仰副朝廷責望之意耳尚幸有以警䇿之漢陽幹久不拜𨽻人之敬拳拳尊仰實切此心遞中兩承台翰之辱不勝感悚修城事誠知朝廷事力決未能及此但事屬利害不敢自默其行與否豈敢必耶鄭書先君之交遊其令孫從宦於此豈敢忘之但同官亦多賢人又只得視人物之髙下以為先後薦舉之弊至此極矣亦不敢全不顧公議下半年尚餘一章更容相度也幹輒有誠切之懇冒瀆台聽紹興間一時先君輩行仕於朝有聲當世凡數家如任如鄭皆是也惟先君不事生産至今諸孫凡十三房皆無以自活幹之所以黽勉從宦者亦為門戶之衰替耳非敢望榮免死足矣豈不願浮湛仕途為門戶計加以名賢遞相推挽朝廷過聽超躐亦豈不願奔走以赴事功實以年齡頽暮精力衰弱不足以效驅䇿一去里閈凡十五年先君尚葬淺土墳墓皆無人料理兄弟五人今所存者第三家兄年已七十其窮到骨挈之來此則不堪扶曳捨之則又於心不安幹少不自量好從當世名勝遊既冠而執經於晦菴先生荷其一見便有相教誨之意未數年而授之以室又數年而授之以官又數年而為之築室廬相約終老相從之計其囑託之意則曰微言易墜汝其保之今先師之亡十有六年矣幹奔走仕途束遺書於髙閣手未嘗披目未嘗睹也每一念之如負芒刺無面目以見朋友死亦何以見先師於地下耶勉強從仕固足以恤孤窮活孥纍然一行試吏百事俱廢又於心實有所不安也所以前日上祠祿之請蓋為此耳幸而得之則庶可以了門戶之私計承先師之雅志幹亦得以婆娑丘園諷詠遺書以祈寡過誠意未孚不蒙俞允蓋此意不能盡白得相識書皆疑其為請築城不獲而求去又謂與諸司恐有嫌而求去朋友之言且如此亦無惑朝廷不從所乞也築城之事朝廷已令買木料矣非不從也便使不從亦是公家之事又何至怨望而求去耶諸司皆賢吳漕乃故舊綦總尤相愛為州郡者不過自盡其職耳本無所嫌也孟子云不知者以為為肉孔子之出處人尚疑之在幹則又何怪既被不允之命亦只得且安之况災旱如此又豈敢便為求去之計偶讀邸報興國趙守持本路倉節此則不容不力為求去之計蓋法令之所不許物議之所不容是以又不能自已也趙娶晦菴之女孫於幹以姻黨之親幹之長學生又與為友壻監司按察州郡在幹繫是受察之人以親察親職事間委有妨嫌今再以公劄懇廟堂尚幸侍郎力為一言使決得罷去不勝千萬之幸方今人物如林如幹等輩不足比數苟得祠祿已為過分不足以勞朝廷之區處也再有情懇漢陽郡計有餘郡官之俸差勝作縣到此數月用度漸廣蓋親戚朋友未免有所責望今所餘無幾矣朝廷若畀以祠祿歸家便有飯喫乃為大幸若朝廷遂其雅意便就侍郎求建寧太守一書命下之日便得幫請尤感周旋之賜與金陵制使李夢聞書幹離里中之日拜領台翰之辱抵郡視事之三日又蒙專人寵頒誨墨謙尊下逮捧讀感悚幹衰病不才奉祠還里便已為終焉之計典郡之命初亦未敢祗受尋聞制閫之命屬之一代偉人幹復得託在按臨之下是以不敢復辭初亦欲取道金陵求聽約束而後行又恐在道日久且或議其有所干請遂不果如所願得中都親故書亦知台慈軫念欲置之幕府幹識見淺陋亦何足以當此然既在部封屬吏之末則凡有所見所聞自當詳悉吐露亦與入幕無異顧嘗平居以思則今日之事誠不得不慮所以處之者亦誠有所甚難蒙古有崛興炎炎之勢金人有遁逃衝決之虞羣盜有分裂割據之憂邊民有乘時幸亂之意一動則百變交起其將何以應之雖朝廷安靜國祚靈長誠有可恃然中原雲擾豈能終無變哉特緩急異耳國家素以仁厚立國所以治安三四百年然其弊亦以是而失之太弱東南風氣亦不若西北之徑秦氏倡為和議而忠義之心益以消沮今欲鼓而作之豈易事哉朝廷起尚書於士論所共服之中自可以談笑而折衝於千里之外其所施行必有出於世俗謀慮之表如幹輩安能效涓涘之益哉然尚書之所以顧念者不啻如子弟骨肉則區區鄙見亦不敢自默大抵當大任者亦須伸縮自由言聽計行然後乃可為若謀之於外而制之於內人之所見不周而事十全之利以吾之焦勞計慮而或者乃安坐而指其小疵以議之則決無可為之理齊威之於夷吾勾踐之於范蠡皆舉國以聽之而事業之就僅能如許則亦可鑒矣今國勢之弱甚矣兵不素練財不素蓄人才不素養舉世之人皆欲行其私以肥其身此何等氣象而欲禦此大變耶當此任者非大有以更張之乃欲一切聽命於人以參苓甘术即愈沈疴九死之疾未見其可也儒生之論迂闊而不可行俗吏之論鄙近而不足行惟尚書超然逺覽起至強於至弱之中致至富於至貧之地使前所謂四可憂者皆望風畏懾而萬一有乘吾之虛而吾必有以制之庶乎其可也今之為制帥者或以好殺而失人心或以偷安而不厭物議天下之望尚書者不但兩淮之兩路而已况廟堂之於尚書亦可謂相知之深者惟在我籌度利害使其足以壯國勢而消外侮毋陷於儒生俗吏之言亦當無不聽從者矣冒昧僭率皇恐死罪幹被命此來視事已五日途中以奔走而不遑拜書到此又以冗擾而不敢拜書又以到任例修啓劄之常禮至今方能辦方敢敬陳悃愊龍舒素稱佳郡今乃大不然闕正官日久倅甚賢同官以其攝事之故玩弛特甚兩獄繫囚無一得其平者悉粗案索與之疏理夜以繼日曾無少暇財賦失催縣道並不起解兩職官癃老者不勝任少壯者不可任兩獄官或病心疾或已中風胡倅最賢又幹之故舊今又得郡而去乃以衰老之身當此紛擾此亦不敢自憚最是龍舒處地四平謂之舒者以桐柏之山經信陽光州至此而始平夷也然全無城郭之足恃楊通老僅能葺理子城亦未嘗包砌市井皆在子城之外亦復何益開禧間張軍大者以數十人徑造郡城如入無人之境無城故也纍政將官錢妄用而不思築城亦可謂無逺慮者舒雖近江而蘄黃又在舒之南蘄黃尚有城而舒獨無城可乎幹已託同官相度旦夕開具申稟幹昨乞築漢陽城而朝廷不從蓋以非要地故也然人之一身必有衣服一家必有墻壁既曰州郡豈可無城若無城則米糧不可積積之是資盜糧也器械不可修修之是借冦兵也如此亦何以為郡耶况張軍大之事曉然可見豪傑之見覘者未必不垂涎也此則賴尚書力賜主張一郡千里之幸也幹出拜書遲緩不勝皇恐又以初交事詞訴紛紛然不容坐視申稟草率惟尚書視之如子弟之寫家書則庶幾免矣投老此來所恃者有制使尚書知愛之厚耳安慶素稱佳郡及到此乃大不然楊國博則盡括諸邑之所入而邑至於不可為張舍人則盡括民間之所積而民至於不可活乃以羡餘獻之朝廷以自見其功是皆為父而摧其子也子既貧則父亦不可繼矣楊則專事姑息而錢費於不必用張則專務興造而錢費於不當用今則郡計索然矣軍糧常欠數月則其他可知其最利害者則郡無城壁往者張軍大以數十人之衆如入無人之境尚不之鑒楊僅能治子城之壕民居皆子城之外張則朝廷行下令其築城乃為浮言以沮之書生不知事體無逺慮乃若此幹靜思一郡之大所以保生靈而為江南之屏蔽莫急於此與同官計度與居民商議皆以為然亦欲半年之間可就其所申述具見公劄望尚書力賜主盟力申朝廷便從其請千萬幸甚今最急者欲得一壕寨官并曽經築城軍兵二三十人前來使喚今有一劄且以修北峽關隘本府城門為辭欲望劄付池州軍下火急差撥應副使喚所請於朝者甚微特三十萬緡其餘者皆郡元樁之錢耳惟尚書力為之言一郡幸甚殘冦衝突此天速其亡耳然彼之亡與不亡皆吾所當慮也前書所陳屯田義甲兩事斷然可行不富不強何以為國今之擾擾只得委之廬帥或委大軍數千人以禦之不可輕進敵人多詐一墮其計則士氣沮喪兩淮安危在此一舉吾之所以長久規模則又不可以此廢而不講今雨水如此彼豈能為吾患秋冬間必須大擾則義甲一事不可不早圖之也築城一事朝廷見從則幹尚可留然其專輒若此朝廷必不見貰若貰其罪而不從其請則幹決不可留只得引疾東歸便當以黃冠野服從制使尚書於金陵與諸公上下其議論或能有一得之愚可禆末議再與侍制李夢聞書幹輒有私禱前書已略言之矣龍舒為郡財最匱乏楊通老為之最得善為郡之名然壞此郡者通老也此郡財賦全藉租稅既不通江則舟車不往來何緣得從容通老適當軍興之後人家交易頗多以是投印契日收千餘緡乃不為長久之慮恃其多資欲以自見而獻其羡餘於朝廷張敏則繼之又恥其不如前人悉按簿籍盡追索人戶契照然後别造簿收割以此人戶亦無一紙白契不來投印以此財賦之羡與通老等亦獻二十萬以自見由是百姓遭竭澤之擾而不聊生矣二公者財賦雖羡而不為長久之計一郡之大漫無城池之可恃而可以為郡乎陳郎中繼張敏則之後當旱歉之嵗所積之錢皆耗於招納流移大抵迂闊類於吳勝之所入既不及二公而二公所積悉已耗矣幹適承其後視事之日便為築城之謀而郡帑乃如此前書所陳想尚書亦深然之幹已一面興工燒磚鑿石收買竹木只俟朝廷給降錢物便可興工修築秋晚可成則今冬無慮望尚書痛賜矜念若朝廷堅不從則望尚書軫念帷蓋之舊為幹作轉身計得早歸田里不至在此誤生靈也欲言千萬安得一至尚書之側開口一吐胸中之憤悶耶更有少稟淮民困於起夫甚可念此皆平日無措置倉卒只是擾害百姓便有措置亦多不中節卒不免為百姓之害近漕司令起一萬八千夫運廬州米此最為害已具狀詳懇望賜施行幸甚邊事不寧想尚書措置籌度良勞前屢聞捷報亦深以為喜適聞二十七日三統制之敗極為寒心大軍自是不足用但可張聲勢耳今乃深入以取敗衄是何輕率如此聞有制幹者實主其事想是後生不曉事欲以是取功名耳尚書今作如何主張以幹之愚莫若養威持重牛酒日至以作士氣分據險要以防衝突以吾之逸待彼之勞彼雖得一勝然所損亦多切不可又復輕舉也暑氣漸熱彼未敢深入但秋髙馬肥誠為可慮此兩三月之間早作措置增兵聚糧廣納計䇿收用老成相與圗事不可輕信後生之言以敗吾事至望至望幹目今汲汲為城壁之計然費用不資未必可就便使城成亦無人可守攻既不可守又不能為之奈何亦只得盡心力而為之耳漕司運糧一事督蹙可畏幸得使司行下免差百姓歡舞但計臺必謂幹實有此請恐自此相沿愈甚亦無可奈何便使罷去亦是為百姓也嘗謂淮西一路監司太少合更置一提刑舊龍舒乃提刑置司之所今以一司兼倉憲抗治四司之事又安得心力可以幹當而使之中節耶方今邊事不寧莫若於兩路各添一憲擇老成有膽氣才略者為之使之措置守禦亦尚書之一助也蓋彼可以往來諸郡相度事宜為吾之羽翼也今計司事冗州郡刑獄屢申不報良以為苦此一䇿尚書不可不力言之如曹簡夫之類皆可使居是任也幕府更須求人日夜計度專人布此率略皇懼浮光之警今已兩月矣但聞豐帥之除稍足為宗社慶其他皆未見有所施行足為秋髙之備者又不能不以為懼今日之事且先見得大體如何來或和或戰尚有可得商量今日決然是戰無可疑者前日敵人據有三分之二吾又括江南之財賦以充常幣故屈已求和彼必見聽今彼既為蒙古所驅失其巢穴豈肯甘心處河南數州之地哉其垂涎兩淮以廣其境土者非一日也今吾又絶其嵗幣則彼之決於一戰既無可疑吾亦不得不與之為敵和既不可則其勢必不可以不戰此大體之最易見者也大體既定則凡所謀畫無非為一戰之計幕府盈庭之論謀士借箸之言可以戰者從之不可以戰者卻之依違不決尚守屈已之論者斬之朝廷百姓同是此心同是此見然後先自朝廷進君子退小人延納忠讜之言斥逐邪佞之語凡前日苞苴奔競之風阿私朋比之習嚴行戒飭使朝廷清明天人悅豫然後有可以進取中原之實於是下哀痛之詔具言二聖八陵之痛與夫屈已求和之辱開禧丙寅兩淮荆襄生靈塗炭之苦以激發忠臣義士之氣則朝廷之氣振矣其次則制司亦以至公盡誠感動人心非兵不講非戰不談各求實事毋事空談大軍之不足用久矣悉驅之淮上擇良將以御之擇其怯懦者戮之勇敢者常足亦未見其不可用也武定軍人皆以為可用然以今日招武定軍觀之則亦未必得其用也蓋武定軍者本沿淮有産稅之家向也為敵人所逐遂結為屯寨以護家口或一二千人或數百人已而無以為食遂互相吞併殺戮據奪不可禁遏朝廷急招之以為忠義軍於是相率而應募彼非樂為軍也特欲藉官中之錢米以自活耳已而改為沿淮又已而改為武定講解之後人人皆有放散之心蓋其元有産稅謂之戶家故不樂為軍而樂為農也今乃欲招之為軍則不過得其大不得已者耳其稍從容者決不敢就也不若便行下諸處使之自行招集結為部伍擇其頭首人命之以官使部轄之但使之守護鄉井一旦有急則調發應援一聽官司之命庶幾稍從容者皆樂為吾用矣如彼中所謂千戶者想亦如此也大軍好與武定等人爭只是武定人權太輕若武定人如軒如夏之類使之自為一軍則大軍不敢陵之矣武定固可用然亦不可執一也嘗觀後唐末年事力亦已竭矣世宗取兩淮所遣䇿應軍以數萬計者不知其幾也今以吳蜀之地而兵勢寡弱乃如此可不早為之圖乎自大軍武定之外更合招募敢死之士於江南諸郡得數百人自為一軍悉起諸郡配𨽻之人得數千人亦自為一軍各擇人以將之悉屯之兩淮要害之地則吾軍稍張矣財賦亦不難辦當此危急之際天下之財皆吾財有道以取之則人孰不樂輸哉古之立大事建大功者曷嘗拘攣顧忌而有為哉但此等事須是愛日而早圖之不可悠悠秋髙馬肥束手無䇿大事去矣又有一説軍政不講久矣不可不早圖亦不足深恃中原遺黎引領以望王師之至有年於兹矣自敵人南遷則酷用河南之民為尤甚幹在安豐見有士人徐師點欲結集淮民以取夀州乃是夀州城中一富室先為此謀以告吾境淮邊百姓髙德已有定日矣偶爾敗獲事不果就後來探知不特夀州為然汝潁諸郡皆已願從矣想今日淮北之民欲吾歸者又當甚於前日也今但呼淮邊一二豪傑諭以此意使淮北之民先自夀州始能以夀州降者即以夀州之守命之然後以武定大軍為之擁護吾得一州則彼失一州之勢以漸蠶食之不用寸兵尺鐵而中原可復彼將救死之不暇而暇謀人乎此䇿之最急者也聞京西已得其桐柏毗陵兩縣矣願早圖之制司欲招武定人更有一䇿向來武定頭目人今皆補官多在江南州郡此間亦有兩人便可按籍悉呼至制府與之商議仍令見任處州郡解每月請給以與之更以禮貌待之添與請受此數人輩皆可擢之以當主將之任者也如軒如夏皆其徒也王辛亦是一人之數此尤不可不便施行也亦有因一二小事竄在他處者霍丘縣有一典押開禧間結集人以禦敵後立功補官為李制帥竄逐不知今在何處抆拭而用之當得其死力也又有李明兄弟見在合肥皆真可用之人也此乃招武定最急之䇿不可不便施行也聞幕中議論亦不一更宜招世所謂賢者聚之於書院與之議論可也幹此間已興工築城只用民兵廂禁軍弓手寨兵力不足則未免資之僧道寺觀人夫不足則未免以産錢髙下勸率人戶度至秋冬之間可辦不敢更望朝廷之錢也城磚諸邑運用但皆經由大江非大舟不可載欲絶江池兩軍各借馬船兩隻并兵梢往來搬載輒具公狀欲乞施行千萬幸甚勉齋集卷十
