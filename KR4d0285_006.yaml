body:
  text: 勉齋集卷六宋黃幹撰書復楊知縣通老揖幹彔彔如昨無足道者課入粗辦免追逮之擾皆庇之及鄰庫兼職亦以俸入之薄藉以相助又適正官物故新官未行擾擾特甚然亦幸可支吾來諭所謂盡心者誠當居之無倦行之以忠夫子以是為為政之法思之誠有味也陳膚仲尚留婺女云春間方歸彼亦幸而外除耳若果留中今亦不免矣時論變遷吾人只當靜以處之改節者固不足道不改節者亦以躁得罪皆非所宜也楊志仁同令姪在彼可以相伴頃聞其歸興甚濃不若且留之為佳吾人仕宦只得了公事私家瑣細不可無朋友相貼也幹汨沒如昨無足道者庫中夏月絶無事乃以鄰庫不容辭雖巳有正官年少不更事頗費料理所幸人情無他可以相處但所惜者如此日力顧用之於猥瑣為可恨耳政成事簡百里蒙惠亦非小事均氣同體在天地間不忍之心人所共有得以行吾志豈不樂哉志仁能留彼相處尤非易得若其決去則實未有人可相從也先師日逺大義日微每竊嘆悼朋友過此者多往往不能久留相與痛相規切為之奈何幹去冬巳一考度滿罷之日契文尚未美解當決意求為旬月之欵近謙之亦來此尚往來都下渠亦甚有走求見之意得永嘉徐居父書亦欲此來即往拜見亦未知果何如也令兄因書煩致意敬義記當述師説以答尊命此便甚亟不能敬承也幹行李以午後次郡城首謁江户相約來早見太守又須逗留一日而後可離也深念聚合之難終日作惡稍自遣者以契文得志仁兄朝夕相聚又令孫頗謹厚警敏又邑事井井有條人被實惠上下相孚無他掣肘足以慰朋友逺别之情耳幹僕僕逺役甚非得巳今日之事肉食者不以為憂而吾輩乃為之戚戚亦足見其疏也幹猥賤苟遣無足道者雜居庸保以販鬻為業責任甚輕真為貧所宜處嵗且小稔米價甚平俸入雖薄可以無飢如是足矣但無朋友之益無講習之功良以為懼旬日間忽天台永嘉一二友人求訪且志仁景孫繼至因得紬繹舊聞茅塞旋除然亦可暫而巳竊聞德政所加人吏相孚財賦既可辦則撫字乃優為者學道愛人之效豈真所謂偽也哉志仁立志堅苦窮理不苟友朋中所難得景孫篤實可與共學但恨不能久留亦恐契文望其歸不敢久留之也膚仲此來志氣甚鈍初勉其注一小近倅或再注幹官不以為然今逺次豈易待耶舜和遂為古人極可傷念少壯者不可保如此益使人凛然恐無復有卒業之日矣近事想聞之又似一變吾人但當堅守此志死生無二命義可畏甚於鼎鑊不可回互反為異巳者所笑也如何復江西漕楊通老揖幹連日獲侍教誨益見都運國博德盛仁熟無非切實之論經歷州縣採之輿論皆以為凡所施行最為得體謙抑下問且俾述愚見以僃參考辱愛豫之厚不敢自默竊以為都運國博今日為監司與前日為州縣不同今日之精力亦與向日不同頃嘗見相識云雷聲發杳冥之中如嬰兒然及其擊搏則裂大石拔大木有不可禦者監司之風采亦然故施行之間不可不審志氣雖不衰而血氣有盛衰耳目聰明一有不及施行之間稍有差誤則關係甚大而人亦得以窺我矣十年以來朋友之於國博特以為有德之君子耳自積溪金陵龍舒之後人皆以為有用之才則今日施行尤宜謹審以全令名使善類賴以增氣而吾鄉有光矣邵康節云有一人之人有十人之人有百人之人有千人之人有萬人之人所謂萬人者以其能盡萬人之長以為一巳之長也今幕中有二李是天相國博以為腹心股肱耳目之助也願國博虛心誠意以待之凡所施為必咨度而後行則彼有所聞不傾心而相告者無是理也國博又以所見與斟酌則何事不濟耶幹嘗竊謂監司以按察為任且先留意於州縣之官吏頃見章漕在建寧嘗招在書案無他書但有官員名銜册舉以相問俾據其所知之善否優劣以對則自用筆志之不惟於幹為然每遇相識必孜孜訪問州縣之間去一贓貪之吏則一州一縣受其賜一州一縣得一廉勤公敏之人則一州一縣皆可委以裁決如此則我可以端坐持綱而一道肅然不惟可以集事而又可以怡神養夀世道窮蹙人物凋零有如國博者尤當厚自愛重不宜以細故自弊也一路人物幹不及盡知吉州萬安有李知縣名東字子賢邵武人氏頃嘗來考亭從學亦精敏可喜江州德化有王知縣名貫之字中甫婺州人頃與之同在吳德夫幕中亦醇實不苟皆可委以事而觀其能陳子華在湖口尤可托如此之類更宜博訪若每郡得一人則一郡之事皆可委之或鄰郡之事亦可委送人之寃抑必獲伸政不必自責效於一身心力耳目之間也大抵江西健訟成風砍一墳木則以發冢訴男女爭競則以強姦訴指道旁病死之人為被殺指夜半穿窬之人為強盜如此之類不一而足仁人君子愛物之念切嫉惡之意深鮮有不為之動者故凡有訴州縣理斷不當之法莫若且索案或具因依申不可便豫決也若便追人若便送獄曲直未明而被害巳多矣今日之病兵不素練糧不素儲卒有緩急何以支吾幹日夜有不恤緯之憂也兵非漕司所掌糧食一事恐宜加意今嵗江西雖小歉較之常年亦為樂嵗朝廷既不知糴大家亦有餘粟更須算計漕司財賦除起解之外不若以贏餘委州縣廉明官吏擇稅錢最多人户平價和糴或萬石二萬石隨吾錢之多寡收糴於南昌江濱置倉盛貯每嵗增益若嵗有凶歉則平價出糶旁郡凶歉可移以賑之若加之師旅則亦可資以給餉嵗或屢豐則以代輸上流州縣之綱運而取其合運之綱米以填入此以新易陳之策也州縣有學最關風教今皆以為文具江西素號人物淵藪比年蕭索尤甚雖時文亦無傑然者而况有學術乎二陸唱為不讀書而可以得道之説士風愈陋不過相與大言以自欺耳學校雖存教授固當教提學豈可不提之耶須是立為規程宿學教授每日必入學諸生讀書必有課程教授點檢其勤怠而賞罰之旬申提學亦間遣有學術德望之人巡視之又以見教授之能否而殿最之異日必有人才可為世用此其為益大矣今之為運使者未有知此者也不惟今日數十年亦未有知此者也自我舉之則將有聞風而視效者矣此非細故也與其徒創東湖之美名而不思教養之實義者大相遼絶矣所謂規程者更須熟思之幹今亦欲行之於新淦俟有規模亦可相參考也東湖亦當撥入州學如嶽麓之例也今日最急莫如官會最不可不奉行且得先僃文榜以告戒之一條戒官吏之蔑視而不奉行者一條戒百姓之不肻行使者一條戒頑民之誣告把持者三者並行可也至於實政專委李司直巡行體訪李司直耐辛苦不憚奔走而又忠信可托也其法無出於鹽錢若申朝廷乞降下鹽引自販自賣如福建之法與商賈並行人食賤鹽而官得見錢善之善也然世俗多憚煩又難與慮始無心膽必有破其説者其次則莫若先取諸郡之鹽價於隆興前後兩江之所差鹽官遇鹽船至則籍其數仍問其所發賣之地分州縣官為置場樁積以純會子還之然後均之鹽鋪拘其見錢所謂鹽客者本以會子買鹽今以會子還之何所不可彼之欲得見錢者不過私下低買官會此最亂法之民也見錢多則官會有可兑之處會價自高矣計無出於此者但其間防間斟酌便宜與二幕上下共議論也此數事既舉則使臺亦可以安然無事矣最切要是且宜清心省事有張元德甘吉夫處於內有李國録李司直處於外而國博提其綱領可也天下之寶當與天下共惜之此幹所以不敢自外而輒進狂言也復劉師文寶學甲幹八月下旬自金陵邸吏遞至台翰並奏藁各一通捧讀驚愕莫知所自未及修謝忽被漢陽之命巳而督促就道水陸奔馳凡兩月方達漢陽遂成稽緩不勝恐悚幹閩之鄙人也稟資庸陋亡以逾人先君以儒素起家至紹興御史以清節為世所推重不肖諸孤恪守先訓罔敢失墜既冠聞晦翁先生以聖賢之學誨後進摳衣從之始獲粗知治心修身之本末家素窮空孥纍猥衆逮至中年偶得一官奔走州縣亦不過為斗升之計而推其所聞於父師者而見之行事耳然以狷狹之資不能同流合汙以自媚於世故其得罪於人者常多然亦有察其愚直以為粗有足取薦之於朝者凡數人然非鄉曲之舊知則州縣之屬吏獨端明汪公嘗三見薦於未嘗識面之日顧閩浙之相去壤地相接是必有為之遊談者惟閣下在西蜀數千里之外自代之章乃首及於閩嵩州縣之一小吏以閣下之氣節德業視當世之士固未肻多遜而海內英俊亦豈無足以當論薦者而顧求之於世所擯棄之人此其所以驚愕而莫知所自也非幹之才有以異於人閣下之識見亦非流俗之所能窺測也人之所以自立者亦以天之所以付豫於我者不可以不盡其分初未嘗以世之用不用人之知不知而有所加損也顧以衰賤無用之人而乃獨蒙大君子之知遇如此則窮當益堅老當益壯亦不敢不痛自勉勵也幹之鄉慕閣下之聲名非一日之積而未得遂侍坐函丈之願丙寅夏從宦於江陵幕府是時邉事方興議論之間落落難合閣下去江陵方數月幕府之故吏猶在間有相問勞者必曰使子遇前帥劉公必將志同氣合而無間也幹猶莫能悟其所以言之者巳而遍考前日之所施行但見吏畏而民安事修而用足與其所親見者大異然後歎其命之窮而所遭之不偶也孰謂十年之後復蒙知遇之厚乃如此耶然雖蒙閣下之知遇如此而幹之年巳六十有三矣去函丈又二千餘里幹以職守所拘無由致其身於大君子之側以慰其生平願見之心則亦有咨嗟太息而巳望閣下而不得見幹之衰老又如此則所恃以見其區區之情素者一紙之書耳又何敢以無謂之寒暄不情之稱頌而仰瀆執事者之聽耶故敢併述其愚以求教誨於左右臣子之於君父與生俱生而不可解於心者也食人之祿者當任其事此亦不待智者而後知也數十年來風俗日異謀身之意多於謀國為私之心急於為公上之人既不能明示好惡以力變之或反推波助瀾使人安之以為當然所謂廉恥節義至是掃地矣國將何恃而能自立耶此無他義理不明而人心不正也閣下其何道以革之耶中夜以思心焉如割尚兾台慈痛為當路者言之右門擬與兩浙陳運判夫以一介之賤吏獲𨽻於賢使者按臨之下於此而不言是終巳不得舒憤悶於斯世者也雖然大言之則非其職之所宜淺言之又恐委瑣不足以瀆使者之聽今如幹之職誠所謂釀數百斛酒辦數千緡錢雖世之庸賈亦能之以使者之賢名必不至使下吏不得以盡其職幹之職瑣瑣而不足以瀆使者之聽也小者不敢言而大者復不敢言姑以賤職之所及而有關於國家之大體者為閣下言之幹聞之生民之命社稷之安危實係焉京畿之民尤所恃以屏翰王室而不可不加恤焉者也今也轍環四方而未有飢窮困苦如浙西之民者焉姑以二事驗之石門酒課舊額五六萬緡常有餘今也嵗解一萬常不足界自若也拍户自若也而解錢不足者民户減於昔産業減於昔則因沽酒之少而可以知户口之少也石門酒庫以灰和糟嵗以糞田雖狗彘不食晨開務門老稚纍纍買糟和粳而食者肩相摩也無錢而求糟以食者常相半焉則因食糟之多而可以知貧民之多也聖天子在上二三大臣所以寬恤民力者無所不至而京畿之小民户口日減而貧民日衆是豈不深可憫者乎立國之命在於百姓百姓之重莫急於京畿今乃虛耗貧困一至於此是豈不可深憫者乎幹少從先生長者遊語及江右人物未嘗不以先大丞相為稱首恭惟某官憂國愛民之意謀王斷國之論得諸家傳而藹然著於縉紳之間主上軫念京畿之小民而付之以輸將之寄此固百姓之所懸命焉者也皇皇者華之詩曰載馳載驅周爰咨詢釋之者曰周遍也言使者之詢訪無所不遍也幹以一介么麼之賤吏其去民為最近得周旋閭里覽觀風俗而有聞焉故敢不避僣越之誅輒陳愚瞽以助詢訪之萬一伏惟少埀察焉若夫賑恤之策經理之方非少知治體不足以知此惟閣下詳擇焉勉齋集卷六
