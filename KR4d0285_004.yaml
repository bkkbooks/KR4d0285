body:
  text: 勉齋集卷四宋黃幹撰書與晦菴朱先生書幹侍親幸安病餘倦乏無他往還畨閲舊書不敢自廢向日看書獨盤誥殊未通今始玩繹俟異日求質正如盤庚上篇疑是誥戒有位者之辭蓋將教於民由乃在位者始此史臣述經之大旨自盤庚遷於殷至底綏四方乃史官紀述民不願遷而盤庚自以其意言之如此以起下文誥戒有位之言其如台以上是民不願遷之辭卜稽恐當為句絶言先王常以卜稽其疑而龜筮之辭云云也其他曲折未能盡述此乃向日最不通處以此讀之稍成倫理然亦未知其是否又看大學中庸易傳循環讀之乃知人心持守常欲明覺然義理未通貫則羣疑塞胸觸事面牆所謂明覺者殆不足恃朋友猶以辨析巳甚為疑恐卒墮於滅裂鹵莽􅀈埴索塗之地也林際可在帥書院自謂艾軒嘗以盤誥授之以不欲見帥故不得亟見之俟其罷局當叩其曲折但謂康誥為周公攝政時書故稱朕其弟則於王曰之辭無所當矣特恐其他或有長處也三哥比得書意思甚佳蓋天姿之美詩禮之訓自應若此幹以來嵗彼中不招館客欲得朋友相切磋遂欲開嵗四五日即離此適得彥忠書聞欲來春歸尋地季通蔡丈亦同行恐其至此無他深密相識勢須少候巳與之約二十日不到此幹當即啓行不審尊意如何書稱主館徽猷先生又有嵗晚天寒之問幹門户衰替大懼先世儒業之不振收教子姪輩使粗知孝弟忠信每自謂留心於此亦居家職分所當然者間有親舊之子為之授句讀解釋訓詁者則受其束修以贍老幼又年長好讀先生書者則與之切磋以更相勸勉舉業聽其自為讀書次第用心要領則尹先生所謂臣師程某曰者所當遵守也幹大要且勉令立志其次以收放心義理訓詁則先生之書詳且明矣有不甚曉者則以所聞告之張先生所謂五益者亦信乎不能無補也但嵗月如流城居人事紛擾無復靜坐觀書之樂此為可慮耳警勵之誨敢不服膺繼此數蒙教誨以警怠廢幸甚幸甚前日偶出山間及歸之日館中諸友忽為大帥斥逐幹亟遷以歸朋友十餘人有居鄉者卒無僕𨽻大為吏卒所辱反覆自省無一毫得罪者涼薄自合至此闔門引咎蓋無見幾之明無避世之操所以至此其他曲折不足瀆尊聽至此益思平日狷介未為失也後數日履常乃以簡來别為占一僧舍令遷居之幹雖至不肖亦何至一旦食嗟來之食再拜謝之而巳林擇之丈欲招周醫為古田丞療病適周有公事在直司林丈與履常謀使虞侯傳語職官令蚤為結絶蓋欲周之亟行也訟者執其人以為教唆其人以實告諱履常不言而專指擇之帥大怒杖虞侯而逐之擇之以此勉幹使勿以帥不禮於人為意幹卻欲以此勉擇之以蚤為去就毋數招人不禮為辱也林丈乃欲以嬉笑處之是或一道也此紙告焚之勿以示人近日事多出不測更莫曉其意自反以求免禍而巳喪服偶此人行急後便録呈大略司馬公不言冠之有武其制若何齊衰武纓用布今不言則無以别於斬衰矣衣領正方疑是安項處三面皆方斜裁而下謂之方則當有曲角處不但如今背子領也衣袂相屬處長短皆齊而聯縫之無空缺處曲裾以一幅布交解裁之為兩條上闊下狹綴之兩旁如燕尾然非兩條相沓如燕尾也故深衣溫公注中云或謂之圭者上狹下鋭指一條而言也謂如燕尾者兩鋭相向總一身而言也今人以四條綴兩旁如兩燕尾然則失之矣未知是否幹過此當百日便圖趨侍世路險巇人心頗僻捨先生將安歸新居聞見締創異日若得結茆附庸其側為朝夕依歸之地則幸矣潘文志文得與朋友拜觀令人慨然念之真高世之士也家兄卜築小菴先墳之側一往輒旬月庶幾可庵之風矣賜書旦夕附往後便或可拜謝此書稱主館修撰郎中先生又有秋高極涼之問幹同二姐領女兒輩以十九日達侍旁途中賴尊芘皆無恙至家兄弟畢集親老歡喜蓋纍年所願欲而不可得者獨區區懷慕道德之情未易釋耳三哥苧溪得為一宿之欵意緒甚佳彼中諸事得所付託諒深慰愜莆中見鄭子上巳與約行期今遣六人并轎往從之趙帥小不安未欲見之渠遣人相呼昨晚往見之問及先生所以戒其用寬之實幹謂不知其故想是自有見處帥云南康之政凡事皆欲搜索理會雖前官巳結斷者亦多改政又謂如前官巳斷者合只令經由以次官司不必理會一是免得發前人之失二亦得事簡若一一理會恐反長姦猾幹答以事到面前亦只得為他理會况前官所斷巳錯人情或有寃抑安能不為之動心帥卻云只令經以次官司亦不到全無一人理會得偶渠坐間人吏羣立不欲力與之辨似此等議論百姓何賴焉義理不明雖有美質終為邪説所惑也浦城之寇嘯聚百餘人臨江一市焚毁大半幸巳撲滅此皆非細故石應之以王黨見逐徐居厚不知其故吕子約除藉田令方羣憸彚征不知子約知幾之明克亂之才果可以周旋其間否幹一兩日人事擾擾書院中六七小童得方大哥監視之可以杜門終日尋繹遺經足以自樂未有請教益者當俟後便也彼中有便數蒙誨賜慰此拳拳幸甚幹侍旁幸安偷間溫習比去嵗差得暇耳聞祠命巳下竟遂間退之志學者之幸也此間朋友數人亦難得志尚堅苦者反顧年不後人亦有痛自點檢耳蔡丈想不久須到意思斂退就實殊可敬重相聚不欵别去深用懷想膚仲地未入手有凖僃者近特遡流為圖之又為他人所先其人乃無心得之地之難圖如此不知大哥窀穸有定所未邪蔡丈為膚仲言閩清一穴極佳膚仲之力不能辦不知先生肻逺就此否幹少稟劉仲則來訪云渠見攝帥幕帥於同列多不相下辛憲又非能下人者一旦有隙則禍有所歸渠欲得先生道其姓名於辛憲幹與之有世契不能辭可否幸裁酌仲則相訪巳悉以尊意達之仲則近巳得鄉樞薦章劉邑長終是清徑明決郡官有章司理者極曉事趙司户者純粹皆可喜章司理以小眚為帥斥責對移自是僚屬皆束手莫敢任事喜怒之不可不謹如此先生將漕之命恐是廟堂決意欲行三州經界其勢亦恐難辭果爾鄉邦不世之遇也尊體小小不快想亦無甚害幹身為人束縳不能走侍不勝慕戀之情七月初便當一出書會人情不美自是初以為貧而受之既而以親戚尊長不可辭若無間事出入應接則在我者得盡其職在彼者亦自無辭以相怪受人子弟而不免出入則彼雖未形之辭色而此巳惕然不自安矣若必曰但據自家任便出入彼不足恤則非幹所敢為所幸止有百餘日耳人情不美不足怪最苦是有妨日力也朋友往還十餘人實用力者一二耳又多相逺不得朝夕講切然自省之功亦不能全恃他人也朱曾叔兄弟今亦到此通老知丞丈過終是篤實可愛可重想不久須造席下偶李簿行附此幹初八晚巳抵侍旁老幼幸無恙更留二十餘日方可告歸一房兒女久勞撫念重以為愧家兄此間亦能盡職俸雖薄亦足奉親凡事只得逐日驅遣不暇為異日謀也特老人於幹一房尤所鍾愛甚欲令挈為此來亦俟相度事勢如何耳過玉山六七舅巳為古人生平意氣不凡雖欲為生産之計亦無所就客居蕭然殊可傷悼玉山境內彌望如赭塘井盡涸三衢粗勝聞彼尤甚此數日雨意不成細民嗷嗷良可念也鄧子禮尚留此九月可與之同歸此書稱主管修撰先生乃八月十日書也幹以初八日抵侍旁所幸尊幼皆安親老尤安健稍足自慰家兄以近制成資須得部符乃聽解罷巳遣人料理未回解任須在八月初復以乳婢感冒不能行未可即登途度歸計須在此月末抵建陽須當暫留恐雙溪有妨縣官宴飲則近市别得一小屋亦佳望囑儲宰為預謀之家兄歸計及參部之計未知所濟巳懇一二親舊為假貸之策過上饒趙守亦許以歸日相周旋但未知所假足用與否亦且只得挨去看如何休致不允之命想幹離後兩三日即到再上之章想亦遣行楊子直劉智夫皆在此遷延避暑且候迓兵蓋以近日有臺疏言過家上冢宿留不行者皆為故稽君命其意指林和叔樓大防而言故諸公皆為遷延中道之計而不敢過家上冢矣田子真之語或者謂其對人稱許止吕秦之事果爾亦可謂輕率之甚也然指斥如此乃得罷去稍涉權要遂至遷謫輕重不倫豈所以為尊君哉汪季路之罷蓋以臺官先論孫元卿袁和叔陳武三人考校涉私有錢原者臨安人家巨富偶試屢中故三人者遂坐此謗季路為之辨析故臺論並及之别無他罪但以臺諌論事不當復辨矣楊元範遷祭酒蓋亦自覺其巳甚而能自悔同列以其有異意故去之張鎡乃昌黎莫逆與其兄爭分業張鎡主昌黎而其兄主王德謙元範乃論張鎡罷之此所以為異意也黃元章除殿院蓋實嘗與昌黎有雅好但黃亦善人想亦不敢為已甚也昌黎麻辭甚褒雖其祖之功莫能過中有一語初云獨成與子之功余揆貼云力參與子之功昨聞詔語亦貼二三字如此則余豈能久安相位哉余鄭皆非能久安者何公舊物之除意或在此也鄧千里昨日方到此則云欲褫餘於職名故以囑何公耳但諸賢豈能皆自保哉道學之圖聞髙文虎之子所為又有一圖云右道學則以鄭惠叔為首楊元範次之以其助佑道學也髙文虎短喪之請復有一劄乞置都虞侯如監軍之類以上所親信為之庶幾可以相繼而無専兵之患或以其意蓋主王德謙也其無知敢於欺君黨惡乃如此吳斗南有書力排短喪之議然吳斗南巳彈冠而赴架閣矣其不變而從者幾希近日所聞大抵如此無可言者年穀大熟可以寬生靈旦夕之死未知造物竟何如也辭職休致之情楊子直劉智夫皆以為可以巳之子直以為不巳則亦當婉其辭但力言辭受之義而不必他及智夫以為不巳則受職名而後求休致幹以為子直之説近是而智夫之謀甚疏要之二公之論皆主於畏禍幹謂禍不足畏但使吾之所處者一合於義則死生禍福一聽之天命可也詘道以畏禍非也非道以取禍亦非也故前日封事不可上今日辭職休致不可巳以此決之似可以質諸聖賢而不惑矣智夫之論不足深怪子直素稱學者然其言論操守矜持嚴整而考其用意皆出於畏禍此所謂同行異情者與之語殊使人駭笑自謂今日之事全出其力蓋當初欲行遣二三十人某為之首卻被某輪對為平平之論許多事都蓋抹此非所謂枉尺而直尋者乎又言先生不可復論事但婆娑山林以聽之與某書失名遊談諸司聞其説蓋云吕仙遊雖與吕子約為再從兄弟然其議論趨向絶不似子約可嘆可嘆名家之子不能安分求榮得辱其褒也乃所以為貶也幹去嵗扶護還家家兄相謀葬地告以蔡丈所遷穴只是蓋得不密地中雖有水痕而所藏之禾兩年尚發青芽此可見地氣之暖家兄不從乃自見行視數處皆全不成形局後乃注意兩處其一號庵前其一號後窟庵前卻在舊墳包內止是山包內裏卻於山背開穴形尖勢反風氣宣泄土石頑礦後窟乃在背逼窄反逆又更全不成地頭此兩處雖村夫牧童亦知其不可家兄執之甚堅其説以為合宗廟水法及親舊如膚仲景思謙之彥忠溥之諸人來説即以無風水無禍福卻之以為蔡季通信風水邪説故有身竄子死之禍惟吕東萊真是大賢見得明白諸弟力以為言則欲委而不葬見其所執之堅如此決欲以六月十六日葬庵前穴內舅氏勸其併舉先人合葬及開壙見欹側之狀方惻然欲寬葬期以去嵗曾用磚結砌兩處作兩小壙試其可用與否及開庵前一穴則滿穴皆臭水不可近恐其説之不勝遂開後窟一穴偶山燥無水遂決以為可葬目下用工開掘其地頭全無可取全不成形勢但欲幸其説之勝而不思親體之安但以為無水而不思水之外尤有可慮所幸葬期尚寬猶可商議但家兄既堅不用蔡丈之穴以為便試得無水亦不可用則無復可言者矣日夜思之心神昏亂無以處此以兄弟論之則止得順從以父母遺體論之則人子之心實有所不忍以目前未葬論之則不可以不速葬以既葬而有水蟻之患論之則不如緩葬之為愈咈長上之意以不葬其親其名固不美欲兄弟之歡以虧父母之遺體其實又不安智識淺陋莫能決此欲望先生為熟思之賜以一言若以為可從則止得俯首聽命若當熟諌則亦乞先生反覆為家兄言之以釋其惑幹亦率親故力言之少遲一二年以俟其定望先生為斟酌之存沒均受大賜幹罪逆不孝二親巳畢葬事音容永隔痛慕何窮葬非其地此心如割每一起念不如無生以尊長之意止有抑遏含忍而巳辱存撫之至不勝哀感適此痛苦復逼隆冬病軀為寒氣所襲輿病還家復聞後山蔡丈之訃拊心號慟纍日不能巳該博通達如斯人者豈易得哉以是氣疾轉甚纍夜不能就枕多服疏導藥如紫蘇香附之屬方少瘥念欲即走侍師席以病後尚怯寒更旬日方可離此喪禮旦夕携往拜呈其條例先具别紙乞先生思慮只條例定則其中小小曲折易整頓矣扶病拜覆草草此書稱侍讀先生十一月十九日書也林井伯歸聞先生尊體不安甚以懷念及得此書筆畫辭意殊無病狀且見鄭子仁具言啓處之詳方稍自慰終以書會相絆未能走侍為恨兩日方聞引年之請巳下先生拳拳宗社之意固未忍忘然禮與時合且得省分疏亦是一事也幹衰病之軀日困多事自妨巳業甚以為懼朋友亦有五七人可與語初亦且令識得性情部伍認得虛靈體面庶幾讀書存養不至全無著落然學者之患在於志卑氣弱度量淺狹規模褊陋則雖與之細講恐終無任道之意故須是有大規模又有細工夫方成個人物故常以此提撕之恐中庸所謂髙明中庸廣大精微亦此意也幹自治未至何以教人顧誦先生之言與朋友共講之亦賴以自警耳幸先生有以警教之精舍朋友聞稍有人雖多方以禁之而卒不能以尼其來亦足見先生之道益尊而人心之理未易泯也楊丞此來留半月餘學者如此人誠不多得其胸襟無一物只有向先生之道而巳讀書窮理比舊似稍通曉但説不甚出亦不甚能問辨且自言其平生仕宦視辛幼安輩如小兒獨於先生之前則畏憚不敢發一語更望先生詳細與之語若其有所得卻勝似世間一種心地紛擾利欲膠圖底人物也鞏仲至屢相見其説多而雜虛泛而無倫理然其蕭散樂易之意亦今之所難得見先生與渠書句句皆藥石又見渠今所拜先生書稿則又止似溺於所好未必能增其所不能也鄭齊卿下喬入幽大為失計讀書似得路徑漸直亦勉其再往然苦多病未能也庚一庚二哥觀其氣象亦漸律貼但後生心性難馴易變安得一旦幡然棄其童習而惟家學之是慕耶丁寧誘掖以漸闕與辛稼軒侍郎書幹拜違几舄十有餘年禍患餘生不復有人世之念以是愚賤之迹久自絶於門下今者不自意乃得俯伏道左以慰拳拳慕戀之私惟是有懷未吐而舟馭啓行深夜不敢造謁坐局不敢離逺終夕展轉如有所失恭惟明公以果毅之資剛大之氣真一世之雄也而抑遏摧伏不使得以盡其才一旦有警拔起於山谷之間而委之以方面之寄明公不以久間為念不以家事為懷單車就道風采凛然巳足以折衝於千里之外雖然今之所以用明公與其所以為明公用者亦嘗深思之乎古之立大功於外者內不可以無所主非張仲則吉甫不能成其功非魏相則充國無以行其計今之所以主明公者何如哉黑白雜揉賢不肖混殽佞諛滿前橫恩四出國且自伐何以伐人此僕所以深慮夫用明公者尤不可以不審夫自治之策也國家以仁厚操馴天下士大夫之氣士大夫之論素以寬大長者為風俗江左人物素號怯懦秦氏和議又從而銷靡之士大夫至是奄奄然不復有生氣矣語文章者多虛浮談道德者多拘滯求一人焉足以持一道之印寄百里之命巳不復可得况敢望其相與冒霜露犯鋒鏑以立不世之大功乎此僕所以又慮夫為明公用者無其人也內之所以用我與外之所以為我用者皆有未滿吾意者焉勉齋集卷四
