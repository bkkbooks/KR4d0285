body:
  text: 勉齊集卷一宋黃幹撰講義臨川郡學乾元亨利貞文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞孟子曰無惻隱之心非人也至不足以事父母五三載籍之傳以仁義禮智對立而並言者自孔孟始前此未之聞也孔子發之於易孟子深於易從而祖述之示人之意深矣天地奠位而隂陽分隂陽既分而五行具天地之大所以行四時而生萬物者不過隂陽五行之理而已元者春之生而其行為木亨者夏之長而其行為火利者秋之成而其行為金貞者冬之藏而其行為水人禀隂陽五行之氣而生乎天地之間則亦具元亨利貞之德而為仁義禮智之性元之德於性為仁亨之德於性為禮利之德於性為義貞之德於性為智天地而非元亨利貞不能以行四時生萬物人而非仁義禮智又何以充四端制百事哉均是人也均賦此性均具此形夫子之言特以為君子行此四德孟子之言又有不能充之者何哉蓋人受天地之中無非此性雜之以氣質撓之以習俗不能親師取友以致其學問之功雖有此性亦未免於晦而不明窒而不通矣今夫暴虐狼鷙傷人害物則無復惻隱之心矣頑鈍嗜利寡廉鮮耻則無復羞惡之心矣驕淫矜誇傲狠凌物則無復辭讓之心矣背善趨惡舍正習邪則無復是非之心矣如此則雖有人之形以生亦何以異於禽獸哉此無他學問之功不明而無以全其本然之性也古之君子博學之審問之愼思之明辨之篤行之非誇多鬪博以為能也絺章繪句以為工也求其知吾性之至善以全其所固有也故其仁之用足以愛人而利物義之用足以制事而度宜禮之用足以事上而接下智之用足以明物而察倫是豈獨足以盡人之性哉蓋將與天地相為流通而無間矣三代而上此道素明故黎民於變比户可封雖閭巷匹夫亦無往而非賢也秦漢以來功利之習勝而此道始不明矣大山長谷之中田夫野叟尚有能守其醇厚質實之素而通都大邑經生學士反不及焉其聞見甚博也其文辭甚工也考其胸中之所存而察其操履之實則其可愧也多矣其天資之美者亦不過安常守分而於聖賢教人之方漫不加省舉世滔滔隨波逐流醉生夢死豈不甚可悼哉誠能玩大易之旨味孟子之言反觀默省而知吾心四德之本窮理格物而辨吾心四德之實存養修省而審吾心四德之幾勉强力行而全吾心四德之用則天地之所以為天地聖賢之所以為聖賢皆吾分內事也又何苦甘心於庸淺下流之域而與草木俱腐哉大易之言四德而必贊之以乾元之大孟子之論四端而必首之以不忍之心蓋仁義禮智者吾心之所固有而仁足以包四德猶四時之運而春生之氣未嘗不流行乎其間也春者歲之始朔者日之始即大易之所謂元孔孟之所謂仁也夫道豈難知哉人病弗求耳有志之士盍相與勉之隆興府東湖書院子曰道之不行也我知之矣一章道者何君之仁臣之敬父之慈子之孝與人交之信根於吾心之本然而形見於事為之當然者皆是也曷嘗有過與不及之偏哉過與不及此道所以不行不明也然嘗竊有疑焉賢與知人品之最髙者也一有過焉則不異於愚不肖愚不肖志於道而有不及特未造夫道耳其與違夫道者有間矣而遂指以為愚不肖焉何哉蓋道之在天下中而已過非中也不及非中也賢且知而失之過則如楊墨佛老而其流至於無父無君豈不深可畏哉志於道而不能以合夫當然之理則明有所未通誠有所未立雖謂之愚不肖可也聖賢衛道之嚴所以力勉夫人以大中之道者蓋若此然則學者當何如哉博學之審問之愼思之明辨之篤行之不惑乎賢且知之過不墮乎愚不肖者之不及則庶乎其可也若曰學可以不講而一蹴可以至乎聖賢之域既未免乎賢且知之過至於用力不篤悠悠玩日而卒無得則雖謂之愚不肖亦奚不可哉同志其勉之新淦縣學子貢問曰何如斯可謂之士矣全章子路問曰何如斯可謂之士矣一章爵有五士居其間民有四士為之首謂之士者誠可貴也人物並生天地之間而人為最靈謂之人則宜其舉相似也而士為貴何哉以其記誦之多文辭之工耶則由與賜優為之矣乃汲汲然以士為問何也夫子之於二子非有所隱也至其告之者不過於行己事君入孝出弟言信行果與夫處兄弟朋友之間又何也人之大倫五父子也君臣也夫婦也兄弟也朋友之交也父子有親君臣有義夫婦有别長幼有序朋友有信五者人之大端也舜命契為司徒必先於敷五教三代之學皆所以明人倫也則謂之士者捨是無急焉矣後世則不然父子之所告詔師友之所訓誨有司之所選掄記誦而已耳詞章而已耳人道之大端不暇講也如是而謂之士其果可以當此名耶謂之可貴未見其真可貴也雖然天生蒸民有物有則民之秉彞好是懿德孩提之童無不知愛其親及其長也無不知敬其兄孺子入井而怵惕惻隱之心油然以生者人莫不有是心也聖賢慮夫人之莫覺也又為之推明演繹載之簡策炳然易見學者誠能端居靜慮察吾心之固有博學審問以求聖賢之格言存之於心體之於身措之於事則人道之大端既有以得之而士之美名始可以無愧矣此豈溺於記誦詞章之習者所可望哉敢以所聞於師友者為諸君誦之王子墊問曰士何事孟子曰尚志全章仁人之安宅也義人之正路也曠安宅而弗居舍正路而不由哀哉孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也論語一書未嘗以仁義對言而孟子言仁義者不一而足聖賢之教宜無異指而若是不同何也仁義性所有也夫子言性不可得聞而孟子道性善者夫子教人無非仁義之道使人油然入於仁義而不自知也孟子憫斯世之迷惑故開關啓鑰直指人心而明告之也五常百行皆性所有而獨言仁義又何也仁蓋總其名而五常百行其支派也孟子提綱挈領使人由是而推之無往而非仁義也孟子之言仁義也其强為是名耶抑亦有自來也且何以知其為性所有而五常百行之總名也夫子固嘗言之矣立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義三才之道一而已隂陽以氣言剛柔以質言仁義以理言也人受氣於天賦形於地禀隂陽剛柔氣質以為體則具仁義之理以為性此豈人之所能强名而五常百行孰有出於仁義之外哉道固莫大乎仁義矣而孟子又曰惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也向之二者分而為四又何也天固不外乎隂陽隂陽互分而為老少則為四矣隂陽互分而為老少金木水火之所以流行也木神則仁金神則義火神則禮水神則知五行既不外隂陽則五性不外乎仁義也嗟夫人禀五行隂陽之秀氣以生而具有仁義禮智之性所以與天地並立而為三也自其為氣禀所昏物欲所蔽則惻隱者變而為殘忍矣羞惡者變而為鄙賤矣恭敬者變而為傲慢矣是非者變而為昏愚矣如是則雖具人之形而亦何以異於禽獸哉以天地並立之身一不自覺則流而為禽獸然則學者其可不思所以自勉之乎古之欲明明德於天下者一章學之為義大矣人心之所以正人倫之所以明家之所以齊國之所以治天地之所以位萬物之所以育未有不須學以成者唐虞以來司徒掌教后䕫典樂皆學之所由興也至商而後有學之名至周而後有學之法洙泗之間師友講習而學之條目纖悉始具蓋嘗求其所以為學之綱領者曰致知曰力行而已大學曰物格而后知至知至而后意誠意誠而後心正心正而後身修物格知至者知之事也意誠心正者行之事也中庸曰博學之審問之愼思之明辨之篤行之學問思辨者知之事篤行者行之事也書之所謂惟精惟一易之所謂知崇禮卑論語之所謂知及仁守孟子之所謂始終條理無非始之以致知終之以力行蓋始之以致知則天下之理洞然於吾心而無所蔽終之以力行則天下之理渾然於吾身而無所虧知之不至則如擲埴索塗而有可南可北之疑行之不力則如弊車羸馬而有中道而廢之患然則有志於聖賢之域者致知力行之外無他道也秦漢以來一世之士不騖於詞章則溺於訓詁不陷於功利則惑於異端是固不足以語聖賢之學矣至於我朝周程夫子出繼斯道不傳之緒二三大儒又從而相與推明之於是古先聖賢教人為學之道至是而復明然講明之精記問之博而不能反躬實踐者既不足以造夫道脫略章句馳心髙妙以為聖人之道不假學問可以一蹴而入者又未免於空虛無據之失學者誠能於立心之始玩聖賢教人之法循序而進焉則庶乎得其門而入矣君子喻於義小人喻於利君子求諸已小人求諸人君子上達小人下達君子周而不比小人比而不周君子和而不同小人同而不和君子泰而不驕小人驕而不泰古昔聖賢所以教謹於君子小人之辨者至矣毋乃太刻切而少寬裕耶蓋善惡兩塗判然如薰蕕冰炭之不相入剖析而言之所以使人去惡而全善也聖賢教人之意切矣其曰君子喻於義小人喻於利君子求諸已小人求諸人君子上達小人下達此以其趨向之相逺者而言也其曰君子周而不比小人比而不周君子和而不同小人同而不和君子泰而不驕小人驕而不泰此以其趨向之相近者而言也言其相遠所以決取舍之機言其相近所以審毫釐之辨聖賢立言所以諄諄而不能自已也然即數章而觀之雖其言各有所稱總其要而論之則循天理者為君子狥人欲者為小人也所喻者利所求者人所達者下曰同曰比曰驕皆狥乎人欲者也所喻者義所求者已所達者上曰和曰周曰泰皆循乎天理者也天理人欲之間而君子小人之分定矣人之常情譽之以為君子則欣然而喜斥之以為小人則拂然而怒此秉彞好德之良心也至其心之所存身之所履往往舍君子而為小人之歸則亦不能充其心之本然而巳孟子曰羞惡之心人皆有之是非之心人皆有之誠能自全其好善惡惡之本心廣而充之則駸駸乎君子之途矣幹備員於此甫及朞月拙直之資疵繆之政得罪於百里之士民多矣方將日遊鄉校以聽諸賢然否之議以其鄙見更相往復而為理義之歸廟堂過聽忽有改除之命行將遠别惟同志之士更相勸勉計今以往將有以德行純實識見超遠著於鄉閭者此則區區之至願也竹林精舍祠堂嘉定丙子仲秋上丁之翌日同舍諸賢㑹於先師之祠下祀事畢俾幹講明先師教人之意愚不肖何足以當此重念廢學日久政有望於講習之益故敢僣言之竊謂先師之道本諸無極二五流行發育之妙具諸天理人心常行日用之間存之則為聖為賢去之則為下愚為不肖堯舜禹湯文武周公躬行於上孔子孟子濓溪二程講明於下逮我先師剖晰毫釐窮極幽渺推明演繹炳如日星為學者慮至深切也至其教人之方則曰居敬曰窮理曰力行此又其諄諄反覆而屢言之者所讀之書則先之以大學次之以語孟而終之以中庸其為科級則又皆可循序而進也從遊之士亦嘗從事於斯矣夢奠之後篤信力行者不無其人其間亦有如幹之類棄其學日負初心者不可不深求其故也趨向卑而立志之不髙私欲昏而信道之不篤尋行數墨而見理之不明入耳出口而反躬之不實此其所以粗能有所聞而不能朞月守也嘗試思之一命之爵人未有輕辭之者十金之産人未有輕棄之者以其可貴也聖賢之道其為可貴豈直一命之爵十金之産哉受天地之中以生而聞堯舜禹湯數聖人之道居禮義之國而得大賢以為之依歸豈可不誦之終身而遽忘之乎昔者孔孟之教人曰守死善道曰舍生取義夫死生亦大矣至於道義之可樂則生不足戀而死不足顧生不足戀而死不足顧則於聖賢之道如飢者不忘食渴者不忘飲行者不忘歸病者不忘起猶未足以喻其切也如是則可以無負於先師之門矣不則隨波逐流醉生夢死卒為一世庸人而不自覺也豈不深可哀哉此則愚不肖之所深病敢布露之以庶幾君子之見教焉安慶郡學易大傳曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義天之道不外乎隂陽寒暑往來之類是也地之道不外乎柔剛山川流峙之類是也人之道不外乎仁義事親從兄之類是也隂陽以氣言剛柔以質言仁義以理言雖若有不同然仁者陽剛之理也義者隂柔之理也其實則一而已天地亦大矣人以渺然之身乃與天地並立而為三至其為道則又與天地混然而無間其可不知所以自立哉非隂陽剛柔則雖天地不能以自立不仁不義則亦不可以謂之人矣不謂之人則與禽獸奚異哉由仁義則與天地並立而無間不仁不義則無以自别於禽獸學者於此其亦知所擇矣雖然仁義之道不在他求孟子曰惻隱之心仁之端也羞惡之心義之端也又曰孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也仁義之道根於吾心之固有初非有甚髙難能之事也存之於虛靜純一之中推之於動作應酬之際則仁義之道在我矣試以吾平日設心者思之果能事親而孝乎果能處宗族而睦乎果能交於鄉黨朋友而兼所愛乎果能視人而如已乎果能視民如傷乎即是心而充之以至於無一念之不公則仁之道盡矣果能從兄而順乎果能事上而敬乎果能應事接物而求其是乎果能見害不避乎即是心而充之以至於無一事之不宜則義之道盡矣盡仁義之道則仰不愧俯不怍而上下與天地同流矣苟為不然人我之念汨於中利害之私昏於外雖父子骨肉之間已不能相保而況於仁民愛物乎飲食起居之際已不能中節而況於酬酢事變乎凡吾本然具足之良心已斫喪無餘矣其視虎狼之父子螻蟻之君臣且不能無愧而又何以為人乎夫以天地並立無間之身仁義本然具足之性不知自貴自重而陷溺至此此聖賢之所以拳拳為斯世慮也有志於學者即此而致思焉則知所以入德之門矣書曰惟皇上帝降𠂻於下民若有恆性克綏厥猷惟后歷考聖賢垂世立教示人以性其源流蓋本諸此夫教亦多術矣而必以性示人者使人知有生之初萬善具足為聖為賢不待外求而可以取足於吾之一身也性者人所固有也而言性必以天者使人知吾此性純粹至善莫非天理之本然而初無一毫人為之私也性者天所賦也而克綏其道必歸之君者人性雖善而氣稟之雜物欲之私或得以汨之故必有聰明之君設為教化以防間之然後得以全其本然之善也羲農以來繼天立極莫非此理至於成湯乃始抽關啓鑰明以示人自是以來蒸民之詩曰天生蒸民有物有則民之秉彞好是懿德劉子曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也子思曰天命之謂性率性之謂道修道之謂教孟子曰非天降才爾殊也所以陷溺其心者然也皆成湯之意有以發之也夫自商而周以至春秋戰國千有餘年聖賢迭生立言垂訓如出一人之口信乎此理之不可易也人生天地之間蠢蠢林林不勝其衆也反而求之吾身則人莫不有是性性莫不具是中莫非天之所生莫非君之所教人何忍自暴自棄而卒為小人之歸乎在昔盛世此理素明天下之人皆知吾之有是性皆知性之具是中皆知天之所生君之所教莫不相率而趨於善其效至於比屋可封黎民於變人人皆有士君子之行周德既衰聖賢之道不傳異端邪說復起而乘之髙者溺於空無下者趨於功利學士大夫已不知有斯道之正統而況於下民乎此風俗之微始不能以如古矣至我本朝名儒迭興相與推明聖賢之道以繼孔孟不傳之緒其載之方册亦既家藏而人誦之矣當秦漢之後而獲聞堯舜禹湯文武所相傳之道顧非幸歟誠能於此深思而力行之存吾天命本然之善以無負於君師教育之意是則區區深有望於諸君也樂記曰人生而靜天之性也感於物而動性之欲也物至知知而後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣昔堯舜十六字傳心危微精一之辨豈欲動情勝者之所能及也哉凡吾一念之發必精以察之曰是合於道乎抑離於道乎其純粹而無疵乎抑猶有毫釐之差乎無一念而不合乎理無一理而不造其極若是而後可以謂之精也察之精則所謂人心固已合於道矣又必一以守之朝於斯夕於斯造次顚沛無適而不於斯焉事物膠轕萬變不窮天理渾然無少間斷如是而後可以謂之一也精而察之於其始一以守之於其終則視聽言動起居食息無往而不合乎中矣堯舜禹之授受也洪水則未平五品則未遜三苖則未格其相告戒必有先務之當急者而其所言乃止於此蓋心者萬化之根本此心不正則欲足以敗度縱足以敗禮雖一身之內亦且顚倒錯繆而不合其宜矣又何以齊家治國而平天下哉是以古之帝王雖居萬乘之尊享九州之富而兢兢業業如履淵冰左史則書其言右史則書其動至於聲氣之高下若無害焉者亦有御瞽以幾之盤盂則有銘几杖則有戒升車行步莫不有節無非檢防其心使之無一念不合乎道也故曰人不足與適也政不足與間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣然則堯舜禹之相告戒舍是宜無急焉者矣以堯舜之聖處帝王之尊而所以自治其心者如此世之學者不知此心之為重而任情縱欲驕逸放肆念慮之頃或升而天飛或降而淵淪或熱而焦火或寒而凝冰如狂惑喪心之人雖宫室之安衣服之適飲食之宜亦茫然莫之覺也豈不深可憫哉聖賢垂訓炳然明白學者蓋亦深思而熟玩之哉南康白鹿書院乾之九三曰君子終日乾乾夕惕若厲旡咎文言曰君子進德修業忠信所以進德也修詞立其誠所以居業也坤之六二曰直方大不習旡不利文言曰君子敬以直內義以方外敬義立而德不孤直方大不習旡不利則不疑其所行也聖人作易於乾坤二爻首言學問之事以誨人其旨深矣乾之九三以陽居剛得乾之正而當下卦之上坤之六二以隂居柔得坤之正而居下卦之中以其居中得正而復在下故即二爻以明問學之道也乾天道也至健而動故曰君子終日乾乾夕惕若厲以言其自强而不息故雖憂危而實無咎也坤地道也至順而靜故曰直方以言其守正而不撓故所蓄者大而不習無不利也人能自强如乾守正如坤學問之道無復加矣不能自强則怠惰乘之不能守正則放僻乘之尚何學問之有哉爻詞之義亦已備矣聖人慮夫天下後世未明夫所以自强者何事所以守正者何道也故為文言以廣之曰所以自强者內以進其德外以修其業皆當終日乾乾而不息也所以守正者內以存吾敬外以行吾義敬立則內直矣義形則外方矣秉五行之秀以生而具仁義禮智信之理者德也充是德而見之應事接物者業也德不充之以業則不進業不本之以德則不修學者所志孰有先於此者乎主一無適而虛明不昧者敬也窮理度宜而品節不差者義也不敬則所主紛擾矣不義則所行悖繆矣學者所務又孰有急於此者乎知所以進德修業又知所以居敬集義則乾之自强坤之守正學問之道無餘蘊矣又嘗因其義而推之乾言德業坤言敬義雖若不同而實相為經緯也欲進乾之德必本之以坤之敬欲修乾之業必制之以坤之義非敬則內不直德何由而進非義則外不方業何由而修終日乾乾雖進修夫德業而所以進修者乃用力於敬義之間用力於敬義固可以至於大而所謂大者乃德之日新而業之富有也即是而思之則知二爻之詞文言之旨誨人之意愈明而所謂學問不待他求而得之夫易之為義廣矣大矣乾坤二卦又諸卦之首也乃拳拳以學問為言而提綱挈領反復詳盡又如此有志於學者不於此而加意焉則亦無所用力矣勉齊集卷一
