body:
  text: 勉齋集卷二宋黃幹撰講義漢陽軍學王子墊問曰士何事孟子曰尚志一章孟子曰自暴者不可與有言也一章人物並生於天地之間負隂而抱陽均氣而同體未始不相似也靈於物而謂之人賢於人而謂之士則其等級亦甚遼絶矣渴飲而飢食趨利而避害人物之所同也士居其中獨超然有以異於人與物何哉以其能立吾志而惟仁義之是趨也苟為不然則章甫其冠縫掖其衣懵然而無識頽然而無志其所尚者不過飲食利害之間謂之人已有愧矣亦何以當為士之名哉故為士者要當以立志為先而立志者要當以仁義為主仁義者天理之自然人心之固有也為宅也而安為路也而正人之不可以不居而由之也言而非之是自害也委為不能是自棄也士之異於人物者以其立志而惟仁義之趨也自暴自棄是舍其所以異於人與物者而不足以謂之士矣諸君處庠序而謂之士者也盍亦先立吾志講明是理而力行之庶幾居仁由義而無愧於為士之名不然則汨沒於飲食利害之間識陋而志卑醉生而夢死孟子所謂哀哉豈不甚可哀也哉諸君其勉之滕文公為世子將之楚過宋而見孟子一章滕之為國方五十里國之至小者也間於齊楚勢之至危者也以至小之國處至危之勢干戈相尋翦焉傾覆可立而待也文公思所以自全之䇿不謀之申商管晏之徒顧乃即孟子而問焉孟子亦當告之以國若何而富兵若何而強庶乎其可瘳也一則曰性善二則曰堯舜何其迂濶而不切事情耶性者人之所得於天之理也堯舜者盡此性者也苟盡此性堯舜可為也況於區區之富強乎人無賢愚均具此性堯舜之聖人皆可為何獨於文公而疑之哉孟子歷引成覸顔淵公明儀之言所以釋文公之疑卒之以若藥不瞑眩厥疾不瘳所以厲文公之志也道之不明久矣舉天下之人汨沒於利欲之中貪夫徇財烈士徇名夸者死權衆庶馮生天之所以與我而堯舜可為者懵然莫覺也辟如甕盎之間百千蚊蚋須臾之頃乍起乍滅何足道哉諸君誠能深思孟子之言而厲之以自強之志則將有以超然獨立乎萬物之表而天下之至貴無以復加矣夫子曰未之思也夫何遠之有諸君其亦反而思之哉孟子曰人皆有不忍人之心至不足以事父母仁義禮智心之體也惻隱羞惡辭讓是非心之用也古之言道未有若是之深切著明也人稟五行之氣以生有是氣則必有是理仁義禮智者木火金水之理也有是體則必有是用惻隱羞惡辭讓是非者仁義禮智之用也人莫不有是氣則莫不有是理莫不有是體則莫不有是用此天之所以與我而人之所以為人者也天下之人倀倀然於覆載之間亦嘗反諸吾身而思之乎飢食而渴飲趨利而辟害則知之矣至於天之豫我而人之所以為人者乃反不知焉何哉孟子憫斯人之愚而莫之覺也故為之反復開示之既啓之以孺子入井之端又告之以火然泉達之始知是理而充之則足以保四海不充之則不足以事父母充不充之間而功用之遼絶乃如此其教人之意亦切矣世之學者未有不讀七篇之書者也而莫有知其立言之為切者何哉習俗之所汨利欲之所昏既無明師良友以示之又無誠心堅志以求之譬如大明當天而瞽者莫之見也豈不甚可憫也哉學者誠能於此玩味而有得焉則聖賢之道庶乎其有入德之門矣公都子曰告子曰性無善無不善也一章古之言性者多矣何其紛紛而不一耶在商書則言常性在周書則言節性在孔子則言性相近在孟子則曰性善聖賢立論固已不同下至諸子則荀子言性惡揚子言善惡混韓子言三品佛氏則又以知覺言性然則後世將何所折𠂻耶蓋嘗即數説而考之性即理也理無不善氣質之稟不能皆同則所受之理亦隨以異此善不善之所由分也商書之言常性孟子之言性善此指理而言也周書之言節性孔子之言相近此指氣而言也所指雖異亦何害其為同哉荀楊佛氏則敢為異論而不顧者也謂之惡則性無善矣謂之混則善惡相對而生也此豈理之本然者哉知覺者人之精神而又非所以言性也惟韓愈生於數子之後獨有得於聖賢之意其曰性之品有三則孔子相近之謂也所以為性者五則孟子性善之謂也故其自視以為世無孔子不當在弟子之列而每以孟子自比者夫豈無所見而然歟愈之言則善矣然性之品有三亦未知其所以然也逮我本朝關洛之學發明孔孟不傳之遺旨曰性即理也天下之理原其所自未有不善又曰人生氣稟理有善惡又曰形而後有氣質之性善反之則天地之性存焉然後聖賢之意坦然明白而諸子異端始無所容其喙矣學者知理之無不善則當加存養之功知氣質之有善有不善則當施矯揉之力務本之學未有急於此者君其勉之孟子曰仁則榮不仁則辱一章孟子曰三代之得天下也以仁一章人稟五行之秀氣以生所稟之理則為仁義禮智信此天之所以豫我而人之所以為人也天生五材缺一不可在易之乾則曰元亨利貞在人之德則曰仁義禮智而不及乎信者何也仁義禮智莫非實理之為信猶土之居中而旺於四季也故四端不言信而信在其中矣仁義禮智四者並立而聖人於易獨曰立人之道曰仁與義七篇之書亦多以仁義對言而又不及乎禮智者何也仁屬乎陽禮則陽之極義屬乎隂智則隂之極猶夏者春之極而冬者秋之極也故專言仁義而禮與智在其中矣至於孔門師生之問答又皆以求仁為先而不及乎義孟子此章亦特以仁為言者又何也蓋仁者天地生物之心而人之所得以為心者也四序之運莫非生意之流行此心之妙亦孰非仁道之流行乎君仁臣忠父慈子孝兄友弟恭夫義婦從與夫交朋友之信不仁而能若是乎苟盡此心則安富尊榮亦理之所必然也世教不明人心邪僻父子兄弟之間猶不能以相保況敢望其仁民愛物乎舉天下之間莫非私意之流行相傾相詐相戕相賊無一物得遂其生者至於天下之人牧未有不嗜殺人則私意橫生天理滅矣不知人心既失國其有不殆者乎此孟子於戰國之際深明榮辱得失之辨其憂世之心切矣諸君日處庠序可不知孔孟教人之先務而思所以自勉乎孟子曰今有無名之指屈而不信一章孟子曰拱把之桐梓人苟欲生之一章天運乎上地處乎下隂陽五行周流乎中而人物生焉則人物者均稟天地之氣以為體而均得天地之心以為心也然人之所以異於物者又以其稟氣之正而其心為最靈人物並生於天地之間而獨異於萬物者如此其可不知所以自貴乎聖賢教人必使之正其心修其身者蓋不若是則無以全天地之賦豫而異於萬物也所謂正其心修其身者亦盡吾當然之理而已耳目手足百體具焉身也視明而聽聰手恭而足重此身之理而所以為身者也虛靈知覺百慮生焉心也仁義禮智以為體惻隱羞惡辭讓是非以為用此心之理而所以為心者也內而察諸精神念慮之間外而審諸動容周旋之際無適而不當於理此心之所以正身之所以修也苟為不然則徇情縱欲悖理傷道亦將無所不至矣雖曰具人之形而與禽獸奚異哉孟子憂世之心切故舉其至輕以明其至重欲使斯人反而思之庶乎有以全吾身心之理而無愧於所以為人也讀孟子之書者多矣孰能深味其言而力行之乎以至貴之身心沉溺於利欲之中自暴自棄而不自知也其亦可哀也哉誨爾諄諄聽我藐藐其是之謂夫孟子曰牛山之木嘗美矣一章孟子曰無惑乎王之不智也一章性稟於天故在人無不善之性情發乎性故在人無不善之情所以不善者氣昏之欲汨之也逮其氣清而欲窒則善端未有不油然而生者性善故也書曰惟皇上帝降𠂻於民詩曰天生蒸民有物有則孩提之童至無知也而皆知愛其親赤子入井於已無與也而見之者皆怵惕火然泉達誰獨無是心哉有是心而不能養之養之而不能致其志善端雖萌而為氣所昏為欲所汨天固豫我而我固賊之則與禽獸奚異哉誰能存養於齋莊靜一之中省察於念慮云為之際使吾善端之萌通逹而無窒礙充足而無欠缺如萌蘖之生無牛羊斧斤一暴十寒之害則其至於干雲蔽日也可必矣故為人而合乎天為士而至於聖亦即此心而充養之耳孟子發明養心之論而申之以專心致志之戒其示人之意切矣讀書至此而猶不悟焉則亦終於為小人之歸也豈不深可歎哉孟子曰仁人心也義人路也一章古昔聖賢垂世立教載在方䇿凡言心者不一而足堯舜禹之授受也曰人心惟危道心惟微成湯則以禮制心文王則小心翼翼孔子有操則存舍則亡之戒孟子復斷為之説曰學問之道無他求其放心而已矣聖賢之事業大矣而拳拳於心之一説何耶心者神明之舍虛靈洞徹具衆理而應萬事者也天之高也地之厚也日月之出沒寒暑之往來四序之行萬物之生是必有為之主宰者然也苟無以為之主宰則安能亘古窮今循序而不亂乎人稟天地之氣以為體而得其所以主宰者以為心故人心之妙可以參天地可以贊化育可以修身而齊家可以治國而平天下孰非此心之所為乎然人心至微而攻之者衆耳目口鼻之欲喜怒哀樂之私皆足以為吾心之纍也此心一為物欲所纍則奔逸流蕩失其正理而無所不至矣是以古之聖賢戰戰兢兢靜存動察如履淵冰如奉槃水不使此心少有所放則成性存而道義行矣此孟子求放心之一語所以警學者之意切矣自秦漢以來學者所習不曰詞章之富則曰記問之博也視古人存心之學為何事哉逮我本朝周程先生倡明聖學以繼孟子不傳之緒故其所以誨門人者尤先於持敬敬則此心之自存而所以求放心之要旨也學者即其説而力行之庶乎其有入德之門矣孟子曰養心莫善於寡欲一章孟子嘗言求放心矣又言存其心矣操之則存舍則亡心之存亡決於操舍而又曰莫善於寡欲何也操存固學者之先務然人惟一心而攻之者衆聲色臭味交乎外榮辱利害動乎內隨感而應無有窮已則清明純一之體又安能保其常存而不放哉夫心之所以易放而難操者以其有欲也塵去則鏡明風靜則水止凡天下之可喜可嗜者舉不足以為吾之慮則心之虛靈淡然泊然有不待操而自存矣出門如賓承事如祭夫子之告仲弓操存之謂也非禮勿視非禮勿聽非禮勿言非禮勿動夫子之告顔淵寡欲之謂也二子之問仁則同而夫子告之之異者豈其所到固有淺深歟高城深池重門擊柝固足以自守矣內姦外宄投隙伺便一有少懈而乘之者至矣良將徑卒堅甲利兵掃除妖氛而乾清坤夷矣此孟子發明操存之説而又以為莫善於寡欲也雖然寡欲固善矣然非真知夫天理人欲之分則何以施其克治之功哉故格物致知又所以為寡欲之要此又學者之所當察也聖賢諄諄之誨無非為人心慮也學者讀此書而不知養其心謂之非愚可乎公孫丑問曰敢問夫子惡乎長曰我知言我善養吾浩然之氣至聖人復起必從吾言矣孟子嘗言養心矣又嘗言養其性矣性即理也心具此理者也有以養之則人欲不能為天理之害操存寡欲養之之方也而又有所謂養浩然氣者何哉陰陽五行氣也所以然者理也精粗本一源微顯本無間也陽一噓而萬物生陰一翕而萬物成寒暑之往來風雷之鼓舞無非是氣之用也負陰抱陽以生則吾之氣固與天地相為流通矣是則所謂浩然而至大至剛者也有以養之則富貴不能淫貧賤不能移威武不能屈堯舜之事業孔孟之道德孰非是氣之所為乎苟失其養則委靡巽懦卑陋凡猥錐刀之得則躍躍以喜毫末之失則戚戚以悲聞公卿大人之名則側肩帖耳若不可及語賢人君子之道則望洋向若恍然以驚為媚竈為墦間為妾婦此豈氣之本然哉養不養之間君子小人之所由分也孟子發明養氣之論有功於後世大矣然其所以養氣者必先於集義所以集義者必先於知言能知言則是非邪正曉然於胸中動容周旋無適而不合於義夫是以仰不愧俯不怍有以全吾浩然剛大之體矣養性也養心也養氣也蓋亦一理而已然養氣之論何獨至於孟子而後發耶夫子固嘗言之矣內省不疚夫何憂何懼此養氣之論所由來也屈子曰寧昻昻若千里之駒乎將泛泛若水中之鳬與波上下偷以全吾軀乎諸君其謹擇之孟子曰伯夷聖之清者也至其中非爾力也道之在天下無古今之異聖賢之教人入道之要亦古今一轍也堯舜禹之授受也曰人心惟危道心惟微惟精惟一允執厥中聖賢言道自此始也人心者形氣之私道心者義理之正人心危而難安道心微而難著始而精以察之終而一以守之則無適而不合乎中也傅説之告髙宗也曰王人求多聞時惟建事學於古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懷於兹道積於厥躬聖賢言學自此始也古人之所行方䇿之所載無非道也始而多聞以求之終而遜志以守之則無適而不合乎道至周以來學校之教益修聖賢之道益著若比年入學中年考校自離經辨志以至於知類通達強立而不反離經者求之於方䇿辨志者察之於性情知類通達者見之明強立不反者守之固其教甚詳其法甚密也至於夫子既無位以行其道於是慱採古先帝王教人之法而著為大學之書其言大學之道必先之以格物致知而繼之以誠意正心以修其身亦不過於知與行而已大易曰學以聚之問以辨之寬以居之仁以行之中庸曰博學之審問之愼思之明辨之篤行之皆此意也一知一行相為終始知有不至則不能以徒行行有不篤則雖知無益也入道之要無以復加於此矣是以孟子歷敘伊尹夷惠之事而繼之以孔子非好方人也所以明入道之要也始條理者知之事終條理者聖之事知與行之謂也孔子之異於三子者知之至行之盡三子之不及孔子者知有所蔽於始而行有所缺於終也此孔子之所以獨得其全而三子僅得其偏也知有不至行有不盡雖以伊尹夷惠之資尚不能無愧於孔子而況學者乎世之學者溺於卑近淺陋之習既未嘗有志於聖賢之道其有志焉者則或騖於方䇿而踐履有所不察或專於性情而知識有所不周道之不明不行由此其故也誠能即孟子之説而思之則始終兩盡而無惑乎紛紛之論矣浩生不害問曰樂正子何人也一章學之所造有淺深則德之所至有高下聖賢推明其序使學者循而進焉其望於斯世亦至矣由善而信由信而美以至於為大為聖為神夫聖神者豈常人之所敢望哉孟子當戰國之際其告人者不曰堯舜則曰湯武豈固強人以其所不能哉蓋人性皆善聖神者亦全吾性之所固有爾學者豈以不能為患哉患不為也雖然聖神固可學也而必始之以有可欲之謂善何哉此孟子指其至易曉者而示人以入道之門也蓋學者入道之初將以決其趨向不必它求也求之於可欲不可欲之間而已今有人焉孝弟忠信樂善不倦不惟我之所欲而人亦以為可欲也不仁不智無禮無義不惟人以為可惡而吾亦自知其可惡也學者反而思之凡吾言行之間果可欲乎果可惡乎從其所欲舍其所惡斯可以為善人矣由是而進焉雖聖神可為也孟子教人何其炳而易知簡而易行也哉又曰無為其所不為無欲其所不欲如斯而已矣亦此意也勉之以人之所難能而曉之以人之所易能聖賢之望於學者如此而學者顧不思焉其亦可歎也哉孟子曰雞鳴而起孳孳為善者舜之徒也全章事所當為之謂善有所為而為之謂利為君而仁為臣而敬為子而孝為父而慈事之所當為者也為內交為要譽為宫室之美為妻妾之奉有為而為之者也善者天理之公利者人欲之私公私之間相去甚近而一則為舜一則為跖乃由是而分焉蓋人心之靈與天同體純粹至善萬理具焉雞鳴而起孳孳在是則舜之兢兢業業由仁義行者亦是心也見便則趨見利則奪枉尺直尋則為之損人益已則為之雞鳴而起孳孳在是則盜跖之暴戾恣睢日殺不辜亦是心也一善利之間而上智下愚之分乃如此差之毫釐謬以千里可不謹哉孟子發明善利之論而尤謹其所謂間者蓋欲學者精别於毫釐之際而審其所趨向也至其答梁王之問告宋牼之詞皆拳拳於義利之别其示人之意切矣學者誠能澄心靜慮反觀內省於其所謂間者而致察焉凡吾一念之發果善乎果利乎善則行之利則避之朝於斯夕於斯就其如舜者去其不如舜者是亦舜而已矣苟為不然計較於毫髮之微而甚至於父子兄弟不能保其不同禽獸者無幾爾一念之差固若此哉學者不可不察也孟子曰有天爵者有人爵者一章孟子曰欲貴者人之同心也一章富與貴是人之所欲也聖賢之論乃獨重理義而輕富貴何哉理義天之所賦也富貴人之所豫也人之所豫人得而奪之天之所賦根於人心不可易也一輕一重蓋有不難辨者然閭巷之人知有富貴而不知有理義學士大夫則知理義矣然未有不為富貴所移而忘其所可重若夫真知富貴之為輕理義之為重非知道者孰能識之仁義禮智天之豫我而吾心之所固有也充吾之仁則愛人利物而居天下之廣居充吾之禮則别嫌明微而立天下之正位充吾之義則體常盡變而行天下之大道充吾之智則察倫明物而成天下之大業以之為心則和而平以之為人則愛而公推之天下國家則利澤施於今令名垂於後回視世之所謂富貴者不過輿馬之赫奕飲食之豐美宫室之壯麗賢者得志有所不為不賢者亦以豢養其不肖之身而遺臭於萬世曽狗彘之不若而又何足以誇於人哉故善學者要當深明夫內外輕重之分在內者重在外者輕在外者愈輕在內者愈重真積力久胸中泰然天理流行一毫物欲不能為之纍顔子之簞瓢陋巷曽點之鼓瑟浴沂翛然悠然蓋將與造物相為酬酢天下之至貴無以復加於此矣孟子之言豈欺我哉孟子曰舜發於畎畝之中傅説舉於版築之間全章貧賤憂戚是人之所惡也聖賢之論乃獨以是為進德之地何哉恐懼修省常生於憂患驕奢淫佚必起於晏安當羈窮困踣之餘其操心危其慮患深其刻厲奮發以進於善有不期而然者矣天地之間有陰則有陽有晝則有夜禍福吉凶貧富貴賤死生憂樂之變二者常相對而不能以偏無也人生其間隨所付受蓋有一定而不可易者與其戚戚於貧賤而卒不能以自免孰若因其所遇而反以成吾德耶是以古之君子有以命義之當然而安之者貧而無諂是也有以義理之可貴而忘之者不改其樂是也有以為天將降大任於我而反以為進德之地者孟子之言是也其處之者若是故其胸中泰然一毫外物不能為之纍顔淵原憲之貧一簞之食百結之衣可謂極矣惟知聖道之可樂而不知吾身之為貧後之學者其貧且賤未必如顔淵原憲之甚也少不如意志氣銷沮卑辱苟賤靡所不為不能進德而反以敗德不能遠辱而重以取辱聞孟子之言亦可以釋然而悟翻然而改矣景春曰公孫衍張儀豈不成大丈夫哉全章古之仕者為道故知有已而不知有人後之仕者為利故知有人而不知有已古之君子非仁不存非義不行所貴者良貴所樂者真樂人之知不知世之用不用於我何與焉貧富貴賤死生禍福日交乎前不暇顧也後之君子心之所固有事之所當行何者為仁何者為禮何者為義何者為智皆懵然莫覺也功名而已耳利祿而已耳以區區之私意小智汲汲然求售於人慮人之不已用也委曲遷就以求順於人幸而得志哆然以為莫已若也小不如意則戚戚然幾不能以終日矣公孫衍張儀戰國之遊士也一怒而諸侯懼安居而天下熄則其才亦有足稱者矣以其無學而不知道也一切求順於人孟子至以妾婦目之況於學不及古人才不及公孫衍張儀哉夫順於人者人之所喜也不順於人者人之所惡也然順人者非有它也以其威福之權足以生殺榮辱乎我也即是心而充之則貪財嗜利背君賣國者皆若人也豈但妾婦之可羞而已哉若夫守道之士不肯脂韋嫵媚以順乎人者不但出處去就言論風旨之得其正也託六尺之孤寄百里之命臨大節而不可奪也豈不毅然大丈夫也哉凡我同志仕而未達學而未仕者盍亦思所以自勉哉齊人有一妻一妾而處室者全章孟子一書於辭受出處之際未嘗不拳拳焉齊王欲見則辭以疾王歡輔行則不與言欲授以室則郤而不從欲􅀢其行則臥而不應枉尺直尋則非之不辨禮義則非之既譬以鑽穴隙相窺而又譬之以登壟斷而罔利至於墦間之喻詞旨懇切若是者果何耶義與利之間君子小人之所由分而天下國家治亂之所關係也義者天理之公利者人欲之私循天理之公則辭受出處惟義之從惟命之安是既足以全吾此心之德矣以之治人則必能立懦而激貪以之事君則必能仗節而死義徇人欲之私者反是卑辱苟賤惟利之趨既以喪其本心矣則傷風敗教欺君誤國皆斯人為之也聖賢安得不深致其戒哉今觀墦間一章所以形容其苟賤之態雖三尺童子亦知惡之然流俗滔滔務為卑諂工簡牘事苞苴脅肩諂笑搖尾乞憐自少至老自朝至暮無一念不在於是視吾身心為何物視天下國家為何事其未得之也則憂愁窮蹙若不可以終日其既得之也志得意滿則驕其親戚傲其閭里然其可賤尤甚於墦間而莫之覺也學者要當深明義利之辨充吾羞惡之心而養吾剛大之氣然後知孟子之言誠末俗之針砭也梁惠王曰晉國天下莫強焉叟之所知也一章自功利之説勝而王道始不行於後世夫功利之所以勝者以其有立至之效王道之不行以其迂濶而不切事情也孟子生於戰國之世告齊梁之君非王道不言而言王若易然何也王者之道本乎人心循乎天理人均具此心心均具此理即是理而行之三綱既正九疇既敘則人皆知尊其君親其上治安之效猶泰山而四維之也初豈有甚高難行之事亦曷嘗無朝夕可冀之功哉謂王道為迂濶而惟功利之從則曰兵可強也國可富也縱橫變詐﨑嶇險側咈人心逆天理君臣父子之間且不能以相保而又何以固吾國家然則立至之效乃速亡之兆也湯武以仁義而王戰國以功利而亡此萬世之龜鑑也然天下皆知尊湯武而不免蹈戰國之覆轍者則其識見之卑趨向之謬而不自覺也若昔聖賢無位以行其道於是推明古先帝王之事業而載之方䇿大綱小紀本末度數炳然日星之易見也今乃指為迂濶而莫之講故自成康殁而民生不見先王之治由此其故也鄙夫庸人竊國之寵而卒以誤國鴻儒碩士抱憂世愛君之志而老死於大山長谷之中誠可嘆也學者將以有行也則孟子之言可不深思而熟玩哉無恆産而有恆心者惟士為能至未之有也儒術之不見用於世以其空言而無實用故功利之説常易以求售於人不知夫功利者則曰兵可強國可富也然挾區區之小數而不知為國之大體相傾相詐相戕相賊不惟為敵國之病而吾國之民固亦不得安其生矣豈不謂之空言乎儒術則不然自五畝之宅百畝之田使民養生喪死而無憾然後教之以孝弟忠信不惟吾之民皆知尊君親上而天下之人亦皆引領而望之其為實用孰過於此夫元后者民之父母也父母之於子必先有以養之而又有以教之然後為之子者得以全其父母之身今也為民父母聽其自生自死自愚自智而莫之問也又倡為功利之説以斫喪之豈為民父母之道哉虞氏九官周家六典無非儒者巳試之效孰謂其皆空言而無實用必待管申之術而後可以為國乎故孟子論王道必曰仁政論仁政必曰井地斷斷乎其不可易也孟子之言既不用於齊梁之君後世皆知讀其書而不能用其道故厯數千年而帝王之盛卒不復見可歎也哉夫儒術之不見用學者相與講明之庶幾猶有望於斯世也謂之儒者而茫然不知其源流徒抱其淺陋之識以周旋斯世則吾道之不行功利之説勝是誰之罪哉學者不可不察也聖王不作諸侯放恣至不易吾言矣孟子曰楊子取為我拔一毛而利天下一章道者何中而已無過不及之謂中時措之宜謂之時中是皆人心之本然而不容已天理之至正而不可易者也天地之化亦大矣小有偏焉則雨暘寒暑各失其節人受天地之中以生喜怒哀樂念慮云為其可以有所偏耶楊氏之為我墨氏之兼愛皆不得為中子莫之執中又非所以為時中也孟子從而闢之所以正人心明天理為天下後世慮至切也夫墨之兼愛不失為仁楊之為我不失為義孟子極言其禍至於無父無君而以禽獸目之志於道而不得其中豈不甚可畏哉後世楊墨之患息而佛老之説興至於今且千有餘嵗棄天常滅人類習異端之教非先王之道蓋不待其流之弊而與禽獸無異矣學士大夫不惟不能斥而逺之而溺其禍福之説尊其荒唐之教甚者則文之以聖賢之言以為與吾道無異學者從而信之以自絶於聖人大中至正之道其為天下後世之害豈淺鮮哉有志於學者惟以孔子孟子之言為主以六經之道為法則異端之説奚自而入哉幹疏謬不才蒙恩假守每念此郡士風簡質渾厚可與適道輒誦所聞以與士友講説為孟子講義二十章衰晚愚昧廢學日久不足以發明聖賢之蘊奧然孟子之書明白切至誦其本文亦足以使人興起於此二十章之中玩味而有得焉則七篇之旨可以類推聖賢之道可以馴致惟諸友勉之庶幾異日漢水之濱將有以聖道為諸儒倡者矣嘉定乙亥長至後學黃幹謹書勉齋集卷二
