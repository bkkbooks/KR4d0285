body:
  text: 勉齋集巻三十七宋黄榦撰行狀貢士林君丕顯行狀君姓林氏諱謨字丕顯福州連江縣鄭崎人鄭崎州之東南海中水環之去市郭絶逺島居之民耕且漁以生罕業儒傳名者率狹陋守尋常無超越之見君少頴悟讀書不數反輙成誦為文操紙筆立就從鄉之三山林公遊與東萊吕先生為同舍生東萊先生年最少少於君且數歳先生所為詩若文輙手抄黙誦之其後先生以道徳文章為四方學者師摳衣從者數百人君聞之慨然曰吾得師矣裹糧浮海詘首受業從諸生後惟謹君年四十有二矣先生方裒集諸儒詩春秋之說其所編次君與有力焉諷玩抄録窮日夜不少懈勞心疲精甚或眩瞀僵仆幾不可支持少定復據業誦習如初先生常曰此閩中瑞物也每舉其立志用力者以誨諸生焉語及當世名儒斂袵起敬而於武夷朱夫子尤拳拳不少忘後嘗一再侍函丈猶以貧且老不得朝夕見聞其鄉人有常從學於夫子者雖後進晚輩必造門願交孜孜扣問樂善好學之意至于老而愈篤也其天資樂易純實事親孝友于兄弟於親故之誼尤篤平居與人言怡怡然惟恐傷之雖待子弟僕𨽻亦然家庭瑣碎心事隠微雖毫髪未嘗有所隠於人方從學金華母夫人鄭氏尚無恙君思親之在逺中夜感念歔欷以至泣下及歸鄉人慕君之賢郡文學以禮延致之居數月即引去曰不逺千里而辭其親者為道故也今又安能舍其親而為人乎即歸杜門竭力致養執親之喪哭泣悲哀鄉人不忍聞既反哭曰吾朝夕侍吾親而忍一旦離之乎晝奉几筵夜宿墓下更三年如一日名其所居之廬曰著存除喪猶不忍去乃率其子弟若兄弟之子肄業焉終其身平生未嘗計資産豐約兄弟同室無間言輕財急義朋友之貧者力賙之衣服囊篋恣所取至有背義忘施而復請於君者君待之如初無毫髪怨望靳惜意君家伏臘本粗足卒以是取困乏鄉人皆嗤之君曰吾有讀書教子而已貧富貴賤天也死之日家無餘財朋友善類無不為之齎咨灑涕者嗚呼人之所以溺於利慾之私而忘其天理之樂資不美而學不足也世之所謂學者無不欲取科第夸聲名則反以濟其利欲而斵喪其良心若君者乃能于大海之濱荒茁之隈超然知以從師問道為事而不惑于世俗尋常之見豈不賢於人乎哉君之曾祖龢祖其父元炳皆隠徳不仕至君始獲與薦書娶柳氏潘氏子二人審向審尚女二人長適將仕郎趙汝渙次未行君以紹熙癸丑年正月卒享年五十有九將以甲寅年後十月葬于金聲坑之原審向來言曰先人之友最厚者莫如君知先人之志趣行事最詳且實者亦莫如君今不幸先人殁不次其事無以發先志示後人敢以為請榦丱角聞君名既冠從師於武夷金華遂獲與君為忘年友二十餘年之間辱君之教而於金華之日相與為最密故知其所以為學者尤詳焉遂不敢復辭而次其事之大槩如右謹狀紹煕五年九月日江夏黄榦狀朝奉郎尚書吏部右曹郎中王公行狀公諱遇字子正王氏之先世有篤行鄉閭敬之以長者名其家至公之曾祖始以舍法兩魁其選朝奉公立與鄉薦雖不第以儒業顯相繼為學者師别駕公博而文尤長於詩所留題人爭傳詠以熟公資警敏自力於學少遊鄉校挺挺見頭角甫冠為太學生文詞優異月書季考數占前列未幾升上舍東萊吕先生器之以學職屈公公守規矩諸生相戒無敢犯乾道五年廷試中甲科調臨江軍教授丁别駕公憂閩俗多忌以喪歸自外者不以入其家别駕公殁於建公䕶喪以入殯楹間哀毁蔬食終三年無違禮再調處州教授丁宜人楊氏憂既免喪再調蘄州教授公之三調教官也率需次五六年凡其不赴也又率以官期甫及而丁家禍至蘄州時距登第已十有七年矣一時同輩才學出衆人者皆已登膴仕公恬然不以動其心方閒居時不逺千餘里受業於晦菴南軒東萊三先生之門攷徳問業以正學不明為巳憂精思力行以求自得不務為入口出耳釣名聲求利禄涵泳渟滀所藴益富而人亦以大用於世者期公矣蘄學久廢諸生家坐而官餉之公嚴為程課寢食必於學日為講說語孟經史一以洙泗伊洛之傳為正夜漏下二十刻猶徘徊學舍督諸生誦習奬勵戒飭蘄人化之衣冠濟濟若中州然既滿秩丞相留公欲以掌故處公且囑公俟公曰朝廷用人使之知又使之俟是我不才以自取辱也亟趨部注福州懐安縣丞閩帥詹公體仁鄭公僑以禮屈公置幕府公極意裨贊事無纖鉅咸盡其心力不以名徳自居也給事尤公褎祭酒李公祥皆一代名流交口薦公丞相趙公亦聞公賢且將擢用而偽學之禍興矣以薦者改宣教郎知福州長樂縣丞相陳自强侍御林采輩所居權勢薰灼鄉井騷動官吏凛凛奉承少忤意輙罪去人以為公憂公介然自守持身廉謹蒞事公勤諸同寮亦莫敢撓也撙節浮費樍緡錢數千興修大塘水利溉田十餘萬頃歲旱而稔邑人植碑立祠以報公徳郡以聞於朝當路者不敢没其實而增秩焉轉奉議郎通判贑州公之方注邑長樂陳自強為諌官與公有太學同舍之舊欲薦公其滿歸也自強為丞相欲留公其倅贑也部使者既以公薦屬有㫖侍從郎官薦賢諸公要人亦交以公聞時韓侂胄顓國公毅然不少貶以求售也侂胄既就誅群邪竄斥衆正登用丞相錢公始擢公為太學博士未數月除諸王宫教授駸駸嚮用矣適毗陵大旱議選可為守者以公誠心懇惻熟知閭閻疾苦遂屬公既至講求荒政竭官府之儲以賑民公帑之餽遺公廚之燕犒一切停罷積金數萬緡以資糴本捐俸金以助賙䘏勸分通商纖悉具舉屏騎從出入阡陌去城四五十里間皆躬自巡省餘擇官吏以委之無一户一民不被其惠者毗陵歉最甚而民無流殍公之措置有方而勞來不倦也既又講求毗陵致旱之田以為其州地勢於浙西為最髙所仰者太湖水利往往為勢家侵奪填塞為田於是悉行開掘使復其舊雖豪右無所憚時朝議欲行鐵錢於松江諸郡公以為兩淮鐵錢壅滯民間重困正以盜鑄者多今又於松江州郡行使盜鑄之徒必欣然動心莫若權罷止鼓鑄則鐵錢當不勞力而流轉通行矣未幾京口果以軍情動揺為言始服公逺識而鑄錢之議寢矣浙東大饑廟堂以公有毗陵救荒之功遂詔公為提舉常平使者入對言水潦浸淫太陽虧蝕災異頻仍淮南兇民嘯聚動以萬計京都䕶衞理宜嚴肅乃有狂夫唱亂駭聞四方此何等時何等事而不為深思逺慮乎必須齋戒以飭躬剛大以進徳急聞直言以救闕失樂從公議以扶正道法令貴乎順上下之情貴乎相通斷絶斜封墨勅之原常存視民如傷之念又言常州北濱大江南連太湖運河貫其中兩旁支港接續聨絡今皆堙塞傍湖本皆良田豪民巨室謀取大利乃於水面圍築成田則傍湖之水利皆廢矣若朝廷明行禁戢為郡守者任滿必開浚一二所則水利流通矣公既至留心賑濟一如毗陵時鹽課久不登檢吏捉姦優恤亭户財貨之入視昔有加焉朝議欲行計竈買鹽之策公力爭之以為昔人置立鹽塲定為鹽額非不知竈之可以數計必其顧惜亭民不欲盡其力也今必計竈或有虧一日二日之鹽官司便以罪加之則雖黥罪日積不可勝加非惟浮鹽難買將與額鹽併失之矣設使官鹽充積必有獻言計口賣鹽者則是今日之計竈買鹽乃他日計口賣鹽之原也議遂寢公之論事發於忠誠故質實愷切如此除大宗正丞遷右曹侍郎嘉定四年皇帝臨軒策士公考校殿廬地禁事嚴時公年已七十矣不敢辭得疾噤不能言既畢事病轉劇以六月九日終于位公性仁厚族人不能自食者贍之死者之無歸代為𦵏之貧不能嫁者具資裝而遣焉朋友乏絶者捐金以賙之蓋有長者之遺風焉家之吉凶喪祭一以古禮斥去巫覡老佛之陋故公之殁其子治喪悉遵公命公在蘄與諸生講論兩漢興亡之大端集而成編命曰漢議及其他文集悉編次藏于家公先娶安人陳氏繼室安人沈氏皆有賢行先公卒子二人長仲信預鄉薦亦先卒次仲誠公遺澤及焉女一人適承務郎知福州福清縣楊士訓孫男六人女二人公歿之年十月二日𦵏于其州龍溪縣石獅山之原其子仲誠次公行事而以行狀屬榦且曰仲誠之先君子不妄交于子獨惓惓焉其毋辭惟公立言行事炳然在人耳目者既不可泯沒矣士大夫馳逐于富貴蓋有不度其才之稱否而冒之者焉及其析圭儋爵顯其身肥其子孫而視公家事乃漫不加意公以少年擢髙科諸公薦引不容口才非不足于用也宜超躐貴顯矣乃反低回遜避若不屑就從仕四十餘年列于朝者不過數月官不過郎曹用不足盡其才也而鞠躬盡瘁不擇險易蓋至于老且死而無憾焉是非學識之精義利之明超然於流俗之中不以一毫私欲累其心者不能也可激貪警惰而厲風俗矣遂不辭而叙其事如左謹狀肇慶府節度推官曾君行狀君諱興宗字光祖其先廬陵人唐末始祖士方為䖍化令遭五季之亂因家焉紹興間改䖍化為寧都家世業儒饒于財喜施予閭里稱之司理公性嚴重不妄言笑監金陵稅院奉職廉勤大為建安忠肅劉公珙所知年踰強仕即倦遊以致其事君其嫡長子也資禀純厚襟懐坦夷外雖温然可親遇事則剛毅自立自為兒童不好嬉戲儼然如成人年十六七時已厭科舉之習一意于聖賢為巳之學嘗言吾讀舉子業如嚼蠟觀諸理學則心快目明終日忘倦人皆笑其與世背馳君處之怡然兩預鄉薦不第即棄去慶元五年詔恩廷對入等調主隆興府南昌簿南昌劇邑簿書繁冗吏縁為姦君勾稽不倦戸籍升降稅租登耗毫髪無遺漏牘而藏之官民俱便歲適大祲趙公希懌持倉臺節選可囑以荒政者莫踰君君出入阡陌檢視虚實務均其惠富民有蓋藏者勸以出粟平其價靳而牟利者發廪而償其直饑民賴以全活趙公賢之凡民訟歴年不決者雖旁郡外邑悉以委君有袁州分宜董氏者園池為近隣所占改易途徑人莫能辨君廣諏博訪親詣其地索文券考步畝積年之訟一日而伸南昌伍氏欺妻黨孤弱徙其母外邑指為逃絶給據而佃其業經四十年其孤訟之數載不獲伸漕帥二司交以委君索據辨証考其業之所自出旁引鄰至及元賣業之子孫供証得實一府稱其神明邑有豪民窩聚逋逃流毒一鄉無敢誰何人以寃訟里正驗實復遭其捶反自焚其居而訟之無以自明君造其里鄰近畏之莫敢言得十歲小兒訪問得實解府黥之鄉民以安君嘗誦程夫子有言一命之士苟存心愛物于人必有所濟故其在南昌簿職雖微不敢自怠理寃雪滯無慮百十其欲去也士民合數百列狀於部使者述其政績挽而留之既不獲命則送别者塞填街巷餞于江臯者屨滿焉見者以為先此簿職所未有也秩滿注肇慶府節度推官君于是浩然不復有從宦之意矣君生未閱月失所恃事祖母至孝嚴氏歿􅍦予田數百畝以助遊學君不以自私悉以供歲時祭祀之用司理公晚年以舊居近市闢室于金精谷口之陽以適餘年君以晨昏不可逺離遂闢其旁以居司理公得疾不逺數百里躬自請醫朝夕扶持湯藥衣不解帶事繼母楊氏尤得其歡心居家動遵古禮冠婚喪祭不肯雜以世俗之儀子孫環立必誨以聖賢躬行踐履之學其于鄉黨無賢愚貴賤接之以禮見人有善稱奬不容口聞人之過及以急難告者如已隠憂凡鄰里有紛爭必先于君君以禮折衷俱得其平至或輟已物以息訟人或有犯未嘗忿嫉從容訓責終歸于恕使自媿服禮賢好士出于誠心往來寧都者以不見君為歉過從者館榖無虚日故田園雖豐而囊無餘貲處之無悔也歸自南昌闢所居之南山創精舍取後凋之意扁曰歲寒儲書聚糧以待四方士友為暮年講切之益自號唯菴鈍叟日處其中學者至必以所學告語之所謂孝弟忠信之說未始脫諸口來者亦莫不拱手竦聽而去君晚年方欲休致以卒所業不幸遭長子之戚未半載而君遽得氣脇之疾雖卧疾手不釋巻故舊見之勉以少事調息君曰吾于病中靜觀此理愈熟愈深政自無害也未易簀十日猶與學者論中庸語孟臨終之夕談論至五鼓至次日中忽謂諸子孫曰吾病必不起矣我死勿用浮屠氏陷我于不知道之域喪事宜遵古參用儀禮非禮勿為非道勿學乃吾子孫言終奄然而逝卒之日里之人莫不咨嗟歎息以為善人君子之云亡後進之失所也斯道不明千有餘年二程子出孔孟不傳之緒得以復續然諸儒迭興講論不精易以訛舛晦菴文公朱先生講道于武夷之下然後邪說詭論無復肆而後學有所宗師君自知學以來既有意于聖賢之事聞旁郡有以知道自名者君往從之遊視其說汪洋惝恍無所依據不逺千里受業于文公之門堅守其說孜孜力行必求有得于心而後已文公嘗以純茂篤實切已致思用功正當稱之偽學之禁興一時學者諱名其師君執禮益勤厲志益苦未嘗少懈文公歿君星馳而弔心喪三年嗚呼若君者豈非天資之厚志學之專而又能就正于有道故其居官治家應事接物處之終身無所悔怍如此則君之云亡豈不深可痛恨也哉君年六十有七以嘉定五年六月十日卒于家娶謝氏有賢徳先十一年卒子五人長浚之先一年卒次夢吉與鄉舉次頤之益之艮之益之繼弟興邦後艮之亦早夭女二人長適劉昌時次黎宗海孫四人樸榞椿榴女孫七人有文集十巻號唯菴棐藁藏于家榦于君有同門之契交遊非一日宦于江之西尤相親且相好也因其從子益之之請述其行事之梗槩俾求于當世立言之君子而請銘焉謹狀處士唐君煥文行狀代梁縣丞大亮作君姓唐氏諱堯章字煥文福州閩縣王峬人州東南際大海江水之所入有山屹然錯立于其中者五王峬據其上流視諸山為傑出居其間多秀民去而操巨資航大海以牟什一之利者相踵也君世家焉曾大父感大父正甫父恩皆隠晦不仕尤不喜營利輕財急義聞于鄉紹興間君大父以綱運有功當補官棄不顧出藏鏹二百萬以賑貸鄉人疾革取券焚之遺命勿責償焉人皆以為難君幼孤大父撫教尤至君承祖父之訓不復以生業為念賑乏䘏貧無毫髪靳惜意始治進士業不售即棄去視世之榮利泊如也嘗曰讀書務明理豈必為利禄計耶留意經籍至老不倦歲晚眎昏諸子誦書必令髙聲曰庶我聞之而有益也聞晦菴朱先生講道武夷語其子曄曰吾老矣不能從夫子遊爾其毋忘吾志乎既而曄獲登門受業以歸詰其所聞竦然曰吾得聞所未聞死不憾矣繼而曰入耳出口學者大患爾其戒之其輕利重義而篤于問學如此故其處已應事往往有人所不能及者居家孝友接人樂易執親之喪三年如一日既免喪猶不忍服華飾夫婦相敬如賓親屬閭里遇之有恩未嘗有違言下至奴僕撫之亦各得其意終日恂恂如不能言至其見義必為則斷然有所不惑也性不喜浮屠嘗謂學佛者曰謂事佛為可求福田利益耶是教人以為善而有所利也謂能懴雪罪惡耶是導人以為惡而有所恃也使人皆有是心則為善不誠為惡不忌佛之教使然也尚何足學哉識者以為知言娶陳氏先君五年而逝治喪不用浮屠鄉人皆異之君不為少變為文以示諸子大畧以古人治喪自有常典異端之教不足為法吾百歳後汝曹謹毋為邪說所惑以背吾言故君之歿也諸子得以不敢徇俗者君之教也自佛之說入中國鼓天下之衆而從之雖豪傑之士有不能自解免者王氏入閩崇奉釋氏尤甚故閩中墖廟之盛甲于天下家設木偶繪像堂殿之屬列之正寢朝夕事之惟謹髠其首而散于他州者閩居十九焉其崇信如是君乃獨能不為所惑非其義利之素明問學之素講其安能若是耶若君者可謂勇于義而篤于自信者矣君以慶元戊午正月晦日歿享年六十有二子男三人曄暉習女四人長許適歐公旦次早亡餘未笄孫男一人復孫女一人先是君為母潘氏築墳于九龍山之原曰吾生事之未足死當祔之朝夕必往省焉至其衰病猶扶杖以往忽自歎曰吾老矣登陟良苦孰若早從吾母遊地下乎諸孤從其治命將以四月二十九日葬于潘氏塋之東偏而記其平生言行以求狀于余余于曄有舊好辱聞君之行為最詳哀其請而不得辭也故為之彚次其大畧于右謹狀處士潘君立之行狀君諱植字立之姓潘氏九世祖諱某事王氏為銀青光禄大夫自光州固始入閩家于福州懐安縣之水南世業儒至君之考諱滋始貢名禮部紹興初習淳質中原衣冠多南徙吾鄉之學彬彬焉其以文詞行義為學者宗師則若李若林其傑然者也二先生之學以孝弟忠信窮經博古為主及門之士亦往往渾厚質實志尚脩潔若貢士則又其徒之傑然者也貢士于學至老不倦聞鄉閭之善士輙折輩行率其子從之遊後聞晦菴朱先生講道武夷有非他師所能及者遂慨然囑其子往師事之君遂與其弟柄不逺千里而往拜焉君少穎悟讀書不數過輙成誦衆皆謂宜以童子應試者貢士曰躁進速成非教也少長為文操筆立就然未嘗效世俗剽剥綴緝曰韓與蘇吾所法也于二氏之文關鍵脈絡沈潛諷咏故其為文語意雄健遊鄉校儕輩推先焉尤嗜史學自載籍以來上下數千年反復耽玩其于興亡治亂是非得失之故貫穿出入如指諸掌談論亹亹率常屈其坐人方以世交馳于射䇿決科之習君之天資學識于科目可俯拾乃與其弟皆以弱冠摳衣有道厲志前修回視故習若將凂已流輩至有髙談性理下視程文之誚不顧也智識日進聞見日廣尤以務實為巳為本由是師友交稱之退而家居日以濂洛諸書磨礱浸灌暇則徜徉林壑間以觴詠自娯閨庭之間怡怡如也生平慷慨有大志不能規規較錐刀事生産襟度坦夷無畦畛于親友之誼尤篤每見必留連竟日情意懇欵殽饌之費不計家之有無喜施予賙人之急雖斥家人簪珥以振之畧無秋毫顧惜意鄉閭有事訟者輙詣君求決君為之平曲直以義理開譬各釋其所爭而去親戚急難奮身以援之利害有所不計雖罹困辱不以為悔急于救世亦有知其不可而為之者雖未免賢智之過然以世俗滔滔横目自營者視之是不可謂之賢乎使君而見用于世其事業當有卓然可觀者而困頓疾病卒賫其志以歿所以施于家信于友行于鄉閭者僅若此豈非命也夫君疾病累年至屬纊之夕與弟訣若未嘗病者亦可謂達于死生之變矣死之日親朋閭里無不為之洒涕亦君之誼有以感于人也夫君享年五十有九以某年某月某日終于正寢娶某氏先卒子一人大圭業進士女一人適進士倪泳孫榦之兄弟嘗受教于貢士公于君之兄弟交遊者非一日也生同里學同師今又締姻于君家則述君之行其何辭謹摭其大槩以諗來者太恭人李氏行狀太恭人姓李氏諱洞安其先李唐之裔五季之亂有徙居興化莆田者郡稱甲族曾祖宗顔贈通奉大夫祖持正左朝請大夫知潮州崇觀間與曾叔祖諱宗師同遊辟雍名振當世號大李小李其後宗師廷對為第二人朝請公繼亦擢第父尹仲迪功郎廣西提舶司幹官母宋氏禮部侍郎棐之女太恭人端重靜淑一語笑不妄發父母愛之既長相攸為朝散郎知髙州贈朝議大夫趙君諱公賓之配孝敬慈順以賢婦稱朝議公歴仕四十年居官廉謹不殖貨利所至可紀者亦内助有力焉朝議公終于髙州太恭人扶䕶以歸艱險萬狀既達寓里囊無餘貲聚指數百惟以勤儉教子為急每訓諸孤曰汝輩年漸長宜各勉學使吾及見汝輩成立他日見汝父于地下則無憾矣間關貧困餘三十年至其晚歲長子抱孫聨翩科第太恭人自處冲澹日課佛書自言吾生平未嘗萌一惡念喜施予不問有無諸子欲奉板輿便榮養不願也由是諸子各擇邇地以仕嘉定十二年十二月二十七日晨興忽呼諸子孫而告之曰吾昨夕夢朝議公在前言語如平生數將止此乎命辦衣衾且湯沐家人以太恭人體力康強何遽至是或竊悲泣復視之曰不可徒亂人意言訖而逝享年六十有五初以朝議公再封安人復以男彦侯彦倪兩遇明禋加封太恭人男十三人存者九人彦侯奉議郎兩浙轉運司主管文字彦假從事郎邵武軍判官彦倪奉議郎知南劒州尤溪縣彦優中國子監舉彦仞從政郎興化軍興化縣令彦仟修職郎廣州南海縣東尉彦偲彦偶彦傈並累中監舉女九人存者四人適進士林炳蔡幼度國學進士林應辰進士陳雩孫男十五人璱夫修職郎潮州潮陽縣主簿瑻夫綰夫並三中監舉旺夫習進士業尊夫紱夫並中監舉瓏夫統夫盤夫繸夫㽥夫嵩夫興夫尚童幼孫女十九人適進士蔡應孫錢琳鄭元父迪功郎前汀州清流縣主簿杜功綽進士林天祐陳學文餘未行曾孫男一人時淦不惟衣冠之盛萃于一門而樂善循理人無間言賢母義方之訓也詩人以麟趾信厚為關雎賢淑之應其信然耶天族天所芘也一室之内母子兄弟無一念而非天也則如天之福豈自外而至哉明年三月十二日葬于侯官縣保慶寺上熓山之原從朝議公之兆也前期彦侯掇其世系行實俾榦述之榦家世城東後徙而南未嘗不東首者以丘墓之寄于東也丘墓之感又未嘗不痛心疾首焉則于其鄰之賢者安得不欣然慕之今乃知其為賢母之教也既以自悲又悲夫人之不可復見遂述其事以誌來者謹狀通直郎致仕林公行狀公姓林氏諱周卿字少望林氏為閩大姓孝友之風著自古昔散而處者亦多聞人公之先占籍福州之江南五世矣江南為州之中土其俗質實渾厚故公之家世皆以篤行厚徳稱于閭里公敏悟端重色温氣和襟懐坦夷與物無競少從合沙先生鄭公少梅學通易大㫖所交遊皆世名勝及壯失所怙事母馮氏年八秩公鬚髪皓白怡愉戀慕有嬰兒之狀處兄弟友愛常恐傷其意貲産厚薄一不經念悉推祖父遺業奉其兄鄉閭有同氣爭産不平者必舉公盛心以為訓仲兄早世撫其孤女使有所歸宗族單微􅑱獨不能立死喪嫁娶不能舉者極力賙之無倦色其居家未嘗厲聲怒容居鄉未嘗後人先已趨人之急如已隠憂聞人之善若自已出以是服公之仁慕公之義者内外老稚無間言公自少遊塲屋已嶄然見頭角人固蘄公以大其家矣已而蹭蹬不遂公處之恬然安貧守義擇師教子之外無他念公之子司業君坰遂入太學連中有司竟以舍選魁多士出綰郡紱入儀天朝斑衣爛綵極其孝養公亦未嘗少易平素遇貧賤必與之握手劇談無復畦畛語及桑梓則動心墮淚不知宦遊之樂也㑹兩學與京尹競司業君謂待士宜以禮力爭去國兩學諸生扣相府門乞留者數百人公以得歸為幸趣家人指日就道即所居之旁鑿池築室樓以儲書亭以宴客草木成隂風日晴燠親賓畢集釃酒髙㑹年幾九十視聽步履不減少壯飲食倍人儀狀甚偉聲音滿堂進拜公于前者不知其已老也忽晨興命家人取𤓰果杯勺羅列庭下公起攝衣焚香酌酒以告曰某年八十有六天地庇䕶之力也生平心事毫髪不敢欺請酌此而逝又呼兒孫下逮僕𨽻飲以辯曰人生如寄吾年至此尚復何望此心無累可行即行今與汝曹酌此而别越三日疾有瘳家人問安否公笑曰晴明即行至晚命浴索酒一飲整襟正寢而逝嘉定庚辰六月十九日也其達于窮通死生之變如此則公之處于家于鄉者又不足以盡公之藴也公寛厚博大人也豈若是淺丈夫然哉利害未毛髪許兄弟骨肉反目如仇讎榮辱得喪之際小不如意則戚然若不可以生者一旦意得志滿則前恭後倨視故交如路人于公得無愧乎公教其子以書生起家名聲震當世立朝廷挺有風節不可謂無所自以子恩封至通直郎娶陳氏追封安人先三十二年卒子一人司業君也孫男三人昌嗣昌夀昌敬昌夀國學生餘業進士孫女五人長適國學生陳嘉謨次迪功郎前潭州湘潭縣主簿陳興龍次勑賜同進士出身魏復亨次進士黄輹次尚幼將以是年十二月十日𦵏于移風鄉龍灣之原從先兆也榦于公為後輩獨嘗拜識公于三十年之前既與司業君為筆硯之交後復託姻㜕之好于公行事知之審矣司業君以述公之行見屬不容辭謹掇其梗槩以諗來者謹狀貢士黄君仲玉行狀君諱振龍字仲玉姓黄氏九世祖自光之固始從王氏入閩因仕焉居言路有直聲後遷至中丞子孫散處有居福州城東者至五世祖亨有厚徳自奉薄喜施予鄉閭感之號為長者曾祖諱祖鈞父行知自亨以來皆能繼其家聲故今稱長者不絶城東之黄雖未有顯者然過其閭者慕其徳仕其鄉者亦聞其名而敬之君天性純厚襟懐坦夷樂于為善聞不善則毅然惟恐凂已其勇有不可及者接物無崕㟁與人交久而愈篤赴人之急風雨寒暑不避輕財重義親故貧乏者周之無秋毫顧惜意人有疾病力能療之雖貧下危篤必以身親之無厭倦之色親屬鄰里事有難決即君謀之為之委曲剖析納之義理不可則面折之未嘗有所遷就畏避也少力學自奮為舉子業必根極理致不為浮靡徇俗歲大比真舍人徳秀見其文奇之擢之前列自是切磋往復遂為深交嘗曰三山士友篤實不相負者吾仲玉也晚益收斂為已慨然以歲月遲暮役志俗學為恨日以論語孟子自課端居莊誦既又博觀昔賢遺言左右探索意味有得輙忘寢食至朱文公端莊存養獨觀昭曠之原年事既髙若不著𦂳用工恐歲月悠悠之語惕然有感書之座右以自警深悼少年之不及親師取友也由是益加人一巳百之功聞四方賢者必使其子學焉聚伊洛諸書課其子以講習君天資既美至其知學則益自力于修身齊家之實行故其一門之中謹守禮法相勉以善内外雍睦人無閒言鄉鄰之志于學者莫不喜從君遊觀感磨勵以共扶斯道而君沒矣蓋莫不失聲墮淚為之號慟也君疾革命取新衣易之家人方環立侍疾君整襟肅容呼其子曰養吾疾者莫若子男子不死于婦人之手婦人退又曰我死謹毋用浮屠法不然是使我不得正其終也君之學既行于妻子又嘗以朱文公家禮帥其家人使守之故其治喪奉君之治命惟謹君以嘉定已卯七月甲寅終於正寢享年五十有一娶潘氏子男二人朴太學生格業進士女二人長許適進士潘公炳次先卒孫男一人夀老將以是年十月二十二日葬于閩縣横嶼山之原二子以君之行不可無述也固以請榦與君交最晚于里巷交遊間知君之行最詳既喜其禀姿之粹務學之實其于死生之際又能不溺于兒女繫戀之情佛老荒幻之教而孚于家人者又如此因其家以驗其行即其終以信其平昔是不可使之泯泯無聲以畀來人遂述其梗槩俾求銘于當世立言之君子謹狀太安人林氏行狀安人姓林氏其先自莆徙福州為長樂縣新溪人嘉祐中有諱端復休復者兄弟相繼擢第為郎自是族益大業儒益衆夫人之曾祖祖父皆以學行為里閭推敬考其中紹興戊午進士第四人累官至奉議郎夫人端重警敏誦書一覽不忘語孟諸經悉通大義少從羣兒聚家塾奉議命題使屬對曰亞夫為將屯軍細柳之營衆閣筆未能下安人忽從旁代曰召伯治民聽訟甘棠之舍聞者異之歸任氏為中奉大夫太常少卿諱文薦之婦奉議郎知瑞金縣諱道宗之配事舅姑以孝謹稱夫婦如賓相勉以正少卿嘗以公勤廉和戒其子夫人每諷道之曰此家訓謹勿忘少卿捐館舍甫卒哭知縣哀毁繼歿夫人年二十有八生計蕭然子女七人俱在齠齓内外親屬有不堪其憂者安人毅然自守莫敢奪其志執夫之喪哀戚備極既免喪不御華飾宗黨遊觀無所預閑家有則内外肅然自奉簡約食喜蔬素登堂奉姑必具甘㫖冬裘夏絺縫紉補拆先期而辦家之用度刻苦撙節享祀問遺與教子束脩悉從其厚親戚急難倒篋以周之忘其家之貧也晨興諸子就學莫歸使環几而坐孤燈夜績課以誦讀率漏下三十刻乃寐風雨寒暑不渝句讀訛謬為之釐正巻帙爛脫為之補綴旦旦而誨之必曰汝家多難生理素薄汝輩勉自植立勿忝乃祖則吾雖勞無憾迨其入仕也猶力以先訓勉之聞士大夫之廉謹者輙悚然曰君子哉汝輩能若此則吾願足矣晚年諸孫皆既就傅尚諄諄誨督不忘其初安人持身處家既盡其道而義方之訓施于子孫者尤切故其諸子皆能以少年聨翩學校接踵世科娣姒相勉飭亦皆以不教子為恥感發奮厲而少卿之子數人其諸孫皆無白丁者實安人啓之邦人稱願之曰盛哉有子如此嗟乃母之教也所以望其子者亦恨不得與諸任齒而安人未嘗以科目為已足也猶責之以廉勤謹恪使必能繼少卿之業而後已蓋其少長習聞兩家儒學之素而天資之髙又有以知人道之所當先而不可緩也世之慈子嗜利忽詩書而事驕逸卒以敗其家者多矣以一婦人乃能于艱棘之中勉其子以有立而少卿之門日昌而大是不謂之賢乎哉嘉定乙亥明禋安人以子官封太安人享年七十有四已卯七月某日以疾終于適寢將易簀神色不亂子男六人長某早夭次惟明國學進士次一鶚鄉貢擢第今為朝散郎知建昌軍次一鳴國學待省次一騰國學生某年而先卒次一龍由國學與其兄一鶚為同年進士今為奉議郎前知江州彭澤縣女一人適建寧府司理王榕孫男七人後老椿老泗老濟僧澤僧崧老孫女八人適進士潘公禃周餘在室以某年某月某日附葬于懐安縣杜塢山之原惟明以安人之行不可無述也率其諸弟而屬筆于榦惟昔先君御史于少卿為道義之交于少卿族弟為姻㜕之好榦也遊知縣父子間聞安人淑徳懿範者非一日雖衰晚不文不敢辭謹摭其遺事可傳于世者如右謹狀勉齋集巻三十七
