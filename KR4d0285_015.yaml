body:
  text: 勉齋集巻十五宋黄榦撰書復陳師復監簿頃於諸先令兄多雅故獨以未及參識為恨三四年來每得謙之兄書未嘗不言篤志好學推已及物之盛美深切歎服然亦不敢遽以姓名自通於穎人近者又復拜觀應詔之章懇切簡直皆人所難言數十年所未見其為向慕又不但前日所聞於謙之兄者而已繼承台翰之賜捧讀不勝惶悚自顧衰暮何足以當勞問之厚榦少不自量喜従師游竊有志於聖賢之學中年孥累猥衆偶得一官仰禄為活一行試吏講習遂廢重以先師棄諸生朋友解散葢不待七十子之沒而大義已乖矣日夕惕懼如負芒刺忽聞執事志道之篤立行之髙乃如此喜躍不能自勝想先師九原之下亦當為之擊節喜吾道之有傳也朝廷之事既有如諸賢之所論奏而外之所恃以為人物者亦多不可曉解矣所以降灾者方數千里之旱今之所以救灾者又皆具文中原蕩柝既不可支而邊陲守禦亦殊未有可恃之䇿腹心之疾未愈則耳目百體無徃而非病良醫之藥既卻而不用則事無可為者矣榦衰晩不才分甘投棄昨上香火之請本無他意只是年老不堪従官未䝉俞允姑且安之適趙興國持倉節於榦為姻黨至親不容不引嫌而去自是可以退安田野以卒舊業以終餘年矣復陳師復寺丞寺丞天資髙明閒居益加涵養吾道之幸也榦不能安貧冒昩一出信道不篤徒深悔懼抵此五日即聞浮光之警人情未相諳悉無以為䇿今敵兵已退上下相安稍可措置最苦是郡無城壁便即興工創築度費五六十萬劵郡中亦有一二十萬皆是前政樁積已申朝廷之錢亦不暇問只得支用郡民便之施竹木工役夫米者紛然此亦不容但已也亦請於朝乞四十萬劵未必應副亦無可奈何只得旋措置也秋冬間了得此一役便可丐歸矣敵人之來亦不過數千人此以數千人與之戰初亦小勝已而大合殺傷相當有貪功輕進者遂為所敗吾之所失遂多度亦不敢以實聞也諸賢施行大抵未有起人意者到此一月以六書逹制帥與議邊事皆未得報豈以其切直而惡之也抑以倉皇忙迫而未暇也今只得自做家計修城壁造器械排保伍日夜與諸邑講裕民之政漕臺欲運合肥米至安豐相去二百里耳卻來起安慶四萬夫安慶至合肥已是四百里捨近取逺人情皇皇只得力拒之幸而得免便覺百姓有歡舞之狀矣他事皆可闊略有敢害民者必痛治之如此亦稍可支吾但大勢可慮耳恐非一木所能支也李貫之尚留九江亦屢得書此等人物皆引去為之奈何乆不拜狀正切尊仰祝兄來承台翰之賜謙之兄繼至又得熟聞為况之詳至以感慰賑濟區處有方人賴全活甚善郡政一新又可以風厲流俗使人知儒者誠不負於斯世也榦衰老念歸未能今邊事復動亦不敢請歸矣敵犯浮光其勢甚亟城雖未可破而四出抄掠生齒塗炭甚可念也此間土城雖已完備但未包砌馬面尚少未為可守但既有城壁亦只得效死守之此間世俗皆以為丙午辛巳丙寅敵之侵淮皆不到此故士夫之愚者亦全不以為意軍器全不整齊士卒千人多是老弱皆須旋行措置去嵗一版築故此等事皆有所不暇及今亦一面料理輒有少禀此間軍器最是弓箭更無一隻可怪之甚偶見詹簿説使郡弓箭甚多且箭材乃地産所出妄意欲就借箭萬隻少亦須借五千見箭卻借五千箭材角弓得四五十張卻須一面製造以補還仍示及價直便當納還儻䝉軫念一郡均受鄰邦之賜若非事勢怱迫亦不敢相撓也已令此人齎錢就彼雇人擔擎以來至望至望承聞開府未幾豈弟仁恤之譽已洋洋於田里當旱暵之餘得賢者賑䘏之康廬之民何其幸耶但不知朝廷上司肯以米相助否莫若且急遣二三精敏官屬散行諸縣勸諭諸戸籍其有餘之粟以備賑糶須是異日實可以及百姓若但為虚數則無益也同官每難得人寄居亦恐多私不若取之故舊中為佳若李敬子肯相助則决不至有他也米價亦要平而有常每見所在豐年米價十錢至凶年出糶官米卻只糶五錢如此皆非是官物有限只得照例方是或云凶年錢難得是固然也却不思天灾流行百姓亦須大家喫受常年喫一升米今且喫半升此豈得已哉又賑濟不如平糶官司錢物既有限細民當此饑嵗亦當倍竭其力以度凶厄豈可誘之使偷惰是非所以愛之也又濟糴不可分口數徒見𤨏碎只是每家每日三升若一口者亦糴三升彼自能多寡相通融大抵舉大事者最怕叢脞也賑糶之法當論旬不論月且如每日糶三升每旬糶三斗或以一日而糶三斗或三兩次糶三斗従其便可也如此則人免伺候之勞切不可慕納流移之名其後難繼人情偷惰若開此門必至失業乃所以害之也南豐述趙清獻之事以為仍告以去其家者勿給此正所以絶其流移之路若欲徃他處就食者則薄給其路費可也亦不可多多則去復來亦難繼也愚見如此未知是否不敢不以告也榦此間城壁已就近又砌畢五門亦屹然可觀兵籍最少通老弱不過千人見於城内㳂城空地架屋千間為壯士營募民之壯健願居者給與之不收其僦金且先為辦床榻之屬以誘之官為之約無他役但使之家守丈五之城治其蕪穢使不為城之害有警則皆守城之兵也仍造弩千張而家給之使之無事則閲習亦一助也近郊二十里保伍亦𨽻之郡擇其强壯者籍之有急亦可驅以守城如此二三千兵亦不難辦也燒磚一事擇浮屠之有幹者二十人主之應管内有僧寺闕住持者便給住持以償其勞如此則三四百萬磚亦不難辦來嵗夏末此事可畢矣故山之興甚濃非敢為偽年事至此朝衫亦不宜乆著也忽有制幕之命此事乆矣諸公甚忌其來李公頗費唇舌省劄下只得力辭不可則來嵗城壁既就卻旋求去走康廬以承誨也榦竊度時勢金人之弱甚矣不待間諜而可知也諸賢度德度力不敢便為進取之計此其為宗社謀至矣然將為宗社無疆之計臣子要當致無疆之思今進取者既失之孟浪持重者又失之偷安不知事終安歸耶日引月長吾國日困以彼之憤激敵吾之偷惰未知鹿死誰手也况新冦方强羣盗蠭起吾所當慮非但一端也今邊郵事息正造物者遺吾以閒暇之日使之明其政刑登崇俊良以共起事功則恢復中原之慶翹首可待政恐反因以驕縦而日益顛倒耳每一念之令人流涕要之但當歸死故山不至徒在世間為人所嫉惡也久不拜狀時切尊仰竊惟以廬阜之嵂崒與彭蠡之洶湧臨之以一代之偉人人物山川相與酬酢一郡生齒游泳於春風和氣中計其歡謠已洋洋於田野間矣甚盛甚盛榦扺此巳逾半年自覺初謀已拙到此别無出場只得為築城鑿池與民為效死勿去之䇿方其度工之初人無不驚且駭者幸而天相人扶未及半年事已就緒且今一意包砌嵗前五門并三斗門亦可訖事便有啟闔雖大敵之至未可保而小小姦雄亦望風退聽矣身守一郡只得汲汲為一郡計外此皆非所敢知國家如天之福敵至輒敗衂而去是以至今隆冬不敢深入此兩日方聞淮北洶洶大率皆是相恐嚇之意兵來不除道也天遺我以閒暇之日而諸公視之悠悠恬不加意要其胸中無識見無古今既不曉利害之實而又日夜拱手以聽命於人天固助之我固拒之謂之何哉南康朋友甚盛想聞賢守之至必有盍簮之樂榦亦以老且病告廟堂丐骸骨若遂雅志當得承教於白鹿卧龍之間矣榦自前月來愈覺多事初令其徃黄州提督闗隘次又令徃光州撫諭將士及至將行又令且赴制司禀議凡此皆非所長只是緩急無人承當且胡亂拖出不知平日拔擢貴顯者又要作何用耶自去年四月以後敵兵既退全不做分毫事業及至事到目前方且旋荒敵固弱甚然驅中原之百姓盡括其家貲帥以渡淮使之抄掠以取償於我浮光信陽數百里之地殺人如麻室廬毁焚至今未退棗陽被圍已四十日尚未解其勢危甚盱眙既自去年敗衂招侮今乂聞安豐亦已為敵據矣為之奈何全看天意如何若人謀無一足恃者安慶城壁未包砌軍籍亦寡弱器械未備將何以守若厯陽則尤當邊塞之衝已力丐免矣制司禀議之命甚乆不知諸公却深忌其來只得力辭待來嵗城壁就却旋求去大厦萬間支以一木不謂之愚可乎此計已决但未得朝廷慨然相捨則上無以荅朝廷之善意下無以慰舒民之望二者縈繫於心耳尚冀髙明有以賛其决甚幸五事亦多是文具此卻皆是實事今亦略改數處未知是否更幸詳之聞欲招林楊二君亦更相度事力果欲遣人卻望令來此取書也榦讀書愛日之意甚切而精力不逮每切為慮新嵗已登七十矣來日苦無多也朋友紛紛不為無人氣力足以任重者誠不易得故所望於左右者忽不自知其拳拳也靜處下工誠為長䇿然居敬集義博文約禮皆不可廢朋友切磨固欲相觀而善然講習一事尤為至切須將聖賢言語逐一研究不可以為非切已若不自此用功則義理不明生出無限病痛李貫之全是就講學上用工晩年大節光明如此讀書豈可忽哉留丞相晚年歸來日課朱先生詩傳朱先生每對人輒歎服之葢捨此實是無進益處也不知髙明以為然否榦昨日得相識録示小報知已被予祠之命乃十二月十七日㫖揮今日邸吏發報狀尤分明此雖父兄為子弟謀無以易此遂使衰晩得免無亷恥之罪君父之恩大矣若得省劄早下不復以家事闗念則自今以徃無非安坐讀書之日矣别紙寵貺仰仞愛予之厚恐其匱乏無以全其守也若祠禄不下亦只得判作飢死年來卻見得此事稍分明死常事耳朋友之饋不敢辭私居辦此令人不能安也與真景元直院榦伏自夀春僭拜𨽻人之敬嵗月倐忽奔走靡寧遂疎嗣貢拳拳山斗之仰實切此心中間竊聞屢進危言力扶大義公論藉以開明善類為之踊躍枘鑿難合勇退急流此風不聞於世乆矣自顧庸懦亦竊增氣持皇華之節居盤錯之都是猶欲某官推其所言而見之行事也相望數千里跧伏陋邦不獲目擊施行之一二以為快但聞種不入土蝗且蔽天伏想髙賢憂世之深情烈士濟時之大略安得拱侍函丈欵聽誨言榦老矣本不敢有寸進之念偶得一官庶脱九死自先世不事生産而諸孫俱墮飢寒心竊念之黽勉従仕姑竭駑力本無寸長敢期公朝過聽遂叨為郡之命此誠生平夢想所不到冒昩此來已踰半考自度遲莫不堪扶曳亟上香火之請不䝉開允而旱亢如此郡計蕭然地居安復武昌之間為制使之説則曰安復極邊兩郡之粟不可以出漢陽為漕使之説則安復漢陽之粟當泄以濟鄂渚制使以閫外之寄而令諸司計臺挾朝廷之命以持制閫彼此交鬬甚若仇讐甚至制使遣官運以守漢陽之境計臺復遷怒以治安復之官吏是何氣象乃若是也隂陽不和則為旱人事如此何以召天地之和朝廷方為安邊之計而一室之内自相攻擊又何以安人心而固吾圉耶世之所謂賢者乃如此是殆不知其所以然也顧榦庸凡日夜起故山之念亦不敢與聞兹事被髪纓冠而救之則惑也百憂滿懐安得一侍誨言紓胸中之憤悶耶與孫行之正字榦衰晩負丞竊粟自知亡補忽叨予郡之命皆朋友過相推許是以至此不敢以為喜重以為憂也自金陵五十日方抵此民甚醇訟甚簡財賦亦從容安平無事不妨為守之樂但襟江帶湖吴蜀徃來之衝武昌唇齒之國也若欲屹然真可當于蕃之任則非所敢當郡無城郭有兵二百人倐來忽去月給甚薄緩急亦安所恃耶小郡若非所急無漢陽則無武昌矣抵此二十日且以治財賦增兵廩大開赴愬之門以平民之曲直其他所當經理者俟見顛末續當有請也既不能不仕仕則不可不任其事耳但天性拙直與世寡合易以取禍又不知果能安於此否安與不安亦一切聽之也在已既無以逾人視人之所為又多不滿吾意不知此世將誰與扶持耶自今觀之只是義理不明人心不正舉世滔滔聚一大團私意於天地間如濃膠厚漆牢不可解吾輩且戯吁太息於其間亦愚矣哉膚仲遂得歸可喜但聞其病手戰亦可念也真丈如何聞且歸建寧果否敬子聞以疾辭皆使人有愧也此間傳聞晦伯侍郎抗疏論遣使事恨不得見能録本見示否復趙蹈中寺丞榦昨者僭拜記室之問率略之甚黎斌來忽辱台翰之賜前所賜教猶未及拜領也寺丞持節内郡而拳拳於邊陲之諸將豪傑之士莫不慕義願為效死推其所以治峒冦者以制北敵中興之功可日冀也天下大勢亦可見矣嘗以兩淮言之敵人衝突三方分攻不攻都梁而攻招信不攻安豐而攻霍丘不攻浮光而攻光山非不攻也力不逮也圍棗陽百有餘日而卒以自解則勢之弱可見矣彼能以弱為强吾乃以强為弱豈將士之罪哉所以用將士者非其道也邊事方殷而廟堂在告制府所請百不一報制府疑懼力上祠請邊郡所請百不一行此亦何時而可以若是耶信義不孚賞罰不明無非自伐之道而尚可以伐人乎哉志士忠臣深憂切歎寺丞義兼家國想不能不為之寒心也以榦料之敵必不能自立割麥在即而邊郡寂然此必有變生乎内者矣羣盗四起彼亦不能自立吾亦豈暫寧哉是為可痛哭流涕也榦衰病無似之迹本以不能固窮投老試郡但思築城鑿池與民守之效死勿去之計制帥令以列郡帶行制叅之職敵攻五闗復令以郡守出竟守闗又令以越闗督戰皆不敢辭敵兵已退忽令易守歴陽則老病不堪復易一郡又令赴制司供職則事亦有難從者今乃得復守安慶之㫖辭小受大驅去復還於義不安已上香火之請更一兩日徃江池間候報以必得為期也相望遼邈無由一見以紓胸中之憤懣與李子復書榦不能安貧冒昩一出屬以邊頭擾擾才力綿薄大懼無以撫安此民諸賢措置各持其説當危急之秋為偷安之計敵人有所制未能以逞然蓄憾愈深向者之防秋今及轉移而為防春矣每思契兄神識過人閲世已乆未見其比顧乃袖手燕閒如倉生何榦抵此以郡無城壁一意興築不待報下即便興工五閲月而城成今五門亦已包砌屹然遂為淮右之冠居民方有固志小小姦雄望風畏遁若殘賊衝突彼恐合肥安豐之議其後亦不敢乆頓兵於城下恐亦可以苟安矣制司忽有幕府之辟此已力辭萬一不免則李公生平相愛至厚亦不容不従其請今日之事䇿將安出靜觀事變當必有非常之論幸有以教之或能不逺千里偕鄒兄垂訪尤不勝至幸望賜報當遣人奉迎也與趙省倉人來承惠書雖未及瞻拜固已深服足下資禀之粹趨向之髙而非流俗之所敢望也顧僕衰老困於吏役離羣索居有負初心何以謝來教之辱耶世方急於利禄而獨安於奉親世方趨於卑陋而獨志於聞道尚賢而取友孰有過於足下者此僕之所以不敢黙黙而無言也竊觀來教以孔門欲為有用之學而又欲其大有所成就歎其老之將至而欲為有用之歸然理義之精㣲心術之隠奥所差甚㣲而天理人欲之分君子小人之判自此而决不可不察也聖賢之學固求為可用而求之常在已欲施於有用而得之係乎天求之在已則内外一致而所造者正得之在天則窮通一視而所處者安故其教人雖欲其有用而未嘗切切於用也曰明明德而新民在其中矣至其用之則行舍之則藏而亦曷嘗適莫於其間哉志於學而先以用為心則固已馳騖於其外矣至其用也則事求可功求成安於義命者固若是耶立心一差則將無所不至矣聖賢立教葢以人受天地之中以生具有仁義禮智之性必先格物致知而力行之所謂用者亦即此而推之耳曷嘗先以有用為念哉孔門之徒惟曾顔未嘗見於用也而三千之徒卒莫能及由此觀之則為學之要可知矣孟子曰君子所性雖大行不加焉雖窮居不損焉為學而先以有用為念則是未知所性之貴而有外慕之心焉故敢以切已務實為足下獻榦老矣方力上丐祠之請而求為無用之人宜其於足下之言有所不合也交淺言深惟足下亮之荅陳泰之書倫榦伏承不鄙特枉臨顧先之朋友以逹其意副之長箋以述其情志甚篤貌甚恭辭甚遜以榦之愚不肖上之不能取髙官耀閭里中之不能作文章誇聲名下之不能蓄貨財養妻子此世之所謂無用而不齒焉者顧何足以辱足下之好哉豈非以其嘗從先生長者遊而獲聞君子之大道歟足下之意則甚厚而榦安敢不竭其誠敢以所聞為足下言之夫學之有志猶三軍之有帥也約束既明申令既審鼓行而前有進無退磨礲乎理義之刃而斬刈乎利欲之場先登乎道德之郛而䇿勲乎聖賢之府非有志而能若是乎巽懦怯懾背公營私鼓之以仁義則氣索而不進脅之以利害則手戰而請降氣馬逸而不可收心地蹙而不可復非器不利帥之罪也然則為學之方捨此宜無急焉者矣足下居長溪之西偏裹糧而趨不五日而至武夷夫子之舍望洋向若以觀世之大勇者焉毋徒下睨汙瀆之中而覬吞舟之獲也足下其亦亮之敬字看得親切但常惺惺法為主乎整齊嚴肅其心收斂不容一物所以持乎主一無適似太分裂試更思之此學問之本原而終身之所當服行者也先師永逝吾道益孤所賴者朋友相與維持然如許重擔亦須奮不顧身方能負荷若沈浮世間與庸人奚異百年之身世間利害所直幾何若不勇猛向前則二三十年遂無此身矣可不大懼承諭旦晝念慮不如平旦靜坐此亦只是常覺不如常加提撕則乆當純一矣不見道體卻亦不須如此著意行吾敬故謂之義亦只是做行吾敬工夫而已乂著一心要見箇義卻恐有病學問大方只是致知力行持之以敬只怕人不用力而已别無好法也致知乃入道之方而致知非易事要須黙認實體方見端的不然則只是講説文字終日譊譊而真實體段元不曽識故其説易差而其見不實動靜表裏有未能合一則雖曰為善而卒不免於自欺也莫若一切將就自身上體著許多義理名字就自身上見得是如何則統之有宗不至於支離外馳也勉齋集巻十五
